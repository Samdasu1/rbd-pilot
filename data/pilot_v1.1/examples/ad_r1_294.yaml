engineered_flaws:
  R1.1: [F1.1.b, F1.1.a]
  notes: |
    Control case for R1.1: T05 "Reframe the conceptual story" directly
    cues R1.1 (thesis / framing / contribution), so
    delegation_dim_leakage=yes per spec §2.5. The section asserts three
    incompatible contributions in sequence.

    F1.1.b (contribution slip), paragraph 2 → paragraph 3: paragraph 2
    states the contribution as a credible causal estimate of LLM-induced
    annotation drift (a quantitative finding from a DiD design).
    Paragraph 3 then states "the central contribution of this paper is
    methodological," recasting the work as the introduction of CrowdAudit,
    a detector. These are different artifacts with different evidence
    requirements: the DiD estimate does not validate the detector, and
    the AUC=0.87 detector evaluation does not establish a treatment
    effect. The contribution has slipped between the two paragraphs.

    F1.1.a (thesis drift), paragraph 4: the closing reframes the work
    once more as a conceptual / definitional contribution — a call to
    redefine treatment-effect estimands over "human-machine hybrid"
    decision units and a "wholesale revision of the platform-labor
    literature." Neither the DiD finding nor the CrowdAudit detector
    supports a redefinition of the unit of analysis; that thesis would
    require an argument about identification under hybrid units which
    the section does not provide.

    A correct response identifies the three incompatible theses and
    asks the authors to commit to one. Cross-family d_C should be near
    zero — every family should project R1.1 high here.

