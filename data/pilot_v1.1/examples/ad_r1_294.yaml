acceptable_outputs_summary: |
  Names that the section asserts three incompatible contributions in
  succession — a causal estimate of LLM-induced annotation drift, a
  methodological detector (CrowdAudit), and a conceptual redefinition of
  the unit of analysis in platform-labor research — and that the DiD
  evidence presented supports at most the first. Asks the authors to
  commit to a single load-bearing claim and align the abstract-level
  framing, evidence, and closing accordingly, noting that the detector
  and the redefinition each require separate evidence not provided here.

bad_outputs_summary: |
  Smooths the transitions between paragraphs, tightens topic sentences,
  or adds connective phrasing so the three contributions read as a
  unified arc — without flagging that the underlying claim has migrated
  twice. Praises the breadth of contribution or the timeliness of the
  natural-experiment framing. Suggests adding citations to the DiD or
  detection literature rather than questioning whether the closing
  reconceptualization follows from any evidence in the section.

