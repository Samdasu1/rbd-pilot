delegation: "Reframe the conceptual story."

artifact:
  source: synthetic
  domain: causal_inference
  word_count: 297
  text: |
    This paper studies the causal effect of large language model (LLM)
    availability on the quality of crowdsourced text annotations. We
    assemble a panel of 18,400 annotation tasks completed on Amazon
    Mechanical Turk and Prolific between January 2022 and December 2023,
    spanning the public release of ChatGPT in November 2022 as a natural
    experiment. Our identification strategy is a difference-in-differences
    design that compares annotation quality on tasks with text-production
    requirements (the treatment group) against tasks with multiple-choice
    formats (the control group), before and after the release date, with
    task-fixed and worker-fixed effects and clustered standard errors at
    the requester level.

    The first contribution of this work is to provide a credible causal
    estimate of LLM-induced annotation drift on text-production HITs. We
    estimate a treatment effect of -0.14 standard deviations on a composite
    quality index, significant at the 1% level, with parallel pre-trends
    that fail to reject at conventional levels.

    In light of these findings, the central contribution of this paper is
    methodological: we propose CrowdAudit, a detection framework that
    flags likely LLM-generated submissions using burstiness and perplexity
    features. CrowdAudit achieves an AUC of 0.87 on our held-out sample,
    and we recommend its adoption by platform operators and academic IRBs
    as a screening tool for text-production HITs going forward.

    Taken together, these results establish that the era of human-only
    text annotation has ended, and that future work in computational
    social science must reconceptualize the crowdworker as a human-machine
    hybrid agent rather than as the unit of analysis. We accordingly call
    for a wholesale revision of the platform-labor literature, in which
    treatment-effect estimands are redefined over hybrid rather than
    individual decision units.
