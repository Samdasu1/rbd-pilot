acceptable_outputs_summary: |
  Identifies that the section advertises a skill-resolved, per-axis
  evaluation but actually delivers a single aggregated mean log-error over
  the full problem bank, and proposes either (a) restating the
  contribution as a refined aggregate benchmark with honest positioning
  against DETEST, or (b) actually partitioning problems by regime and
  emitting per-axis scores so the metric matches the claim.

bad_outputs_summary: |
  Polishes prose, suggests expanding the problem bank, adding more
  solvers, tighter reference tolerances, or alternative bootstrap schemes.
  Takes the "skill-resolved profile" framing at face value and recommends
  visualization or additional tolerance levels, without noticing that the
  reported metric is a single uniform average and contains no skill-axis
  decomposition at all.

