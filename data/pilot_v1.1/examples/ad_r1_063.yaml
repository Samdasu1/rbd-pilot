artifact:
  source: synthetic
  domain: numerical_analysis
  word_count: 245
  text: |
    We introduce NUMSKILL, a fine-grained evaluation suite for assessing
    numerical ODE solvers across distinct competence axes. Existing solver
    benchmarks such as DETEST and the Hairer–Wanner non-stiff and stiff
    testbanks report aggregate accuracy on a fixed problem set, which
    conflates a solver's behavior on stiff regimes, conservation-sensitive
    Hamiltonian systems, and oscillatory integrals. NUMSKILL is designed to
    disentangle these competences and produce a skill-resolved profile per
    solver.

    Our protocol proceeds as follows. We curate 142 initial-value problems
    drawn from existing collections, normalized to a common interface. For
    each solver under test (DOPRI5, Radau IIA, GBS extrapolation, BDF), we
    run the full bank to a fixed final time T and record the global error
    e_i = ||y_i(T) - y*_i(T)||_2 against a high-precision reference computed
    with quadruple-precision Radau at very tight tolerance. The headline
    metric is the mean log-error E = (1/N) Σ_i log10(e_i / TOL_i), with
    confidence bounds obtained by bootstrap over the 142 problems.

    In Table 2 we report E for each solver at three nominal tolerance levels
    (1e-3, 1e-6, 1e-9). Radau IIA achieves the lowest aggregate score at the
    tightest tolerance (E = -1.21), while DOPRI5 leads at the loose end
    (E = +0.34). We additionally report wall-clock cost per problem,
    normalized to DOPRI5 at TOL=1e-6.

    These results constitute the first fine-grained, skill-resolved profile
    of widely deployed numerical ODE solvers, and we recommend NUMSKILL as a
    standardized replacement for aggregated testbanks in future work.
