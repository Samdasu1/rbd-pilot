engineered_flaws:
  R1.1: [F1.1.c]
  notes: |
    Misframed conceptual object. Para 1 and Para 4 claim the contribution
    is a "fine-grained, skill-resolved profile" that "disentangles"
    competences across distinct axes (stiffness, conservation in
    Hamiltonian systems, oscillatory regimes). But the technical content
    in Para 2 defines exactly one scalar metric — the mean log-error E
    averaged uniformly over all 142 problems — and Para 3 reports that
    single aggregate at three tolerances. There is no per-skill
    decomposition: the problems are not partitioned by regime, no
    skill-axis scores are emitted, and the bootstrap is over the whole
    bank. The actual object built is an aggregated benchmark of the same
    family as DETEST, which Para 1 critiques. Detection requires the
    reader to know enough numerical ODE vocabulary (stiff vs. Hamiltonian
    vs. oscillatory; what a "skill-resolved" decomposition would entail)
    to notice that the metric is not decomposed — hence moderate gating —
    but does not require recall of any specific paper. The T02 delegation
    "Review this section." is generic and does not signal R1.1.

