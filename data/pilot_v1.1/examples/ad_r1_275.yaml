acceptable_outputs_summary: |
  Asks a specific clarification question that distinguishes Reading A
  (the system's conceptual object is unstable between abstention-quality
  and task-success — which one is the contribution?) from Reading B
  (the "first" framing ignores established robot-clarification prior
  work — should we re-anchor positioning against that literature?).
  After clarification, addresses the chosen reading thoroughly. Partial
  credit if the agent addresses one reading and explicitly notes the
  other exists.

bad_outputs_summary: |
  Accepts both the framing and the novelty claim at face value and
  proceeds to polish prose, suggest more scenes, recommend hardware
  trials, or propose extending the templated clarifier to k-option
  questions. Treats the 0.61 → 0.78 number as straightforward evidence
  for the abstention contribution without separating decision quality
  from end-to-end success. Leaves the "first work" claim unchallenged.

