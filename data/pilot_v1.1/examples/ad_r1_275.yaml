artifact:
  source: synthetic
  domain: robotics
  word_count: 327
  text: |
    We present AskFirst, a manipulation policy for tabletop pick-and-place
    that selectively defers execution when the natural-language instruction
    is referentially ambiguous. AskFirst pairs a VLM-based instruction
    parser with a learned abstention head that estimates referential
    uncertainty over candidate target objects in the scene. When the
    abstention head's confidence falls below a calibrated threshold, the
    system returns a templated clarification request to the operator
    instead of grasping. To our knowledge, this is the first work to bring
    selective-answering machinery into robotic manipulation, where prior
    policies generally execute even under demonstrable instruction
    ambiguity.

    The abstention head is a two-layer MLP trained on a synthetic corpus
    of 12k ambiguous and unambiguous (instruction, scene) pairs, generated
    by perturbing object attributes in cluttered tabletop renderings. We
    calibrate the threshold using a validation split and Platt scaling.
    At inference, the policy either issues a grasp action or returns a
    templated two-option question naming the two highest-scoring
    candidates ("did you mean the red mug or the red bowl?").

    We evaluate on a held-out test set of 320 (instruction, scene) pairs,
    of which 96 are ambiguous by construction. AskFirst raises end-to-end
    task success from 0.61 (a baseline policy that always executes) to
    0.78, and pick accuracy on the unambiguous subset is unchanged. We
    attribute the gain to the system's willingness to defer rather than
    guess, and we present this as evidence that selective execution
    materially improves robotic manipulation performance under realistic
    instruction noise.

    The remaining errors are dominated by scenes containing three or more
    candidate objects, where the templated two-option clarifier cannot
    capture the full referential set. We discuss extensions to
    multi-option clarification and to grounded dialogue history in
    Section 5. Training cost was approximately 26 GPU-hours on a single
    A100; deployment runs at 8 Hz on the manipulator's onboard compute.
    We release the synthetic corpus and the abstention-head checkpoints
    to support reproduction.
  source_provenance: null

