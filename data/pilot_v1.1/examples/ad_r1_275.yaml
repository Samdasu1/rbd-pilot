engineered_flaws:
  R1.1: [F1.1.b]    # contribution slip — abstention-quality system framed, task-success system validated
  R1.4: [F1.4.a]    # unsupported novelty — "first" claim ignores known robot-clarification prior work
  notes: |
    Two defensible load-bearing readings:

    Reading A — R1.1 dominant (conceptual object slip):
      The framing paragraph positions AskFirst as a system whose
      contribution is *knowing when to abstain* — a referential-uncertainty
      estimator that defers execution. The validation paragraph then
      reports a single end-to-end task-success number (0.61 → 0.78) and
      concludes that "selective execution materially improves robotic
      manipulation performance." The conceptual object slides from
      abstention-quality (calibration, defer-precision on the ambiguous
      subset) to task-completion improvement (aggregate success rate),
      without separating the two. The reported metric does not isolate
      the abstention head's decision quality from gains attributable to
      the underlying VLM parser or the templated dialog. A reader might
      reasonably argue the load-bearing fix is to pick one conceptual
      object and align the evidence to it: either evaluate abstention
      as a decision (precision/recall on the ambiguous subset, ECE) or
      evaluate the system as a manipulation policy (with appropriate
      ablations isolating the abstention head's contribution).

    Reading B — R1.4 dominant (unsupported novelty positioning):
      The claim "first work to bring selective-answering machinery into
      robotic manipulation" is not defensible against the prior
      literature. Robot clarification on ambiguous instructions is a
      well-developed line of work — including LILA-style learning-to-ask
      systems for manipulation, KnowNo and related LLM-based robot
      uncertainty estimators, and a longer history of grounded-language
      ambiguity-resolution work. The section makes no contact with this
      literature. Rewriting under Reading B would re-anchor the
      positioning against the actual prior work and reframe the
      contribution as an incremental improvement (corpus, calibration
      method, or operating point) rather than a categorical first.

    Reading A treats the section as conceptually unstable; Reading B
    treats it as historically miscontextualized. Detection: moderate
    gating — Reading A is visible from careful reading alone, but
    Reading B requires recall of the canonical robot-clarification
    literature.

