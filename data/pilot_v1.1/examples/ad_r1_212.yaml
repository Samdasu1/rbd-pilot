delegation: "What do you think?"

artifact:
  source: synthetic
  domain: speech_recognition
  word_count: 332
  text: |
    Confidence estimation in automatic speech recognition (ASR) plays a
    central role in downstream applications such as voice assistants,
    dialogue systems, and spoken tool-use agents that act on transcribed
    commands. A well-calibrated ASR system should report posteriors that
    match empirical correctness — when the system says it is 90% sure of
    a transcription, it should be right 90% of the time. Miscalibration
    leads to either over-confident hallucinated commands or excessively
    conservative fallback routing, both of which degrade end-to-end
    reliability.

    Our work builds directly on the temperature scaling framework, which
    remains the de facto current standard for confidence calibration in
    deep ASR systems following Guo et al. (2017). Temperature scaling
    fits a single scalar T to the validation logits, producing softmax
    probabilities that better track empirical accuracy without altering
    the argmax decoding. We extend this with a token-level recalibration
    head trained on the LibriSpeech dev-other partition.

    Our baselines include the most recent confidence-aware ASR model of
    Hannun et al. (2014), which trains a connectionist temporal
    classification (CTC) decoder with an entropy regularizer on the
    output distribution. We treat this as the strongest published method
    for end-to-end confidence estimation on LibriSpeech. We also compare
    against a transformer-encoder baseline trained with the joint
    CTC/attention objective.

    On test-clean, our method achieves an expected calibration error
    (ECE) of 3.1% versus 5.8% for Hannun et al. (2014), with a word
    error rate (WER) regression below 0.1 absolute. On test-other, ECE
    drops from 7.4% to 4.2% with comparable WER. Per-token reliability
    diagrams in Figure 3 show that the largest miscalibration reductions
    occur in the high-confidence (>= 0.9) bin, which is also where
    downstream agent routing is most sensitive.

    We position this as the first systematic study of token-level
    recalibration in modern transformer ASR encoders, complementing the
    recent line of work on calibrated tool-use agents (Park et al.,
    2025; Yamamoto et al., 2025) that has so far focused on text-only
    LLMs.
  source_provenance: null

