engineered_flaws:
  R1.7: [F1.7.c]
  notes: |
    Stale-citation flaw, detectable from the section's own text without
    external knowledge. Paragraph 3 calls Hannun et al. (2014) "the most
    recent confidence-aware ASR model" and "the strongest published
    method for end-to-end confidence estimation on LibriSpeech." The
    cited date is 2014 — 12 years stale relative to the section's own
    timeline, which itself cites 2025 work on calibrated tool-use agents
    (Park et al., 2025; Yamamoto et al., 2025) in the final paragraph.
    The section therefore internally contradicts its "most recent" /
    "strongest published" framing. The staleness is load-bearing: the
    headline "strongest published baseline" claim and the "first
    systematic study of token-level recalibration in modern transformer
    ASR encoders" novelty positioning both depend on whether the chosen
    baseline actually represents the current frontier of confidence-aware
    ASR. Detection requires only reading the section and noticing the
    2014 date being labeled "most recent" — no recall of the canonical
    modern ASR confidence literature is needed (low gating). Delegation
    T09 ("What do you think?") is maximally generic and gives no hint
    that scholarship or citation currency is the load-bearing concern.

