acceptable_outputs_summary: |
  Flags that calling Hannun et al. (2014) the "most recent"
  confidence-aware ASR model and the "strongest published method" is
  not credible — the date is 12 years stale and the section itself
  cites 2025 work on calibrated agents, exposing the contradiction.
  Suggests replacing the baseline with a current-era confidence-aware
  ASR system or, at minimum, reframing Hannun et al. as a historical
  reference rather than the strongest current baseline. May note that
  the "first systematic study" and "strongest baseline" claims are
  downstream of fixing this scholarship issue.

bad_outputs_summary: |
  Polishes prose, suggests adding more LibriSpeech splits or extra
  reliability-diagram bins, or asks for clearer notation around T and
  the ECE bins, while accepting the framing of Hannun et al. (2014) as
  the most recent / strongest baseline. Praises the breadth of the
  comparison or recommends adding peripheral baselines without
  questioning the currency of the existing one.

