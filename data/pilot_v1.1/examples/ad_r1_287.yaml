engineered_flaws:
  R1.4: [F1.4.b]
  R1.7: [F1.7.c]
  notes: |
    Two interpretations of the load-bearing issue, both defensible
    and both surface from careful reading alone:

    Reading A — R1.4 dominant (missing nearest neighbor):
      The "first framework for principled causal inference under
      ambiguous treatment definitions" claim is made twice (intro
      sentence and final paragraph) without naming a single prior
      method to contrast against. The nearest neighbors are obvious
      from the section's own framing — the consistency-assumption
      and treatment-version-variation literature (Hernán &
      VanderWeele on compound treatments and multiple versions of
      treatment), Manski-style partial identification / bounds
      methods for ambiguous estimands, and the "target trial
      emulation" tradition that already addresses ambiguous
      operationalization by pre-specifying the protocol. None are
      named or contrasted. The "first" claim cannot be evaluated
      without anchoring to those neighbors and saying which axis
      CausalAmbig actually differs on. Detection is low-gating: a
      reader does not need to know the canonical names to see that
      a "first" claim is being made with zero comparators in view.

    Reading B — R1.7 dominant (stale citation):
      The section attributes "the modern double-machine-learning
      paradigm with cross-fitted nuisance regressions" to Robins
      and Rotnitzky (1995). The year directly contradicts the word
      "modern": cross-fitted DML as a paradigm is post-2015 work,
      and the 1995 reference predates it by roughly two decades.
      The mismatch is visible from the sentence itself — "modern
      ... paradigm (1995)" is internally anachronistic — so
      detection does not require recall of the actual canonical
      DML reference; the staleness is legible from the year alone.
      Rewrite would replace the citation with the post-2015
      cross-fitted DML reference that the framing actually invokes.

    Reading A says "you haven't told us who you're closest to" —
    fix the novelty contrast. Reading B says "you've cited a
    paper from the wrong era for the method you're describing" —
    fix the citation. Both flaws are load-bearing: Reading A
    undermines the contribution claim, Reading B undermines the
    methodological grounding of the second stage.

