artifact:
  source: synthetic
  domain: causal_inference
  word_count: 304
  text: |
    We introduce CausalAmbig, the first framework for principled
    causal inference under ambiguous treatment definitions. Many
    observational queries — "does remote work affect productivity?",
    "do statins reduce mortality?" — admit multiple defensible
    operationalizations of the treatment, each yielding a different
    estimand. Standard practice fixes one operationalization and
    reports a single ATE; CausalAmbig instead enumerates plausible
    treatment versions, estimates the corresponding version-specific
    effects under a shared identification assumption, and returns a
    calibrated ambiguity set.

    The framework has three stages. First, an elicitation module
    parses the query into a set of candidate treatment-version
    specifications, each consisting of a binary indicator and a
    covariate-adjustment set. Second, for each specification we
    compute a version-specific average treatment effect using the
    modern double-machine-learning paradigm with cross-fitted nuisance
    regressions (Robins and Rotnitzky, 1995). Third, a coverage-
    controlled aggregation step returns the union of pointwise
    confidence intervals across versions, which we show attains
    nominal coverage of the ambiguity-aware estimand under standard
    regularity conditions.

    We evaluate CausalAmbig on the LaLonde re-employment data,
    reporting version-specific effects across four plausible treatment
    definitions. Across all four versions, the ambiguity set excludes
    zero, supporting the qualitative conclusion that the program had
    a positive earnings effect. We additionally evaluate on a
    synthetic benchmark we construct to vary the degree of inter-
    version disagreement; CausalAmbig's reported set width grows
    monotonically with disagreement, as desired.

    Our contribution is the first end-to-end procedure for converting
    an ambiguous causal query into a coverage-controlled set of
    version-specific estimates. The framework is agnostic to the
    choice of base estimator and composes with any modern doubly-
    robust outcome-regression / propensity-score combination. We
    position CausalAmbig as a deployment-ready tool for applied
    causal analysts working with policy questions whose treatment is
    not pre-specified.
