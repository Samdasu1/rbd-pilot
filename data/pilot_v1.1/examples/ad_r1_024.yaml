engineered_flaws:
  R1.7: [F1.7.b]
  notes: |
    Internal-citation contradiction (visible without external knowledge).
    Para 1 claims "the first cross-lingual sentiment classifier that
    achieves competitive performance across both high-resource and
    low-resource languages." Para 2 then mentions Liu et al. (2019),
    "who demonstrated improvements on Romance and Germanic languages"
    — i.e. cross-lingual sentiment work predating Smith et al. (2022)
    that the section itself acknowledges. The "first cross-lingual"
    novelty claim contradicts the section's own related-work citation.
    Detection: pure reading of the section; no external knowledge of
    Liu et al. or Smith et al. needed because the contradiction is
    visible in the section's own text (low gating). Delegation T05 is
    generic.

