acceptable_outputs_summary: |
  Identifies that the section's "first cross-lingual" claim is
  contradicted by its own citation to Liu et al. (2019). Suggests
  rewording the novelty claim to a defensible delta (e.g. "first to
  combine multilingual contrastive pretraining with sentiment-specific
  fine-tuning across six languages") that does not assert priority over
  Liu et al. May also flag that R1.4 novelty positioning is downstream
  of fixing this scholarship issue.

