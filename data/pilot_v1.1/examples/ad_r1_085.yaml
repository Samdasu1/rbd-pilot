engineered_flaws:
  R1.2: [F1.2.a]
  notes: |
    Hidden premise. The convergence theorem reports a rate
    O(n^{-(s+1/2)/d} (log n)^{1/2}) that depends on a "smoothness
    parameter s of the Matern kernel," but the section never states
    the assumption that the integrand f itself must lie in the RKHS of
    the Matern-5/2 kernel (equivalently, that f has a matching
    Sobolev smoothness). Without that unstated premise, the
    fill-distance-to-integration-error step does not go through and
    the stated rate is not defined for general f. The contribution is
    framed as a "general-purpose drop-in replacement for QMC ...
    applicable to arbitrary bounded black-box integrands without
    modification" — a claim that is incompatible with the hidden
    smoothness assumption that the proof and rate require. The
    discontinuous Genz integrand experiment underscores the gap: the
    theorem cannot apply to a discontinuous f, yet the section treats
    that case as merely giving "smallest gains" rather than as
    falling outside the regime where the contribution holds.
    Detection requires only careful reading of the theorem statement
    against the contribution claim; no canonical-result recall is
    needed.

