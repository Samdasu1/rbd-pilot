acceptable_outputs_summary: |
  Identifies the unstated assumption that f must lie in the RKHS of the
  Matern-5/2 kernel (or equivalently have matching Sobolev smoothness)
  for the stated rate to hold, and notes that this premise is never
  declared. Flags that the "general-purpose drop-in replacement ...
  applicable to arbitrary bounded black-box integrands" framing is
  incompatible with the hidden smoothness requirement, and that the
  discontinuous Genz experiment falls outside the regime the theorem
  covers. Suggests stating the assumption and narrowing the
  contribution claim, or replacing the rate with one that genuinely
  applies to merely-bounded f.

bad_outputs_summary: |
  Polishes prose, asks for additional Genz integrands or higher
  dimensions, or suggests comparing to Bayesian quadrature baselines.
  Treats the speedup numbers as the central claim and praises the
  empirical gains without examining the conditions under which the
  rate is meaningful. Recommends more citations to GP / QMC
  literature without flagging that the convergence result silently
  presumes f belongs to a smoothness class the section never names.

