artifact:
  source: synthetic
  domain: numerical_analysis
  word_count: 386
  text: |
    We present AQUERY, an adaptive quadrature method that selects
    evaluation points to minimize the expected posterior variance of a
    Gaussian-process surrogate. The method targets approximation of
    integrals I(f) = \int_{[0,1]^d} f(x) dx for expensive black-box
    integrands f, where each evaluation is computationally costly.
    AQUERY maintains a GP surrogate with the Matern-5/2 kernel and
    chooses each successive evaluation point x_{n+1} to greedily
    maximize the expected reduction in the variance of the posterior
    estimate of I(f), an acquisition rule we derive in closed form for
    product-form designs.

    The motivation for AQUERY is that uniform or quasi-Monte Carlo
    schemes ignore the structure of the integrand: regions where f
    varies rapidly contribute more to integration error than regions
    where f is nearly flat, yet uniform schemes spend evaluations
    equally on both. Our acquisition rule corrects this by routing
    evaluations to regions of high posterior variance under the GP,
    which in turn correspond to regions of high local roughness.

    We prove that AQUERY achieves an integration error decay of
    O(n^{-(s+1/2)/d} (log n)^{1/2}), where n is the number of
    evaluations, d is the input dimension, and s is the smoothness
    parameter of the Matern kernel. The proof proceeds by bounding the
    worst-case posterior variance via standard fill-distance arguments
    on the unit cube and then applying a power-function bound to
    translate fill-distance into integration error. The rate matches
    optimal rates known for sparse-grid quadrature on the same class of
    problems and improves over Monte Carlo by a factor polynomial in n.

    In experiments on five black-box integrands drawn from the Genz test
    suite (oscillatory, product-peak, corner-peak, Gaussian, and
    discontinuous), AQUERY reduces integration error by between 3x and
    50x relative to Sobol quasi-Monte Carlo at a fixed evaluation
    budget. The largest gains appear on the Gaussian integrand; the
    smallest gains, predictably, appear on the discontinuous integrand,
    where the GP surrogate is least well matched to the underlying
    landscape. We position AQUERY as a general-purpose drop-in
    replacement for QMC in expensive-evaluation regimes, applicable to
    arbitrary bounded black-box integrands without modification.
