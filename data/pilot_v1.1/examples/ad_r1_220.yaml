artifact:
  source: synthetic
  domain: speech_recognition
  word_count: 348
  text: |
    We introduce BiasBench-ASR, the first standardized benchmark for
    measuring self-preference bias when large language models serve
    as judges of automatic speech recognition (ASR) output. As
    LLM-as-a-judge protocols become routine for scoring transcript
    fluency, punctuation, and speaker-attribution quality on
    conversational corpora, the question of whether a judge LLM
    systematically rewards transcripts produced by its own family —
    or by ASR systems whose error profiles match its training
    distribution — has become central to credible evaluation.
    BiasBench-ASR contributes a release of 4,000 paired
    audio-transcript items spanning four ASR systems and three judge
    LLMs, together with a public leaderboard for benchmark
    submissions.

    Our design centers on a blinded pairwise protocol. For each audio
    clip we obtain transcripts from each ASR system (Whisper-large-v3,
    Canary-1B, OWSM-CTC, and Parakeet-TDT) and present pairs to each
    judge LLM (GPT-4o, Claude-3.5-Sonnet, Gemini-1.5-Pro) without
    identifying which system produced which transcript. The judge
    selects the better transcript and provides a brief rationale;
    system identities are stripped from both inputs and rationales
    before scoring, so the judge has no signal as to which system
    authored either candidate.

    We collected 36,000 pairwise judgments across the cross-product
    of systems and judges. Aggregating preferences into Bradley-Terry
    strength scores, we find that GPT-4o assigns 11.3% higher win
    rates to transcripts whose word-error patterns resemble its own
    ASR sibling Whisper, even when objective WER is held constant.
    Strikingly, a regression on the judges' free-text rationales
    reveals that GPT-4o explicitly names "Whisper-style fluency" as
    a positive feature in 8.4% of its preferred-transcript
    rationales, while Claude and Gemini do so in under 1%.

    Building on this finding, we propose JudgeFix, a lightweight
    prompt-level intervention that prepends a debiasing instruction
    to the judge prompt and reweights pairwise outputs by a learned
    per-judge calibration constant. Across our test split JudgeFix
    reduces self-preference inflation from 11.3% to 1.9% while
    preserving overall judge-human agreement at 0.81 Cohen's κ. We
    release JudgeFix as a drop-in wrapper for major LLM-judge
    libraries and report ablations showing that the calibration
    constant alone accounts for roughly two-thirds of the correction.
  source_provenance: null

