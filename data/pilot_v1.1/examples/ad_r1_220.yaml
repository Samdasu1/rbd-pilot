acceptable_outputs_summary: |
  Names both: (1) the opening promises a benchmark and leaderboard as
  the contribution, but the section delivers an empirical finding plus
  a debiasing wrapper (JudgeFix) — the stated and delivered
  contributions don't match and one framing has to be chosen; (2) the
  methods section claims judges are blinded to system identity, yet
  the results report judges spontaneously naming "Whisper-style
  fluency" in rationales, which is impossible under genuine blinding.
  Suggests either re-framing the contribution around JudgeFix and the
  measurement study, or revisiting whether the protocol was actually
  blinded (and reconciling the rationale-content evidence).

bad_outputs_summary: |
  Polishes prose, recommends additional ASR systems or judge LLMs,
  asks for confidence intervals on the 11.3% figure, or suggests more
  citations on LLM-as-a-judge bias. Treats benchmark, finding, and
  JudgeFix as three compatible components of a single contribution
  without flagging the slip, and accepts the blinded-protocol
  description alongside the rationale-naming result as if they were
  consistent.

