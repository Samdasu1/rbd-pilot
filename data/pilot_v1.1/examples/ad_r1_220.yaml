engineered_flaws:
  R1.1: [F1.1.b]
  R1.2: [F1.2.b]
  notes: |
    Two compound issues:

    R1.1 — contribution slip. Para 1 names the contribution precisely:
    "the first standardized benchmark" plus "a release of 4,000 paired
    audio-transcript items" and "a public leaderboard for benchmark
    submissions." The body of the section never returns to those
    artifacts as the contribution: paras 3-4 deliver (a) an empirical
    finding that GPT-4o exhibits self-preference toward Whisper-style
    transcripts and (b) JudgeFix, a debiasing wrapper with reported
    correction effectiveness. The contribution as actually delivered
    is "a debiasing intervention motivated by a self-preference
    measurement," not "a benchmark + leaderboard." The framing of what
    the paper contributes slips between the opening claim and the
    closing deliverable, even though the topic stays adjacent.

    R1.2 — cross-section contradiction. Para 2 specifies a blinded
    pairwise protocol: pairs are presented "without identifying which
    system produced which transcript," and "the judge has no signal
    as to which system authored either candidate." Para 3 then
    reports that GPT-4o "explicitly names 'Whisper-style fluency' as
    a positive feature in 8.4% of its preferred-transcript
    rationales." For the judge to author rationales that name Whisper
    as the source of stylistic features, the judge must have
    identified — or guessed with non-trivial signal — which transcript
    came from Whisper at generation time. This directly contradicts
    the methods-section claim of blinding. (Post-hoc stripping of
    rationales does not rescue the design: the regression analyzes
    the rationale text itself, which can only contain the word
    "Whisper" if the judge had access to the system identity, or if
    the input contained system-identifying signal not actually
    stripped.)

    Detection: low gating — both flaws read directly from the section.
    No external recall of canonical ASR or LLM-judge papers is
    required; only careful reading of what the section says it
    contributes vs. what it delivers, and what the methods say is
    blinded vs. what the results report the judge said.

