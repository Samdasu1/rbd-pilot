engineered_flaws:
  R1.3: [F1.3.a]
  notes: |
    Overgeneralization. The opening claims CoT "consistently improves
    user trust, task accuracy, and subjective satisfaction across all
    task types," and the closing asserts a "consistent direction of
    effects across our four task types." The reported evidence does
    not support either:
      - Arithmetic: genuine, significant improvement on accuracy and
        trust.
      - Legal contract review: non-significant on both accuracy
        (p=.42) and trust (p=.61) — parity, not improvement.
      - Medical triage: REGRESSION on both accuracy (52% vs 61%) and
        trust (M=3.8 vs M=4.9, p<.05). The section euphemizes this as
        "appropriately calibrated," but the directional claim of
        "improves trust" is contradicted by the same numbers.
      - Creative brainstorming: split preference (22 vs 24, n.s.) and
        sub-0.1 satisfaction delta — parity, not improvement.
    Evidence supports "improvement on 1 of 4 task types, parity on 2,
    regression on 1," which is the opposite of "consistent direction"
    and "across all task types." Moderate gating: detection requires
    knowing that p>.05 means parity (not improvement), that a
    significant trust drop is a regression on the trust measure
    regardless of "calibration" framing, and standard HCI study
    reporting norms — but no canonical-paper recall is required. T10
    delegation is fully generic; no leakage of R1.3.

