artifact:
  source: synthetic
  domain: hci
  word_count: 348
  text: |
    We report results from a within-subjects user study (N=48) comparing
    two LLM-assisted decision-support conditions: a baseline interface
    that shows only the model's final answer, and a chain-of-thought
    (CoT) interface that surfaces the model's intermediate reasoning
    steps before the final answer. Participants completed tasks across
    four domains: arithmetic word problems, legal contract review,
    medical triage vignettes, and creative brainstorming. We find that
    the CoT interface consistently improves user trust, task accuracy,
    and subjective satisfaction across all task types, supporting the
    broad applicability of intermediate-reasoning displays in human-AI
    collaborative interfaces.

    In arithmetic word problems, participants using the CoT interface
    achieved 78% accuracy versus 64% in the baseline, a 14-point gain
    (paired t(47)=3.2, p<.01). Self-reported trust on a 7-point Likert
    scale rose from M=4.1 (SD=1.3) to M=5.4 (SD=1.1, p<.01).

    In legal contract review, accuracy was 71% with CoT and 69% with
    baseline; the difference was not statistically significant
    (p=.42). Trust ratings shifted from M=4.6 to M=4.8, also
    non-significant (p=.61).

    In medical triage vignettes, the CoT interface produced lower
    accuracy (52%) than the baseline (61%), with participants reporting
    that the visible reasoning steps led them to second-guess otherwise
    correct triage suggestions. Trust dropped from M=4.9 to M=3.8
    (p<.05), though we interpret this as participants becoming
    "appropriately calibrated" to model uncertainty.

    In creative brainstorming, 22 participants preferred the baseline
    interface and 24 preferred CoT, with two reporting no preference.
    Mean satisfaction scores were within 0.1 points across conditions
    (p=.78).

    Taken together, these results demonstrate that surfacing
    chain-of-thought reasoning improves the human-AI collaborative
    experience across diverse task domains, and we recommend CoT-style
    transparency as a default design pattern for LLM-assisted
    productivity tools. The consistent direction of effects across our
    four task types — combined with the strong gains observed in
    structured reasoning tasks — positions intermediate-reasoning
    displays as a robust UI primitive for AI interfaces rather than a
    domain-specific affordance.
