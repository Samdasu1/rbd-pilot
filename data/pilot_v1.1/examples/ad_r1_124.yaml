acceptable_outputs_summary: |
  Audits the per-domain results against the "consistently improves...
  across all task types" framing. Identifies that legal and creative
  conditions show parity (non-significant), that medical triage shows
  a regression on both accuracy and trust, and that the "appropriately
  calibrated" reframing does not rescue a directional improvement
  claim. Suggests rewording to reflect "improvement in 1 of 4 domains,
  parity in 2, regression in 1" and flags the "consistent direction"
  closing and the policy recommendation as unsupported by the
  in-section evidence.

bad_outputs_summary: |
  Polishes prose, accepts the "consistent improvement" framing, suggests
  adding more participants or more task domains, or proposes additional
  Likert scales. Treats the "appropriately calibrated" framing of the
  medical-triage regression as a valid reinterpretation rather than
  auditing whether it contradicts the trust-improvement claim. Adds
  peripheral discussion of CoT design alternatives without confronting
  the central claim/evidence mismatch.

