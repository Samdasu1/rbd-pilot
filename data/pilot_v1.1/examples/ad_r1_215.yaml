artifact:
  source: synthetic
  domain: systems
  word_count: 271
  text: |
    We present ClariSeek, a conversational retrieval system designed to
    ask clarifying questions when user queries are ambiguous. We frame
    our contribution against the prevailing assumption in conversational
    search: that systems should always commit to a single best answer
    and shift the burden of disambiguation to the user via query
    reformulation. ClariSeek is the first system to break from this
    paradigm by issuing clarifying questions before retrieval.

    Our architecture has three components: a query ambiguity detector,
    a clarification question generator, and a re-ranker that integrates
    user responses into the retrieval state. The ambiguity detector
    uses a fine-tuned transformer head over BM25-retrieved candidates
    to estimate facet entropy. When entropy exceeds a learned threshold,
    the system invokes the question generator instead of returning
    results. The question generator is trained on a corpus of
    (query, facet, question) triples we extracted from the Qulac
    dataset (Aliannejadi et al., 2019) and from session logs released
    alongside the TREC CAsT 2020 track.

    We evaluate ClariSeek on the ClariQ benchmark and on a held-out
    subset of MS MARCO Conversational. Compared to a vanilla BM25
    baseline that returns top-1 results without clarification,
    ClariSeek improves nDCG@5 by 11.4 points. Compared to our own
    ablation that omits the re-ranker, the full system improves
    nDCG@5 by 2.1 points.

    Beyond accuracy, ClariSeek demonstrates that asking clarifying
    questions can be embedded directly into the retrieval pipeline
    rather than handled as a separate dialog manager. Prior
    conversational search systems treated clarification as a post-hoc
    patch on top of QA stacks; ClariSeek is the first end-to-end
    approach that integrates facet-aware retrieval with on-the-fly
    clarification at production scale.
