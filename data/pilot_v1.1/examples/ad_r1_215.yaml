acceptable_outputs_summary: |
  Names the strawman: the section's "prevailing assumption" framing is
  contradicted by its own use of Qulac and ClariQ, which are resources
  built precisely because the field already studies clarification.
  Points out that the "first system" / "first end-to-end" claims are
  rhetorical and not supported by a delta against any actual prior
  clarification system; the reported gains are only over a
  no-clarification baseline and an internal ablation. Suggests
  rewriting the framing against an accurate description of prior
  facet-driven clarification work and stating a precise, defensible
  delta.

bad_outputs_summary: |
  Tightens prose, accepts the "first system" framing, and suggests
  adding more datasets, more ablations, or production-scale latency
  numbers. Praises the three-component architecture and the
  entropy-thresholding idea without questioning what "first" is being
  contrasted against, or noticing that Qulac and ClariQ presuppose
  prior clarification work.

