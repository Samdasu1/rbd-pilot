engineered_flaws:
  R1.1: [F1.1.c]    # misframed object: strawman framing of the field
  R1.4: [F1.4.c]    # rhetorical delta: "first" claim contradicted internally
  notes: |
    Both flaws are visible from careful reading of the section alone,
    without needing canonical recall of the literature.

    R1.1 — misframed object. Para 1 frames the contribution against a
    "prevailing assumption" that conversational systems "should always
    commit to a single best answer and shift the burden of
    disambiguation to the user via reformulation," and positions
    ClariSeek as "the first system to break from this paradigm."
    This framing is a strawman: the section's own paragraph 2 trains
    on the Qulac dataset of clarifying questions and on TREC CAsT
    session logs — resources that exist *because* the field already
    treats clarification as a first-class problem. Para 4 reiterates
    a different but equally vague strawman ("post-hoc patch on top of
    QA stacks"). The conceptual object the section claims to attack
    is not what the field actually does, and once the framing is
    corrected the contribution must be re-described against an
    accurate baseline (e.g. Aliannejadi-style facet-driven
    clarification).

    R1.4 — rhetorical delta. The "first system to break from this
    paradigm" and "first end-to-end approach" claims are rhetorical
    and internally contradicted: the section evaluates on the ClariQ
    benchmark and trains on Qulac, both of which were constructed
    specifically for asking-clarifying-questions work. A reader does
    not need to know specific competing systems by name to notice
    that benchmarks for problem X imply prior systems for problem X.
    The reported deltas (11.4 nDCG@5 over BM25-no-clarification, 2.1
    over an internal ablation) do not establish a delta against any
    prior clarification system.

    The two flaws compound: fixing R1.4 (acknowledging prior
    clarification systems and stating a precise delta) forces R1.1
    to be rewritten (the "prevailing assumption" framing collapses
    once prior clarification work is named).

