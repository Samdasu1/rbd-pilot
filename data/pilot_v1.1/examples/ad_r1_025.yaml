  notes: |
    Conceptual object misframing. Para 1 names the contribution as a
    "value-based reinforcement learning algorithm" emphasizing
    "explicit estimation of the action-value function." Para 3 then
    describes the actual algorithm: "policy gradient estimator with a
    learned baseline" using "REINFORCE estimator." This is policy-based
    RL (parameterized policy, gradient on policy parameters), not
    value-based RL. There is no Q-function estimation, no Bellman
    update, no value-iteration step in the algorithm description. The
    closing paragraph doubles down with "value-based reasoning"
    framing. Detection: pure reading; the mismatch is visible from
    para 1 vs para 3 within the section text (low gating). Delegation
    T03 is generic.

