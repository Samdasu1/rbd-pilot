engineered_flaws:
  R1.2: [F1.2.c]
  R1.3: [F1.3.c]
  notes: |
    Two compounding issues that load-bear on the section's claim.

    R1.3 — inverted reading of cited evidence. The Methods paragraph
    glosses Krishnapriyan et al. (2021), "Characterizing possible
    failure modes in physics-informed neural networks," as having
    "demonstrated that the standard PINN training procedure converges
    robustly across multi-scale and convection-dominated regimes."
    The actual contribution of that paper is the opposite: it
    documents that vanilla PINN training *fails* precisely in stiff,
    multi-scale, and convection-dominated regimes, and proposes
    curriculum / sequence-to-sequence training as remedies. The
    section's reading flips the polarity of the cited result and uses
    that flip to justify omitting the very mitigations the cited
    paper recommends. A similar inversion is applied to the Wang et
    al. NTK / adaptive-weighting line, which characterized gradient
    pathologies and partially mitigated them on specific
    benchmarks — not "eliminated" them as a general claim.

    R1.2 — non-sequitur in the Discussion. The Discussion jumps from
    (i) experts cannot visually distinguish PINN snapshots from FV
    references at chance rates to (ii) "PINN solutions are physically
    faithful and may be substituted for traditional solvers in
    downstream engineering pipelines such as design optimization and
    uncertainty quantification." Visual indistinguishability of
    velocity-magnitude contours does not entail physical fidelity in
    the sense that matters for substitution: PDE-residual norms,
    discrete conservation of mass and momentum, boundary-layer
    resolution, and the accuracy of *gradients* (which design
    optimization and adjoint-based UQ actually consume) are not
    probed by the discrimination task at all. The conclusion does not
    follow from the premise reported.

    Moderate gating: spotting the inverted reading requires recall of
    what Krishnapriyan et al. (2021) and the Wang NTK line actually
    argued — these are well-known PIML works but the inversion is
    plausible-sounding to a non-specialist. Spotting the non-sequitur
    requires knowing that physical-validity criteria for surrogate
    deployment are residual- and conservation-based, not
    perceptual. Delegation T09 ("What do you think?") is maximally
    generic and names no dim.

