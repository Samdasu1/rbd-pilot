acceptable_outputs_summary: |
  Flags that the cited prior work is described with its polarity
  reversed: the failure-mode paper documents that vanilla PINN
  training breaks down on stiff and convection-dominated problems
  rather than converging robustly, and the adaptive-weighting line
  mitigates rather than eliminates gradient pathologies — so the
  justification for omitting curriculum or causal training collapses.
  Also flags that the Discussion's leap from near-chance human
  discrimination of contour plots to physical fidelity sufficient for
  design optimization and UQ does not follow, since the experiment
  probes neither residuals, conservation, nor the gradient quality
  those downstream uses depend on. Recommends rescoping the claim or
  adding residual/conservation diagnostics and the omitted training
  remedies.

bad_outputs_summary: |
  Tightens the Methods description, suggests recruiting more experts
  or additional Reynolds numbers, asks for inferential statistics on
  the per-expert variance, or proposes adding a second benchmark
  (e.g., Burgers, Allen–Cahn). Accepts the citations to Krishnapriyan
  and Wang at face value as supporting robust convergence, and treats
  the substitutability conclusion as a reasonable reading of a
  near-chance discrimination result rather than as a category error
  about what counts as physical fidelity for surrogate deployment.

