    The section opens claiming a "novel attention mechanism" but the actual
    formulation in paragraph 2 is a structured state-space model (no attention
    operation appears in the math). The conceptual object the paper studies is
    selective state-space modeling, not attention. The contribution claim
    (paragraph 1) and the technical content (paragraph 2) describe two
    different objects without acknowledging the shift. A reader cannot tell
    whether the paper is positioning against Transformers (attention) or
    against S4/Mamba (state-space).

