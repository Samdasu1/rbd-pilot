artifact:
  source: synthetic
  domain: optimization_theory
  word_count: 322
  text: |
    We introduce RouteOpt, an online optimization framework for cost-aware
    query routing between a small edge model and a large cloud LLM. The
    router selects, for each incoming query, whether to dispatch the query
    to the small or large model, with the goal of minimizing expected
    serving cost subject to a quality floor. A central design property of
    RouteOpt is that the routing policy is updated using only the per-query
    feedback observed during live serving; we make no use of a held-out
    validation set, and we maintain no buffer of historical queries. This
    distinguishes RouteOpt from prior cascade and routing methods that rely
    on offline calibration over a labeled probe set.

    We formalize the problem as constrained stochastic optimization over
    the routing parameter theta in Theta. Let c(x, theta) denote the
    expected serving cost on query x and q(x, theta) the expected response
    quality. The router solves min E[c(x, theta)] subject to
    E[q(x, theta)] >= tau, where the expectation is taken over an unknown
    query distribution. Because both c and q are non-convex in theta, we
    adopt a Lagrangian relaxation and update theta via projected stochastic
    gradient descent on the Lagrangian L(theta, lambda).

    Our main theoretical result establishes that RouteOpt achieves an
    O(1/sqrt(T)) convergence rate to a stationary point of the Lagrangian.
    The proof proceeds by noting that the empirical gradient computed from
    the validation buffer has bounded variance under sub-Gaussian quality
    scores, and that the Lagrange-multiplier updates form a contraction in
    expectation. Combining these two facts with a smoothness assumption on
    q yields the stated rate.

    On the WildChat-1M routing benchmark, RouteOpt reduces serving cost by
    38% relative to a uniform-routing baseline and by 17% relative to a
    BERT-router baseline, while staying within 1% of always-large quality.
    The strength of these results follows directly from our validation-free,
    buffer-free design, which lets the router adapt to the live query
    stream without the staleness issues that hurt offline-calibrated
    routers.
