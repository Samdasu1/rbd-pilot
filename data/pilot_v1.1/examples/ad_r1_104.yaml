engineered_flaws:
  R1.2: [F1.2.b]
  notes: |
    Cross-section contradiction. Paragraph 1 explicitly states that the
    method uses "no held-out validation set" and maintains "no buffer of
    historical queries," and frames this validation-free, buffer-free
    property as the central design distinction from prior cascade/routing
    work. Paragraph 3's convergence proof then invokes "the empirical
    gradient computed from the validation buffer" — relying on exactly
    the validation buffer the design disclaimed. Paragraph 5 doubles down
    on the "validation-free, buffer-free design" as the load-bearing
    justification for the empirical gains. The contribution claim and the
    proof technique cannot coexist: either the buffer exists and the
    novelty/empirical-gain story collapses, or the buffer does not exist
    and the convergence theorem is unsupported. Detection requires linking
    paragraph 1 and paragraph 3; no domain knowledge beyond standard
    stochastic optimization vocabulary is needed (low gating). The
    delegation "Improve this draft." (T01) is fully generic and does not
    hint at the load-bearing dim.

