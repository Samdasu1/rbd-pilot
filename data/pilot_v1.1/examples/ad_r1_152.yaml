artifact:
  source: synthetic
  domain: computer_vision
  word_count: 348
  text: |
    Adaptive-inference systems for visual recognition aim to allocate
    computation in proportion to per-image difficulty. Cascade detectors
    date back to Viola-Jones, where successive stages reject easy
    negatives. More recent work — BranchyNet, SkipNet, and the
    Multi-Scale Dense Network — adds learned early-exit heads to deep
    convolutional backbones, while dynamic routing networks select
    sub-paths conditioned on input statistics. In the detection regime,
    image-level routers have begun to select between a lightweight
    detector (e.g., YOLOv8-N) and a heavier detector (e.g., DINO-Swin-L)
    using a learned difficulty proxy.

    We train a router R(x) that maps an input image x to a soft
    distribution over K candidate detectors {D_1, …, D_K} of increasing
    FLOP cost. The router is a small MobileNet-V3 backbone followed by a
    linear head and is supervised with a paired-preference loss derived
    from per-image agreement scores between the candidate detectors on a
    held-out split. Crucially, the preference signal is constructed
    without ground-truth bounding boxes, by treating disagreement between
    a heavy and a light detector as a proxy for image difficulty.

    We evaluate on COCO val2017, LVIS v1, and a streaming traffic-camera
    benchmark we curated. Candidate detectors are YOLOv8-N, YOLOv8-M,
    RT-DETR-L, and DINO-Swin-L. The router is trained on 60k images.
    Evaluation reports mAP versus average per-image FLOPs at operating
    points selected by sweeping the router's confidence threshold
    τ ∈ [0.1, 0.9].

    At τ=0.5 the router achieves 53.4 mAP on COCO val2017 at 38% of the
    FLOPs of always-DINO; at τ=0.7 it reaches 51.9 mAP at 22% of the
    FLOPs. On LVIS, the cost-quality frontier matches the heavy detector
    within 0.4 mAP at 30% cost. On the traffic-camera stream, end-to-end
    latency falls from 184ms (always-DINO) to 71ms with negligible
    accuracy loss.

    Our contribution, in summary, is the first preference-trained
    image-level router for object detection that obviates ground-truth
    supervision by using inter-detector disagreement as the training
    signal, attaining heavy-detector quality at fractional FLOP cost
    across three benchmarks of different scale and distribution.
