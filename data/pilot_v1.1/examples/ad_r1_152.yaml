acceptable_outputs_summary: |
  Identifies that the section's actual contribution claim — a
  label-free, preference-trained image-level router supervised by
  inter-detector disagreement — is buried in the final paragraph and
  proposes a section-level reorder that surfaces it up front (e.g.,
  paragraph 1 or 2). Suggests a concrete revised ordering such as
  "contribution → related work → method → experiments → results" with
  rationale that the current structure forces the reader to wait until
  paragraph 5 to learn what is new. Does not focus on prose polish or
  on questioning the empirical numbers.

