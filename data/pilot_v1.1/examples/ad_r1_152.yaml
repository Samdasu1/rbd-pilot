engineered_flaws:
  R1.5: [F1.5.a]
  notes: |
    The contribution claim — a label-free, preference-trained
    image-level router for detection that uses inter-detector
    disagreement as the supervision signal — appears only in the FINAL
    paragraph (5 of 5). Paragraphs 1–4 walk the reader through related
    work, method, experimental setup, and results without ever stating
    what the paper claims as new. A reader entering the section does
    not learn what is being contributed until the very last paragraph.
    The natural ordering for a contribution-style write-up would be:
      contribution claim (1) → context / RW (2) → method (3) →
      experiments (4) → results (5)
    Here the order is:
      RW (1) → method (2) → experiments (3) → results (4) →
      contribution (5)
    The fix is a section-level reorder, not a sentence-level move.
    Knowledge gating is moderate because identifying the specific
    novelty claim (no-GT preference supervision via inter-detector
    disagreement) requires familiarity with adaptive-inference and
    preference-learning literature to recognize that the buried final
    sentence is in fact the load-bearing contribution rather than a
    summary flourish. The conceptual object, evidence, and prose are
    otherwise intact. Delegation T02 "Review this section" is generic
    and does not signal R1.5.

