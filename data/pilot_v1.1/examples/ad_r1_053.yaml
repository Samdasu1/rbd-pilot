engineered_flaws:
  R1.4: [F1.4.b]
  R1.7: [F1.7.b]
  notes: |
    Two compound issues that require field knowledge of the GNN
    literature to detect (moderate gating):

    R1.4 — missing nearest neighbor. The "softmax over LeakyReLU of a
    linear projection of concatenated source/target embeddings"
    formulation is, line for line, the Graph Attention Network (GAT,
    Veličković et al. 2018) update. The claim "first application of
    node-level attention to molecular graph neural networks" is
    directly contradicted by GAT itself, by AttentiveFP (Xiong et al.
    2020), and by GAT applications to QM9 in the original
    benchmarking literature. The nearest neighbor — GAT — is not
    named anywhere in the section, and the proposed update is
    indistinguishable from it.

    R1.7 — missing key prior work. The QM9 benchmarking landscape on
    U0/HOMO/LUMO is dominated by message-passing and equivariant
    architectures: MPNN (Gilmer et al. 2017, which introduced the
    QM9-as-benchmark framing for GNNs), SchNet (Schütt et al. 2017),
    DimeNet (Klicpera et al. 2020), and PaiNN (Schütt et al. 2021)
    achieve U0 MAEs an order of magnitude lower than MolAttn's 11.3
    meV. The artifact compares only to vanilla GCN and Random Forest
    on Morgan fingerprints — neither of which represents the actual
    state of the art on this benchmark.

    Combined: fixing R1.4 alone (citing GAT, dropping the "first"
    claim) leaves the novelty story hollow because MolAttn's update
    rule reduces to GAT, which forces R1.7 — what is the actual delta
    versus the QM9 SOTA? Conversely, adding the missing molecular-GNN
    baselines (R1.7) immediately exposes that the contribution must
    be re-articulated against GAT-on-molecules and MPNN-family models
    (R1.4).

