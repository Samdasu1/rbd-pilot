artifact:
  source: synthetic
  domain: graph_neural_networks
  word_count: 281
  text: |
    We present MolAttn, a graph neural network architecture for molecular
    property prediction that introduces attention-based aggregation over
    atomic neighborhoods. Existing approaches to molecular GNNs typically
    rely on uniform neighborhood aggregation, which limits their ability
    to weight chemically informative bonds differently from structurally
    peripheral ones. MolAttn addresses this by computing per-edge
    attention scores conditioned on the source and target atom
    embeddings, allowing the model to allocate aggregation weight in a
    chemistry-aware fashion.

    Concretely, given node embeddings h_u^{(l)} for atom u at layer l,
    MolAttn computes attention coefficients
    α_{uv} = softmax_v(LeakyReLU(w_a^T [W h_u || W h_v])) and aggregates
    as h_u^{(l+1)} = σ(Σ_v α_{uv} W h_v). The architecture stacks L=4
    such layers followed by a readout that sums final node embeddings
    into a graph-level representation, which is passed through a
    two-layer MLP to predict scalar properties.

    We benchmark MolAttn on the QM9 dataset (Ramakrishnan et al. 2014),
    focusing on the U0, HOMO, and LUMO targets. As baselines we include
    a vanilla GCN (Kipf & Welling 2017) and a Random Forest on Morgan
    fingerprints. MolAttn achieves mean absolute errors of 11.3 meV
    (U0), 51.2 meV (HOMO), and 47.8 meV (LUMO), substantially
    outperforming both baselines on all three targets.

    The central innovation of MolAttn is the use of attention over
    atomic neighborhoods to capture chemistry-aware aggregation
    patterns. To our knowledge, this is the first application of
    node-level attention to molecular graph neural networks, and our
    results demonstrate that attention-based aggregation yields
    systematic improvements over uniform-aggregation alternatives in
    the chemistry domain.
