engineered_flaws:
  R1.7: [F1.7.b]
  notes: |
    Internal-citation contradiction (visible without external
    knowledge). Para 1 claims GoalAniso is "the first algorithm to
    combine goal-oriented dual-weighted residual estimation with
    anisotropic mesh refinement for steady-state convection-diffusion
    problems with sharp internal layers." Para 3 then states that
    "DWR-based anisotropic mesh refinement for advection-diffusion
    problems was previously developed by Formaggia and Perotto (2003),
    who derived element-wise anisotropic DWR estimators and
    demonstrated mesh adaptation on internal-layer benchmarks" —
    advection-diffusion is the same problem class as
    convection-diffusion, and internal-layer benchmarks are the same
    setting. The "first" novelty claim contradicts the section's own
    related-work citation. Detection requires only careful reading of
    the section; no recall of canonical prior work is necessary
    because the contradiction is internal to the text. Delegation T03
    ("Make this stronger.") is a generic improvement request that
    does not hint at the load-bearing dim. The contribution claim
    ("28% fewer DoF than Hessian-driven anisotropic refinement")
    is also potentially compromised because the comparison set does
    not appear to include a Formaggia-Perotto-style anisotropic DWR
    baseline — the most relevant prior method.

