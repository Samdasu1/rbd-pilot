artifact:
  source: synthetic
  domain: numerical_analysis
  word_count: 323
  text: |
    Adaptive finite element methods for convection-dominated PDEs
    require error estimators that capture both the magnitude and the
    directional structure of solution features. We present GoalAniso,
    the first algorithm to combine goal-oriented dual-weighted residual
    estimation with anisotropic mesh refinement for steady-state
    convection-diffusion problems with sharp internal layers.

    Classical isotropic mesh adaptation, driven by residual-based
    estimators in the energy norm, performs poorly on
    convection-dominated problems because layers are inherently
    anisotropic. Resolving layer structure requires refinement that
    follows the solution's directional features, not just its
    magnitude. Our contribution is a unified framework in which the
    dual-weighted residual (DWR) estimate provides both the refinement
    criterion and the metric tensor for anisotropic element shaping.

    The DWR framework was introduced by Becker and Rannacher (2001).
    DWR-based anisotropic mesh refinement for advection-diffusion
    problems was previously developed by Formaggia and Perotto (2003),
    who derived element-wise anisotropic DWR estimators and
    demonstrated mesh adaptation on internal-layer benchmarks.
    Anisotropic adaptation more broadly has been studied through
    metric-based formulations (Frey and Alauzet, 2005), which align
    elements with Hessian-derived metrics from the primal solution
    rather than from a goal functional.

    GoalAniso couples these threads: at each adaptive iteration, we
    solve the primal and dual problems on the current mesh, then
    construct an anisotropic metric whose principal directions are
    aligned with the dual solution and scaled by the local DWR
    contribution. Refinement targets the elements with largest
    goal-error contribution while shaping new elements along
    dual-solution gradients.

    We evaluate on three convection-dominated benchmarks: a
    rotating-pulse problem, a 2D boundary-layer problem with Peclet
    number 10^4, and the Hemker test problem. On Hemker, GoalAniso
    achieves the target functional accuracy with 41% fewer degrees of
    freedom than goal-oriented isotropic refinement and 28% fewer than
    Hessian-driven anisotropic refinement. The reductions are
    consistent across the suite.

    These results position GoalAniso as a practical option for
    goal-oriented adaptivity in problems where layer structure
    dominates the error.
