acceptable_outputs_summary: |
  Identifies that the "first algorithm" claim in paragraph 1 is
  directly contradicted by the section's own citation to Formaggia
  and Perotto (2003), who already developed DWR-based anisotropic
  mesh refinement for advection-diffusion problems with internal
  layers. Suggests rewording the novelty claim to a defensible
  delta (e.g. a specific architectural or metric-construction
  difference relative to Formaggia-Perotto) and adding their method
  as a baseline in the empirical comparison, since the "28% fewer
  DoF" claim is otherwise compromised.

bad_outputs_summary: |
