engineered_flaws:
  R1.1: [F1.1.a]
  R1.2: [F1.2.c]
  notes: |
    The artifact admits two materially different load-bearing readings:

    Reading A — R1.1 dominant (thesis drift):
      Para 1 declares the central thesis as "role-specialized agent
      dialogue produces queries with higher execution accuracy than
      monolithic single-agent prompting." The evaluation paragraph
      supports exactly this claim. But the closing paragraph pivots:
      "DBChat's most durable contribution is therefore a method for
      automatically generating schema documentation." The contribution
      claim has slid from query-synthesis accuracy to documentation
      mining — two distinct artifacts with different evaluations and
      different baselines. A reader might reasonably argue that until
      the section commits to one thesis, no other revision is coherent.

    Reading B — R1.2 dominant (non-sequitur):
      The evaluation paragraph contains a load-bearing rhetorical
      "therefore" that does not follow: "Because the Cost Auditor
      consults the statistics view, queries that would otherwise
      trigger full-table scans are filtered out; therefore, DBChat's
      queries are also more readable to human DBAs." Cost-based plan
      filtering and human readability are independent properties; the
      readability rating (4.1/5) is being smuggled in as a downstream
      consequence of cost auditing without warrant. A reader might
      reasonably argue this is the load-bearing issue: the section's
      empirical story rests on a logical step that simply does not
      hold, and fixing the thesis without fixing this leaves the
      evaluation broken.

    Both readings are defensible; both flaws are real; rewriting under
    Reading A produces a different paper than rewriting under Reading B.
    A well-calibrated projection agent should set
    clarification_needed=true.

