artifact:
  source: synthetic
  domain: databases
  word_count: 295
  text: |
    We introduce DBChat, a multi-agent dialogue framework in which
    specialized LLM agents — a Schema Analyst, a Query Planner, and a
    Cost Auditor — collaborate to synthesize correct SQL queries for
    natural-language questions over enterprise relational databases. Our
    central thesis is that role-specialized agent dialogue produces
    queries with higher execution accuracy than monolithic single-agent
    prompting on schemas with more than fifty tables.

    The Schema Analyst inspects the catalog and emits a candidate set of
    relevant tables and join paths. The Query Planner consumes this set
    and proposes a draft SQL statement, which the Cost Auditor inspects
    against the database's statistics view to flag plans whose estimated
    cost exceeds a configurable threshold. Disagreements are resolved
    through up to three rounds of structured chat.

    We evaluate DBChat on the Spider 2.0 benchmark and on a private
    workload of 412 questions over a 73-table financial schema. On
    Spider 2.0, DBChat reaches 71.4% execution accuracy versus 64.2%
    for a single-agent baseline using the same underlying model. Because
    the Cost Auditor consults the statistics view, queries that would
    otherwise trigger full-table scans are filtered out; therefore,
    DBChat's queries are also more readable to human DBAs, who rated
    them 4.1/5 in a small user study.

    Looking beyond query synthesis, the dialogue traces themselves form
    a rich record of how a relational schema is actually understood by
    the system. We argue that DBChat's most durable contribution is
    therefore a method for automatically generating schema documentation:
    each agent's utterances about table semantics can be mined to produce
    per-table descriptions that DBAs can curate. We provide preliminary
    evidence that mined descriptions agree with human-written
    documentation on 68% of tables in our benchmark, suggesting that the
    framework's value extends well beyond the original synthesis goal
    and into living-documentation maintenance for legacy databases.
