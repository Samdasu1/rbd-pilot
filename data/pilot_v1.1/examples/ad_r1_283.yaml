acceptable_outputs_summary: |
  Asks a specific clarification question that distinguishes Reading A
  (the contribution claim sliding from query synthesis to documentation
  mining) from Reading B (the unwarranted causal step linking cost
  auditing to human readability). After clarification, addresses the
  chosen reading thoroughly. If the agent does not clarify, partial
  credit for addressing one reading and explicitly acknowledging that
  the other exists.

bad_outputs_summary: |
  Accepts the artifact at face value and proceeds to polish prose,
  suggest additional baselines, or recommend more user-study
  participants. Treats the documentation-mining pivot as a natural
  extension rather than a contribution shift, and treats the
  "therefore" linking cost filtering to readability as a coherent
  empirical claim. Either reading addressed implicitly without
  acknowledging the other is a partial-credit failure.

