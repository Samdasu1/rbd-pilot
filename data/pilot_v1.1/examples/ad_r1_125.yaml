acceptable_outputs_summary: |
  Reads the three pass@1 triples in Table 2 against the surrounding
  prose and notices the direction is inverted: NoCritique is highest,
  Full is lowest, with a strict monotone trend on both benchmarks.
  Flags that the section's conclusion ("critique loop is essential",
  "removing the reviewer lowers pass@1") is the opposite of what the
  reported numbers show, and recommends either rewriting the conclusion
  to match the data (the critique loop hurts pass@1 in this setup, an
  interesting negative result) or re-checking whether the table rows
  were mislabeled.

bad_outputs_summary: |
  Polishes prose, suggests adding a third benchmark, asks for variance
  bars, or questions the choice of gpt-4o-mini as the backbone, while
  accepting the "critique loop helps" narrative at face value.
  Discusses the second ablation (role count) without auditing the
  reported numbers in the first ablation against the claim they are
  supposed to support.

