engineered_flaws:
  R1.3: [F1.3.c]
  notes: |
    Inverted reading of the in-section table. The reported pass@1 numbers
    in paragraph 3 are:
      - DevSwarm-Full      (3-round critique): 71.4 / 64.8
      - DevSwarm-Single    (1-round critique): 74.2 / 67.1
      - DevSwarm-NoCritique (no reviewer):     76.8 / 69.5
    The numbers are strictly monotone in the OPPOSITE direction of the
    prose claim: removing the reviewer gives the HIGHEST pass@1 on both
    benchmarks (76.8 / 69.5), and adding more critique rounds
    monotonically DECREASES pass@1 (76.8 → 74.2 → 71.4 on HumanEval+;
    69.5 → 67.1 → 64.8 on MBPP-Plus). Yet the section asserts "removing
    the reviewer agent lowers pass@1 substantially" and "the full 3-round
    loop delivers the strongest results on both benchmarks," and the
    conclusion paragraph reaffirms that "removing either component
    meaningfully degrades end-to-end pass@1." This is F1.3.c (inverted
    reading) — the prose interprets the table in the wrong direction, so
    the section's load-bearing ablation conclusion is the reverse of what
    the evidence shows. Detection requires only careful reading of three
    numeric triples against the surrounding claim; no canonical-result
    recall is needed (low gating). The T02 delegation "Review this
    section." is generic and does not name R1.3.

