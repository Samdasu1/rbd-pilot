artifact:
  source: synthetic
  domain: nlp
  word_count: 302
  text: |
    We ablate the central design choices in DevSwarm, a multi-agent
    framework in which four LLM-based roles (architect, coder, reviewer,
    tester) cooperate over a shared chat log to produce executable Python
    programs. All ablations are evaluated on HumanEval+ and MBPP-Plus
    using pass@1 with greedy decoding and gpt-4o-mini as the underlying
    backbone.

    The first ablation studies the structured critique loop, in which the
    reviewer agent issues line-level comments and the coder revises
    before the tester is invoked. We compare three configurations:
    (i) DevSwarm-Full, with a 3-round critique loop; (ii) DevSwarm-Single,
    with a single critique round; and (iii) DevSwarm-NoCritique, in which
    the reviewer is removed and the coder's first draft is sent directly
    to the tester.

    Table 2 reports pass@1: DevSwarm-Full reaches 71.4 / 64.8 on
    HumanEval+ / MBPP-Plus, DevSwarm-Single reaches 74.2 / 67.1, and
    DevSwarm-NoCritique reaches 76.8 / 69.5. These numbers confirm the
    benefit of the structured critique loop: removing the reviewer agent
    lowers pass@1 substantially, while the full 3-round loop delivers the
    strongest results on both benchmarks. We attribute the gain to the
    reviewer's ability to catch off-by-one errors and edge-case bugs that
    the coder consistently misses on a first pass.

    The second ablation varies the number of communicating roles. Adding
    the tester role on top of architect+coder+reviewer yields a 2.1-point
    improvement on HumanEval+ over the three-role variant, consistent
    with the view that broader role coverage catches failure modes that
    any single role would miss.

    We therefore conclude that both the structured critique loop and the
    four-role configuration are essential to DevSwarm's performance, and
    that removing either component meaningfully degrades end-to-end
    pass@1. These findings support the central claim that disciplined
    multi-agent communication, rather than additional inference compute
    alone, drives gains on program-synthesis benchmarks.
