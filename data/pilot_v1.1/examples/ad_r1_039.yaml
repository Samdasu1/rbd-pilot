engineered_flaws:
  R1.3: [F1.3.a]
  R1.6: [F1.6.a, F1.6.b]
  notes: |
    Modified-real from paper 4 discussion limitations. Two compound
    issues:

    R1.6 prose flaws: 50-70 word run-on sentences in every paragraph,
    hedging cascade ("we believe", "should be informative", "might
    explore", "we acknowledge"), choppy chained "and... and... which..."
    constructions.

    R1.3 overgeneralization (visible despite the prose mess): para 3
    claims "across all evaluated configurations the integrated
    coupling preserves commitment with perfect consistency." This is
    too strong — the original study reports >99.6%, which is high but
    not "perfect consistency." Para 3 also asserts "no other strategy
    achieves both commitment and arbitrage value" — but the original
    paper does report Predictive LP achieves moderate commitment with
    some arbitrage; the dichotomy is overstated.

    Both flaws compound: the prose obscures the overgeneralization;
    fixing prose alone leaves the inflated claims; fixing claims alone
    leaves the unreadable text.

