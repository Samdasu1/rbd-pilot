artifact:
  source: modified-real
  domain: power_systems_v2g
  word_count: 216
  text: |
    Our comparison spans pure reinforcement learning approaches and an
    engineered model-based stack and we evaluate two hybrid coupling
    schemes in this work which are post-hoc coupling applied after
    training and integrated coupling embedded in the optimizer
    objective. The integrated form which we realize within an LP
    optimizer is the form that we believe most clearly demonstrates
    the architectural requirement for commitment-preserving inter-window
    coupling in V2G aggregation systems operating under rolling
    re-planning protocols.

    Battery degradation costs and complete market settlement effects
    are excluded from the analysis presented in this paper which means
    that the cost figures we report should be interpreted as
    dispatch-level energy settlement rather than as full profitability
    estimates although we believe the relative cost rankings across
    strategies should be informative.

    Whether end-to-end reinforcement learning architectures could
    internalize the inter-window coupling as a differentiable
    constraint while preserving arbitrage capability remains an open
    question that future work might explore through alternative
    constraint formulations. Across all evaluated configurations the
    integrated coupling preserves commitment with perfect consistency
    while no other strategy in our evaluation set including post-hoc
    coupling achieves both commitment and arbitrage value.

    We acknowledge that PPO commitment weight and constrained MDP
    learning rate were not exhaustively tuned in our study though
    gradient dominance arguments suggest that soft-penalty remedies
    are structurally limited regardless of further hyperparameter
    refinement.
  source_provenance: paper_4_isgt_discussion_limitations_modified

