engineered_flaws:
  R1.4: [F1.4.a]
  notes: |
    Three bald "first" claims, none of which are contrasted against any
    named prior work: "first agent-based simulator that captures
    heterogeneous owner behavior in V2G dispatch," "first to model the
    discharge decision as a per-agent utility tradeoff," and "first study
    to demonstrate scalable per-agent V2G dispatch on a realistic
    distribution feeder." The only citation in the section is to a
    battery-degradation model (Wang et al.), which is incidental.
    Agent-based simulation of V2G with heterogeneous owners is a
    well-trodden area (NetLogo / GAMA / AnyLogic studies, heterogeneous-
    agent EV adoption models, behavioral V2G participation studies), and
    range-anxiety utility terms have appeared repeatedly in EV charging
    literature. Detection: a reader does not need to recall specific
    prior work — they only need to notice that three "first" claims are
    asserted with zero comparative citations and a hand-wave that
    "previously" V2G was studied as a homogeneous fleet, with no source
    given. Low knowledge gating. The T08 delegation "Clean this up." is
    a generic polish request that does not point at novelty.

