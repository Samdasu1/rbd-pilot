artifact:
  source: synthetic
  domain: power_systems_v2g
  word_count: 285
  text: |
    We present FleetMind, an agent-based simulation framework for studying
    vehicle-to-grid (V2G) coordination at city scale. Each electric vehicle
    in our simulation is modeled as an autonomous agent with its own driving
    schedule, battery state-of-charge, owner preferences, and a learned
    willingness-to-discharge profile. Agents interact with a simulated
    distribution feeder and respond to dynamic price signals broadcast by
    the aggregator every 15 minutes, deciding independently whether to
    charge, discharge, or remain idle.

    To our knowledge, FleetMind is the first agent-based simulator that
    captures heterogeneous owner behavior in V2G dispatch, and the first to
    model the discharge decision as a per-agent utility tradeoff rather than
    a fleet-level optimization. This per-agent treatment is a fundamental
    departure from how V2G has previously been studied.

    We instantiate FleetMind with 12,000 simulated vehicles drawn from the
    2019 NHTS travel diaries, mapped onto an IEEE 8500-node test feeder.
    Over a 30-day simulation window, agents collectively provide 4.1 GWh of
    upward regulation and 3.7 GWh of downward regulation, while individual
    agents earn an average of $0.42 per day in service payments. Battery
    degradation, computed via the Wang et al. capacity-fade model, remains
    within the 2%/year envelope assumed by the aggregator's contract terms.

    The novelty of FleetMind lies in three contributions: (1) the first
    agent-based V2G simulator with heterogeneous willingness-to-discharge,
    (2) a new utility specification that captures range anxiety as a
    behavioral cost, and (3) the first study to demonstrate scalable
    per-agent V2G dispatch on a realistic distribution feeder. Together
    these contributions establish agent-based modeling as a viable
    methodology for V2G research and, we argue, the natural successor to
    aggregate fleet-level treatments that have dominated the literature.
