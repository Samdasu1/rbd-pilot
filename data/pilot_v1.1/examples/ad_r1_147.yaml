acceptable_outputs_summary: |
  Flags the three uncited "first" claims as unsupported and notes that
  agent-based V2G simulation with heterogeneous owners is an established
  area that the section must contrast itself against. Suggests naming
  nearest-neighbor prior work (e.g. existing agent-based EV/V2G
  simulators, behavioral V2G participation models, range-anxiety utility
  formulations) and rewording the contribution to a defensible delta
  rather than sweeping primacy claims.

