artifact:
  source: synthetic
  domain: astronomy
  word_count: 257
  text: |
    In this section we describe the methodology that we developed for
    analyzing the photometric transit data that we obtained from the
    multiple telescope facilities that participated in our observation
    campaign. The pipeline that we built takes as input the raw photometric
    time series and produces as output the estimated planet parameters
    that we then use for downstream characterization studies.

    The first stage of the pipeline performs detrending and outlier
    removal which is necessary because the raw photometric data contains
    a variety of systematic effects that arise from instrumental drift
    and atmospheric variability that we needed to remove before any
    meaningful transit analysis could be performed. The detrending step
    uses a standard Gaussian process regression approach with kernels
    that we selected based on prior experience with similar datasets.

    Following the detrending we apply a transit-fitting model that
    includes parameters for planet radius and orbital period and limb
    darkening coefficients and we use a Markov chain Monte Carlo sampler
    to obtain posterior distributions over these parameters and through
    this process we recover well-constrained estimates with appropriate
    uncertainty quantification on each parameter of interest.

    We benchmarked the pipeline on a sample of 47 known transiting
    exoplanets with previously published parameters and found that our
    pipeline recovers the published values within their reported error
    bars in approximately 89% of cases which we consider to be reasonable
    agreement given the heterogeneity of the input data.

    Furthermore the pipeline appears to be relatively robust to variations
    in observation cadence although we acknowledge that more comprehensive
    evaluation would strengthen this aspect of our methodology.
