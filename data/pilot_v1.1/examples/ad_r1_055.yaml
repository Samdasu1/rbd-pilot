delegation: "Polish this."

artifact:
  source: synthetic
  domain: robotics
  word_count: 268
  text: |
    In this section we describe the manipulation policy that we trained for
    the bin-picking task and we evaluated it on a Franka Panda arm using a
    suction gripper and we observed that the policy appears to be relatively
    robust across the object categories that we considered which include
    small rigid items as well as a few semi-deformable items that we added
    to the test set in order to broaden coverage somewhat.

    The training procedure involves behavior cloning from approximately 200
    teleoperated demonstrations that we collected over a period of two weeks
    and during this collection process we noticed that the operator's
    strategy seems to drift slightly across sessions which we believe may
    have introduced a modest amount of variability into the training
    distribution although we have not formally quantified this aspect.

    At evaluation time the policy achieves what we consider to be a
    reasonably acceptable success rate of around 78 percent on novel object
    poses and we note that this number could potentially be somewhat
    optimistic since the test poses are drawn from a distribution that may
    be relatively similar to the training distribution in ways that we have
    not exhaustively characterized.

    Furthermore we tracked the end-effector trajectories during rollouts and
    they appear to be reasonably smooth and the failure modes that we
    observed seem to mostly involve grasps on the smaller items where the
    suction seal possibly fails to form reliably and we suspect that this
    could potentially be addressed by tuning the approach vector although we
    leave this to future work and we believe the current results are
    nonetheless suggestive of the policy's general utility.
  source_provenance: null

