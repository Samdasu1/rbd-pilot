artifact:
  source: synthetic
  domain: causal_inference
  word_count: 322
  text: |
    Causal effect identification — determining whether and how a target
    estimand can be computed from observational data — is a central task
    in applied causal inference. While Pearl's do-calculus and the ID
    algorithm provide a complete answer in principle, applying them to
    real studies requires translating informal descriptions into
    graphical models and reasoning carefully about adjustment sets,
    mediators, and instruments.

    We introduce CausalDebate, the first multi-agent LLM framework for
    automated causal effect identification from natural-language study
    descriptions. CausalDebate orchestrates three specialized agents —
    a confounder enumerator, an identification strategist, and a critic
    — that exchange structured arguments to produce a valid back-door,
    front-door, or instrumental-variable adjustment, or a proof of
    non-identifiability, for a target average treatment effect.

    Recent work has begun to apply LLMs to causal reasoning. Kıcıman
    et al. (2023) showed that GPT-4 can recover plausible causal graphs
    from variable names alone, with accuracy exceeding several
    constraint-based baselines on the Tübingen pairs. Vashishtha et al.
    (2023) extended this to a multi-agent setting in which separate LLM
    agents propose and critique pairwise causal directions. Most directly
    relevant, Long et al. (2023) proposed a multi-agent debate protocol
    for the full identification task, evaluated on a curated set of
    textbook graphs.

    CausalDebate differs from these prior efforts in two ways. First,
    our agents reason over partially specified graphs in which some
    confounders are latent, which neither Kıcıman et al. nor Vashishtha
    et al. handle directly. Second, we evaluate at substantially larger
    scale: 240 identification problems versus the dozen-graph evaluations
    typical of prior work.

    On our benchmark, drawn from Pearl (2009) and Hernán & Robins (2020),
    CausalDebate returns a correct adjustment in 78% of cases, compared
    to 54% for a single-agent GPT-4 baseline and 61% for chain-of-thought
    prompting. We position CausalDebate as the first multi-agent system
    to combine LLM reasoning with formal identification machinery, taking
    a concrete step toward automated causal analysis assistants.
