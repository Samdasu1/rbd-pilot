acceptable_outputs_summary: |
  Identifies that the comparison set consists only of trivially weak
  policies (uniform-random and always-frontier) and that no actual
  learned-router prior work is benchmarked. Names concrete missing
  comparisons such as FrugalGPT-style cascading, HybridLLM, RouteLLM,
  or the RouterBench reference routers. Recommends rewording the
  contribution to a defensible delta against real prior systems rather
  than against random routing.

bad_outputs_summary: |
  Polishes the prose, suggests adding more datasets or pool sizes,
  questions the GPT-4-judge methodology, or asks for confidence
  intervals on the quality scores — without flagging that the
  baselines are not real prior methods. Praises the 35% improvement
  as a strong result and accepts the "substantial advance" framing
  at face value.

