artifact:
  source: synthetic
  domain: nlp
  word_count: 305
  text: |
    Selecting which large language model to invoke for a given query is a
    central problem in cost-aware NLP serving. We present LaneRouter, a
    learned routing system that predicts, for a given prompt, which of K
    candidate models will produce a satisfactory response, enabling
    practitioners to avoid invoking expensive frontier models when a
    cheaper alternative suffices.

    LaneRouter trains a lightweight DeBERTa-base classifier on a corpus of
    (prompt, model, quality_label) triples, where the quality label is
    derived from a GPT-4 judge. At inference, the classifier emits a
    per-model success probability, and the cheapest model whose probability
    exceeds a configurable threshold is selected. We study three pool
    sizes (K=2, K=4, K=7) drawn from a mixture of open-weight (Llama-3-8B,
    Mistral-7B-Instruct) and proprietary (GPT-3.5-turbo, GPT-4, Claude-Haiku)
    models.

    To evaluate LaneRouter, we benchmark it against two baselines: (i) a
    uniform-random routing policy that selects models with equal
    probability, and (ii) a "frontier-only" policy that always dispatches
    the query to GPT-4. On our held-out test set of 8,000 prompts spanning
    MMLU, GSM8K, and a custom open-domain QA slice, LaneRouter achieves a
    quality score of 0.84 at 41% of the frontier-only cost, while random
    routing achieves 0.62 at 55% of the frontier-only cost. The gap is
    consistent across the three pool sizes, indicating that the routing
    signal generalizes across model mixtures.

    This represents a substantial advance over prior routing approaches:
    a 35% absolute quality improvement over uniform selection at strictly
    lower cost. We argue this establishes LaneRouter as a strong solution
    to the multi-LLM routing problem and a meaningful step beyond existing
    baselines. Our ablations confirm the gains stem primarily from the
    per-prompt quality classifier rather than the threshold-tuning
    procedure, and we expect LaneRouter to lower the barrier for
    cost-efficient mixed-model deployment in production NLP stacks.
