engineered_flaws:
  R1.4: [F1.4.c]
  notes: |
    Rhetorical novelty delta. The section frames LaneRouter as "a
    substantial advance over prior routing approaches" and "a meaningful
    step beyond existing baselines," but the only two baselines are
    uniform-random routing and an always-GPT-4 policy — neither is a
    serious prior method. The actual prior work in cost-aware multi-LLM
    routing (FrugalGPT, HybridLLM, RouteLLM, the RouterBench reference
    routers, cascade-based selection methods) is absent from the
    comparison. The "35% absolute improvement over uniform selection" is
    arithmetically real but rhetorically empty: random routing is not a
    method anyone proposes. Detection requires moderate recall — a reader
    needs to know that the multi-LLM routing literature contains named
    learned-router baselines, but not the precise numbers from any one
    paper. The conceptual setup, classifier, and experimental protocol
    are internally coherent; only the novelty positioning is broken.
    Delegation T05 "Check this." is maximally generic and does not
    signal R1.4.

