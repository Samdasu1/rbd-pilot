artifact:
  source: synthetic
  domain: generative_ml
  word_count: 207
  text: |
    We propose FlexVAE, a variational autoencoder framework for unsupervised
    disentanglement that operates without imposing assumptions on the
    smoothness or geometry of the data manifold. FlexVAE learns latent
    factors of variation by minimizing a modified ELBO that includes a
    divergence term between the aggregated posterior and a learnable
    factorized prior. Crucially, FlexVAE makes no assumptions about the
    Lipschitz continuity of the generator network or about the geometric
    structure of the latent space, distinguishing it from prior approaches
    that impose strong inductive biases.

    We prove that FlexVAE recovers ground-truth factors of variation with
    high probability under standard regularity conditions. The proof
    proceeds by bounding the gradient of the divergence term by a Lipschitz
    constant of the generator, which we then use to invoke a stochastic
    approximation argument. Combined with the smoothness of the encoder
    network, this yields convergence in O(1/sqrt(T)) iterations.

    Our experiments on dSprites, 3DShapes, and MPI3D-Real demonstrate that
    FlexVAE outperforms FactorVAE by 8% and beta-TCVAE by 12% on the
    disentanglement metric proposed by Locatello et al.

    A key advantage of our approach is that, unlike methods requiring strong
    inductive biases on the latent space, FlexVAE applies broadly to
    natural image and 3D data without architectural modification. This
    generality is what enables the strong empirical results we report.
