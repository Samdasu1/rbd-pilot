engineered_flaws:
  R1.1: [F1.1.c]
  notes: |
    Misframed conceptual object. Para 1 names the contribution
    "SpectralPINN, a physics-informed neural network" and promises a
    surrogate that "respects the governing physics." But the actual training
    objective described in para 2 is purely MSE between predictions and DNS
    snapshot ground truth at sampled collocation points — there is no PDE
    residual term, no boundary/initial-condition penalty, and no enforcement
    of the Navier–Stokes equations in the loss. What is described is a
    coordinate-based regression network (a SIREN-style implicit
    representation) trained on simulation data. Para 3 attributes the
    "spectral" / physics-informed framing to sinusoidal activations, but
    this is an architectural choice for spectral bias mitigation, not a
    physics constraint. The closing claim ("embedding physical priors into
    the network") is therefore unsupported by the method described. The
    contribution claim (PINN) and the technical content (data-driven
    coordinate MLP) name two different conceptual objects. Detection
    requires careful reading of the loss specification; no recall of
    canonical PINN papers is needed because the section itself describes
    the objective explicitly. The delegation T02 "Review this section" is
    generic and does not single out the framing dimension.

