artifact:
  source: synthetic
  domain: physics_informed_ml
  word_count: 287
  text: |
    We introduce SpectralPINN, a physics-informed neural network for solving
    the forced Navier–Stokes equations on irregular domains arising in
    turbulent boundary-layer simulation. Mesh-based solvers struggle with
    the multi-scale structure of these flows, motivating a learned surrogate
    that respects the governing physics while remaining tractable at
    inference time.

    Our architecture processes (x, y, t) coordinates through a stack of
    fully connected layers with sinusoidal activations, mapping to predicted
    velocity components (u, v) and pressure p. We train SpectralPINN on a
    dataset of 12,000 high-fidelity DNS snapshots spanning three
    Reynolds-number regimes (Re ∈ {180, 395, 590}). The training objective
    is the mean squared error between the network's predictions and the
    snapshot ground truth, averaged over collocation points sampled
    uniformly in the spatiotemporal domain. We optimize with AdamW under a
    cosine learning-rate schedule for 400 epochs.

    A key advantage of our spectral approach is the use of sinusoidal
    activations, which provide smooth derivatives and allow the network to
    represent oscillatory solutions efficiently. We initialize first-layer
    frequencies following the SIREN scheme to mitigate the spectral bias
    commonly observed in ReLU networks.

    On held-out snapshots, SpectralPINN achieves a relative L2 error of
    4.2% on velocity and 6.7% on pressure, compared with 7.8% and 11.3%
    for a comparably sized DeepONet baseline trained on the same data.
    Inference is roughly 40× faster than the DNS solver. Ablating the
    sinusoidal activations in favor of tanh raises the velocity error to
    9.1%, indicating that activation choice is the principal driver of
    accuracy.

    We argue that this demonstrates the value of embedding physical priors
    into the network, and we expect similar gains across other PDE-governed
    systems where the governing equations encode strong inductive biases.
