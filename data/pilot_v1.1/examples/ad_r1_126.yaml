acceptable_outputs_summary: |
  Audits the "full breadth of statically-typed functional programming"
  claim against the benchmark's actual type fragment and identifies that
  the evaluation excludes let-polymorphism, higher-rank types, type
  classes, GADTs, modules, and higher-order functions — the defining
  features of production Haskell/OCaml. Recommends restricting the
  contribution claim to "monomorphic first-order programs over a fixed
  base-type fragment" or expanding the benchmark to cover canonical
  typed-FP features before retaining the broader claim.

bad_outputs_summary: |
  Polishes the prose, tightens the agent-list formatting, suggests
  adding more base agents or a stronger reward model, or accepts the
  "full breadth of statically-typed FP" framing and proposes peripheral
  ablations of the reward weights. Does not notice that the benchmark's
  type fragment cannot support the breadth claim, and does not invoke
  canonical typed-FP features to test it.

