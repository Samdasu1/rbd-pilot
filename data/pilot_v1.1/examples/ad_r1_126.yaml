artifact:
  source: synthetic
  domain: programming_languages
  word_count: 358
  text: |
    We introduce CandidatePicker, a selection-based aggregator for
    multi-agent LLM program synthesis that, in contrast to prior
    synthesis-based aggregation, retains the strongest individual
    candidate rather than blending all proposals into a single output.
    We show that CandidatePicker produces type-correct programs across
    the full breadth of statically-typed functional programming, matching
    or exceeding monolithic synthesis baselines on every task category
    we evaluate.

    Our experimental setup follows the standard multi-agent pipeline:
    five base agents (GPT-4o, Claude-3.5, Llama-3.1-405B, DeepSeek-V2,
    and Mixtral-8x22B) each produce one candidate; CandidatePicker then
    ranks candidates by a learned reward combining a type-checker pass
    rate with a hidden-test pass rate. We evaluate on a curated benchmark
    of 1,500 tasks drawn from HumanEval, MBPP, and a hand-authored OCaml
    suite. Each task specifies an input/output type signature and a small
    reference test set. Tasks are first-order; argument and return types
    are drawn from the fixed set {Int, Bool, String, List<Int>,
    List<String>}. Recursion is permitted, and helper functions may be
    introduced provided they too inhabit this type fragment.

    Across all 1,500 tasks, CandidatePicker achieves a type-correctness
    rate of 94.7% and a functional-correctness rate of 81.3%, compared
    to 88.1% / 71.0% for the best single agent and 83.4% / 64.2% for the
    synthesis-based aggregator. Gains are largest on tasks involving
    list manipulation, where selection avoids the "averaged-out"
    recursion patterns that synthesis aggregation tends to produce.
    Per-agent ablations confirm that no single base agent dominates:
    each of the five contributes the winning candidate on at least 14%
    of tasks.

    These results establish selection-based aggregation as a robust
    strategy for typed functional program synthesis, and we expect the
    approach to transfer directly to production functional codebases
    such as those maintained in the Haskell and OCaml ecosystems. The
    principal contribution is a demonstration that multi-agent pipelines
    can produce type-correct programs across the full breadth of
    statically-typed functional programming, eliminating the previously
    reported tradeoff between candidate diversity and aggregation
    fidelity. We release CandidatePicker, the benchmark, and the trained
    reward model.
