engineered_flaws:
  R1.3: [F1.3.a]
  notes: |
    Overgeneralization. Para 1 and the closing paragraph both claim the
    method produces type-correct programs "across the full breadth of
    statically-typed functional programming" and will "transfer directly
    to production functional codebases such as those maintained in the
    Haskell and OCaml ecosystems." The benchmark described in para 2
    deliberately restricts the type fragment to {Int, Bool, String,
    List<Int>, List<String>} and to first-order functions only.

    Detecting that this gap is load-bearing requires recall of canonical
    PL work on what "statically-typed functional programming" actually
    includes:
      - Hindley-Milner let-polymorphism (Damas-Milner 1982) — the
        baseline for ML/Haskell type inference; absent here (all types
        monomorphic).
      - Higher-rank polymorphism (Peyton Jones et al., "Practical type
        inference for arbitrary-rank types") — pervasive in production
        Haskell; absent.
      - Type classes (Wadler & Blott 1989) and their elaborations —
        the defining feature of modern Haskell; absent.
      - Algebraic data types beyond List, GADTs, existentials, modules
        and functors (canonical OCaml) — absent.
      - Higher-order functions (the defining feature of FP since
        Landin's ISWIM) — explicitly excluded by the "first-order"
        restriction.

    The actual scope demonstrated is "monomorphic first-order programs
    over a five-type fragment with list operations." The "full breadth
    of statically-typed FP" and "production Haskell/OCaml" claims are
    overgeneralizations of a narrow evaluation; correcting them changes
    the contribution claim materially. Other dimensions (structure,
    framing, methodology description) are intact.

    Delegation T08 ("Clean this up.") is maximally generic and does not
    point to R1.3.

