artifact:
  source: synthetic
  domain: optimization_theory
  word_count: 298
  text: |
    Applying the accelerated proximal scheme to the smoothed dual
    objective yields a convergence rate of O(L_μ · ε^{-1/2}) iterations
    to reach ε-suboptimality, where L_μ = ρ / μ is the Lipschitz modulus
    of the gradient of the Moreau envelope of the inner maximum. This
    matches Nesterov's optimal first-order rate for smooth convex
    composite minimization, with the constant ρ depending only on the
    radius of the ambiguity ball and the per-sample loss range.

    The required proximal step decomposes coordinate-wise. For the
    indicator I_{A_ρ} of the KL-ball, the proximal operator admits a
    closed-form expression via Lagrangian rescaling: prox_{ηI}(z) =
    exp(z − β(z)·1), where β(z) is the unique scalar enforcing the
    radius constraint. We solve for β(z) by a one-dimensional bisection
    requiring O(log(1/δ)) inner iterations.

    We formulate distributionally robust selective prediction as a
    saddle-point problem. The learner chooses a predictor h ∈ H and an
    abstention policy τ : X → [0,1]; an adversary chooses a distribution
    Q from a KL-ball A_ρ centered on the empirical distribution. The
    objective is the expected selective risk subject to coverage at
    least 1 − α.

    To express the saddle problem as a tractable convex program we
    invoke strong duality. Since A_ρ has nonempty relative interior
    (Slater's condition) for every ρ > 0, the order of inf and sup may
    be exchanged. The resulting outer minimization is jointly convex in
    (h, τ, λ), where λ is the multiplier on the coverage constraint.

    The exchanged dual contains a pointwise maximum over Q ∈ A_ρ which
    is non-smooth. We apply Nesterov's smoothing with parameter μ > 0,
    replacing the inner max by its Moreau envelope. The smoothed
    objective then has Lipschitz-continuous gradient with modulus
    L_μ = ρ/μ at the cost of a uniform bias of order μ; choosing
    μ = ε/ρ balances bias against the iteration count above.
