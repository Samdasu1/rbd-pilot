engineered_flaws:
  R1.5: [F1.5.c]
  notes: |
    Out-of-order narrative. The section presents results in reverse
    dependency order:
      (1) final convergence rate (uses L_μ, smoothing, dual)
      (2) proximal operator for KL-ball indicator (uses dual)
      (3) primal saddle-point formulation (the foundational object)
      (4) strong-duality reformulation via Slater's condition
      (5) Nesterov smoothing of the dual's non-smooth max
    The canonical development in convex optimization is
    formulation → dualization (with Slater) → smoothing (Nesterov) →
    accelerated proximal method → rate, i.e. (3) → (4) → (5) →
    proximal-step (2) → (1). As written, paragraph 1 quotes a rate in
    terms of L_μ and "the smoothed dual objective" three paragraphs
    before either is defined; paragraph 2 invokes a closed-form prox on
    a KL-ball that has not yet been introduced as a constraint set.
    Detection requires recall of canonical optimization machinery
    (Slater condition as the prerequisite for strong duality;
    Nesterov's smoothing as the step that produces L_μ = ρ/μ; Moreau
    envelope as the object whose gradient Lipschitz constant the rate
    depends on) — without that knowledge the section reads as a series
    of self-contained algorithmic claims. A surface read can mistake
    paragraph 1 for an executive-summary contribution statement; an
    expert sees that quantities are referenced before they exist.
    Fixing the section requires reordering paragraphs to (3, 4, 5, 2, 1)
    so that each result follows its prerequisites; sentence-level edits
    cannot resolve the forward references.

