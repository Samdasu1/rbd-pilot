  notes: |
    The contribution claim — a DBA-targeted training protocol that
    raises expert detection accuracy from chance to 71% on production
    schemas, plus the first calibration of expert detection on a
    real-world OLTP workload — appears only in the FINAL paragraph,
    after four paragraphs of related work, study setup, analysis, and
    results. A reader entering the section does not learn what the
    paper contributes until paragraph 5 of 5. The natural ordering for
    a contribution-style write-up would be:
      contribution claim (1) → related context (2) → method (3) → analysis (4) → result (5)
    The current ordering is:
      RW (1) → study setup (2) → analysis (3) → result (4) → contribution (5)
    Subtle because each paragraph reads cleanly on its own and the
    section is internally coherent if read linearly to the end. The
    methodology is sound, citations are plausible, statistics are
    consistent, prose is intact — only the contribution placement is
    flawed, requiring a section-level reorder rather than sentence
    polish. Delegation T05 ("Check this.") is maximally generic and
    does not leak the load-bearing dim.

