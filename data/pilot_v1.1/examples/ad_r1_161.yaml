artifact:
  source: synthetic
  domain: databases
  word_count: 287
  text: |
    Text-to-SQL benchmarks have historically relied on execution-match
    accuracy as the primary evaluation signal, with the Spider and BIRD
    suites establishing this convention. More recent work has supplemented
    execution match with human ratings of query naturalness and
    maintainability — Patel et al. recruited DBAs to score queries on a
    five-point Likert scale, and Ramirez and Choi reported that
    inter-annotator agreement on naturalness ratings was only moderate
    (κ ≈ 0.41) when raters were not trained on the target schema.

    Building on this line of work, we ran a mixed-design study with 48
    professional database administrators recruited from three enterprise
    organizations. Each DBA was shown 60 SQL query pairs drawn from a
    held-out subset of a production OLTP schema. In each pair, one query
    was authored by an experienced DBA from the same organization and the
    other was generated by GPT-4 conditioned on the same natural-language
    prompt. DBAs were asked to identify which query was machine-generated.

    We fit a mixed-effects logistic regression with rater-level random
    intercepts and query-complexity fixed effects, treating
    correctly-identified-machine as the binary outcome.

    Without any training, DBAs identified the machine-generated query at
    52.8% accuracy (95% CI: 49.1–56.5), statistically indistinguishable
    from chance. After a 20-minute training intervention focused on
    JOIN-ordering idioms and predicate-pushdown patterns characteristic
    of GPT-4 output, accuracy rose to 71.4% (95% CI: 67.9–74.8), a
    significant improvement (p < 0.001).

    The contribution of this section, accordingly, is a brief
    DBA-targeted training protocol that lifts expert ability to detect
    LLM-generated SQL from chance to 71% on production schemas, together
    with the first calibration of expert detection accuracy on a
    real-world OLTP workload.
