engineered_flaws:
  R1.1: [F1.1.c]
  R1.2: [F1.2.b]
  notes: |
    Two compound issues:

    R1.1 — conceptual object misframing. Para 1 names the contribution
    as a "lock-free concurrent queue" with "wait-free enqueue." Para 2
    describes the actual algorithm: "acquires a mutex on the tail
    pointer." A mutex-based queue is by definition NOT lock-free
    (lock-free means no mutex / no thread-blocking primitive). The
    contribution claim and the algorithm description are
    fundamentally inconsistent on the conceptual object.

    R1.2 — internal logical contradiction. Para 4 claims "no memory
    fences or atomic compare-and-swap instructions are required," but
    pthread mutex acquire/release inherently involves memory fences
    (mutexes provide their ordering via fences). The "no fences"
    claim contradicts the use of mutexes from para 2.

    Combined: the section is internally inconsistent in two ways that
    interact — the wrong conceptual frame (lock-free vs lock-based)
    and the wrong technical claim (no fences vs mutex-based ordering).
    Detection: a reader who knows what "lock-free" means at the term
    level catches both — but the contradiction is visible in the
    section's own text (low gating: no canonical paper recall needed,
    just understanding of standard concurrency terminology).

