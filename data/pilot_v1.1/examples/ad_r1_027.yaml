acceptable_outputs_summary: |
  Names both: (1) the "lock-free" framing contradicts the mutex-based
  algorithm; (2) the "no memory fences" claim contradicts pthread
  mutex usage. Suggests rewording either to (a) actually present a
  CAS-based lock-free algorithm, or (b) drop the "lock-free" /
  "no fences" framing and present as a high-performance mutex-based
  queue with appropriate positioning.

bad_outputs_summary: |
  Polishes prose, suggests more thread counts, or strengthens
  experimental analysis. Accepts both the "lock-free" framing and the
  mutex-based implementation as compatible. Adds concurrent-data-
  structures citations without flagging the conceptual mismatch.

