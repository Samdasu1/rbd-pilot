artifact:
  source: synthetic
  domain: physics_informed_ml
  word_count: 348
  text: |
    We introduce CandidateSelectPINN, a framework for resolving disagreement
    among ensembles of physics-informed neural networks (PINNs) trained on
    parametric PDEs. Independent PINNs initialized with different seeds
    routinely converge to distinct local minima of the residual loss,
    producing materially different solution surrogates over the same
    parameter sweep. Existing practice averages these candidates pointwise,
    which we argue forfeits the structural information embedded in any
    single high-quality candidate. Our central contribution is to show
    that a learned selection mechanism — which routes each query point to
    one ensemble member rather than blending all of them — strictly
    dominates synthesis-based aggregation across both stiff and non-stiff
    parametric regimes, and recovers the operator's true solution even
    when no single ensemble member is uniformly best across the parameter
    domain.

    The selection module is a small MLP that takes the query coordinate
    (x, t, μ) and the candidate residual norms and outputs a soft
    assignment over ensemble members. We train the selector by minimizing
    the residual of the selected combination against the governing PDE,
    holding the underlying PINNs frozen. This avoids the multi-objective
    drift that joint training has been reported to induce in coupled
    surrogate-and-aggregator setups.

    We evaluate the framework on the 1D viscous Burgers equation with
    viscosity ν ∈ [0.005, 0.05], using an ensemble of eight PINNs
    differing only in initialization. CandidateSelectPINN reduces relative
    L2 error from 4.3 × 10⁻² (mean-pool baseline) to 1.7 × 10⁻² at
    ν = 0.01, with comparable improvements at the other sampled
    viscosities. An ablation freezing the selector to a uniform
    distribution recovers the mean-pool error within noise, confirming
    that the gains are due to the routing decisions and not to the
    auxiliary residual signal used during selector training.

    These results indicate that selection is the right primitive for
    aggregating disagreeing PINN candidates, and that the synthesis-based
    aggregators currently used in PINN ensembling are leaving accuracy on
    the table. The selector adds negligible inference cost relative to
    evaluating the ensemble itself, making the swap effectively free in
    deployment.
