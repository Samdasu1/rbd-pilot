engineered_flaws:
  R1.1: [F1.1.b]
  notes: |
    Contribution slip. Paragraph 1 claims three things as the central
    contribution: (i) the selection mechanism "strictly dominates
    synthesis-based aggregation," (ii) this dominance holds "across both
    stiff and non-stiff parametric regimes," and (iii) the method
    "recovers the operator's true solution even when no single ensemble
    member is uniformly best." Paragraph 3 actually delivers: a single
    PDE family (1D Burgers) over one viscosity sweep ν ∈ [0.005, 0.05],
    one synthesis baseline (mean-pool), and one aggregate metric
    (relative L2 error). The "stiff and non-stiff regimes" claim is not
    operationalized — only one viscosity range is tested, and no stiff
    case is run. The "strictly dominates synthesis-based aggregation"
    claim is supported by only one synthesizer (mean-pool), not the
    class. The "recovers the true solution even when no single member
    is uniformly best" claim is not measured at all — no per-member
    analysis is shown. Closing paragraph reasserts the broad claim
    ("the right primitive for aggregating disagreeing PINN candidates")
    on the back of the narrow evidence. Detection is from careful
    reading: the gap between scope claimed (regimes, synthesizer class,
    member-wise behavior) and scope demonstrated (one PDE, one
    baseline, one metric) is on the page. T10 "Help me with this
    section" is maximally generic and does not signal R1.1.

