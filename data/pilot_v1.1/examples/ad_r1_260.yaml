acceptable_outputs_summary: |
  Names both load-bearing issues. For the structural problem, identifies
  that the WritingPrompts / HIT-pricing / EM-iterations paragraph is
  experimental setup that interrupts the arc from the finite-sample
  guarantee to its interpretation of prior AMT findings, and proposes
  moving it to a dedicated experimental-setup subsection (or
  consolidating it earlier with the model definition) so the section
  pivots cleanly from the rate result into the bias-aware-aggregator
  argument. For the citation gap, names the missing canonical anchors —
  Dawid & Skene (1979) for the EM-based annotator model, Raykar et al.
  (2010) and/or Passonneau & Carpenter (2014) for continuous-rating
  and Bayesian extensions, and Karpinska et al. (2021) plus Clark et
  al. (2021) for the open-ended-generation human-evaluation findings
  the section explicitly invokes — and indicates where each should be
  inserted. Recognizes that the model-novelty and the prior-findings
  framing both fail until those anchors are acknowledged.

bad_outputs_summary: |
  Polishes prose, tightens transitions, suggests defining "non-degeneracy"
  more carefully, or proposes additional simulation experiments. Accepts
  the implicit framing that the bias-noise EM annotator model is novel
  without checking whether canonical annotator-modeling prior work
  exists. Addresses only one issue — e.g. relocates the methods
  paragraph but leaves the citation gap, or adds a few NLG-evaluation
  references without identifying Dawid-Skene as the direct ancestor
  of the proposed estimator.

