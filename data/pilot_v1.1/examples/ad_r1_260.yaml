engineered_flaws:
  R1.5: [F1.5.b]    # misplaced section: experimental-setup paragraph wedged between the theorem and its interpretation
  R1.7: [F1.7.b]    # missing canonical annotator-model and open-ended-evaluation prior work
  notes: |
    Two interacting flaws:

    R1.5 — structural ordering. The fourth paragraph ("Our experiments
    use the WritingPrompts ... discard HITs whose worker-time falls below
    a 10-second threshold") is experimental-setup material — corpus
    choice, HIT pricing, EM iteration count, attention-check threshold.
    It sits between the finite-sample guarantee (paragraph 3) and the
    interpretive paragraph that uses that guarantee to explain prior
    negative AMT findings (paragraph 5). The interpretive pivot
    therefore lands cold, as if Theorem 1's implications were an
    afterthought to a methods description. The natural placement is
    either a dedicated experimental-setup subsection later in the
    paper or a brief mention earlier alongside the model definition.
    As written, the methods paragraph deflates the theoretical arc
    just where the section is supposed to translate the rate result
    into a claim about field practice. Subtlety: the paragraph itself
    is well-written and self-contained; the defect surfaces only at
    the section level.

    R1.7 — missing canonical prior work. The section proposes a
    bias-and-noise latent-quality model fit by EM, which is a direct
    descendant of Dawid & Skene (1979, "Maximum Likelihood Estimation
    of Observer Error-Rates Using the EM Algorithm"), the canonical
    reference for EM-based annotator modeling — and is not cited.
    The continuous-rating extension corresponds closely to Raykar et
    al. (2010, JMLR) and the Bayesian variants in Passonneau &
    Carpenter (2014, TACL); neither is cited. On the open-ended
    generation side, the section's framing of "negative AMT findings
    on Likert aggregates" stands on Karpinska, Akoury & Iyyer (2021,
    EMNLP, "The Perils of Using Mechanical Turk to Evaluate Open-Ended
    Text Generation") and Clark et al. (2021, ACL, "All That's Human
    Is Not Gold"), both directly relevant and both absent. Moderate
    gating: a reader literate in either annotator modeling or NLG
    human-evaluation will see the omission immediately, since the
    section's entire model class and motivating phenomenon were
    formalized in those works.

    Combined: fixing R1.5 alone (re-locating the methods paragraph)
    yields a clean theoretical arc that still claims novelty for a
    bias-noise EM annotator model whose closest ancestor goes
    uncited. Fixing R1.7 alone (adding Dawid-Skene, Raykar et al.,
    Karpinska et al., Clark et al.) leaves the structural deflation
    in place and may even worsen it by inserting more discussion
    near the broken pivot. Both must be addressed for the
    contribution claim to land.

