artifact:
  source: synthetic
  domain: theory_ann
  word_count: 372
  text: |
    Likert-scale aggregation under heterogeneous annotators presents a
    theoretical challenge that has received less formal treatment in
    open-ended generation evaluation than its empirical importance
    warrants. We model each annotator i in [N] as a pair (b_i, sigma_i)
    — a per-annotator calibration bias and a per-annotator noise scale —
    applied to a latent quality score q_x in R for each generated item
    x. Aggregating ratings across annotators amounts to recovering
    {q_x} jointly with the annotator parameters from an L x N partially
    observed rating matrix.

    We prove that under a mild non-degeneracy condition on the
    assignment matrix — each pair of items is co-rated by at least
    three annotators with distinct biases — the latent quality scores
    are identifiable up to a global affine transformation. The proof
    reduces to a rank argument on the centered rating matrix and
    requires no parametric assumption on the prior distribution over
    q_x.

    Theorem 1 then yields a finite-sample guarantee: the recovered
    quality ranking converges to the population ranking at rate
    O(N^{-1/2} log L) provided the per-item rating count grows as
    omega(log L). The constant depends on the spread of {b_i} but not
    on the distribution of {q_x}. This separates the role of
    annotator-pool diversity (which controls the constant) from the
    role of rating budget (which controls the rate).

    Our experiments use the WritingPrompts story-generation corpus
    released alongside Fan et al. (2018), with 5,000 prompt-completion
    pairs split 4:1 into validation and test. We collect ratings on
    Mechanical Turk at $0.04 per HIT and run EM for 50 iterations with
    a uniform prior over {q_x}. Convergence is monitored by held-out
    log-likelihood, and we discard HITs whose worker-time falls below
    a 10-second threshold.

    The identifiability result clarifies why earlier negative findings
    in the AMT literature — repeated reports that mean-Likert aggregates
    correlate poorly with held-out expert judgments — do not contradict
    the recoverability of the underlying quality signal: those aggregates
    implicitly assume b_i = 0 for all i, a condition that is generically
    violated. A bias-aware aggregator should perform substantially
    better, and our analysis predicts the precise regime in which this
    advantage becomes detectable.
  source_provenance: null

