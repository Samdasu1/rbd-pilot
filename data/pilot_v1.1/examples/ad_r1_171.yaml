artifact:
  source: synthetic
  domain: generative_ml
  word_count: 312
  text: |
    In this section we describe the skill-decomposed evaluation protocol
    that we develop for instruction-tuned language models and we apply it
    to a suite of open-weight checkpoints that we had selected from recent
    releases and through this process we obtain per-skill scores that we
    then aggregate into an overall alignment profile that downstream
    practitioners can use when selecting models for their applications.
    Our protocol decomposes responses along several axes including
    factuality logical coherence instruction adherence and harmlessness
    and we score each axis independently using a rubric-based judge that
    we had calibrated against a small set of human-labeled responses.

    The judge is implemented as a frozen large model that receives the
    instruction the candidate response and a per-skill rubric and the
    judge produces a categorical score on a five-point scale and we
    average these scores across a held-out evaluation set of roughly
    1,800 prompts that span twelve task families which we curated for
    this study. During development we noticed that the judge tends to
    exhibit position bias and length bias and we mitigate these by
    randomizing answer order and by length-normalizing the rubric
    prompts before scoring is performed.

    We compared our skill-decomposed scores to a single-score baseline
    that uses an overall preference judgment and we find that the
    skill-decomposed protocol produced rankings that disagreed with the
    baseline on approximately 18% of model pairs and the disagreements
    concentrate on pairs where one model is stronger on factuality while
    the other is stronger on instruction adherence which suggests that
    a single overall score had been hiding meaningful trade-offs that
    practitioners may care about.

    Furthermore the protocol appears to be reasonably stable under
    rubric perturbations and judge-model swaps although we acknowledge
    that broader evaluation across additional judge families would
    further strengthen the robustness claims that we are making in
    this section.
