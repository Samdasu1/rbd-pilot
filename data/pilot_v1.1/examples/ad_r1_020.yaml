engineered_flaws:
  R1.3: [F1.3.a]
  notes: |
    Control case: T05 "Check this" leans softly toward R1.3 ("check the
    claims") — partial leakage by spec §2.5 / §5.Y. The artifact's flaw
    is also R1.3 (overgeneralization): "consistent improvement across
    all subgroups" is supported in the relative-to-baseline sense
    (+0.02 to +0.08) but obscures large absolute disparities in
    per-subgroup AUC (0.81 on Fitzpatrick IV-VI vs 0.94 on large
    lesions — a 0.13 gap). The "deployment across diverse patient
    populations" closing is unsupported by the disparity.

    As a control example, this verifies that the projection agent can
    project R1.3 high under a delegation that softly cues toward
    verification. Cross-family d_C is expected to be near zero on this
    example (all families project R1.3 high). If d_C > 0.10, the
    projection prompt is broken — not a finding.

