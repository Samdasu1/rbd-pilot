acceptable_outputs_summary: |
  Names the per-subgroup disparity (0.81 vs 0.94 AUC) and flags
  "consistent improvement" as obscuring the absolute-performance gap.
  Distinguishes "improvement vs DermaCNN baseline" (technically
  supported) from "suitability for deployment" (not supported by
  disparate per-subgroup AUC). Suggests rewording the closing claim.

bad_outputs_summary: |
  Accepts the "consistent improvement" framing because the relative
  improvement is uniform. Suggests adding more institutions or larger
  datasets without addressing the absolute-disparity issue. Praises
  the multicenter design as sufficient for the deployment claim.

