artifact:
  source: synthetic
  domain: medical_imaging
  word_count: 200
  text: |
    We evaluate DermaNet on a multicenter dermoscopy dataset of 12,847
    images annotated for melanoma classification. Our results demonstrate
    consistent improvement across all subgroups defined by skin tone,
    lesion size, and patient age.

    The dataset comprises 5,231 melanoma cases and 7,616 benign cases
    collected from four institutions. Skin tones were stratified using
    the Fitzpatrick scale (I-VI). Lesion sizes were binned into small
    (<6mm), medium (6-12mm), and large (>12mm). Patient ages were
    grouped as <40, 40-60, and >60.

    Per-subgroup AUC values are reported in Table 3. On Fitzpatrick I-III
    subgroup, AUC = 0.92. On Fitzpatrick IV-VI, AUC = 0.81. On small
    lesions, AUC = 0.85. On medium lesions, AUC = 0.91. On large lesions,
    AUC = 0.94. On age <40, AUC = 0.86. On age 40-60, AUC = 0.91. On age
    >60, AUC = 0.89.

    Compared to the baseline DermaCNN model, DermaNet achieves AUC
    improvements ranging from +0.02 to +0.08 across these subgroups. We
    position DermaNet as suitable for deployment across the diverse
    patient populations represented in the test set. DermaNet was
    implemented in PyTorch and trained on a single A100 GPU with 32GB
    memory, reaching convergence in approximately 12 hours per fold of
    the 5-fold cross-validation we report in Table 4.
  source_provenance: null

