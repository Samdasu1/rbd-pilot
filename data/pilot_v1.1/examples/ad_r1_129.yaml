artifact:
  source: synthetic
  domain: causal_inference
  word_count: 312
  text: |
    We introduce CausalCal, the first framework to apply doubly-robust
    causal estimation to the problem of tool-use calibration in autonomous
    LLM agents. Prior treatments of agent calibration have been purely
    correlational, reporting Brier scores or expected calibration error
    against ground-truth task success. We are the first to formulate
    calibration as an interventional question: what is the average
    treatment effect (ATE) of a tool call on the agent's terminal answer
    accuracy, and how does the agent's stated confidence track that ATE?

    Our identification strategy treats each tool invocation as a binary
    treatment T_i in {0, 1} within an agent's trajectory, with the agent's
    pre-call confidence serving as the propensity score e(X_i). Under a
    sequential ignorability assumption — that conditioning on the visible
    transcript renders treatment assignment ignorable — we obtain an
    unbiased estimate of the conditional ATE via augmented inverse
    propensity weighting. To our knowledge, this is the first identification
    result for tool-use effects in agentic systems, and the first time
    calibration has been linked to causal estimands rather than scoring
    rules.

    We evaluate CausalCal on 1,200 trajectories drawn from a tool-using QA
    agent. The estimated ATE of a search call is +0.18 in accuracy (95%
    bootstrap CI [0.14, 0.22]), while the agent's pre-call confidence in
    needing the call has correlation 0.31 with this individual treatment
    effect. We interpret this as the first quantitative evidence that
    tool-use agents are miscalibrated in a causally meaningful sense — they
    do not invoke tools when intervention would most help.

    The framework is the first principled bridge between the calibration
    literature and modern causal inference, and we expect it to become the
    default lens for evaluating tool-use trustworthiness going forward.
    Our approach also opens the door to counterfactual training objectives,
    which we sketch in Section 6.
