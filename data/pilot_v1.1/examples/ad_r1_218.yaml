artifact:
  source: synthetic
  domain: systems
  word_count: 324
  text: |
    We address a gap in multi-agent LLM systems (MAS) research: the
    absence of a principled framework for diagnosing inter-agent
    communication failures. The dominant view in MAS research treats
    system breakdowns as emergent, stochastic phenomena that resist
    systematic categorization — most published evaluations report only
    end-to-end task success rates and attribute failures to general
    "coordination issues" or "hallucination cascades" without finer
    decomposition. As a result, practitioners rely on ad-hoc trace
    inspection and have no shared vocabulary for describing where
    exactly a multi-agent pipeline broke.

    We introduce CommDiag, the first principled diagnostic framework
    that categorizes MAS communication failures into four taxa:
    (i) intent-misalignment, where receiver agents act on a different
    goal than the sender encoded; (ii) role-bleed, where agents
    generate content outside their assigned role; (iii) memory
    desynchronization, where shared state diverges across turns; and
    (iv) handoff-loss, where information is dropped at agent
    transitions. Each taxon is operationalized with a deterministic
    detector that consumes the raw message log and produces a
    structured failure annotation.

    We instantiate CommDiag over 240 traces collected from three MAS
    frameworks (AutoGen, CrewAI, and a custom planner-executor stack)
    running on HumanEval, GSM8K, and a held-out web-navigation
    benchmark. The four-taxa decomposition accounts for 87% of
    failures in our sample. Because the detectors are deterministic
    and operate on raw traces, the framework is reproducible across
    re-runs and does not require LLM-as-judge calls.

    By providing operational definitions rather than post-hoc
    descriptions, CommDiag enables the first quantitative comparison
    of failure modes across MAS architectures. We find, for instance,
    that role-bleed dominates in CrewAI traces (42%) but is rare in
    AutoGen (6%), while handoff-loss exhibits the opposite pattern.
    These differences could not be surfaced under prior aggregate
    metrics. CommDiag thus moves MAS evaluation from "did it work?"
    to "how did it break?", and we believe this shift is necessary
    for systematic progress in the area.
