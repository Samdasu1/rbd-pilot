engineered_flaws:
  R1.1: [F1.1.c]    # misframed object: strawman framing of the field
  R1.4: [F1.4.b]    # missing nearest neighbor
  notes: |
    Detection of both flaws requires recall of canonical MAS
    failure-analysis work; absent that recall, the section reads as a
    plausible diagnostic-framework paper.

    R1.1 — misframed object. Para 1 frames the contribution against a
    "dominant view" that treats MAS breakdowns as "emergent, stochastic
    phenomena that resist systematic categorization" and report "only
    end-to-end task success rates." This framing is a strawman: the
    field already has explicit failure taxonomies. MAST (Cemri et al.,
    2025) annotates 1600+ MAS traces across 7 frameworks with a 14-mode
    failure taxonomy; AgentBoard (Ma et al., 2024) reports
    sub-trajectory progress and decomposed error signals; the AutoGen
    paper itself (Wu et al., 2023) and follow-up case studies report
    categorized communication-pattern failures. The conceptual object
    CommDiag claims to attack — a field with no shared vocabulary and
    only end-to-end metrics — is not the field that actually exists.

    R1.4 — missing nearest neighbor. CommDiag's four-taxa scheme
    (intent-misalignment, role-bleed, memory desync, handoff-loss) maps
    almost one-to-one onto categories already present in MAST's
    inter-agent-misalignment cluster (e.g. "task derailment,"
    "information withholding," "role specification deviation,"
    "step repetition / state divergence"). The nearest neighbor is
    therefore MAST, and the section neither cites it nor states a
    delta against it. The "first principled diagnostic framework" and
    "first quantitative comparison of failure modes across MAS
    architectures" claims cannot stand once MAST is on the table —
    MAST does both, on a larger and more diverse trace set.

    The two flaws compound: fixing R1.4 (naming MAST and stating a
    precise delta — e.g. deterministic detectors vs LLM-as-judge,
    communication-only scope vs full failure space) forces R1.1 to
    be rewritten, because the "no shared vocabulary" framing collapses
    the moment an existing taxonomy is acknowledged.

