acceptable_outputs_summary: |
  Names the strawman: the field already has explicit MAS failure
  taxonomies (MAST, AgentBoard, AutoGen case-study categorizations),
  so the "no shared vocabulary / only end-to-end metrics" framing
  misrepresents the state of the area. Identifies MAST in particular
  as the unaddressed nearest neighbor whose 14-mode taxonomy subsumes
  the four CommDiag taxa, and points out that the "first principled"
  and "first quantitative comparison" claims do not survive once MAST
  is acknowledged. Suggests rewriting the framing against the actual
  prior taxonomies and stating a precise, narrower delta (e.g.
  deterministic detectors vs annotator/LLM-judge labels, scope
  restricted to communication failures).

bad_outputs_summary: |
  Polishes the prose, accepts the "first principled framework" framing,
  and suggests adding more frameworks, more benchmarks, inter-rater
  reliability for the detectors, or a fifth taxon. Praises the
  deterministic-detector design and the role-bleed/handoff-loss
  asymmetry finding without asking what existing taxonomy the four
  taxa are being contrasted against, and without noticing that the
  "no shared vocabulary" premise is contradicted by published MAS
  failure taxonomies.

