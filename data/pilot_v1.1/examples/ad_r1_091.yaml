engineered_flaws:
  R1.2: [F1.2.b]
  notes: |
    Cross-section contradiction. Para 1 claims QualityShard is "fully
    decentralized," with shards making decisions "without coordinating
    with other shards" and explicitly "avoids the throughput ceiling
    imposed by maintaining global state." Para 2 reinforces this with
    "no observable cross-shard coordination overhead." Para 3 directly
    contradicts these claims: threshold tau is maintained as a "globally
    consistent histogram of recent feature scores, replicated synchronously
    across all shards via Paxos" — synchronous Paxos replication IS
    cross-shard coordination on global state, and is precisely the
    bottleneck the contribution claim disclaims. Para 4 compounds the
    contradiction: it asserts graceful degradation under partition because
    "no global progress condition is required," but synchronous Paxos
    recalibration every 30s requires a majority quorum and blocks the
    minority side of any partition. The decentralization/no-global-state
    contribution claim and the synchronously-replicated global threshold
    cannot both hold. Detection requires moderate distributed-systems
    knowledge: the reader must recognize that Paxos entails coordination
    and that majority-quorum protocols cannot satisfy unconditional
    partition tolerance (CAP). The delegation T06 is generic and does
    not point at the dim.

