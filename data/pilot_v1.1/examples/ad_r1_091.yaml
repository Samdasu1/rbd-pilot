artifact:
  source: synthetic
  domain: distributed_systems
  word_count: 338
  text: |
    We present QualityShard, a distributed annotation-quality control system
    designed for crowdsourcing platforms confronted with the rising prevalence
    of LLM-assisted submissions documented by recent work on MTurk text
    production tasks. QualityShard's contribution is a fully decentralized
    verification pipeline: each shard makes local decisions about whether a
    submitted annotation was likely machine-generated, without coordinating
    with other shards. This eliminates the cross-shard synchronization
    bottleneck that limits prior crowd-quality systems built on consensus-based
    voting, and avoids the throughput ceiling imposed by maintaining global
    state across the cluster.

    The architecture partitions worker submissions by a hash of worker_id,
    routing each worker's submissions deterministically to one of N shards.
    Each shard runs an independent stylometric classifier that scores
    submissions against a learned model of human annotation patterns.
    Submissions exceeding a per-shard threshold tau are flagged for
    re-annotation. Because shards operate independently, QualityShard scales
    linearly with N: on a 64-shard cluster we report 4.2M submissions/sec
    with no observable cross-shard coordination overhead.

    To handle distributional drift as new LLMs come online, tau is recalibrated
    every 30 seconds. Recalibration uses a globally consistent histogram of
    recent feature scores, replicated synchronously across all shards via
    Paxos so that every shard applies the same threshold at any wall-clock
    instant. This synchronous recalibration is essential for fairness:
    workers whose submissions are routed to different shards must face
    identical decision boundaries, which would not hold under eventual
    consistency.

    We compare QualityShard against ARTIFACT-DET and a centralized baseline
    that funnels all submissions through a single classifier instance.
    QualityShard achieves 12x the throughput of the centralized baseline at
    equivalent F1 and matches ARTIFACT-DET's detection accuracy on the
    MTurk-LLM benchmark. We further show that the absence of cross-shard
    coordination enables graceful degradation under network partition: if
    any shard becomes unreachable, the remaining shards continue to operate
    on their assigned partition of the workload, and no global progress
    condition is required for the system to make forward progress.
