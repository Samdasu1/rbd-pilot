artifact:
  source: synthetic
  domain: generative_ml
  word_count: 318
  text: |
    We propose StepWise-CoT, a prompting strategy that elicits multi-step
    reasoning in large language models by inserting an explicit "Step k:"
    marker before each intermediate inference. StepWise-CoT advances the
    state of the art in chain-style prompting by enforcing a numbered
    decomposition that the model must follow before emitting a final
    answer.

    To evaluate StepWise-CoT, we compare against three baselines on the
    GSM8K, MultiArith, and AQuA-RAT benchmarks. Baseline A is our prior
    method, FreeForm-CoT (Anonymous, 2023a), which uses unstructured
    natural-language rationales. Baseline B is FreeForm-CoT-Long, a
    variant of our prior method that simply increases the maximum
    rationale length. Baseline C is FreeForm-CoT-Short, the same prior
    method with a shorter rationale budget. On GSM8K, StepWise-CoT
    reaches 58.4% accuracy, compared with 56.9% for FreeForm-CoT, 56.7%
    for FreeForm-CoT-Long, and 55.1% for FreeForm-CoT-Short. On
    MultiArith we report 91.2% versus 90.4 / 90.1 / 89.6, and on AQuA-RAT
    41.3% versus 40.7 / 40.5 / 40.0. The model used in all experiments
    is the same 7B base checkpoint we trained for FreeForm-CoT.

    These results show that StepWise-CoT clearly outperforms prior
    approaches to step-by-step prompting and establishes numbered
    decomposition as a superior elicitation strategy. The 1.5-point
    gain on GSM8K is consistent across three random prompt orderings,
    suggesting the structural marker — and not the additional tokens it
    introduces — is responsible for the improvement.

    We position StepWise-CoT as a drop-in replacement for unstructured
    rationale prompting in any pipeline that currently uses our
    FreeForm-CoT family of prompts. The change requires only modifying
    the few-shot exemplars to include "Step k:" prefixes, and it does
    not alter the base model or decoding procedure. We expect the
    structural-marker idea to generalize to other reasoning-elicitation
    settings, particularly those involving multi-hop question answering
    and program-synthesis prompting, which we leave to future work.
  source_provenance: null

