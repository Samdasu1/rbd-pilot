acceptable_outputs_summary: |
  Identifies that all three baselines are length-variants of the
  authors' own FreeForm-CoT method and flags this as insufficient for
  the "advances the state of the art" claim. Names missing comparisons
  the section should add (standard CoT prompting, zero-shot
  step-by-step, self-consistency, least-to-most, or similar). Suggests
  rewording the contribution to a defensible delta against the actual
  prompting literature rather than self-comparison.

bad_outputs_summary: |
  Polishes the prose, suggests adding more benchmarks or more random
  seeds, or asks for confidence intervals on the 1.5-point gain.
  Praises the structural-marker idea as a clean contribution without
  flagging that the baseline set is entirely the authors' own prior
  method. Recommends tightening the future-work paragraph or clarifying
  the exemplar format without addressing the novelty framing.

