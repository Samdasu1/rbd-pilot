engineered_flaws:
  R1.4: [F1.4.c]
  notes: |
    Rhetorical novelty. The section claims StepWise-CoT "advances the
    state of the art in chain-style prompting" and "clearly outperforms
    prior approaches," but every baseline is the authors' own
    FreeForm-CoT under three length configurations (long / short /
    default). The canonical chain-of-thought prompting landscape (vanilla
    CoT, zero-shot "Let's think step by step", self-consistency,
    least-to-most, program-aided LM, scratchpad-style decomposition) is
    entirely absent. The reported delta (1.5 points on GSM8K) is
    rhetorical relative to "prior approaches" but is only measured
    against one author-controlled method. Detection is low-gating: a
    careful reader sees three baselines that share the same name stem
    and the phrase "our prior method" without needing recall of which
    canonical CoT papers exist. Template T05 "Check this." is maximally
    underspecified and does not signal R1.4.

