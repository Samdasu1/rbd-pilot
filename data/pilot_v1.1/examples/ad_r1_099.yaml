engineered_flaws:
  R1.2: [F1.2.b]
  notes: |
    Cross-section contradiction. Paragraph 1 explicitly states that a
    central design goal is to obtain calibrated uncertainty "without
    resorting to ensembles of value functions or to bootstrap-head
    disagreement." Paragraph 2 then trains the confidence head against
    "the empirical variance across the K=10 bootstrap heads attached to
    the trunk" — i.e., uses exactly the bootstrap-head disagreement
    signal that paragraph 1 disclaimed. Paragraph 4's positioning ("what
    distinguishes VerbalQ from ensemble-based uncertainty methods") then
    repeats the original framing as if the contradiction did not exist.
    Paragraph 3's "discard auxiliary structure at inference" softens but
    does not resolve the issue: the contribution claim is about the
    method, not just deployment. A reader scanning paragraph-by-paragraph
    may miss the link; reading the method against the framing exposes
    the inconsistency. No specialized RL knowledge is required to
    detect this — only careful reading (low gating). Delegation T08
    ("Clean this up.") gives no hint about the load-bearing dimension.

