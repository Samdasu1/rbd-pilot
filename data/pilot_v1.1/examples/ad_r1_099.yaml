acceptable_outputs_summary: |
  Identifies the contradiction between the "no ensembles, no bootstrap-head
  disagreement" claim in paragraph 1 (echoed in paragraph 4) and the
  training procedure in paragraph 2, which derives the confidence target
  from variance across K=10 bootstrap heads. Suggests resolving by either
  (a) restating the contribution as inference-time efficiency only and
  acknowledging the ensemble at training, or (b) replacing the
  variance-based target with a genuinely single-network signal.

