artifact:
  source: synthetic
  domain: reinforcement_learning
  word_count: 268
  text: |
    We introduce VerbalQ, a deep reinforcement learning framework in which
    the agent emits a natural-language confidence tag (e.g., "low",
    "medium", "high") alongside each action-value estimate. These tags are
    decoded into scalar probabilities and used to modulate the exploration
    policy: states with low expressed confidence receive larger exploration
    bonuses. A central design goal of VerbalQ is to obtain calibrated
    uncertainty signals from a single Q-network, without resorting to
    ensembles of value functions or to bootstrap-head disagreement, which
    are expensive at training time and complicate deployment on
    resource-constrained agents.

    During training, the policy network jointly predicts an action-value
    vector and a confidence token from a shared trunk. The action-value
    head is trained with the standard TD(0) loss against a target network.
    The confidence head is trained with a cross-entropy objective against a
    discretized target derived from the empirical variance across the K=10
    bootstrap heads attached to the trunk; the predicted confidence token
    is the one whose induced probability is closest to 1 - normalized
    variance. We find K=10 heads sufficient to produce a stable training
    signal for the confidence head across all Atari-57 environments.

    Exploration is then driven by the predicted confidence token rather
    than by raw head disagreement, which lets the deployed agent discard
    auxiliary structure at inference and act from a single forward pass.

    Empirically, VerbalQ matches Bootstrapped DQN on hard-exploration games
    (Montezuma's Revenge, Pitfall) while requiring substantially less
    inference compute. The unified single-network design is what enables
    the deployment efficiency we report and what distinguishes VerbalQ
    from ensemble-based uncertainty methods in deep RL.
