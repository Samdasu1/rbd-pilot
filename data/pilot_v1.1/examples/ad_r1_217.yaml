artifact:
  source: synthetic
  domain: causal_inference
  word_count: 342
  text: |
    Multi-agent LLM pipelines exhibit large unexplained variance in output
    quality across team configurations, motivating a causal rather than
    correlational analysis. We propose a framework for estimating the
    average treatment effect (ATE) of team heterogeneity — measured as
    model-family entropy across the candidate pool — on benchmark
    accuracy. Treating each pipeline run as a unit and the heterogeneity
    score as a continuous treatment, we apply doubly robust estimation
    with a propensity model over team composition and an outcome model
    over benchmark scores. To our knowledge, this is the first
    causal-inference treatment of multi-agent LLM aggregation,
    distinguishing our contribution from the prevailing correlational
    benchmarking practice in the field.

    Our identification strategy assumes that, conditional on benchmark
    difficulty, prompt template, and the marginal capability of each
    constituent model, the heterogeneity score is as-good-as-randomly
    assigned. We discuss the plausibility of this assumption in §4, but
    note that it is sufficient to license interpretation of the
    doubly-robust estimator as an ATE rather than a partial correlation.

    Estimated effects across 4,200 pipeline runs on MATH, GPQA, and
    HumanEval indicate a positive but small ATE of heterogeneity (+1.8
    percentage points, 95% CI [0.4, 3.2]). When we stratify by aggregator
    type, however, the heterogeneity effect is concentrated almost
    entirely in selection-based aggregators; synthesis aggregators show
    no detectable benefit from heterogeneity. Building on this, the
    central contribution of the paper is therefore a recommendation for
    practitioners: selection-based aggregation is the dominant design
    choice for production multi-agent pipelines, and homogeneous teams
    under synthesis aggregation are competitive with heterogeneous teams.
    Our experiments are the first to make this aggregator-conditioned
    recommendation precise.

    We close by sketching extensions to instrumental-variable
    identification, which would relax the unconfoundedness assumption
    above. The IV strategy uses random rotation of the prompt template
    across runs as an exogenous shifter of effective heterogeneity, and
    is, to our knowledge, the first IV approach applied in the
    multi-agent LLM literature.
  source_provenance: null

