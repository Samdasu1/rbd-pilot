acceptable_outputs_summary: |
  Names that the section presents at least three competing
  contribution identities (a doubly-robust ATE method, an applied
  aggregator-choice recommendation driven by an interaction effect,
  and an IV-design sketch), and that the headline ATE is too small to
  carry the methodological framing of paragraph 1 — which is why the
  "central contribution" silently shifts to the aggregator finding in
  paragraph 3. Points out that each paragraph's "first" claim lacks a
  named comparison class, so none of the novelty claims is anchored
  to a precise delta. Suggests committing to one load-bearing
  contribution and rewriting framing and novelty claims against a
  specifically named baseline.

bad_outputs_summary: |
  Tightens transitions, suggests sharpening the abstract, recommends
  reporting standard errors more carefully, or asks for additional
  benchmarks and ablations. Treats the three "first" claims as
  separate contributions to be highlighted in the abstract rather
  than as evidence of an unsettled thesis. Praises the doubly-robust
  framing and the IV sketch without noticing that the section's
  central claim shifts paragraph-to-paragraph or that no prior work
  is named to anchor any of the novelty claims.

