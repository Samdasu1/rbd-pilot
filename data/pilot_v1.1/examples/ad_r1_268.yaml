artifact:
  source: synthetic
  domain: reinforcement_learning
  word_count: 333
  text: |
    We introduce CALIBR-RL, an online reinforcement learning framework
    that uses an LLM judge as a self-correcting reward signal during
    policy improvement. To our knowledge, CALIBR-RL is the first
    method to combine on-policy preference collection with judge-side
    calibration in a single training loop, removing the need for a
    frozen reward model or an offline preference corpus.

    The framework operates in two interleaved phases. In the rollout
    phase, the current policy generates response pairs against a
    buffer of prompts; an LLM judge scores each pair and emits a
    calibrated preference probability. In the update phase, the
    policy is updated via PPO against a reward model fit to the
    calibrated preferences, while the judge's calibration head is
    simultaneously updated to reduce self-preference bias measured
    against a small held-out anchor set of human-rated pairs.

    A key component is the self-preference correction module, which
    adapts the logit-space recalibration framework of Marquez and Tan
    (2021). Marquez and Tan established that affine recalibration of
    pairwise scoring heads is provably insufficient for removing
    rater-specific bias when the rater and the rated share
    parameters; this motivates their two-parameter affine bias head,
    which we adopt directly. Building on their analysis, we tie the
    affine parameters to the anchor set and update them via gradient
    descent during training. In our experiments, the calibration head
    reduces the measured self-preference rate from 0.71 to 0.54 on
    the anchor set, while overall PPO returns improve over an
    uncalibrated baseline by 8.4 points on average.

    CALIBR-RL is the first deployment-ready online RLAIF system that
    maintains a continuously updated judge, and we demonstrate
    state-of-the-art performance on a suite of summarization and
    instruction-following tasks. We argue that judge-side calibration,
    rather than larger preference corpora, is the binding constraint
    on online preference-based RL, and that the CALIBR-RL recipe
    constitutes a foundation on which future calibration heads,
    anchor-set construction protocols, and judge architectures can be
    built without changing the underlying training loop.
