  R1.7: [F1.7.a]
  notes: |
    Two interpretations of the load-bearing issue, both defensible
    and both detectable from careful reading alone:

    Reading A — R1.4 dominant (missing nearest neighbor):
      The section makes two "first" claims — "first method to combine
      on-policy preference collection with judge-side calibration"
      and "first deployment-ready online RLAIF system that maintains
      a continuously updated judge" — without naming or contrasting
      against the obvious nearest neighbors in the surrounding
      literature on LLM-judge / preference-based RL. Self-rewarding
      language models, RLAIF with on-policy judging, constitutional-AI
      style critique-and-refine pipelines, and judge-distillation
      methods all occupy the same design space and routinely couple
      preference collection with judge updates inside a training loop.
      The section does not say which axis CALIBR-RL differs on.
      Rewrite would re-anchor the contribution against named systems
      and isolate the genuinely new combination, if any.

    Reading B — R1.7 dominant (fabricated citation):
      The section attributes load-bearing methodological grounding to
      "Marquez and Tan (2021)" with an internally contradictory
      description: it says Marquez and Tan "established that affine
      recalibration of pairwise scoring heads is provably insufficient
      for removing rater-specific bias when the rater and the rated
      share parameters" and then in the same sentence says this
      result "motivates their two-parameter affine bias head, which
      we adopt directly." Adopting a method that the cited work
      proves insufficient is internally inconsistent — a careful
      reader does not need field knowledge to flag the citation as
      suspect. The reference is fabricated; the claimed result
      cannot exist as described. Rewrite would either remove the
      citation, replace it with a real anchor, or fix the
      contradictory characterization.

    Reading A says "you haven't said who you're closest to" — fix
    the novelty contrast. Reading B says "this citation cannot
    mean what you say it means" — fix the scholarship integrity.
    Detection is low-gated for both: the absence of comparators is
    visible from the bare "first" claims, and the citation
    contradiction is visible from the sentence-internal logic.

