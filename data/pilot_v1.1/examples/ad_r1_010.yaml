engineered_flaws:
  R1.5: [F1.5.b]    # misplaced section: implementation paragraph deflates after the technical insight
  R1.7: [F1.7.b]    # missing canonical handler / capability papers
  notes: |
    Two interacting flaws:

    R1.5 — structural ordering. The section's load-bearing technical
    contribution is the encoding insight in paragraph 3 ("capability-based
    effect tracking can be encoded as a row constraint with linear
    cardinality"). Paragraph 4 then drops to operational semantics and
    OCaml implementation details, which is engineering-level material
    that deflates rather than lands the contribution. The natural
    section ordering is: claim → insight → metatheory → implementation as
    *one* paragraph, with the closing paragraph returning to the
    contribution's significance. Subtlety: paragraph 4 reads naturally
    on its own; the issue is only visible at the section level.

    R1.7 — missing canonical citations. The section names Lucassen and
    Gifford (correct, classical reference) but omits the canonical handler
    paper Plotkin & Power "Algebraic operations and generic effects"
    (and the more practitioner-facing Bauer & Pretnar "Programming with
    algebraic effects and handlers"). It also omits canonical
    capability-based effect work (e.g. Brachthäuser et al. on Effekt).
    A field reader sees these gaps immediately when both directions are
    explicitly named in paragraph 1. Subtlety: the section names the
    *concepts* (handlers, capabilities) but does not cite the *papers*
    that established them.

    Combined: fixing R1.5 alone (re-ordering) is incomplete because the
    re-ordered section still cites the wrong canonical anchors. Fixing
    R1.7 alone leaves a section that ends on engineering details. Both
    must be addressed.

