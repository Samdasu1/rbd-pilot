artifact:
  source: synthetic
  domain: drug_discovery_ml
  word_count: 273
  text: |
    Calibrated uncertainty estimates are essential for ML-driven lead
    optimization, where confident wrong predictions waste expensive
    synthesis cycles. Deep ensembles (Lakshminarayanan et al., 2017) and
    MC-dropout (Gal & Ghahramani, 2016) remain the dominant approaches
    in molecular property prediction, with evidential regression
    (Soleimany et al., 2021; Amini et al., 2020) emerging as a
    single-pass alternative. On MoleculeNet's regression splits, all
    three approaches achieve broadly comparable expected calibration
    error once temperature scaling is applied.

    The harder regime is the lead-optimization setting itself, where
    each new candidate sits outside the training distribution by
    construction. Sheridan's Tanimoto-distance applicability domain and
    the more recent conformal-prediction adaptations of Svensson et al.
    provide instance-wise validity guarantees, but their coverage
    degrades sharply as candidates move into sparsely sampled regions
    of chemical space. This degradation has been characterized on the
    ChEMBL kinase splits and on the Therapeutics Data Commons ADMET
    tasks.

    We trained a directed message-passing neural network (Yang et al.,
    2019) on a 1.4M-compound aqueous-solubility corpus assembled from
    public AqSolDB, OChem, and three internal datasets. The DMPNN was
    used as the base predictor under each of the four uncertainty heads
    above, and we ran split-conformal calibration on a 10% held-out
    fold stratified by Murcko-scaffold cluster.

    On a prospective set of 312 newly synthesized kinase-program
    candidates, marginal coverage was within 2% of the nominal 90%
    target for all four heads, but conditional coverage stratified by
    Tanimoto-to-train-set distance dropped to 71% in the farthest
    decile.

    Our contribution is therefore a Tanimoto-density-weighted conformal
    calibrator that re-weights nonconformity scores by local
    chemical-space density and restores conditional coverage to within
    4% of nominal across all distance deciles, validated prospectively
    on the kinase set above.
