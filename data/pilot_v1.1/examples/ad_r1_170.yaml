  notes: |
    Buried contribution. The actual novel artifact — a
    Tanimoto-density-weighted conformal calibrator that restores
    conditional coverage under chemical-space distance shift — is
    stated only in the FINAL paragraph. The first four paragraphs
    are entirely populated with canonical references and standard
    pipeline choices in molecular ML uncertainty quantification:
    deep ensembles (Lakshminarayanan), MC-dropout (Gal & Ghahramani),
    evidential regression (Amini, Soleimany), Sheridan's applicability
    domain, Svensson's molecular conformal prediction, Yang et al.'s
    DMPNN, AqSolDB, MoleculeNet, TDC, Murcko-scaffold splits. A reader
    who recognizes these as the canonical inventory of the subfield
    can identify that paragraphs 1–4 contribute no new claim and that
    the entire load of novelty is carried by paragraph 5.
    Natural order for a contribution-style write-up:
      contribution claim (1) → canonical-methods context (2) → gap /
      OOD failure mode (3) → method (4) → result (5)
    Current order:
      canonical context (1) → OOD gap (2) → method (3) → result (4) →
      contribution (5)
    Detection requires recall of the canonical molecular-UQ literature
    to see that paragraphs 1–2 are background — without that recall a
    reader might treat them as part of the contribution. The flaw is
    structural (section-level reorder needed), not local (sentence
    polish). Delegation T06 "Take a look at this paragraph" is
    deliberately under-specified and does not name structure or
    contribution placement.

