  domain: drug_discovery_ml
  word_count: 372
  text: |
    In this section we describe the routing benchmark that we constructed
    for evaluating multi-LLM routing systems on drug discovery tasks. The
    benchmark, which we call MolRoute, is a benchmark designed to evaluate
    routing systems on drug discovery tasks. MolRoute provides a
    standardized evaluation protocol for routing-based systems applied to
    molecular property prediction and related drug discovery workflows.

    The benchmark covers three task families: ADMET property prediction,
    retrosynthesis planning, and molecular question answering. For ADMET
    prediction we include solubility, permeability, and toxicity endpoints,
    which span the standard ADMET property categories that practitioners
    typically care about, namely solubility, permeability, and toxicity.
    The retrosynthesis subset draws from USPTO-50K and includes single-step
    retrosynthesis problems where the routing system must direct each query
    to one of several candidate models. For molecular QA we include
    questions about molecular properties that test whether the routing
    system can dispatch property-related queries to the appropriate
    specialist model.

    We evaluate seven candidate LLMs in our routing pool, including
    general-purpose models and chemistry-specialized models. The
    general-purpose models include GPT-4 and Claude, and the
    chemistry-specialized models include Galactica and a fine-tuned Llama
    variant. The routing pool therefore contains a mix of general-purpose
    and chemistry-specialized models, which allows us to evaluate whether
    routing systems can effectively choose between general-purpose and
    chemistry-specialized models for drug discovery tasks.

    Our primary metric is cost-adjusted accuracy, defined as accuracy
    divided by per-query cost in dollars. We also report raw accuracy and
    raw cost separately. Cost-adjusted accuracy captures the trade-off
    between raw accuracy and raw cost, and it is the headline metric we
    use to rank routing systems because it captures the trade-off between
    accuracy and cost that practitioners care about in deployment.

    Preliminary results on MolRoute show that learned routers outperform
    fixed-model baselines on cost-adjusted accuracy by 18–24% across the
    three task families. This improvement on cost-adjusted accuracy is
    consistent across ADMET, retrosynthesis, and molecular QA, suggesting
    that routing offers consistent benefits across the three task families
    included in MolRoute.
