acceptable_outputs_summary: |
  Identifies that the section presents results and a mesh-independence
  claim before defining the iteration operator and its discretization,
  and that the spectral analysis at the fixed point precedes the
  contraction argument that establishes the fixed point exists.
  Proposes a concrete reorder along the canonical line: operator
  definition → discretization → contraction / existence → spectral
  analysis → numerical experiments, with rationale tied to
  well-posedness of the later claims.

bad_outputs_summary: |
  Polishes notation, asks for additional benchmarks, or questions the
  choice of total-variation norm without addressing the section
  ordering. Suggests tightening the Lipschitz constant or extending the
  pseudospectra discussion. Treats the placement of the discretization
  scheme at the end as a stylistic appendix-style choice rather than
  a structural inversion that undermines the earlier mesh-independence
  and convergence-rate claims.

