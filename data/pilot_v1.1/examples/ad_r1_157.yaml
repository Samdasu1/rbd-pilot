artifact:
  source: synthetic
  domain: numerical_analysis
  word_count: 297
  text: |
    Recent work on calibrated LLM-as-judge protocols has observed that
    self-preference drift — where a judge model assigns systematically
    higher scores to outputs from its own family — can be reframed as a
    fixed-point inconsistency in the score-aggregation map. Treating the
    per-pair preference operator as a map T on the simplex of latent
    quality vectors, we ask whether iterative recalibration converges,
    and at what rate.

    Across the JudgeBench-NA, MT-Bench-Pair, and Arena-Hard preference
    suites, the recalibration iteration converges to within tolerance
    1e-4 in 7-12 sweeps, with empirical contraction ratio
    rho_hat in [0.79, 0.86] across all three suites. Mesh-independence
    of the observed rate holds when the per-judge anchor grid is refined
    from 64 to 1024 pairs.

    The recalibration operator T : Delta^n -> Delta^n is defined by
    T(x)_i = (1/Z(x)) sum_j w_{ij} sigma(beta (x_i - x_j)), where sigma
    is the logistic, beta a sharpness parameter, and w_{ij} the empirical
    pair frequency from the judge protocol. We work on Delta^n equipped
    with the total-variation norm.

    We compute the spectrum of the linearization DT(x*) at the fixed
    point and find a clear gap lambda_2 / lambda_1 ≈ 0.71 across all
    three suites, with pseudospectra concentrated in the unit disk for
    the relevant beta regime.

    Under moment condition (M1) and boundedness condition (M2) on the
    empirical pair weights, T is a contraction in TV norm with Lipschitz
    constant L = beta / (4(1 + e^{-beta/2})), giving L < 1 for all
    beta <= 2. Banach's theorem then yields existence and uniqueness of
    the calibrated fixed point x*.

    Finally, we discretize T by piecewise-linear interpolation on a
    simplex grid whose anchor points are placed at empirical pair-marginal
    vertices. The scheme is conservative, preserving sum_i x_i = 1 to
    machine precision.
