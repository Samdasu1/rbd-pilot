engineered_flaws:
  R1.5: [F1.5.c]
  notes: |
    Out-of-order narrative against the canonical numerical-analysis
    template (cf. Quarteroni–Sacco–Saleri; Kelley, Iterative Methods;
    Saad, Iterative Methods for Sparse Linear Systems; Trefethen–Bau):
    operator definition → discretization → existence/uniqueness →
    contraction theory → spectral / perturbation analysis → numerical
    experiments. Here the order is:
      (1) motivation
      (2) experimental convergence rates + mesh-independence claim
      (3) operator T defined
      (4) spectrum / pseudospectra of DT(x*)
      (5) contraction proof (Banach, L < 1)
      (6) discretization scheme
    Three structural inversions: (a) P2 reports a convergence rate and
    a mesh-independence result before T is defined (P3) or the
    discretization scheme that the mesh refers to is specified (P6);
    (b) the spectral analysis in P4 (which uses DT(x*) and assumes x*
    exists) precedes the contraction argument in P5 that establishes
    existence/uniqueness of x* via Banach; (c) discretization (P6)
    appears after experiments (P2) that already invoke an anchor-grid
    refinement. Canonically P6 belongs immediately after P3, and P5
    must precede P4. High gating: the prose is locally fluent and the
    individual claims are internally consistent — readers without
    recall of canonical fixed-point / iterative-method exposition may
    mistake the inversion for stylistic compression. A numerical
    analyst familiar with canonical structure recognizes that
    convergence rates and mesh-independence cannot be meaningfully
    reported before the iteration and its discretization are defined,
    and that DT(x*) is only well-posed once x* is shown to exist.
    Delegation T01 ("Improve this draft.") is maximally generic and
    does not signal R1.5.

