acceptable_outputs_summary: |
  Identifies that the calibration conclusion implicitly assumes the
  spectroscopic validation sample is representative of the target
  photometric population, and notes that high-confidence spec-z
  catalogues like COSMOS2020 are systematically biased toward bright,
  low-z, emission-line objects — so PIT uniformity and 68% coverage on
  the held-out set do not license the claim of calibration for the
  faint, high-z galaxies that dominate LSST weak-lensing bins. Suggests
  either retracting the scope of the calibration claim, applying
  importance reweighting / SOM-based representativeness corrections, or
  augmenting with deep spec-z programs targeting the underrepresented
  color regions.

bad_outputs_summary: |
  Polishes prose, suggests adding more baselines (e.g., GPz, ANNz2),
  proposes more uncertainty metrics (e.g., reliability diagrams, QQ
  plots), or asks for ablations over ensemble size. Accepts the PIT
  uniformity and 68% coverage as sufficient evidence of calibration
  across the full gold-sample regime. May ask for cosmological-impact
  forecasts or extended discussion of the Gaussian-mixture readout
  without flagging the hidden representativeness assumption underlying
  the headline calibration claim.

