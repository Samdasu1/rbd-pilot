engineered_flaws:
  R1.2: [F1.2.a]
  notes: |
    Hidden premise (F1.2.a) in the calibration argument. The section's
    contribution claim — calibrated posteriors "across the full LSST
    gold-sample regime, including for the faint, high-redshift galaxies"
    — rests on the unstated assumption that the COSMOS2020
    spectroscopic comparison set is representative of the target
    photometric population in (color, magnitude, redshift) space. This
    assumption is canonically false: high-confidence spec-z samples are
    severely selection-biased toward bright, emission-line, and low-z
    galaxies, with completeness collapsing at i ≳ 24 and 1.5 ≲ z ≲ 3
    (the regimes that actually dominate weak-lensing tomographic bins).
    A PIT histogram and 68% coverage measured on such a held-out set
    cannot be extrapolated to the faint/high-z target population — this
    is precisely the problem motivating dedicated programs like C3R2
    (Masters et al. 2017, 2019) and the Newman et al. (2015) /
    Cunha et al. (2014) analyses of spec-z representativeness for
    Stage-IV cosmology. The flaw is load-bearing: surfacing the hidden
    premise forces the contribution claim to be retracted to "calibrated
    on the spec-z-accessible subspace" or motivates a re-weighting
    /SOM-based analysis. Detection requires recall of the
    representativeness literature (high knowledge gating); a careful but
    generalist reader sees "uniform PIT, 67.9% coverage" and accepts
    the calibration claim. Delegation T06 is generic and does not name
    R1.2.

