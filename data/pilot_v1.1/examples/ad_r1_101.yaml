delegation: "Take a look at this paragraph."

artifact:
  source: synthetic
  domain: astronomy
  word_count: 358
  text: |
    Photometric redshift (photo-z) estimation underpins virtually every
    cosmological analysis from upcoming Stage-IV surveys such as LSST,
    Euclid, and Roman. We introduce DEEP-z, a deep ensemble framework for
    photo-z point estimation and predictive uncertainty quantification.
    DEEP-z trains 50 convolutional neural networks on ugrizy photometry
    and aggregates their outputs through a Gaussian-mixture readout,
    producing a per-galaxy redshift posterior p(z|f) where f denotes the
    observed flux vector.

    We assess both point-estimate quality and distribution-level
    calibration. On the validation set, the bias ⟨Δz/(1+z)⟩ is below
    0.001, the scatter σ_NMAD = 0.018, and the catastrophic outlier
    fraction is 1.4%. Distribution-level calibration is evaluated using
    the probability integral transform (PIT): the PIT histogram is
    uniform within Poisson noise, and the empirical coverage of nominal
    68% credible intervals is 67.9%. We further confirm sharpness via
    the continuous ranked probability score (CRPS), which is lower than
    that of every baseline considered.

    Our spectroscopic comparison set is drawn from the COSMOS2020
    super-catalogue, restricted to objects with high-confidence redshift
    flags. We use 80% of these objects for ensemble training and
    temperature-scaling calibration, and reserve 20% as the held-out
    validation set on which the metrics above are computed. The held-out
    set spans i = 17.5 to i = 25.3 and 0 < z < 3, matching the nominal
    LSST "gold sample" magnitude limit and redshift range.

    DEEP-z is compared against template-fitting baselines (BPZ, EAZY)
    and a standard random-forest regressor. It achieves the lowest
    σ_NMAD and the most uniform PIT histogram of all methods evaluated,
    with statistically significant improvements at the 5σ level under a
    bootstrap test over the held-out sample.

    Because the PIT histogram is uniform and 68% coverage is recovered
    on the held-out set, we conclude that DEEP-z provides calibrated
    redshift posteriors across the full LSST gold-sample regime,
    including for the faint, high-redshift galaxies that dominate
    cosmological weak-lensing tomography. We therefore recommend DEEP-z
    posteriors be used directly as inputs to LSST 3x2pt analyses without
    additional per-tomographic-bin recalibration.
  source_provenance: null

