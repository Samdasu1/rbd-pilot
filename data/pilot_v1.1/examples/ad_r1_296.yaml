engineered_flaws:
  R1.4: [F1.4.b, F1.4.a]
  notes: |
    Control case for R1.4: the delegation "Position this against
    prior work" overtly cues the related-work / positioning dim, and
    the artifact's flaws live in that same dim.

    F1.4.b (missing nearest neighbor): the contribution is defined
    as "a probabilistic programming language for modeling ambiguous
    question answering" with a built-in abstain operator that
    decomposes predictive uncertainty. The survey covers (a) generic
    PPLs, (b) deep-learning calibration, and (c) Bayesian cognitive
    models of communication — three adjacent categories. It omits
    the obvious nearest-neighbor category: probabilistic programs
    and Bayesian models built specifically for question answering
    over knowledge bases or reading-comprehension corpora, including
    the broad line of work on probabilistic semantic parsing and
    Bayesian QA pipelines that explicitly model question
    interpretation as a latent variable. This omission is detectable
    from the artifact alone — the contribution paragraph and the
    related-work paragraphs describe different categories — without
    requiring recall of any specific named system.

    F1.4.a (unsupported novelty): the section twice asserts that
    QuPPL is the "first" system to expose interpretation-uncertainty
    as a first-class quantity and the "first" PPL whose abstain
    semantics rest on this decomposition, and concludes "no prior
    work occupies this point in the design space." These claims are
    unsupported because the survey actually conducted does not cover
    the nearest-neighbor category in which such a system would most
    plausibly already exist; the firstness claims therefore rest on
    an absence the survey did not establish.

