delegation: "Position this against prior work."

artifact:
  source: synthetic
  domain: probabilistic_programming
  word_count: 372
  text: |
    We introduce QuPPL, a probabilistic programming language whose
    primitives are designed for modeling ambiguous question answering:
    programs in QuPPL declare a joint distribution over a latent
    world-state and a latent question-interpretation, and inference
    returns a posterior over answers together with a decomposition of
    predictive uncertainty into world-uncertainty and
    interpretation-uncertainty. The language ships with a calibrated
    abstain operator built on top of this decomposition. We position
    this contribution against three lines of prior work.

    General-purpose probabilistic programming. A first body of work
    provides general-purpose languages — Turing-style universal PPLs
    with trace-based MCMC, languages built around variational
    inference over differentiable models, and embedded DSLs for
    factor-graph specification. These systems give the user a generic
    substrate for expressing joint distributions, but they expose no
    primitive for separating uncertainty about a referent from
    uncertainty about a referring expression. QuPPL is the first PPL
    in which this decomposition is a language-level construct rather
    than a modeling pattern the user must reinvent.

    Calibration and selective prediction in deep learning. A second
    line of work studies post-hoc calibration of classifier
    confidences and selective-prediction rules that abstain when a
    learned confidence falls below a threshold. These methods operate
    on a single scalar uncertainty signal and therefore cannot
    distinguish "I don't know which world we are in" from "I don't
    know which question you asked." QuPPL's two-axis abstain operator
    has no analog in this literature.

    Bayesian semantics for natural language. A third line of work
    formalizes lexical and pragmatic ambiguity using Bayesian models
    of communication, deriving posterior interpretations under a
    rational-listener prior. These models are descriptive
    cognitive-science accounts and do not provide a programmable
    inference engine that an application developer can call.

    Bringing these threads together, QuPPL is, to our knowledge, the
    first system to expose interpretation-uncertainty as a
    first-class quantity that downstream code can branch on, and the
    first PPL whose abstain semantics are grounded in this
    decomposition. No prior work occupies this point in the design
    space, and the calibrated abstain operator we describe in
    Section 4 is a genuinely new contribution to the
    probabilistic-programming literature.
  source_provenance: null

