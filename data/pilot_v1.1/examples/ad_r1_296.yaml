acceptable_outputs_summary: |
  Flags that the survey covers adjacent categories (generic PPLs,
  deep-learning calibration, Bayesian pragmatics) but omits the
  nearest-neighbor category the contribution itself defines —
  probabilistic programs and Bayesian models built specifically for
  question answering with latent question-interpretation variables —
  and that the repeated "first" / "no prior work occupies this point"
  claims therefore rest on an absence the survey did not actually
  establish. Asks the authors either to add and contrast that
  category or to soften the firstness claims accordingly.

bad_outputs_summary: |
  Polishes the three category paragraphs, suggests one or two
  additional citations within the existing categories, or accepts
  the "first PPL" and "no prior work occupies this point" framing
  because three lines have been surveyed. Misses that the obvious
  nearest-neighbor category — probabilistic QA / latent-interpretation
  models — is absent, and that the novelty claims are unsupported by
  the survey as written rather than merely overstated in tone.

