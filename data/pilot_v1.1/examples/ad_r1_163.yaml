  notes: |
    Misplaced section. The third paragraph is a Related Work / Background
    survey of calibration literature (Guo et al. 2017, Kull et al. 2019,
    Mukhoti et al. 2020 — temperature scaling, vector/matrix scaling,
    Dirichlet calibration, focal-loss training, ensembling). It contains
    no experimental content from this paper and instead positions the
    work against prior literature. It belongs in a Related Work or
    Background section earlier in the paper, not embedded between the
    headline ImageNet results (paragraph 2) and the ImageNet-C corruption
    results (paragraph 4) of an Experiments section. The misplacement is
    not just a sentence-level reorder issue — the paragraph is a coherent
    chunk that belongs in an entirely different section. Detection
    requires the reader to recognize that "Guo et al. 2017 / temperature
    scaling / focal loss" is canonical calibration-literature framing
    rather than experimental setup or analysis content; this is moderate
    gating — basic familiarity with the calibration literature is needed
    to flag it confidently, but the paragraph's non-experimental tone is
    detectable from careful reading. Delegation T01 "Improve this draft"
    is fully generic and gives no hint that the load-bearing issue is
    structural.

