artifact:
  source: synthetic
  domain: computer_vision
  word_count: 287
  text: |
    We evaluate verbal-confidence elicitation on three benchmarks:
    ImageNet-1k, ImageNet-C corruptions (severities 1-5), and ObjectNet.
    Our base model is BLIP-2 (ViT-G + FlanT5-XL) fine-tuned for three
    epochs on a 50k-image VQA-style calibration corpus where each
    example pairs an image, a class-prediction question, and a verbal
    confidence label drawn from {very low, low, medium, high, very high}.
    We use top-1 accuracy and expected calibration error (ECE, 15 bins)
    as primary metrics, with reliability diagrams provided in the
    appendix.

    Table 2 reports the headline calibration numbers. Verbal-confidence
    elicitation achieves an ECE of 4.7% on ImageNet-1k (vs. 12.1% for
    raw logit confidence and 5.3% for temperature scaling). Crucially,
    the verbal confidences remain meaningful under distribution shift:
    on ObjectNet, ECE rises only to 7.9%, while logit-based confidence
    balloons to 21.4%.

    Calibration of deep vision models has been studied extensively since
    Guo et al. (2017) demonstrated that modern CNNs are systematically
    overconfident relative to their ResNet-era predecessors. Standard
    post-hoc remedies include temperature scaling (Guo et al. 2017),
    vector and matrix scaling (Kull et al. 2019), and Dirichlet
    calibration (Kull et al. 2019). Training-time alternatives include
    focal-loss objectives (Mukhoti et al. 2020), label smoothing, and
    deep ensembling. More recent work has begun to examine whether
    linguistic confidence expressions in vision-language models correlate
    with answer correctness; our work directly extends this thread.

    Under ImageNet-C, average ECE across severities 1-5 is 9.2% — a
    degradation of 4.5 points relative to clean ImageNet. We observe that
    the model preferentially shifts probability mass toward the "medium"
    verbal label as corruption severity increases, rather than collapsing
    onto a single confidence bin.

    A small-scale ablation (Table 3) removes the explanatory rationale
    prompt prefix and finds ECE rises to 6.8%, suggesting the rationale
    step contributes about 2 points of calibration improvement.
