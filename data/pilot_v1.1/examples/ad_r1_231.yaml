engineered_flaws:
  R1.3: [F1.3.c]
  R1.7: [F1.7.c]
  notes: |
    Two load-bearing flaws, both detectable from careful internal
    reading without recall of canonical V2G or battery literature.

    R1.3 — inverted reading. The section's own numbers establish that
    RegRank produces $124/year in regulation revenue against $187/year
    in additional degradation cost, for a per-household net of
    -$63/year; the baseline produces $89 against $96, for -$7/year.
    Under the section's own valuation framework, V2G participation is
    a net loss for households under both policies, and RegRank is
    strictly worse than the baseline once degradation is netted out.
    The interpretive sentence — "RegRank delivers positive net returns
    to participating households" — is the opposite of what the table
    shows. The follow-on claim that "RegRank's revenue advantage over
    the baseline scales with fleet size" further compounds the
    inversion: the larger gross-revenue gap is precisely what produces
    the larger net loss, since degradation grows faster than revenue
    across the two policies. Fixing this requires either retracting the
    "positive net returns" framing (which dissolves the contribution as
    stated) or revaluing degradation, which would change the rest of
    the paper.

    R1.7 — stale citation, visible from the section itself. The
    degradation model is taken from Peterson et al. (2010), explicitly
    described in the section as characterizing NMC-chemistry cycling
    and adopting NMC per-cycle coefficients. The same paragraph states
    that the simulated fleet uses LFP cells. NMC and LFP have
    materially different cycle-life characteristics; importing
    NMC-derived per-cycle capacity-loss coefficients into an LFP fleet
    is a chemistry mismatch baked into the experimental setup. The
    staleness is detectable internally — no external recall is needed
    to see that the cited coefficients are derived for a chemistry
    different from the one being simulated, which by itself
    invalidates the $187/year degradation figure and therefore the
    net-return conclusion.

    Low gating: both issues sit on the page. The reader can verify
    inversion by subtracting two numbers in adjacent sentences, and
    can verify the chemistry mismatch by comparing the two sentences
    in the methodology paragraph that name LFP and NMC respectively.

