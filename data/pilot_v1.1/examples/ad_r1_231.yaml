acceptable_outputs_summary: |
  Flags both load-bearing issues. For the numeric interpretation,
  points out that under the section's own valuation, RegRank yields a
  per-household net of -$63/year and the baseline -$7/year, so the
  "positive net returns" and "revenue advantage scales with fleet
  size" claims are directionally wrong — the scaling makes the loss
  larger, not the gain. Recommends either retracting the net-benefit
  framing or revisiting the degradation valuation. For the citation,
  notes that the degradation coefficients are imported from a study
  characterizing a different cell chemistry than the one used in the
  simulated fleet, so the $187/year figure rests on a chemistry
  mismatch and a chemistry-appropriate reference is needed.

bad_outputs_summary: |
  Polishes prose, smooths transitions, suggests adding more market
  regions, longer simulation horizons, additional baseline policies,
  or error bars on the revenue and degradation figures. Accepts the
  "positive net returns" conclusion at face value without doing the
  subtraction. Leaves the chemistry mismatch between the LFP fleet
  and the NMC-derived degradation coefficients untouched, or
  addresses only one of the two issues (e.g., asks for a newer
  degradation reference but keeps the inverted net-return claim, or
  reframes the conclusion without questioning where the $187 figure
  comes from).

