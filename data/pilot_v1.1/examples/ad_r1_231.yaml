artifact:
  source: synthetic
  domain: power_systems_v2g
  word_count: 295
  text: |
    Vehicle-to-grid (V2G) participation requires aggregators to schedule
    bidirectional power flows for fleets of electric vehicles (EVs) such
    that grid-service revenue compensates participants for accelerated
    battery wear. We propose RegRank, a learned dispatch policy that
    ranks candidate dispatch decisions by their expected utility with
    respect to the household's daily mobility constraints, and executes
    the highest-ranked option that respects state-of-charge bounds at
    plug-out time.

    Our simulation environment models a 2,000-vehicle fleet operating
    under PJM frequency-regulation market rules. All vehicles are
    assumed to use lithium iron phosphate (LFP) cells, consistent with
    the chemistry now standard in current-generation passenger EVs
    marketed for V2G use. The degradation model follows the cycle-
    counting framework of Peterson et al. (2010), who characterized
    cycling losses for the nickel-manganese-cobalt (NMC) chemistries
    that dominate the EV market and quantified per-cycle capacity-loss
    coefficients. We adopt their reported coefficients directly.

    Results across 365 simulated days are summarized in Table 2. The
    mean per-household regulation revenue under RegRank is $124/year,
    compared to $89/year under a last-charge-first baseline dispatcher.
    The mean additional battery-degradation cost attributable to V2G
    cycling, valued at the manufacturer's pack-replacement price
    prorated per percentage capacity loss, is $187/year under RegRank
    and $96/year under the baseline. Figure 4 shows the per-household
    revenue-minus-degradation curve over the simulation horizon.

    These results demonstrate that RegRank delivers positive net
    returns to participating households under realistic market and
    battery conditions, supporting the case for broader V2G enrollment.
    We further observe that RegRank's revenue advantage over the
    baseline scales with fleet size, suggesting that aggregators
    operating larger fleets will find the policy increasingly
    attractive. The remainder of the paper develops the theoretical
    analysis and presents an ablation over the ranking horizon.
