artifact:
  source: synthetic
  domain: anomaly_detection
  word_count: 348
  text: |
    In this section we describe an anomaly detection framework that we
    developed for identifying potentially anomalous self-preference
    patterns in large language model judges, where a judge model may
    perhaps tend to score its own outputs somewhat more favorably than
    outputs produced by other models. The framework that we developed
    detects these potentially anomalous self-preference patterns by
    comparing score distributions, and the framework appears to detect
    these self-preference patterns with what seems to be reasonable
    accuracy on the evaluation suites that we considered.

    Our detection method takes as input a collection of judge scores
    and tries to identify possibly anomalous deviations from what one
    might roughly expect under a no-bias null hypothesis. We compute a
    statistic that may approximately capture the degree of deviation,
    and we then use this statistic to flag potentially anomalous judges
    for further review. The statistic that we use to flag potentially
    anomalous judges is, broadly speaking, a kind of likelihood ratio,
    and it appears to be more or less effective at flagging potentially
    anomalous judges in the settings that we examined.

    We evaluated the detection method on a benchmark of judge outputs
    that we collected, and the detection method achieved what we would
    tentatively describe as fairly competitive performance, with results
    that seem to be roughly comparable to or perhaps somewhat better
    than several existing approaches that we examined. The detection
    method appears to be relatively robust under varying prompt
    templates, and the detection method also appears to be relatively
    robust under varying score scales, although we should acknowledge
    that further and more comprehensive evaluation would likely
    strengthen these robustness claims to some extent.

    Furthermore, the detection method seems to potentially generalize,
    at least to some degree, to settings beyond those that we directly
    studied, and we believe that the detection method could plausibly
    be useful for practitioners who wish to detect potentially
    anomalous self-preference in deployed judge systems, though we
    acknowledge that additional validation would arguably be helpful
    to more firmly establish this generalization claim.
  source_provenance: null

