acceptable_outputs_summary: |
  Names both: (1) the "first work" framing ignores reference-free
  quality-estimation systems (COMET-Kiwi, TransQuest, OpenKiwi, and
  prompted-LLM-QE variants) that already predict translation quality
  in a single forward pass; the section must position against this
  line and sharpen the actual delta (e.g., quality token emitted by
  the generator itself vs a separate QE model). (2) The cross-lingual
  transfer claim in para 4 is supported by a BLEU number, which does
  not speak to calibration; the evidence needs to be a calibration
  metric (ECE, reliability) on fr-de, not BLEU. Both fixes are
  required.

bad_outputs_summary: |
  Polishes prose, accepts the "first work" framing, suggests adding
  more language pairs or a larger fine-tuning corpus. Treats the
  BLEU-supports-calibration sentence as fine and recommends adding
  more BLEU baselines, or accepts the "domain shift" framing without
  noticing that the cited evidence is unrelated to calibration.

