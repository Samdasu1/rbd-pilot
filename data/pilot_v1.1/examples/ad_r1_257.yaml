artifact:
  source: synthetic
  domain: machine_translation
  word_count: 278
  text: |
    Neural machine translation (NMT) systems routinely produce fluent
    outputs even when the underlying translation is unreliable, leading
    downstream users to over-trust erroneous translations in
    safety-sensitive contexts such as medical interpretation and legal
    documents. We address this by fine-tuning NMT decoders to emit a
    calibrated quality token alongside each translation, allowing the
    model itself to flag low-confidence outputs.

    Our fine-tuning corpus combines WMT direct-assessment scores with
    synthetic perturbations that probe the boundary between high- and
    low-quality translations. We discretize the human z-scores into
    five quality bins and append the bin label as a special token
    after the EOS marker; the decoder is then trained with standard
    cross-entropy on the concatenated (translation, quality-token)
    sequence. The resulting model produces quality tokens whose
    distribution closely tracks held-out human judgments (ECE = 0.041
    on WMT22 en-de, down from 0.187 for the unconditional
    softmax-probability baseline).

    To our knowledge, this is the first work to elicit calibrated
    translation-quality signals directly from a decoder by treating
    quality estimation as a continuation of the translation sequence.
    Earlier approaches such as Monte Carlo dropout and ensemble
    disagreement require multiple forward passes and substantially
    increase inference cost; our single-pass token approach removes
    this overhead.

    The calibration gains transfer to language pairs absent from the
    fine-tuning data. Because the quality tokens use a shared
    embedding across languages, the model achieves 31.2 BLEU on the
    held-out fr-de evaluation set, demonstrating that the approach is
    robust under domain shift. We further observe that the fine-tuned
    model outputs shorter translations on average (mean length ratio
    0.94 vs 1.02 for the base model), and we discuss the practical
    implications for downstream post-editing workflows in §5.
