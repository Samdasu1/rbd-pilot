engineered_flaws:
  R1.2: [F1.2.c]
  R1.4: [F1.4.b]
  notes: |
    Two compound issues:

    R1.4 missing nearest neighbor: the section claims to be "the first
    work to elicit calibrated translation-quality signals directly
    from a decoder" and only contrasts with MC-dropout and ensemble
    disagreement. The actual nearest neighbors are reference-free
    quality estimation systems — COMET-Kiwi (Rei et al. 2022),
    TransQuest (Ranasinghe et al. 2020), and the broader OpenKiwi /
    WMT QE shared-task lineage — which predict translation quality
    from (source, translation) pairs in a single forward pass.
    Several recent QE-as-decoding / prompted-LLM-QE variants also
    produce a quality token from the generation model itself. Without
    contrasting against this line, the novelty claim is unsupported.

    R1.2 non-sequitur: para 4 says "calibration gains transfer to
    language pairs absent from the fine-tuning data" and then
    supports this with a BLEU score on fr-de (31.2 BLEU). BLEU
    measures translation adequacy/fluency against a reference; it
    does not measure calibration of the quality tokens. The
    follow-on "demonstrating that the approach is robust under
    domain shift" does not follow from the cited evidence — to
    support transferred calibration, the paragraph would need an ECE
    or reliability-diagram statistic on fr-de, not a BLEU number.
    The cross-lingual-embedding rationale also does not connect
    embedding sharing to BLEU performance.

    Combined: fixing R1.4 (anchor against COMET-Kiwi / TransQuest /
    LLM-QE) reframes the contribution as an architectural variant of
    QE rather than a "first," and fixing R1.2 (replace the BLEU
    evidence with a calibration metric on the held-out pair) is
    needed for the transfer claim to stand. Either fix alone leaves
    the section's headline claims broken.

