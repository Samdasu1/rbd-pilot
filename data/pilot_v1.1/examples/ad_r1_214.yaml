  domain: causal_inference
  word_count: 408
  text: |
    Estimating heterogeneous treatment effects from observational data
    has become a central problem in modern causal inference.
    Practitioners increasingly rely on flexible machine-learning nuisance
    learners — gradient boosting, random forests, and neural networks —
    to estimate the propensity score and outcome regressions that enter
    doubly-robust estimators of the conditional average treatment effect
    (CATE). The uncertainty quantification accompanying these estimates,
    however, is often poorly calibrated: nominal 95% intervals can cover
    the true CATE far less than 95% of the time when the nuisance
    estimators are slow-converging or biased on subpopulations.

    In this paper we introduce CalDML, the first procedure that produces
    calibrated confidence intervals for CATE estimates obtained from
    arbitrary machine-learning nuisance learners. CalDML wraps any double
    machine-learning point estimator with a held-out calibration step that
    adjusts the interval width to achieve the nominal coverage level,
    regardless of the convergence rate of the underlying nuisance models.

    Related work. Our approach builds on the doubly-robust score
    functions of Robins and Rotnitzky (1995) and the cross-fitted DML
    framework of Chernozhukov et al. (2018), which established
    root-n asymptotic normality for average treatment effect estimates
    under fast-enough nuisance convergence. For heterogeneous effects,
    Wager and Athey (2018) introduced honest causal forests with
    pointwise confidence intervals that achieve the nominal coverage
    level under regularity conditions on the forest splits. Künzel et al.
    (2019) proposed the X-learner family, and Kennedy (2023) developed
    a doubly-robust learner with explicit rate conditions on the CATE
    function class.

    These prior methods rely on asymptotic arguments and require strong
    rate conditions on the nuisance learners. CalDML, in contrast, leans
    on a split-conformal-style calibration step that holds whenever the
    calibration fold is exchangeable with the deployment distribution,
    irrespective of how fast the nuisance learners converge. We frame
    this as a meaningful step beyond the existing toolbox for CATE
    inference.

    We evaluate CalDML on three semi-synthetic benchmarks (IHDP,
    ACIC-2018, and the Lalonde-style observational extension of Smith
    and Todd, 2005). Across all three, CalDML achieves empirical
    coverage within 1.5 percentage points of the nominal 95% level in
    settings where the underlying DML estimator under-covers by 8 to 15
    points, while inflating average interval width by less than 30%. We
    position CalDML as a practical default for CATE uncertainty
    quantification in applied causal-inference workflows.
