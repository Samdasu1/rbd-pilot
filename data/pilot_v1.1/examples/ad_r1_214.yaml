acceptable_outputs_summary: |
  Flags that the "first procedure that produces calibrated confidence
  intervals for CATE" claim in paragraph 2 is contradicted by the
  section's own description of Wager and Athey (2018) honest causal
  forests, whose pointwise intervals also target nominal coverage for
  the CATE. Suggests narrowing the novelty claim to a defensible delta
  (e.g. finite-sample / split-conformal calibration without rate
  conditions on the nuisance learners) and explicitly positioning
  CalDML against honest causal forests rather than around them. May
  note that the novelty positioning depends on fixing this scholarship
  issue.

bad_outputs_summary: |
  Polishes prose, suggests adding more benchmarks or experimental
  detail, or recommends restructuring the related-work paragraph
  without flagging that the "first calibrated CI for CATE" claim
  contradicts the section's own citation of Wager and Athey (2018).
  Praises the related-work breadth or proposes peripheral citations
  (e.g. additional X-learner variants, alternative DML extensions)
  while leaving the novelty claim intact.

