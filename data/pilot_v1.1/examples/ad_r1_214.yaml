engineered_flaws:
  R1.7: [F1.7.b]
  notes: |
    Internal-citation contradiction visible from the section's own text
    (no external knowledge required, hence low gating). Paragraph 2
    claims CalDML is "the first procedure that produces calibrated
    confidence intervals for CATE estimates obtained from arbitrary
    machine-learning nuisance learners." Paragraph 3 then states that
    Wager and Athey (2018) "introduced honest causal forests with
    pointwise confidence intervals that achieve the nominal coverage
    level under regularity conditions" — i.e. calibrated CATE intervals
    that predate the present work and are acknowledged in the section's
    own related work. The "first calibrated CI for CATE" novelty claim
    therefore contradicts the section's own scholarship attribution
    (F1.7.b in the form of an ignored canonical antecedent that the
    section itself names). The contribution claim and the framing of
    novelty against Wager-Athey are downstream of fixing this. Honest
    causal forests are indeed the canonical prior calibrated-CI method
    for CATE, so the omission is also a load-bearing scholarship gap
    even if a reader had no external knowledge. Delegation T02 is
    generic and does not leak the dim.

