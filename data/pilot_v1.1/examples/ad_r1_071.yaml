acceptable_outputs_summary: |
  Identifies that the section's opening contribution claim (multi-agent
  dialogue as the driver of accuracy) is contradicted by its own ablation
  and closing sentence (chain-of-thought within a single component as the
  driver), and asks the authors to commit to one thesis and rewrite the
  framing accordingly. Notes that as written the reader cannot tell what
  the paper is actually arguing for.

bad_outputs_summary: |
  Polishes prose, suggests reporting more baselines or larger evaluation
  splits, or asks for clarifying the threshold tau and the dialogue
  termination rule. Takes the multi-agent framing at face value and
  proposes adding more agent roles or richer inter-agent protocols,
  without flagging that the section's own evidence undercuts the
  multi-agent claim.

