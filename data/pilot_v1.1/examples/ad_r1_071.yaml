artifact:
  source: synthetic
  domain: computer_vision
  word_count: 312
  text: |
    We propose VisionCrew, a communicative multi-agent framework for
    compositional visual question answering. Drawing on recent interest in
    role-specialized LLM societies, VisionCrew decomposes a VQA query into
    three coordinated agents: a Perceiver that issues region-grounded
    captions, a Reasoner that integrates these captions into a candidate
    answer, and a Verifier that checks the candidate against the image via
    targeted re-prompting. Our central contribution is the demonstration
    that role-conditioned inter-agent dialogue yields more accurate
    compositional answers than monolithic VLM prompting.

    Each agent is instantiated as a frozen VLM (LLaVA-1.6) conditioned on a
    role-specific system prompt. Messages between agents are exchanged as
    natural-language turns, and the dialogue terminates when the Verifier
    emits a confidence token above a tuned threshold tau. We evaluate on the
    GQA-Compositional split, where queries require chaining two to four
    visual predicates.

    Across the 1,200-query test set, VisionCrew reaches 64.3% accuracy,
    compared to 58.7% for a single-agent LLaVA-1.6 baseline run with
    chain-of-thought prompting. We further observe that performance gains
    correlate strongly with the depth of intermediate reasoning produced by
    the Reasoner: queries answered via long deliberate chains improve by 9.1
    points, while queries answered via short chains improve by only 1.8.

    These results suggest that the principal driver of accuracy improvement
    is the elicitation of structured multi-step reasoning within the
    Reasoner, rather than any property of the agent decomposition itself. In
    our ablation, replacing the Perceiver and Verifier with passive prompt
    templates — leaving the Reasoner as the sole active component —
    recovers 4.9 of the 5.6-point gain. We therefore conclude that
    VisionCrew shows how carefully scaffolded chain-of-thought prompting
    unlocks compositional visual reasoning in frozen VLMs, offering a
    lightweight prompting recipe rather than a multi-agent system design
    for image understanding.
