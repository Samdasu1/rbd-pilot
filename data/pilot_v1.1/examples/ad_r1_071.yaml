engineered_flaws:
  R1.1: [F1.1.a]
  notes: |
    Thesis drift. Para 1 states the central contribution as a
    communicative multi-agent framework, with role-conditioned inter-agent
    dialogue as the load-bearing claim. By para 4 the contribution has
    drifted: the ablation removes the Perceiver and Verifier and recovers
    almost all of the gain, and the closing sentence reframes the work as
    "a lightweight prompting recipe rather than a multi-agent system
    design." The opening thesis (multi-agent dialogue is the driver) and
    the closing thesis (Reasoner-internal chain-of-thought is the driver)
    are incompatible, and the section never acknowledges the shift.
    Detection requires only careful reading of the section against itself;
    no recall of canonical multi-agent or VQA papers is needed (low
    gating). The delegation "Review this section" is generic and does not
    point at thesis coherence specifically.

