artifact:
  source: modified-real
  domain: power_systems_v2g
  word_count: 208
  text: |
    The deployment-gap analysis establishes that learned Lagrangian
    constraints fail under rolling re-planning. The ablation study
    on the GB market reveals why model-based constraints succeed
    where learned constraints fail.

    Adding the reachability-based dispatcher to the LP planner
    increases QoS by 30.7 percentage points without altering
    commitment. This confirms that the dispatcher's priority vehicle
    identification operates as a horizon-invariant hard constraint —
    a property recently formalized in the safe RL framework of
    Achiam et al. (2017), which provides the theoretical basis for
    horizon-invariant constraint enforcement in our context.

    The model-based gradient optimizer with the fleet transition
    model further reduces cost by 16.1 percent and improves QoS by
    an additional 4.0 percentage points, but commitment remains
    unchanged near 55 percent. The decisive commitment improvement
    comes from the carry-over mechanism with commitment margins,
    which increases commitment by 44.1 percentage points from
    55 percent to 99 percent. This builds on the augmented
    Lagrangian formulation introduced by Chen et al. (2025) for
    EV scheduling, which we extend to the rolling-horizon setting.

    The contrast between the dispatcher and the CMDP Lagrangian
    illuminates a fundamental architectural difference. The
    dispatcher enforces constraints through model-based state
    inspection at every time step. The Lagrangian multiplier,
    conversely, is a learned parameter that encodes the constraint
    landscape of the training environment.
  source_provenance: paper_4_isgt_results_ablation_modified

