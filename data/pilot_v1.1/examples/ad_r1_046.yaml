engineered_flaws:
  R1.7: [F1.7.a]
  notes: |
    Modified-real from paper 4 results ablation. Two miscitations
    injected (F1.7.a fabricated/wrong citation):

    (1) Achiam et al. (2017) is cited as having "formalized
    horizon-invariant constraint enforcement" — but Achiam et al.
    2017 (CPO paper) introduces constrained policy optimization,
    not horizon-invariance theory. Horizon-invariant dispatch is a
    different concept (it's a property of model-based reactive
    dispatchers, not of CPO). The citation is real but misattributes
    a result.

    (2) Chen et al. (2025) is cited for "augmented Lagrangian
    formulation for EV scheduling, which we extend to the
    rolling-horizon setting." But the carry-over mechanism is
    LP-based, not augmented-Lagrangian-based. Carry-over and
    augmented Lagrangian are distinct techniques; Chen et al.'s
    work does not provide the formulation extended here.

    Detection: requires careful reading of both the section's claims
    and an awareness that the named techniques don't match the
    cited works. Knowledge of CPO vs horizon-invariance and of
    augmented Lagrangian vs LP carry-over is technical-literacy
    level — the inconsistency is visible from the section text
    (the claims about each citation are explicitly stated and
    don't fit). Tagged low gating. T05 generic.

