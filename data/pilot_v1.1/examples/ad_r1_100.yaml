artifact:
  source: synthetic
  domain: causal_inference
  word_count: 268
  text: |
    We present CausalRoute, a framework for selecting between a large and a
    small language model on a per-prompt basis using doubly-robust causal
    estimation. CausalRoute treats model assignment as a binary treatment
    T in {S, L} and observed task success as the outcome Y, so that the
    routing problem reduces to estimating the conditional average
    treatment effect tau(x) = E[Y(L) - Y(S) | X = x], where Y(L) and Y(S)
    are the potential outcomes under the large and small models.

    Our training corpus consists of 50K prompts each scored by both models,
    yielding paired (Y(L), Y(S)) observations and removing the need for
    propensity reweighting at fit time. We train a gradient-boosted
    regressor on prompt features (token length, embedding centroid, and
    reference-model perplexity) to predict tau(x). On a held-out split the
    meta-model attains MSE 0.043 on the binary success indicator and R^2
    of 0.71 against the empirical CATE.

    Because the meta-model attains low MSE on the success indicator, the
    threshold policy "query L whenever predicted tau(x) > c / Delta$" is
    therefore the unique cost-optimal policy under every monotone utility,
    and any deviation from this policy strictly increases expected
    deployment cost.

    Empirically, CausalRoute reduces dollar cost by 38% relative to an
    always-large baseline while retaining 97% of its success rate, and
    improves cost-adjusted error by 12 points over a confidence-cascade
    baseline. We attribute these gains to the doubly-robust formulation,
    which is robust to misspecification of either the outcome model or
    the propensity model.
  source_provenance: null

