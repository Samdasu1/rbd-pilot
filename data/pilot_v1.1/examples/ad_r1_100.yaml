engineered_flaws:
  R1.2: [F1.2.c]
  notes: |
    Non-sequitur in paragraph 3. The premise (the meta-model achieves low
    MSE / R^2 = 0.71 on a held-out split) does not entail any of the
    three conclusions chained to it: (i) uniqueness of the threshold
    policy, (ii) optimality "under every monotone utility," or (iii) the
    strict claim that "any deviation ... strictly increases expected
    cost." Accurate CATE prediction yields a policy that is good in
    expectation, not a uniquely cost-optimal policy across all monotone
    utilities, and prediction MSE does not license strict per-deviation
    suboptimality. The leap from a regression-quality statistic to a
    universal optimality claim is the load-bearing flaw. Detection does
    not require canonical causal-inference references — only noticing
    that the "therefore" is unearned (low gating). Delegation T03
    ("Make this stronger.") is generic and does not name logical
    soundness.

