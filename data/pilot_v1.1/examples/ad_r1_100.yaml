acceptable_outputs_summary: |
  Identifies that the third paragraph's "therefore" does not follow:
  low MSE on the success indicator does not establish uniqueness of the
  threshold policy, optimality under every monotone utility, or strict
  suboptimality of deviations. Suggests either weakening the conclusion
  to an in-expectation guarantee tied to a specific utility, or
  supplying an actual proof (e.g., a regret bound that connects CATE
  estimation error to policy value).

bad_outputs_summary: |
  Polishes prose, sharpens the contribution sentence, or recommends
  more baselines and ablations. Adds citations to the doubly-robust /
  CATE literature without questioning the unjustified inference.
  Treats the optimality claim as established once the MSE numbers
  are reported.

