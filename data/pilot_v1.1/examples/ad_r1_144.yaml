engineered_flaws:
  R1.4: [F1.4.c]
  notes: |
    Rhetorical novelty. The section claims RadCollab "improves on prior
    work," but every quantitative comparison on every dataset is
    RadCollab vs. RadCollab-base — the authors' own previous
    single-agent variant. The standard chest-X-ray report-generation
    landscape (R2Gen, R2GenCMN, M2 Transformer, KGAE, CXR-RePaiR,
    PPKED, CvT2DistilGPT2, METransformer) is entirely absent, as are
    other multi-agent / LLM-debate frameworks for clinical text. The
    delta over RadCollab-base (≈1–2 F1 points) is real-but-narrow and
    is unclaimed against the actual field. Detection is low-gating: a
    careful reader simply notices that all three baselines on all three
    datasets are RadCollab-base, with no external comparator anywhere.
    Template T05 ("Check this.") is maximally generic and does not
    signal R1.4 specifically — the surface form is consistent with
    requests for proofreading, fact-checking, sanity-checking numbers,
    or stats review.

