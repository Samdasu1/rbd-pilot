acceptable_outputs_summary: |
  Identifies that every baseline across all three datasets is the
  authors' own RadCollab-base and flags this as an insufficient basis
  for the "improves on prior work" framing. Names concrete missing
  comparators from the chest-X-ray report-generation field (e.g.
  R2Gen / R2GenCMN / M2 Transformer / KGAE or similar) that the section
  should be benchmarked against. Recommends rewording the contribution
  to a defensible delta against the actual field rather than self-
  comparison.

bad_outputs_summary: |
  Polishes the prose, tightens the abstract-style framing, or suggests
  reporting additional metrics (BLEU, ROUGE) and confidence intervals
  on the existing RadCollab-vs-RadCollab-base comparisons. Praises the
  attending-agent debate mechanism as a meaningful innovation and adds
  peripheral citations to multi-agent LLM work without questioning that
  no external report-generation baseline appears anywhere in the
  evaluation.

