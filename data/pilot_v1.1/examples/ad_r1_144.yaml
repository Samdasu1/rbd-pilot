artifact:
  source: synthetic
  domain: medical_imaging
  word_count: 295
  text: |
    Diagnostic image interpretation increasingly relies on multi-step
    reasoning that mirrors how radiologists triage findings. We present
    RadCollab, a multi-agent framework in which one LLM agent plays a
    "junior reader" that proposes candidate findings from a chest
    radiograph captioning backbone, while a second "attending" agent
    challenges, prunes, and ranks those findings before a structured
    report is emitted. RadCollab improves on prior work by allowing the
    role-conditioned debate to terminate adaptively when the two agents
    converge on a finding set.

    We evaluate on three chest X-ray benchmarks: MIMIC-CXR, IU X-Ray,
    and a private dataset of 4,200 frontal radiographs collected at our
    partner hospital. On MIMIC-CXR, RadCollab achieves a CheXbert F1 of
    0.408, compared to 0.391 for RadCollab-base (Anonymous Authors,
    2024), our previously published single-agent variant. On IU X-Ray,
    we achieve 0.512 versus 0.498 for RadCollab-base. On the private
    set, we achieve 0.467 versus 0.451 for RadCollab-base.

    Section 4 ablates the role-conditioning prompt and shows that
    removing the attending-challenge loop drops F1 by 1.5 points on
    average across the three datasets, confirming that the debate
    dynamic, not raw scale, drives the gain. Section 5 inspects 60
    agent transcripts and finds that disagreements concentrate on
    subtle pleural findings — the exact category where junior radiology
    trainees are known to over-call.

    We position RadCollab as a successor to RadCollab-base, building on
    its captioning backbone with the addition of two-agent role-play.
    Because the attending agent operates purely at the language layer,
    the framework is image-encoder agnostic and can be retrofitted onto
    any deployed report-generation system, which we believe marks a
    meaningful step toward agent-mediated radiology drafting in
    production pipelines.
