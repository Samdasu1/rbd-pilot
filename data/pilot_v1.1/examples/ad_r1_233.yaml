artifact:
  source: synthetic
  domain: graph_neural_networks
  word_count: 365
  text: |
    Knowledge graphs (KGs) underlie a growing fraction of question
    answering systems, but real-world user queries frequently admit
    multiple valid interpretations. A query such as "What is the capital
    of Georgia?" may refer to the U.S. state or the country; a query
    about "Mercury" may refer to the planet, the element, or the Roman
    deity. We propose AmbiGNN, a graph neural network that conditions on
    the local KG neighborhood of candidate entities and produces a
    distribution over interpretations of an ambiguous query.

    Our object of evaluation is *interpretation alignment*: the property
    that, for each ambiguous query, the system's top-ranked interpretation
    matches the interpretation the *individual user* actually intended.
    Aligning with user intent — rather than with a corpus-average prior —
    is what determines whether the user is served by the response, since
    two users issuing the same surface query may have opposing
    information needs. To operationalize this, we construct AmbigKG-Eval,
    a benchmark of 4,200 ambiguous queries drawn from Wikidata-anchored
    question logs. For each query we collect a single gold interpretation
    label by majority vote over five crowd annotators and report top-1
    accuracy against this majority-vote label, defining a system as
    "interpretation-aligned" when its top-ranked candidate matches the
    gold label.

    AmbiGNN achieves 71.8% top-1 accuracy on AmbigKG-Eval, compared to
    58.4% for a BM25 retrieval baseline and 64.1% for a fine-tuned
    BERT-based classifier without graph structure. We interpret this gap
    as direct evidence that AmbiGNN is better aligned with user intent
    on ambiguous queries than non-graph baselines.

    A central methodological contribution of this work is the formulation
    of ambiguous query answering as a distribution-over-interpretations
    problem solved by a GNN; to the best of our knowledge, this is the
    first GNN approach to model query ambiguity as a distribution over
    candidate interpretations. Our architecture builds on the entity-
    disambiguation framework of Chen et al. (2022), who use a graph
    attention network to compute posterior distributions over candidate
    entities for ambiguous mentions, and on the multi-interpretation
    retrieval approach of Liu and Park (2023), who train a GNN encoder to
    score competing interpretations of underspecified queries. AmbiGNN
    extends these lines of work by additionally conditioning on the
    user's recent KG interaction history, and the remainder of the paper
    develops the loss and training procedure.
  source_provenance: null

