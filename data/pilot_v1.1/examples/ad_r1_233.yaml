acceptable_outputs_summary: |
  Flags both load-bearing issues. For the metric, points out that the
  section defines its target as per-individual-user intent and
  explicitly disclaims the corpus-average prior, yet operationalizes
  evaluation as top-1 accuracy against a majority-vote label — which
  is exactly the corpus-average prior — so the "better aligned with
  user intent" interpretation is not supported and could rerank
  systems if measured against per-user labels, distributional targets,
  or minority-sense recall. For the prior work, notes that the "first
  GNN approach to model query ambiguity as a distribution over
  candidate interpretations" claim cannot coexist with the two cited
  GNN works (Chen et al. 2022; Liu and Park 2023) that the section
  itself describes as doing the same thing, and asks the authors to
  either retract the priority claim, reframe the contribution around
  the actual differentiator (user-history conditioning), or treat the
  cited works as direct comparators with reported numbers.

bad_outputs_summary: |
  Polishes the prose, suggests adding more baselines, larger annotator
  pools, error bars on accuracy, or a nicer figure of the
  distribution. Accepts majority-vote top-1 accuracy as a measure of
  per-user intent alignment without questioning the construct match
  against the section's own definition. Treats Chen et al. (2022) and
  Liu and Park (2023) as helpful background rather than as prior art
  that undermines the "first GNN approach" claim, or addresses only
  one of the two issues (e.g., softens the "first" wording to "among
  the first" while leaving the metric–construct mismatch intact).

