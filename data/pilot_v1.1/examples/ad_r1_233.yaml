engineered_flaws:
  R1.3: [F1.3.b]
  R1.7: [F1.7.b]
  notes: |
    Two load-bearing flaws, both detectable from careful internal
    reading without recall of canonical works in entity disambiguation
    or KG-QA literature.

    R1.3 — metric mismatch. The section defines its object of
    evaluation, interpretation alignment, as the property that the
    system's top-ranked interpretation matches "the interpretation the
    *individual user* actually intended," and underscores that aligning
    with user intent — "rather than with a corpus-average prior" —
    is what matters because "two users issuing the same surface query
    may have opposing information needs." The metric it then reports is
    top-1 accuracy against a single gold label produced by majority
    vote over five crowd annotators. A majority-vote label is, by
    construction, the corpus-average prior the section itself disclaims
    as the wrong target: it collapses minority-but-correct
    interpretations into errors and rewards systems that always pick
    the population-majority sense even when an individual user wanted
    the minority sense. The interpretive sentence ("better aligned with
    user intent on ambiguous queries") is therefore not supported by
    the metric. Fixing this requires a metric tied to per-user intent
    — e.g., evaluation against per-user labels, distributional metrics
    against the empirical interpretation distribution, or a
    minority-sense recall — which would change what the section
    reports and could rerank AmbiGNN against the BERT baseline.

    R1.7 — missing key prior work. The section asserts, "to the best
    of our knowledge, this is the first GNN approach to model query
    ambiguity as a distribution over candidate interpretations," and
    in the immediately following sentences attributes essentially the
    same formulation to two prior works it cites as background:
    Chen et al. (2022), who "use a graph attention network to compute
    posterior distributions over candidate entities for ambiguous
    mentions," and Liu and Park (2023), who "train a GNN encoder to
    score competing interpretations of underspecified queries." Both
    cited works are GNN methods that produce distributions over
    candidate interpretations of ambiguous inputs, which is the
    contribution the section claims as first. The section treats them
    as friendly building blocks rather than as prior art that the
    contribution claim must be defended against; the load-bearing
    omission is the missing engagement with these works as competitor
    methods. Either the priority claim must be retracted, or the actual
    differentiator (KG-interaction-history conditioning) must be
    promoted to the contribution and the related work positioned as
    direct comparators with reported numbers.

    Low gating: a reader does not need to know whether Chen et al.
    (2022) or Liu and Park (2023) exist, nor recall canonical entity-
    disambiguation literature, to see (a) that a single majority-vote
    label cannot measure a per-user-intent property the section itself
    defined, and (b) that "first GNN approach to model query ambiguity
    as a distribution over candidate interpretations" cannot coexist
    in the same paragraph with two cited GNN approaches that do exactly
    that.

