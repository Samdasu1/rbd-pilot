  text: |
    The proliferation of large language model (LLM) based agents on
    crowdsourcing platforms has prompted a wave of methodological work
    aimed at distinguishing synthetic respondents from genuine human
    participants. Three classes of detection approach have emerged:
    behavioral signatures (mouse trajectories, keystroke timing),
    open-ended response analysis, and embedded probes that exploit
    known LLM failure modes such as token-level repetition penalties
    or refusal patterns on adversarial prompts.

    Our work builds most directly on Henderson and Park (2021), who
    introduced the first systematic benchmark for separating human
    and LLM-generated responses on open-ended survey items. Their
    classifier, trained on a corpus of 12,400 responses generated by
    GPT-4 and Claude 3.5 Sonnet alongside matched human responses
    from Prolific, achieved 84.2% balanced accuracy on held-out
    items and has since become the de facto reference point for the
    detection literature. Subsequent work (Liu et al., 2024;
    Ortega-Williams, 2024) has reported incremental gains on the
    Henderson-Park benchmark using transformer-based stylometric
    features.

    We propose AgentSift, a detection pipeline that combines
    stylometric features with a novel "consistency probe" — a pair
    of semantically equivalent items presented in different syntactic
    frames at separated points in the questionnaire. LLM agents, we
    hypothesize, will exhibit higher cross-frame consistency than
    humans, because their responses are generated from the same
    underlying representation regardless of surface form, whereas
    human respondents introduce genuine variability driven by mood,
    fatigue, and recall failure.

    We evaluate AgentSift on the Henderson-Park benchmark and on a
    new dataset of 4,200 paired responses we collected on Prolific
    in early 2025. On the Henderson-Park benchmark, AgentSift reaches
    91.7% balanced accuracy, a 7.5 point absolute improvement over
    the original classifier. On our new data, AgentSift maintains
    88.4% balanced accuracy against a mixed pool of human respondents
    and agents driven by GPT-4o, Claude 3.7, and Llama 3.3.

    These results establish AgentSift as the strongest published
    detection method on the standard benchmark and suggest that
    surface-level stylometric features, while useful, are
    insufficient on their own; the consistency probe carries roughly
    half of the gain in our ablation. We position AgentSift as a
    practical tool for behavioral researchers who depend on
    platform-recruited samples for downstream inference.
