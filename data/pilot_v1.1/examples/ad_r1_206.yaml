engineered_flaws:
  R1.7: [F1.7.a]
  notes: |
    Fabricated citation detectable from careful reading without
    specialized recall. The section attributes its load-bearing
    baseline to "Henderson and Park (2021)", and describes that
    paper as having trained its classifier on responses generated by
    "GPT-4 and Claude 3.5 Sonnet". GPT-4 was released in March 2023
    and Claude 3.5 Sonnet in June 2024; a 2021 paper cannot have
    used either model. The internal date/model inconsistency is
    visible from the section's own text, and any reader with passing
    awareness of LLM release timelines (low gating) will catch it.
    The fabrication is load-bearing: the "7.5 point absolute
    improvement" headline result and the framing of AgentSift as
    "the strongest published detection method on the standard
    benchmark" both depend on Henderson-Park being a real reference
    point. Removing the fabricated citation collapses both the
    quantitative comparison and the positioning claim. The rest of
    the section (conceptual setup, consistency-probe hypothesis,
    new-data evaluation) is internally coherent — only the
    prior-work attribution is broken. Delegation T03 ("Make this
    stronger.") is generic and does not name R1.7.

