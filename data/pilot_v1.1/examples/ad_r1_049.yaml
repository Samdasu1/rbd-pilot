engineered_flaws:
  R1.2: [F1.2.b]
  R1.4: [F1.4.c]
  notes: |
    Modified-real from paper 4 approaches CMDP. Two compound issues:

    R1.4 rhetorical novelty: para 1 claims "the first principled
    approach to commitment-aware V2G scheduling, distinguishing our
    work from soft-penalty approaches." Constrained-MDP/Lagrangian
    methods for V2G have prior art (e.g., Achiam-style CPO has been
    applied to power systems before). The "first principled" claim
    overstates novelty without contrast.

    R1.2 cross-section contradiction: para 3 says "this calibration
    breaks" under rolling re-planning and explains why ("multiplier
    does not adapt"). Para 4 then claims the framework "automatically
    detects and adapts to operational horizon changes through online
    recalibration" — directly contradicting para 3. The original
    paper's CMDP description does NOT have online recalibration; it
    is precisely what the deployment gap exposes as missing. The
    final-paragraph claim of "online recalibration" was added,
    contradicting the rest of the section.

    Combined: fixing R1.4 (drop "first principled") needs to
    coordinate with fixing R1.2 (remove the "online recalibration"
    claim) — both are inflated framings of what the section actually
    describes.

