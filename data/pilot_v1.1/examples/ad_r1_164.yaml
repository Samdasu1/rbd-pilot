  text: |
    4 Experimental Setup

    We evaluate ToolCalibrate on three benchmark tool-use environments —
    WebShop, ToolBench, and ALFWorld — each providing diverse multi-turn
    interaction scenarios with web, API, and embodied tools respectively.
    For each task we report expected calibration error (ECE), Brier score,
    and final task success rate. We use GPT-4 and Llama-3-70B as backbone
    models and compare against three baselines: vanilla prompting,
    self-consistency, and verbalized confidence elicitation.

    Across all three benchmarks, ToolCalibrate reduces expected calibration
    error by an average of 38% relative to vanilla prompting, with the
    largest gains observed on ToolBench (47% relative reduction). Brier
    scores improve by 0.12 on average across both backbone models.
    Importantly, these calibration improvements come without sacrificing
    task success: success rates differ by less than 1.5 percentage points
    from the strongest baseline.

    We also find that self-consistency, while improving accuracy,
    surprisingly worsens calibration on long-horizon tasks. We attribute
    this to the agent's tendency to converge on high-confidence wrong
    answers when sampled trajectories share the same systematic bias.
    ToolCalibrate's per-step uncertainty propagation avoids this failure
    mode, suggesting that calibration and accuracy can be jointly improved
    only when uncertainty is tracked at the action level rather than the
    trajectory level.

    Each experiment is run with three random seeds. Hyperparameters were
    selected via grid search on a held-out validation split of WebShop,
    with learning rate ∈ {1e-4, 5e-5, 1e-5} and KL penalty β ∈ {0.05,
    0.1, 0.2}. We use AdamW with weight decay 0.01 and train for 5 epochs
    on a single A100 GPU.

    A full ablation over the uncertainty estimation module, the
    temperature recalibration step, and the trajectory-level scoring
    component confirms that all three components contribute, with
    temperature recalibration accounting for the largest single share of
    the calibration improvement.
