  R1.5: [F1.5.b]
  notes: |
    Misplaced section. The section is explicitly headed "4 Experimental
    Setup", but paragraphs 2, 3, and 5 report numerical findings,
    interpret them, and draw a substantive claim ("calibration and
    accuracy can be jointly improved only when uncertainty is tracked at
    the action level"). Those paragraphs belong in a Results / Findings
    / Analysis section, not Experimental Setup. A correctly placed
    Experimental Setup section would contain only paragraphs 1 and 4
    (benchmarks, metrics, baselines, hyperparameters, training regime).
    The result is that a reader looking for the experimental protocol
    has to wade through claims and findings, while a reader looking for
    findings has to hunt inside a section labeled Setup.
    Detection: a careful reader notices the section header does not
    match three of its five paragraphs — no canonical NLP knowledge
    needed (low gating). Delegation T06 "Take a look at this paragraph"
    is generic and does not signal R1.5.

