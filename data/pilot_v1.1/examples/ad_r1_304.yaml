engineered_flaws:
  R1.7: [F1.7.a, F1.7.b]
  notes: |
    F1.7.a (fabricated citation): "Kowalski et al. (2019)" is attributed
    as the "original COMET formulation," but the section itself cites
    COMET as "Rei et al. (2020)" two sentences earlier. The internal
    contradiction is visible without canon knowledge — a careful reader
    sees the same metric attributed to two different works in adjacent
    sentences, and the 2019 attribution is also temporally inconsistent
    with the 2020 attribution given as the metric's anchor citation.

    F1.7.b (missing key prior work): The section's motivating premise —
    that crowd workers increasingly use LLMs for text-production tasks —
    is asserted in paragraph 1 with no citation, and the "first
    systematic study" claim in paragraph 2 ignores the established line
    of work that has documented and quantified LLM use among crowd
    workers on platforms like MTurk and Upwork. A reference to that
    prior work (the canonical "crowd-workers-using-LLMs" line) is the
    obvious anchor for the motivation and is conspicuously absent; its
    absence is detectable from the text itself because the motivating
    phenomenon is treated as common knowledge yet uncited, and the
    novelty claim is positioned without acknowledging the upstream
    finding it builds on.

    Control case: T05 "Check the citations" directly cues R1.7, and the
    load-bearing flaw is in R1.7 — full leakage by spec §2.5. Cross-family
    d_C is expected to be near zero; if d_C > 0.10 the projection prompt
    is broken, not a finding.

