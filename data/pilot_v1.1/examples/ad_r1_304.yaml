acceptable_outputs_summary: |
  Flags the contradictory attribution of COMET (Rei et al., 2020 in one
  sentence; Kowalski et al., 2019 as its "original formulation" two
  sentences later) and questions whether the 2019 reference exists.
  Also notes that the motivating claim about crowd workers using LLMs
  is uncited and that the "first systematic study" framing ignores the
  prior line of work documenting LLM use among crowd workers, which
  should be cited as the upstream anchor.

