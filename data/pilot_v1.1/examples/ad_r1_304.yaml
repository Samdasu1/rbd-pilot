artifact:
  source: synthetic
  domain: machine_translation
  word_count: 298
  text: |
    In this section we examine how the rising use of large language models
    among crowd workers affects reference translations used in machine
    translation (MT) evaluation. As crowdsourcing platforms have become
    central to constructing parallel corpora for low-resource language
    pairs (Gray and Suri, 2019), the accessibility of generative tools
    raises a methodological concern: when crowd workers produce reference
    translations with LLM assistance, evaluation metrics computed against
    these references may inflate apparent system performance for MT
    systems that share representational similarity with the assisting LLM.

    We propose RefAudit, a framework for detecting LLM-assisted
    contamination in crowd-sourced reference translations. RefAudit
    compares lexical entropy, length distribution, and n-gram diversity
    of crowd outputs against a baseline of pre-2022 references on the
    same source segments. To our knowledge, this is the first systematic
    study of LLM contamination in MT reference data.

    We evaluate RefAudit on the WMT22 General Translation task (Kocmi
    et al., 2022), focusing on the En-De and En-Zh pairs. Our analysis
    reveals that approximately 18% of crowd-collected references exhibit
    statistical signatures consistent with LLM assistance. BLEU scores
    (Papineni et al., 2002) computed against contaminated references
    overestimate system quality by 1.2–2.4 points compared to filtered
    subsets.

    We additionally compare against the COMET metric (Rei et al., 2020),
    which we find is more robust to contamination than BLEU but still
    exhibits a residual inflation of approximately 0.8 points on
    contaminated subsets. As Kowalski et al. (2019) showed in their
    original COMET formulation, neural evaluation metrics are sensitive
    to reference quality; our results extend this observation to the
    LLM-contamination regime.

    Liu and Tang (2024) developed watermarking-based detection for
    LLM-generated translation outputs in shared task submissions.
    RefAudit complements this line of work by targeting the reference
    side rather than the system side.
