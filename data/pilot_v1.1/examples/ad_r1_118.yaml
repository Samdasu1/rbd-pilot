acceptable_outputs_summary: |
  Identifies that the central claim is about human preference / human
  alignment, but every reported number measures judge-judge agreement or
  within-system stability rather than agreement with human ratings.
  Notes that high inter-judge kappa is consistent with shared bias and
  does not validate human alignment, and recommends either reporting
  correlation with a human-rated subset of PartiPrompts or softening
  the claim to "reliability and inter-judge consensus" rather than
  human alignment.

bad_outputs_summary: |
  Polishes the prose, suggests adding more T2I systems or judges, or
  questions the choice of majority vote vs. mean aggregation. Accepts
  the "human-aligned" framing at face value because kappa values are
  high. Recommends additional stability experiments or a fourth judge
  without noticing that no human ratings appear anywhere in the
  evaluation.

