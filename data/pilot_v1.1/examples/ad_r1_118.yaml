engineered_flaws:
  R1.3: [F1.3.b]
  notes: |
    Metric mismatch (F1.3.b). The load-bearing claim is that VisionPoLL
    "better reflects human preferences," "tracks human preferences," and
    is "more human-aligned" than single-judge baselines. The metrics
    actually reported are:
      - Inter-judge agreement (Fleiss' kappa across the three model
        judges)
      - Score variance across temperature samples
      - Run-to-run pairwise Spearman correlation under prompt shuffling
    None of these metrics involve human ratings at all. They measure
    inter-judge consensus and within-system stability, which are
    reliability properties, not validity properties. To support a
    "human preference / human alignment" claim, the section would need
    correlation (Spearman/Kendall) between panel scores and an
    actual human-rated subset of PartiPrompts, or pairwise-preference
    agreement with human annotators. The reported metrics are
    self-referential: high judge-judge agreement is consistent with
    judges sharing the same systematic bias away from humans.
    Detection is pure reading — no canonical recall needed. The
    delegation "Check this." is fully generic and gives no hint about
    metrics or claims (no leakage).

