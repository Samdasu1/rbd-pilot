artifact:
  source: synthetic
  domain: machine_learning
  word_count: 472
  text: |
    We propose ROUTE-Q, a query-conditioned routing policy that, given
    a user prompt x, outputs a distribution over a pool
    M = {m_1, ..., m_K} of candidate LLMs differing in cost, latency,
    and capability. The policy is parameterised as a small frozen
    encoder followed by a softmax head and is trained to minimise an
    expected serving cost subject to a per-query quality constraint
    estimated from a learned reward model.

    Concretely, ROUTE-Q is fit on a dataset D of tuples
    (x, {(m_k, y_k, q_k, c_k)}), where y_k is the response of model
    m_k on prompt x, q_k is its scalar quality score under the reward
    model, and c_k is its measured per-token serving cost. The training
    objective is
    L(θ) = E_x[Σ_k π_θ(k|x) c_k] + β · max(0, τ − E_x[Σ_k π_θ(k|x) q_k]),
    with the Lagrangian-style penalty coefficient β tuned on a
    held-out validation slice and the quality threshold τ fixed in
    advance.

    A line of prior work has examined LLM model selection under cost
    constraints. FrugalGPT (Chen et al., 2023) introduced an LLM
    cascade that escalates from cheaper to more expensive models when
    a scoring function judges the cheap model's answer unreliable, and
    RouteLLM (Ong et al., 2024) framed the routing problem as
    preference-based binary classification between a strong and a weak
    model trained from Chatbot Arena traces. AutoMix uses few-shot
    self-verification to decide cascade exit, while Tabi targets
    discriminative serving by routing simple queries to small
    classifiers ahead of an LLM. A separate body of work in
    mixture-of-experts learns gating decisions across expert
    subnetworks rather than across separately served models. These
    approaches differ along the axes of supervision signal, the
    granularity of the routing decision, and whether cost is treated
    as a hard or soft constraint.

    At training time we sample mini-batches of 256 prompts, compute
    the routed expectation against the cached (q_k, c_k) tables, and
    update θ with Adam at a learning rate of 3e-4. The reward model is
    held frozen throughout. We anneal β from 0.1 to 1.0 over the first
    10K steps so that the quality constraint does not dominate before
    the router has learned a non-trivial routing distribution.

    On the held-out evaluation slice ROUTE-Q achieves a cost reduction
    that we believe is broadly competitive with prior cascading
    approaches, although the comparison is necessarily somewhat
    indirect because the published cost figures may to some extent
    reflect different serving configurations. The quality scores
    appear to be largely preserved relative to always routing to the
    strongest model, which we tentatively interpret as evidence that
    the learned policy is, at least under the conditions we evaluated,
    not unreasonable. These observations could potentially be taken to
    suggest that learned routing is in principle a viable alternative
    to fixed cascades, though we would caution that further
    investigation is in some respects warranted before stronger claims
    could plausibly be made.
