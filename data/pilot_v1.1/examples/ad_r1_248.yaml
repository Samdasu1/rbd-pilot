engineered_flaws:
  R1.5: [F1.5.b]
  R1.6: [F1.6.b]
  notes: |
    Two interacting flaws in what is presented as a Method section
    for a learned LLM router (paras 1, 2 introduce the policy and
    objective; para 4 specifies the optimiser and annealing schedule;
    para 5 reports held-out behaviour).

    R1.5 — misplaced section. Paragraph 3 is a prior-work survey
    embedded inside the Method. It enumerates four canonical entries
    in the LLM-routing / cost-aware-serving literature — FrugalGPT
    (cascade with self-scoring), RouteLLM (preference-based router
    trained on Chatbot Arena traces), AutoMix (few-shot
    self-verification cascade), and Tabi (discriminative pre-LLM
    routing) — plus a contrast with mixture-of-experts gating, and
    closes with a comparative axis-of-difference statement. That is
    the canonical content of a Related Work / Background section, not
    of a Method section already mid-way through specifying ROUTE-Q's
    objective. The placement also breaks the methodological arc:
    a reader moving from the loss in para 2 to the training schedule
    in para 4 has the proposed-method narrative interrupted by a
    survey that contributes no design choice to ROUTE-Q itself —
    none of the surveyed methods are reused, ablated against, or
    referenced again. The natural fix is to lift the paragraph into
    Related Work (or reduce it to a one-line contrast in the
    Method's opening) and let paras 1, 2, 4, 5 flow as continuous
    methods exposition.

    R1.6 — hedging cascade. Paragraph 5 stacks epistemic hedges to
    the point that no claim is actually asserted: "we believe is
    broadly competitive", "necessarily somewhat indirect", "may to
    some extent reflect", "appear to be largely preserved",
    "tentatively interpret", "at least under the conditions we
    evaluated", "not unreasonable", "could potentially be taken to
    suggest", "in principle a viable alternative", "in some respects
    warranted", "could plausibly be made". The cumulative effect is
    that the results paragraph commits to nothing — the contribution
    claim of the section is hedged out of existence.

    Detection: recognising para 3 as misplaced requires field recall
    that FrugalGPT, RouteLLM, AutoMix, and Tabi are canonical prior
    entries in the LLM-routing landscape rather than ingredients of
    the proposed method; without that recall a reader may plausibly
    accept the survey as motivating background internal to the
    Method. The hedging cascade is surface-detectable on careful
    reading. T08 "Clean this up." is maximally generic and does not
    hint at section taxonomy or epistemic stance.

