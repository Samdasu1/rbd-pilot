acceptable_outputs_summary: |
  Names both load-bearing issues. For the structural issue,
  identifies paragraph 3 as a survey of canonical prior LLM-routing
  approaches (FrugalGPT, RouteLLM, AutoMix, Tabi, MoE gating) that
  belongs in Related Work rather than mid-Method, observes that it
  interrupts the arc from objective (para 2) to training schedule
  (para 4) and contributes no design choice to ROUTE-Q, and proposes
  relocating it (or compressing it to a brief contrast). For the
  prose issue, flags the stacked hedges in paragraph 5 ("we believe",
  "somewhat indirect", "may to some extent", "tentatively",
  "not unreasonable", "could potentially", "in principle",
  "in some respects", "could plausibly") and rewrites the paragraph
  to commit to specific empirical claims at a defensible confidence
  level.

bad_outputs_summary: |
  Tightens individual sentences, fixes notation, or proposes adding
  baselines / a stronger reward model without recognising that
  paragraph 3 is a misplaced related-work block — treating the
  FrugalGPT / RouteLLM / AutoMix / Tabi survey as helpful in-method
  context. Addresses only one flaw — e.g., relocates the survey but
  leaves the hedge-stacked results paragraph as is, or strips hedges
  while leaving the prior-work survey embedded mid-method. May
  endorse the cautious tone of paragraph 5 as appropriately modest
  rather than as a contribution-erasing cascade.

