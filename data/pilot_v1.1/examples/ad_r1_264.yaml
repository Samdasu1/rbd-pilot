artifact:
  source: synthetic
  domain: drug_discovery_ml
  word_count: 384
  text: |
    Molecular property prediction over multi-source bioactivity data
    suffers from a subtle form of label ambiguity: a single "IC50"
    entry may correspond to enzymatic inhibition, cell-based potency,
    or a biophysical binding readout, each with distinct underlying
    physics and substantially different dynamic ranges. Aggregating
    naively across these sources — as is common practice with public
    bioactivity warehouses — collapses physically distinct quantities
    into a single regression target, with predictable degradation in
    downstream model fidelity. We introduce AssayAware, a transformer
    encoder over SMILES that augments standard tokenization with a
    learned assay-context vector, enabling the model to disambiguate
    label semantics during multi-task fine-tuning across heterogeneous
    bioactivity records.

    The principal technical contribution is the assay-conditioning
    mechanism. We show that, under a mild observability condition on
    the assay-context distribution (each assay class is paired with
    at least three pharmacophorically distinct ligand families), the
    model recovers per-assay calibration shifts as a byproduct of
    multi-task training. This provides a principled basis for
    transferring across assay families that earlier multi-task
    chemical models addressed only through hand-curated unit
    conversions or by silently discarding inconsistent records.

    The AssayAware encoder is a 12-layer transformer with 768-dimensional
    hidden states and 12 attention heads, and tokenizes SMILES with a
    BPE vocabulary of 8,192 merges. We pretrain on 5M canonicalized
    SMILES drawn from ChEMBL release 33 using a masked-token objective
    at a 15% mask rate, optimized with AdamW (peak learning rate 2e-4,
    linear warmup over 6,000 steps, batch size 256). Fine-tuning runs
    on a 12-task subset spanning kinase, GPCR, and ion-channel targets,
    using a held-out scaffold split with Bemis–Murcko grouping at
    80/10/10.

    Empirically, the assay-conditioning head reduces per-task RMSE by
    0.18–0.31 log-units relative to an identical encoder trained without
    conditioning, and — more strikingly — recovers a meaningful
    calibration manifold in the learned assay-embedding space, with
    cell-based and biochemical assays separating along a single dominant
    axis. This separation supports the theoretical prediction that
    conditioning is performing identifiable disambiguation rather than
    merely adding a per-task bias, and suggests the assay embeddings
    themselves may serve as a diagnostic tool for auditing the
    aggregation pipelines used to build public bioactivity benchmarks.
  source_provenance: null

