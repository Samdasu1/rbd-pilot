engineered_flaws:
  R1.5: [F1.5.b]    # misplaced section: architecture / hyperparameter paragraph wedged between the contribution and its empirical demonstration
  R1.7: [F1.7.b]    # missing canonical chemical-transformer and multi-task-molecular prior work
  notes: |
    Two interacting flaws:

    R1.5 — structural ordering. The third paragraph ("The AssayAware
    encoder is a 12-layer transformer ... Bemis–Murcko grouping at
    80/10/10") is experimental-setup material — layer count, hidden
    width, BPE vocabulary size, optimizer schedule, dataset version,
    split protocol. It sits between the contribution paragraph
    (paragraph 2, which states the assay-conditioning mechanism and the
    identifiability argument) and the empirical paragraph (paragraph 4,
    which is supposed to convert the conditioning insight into evidence
    that the recovered assay manifold is meaningful). The empirical
    payoff therefore lands cold, with the reader having just been pulled
    out of the conceptual argument to absorb hyperparameter choices.
    The natural placement is a dedicated experimental-setup subsection
    or a brief earlier mention alongside the model definition, with
    paragraph 2 flowing directly into the empirical demonstration so
    the section closes on the calibration-manifold result and its
    benchmark-auditing implication. Subtlety: paragraph 3 is well-formed
    on its own; the defect is only visible at the section level.

    R1.7 — missing canonical prior work. The section proposes a SMILES
    transformer pretrained with masked-token objectives and fine-tuned
    on multi-task bioactivity prediction, which is squarely the lineage
    of Schwaller et al. (2019, "Molecular Transformer") and Chithrananda
    et al. (2020, "ChemBERTa: Large-Scale Self-Supervised Pretraining
    for Molecular Property Prediction"); neither is cited. The
    multi-task framing across kinase, GPCR, and ion-channel targets is
    the direct intellectual descendant of Ramsundar et al. (2015,
    "Massively Multitask Networks for Drug Discovery") and the
    benchmark protocol implicitly invokes Wu et al. (2018, "MoleculeNet")
    for scaffold splits — both absent. The motivating phenomenon —
    incommensurable IC50 readouts across assay sources — was formalized
    in Mervin et al. (2018) and Bosc et al. (2019); these direct
    antecedents to the "assay disambiguation" framing are uncited.
    Moderate gating: a reader literate in chemical language models or
    in ChEMBL-derived multi-task benchmarks will recognize the absent
    anchors immediately, since the entire architectural template and
    benchmark protocol were established by those works.

    Combined: fixing R1.5 alone (relocating the architecture/training
    paragraph) yields a clean conceptual-to-empirical arc that still
    claims novelty for a SMILES-transformer multi-task pretraining
    recipe whose nearest ancestors go uncited. Fixing R1.7 alone
    (adding Schwaller, Chithrananda, Ramsundar, Wu, and Mervin/Bosc)
    leaves the structural deflation in place — and the added prior-work
    discussion may even worsen it by lengthening paragraph 3 further
    between the contribution and its evidence. Both must be addressed
    for the section's contribution claim to hold.

