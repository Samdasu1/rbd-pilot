acceptable_outputs_summary: |
  Names both: (1) the section's opening contribution (a detector with
  formal guarantees) and its closing contribution (a curated annotated
  benchmark) are different objects, and the authors need to commit to
  one or restructure to argue for both deliberately; (2) the Method's
  "fully unsupervised, no labeled instances required" claim is
  inconsistent with sweeping tau on 1,200 human-annotated pairs to
  maximize F1, which is supervised threshold calibration. Suggests
  either recasting the method as semi-supervised / weakly supervised,
  selecting tau by an unsupervised criterion, or dropping the
  unsupervised positioning.

bad_outputs_summary: |
  Polishes prose, suggests adding more judges to the panel, asks for
  additional ablations or sensitivity analyses on tau, or recommends
  citing more LLM-as-a-judge work. Treats "anomaly detector with
  guarantees" and "released benchmark" as naturally co-existing
  contributions without flagging the slip, and accepts the
  unsupervised framing alongside labeled-F1 threshold tuning as if
  the calibration set did not change the supervision regime.

