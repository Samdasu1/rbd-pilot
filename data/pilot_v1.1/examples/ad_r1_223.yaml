delegation: "What do you think?"

artifact:
  source: synthetic
  domain: anomaly_detection
  word_count: 362
  text: |
    We introduce SPB-AD, the first unsupervised anomaly-detection
    framework for identifying self-preference bias in LLM-as-a-judge
    evaluation pipelines. The core contribution is a residual-based
    detector with formal detection guarantees: under mild assumptions
    on the underlying score distribution, we prove that biased judges
    are flagged with high probability while unbiased judges incur a
    controlled false-alarm rate. To our knowledge no prior work has
    cast self-preference bias as a distributional anomaly-detection
    problem.

    Setup. Given a panel of N candidate judges and M response pairs,
    we form a score matrix S where S_{ij} encodes judge i's preference
    between two candidate outputs on item j. We define the
    self-preference residual r_{ij} as the deviation of judge i's
    score on its own output from the panel mean on the same pair.
    A judge exhibiting self-preference bias produces residuals whose
    distribution is shifted relative to the unbiased reference
    distribution.

    Method. We fit a multivariate Gaussian to the residual vectors and
    flag a judge as anomalous when its Mahalanobis distance from the
    fitted mean exceeds a threshold tau. Crucially, the entire pipeline
    is fully unsupervised: the reference distribution is estimated
    directly from the unlabeled score matrix, and no labeled instances
    of biased or unbiased judging are required at any stage. This is
    what allows the method to scale to settings where ground-truth
    bias annotations are unavailable.

    Experiments. We evaluate on a panel of nine open- and closed-weight
    judges over 8,400 response pairs sampled from MT-Bench-style
    multi-turn dialogues. To set the detection threshold tau, we use
    a held-out development set of 1,200 pairs for which we obtained
    human annotations of whether self-preference occurred, sweeping
    tau to maximize F1 on this calibration set. The resulting detector
    achieves 0.81 F1 on a disjoint test split, with the strongest
    gains on judges from the GPT and Claude families. We further
    report ablations over residual definitions and panel size.

    The principal deliverable of this work is a carefully curated
    benchmark of 8,400 annotated judge-comparison pairs, which we
    release to facilitate future research on bias diagnostics in
    LLM evaluation.
  source_provenance: null

