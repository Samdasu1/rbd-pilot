engineered_flaws:
  R1.1: [F1.1.b]
  R1.2: [F1.2.b]
  notes: |
    Two compound issues:

    R1.1 — contribution slip. Para 1 frames the "core contribution"
    as a residual-based anomaly detector with formal detection
    guarantees (the object is an algorithm + theorem). The closing
    paragraph reframes the "principal deliverable" as a curated
    benchmark of 8,400 annotated judge-comparison pairs (the object
    is a dataset for the community). Algorithm-with-guarantees and
    annotated benchmark are different contribution objects with
    different review criteria; the section silently slips between
    them rather than picking one. The introductory novelty claim
    ("first ... framework", "formal detection guarantees") is not
    what the conclusion actually delivers.

    R1.2 — cross-section contradiction. The Method paragraph states
    explicitly that the pipeline is "fully unsupervised" and that
    "no labeled instances of biased or unbiased judging are required
    at any stage." The Experiments paragraph then uses 1,200
    human-annotated self-preference pairs as a development set to
    sweep the detection threshold tau by maximizing F1. Threshold
    tuning on labeled bias annotations is a supervised calibration
    step; the resulting detector is not unsupervised in any standard
    sense, and the unsupervised-scaling motivation in Method does
    not survive the experimental protocol.

    Detection: moderate gating. A reader needs to recognize that
    label-based F1 sweeping is a supervised tuning step (not just
    a prose nit), and that Mahalanobis-distance outlier scoring on
    a fitted Gaussian is a textbook recipe whose "first ... with
    formal guarantees" framing collapses into a benchmark-release
    contribution by the close. Both issues are visible from the
    text alone but require domain familiarity with what
    "unsupervised" entails operationally and what differentiates an
    algorithmic from a dataset contribution.

