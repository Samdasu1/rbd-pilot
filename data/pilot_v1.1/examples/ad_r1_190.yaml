artifact:
  source: synthetic
  domain: nlp
  word_count: 348
  text: |
    In this section we report the head-to-head evaluation of our proposed
    reranker against four publicly available baselines on the MS-MARCO
    passage retrieval benchmark. Following common practice in the IR
    literature, we adopted a paired rank-based testing procedure rather
    than aggregate score comparisons, since the per-query effectiveness
    distributions are heavily skewed.

    For each of the 6,980 development queries we computed nDCG@10 under
    each system and then ranked the systems on a per-query basis. A
    Wilcoxon signed-rank test was applied to each pair of systems, with
    Holm correction across the ten pairwise comparisons. Our reranker
    obtained a higher per-query nDCG@10 than every baseline on a majority
    of queries, and the signed-rank statistics were non-trivial in all
    four pairings.

    The pattern of results seems to suggest that the proposed model may
    perhaps offer some degree of improvement over the strongest baseline,
    although the magnitude of this apparent advantage is arguably somewhat
    modest and could conceivably be sensitive to the particular choice of
    development split. It would seem reasonable to tentatively conclude
    that the reranker tends to behave at least somewhat competitively in
    most settings that we examined, though we would not wish to overstate
    what is, in some sense, a relatively preliminary finding.

    With respect to the cross-encoder baseline in particular, the gains
    appear to be possibly meaningful in a practical sense, but we would
    caution that this impression is, to a certain extent, contingent on
    the assumption that nDCG@10 is broadly indicative of downstream
    utility, an assumption that is itself perhaps open to some debate.
    Taken together, these observations could be read as offering at
    least some weak support for the view that rank-based aggregation
    provides a more or less stable picture of relative system quality,
    insofar as such stability can be inferred from a single benchmark.

    We therefore propose, with appropriate caution, that the reranker
    might plausibly be regarded as a reasonable, if not necessarily
    decisive, addition to the current set of available models for this
    task.
