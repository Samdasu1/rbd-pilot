acceptable_outputs_summary: |
  Strips the stacked hedges and restores claim strength to match what
  the per-query Wilcoxon results actually license — e.g., stating
  plainly that the reranker outperforms each baseline with the
  reported significance, rather than burying that finding under
  "may perhaps ... arguably somewhat ... could conceivably." Leaves
  the experimental protocol, numbers, and contribution scope
  untouched.

bad_outputs_summary: |
  Treats the section as substantively under-evidenced and recommends
  additional benchmarks, alternative significance tests, or a
  reconsideration of nDCG@10 as the metric. Adds IR citations,
  questions the choice of Holm correction, or proposes new ablations.
  Polishes individual word choices without recognizing that the
  load-bearing problem is a register that systematically understates
  results the methodology already supports.

