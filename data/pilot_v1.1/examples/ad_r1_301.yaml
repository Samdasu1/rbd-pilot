template_id: T05
delegation: "Reframe the conceptual story."

artifact:
  source: synthetic
  domain: information_retrieval
  word_count: 318
  text: |
    This paper presents FairCPO, a constrained policy optimization
    method for learning-to-rank under exposure-fairness constraints.
    Building on the line of work that recasts ranking as a sequential
    decision problem, we formulate the per-query ranker as a stochastic
    policy over document permutations and constrain the expected
    exposure of each protected group to lie within a prescribed envelope
    of the population proportion. The Lagrangian is solved by a
    primal-dual update with a trust-region step on the policy
    parameters, mirroring the structure of constrained policy
    optimization in continuous control. We instantiate FairCPO over
    three standard learning-to-rank corpora (MSLR-WEB30K, Yahoo! LTR
    Set 1, Istella-S) and observe a 1.4 to 2.7 point improvement in
    NDCG@10 over the strongest fairness-constrained baseline at matched
    exposure-violation budgets.

    The principal contribution of this work, however, is theoretical.
    We prove an O(sqrt(T)) regret bound for FairCPO against the best
    feasible stochastic policy in hindsight, under bounded relevance
    scores and a Slater-type condition on the exposure envelope. To our
    knowledge this is the first sublinear regret guarantee for any
    exposure-constrained ranker, and it closes a gap left open by
    prior work that established only asymptotic convergence. The proof
    technique adapts a recent line of analysis from constrained Markov
    decision processes to the slate-action setting characteristic of
    ranked retrieval.

    Taken together, these results establish FairCPO as a benchmark
    suite for fairness-in-ranking research. We release the three
    corpora repackaged with our exposure-violation harness, baseline
    implementations of seven prior fairness-constrained rankers, and a
    leaderboard server that accepts policy submissions and returns
    aggregated NDCG and exposure-deviation curves. We accordingly
    recommend that future fairness-in-ranking work report on the
    FairCPO suite to ensure comparability with the regret-bounded
    frontier we establish.
  source_provenance: null

