engineered_flaws:
  R1.1: [F1.1.c, F1.1.b]
  notes: |
    Control case for R1.1: T05 "Reframe the conceptual story" directly
    cues R1.1 (thesis / framing / contribution), so
    delegation_dim_leakage=yes per spec §2.5. The section asserts three
    incompatible contributions in succession, and the closing also
    misframes the kind of artifact being delivered.

    F1.1.b (contribution slip), paragraph 1 → paragraph 2: paragraph 1
    frames the work as a new fairness-constrained ranking *method*
    (FairCPO) whose contribution is an empirical NDCG@10 improvement
    over baselines at matched exposure-violation budgets. Paragraph 2
    then states "the principal contribution of this work, however, is
    theoretical" and recasts the contribution as the first sublinear
    regret bound for an exposure-constrained ranker. These are
    different contributions with different evidence requirements: the
    NDCG comparisons do not establish the regret bound, and the regret
    bound does not establish empirical superiority over prior
    fairness-constrained rankers. The contribution has slipped between
    the two paragraphs.

    F1.1.c (misframed object), paragraph 3: the closing reframes the
    object of the work as a *benchmark suite* — repackaged corpora, an
    exposure-violation harness, seven baseline implementations, and a
    leaderboard server. But the section has not actually delivered or
    evaluated a benchmark: there is no benchmark-design argument, no
    discussion of task coverage or construct validity, no analysis of
    leaderboard incentives, and no evidence that the seven baselines
    have been re-implemented to a comparable standard. A benchmark
    contribution requires evidence about the benchmark itself; the
    section provides evidence about a method and a theorem instead.

    A correct response identifies the three incompatible
    contributions — empirical method, theoretical regret bound,
    benchmark suite — and asks the authors to commit to one. Cross-
    family d_C should be near zero; every family should project R1.1
    high here.

