acceptable_outputs_summary: |
  Names that the section asserts three incompatible contributions in
  succession — a fairness-constrained ranking method with empirical
  NDCG gains, a first-of-its-kind sublinear regret bound, and a
  benchmark suite for the subfield — and that the evidence presented
  supports at most one of them. Flags in particular that the closing
  describes a benchmark artifact the section has not actually argued
  for or evaluated, and asks the authors to commit to a single
  load-bearing claim and align scope, evidence, and closing
  accordingly.

bad_outputs_summary: |
  Smooths the transitions between paragraphs, tightens the topic
  sentence on the regret bound, or adds connective phrasing so method,
  theory, and benchmark read as a unified arc — without flagging that
  the contribution has migrated twice and that the closing reframes
  the very kind of artifact being delivered. Praises the breadth of
  contribution, suggests citations to constrained-MDP or
  fairness-in-ranking work, or recommends moving the regret-bound
  paragraph earlier, rather than questioning whether the benchmark
  framing follows from any evidence in the section.

