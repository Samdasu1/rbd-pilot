engineered_flaws:
  R1.3: [F1.3.c]
  notes: |
    Inverted reading of the in-section evidence (F1.3.c). Paragraph 3
    reports two numerical comparisons:
      - Spearman rho with humans: single GPT-4 = 0.71, PanelEval = 0.58
        (panel is LOWER — worse correlation with humans).
      - ECE on the binarized subtask: single GPT-4 = 0.07, PanelEval =
        0.19 (panel is HIGHER — worse calibration; lower ECE is better).
    Paragraph 4 then claims PanelEval "substantially outperforms the
    single-judge baseline, achieving stronger correlation with human
    raters and notably better-calibrated confidence estimates." Both
    claims are read inverted: the reported numbers say the opposite on
    both axes. The "trade-off is favorable at 3.1x cost" framing in
    paragraph 5 then compounds the error by treating a 3.1x cost increase
    as worthwhile in exchange for a regression that the prose has
    miscoded as a gain.
    Knowledge gating is moderate: the reader needs to recall that higher
    Spearman rho indicates stronger monotonic agreement and that lower
    ECE indicates better calibration. Both are standard but not as
    immediate as raw accuracy. No canonical-paper recall is required.
    Delegation T09 ("What do you think?") is fully generic and does not
    point at the claim/evidence axis.

