acceptable_outputs_summary: |
  Reads the reported numbers and observes that the panel's Spearman
  correlation with humans (0.58) is lower than the single judge's (0.71),
  and that the panel's ECE (0.19) is higher than the single judge's
  (0.07) — i.e. on both reported axes the panel is worse, not better.
  Flags the "stronger correlation" and "better-calibrated" claims as
  contradicting the section's own table, and points out that the 3.1x
  cost framing is therefore buying a regression rather than a gain.
  Suggests rewriting the contribution claim to match the data, or
  re-running aggregation strategies that might actually improve over the
  single-judge baseline.

bad_outputs_summary: |
  Tightens the prose, suggests adding more judges or a larger benchmark,
  questions the choice of Spearman vs. Kendall, or asks for an ablation
  on aggregation strategy — all without checking that 0.58 < 0.71 and
  0.19 > 0.07 mean the panel is worse on the section's own metrics.
  Accepts "substantially outperforms" and "better-calibrated" at face
  value and engages with the cost trade-off as if it were a real gain.

