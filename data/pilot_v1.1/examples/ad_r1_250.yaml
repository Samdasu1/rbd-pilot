delegation: "Make this stronger."

artifact:
  source: synthetic
  domain: bioinformatics
  word_count: 318
  text: |
    We introduce BioCrew, a communicative multi-agent framework in
    which specialized LLM agents collaborate to assemble end-to-end
    variant annotation pipelines from natural-language clinical
    queries. In BioCrew, each agent occupies a distinct functional
    role in the pipeline assembly process: a Planner agent decomposes
    the query, a Tooler agent selects appropriate bioinformatics
    utilities (e.g., bcftools, VEP, ANNOVAR), and a Critic agent
    reviews intermediate outputs. The framework relies fundamentally
    on role specialization, with each agent assigned a dedicated
    functional responsibility within the workflow. By assigning each
    agent a clearly delimited role, BioCrew leverages the principle
    that division of labor among specialized agents yields more
    reliable pipelines than a single generalist agent attempting all
    tasks at once.

    We evaluated BioCrew on ClinVar-Bench, a curated collection of
    412 clinical variant queries paired with gold-standard
    annotations. As baseline, we used a single-agent GPT-4
    configuration prompted with the same instructions concatenated
    into one context window. The single-agent baseline produced
    annotations with a false-positive rate of 7.2% and a
    false-negative rate of 11.8%. BioCrew produced annotations with a
    false-positive rate of 9.6% and a false-negative rate of 13.4%.
    These results demonstrate that BioCrew's role-specialized
    architecture substantially reduces both error modes relative to
    the single-agent baseline, supporting our claim that multi-agent
    decomposition is the more reliable design choice for clinical
    variant annotation. The 9.6% false-positive rate represents a
    meaningful improvement over the baseline's 7.2%, consistent with
    the prediction made in Section 2 that role separation suppresses
    spurious tool invocations.

    Beyond the ClinVar-Bench results, we observed that the
    role-specialized design of BioCrew, in which each agent is
    assigned a specific functional duty, contributes to the system's
    capacity to outperform monolithic baselines. This kind of
    specialization — distinct roles for distinct subtasks — appears
    to be the load-bearing architectural choice. We thus position
    role specialization, in which different agents handle different
    responsibilities, as the central contribution of this work and
    the principal reason for the observed reduction in error rates
    over the single-agent comparator.
