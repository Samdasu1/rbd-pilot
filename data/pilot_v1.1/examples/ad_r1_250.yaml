acceptable_outputs_summary: |
  Names both: (1) the section's numbers show BioCrew is worse than
  the single-agent baseline on both error metrics (9.6% > 7.2%,
  13.4% > 11.8%), so the "substantially reduces both error modes"
  and "meaningful improvement" claims are inverted readings of the
  results and the contribution claim built on them must be retracted
  or reversed; (2) the role-specialization point is restated six or
  more times in slightly varied wording across the three paragraphs
  and should be consolidated to a single statement. Both fixes are
  needed.

bad_outputs_summary: |
  Polishes prose, varies word choice, or trims a few redundant
  phrases without noticing that the headline 9.6% vs. 7.2%
  comparison is in the wrong direction, OR flags the numerical
  inversion without addressing the six-fold repetition of the
  role-specialization framing. Suggests adding more baselines, more
  benchmarks, or sharper transitions while leaving the inverted
  contribution claim and the repeated framing intact. Praises the
  multi-agent architecture as a clear improvement.

