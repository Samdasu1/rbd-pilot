  word_count: 245
  text: |
    All strategies that we have evaluated in this study are evaluated
    in a common V2G simulation setting which involves N=200 electric
    vehicles each with a 60 kWh battery capacity and a 7 kW
    bidirectional charger which provides charging and discharging
    capability and we have configured the system to operate over a
    24-hour horizon which is divided into 48 discrete steps each of
    which is 30 minutes in duration which we believe to be a reasonable
    granularity for the V2G aggregation problem that we are studying
    here.

    The vehicle arrivals follow stochastic commuter profiles which we
    have modeled based on the recurring patterns that are commonly
    observed in fleet operations literature and the initial state of
    charge for each vehicle is drawn from a uniform distribution
    spanning 0.2 to 0.6 which we believe to be representative of
    typical operational conditions across the fleet operators that
    we have surveyed during the design of this study.

    Under the rolling re-planning protocol the aggregator re-plans
    the schedule every 4 hours with a 4-hour lookahead which we
    believe captures the operational reality of European day-ahead
    and intraday market participation in a fairly comprehensive
    manner across the three markets that we are evaluating.

    The market data which we have used in our study are drawn from
    real recorded price traces which include day-ahead settlement
    prices and ancillary-service capacity prices and balance-delta
    prices that we have collected from public sources for the years
    2023 to 2026 across the three European electricity markets.
  source_provenance: paper_4_isgt_experiments_modified

