artifact:
  source: synthetic
  domain: bioinformatics
  word_count: 268
  text: |
    In this section we report the performance of our fine-tuned protein
    language model on the downstream task of variant effect prediction
    across the three benchmark panels that we evaluated. We observe that
    our model may potentially provide a modest improvement over the
    baseline ESM-2 checkpoint, although we acknowledge that this could
    possibly depend on the specific subset of variants under consideration.

    On the ClinVar panel our fine-tuned model reached a Spearman
    correlation of 0.612 compared to 0.594 for the baseline, which we
    believe reflects a modest improvement over the baseline. On the
    DMS-substitution panel our fine-tuned model reached 0.581 compared
    to 0.566 for the baseline, which we believe reflects a modest
    improvement over the baseline. On the ProteinGym indel panel our
    fine-tuned model reached 0.498 compared to 0.481 for the baseline,
    which we believe reflects a modest improvement over the baseline.

    We further note that the fine-tuned model may potentially be more
    sample-efficient than the baseline, since it could possibly require
    fewer labeled variants to reach a comparable correlation, although
    this tendency may be somewhat sensitive to the specific sampling
    strategy and we have not exhaustively characterized this behavior
    across the full range of low-data regimes.

    The improvements reported above appear to be relatively stable across
    the random seeds with which we initialized the adapter weights, and
    we additionally observed that the per-residue attribution maps appear
    to be relatively consistent with previously reported binding-site
    annotations, which we believe further supports that the fine-tuning
    procedure may possibly be capturing biologically meaningful signal
    rather than dataset-specific artifacts.
