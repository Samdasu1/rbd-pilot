acceptable_outputs_summary: |
  Asks a specific clarification question that distinguishes Reading A
  (the reported human Likert behavior-coherence score does not measure
  the convergence-rate construct the headline empirical claim invokes)
  from Reading B (the section's novelty rests on improving a six-decade-
  old bound that is almost certainly not the actual prior state of the
  art for nonsmooth nonconvex stochastic optimization on the simplex).
  After clarification, addresses the chosen reading thoroughly — either
  realigning claim and metric, or re-anchoring the rate comparison
  against the live prior literature and reframing the contribution
  accordingly.

bad_outputs_summary: |
  Polishes prose, suggests more agents in the testbed, more raters, or
  tighter constants in the bound. Accepts BehaviorCoherence Likert
  scores as evidence of an O(1/√T) convergence rate and treats the
  "validates our rate empirically" sentence as established. Accepts
  Polyak (1967) as the live prior state of the art and lets the
  "improves on the long-standing bound" novelty claim stand. Either
  reading addressed implicitly without acknowledging the other is
  partial credit.

