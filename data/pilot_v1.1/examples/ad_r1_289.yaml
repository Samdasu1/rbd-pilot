engineered_flaws:
  R1.3: [F1.3.b]
  R1.7: [F1.7.c]
  notes: |
    The artifact admits two materially different load-bearing readings:

    Reading A — R1.3 dominant (metric mismatch):
      The headline empirical claim is that the BehaviorCoherence Likert
      result is "direct evidence of MirrorMem's faster convergence" and
      "validates our O(1/√T) rate empirically." But BehaviorCoherence@K
      is a 1–5 human Likert rating of dialogue plausibility — it does
      not measure convergence rate at all. To validate an O(1/√T)
      iteration-complexity bound empirically, one would need to report
      iteration counts to reach a fixed gradient-norm threshold,
      training-loss curves, or sample-complexity comparisons across T.
      A downstream behavior-quality score and a convergence-rate
      guarantee live in different metric spaces; the former cannot
      "validate" the latter. Rewrite under this reading either (a)
      replaces the empirical claim with a downstream-quality claim that
      a Likert score can support, or (b) adds optimization-trajectory
      measurements (gradient-norm vs. T, loss vs. T against the
      baseline) before the convergence claim can be defended.

    Reading B — R1.7 dominant (stale citation):
      The Theoretical-comparison paragraph anchors the novelty claim on
      improving the "best-known prior bound" for nonsmooth nonconvex
      stochastic optimization, citing Polyak (1967). A 1967 projected-
      subgradient result is not the modern state of the art for this
      regime: there is roughly six decades of subsequent work on
      nonconvex SGD rates and mirror-descent variants whose existence
      is implied by the section's own framing as a 2020s-era generative-
      agent paper. The contribution claim "first sublinear-rate
      guarantee … improves on the long-standing Polyak (1967) bound"
      collapses if the actual prior SOTA is a more recent O(1/√T)-class
      result, in which case MirrorMem matches rather than improves on
      the prior bound. Rewrite under this reading re-anchors the
      comparison against the actual recent literature on nonconvex
      stochastic mirror descent and reframes the contribution as either
      a constant-factor or constraint-class refinement.

    Reading A is detectable by careful reading of the metric/claim pair
    (Likert dialogue scores cannot validate an iteration-complexity
    rate). Reading B is detectable from the dating alone — citing a 1967
    bound as the live prior SOTA in a 2026 paper is internally suspect
    without needing recall of specific successor papers — hence low
    gating. Both flaws are real; rewriting under one does not fix the
    other; a well-calibrated agent should set clarification_needed=true.

