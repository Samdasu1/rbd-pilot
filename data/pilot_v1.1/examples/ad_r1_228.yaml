acceptable_outputs_summary: |
  Names that "predictive skill" is the claimed quantity but the
  metric — 1 minus normalized inter-model spread — measures
  consensus among the panel members, not correspondence to
  observations or held-out truth, and is therefore equally
  consistent with shared structural bias. Also names the
  contradiction between the "all six regions" framing and the
  in-section reporting that Northeast Brazil and Southeast
  Australia have low panel skill, sign disagreement, and are
  explicitly excluded from the headline summary. Recommends either
  re-scoping the claim to the four regions that pass, adding a
  validation against observations or hindcasts, or relabeling the
  metric as inter-model agreement.

bad_outputs_summary: |
  Polishes prose, tightens the regional list, suggests adding more
  CMIP members or more SSP pathways, or asks for confidence
  intervals on the 0.78 mean. Accepts inter-model agreement as a
  proxy for skill because the numbers are high, and treats the
  Brazil/Australia exclusion as a reasonable methodological choice
  rather than a contradiction of the headline "all six regions"
  claim. Endorses the adaptation-planning recommendation.

