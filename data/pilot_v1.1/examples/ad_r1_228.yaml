artifact:
  source: synthetic
  domain: climate
  word_count: 372
  text: |
    We evaluate the skill of a panel of nine state-of-the-art climate
    models, drawn from the latest CMIP-style ensemble, on projecting
    end-of-century regional precipitation change across six target
    regions: West Africa, South Asia, the Mediterranean, the U.S.
    Southwest, Northeast Brazil, and Southeast Australia. Our headline
    finding is that the panel demonstrates high predictive skill for
    end-of-century precipitation across all six regions, supporting
    its use for downstream adaptation planning.

    We define the panel's predictive skill — our primary outcome — as
    the mean pairwise inter-model agreement on projected precipitation
    change for each region under SSP3-7.0. Concretely, for each region
    we compute the standard deviation of the projected 2080-2100 minus
    1995-2014 precipitation anomaly across the nine panel members and
    report 1 minus the spread, normalized by the regional climatology.
    Higher values on this 0-1 scale indicate stronger predictive skill
    of the panel.

    Results. Across the six regions, the panel achieves a mean skill
    of 0.78, which we read as strong agreement and therefore strong
    skill. West Africa and South Asia reach 0.82 and 0.80
    respectively; the Mediterranean and U.S. Southwest reach 0.74 and
    0.71. We conclude that across all six regions evaluated, the panel
    agrees within roughly 10% on the sign and magnitude of
    end-of-century precipitation change.

    Northeast Brazil, however, exhibits a panel skill of 0.41, with
    three of the nine models projecting drying (-15% to -22%) and the
    remaining six projecting wetting (+8% to +19%). Southeast
    Australia shows similar inter-model divergence (skill 0.48), with
    sign disagreement on four of the nine panel members. We exclude
    these two regions from the headline summary statistics on the
    grounds that their spread reflects known structural uncertainty in
    monsoon and storm-track representation, but they remain part of
    the evaluated panel.

    Discussion. Because inter-model spread is small in four of six
    regions, we conclude that the panel reliably forecasts regional
    precipitation change on multidecadal timescales and that
    adaptation planners can draw on its projections with confidence.
    The panel's strong agreement across the evaluated regions
    constitutes evidence that the underlying physical processes are
    well-constrained at this scale and that further single-model
    development is not the bottleneck for actionable regional guidance.
