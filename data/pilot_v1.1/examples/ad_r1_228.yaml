engineered_flaws:
  R1.2: [F1.2.b]
  R1.3: [F1.3.b]
  notes: |
    Two interacting issues that compound and are both detectable from
    careful reading alone.

    R1.3 — metric mismatch. The section names its primary outcome
    "predictive skill" and frames the headline as the panel
    "reliably forecasts" precipitation change. But the operational
    metric is 1 minus the normalized inter-model spread — i.e., a
    measure of *consensus among the panel members*, not of
    correspondence between projections and any observed or
    out-of-sample target. High inter-model agreement is consistent
    with shared structural biases (common parameterizations, shared
    initial conditions, common training data) and therefore says
    nothing about predictive accuracy. The quantity reported and the
    quantity claimed are different constructs; even a careful lay
    reader can see that "models agree with each other" is not the
    same as "the panel's forecast is correct."

    R1.2 — cross-section contradiction. Para 1 asserts "high
    predictive skill across all six regions." Para 3 restates this as
    "across all six regions evaluated, the panel agrees within
    roughly 10%." Para 4 then reports that two of the six regions
    (Northeast Brazil at skill 0.41, Southeast Australia at skill
    0.48) show large inter-model divergence including sign
    disagreement on 3-4 of 9 members, and explicitly excludes them
    from the headline summary while still describing the result as
    covering "all six regions." The Discussion in para 5 then
    backslides to "four of six" while keeping the original "all
    six" framing intact. The opening claim cannot be reconciled with
    what the section itself reports.

    Detection: pure reading. No recall of CMIP literature, skill-score
    formalisms, or specific authors is required. Low gating. T05
    "Check this." is fully generic and names neither evidence nor
    measurement.

