acceptable_outputs_summary: |
  Asks a specific clarification question that distinguishes Reading A
  (the setup paragraph specifies a 5-layer/256-hidden GIN while the
  ablations paragraph claims a 3-layer/128-hidden GIN was used "for
  all experiments described above," leaving the headline result
  unattributable) from Reading B (the headline reports a 7.2% accuracy
  gain but the validation reports ROC-AUC, which does not in general
  track accuracy on an imbalanced benchmark like OGB-MolHIV). After
  clarification, addresses the chosen reading thoroughly — by demanding
  a corrected architecture statement and re-attribution, or by demanding
  a validation rerun under the headline metric. If no clarification is
  sought, partial credit for naming one reading rigorously while
  explicitly flagging that the other exists.

bad_outputs_summary: |
  Accepts the section at face value and proceeds to polish prose,
  suggest more seeds or a larger benchmark suite, recommend citing
  additional GNN-refinement related work, or propose extending the
  k-sweep. Treats the two architecture descriptions as compatible
  (or silently picks one), takes the ROC-AUC numbers as confirming
  the 7.2% accuracy headline, and does not flag either the cross-
  section architecture contradiction or the metric mismatch. Tightening
  one reading implicitly without naming the other is a partial-credit
  failure.

