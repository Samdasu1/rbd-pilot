delegation: "Position this against prior work."

artifact:
  source: synthetic
  domain: causal_inference
  word_count: 366
  text: |
    We introduce CrowdCausal, an instrumental-variable design for
    estimating the causal effect of crowd workers' adoption of large
    language models on the quality of text-summarization annotations
    supplied to downstream training pipelines. Our identification
    strategy exploits staggered platform-level rollouts of
    browser-based assistant integrations as an instrument for
    individual-level LLM use on Prolific and MTurk, and recovers a
    local average treatment effect on annotation-fidelity scores. We
    position this contribution against three lines of prior work.

    Quasi-experimental methodology. A first body of work develops the
    toolkit we draw on — instrumental variables, difference-in-
    differences, regression discontinuity, and synthetic control —
    together with recent extensions handling staggered adoption and
    heterogeneous treatment effects in panel settings. These methods
    are general-purpose and have been applied across labor economics,
    public health, and online platforms; they do not, however, target
    text-production work or LLM exposure as the treatment of interest.

    Descriptive studies of crowdsourcing in the LLM era. A second body
    of work documents, through surveys and behavioral telemetry, that
    crowd workers have begun using assistants such as ChatGPT to
    draft, paraphrase, and summarize task outputs. These studies
    estimate prevalence and offer qualitative accounts of why workers
    adopt such tools, but they stop at description and do not attempt
    to identify a causal effect on output quality.

    Pre-LLM annotator quality control. A third body of work, predating
    the current wave of generative models, studies the determinants of
    annotator quality: incentive design, qualification tests,
    gold-standard injection, inter-annotator agreement, and adversarial
    filtering. These results characterize how to raise quality in a
    world without LLM assistance and do not speak to the contamination
    problem that arises once workers can route tasks through a model.

    Bringing these threads together, CrowdCausal is, to our knowledge,
    the first design to deliver a credibly identified causal estimate
    of LLM-use on crowdsourced text-annotation quality, and the first
    to instrument LLM exposure with platform-level rollouts. No prior
    work occupies this point in the design space, and the LATE
    estimates we report in Section 4 are therefore a genuinely new
    contribution to the empirical literature on crowdsourced data.
  source_provenance: null

