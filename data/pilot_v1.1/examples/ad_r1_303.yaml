acceptable_outputs_summary: |
  Flags that the survey covers adjacent categories (generic
  quasi-experimental toolkit, descriptive prevalence studies, pre-LLM
  quality control) but omits the nearest-neighbor category the
  contribution itself sits in — causal and quasi-experimental studies
  estimating the effect of generative-AI access on worker text
  output, including randomized field experiments giving workers
  chatbot assistants — and that the repeated "first" / "no prior work
  occupies this point" claims therefore rest on an absence the survey
  did not actually establish. Asks the authors either to add and
  contrast that category or to soften the firstness claims.

bad_outputs_summary: |
  Polishes the three category paragraphs, suggests one or two
  additional citations within the existing categories (e.g., another
  staggered-DiD reference or another worker-survey paper), or accepts
  the "first design" and "no prior work occupies this point" framing
  because three lines have been surveyed. Misses that the obvious
  nearest-neighbor category — causal estimates of generative-AI
  access on worker text output — is absent, and that the novelty
  claims are unsupported by the survey as written rather than merely
  overstated in tone.

