engineered_flaws:
  R1.4: [F1.4.a, F1.4.b]
  notes: |
    Control case for R1.4: the delegation "Position this against
    prior work" overtly cues the related-work / positioning dim, and
    the artifact's flaws live in that same dim.

    F1.4.b (missing nearest neighbor): the contribution is defined
    as "a credibly identified causal estimate of the effect of
    generative-AI tool use on text-production worker output." The
    survey covers (a) the generic quasi-experimental toolkit, (b)
    descriptive prevalence studies of LLM use on crowd platforms, and
    (c) pre-LLM annotator quality control — three adjacent
    categories. It omits the obvious nearest-neighbor category:
    causal and quasi-experimental studies that already estimate the
    effect of generative-AI access on worker output, including the
    growing line of randomized field experiments giving knowledge
    workers, customer-support agents, and writers access to
    chatbot-style assistants and measuring downstream productivity
    and quality. That category sits squarely in the contribution's
    own design space — causal estimates of LLM availability on
    text-production output — and is the natural nearest neighbor.
    The omission is detectable from the artifact alone: the
    contribution paragraph and the related-work paragraphs are about
    different categories.

    F1.4.a (unsupported novelty): the closing paragraph asserts that
    CrowdCausal is the "first" design to deliver a credibly
    identified causal estimate of LLM-use on text-annotation quality,
    the "first" to instrument LLM exposure with platform-level
    rollouts, and that "no prior work occupies this point in the
    design space." These firstness claims are unsupported because the
    survey actually conducted does not cover the nearest-neighbor
    category in which such designs are most plausibly already
    present; the novelty rests on an absence the survey did not
    establish.

