  notes: |
    Stale citation visible from internal evidence. The section cites
    "Duchi, Hazan, and Singer (2010, arXiv:1002.4908v2)" as the source
    for the AdaGrad regret bound that the proof technique is built on,
    and treats it as the load-bearing prior result. Two paragraphs
    later the section itself cites the published journal version
    (Duchi, Hazan, and Singer, 2011, JMLR) and notes that it has
    "refined dimension dependence" critical to the high-dimensional
    regime the paper actually targets. The 2010 arXiv preprint is
    therefore a stale reference for what should canonically be the
    2011 JMLR paper, and the section acknowledges this within its own
    text. The "first non-asymptotic guarantee" novelty claim and the
    proof technique are downstream: if the canonical 2011 JMLR analysis
    already provides the refined dimension bound the section relies on,
    the delta versus prior work needs to be re-stated against the
    correct reference. Detection: careful reading of the section alone
    — the reader notices two Duchi/Hazan/Singer citations, with the
    later one explicitly described as supplying the refined bound that
    the high-dimensional argument depends on, making the earlier
    preprint citation stale. No external recall of which version is
    canonical is required because the section betrays it internally.
    Delegation T08 ("Clean this up.") is fully generic and does not
    leak R1.7.

