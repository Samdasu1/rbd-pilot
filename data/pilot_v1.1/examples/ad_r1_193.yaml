  text: |
    Stochastic Composite Optimization for Calibration-Aware Fine-Tuning

    Recent interest in confidence-calibrated language models has motivated
    the study of stochastic optimization for composite objectives that
    combine standard cross-entropy with a calibration surrogate. We
    analyze proximal stochastic gradient methods applied to such
    objectives and provide non-asymptotic guarantees in the non-convex
    smooth setting.

    Let f(theta) = E_z[ell(theta; z)] + lambda * psi(theta), where psi is
    a smooth but possibly non-convex calibration regularizer (e.g., a
    differentiable surrogate for expected calibration error). Under
    standard L-smoothness and bounded-variance assumptions, classical
    SGD analysis (Robbins and Monro, 1951) guarantees convergence to
    stationary points at rate O(1/sqrt(T)). For adaptive step sizes, we
    build directly on the AdaGrad analysis of Duchi, Hazan, and Singer
    (2010, arXiv:1002.4908v2), which establishes O(sqrt(d log T / T))
    regret bounds in the online convex setting.

    Our central result extends this preprint analysis to the non-convex
    composite setting. Specifically, we show that proximal AdaGrad with
    Polyak momentum achieves an O((d log T / T)^{1/2}) rate for finding
    epsilon-stationary points, improving on the prior best rate of
    O(d / T^{1/3}) due to Reddi et al. (2018). We position this as the
    first non-asymptotic guarantee for adaptive stochastic methods on
    composite calibration objectives. The proof technique adapts the
    Lyapunov construction from the original arXiv preprint, tracking
    function value and a per-coordinate variance proxy.

    To handle the high-dimensional regime relevant to transformer
    fine-tuning, we also draw on the journal version (Duchi, Hazan, and
    Singer, 2011, JMLR), whose refined dimension dependence is critical
    when d is on the order of 10^9; modern checkpoints such as
    Llama-3-8B sit squarely in this regime.

    Empirically, we fine-tune Llama-3-8B on a 200K-example calibration
    dataset using our proximal AdaGrad variant. The model reaches an
    expected calibration error of 3.2% versus 5.8% for vanilla AdaGrad,
    consistent with the theoretical rate improvement. The generalization
    of these gains to held-out task distributions is reported in the
    appendix.
