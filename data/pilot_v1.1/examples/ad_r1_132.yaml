engineered_flaws:
  R1.4: [F1.4.a]
  notes: |
    Two stacked novelty claims — "the first work to demonstrate that a
    vision-language backbone can learn, end-to-end and from a small set
    of self-generated demonstrations, when and how to defer to
    specialized perception modules" and "the first vision-language model
    to acquire tool use without supervised demonstrations" — are not
    defensible. The space is densely populated by canonical work that a
    careful reader needs to recall: VisProg (Gupta & Kembhavi, 2023) and
    ViperGPT (Surís, Menon & Vondrick, 2023) compose visual tools via
    program synthesis from an LLM; Chameleon (Lu et al., 2023) and
    MM-ReAct (Yang et al., 2023) compose vision APIs into multi-step
    reasoning; HuggingGPT (Shen et al., 2023) routes between expert
    perception models; and the Toolformer-style self-bootstrapping
    objective (Schick et al., 2023) is the direct methodological
    antecedent for the "self-generated trajectories filtered by answer
    consistency" recipe. The delta against this body of work — if any —
    might be the joint training of the VLM backbone on filtered
    trajectories rather than prompting a frozen LLM, but the section
    does not articulate that delta and instead claims a much broader
    "first." Detecting the flaw requires recalling the above canonical
    works by name (high gating); the artifact itself is internally
    consistent, the experiments are clean, and the writing does not
    signal the issue. The delegation "Improve this draft." is generic
    and does not point at novelty positioning.

