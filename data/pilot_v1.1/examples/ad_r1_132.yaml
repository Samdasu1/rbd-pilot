artifact:
  source: synthetic
  domain: computer_vision
  word_count: 348
  text: |
    We present VisionWeaver, a vision-language model that learns to
    autonomously invoke external visual tools — a detector, a monocular
    depth estimator, an OCR engine, and a class-agnostic segmentation API
    — to ground its predictions on fine-grained image evidence. Unlike
    conventional VLMs, which produce captions or answers in a single
    forward pass, VisionWeaver decomposes a query into a sequence of tool
    calls and splices their outputs back into the autoregressive token
    stream. To our knowledge, this is the first work to demonstrate that
    a vision-language backbone can learn, end-to-end and from a small set
    of self-generated demonstrations, when and how to defer to
    specialized perception modules.

    The training procedure proceeds in two stages. We first prompt a
    13B-parameter VLM with a held-out set of compositional VQA queries
    and let it sample candidate tool-call sequences; sequences whose
    final answer is consistent with the gold label are retained as
    positive trajectories. We then fine-tune the same backbone on the
    retained trajectories with a token-level cross-entropy objective. No
    human-annotated tool-use traces are required at any point.

    We evaluate VisionWeaver on GQA-OOD, A-OKVQA, and TextVQA. Relative
    to a same-backbone, no-tools baseline, VisionWeaver improves accuracy
    by 7.4, 5.8, and 11.2 points respectively. Ablating individual tools
    reveals that the OCR call accounts for the bulk of the TextVQA gain,
    while the detector and segmentation calls drive the A-OKVQA
    improvement. The model also learns to abstain from calling tools on
    simple queries (e.g. "What color is the sky?"), taking the cheaper
    text-only path 62% of the time.

    Because VisionWeaver is the first vision-language model to acquire
    tool use without supervised demonstrations, it opens a new research
    direction on perception-grounded agentic VLMs. The benefits are not
    confined to the four tools considered here: any black-box visual API
    with a typed input/output signature can in principle be incorporated.
    We expect this self-distillation paradigm to become the dominant
    approach for closing the residual gap between VLMs and specialized
    vision systems on long-tail visual reasoning tasks.
