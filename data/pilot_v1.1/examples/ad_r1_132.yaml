acceptable_outputs_summary: |
  Flags the two "first" claims as unsupported and names at least one
  nearest-neighbor prior system the section needs to be contrasted
  against (ViperGPT, VisProg, Chameleon, MM-ReAct, or HuggingGPT), as
  well as the Toolformer-style self-bootstrapping recipe as the
  methodological antecedent. Suggests rewording the contribution to a
  defensible delta — e.g., joint fine-tuning of the VLM backbone on
  self-filtered trajectories — rather than a sweeping primacy claim.

bad_outputs_summary: |
  Polishes the prose, tightens the abstract-style opening, or recommends
  more benchmarks and ablations while accepting the "first" framing at
  face value. May add tangential citations to general VLM or VQA work
  without naming the canonical tool-using-VLM line, and praises the
  self-distillation paradigm as a novel contribution.

