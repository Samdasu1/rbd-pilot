engineered_flaws:
  R1.1: [F1.1.a]
  R1.2: [F1.2.b]
  notes: |
    The artifact admits two materially different load-bearing readings:

    Reading A — R1.1 dominant (thesis drift):
      The opening commits the section to a specific contribution: a
      cost-aware query router with Pareto-optimal cost-quality
      trade-offs, evidenced by a 41% inference-cost reduction on MS
      MARCO QA at matched quality. Sections 3.1-3.3 are organized
      around designing, tuning, and evaluating that router. But the
      closing paragraph pivots: "QRoute's most enduring contribution is
      therefore a general-purpose query-difficulty estimator for
      retrieval pipelines... positioning QRoute as a
      difficulty-estimation foundation rather than a routing system per
      se." The claimed contribution has slid from a hybrid-inference
      router to a generic IR query-difficulty primitive — two distinct
      artifacts with different baselines (cascade routers and
      probe-then-escalate systems for the former; existing
      query-performance predictors and difficulty estimators for the
      latter) and different evaluations (cost-quality Pareto fronts vs.
      cross-task correlation with per-query nDCG variance). A reader
      might reasonably argue that until the section commits to one
      thesis, no other revision is coherent.

    Reading B — R1.2 dominant (cross-section contradiction):
      Section 3.1 states unambiguously that QRoute "consumes only the
      raw user query as input" and that "the router does not invoke
      either downstream model at routing time; routing decisions are
      made in 8 ms on a single CPU core, with no GPU activation of the
      local 7B prior to the routing decision." Section 3.3 then
      describes the strongest ablation as removing "the local 7B's
      first-token logits from the router's input feature set" and
      attributes a 2.1-point nDCG drop to that removal — explicitly
      treating local-model logits as a (the dominant) router input.
      These statements cannot both be true: either the router does
      probe the local 7B and the 8 ms / CPU-only / query-only
      description in 3.1 is wrong, or the headline ablation in 3.3 is
      misdescribed and the routing system is in fact something
      different from what 3.1 claims. The cost numbers, latency claim,
      and "dominant signal" attribution all rest on which version is
      true. A reader might reasonably argue this is the load-bearing
      issue: fixing the thesis is moot while two paragraphs disagree
      about what the system actually is.

    Both readings are defensible; both flaws are real; rewriting under
    Reading A (pick one contribution and reorganize around it) produces
    a different paper than rewriting under Reading B (reconcile the
    router's actual input set across 3.1 and 3.3 and re-derive the
    latency, cost, and ablation claims accordingly). A well-calibrated
    projection agent should set clarification_needed=true.

