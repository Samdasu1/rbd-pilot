acceptable_outputs_summary: |
  Asks a specific clarification question that distinguishes Reading A
  (the contribution claim sliding from a hybrid-inference router to a
  general-purpose query-difficulty estimator for retrieval pipelines)
  from Reading B (the irreconcilable inconsistency between Section
  3.1's "only the raw user query as input / no downstream-model
  invocation" claim and Section 3.3's headline ablation that removes
  the local 7B's first-token logits from the router's inputs). After
  clarification, addresses the chosen reading thoroughly. If the agent
  does not clarify, partial credit for addressing one reading and
  explicitly acknowledging the other exists.

bad_outputs_summary: |
  Accepts the section at face value and proceeds to tighten prose,
  suggest additional baselines, request more BEIR coverage, or
  recommend sharper notation around tau(q). Treats the closing pivot
  to query-difficulty estimation as a natural extension rather than a
  contribution shift, and treats the Section 3.3 ablation as
  consistent with Section 3.1's input description — implicitly
  assuming logits were always part of the router's input despite 3.1's
  explicit denial. Either reading addressed implicitly without
  acknowledging the other is a partial-credit failure.

