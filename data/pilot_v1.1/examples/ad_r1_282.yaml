artifact:
  source: synthetic
  domain: information_retrieval
  word_count: 410
  text: |
    We present QRoute, a cost-aware query router that achieves
    Pareto-optimal cost-quality trade-offs between a local 7B
    retrieval-augmented model and a frontier cloud model. Our central
    contribution is a calibrated difficulty classifier that assigns each
    user query to the cheapest model expected to meet a user-specified
    quality threshold, reducing end-to-end inference cost by 41% on MS
    MARCO QA at matched answer quality.

    3.1 Router Design

    QRoute is a lightweight encoder (110M parameters, frozen DistilBERT
    backbone) that consumes only the raw user query as input and emits a
    single scalar — the predicted log-odds that the local 7B model
    produces an acceptable response. Crucially, the router does not
    invoke either downstream model at routing time; routing decisions
    are made in 8 ms on a single CPU core, with no GPU activation of
    the local 7B prior to the routing decision. We train the router on
    24,000 query-quality pairs labeled by an LLM-as-judge protocol and
    calibrate its outputs via temperature scaling on a held-out split.

    3.2 Threshold Tuning

    A user-supplied quality target q in [0,1] is converted into a
    routing threshold tau(q) via a precomputed mapping. Queries with
    router score above tau(q) are answered locally; the rest are
    escalated to the cloud model. Because tau is monotone in q,
    operators tune the cost-quality trade-off without retraining.

    3.3 Evaluation

    On MS MARCO QA, QRoute reaches 92% of the cloud model's nDCG@10
    while invoking the cloud model on only 38% of queries. The
    strongest ablation in Table 2 removes the local 7B's first-token
    logits from the router's input feature set and observes a 2.1-point
    drop in nDCG, confirming that probing the local model's response
    distribution is the dominant signal driving the router's decisions.
    Without this signal, the router degrades to roughly the level of a
    query-length heuristic.

    Beyond routing accuracy, the router's calibrated outputs constitute
    a query-difficulty signal of independent value. We argue that
    QRoute's most enduring contribution is therefore a general-purpose
    query-difficulty estimator for retrieval pipelines: index-tier
    selection, beam-width adaptation in generative retrieval, and
    adaptive reranking depth all stand to benefit. Preliminary
    experiments on the BEIR suite suggest the difficulty score
    generalizes across IR tasks with rho=0.58 to per-query nDCG
    variance, positioning QRoute as a difficulty-estimation foundation
    rather than a routing system per se.
