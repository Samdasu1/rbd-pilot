acceptable_outputs_summary: |
  Names both: (1) the methods section says "no external retrieval"
  while the results section credits the headline hallucination
  reduction to retrieval of IPCC AR6 excerpts — these descriptions
  are mutually incompatible and the section must commit one way,
  which in turn forces a rewrite of the dismissal of RAG as "a
  different problem"; (2) the "first work" framing ignores the
  iterative-self-feedback lineage (Self-Refine, Reflexion,
  Constitutional AI critique-and-revise) that the described
  architecture directly instantiates — the section must position
  against this line and sharpen the actual climate-specific delta.
  Both fixes are required.

bad_outputs_summary: |
  Polishes prose, tightens the opening sentence, accepts the "first
  work" framing, suggests adding more municipalities or a larger
  ablation table. Treats the para 2 / para 4 retrieval
  inconsistency as a wording issue and recommends "clarifying" it,
  or accepts the retrieval-driven result without noticing it
  contradicts the no-retrieval methods description and undermines
  the RAG comparison.

