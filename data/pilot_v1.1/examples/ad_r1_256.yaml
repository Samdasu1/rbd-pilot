artifact:
  source: synthetic
  domain: climate
  word_count: 269
  text: |
    Climate impact narratives — region-specific risk summaries used by
    municipal adaptation planners — require synthesizing GCM
    downscaled outputs, sectoral vulnerability data, and policy
    context into accessible prose. We propose ICRN (Iterative Climate
    Refinement Narrator): a single large language model generates an
    initial regional risk narrative, critiques its own draft, and
    revises the narrative iteratively until a self-consistency
    threshold is met. To our knowledge, this is the first work to
    apply iterative LLM self-feedback to climate impact narrative
    generation, distinguishing our approach from the single-pass
    prompted-summarization paradigm that dominates prior climate-NLP
    work.

    The architecture uses one LLM in two roles, generator and critic,
    with no external retrieval at any stage; the system relies
    entirely on the model's parametric knowledge of climate science.
    The critic prompt instructs the model to flag factual
    inconsistencies, missing impact categories (heat, flood, drought,
    vector-borne disease), and unsupported quantitative claims.
    Refinement loops continue until two consecutive iterations differ
    by less than 5% on a Jaccard-similarity threshold over named
    entities and numeric spans.

    For comparison, we evaluate against single-pass generation,
    few-shot prompting, and chain-of-thought variants of the same
    base model. Retrieval-augmented generation is a well-known
    alternative paradigm but addresses a different problem and is
    not included in our benchmark.

    Across 50 mid-sized U.S. municipalities, ICRN narratives reduce
    expert-rated hallucination rate from 12% to 4% relative to
    single-pass. The iterative process benefits substantially from
    grounding in retrieved IPCC AR6 chapter excerpts, which the
    system queries during each critique step to verify quantitative
    claims against authoritative sources; this retrieval pipeline is
    the primary driver of the hallucination reduction. We discuss
    prompt-design ablations and refinement-depth scaling in §4.
  source_provenance: null

