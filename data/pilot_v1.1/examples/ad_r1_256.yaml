engineered_flaws:
  R1.2: [F1.2.b]
  R1.4: [F1.4.b]
  notes: |
    Two compound issues:

    R1.2 cross-section contradiction: para 2 states the architecture
    uses "no external retrieval at any stage" and "relies entirely on
    the model's parametric knowledge of climate science." Para 4
    then attributes the headline hallucination reduction to a
    retrieval pipeline: "the iterative process benefits substantially
    from grounding in retrieved IPCC AR6 chapter excerpts, which the
    system queries during each critique step ... this retrieval
    pipeline is the primary driver of the hallucination reduction."
    The two paragraphs describe incompatible systems; the load-bearing
    headline metric (12% → 4%) is credited to a component the methods
    section explicitly excludes. The contradiction also undermines
    para 3's dismissal of RAG as "a different problem" — if retrieval
    is in fact the primary driver, the RAG comparison cannot be
    waved off.

    R1.4 missing nearest neighbor: the section claims this is "the
    first work to apply iterative LLM self-feedback to climate impact
    narrative generation" and only contrasts against single-pass /
    few-shot / chain-of-thought baselines. The actual nearest
    neighbors are the iterative-self-feedback line itself —
    Self-Refine (Madaan et al. 2023), Reflexion (Shinn et al. 2023),
    and Constitutional AI critique-and-revise (Bai et al. 2022) —
    which the described architecture (single LLM, generator + critic,
    iterate to convergence) instantiates almost verbatim. The "for
    climate" wedge may still be defensible, but the section does not
    engage with the methodological lineage at all, so the novelty
    claim as stated is unsupported. Detectable at low knowledge
    gating because the method described is recognizably the
    Self-Refine pattern.

    Combined: fixing R1.4 (anchor against Self-Refine / Reflexion /
    CAI and sharpen the actual delta — domain adaptation, evaluation
    protocol, etc.) and fixing R1.2 (decide whether retrieval is in
    the system, and if so rewrite the methods description and the RAG
    comparison) are both required. Either fix alone leaves the
    section's contribution claim incoherent.

