engineered_flaws:
  R1.5: [F1.5.a]
  notes: |
    The contribution claim — a downstream-grounded composite ASR
    metric plus an accompanying evaluation suite — is stated only in
    the FINAL paragraph, after five paragraphs of related work,
    corpus description, analysis pipeline, observation of WER's
    inadequacy, and the calibration result. A reader entering the
    section does not learn what the paper actually contributes until
    paragraph 6 of 6. The natural order for a contribution-style
    section would be:
      contribution claim (1) → motivation / RW (2) → corpus (3) →
      method (4) → results (5)
    Here the order is:
      RW (1) → corpus (2) → analysis pipeline (3) → empirical gap (4)
      → calibrated metric result (5) → contribution (6)
    Subtlety: the section reads coherently end-to-end and the final
    paragraph does cleanly state the contribution, but a reader who
    stops short — or who is scanning to decide what the paper claims
    — has no way to extract the contribution before the last
    paragraph. The required fix is a section-level reorder, not
    sentence polish. Conceptual object, evidence, and prose are
    otherwise intact. T05 "Check this." is maximally generic and
    gives no hint of R1.5.

