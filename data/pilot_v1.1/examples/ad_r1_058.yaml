artifact:
  source: synthetic
  domain: speech_recognition
  word_count: 322
  text: |
    Word error rate (WER) has long served as the dominant metric in
    automatic speech recognition (ASR) evaluation. Wang et al. observed
    that WER conflates lexical and semantic error types, and follow-up
    work by Kim and Park introduced semantic-aware variants such as
    SemWER that down-weight semantically equivalent substitutions.
    Subsequent work by Ramirez et al. extended these ideas to
    multi-turn dialog transcripts, while Chen et al. proposed
    entity-aware scoring that emphasizes named entities critical to
    downstream tasks.

    Building on this prior work, we examined the behavior of six
    state-of-the-art open ASR systems on conversational, accented, and
    code-switched speech. Our evaluation corpus comprised 142 hours of
    transcribed audio drawn from three publicly available datasets —
    CommonVoice, Switchboard-Cellular, and a curated subset of CHiME-7
    — augmented with 18 hours of newly collected bilingual
    Spanish–English code-switched recordings. Each utterance was
    annotated with both verbatim and intent-preserving reference
    transcripts.

    Our analysis pipeline computed conventional WER, SemWER, and
    entity-WER for each system, then decomposed every utterance's
    errors into a taxonomy of nine categories using a fine-tuned
    classifier. We further measured downstream task performance on
    intent detection and slot filling using the recognized transcripts
    as input to a frozen NLU model.

    We found that conventional WER underestimates the impact of
    code-switch boundary errors by a factor of roughly 2.4× relative
    to their downstream cost on intent accuracy. Entity-WER captured
    this effect partially but missed degradation on intent-bearing
    function words. The rank ordering induced by WER disagreed with
    the rank ordering induced by downstream intent accuracy on 4 of
    the 6 systems evaluated.

    To address this gap, we calibrated a composite metric whose
    error-category weights are fit to measured downstream task cost.
    The calibrated metric correlates with downstream intent accuracy
    at r = 0.91, compared to 0.62 for conventional WER.

    The contribution of this paper is therefore a downstream-grounded
    composite ASR metric — one that decomposes errors into categories
    with empirically measured task-cost weights — and an accompanying
    evaluation suite spanning conversational, accented, and
    code-switched speech that operationalizes this metric for
    community use.
