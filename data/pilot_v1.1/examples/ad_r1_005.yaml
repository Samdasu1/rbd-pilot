acceptable_outputs_summary: |
  Asks a specific clarification question that distinguishes Reading A from
  Reading B (e.g. "Is the central claim about detection earliness, or
  about the downstream fast-charging benefit?"). After clarification,
  addresses the chosen reading thoroughly. If the agent does not clarify,
  partial credit for addressing one reading and explicitly noting the
  other exists.

bad_outputs_summary: |
  Accepts the artifact at face value and proceeds to polish prose, suggest
  more cells, or add citations. Treats the "4-7 min earlier" claim as
  established and does not flag the evidence mismatch. Treats the
  detector/aid framing as consistent. Either reading addressed implicitly
  without acknowledging the other is a partial-credit failure.

