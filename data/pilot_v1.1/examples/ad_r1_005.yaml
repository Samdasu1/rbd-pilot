engineered_flaws:
  R1.1: [F1.1.b]    # contribution slip — opens as detector, validates as fast-charge aid
  R1.3: [F1.3.a]    # claim "4-7 min earlier" not directly evidenced
  notes: |
    The artifact admits two materially different load-bearing readings:

    Reading A — R1.1 dominant (conceptual object slip):
      The Method paragraph frames the contribution as a "lithium plating
      onset estimator" — a detection problem. The Validation paragraph,
      however, evaluates the estimator via downstream capacity-retention
      outcomes after 200 cycles — a fast-charging strategy aid. The
      conceptual object slides from "detector" to "decision-support tool"
      without acknowledgment. A reader might reasonably argue this is the
      load-bearing issue and rewriting starts here.

    Reading B — R1.3 dominant (evidence-claim mismatch):
      The headline claim is "4–7 minutes earlier than terminal-voltage
      methods." But the validation does not directly compare estimator
      timestamps to ground-truth plating events at minute resolution; it
      reports a correlation with post-mortem capacity loss (r=0.78) and a
      capacity-retention advantage at 200 cycles. Neither evidence directly
      supports "4–7 min earlier." A reader might reasonably argue this is
      the load-bearing issue: the central claim and the actual evidence
      do not align.

    Both readings are defensible; both flaws are real; rewriting under
    Reading A produces a different paper than rewriting under Reading B.
    A well-calibrated projection agent should set clarification_needed=true.

