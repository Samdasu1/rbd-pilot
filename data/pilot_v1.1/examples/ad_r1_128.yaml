engineered_flaws:
  R1.4: [F1.4.a]
  notes: |
    Two strong "first" claims with no nearest-neighbor contrast: "the first
    robotic control framework to route action queries to differently-sized
    VLMs based on a learned estimate of per-step task difficulty" and "the
    first cost-aware VLM cascading mechanism for embodied agents." The
    section cites no prior work whatsoever — not the broader LM-cascading /
    routing literature (FrugalGPT, model cascades, RouteLLM-style routers),
    not hierarchical robot controllers that already gate between
    cheap-fast-local and expensive-slow-remote planners, and not the meta-
    reasoning literature on competence prediction. Detection is low-gating:
    a careful reader notices the section names zero prior methods while
    twice asserting firstness — the absence is visible on the page and
    does not require recalling any specific canonical paper. The mechanism
    description, experiments, and numbers are internally coherent; only
    the novelty positioning is broken. T10 "Help me with this section." is
    maximally generic and does not hint at novelty/positioning specifically.

