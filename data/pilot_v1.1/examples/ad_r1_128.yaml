acceptable_outputs_summary: |
  Flags the unsupported "first" claims and points out that the section names
  no prior work at all despite sitting in well-trodden territory (LM
  cascading / routing for cost reduction, hierarchical robot controllers
  that gate between cheap and expensive planners, competence-prediction
  meta-reasoning). Names at least one nearest-neighbor line of work the
  section must contrast against and suggests rewording the contribution to
  a defensible delta — e.g. the embodied-specific aspect — rather than
  bare firstness.

bad_outputs_summary: |
  Polishes the prose, tightens the contribution bullets, suggests adding
  another robot platform or more tasks, or asks for an ablation on the
  3B/70B split — without questioning the "first" framing. Praises the
  cost-versus-success trade-off as a strong contribution and may add a
  few peripheral citations to VLM papers while leaving the novelty claim
  intact.

