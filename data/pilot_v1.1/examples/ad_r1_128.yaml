artifact:
  source: synthetic
  domain: robotics
  word_count: 348
  text: |
    Modern robot manipulation increasingly depends on querying large
    vision-language models (VLMs) for high-level action selection. Querying
    frontier-scale VLMs for every step of a long-horizon task is, however,
    prohibitively expensive in both wall-clock latency and dollar cost. We
    introduce RoboRouter, the first robotic control framework to route action
    queries to differently-sized VLMs based on a learned estimate of per-step
    task difficulty.

    RoboRouter consists of a small meta-classifier that predicts, from the
    current observation and the symbolic task description, whether an on-board
    3B-parameter VLM is sufficient to produce a correct action, or whether the
    query should escalate to a 70B-parameter cloud-hosted VLM. The
    meta-classifier is trained on 12,000 trajectories from a teleoperated
    kitchen-manipulation dataset, with labels derived from comparing small-
    and large-model rollouts against ground-truth success.

    We evaluate RoboRouter on a Franka Panda arm performing 40 long-horizon
    tabletop tasks. RoboRouter achieves 91.4% task success while routing only
    23% of action queries to the large VLM, compared with 92.1% for an
    always-large baseline and 71.8% for an always-small baseline. Average
    cost-per-rollout is reduced by 4.2x relative to the always-large
    configuration, and end-to-end latency by 2.7x.

    We make three contributions. First, we present the first cost-aware VLM
    cascading mechanism for embodied agents. Second, we show that routing
    decisions can be made from observation features alone, without expensive
    rollout lookahead. Third, our results establish that meta-modeling — using
    a small model to predict the competence of a larger one — is a viable
    design pattern for robotic control stacks.

    The approach generalizes beyond manipulation: any robotic stack that issues
    VLM queries can in principle benefit from a routing layer, and we expect
    RoboRouter to become a standard component of cost-sensitive deployments.
    We release the trained meta-classifier weights and the routing
    infrastructure as open source so that practitioners can drop the layer in
    front of any existing VLM-based policy with minimal integration effort.
