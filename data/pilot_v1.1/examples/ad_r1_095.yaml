artifact:
  source: synthetic
  domain: optimization_theory
  word_count: 312
  text: |
    In the selective-answering literature, many training procedures reduce
    to minimizing a selective risk of the form
    R_phi(f, g) = E[ L(f(x), y) g(x) ] / E[ g(x) ], where g is a soft
    abstention gate. Optimizing R_phi is challenging because the gate
    induces a fractional, potentially non-smooth objective. We introduce
    SelectMD, an adaptive mirror-descent method tailored to selective risk
    minimization for abstaining classifiers.

    A key contribution of SelectMD is that it applies to non-smooth
    selective losses — losses for which the gradient of R_phi need not be
    Lipschitz continuous — including the hinge-style abstention loss of
    Cortes et al. and the 0-1-c selective risk of Chow. For this class,
    we prove that SelectMD attains the accelerated O(1/T) rate,
    improving over the O(1/sqrt(T)) bound established by prior projected
    SGD analyses.

    Algorithm. At iteration t, SelectMD draws a minibatch B_t, computes a
    stochastic subgradient g_t of R_phi at the current iterate x_t, and
    applies the mirror step
        x_{t+1} = argmin_x { <g_t, x> + (1 / eta_t) D_psi(x, x_t) },
    where D_psi is the Bregman divergence induced by a 1-strongly-convex
    regularizer psi. The step size is eta_t = c / (L * sqrt(t)), where L
    is the Lipschitz constant of the gradient of R_phi and c is a
    problem-independent constant.

    Convergence. Theorem 1 states the following. Assume (i) R_phi is
    convex in x, (ii) the gradient of R_phi is L-Lipschitz, and (iii) the
    stochastic subgradient is unbiased with bounded second moment. Then
    for any horizon T,
        E[ R_phi(x_bar_T) - R_phi(x*) ] <= O( L * D_psi(x*, x_0) / sqrt(T) ),
    where x_bar_T is the running-average iterate.

    Empirical evaluation. On CIFAR-10 with selective answering at coverage
    0.7, SelectMD reaches the target selective risk in 30% fewer epochs
    than projected SGD. We position SelectMD as the first mirror-descent
    procedure to deliver accelerated convergence on non-smooth selective
    losses without requiring knowledge of smoothness constants.
