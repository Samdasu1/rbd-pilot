acceptable_outputs_summary: |
  Identifies that the contribution claims and the formal statement do not
  line up: the section advertises a non-smooth setting and an accelerated
  O(1/T) rate, while the theorem assumes Lipschitz-continuous gradients
  and proves only O(1/sqrt(T)); separately, the "no smoothness constant
  needed" framing conflicts with a step size that hard-codes L. Suggests
  resolving by either retracting the non-smooth / accelerated claims or
  by re-deriving the result under a genuinely non-smooth analysis with
  an adaptive step size.

bad_outputs_summary: |
  Polishes notation, asks for more datasets or a wall-clock comparison,
  recommends additional citations to mirror-descent or selective-prediction
  literature, or strengthens the empirical section — without registering
  that the smoothness assumption, the convergence rate, and the
  step-size formula are mutually inconsistent with the stated
  contribution.

