engineered_flaws:
  R1.2: [F1.2.b]
  notes: |
    Multiple mutually-reinforcing cross-section contradictions, all on the
    R1.2 axis (internal logical consistency).

    (1) Smoothness. Paragraph 2 claims SelectMD "applies to non-smooth
        selective losses — losses for which the gradient of R_phi need
        not be Lipschitz continuous." The Convergence paragraph's
        Theorem 1 assumes "the gradient of R_phi is L-Lipschitz," i.e.,
        exactly the smoothness condition the contribution disclaimed.

    (2) Rate. Paragraph 2 claims "the accelerated O(1/T) rate, improving
        over the O(1/sqrt(T)) bound" of prior work. The Convergence
        paragraph's stated bound is O( L * D / sqrt(T) ) — i.e.,
        O(1/sqrt(T)), the very rate paragraph 2 says SelectMD beats.

    (3) Adaptivity. The closing paragraph claims SelectMD works "without
        requiring knowledge of smoothness constants," but the Algorithm
        paragraph sets eta_t = c / (L * sqrt(t)), which explicitly
        requires L.

    All three contradictions are detectable from careful sequential
    reading; no canonical-result recall is needed (low gating). The
    delegation "What do you think?" (T09) is fully open-ended and gives
    no hint that the load-bearing axis is internal consistency.

