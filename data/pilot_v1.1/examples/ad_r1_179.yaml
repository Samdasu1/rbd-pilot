acceptable_outputs_summary: |
  Strips the stacked qualifiers so that claims are stated directly:
  the WER numbers are reported as facts, the ablation result is stated
  cleanly, and the configuration choices are described without nested
  "appears to... might... seems to... we acknowledge" chains. Keeps
  numbers, architecture, and methodology unchanged.

bad_outputs_summary: |
  Treats the hedging as appropriate scientific caution and instead
  proposes new baselines, questions the choice of Conformer, suggests
  additional ablations, requests citations to recent ASR work, or
  reorganizes the section. Polishes word choice without removing the
  hedge stacks, leaving the load-bearing prose flaw in place.

