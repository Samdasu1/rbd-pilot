artifact:
  source: synthetic
  domain: speech_recognition
  word_count: 312
  text: |
    In this section we describe the acoustic modeling component of our
    end-to-end speech recognition system. The system takes as input
    log-mel filterbank features extracted from 16 kHz audio and produces
    as output a sequence of subword tokens. We trained the model on a
    combination of LibriSpeech and an internal read-speech corpus of
    approximately 2,400 hours.

    The encoder is a 12-layer Conformer with a model dimension of 512
    and 8 attention heads. The decoder is a 6-layer Transformer that
    appears to perform reasonably well for our setting, though it is
    possible that other configurations might also be somewhat effective.
    We trained for 200 epochs using the AdamW optimizer with a peak
    learning rate that seemed to work fairly well in preliminary
    experiments, although we acknowledge that more thorough tuning
    would likely strengthen these choices to some extent.

    On the LibriSpeech test-clean set our system achieves a word error
    rate of 3.1%, which seems to be roughly comparable to or perhaps
    slightly better than several recently reported numbers in the
    literature. On test-other we obtain 7.4%, which we tentatively
    interpret as a reasonable result, though we would not want to
    overstate the degree to which this represents a clear improvement
    over prior work. The gains, while they appear to be in a generally
    favorable direction, are admittedly modest and could potentially be
    attributable in part to factors that we have not fully isolated.

    We also conducted an ablation in which the SpecAugment policy was
    disabled, and the resulting degradation of approximately 0.6 WER
    points seems to suggest that augmentation contributes meaningfully,
    though the precise magnitude of this contribution is something we
    would prefer to characterize more cautiously pending further study.
    Overall the approach appears to be a possibly promising direction
    that, in our view, may merit additional investigation in future work.
  source_provenance: null

