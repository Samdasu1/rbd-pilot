artifact:
  source: synthetic
  domain: databases
  word_count: 327
  text: |
    Section 3. Confidence-Calibrated NL-to-SQL via Cross-Examined LLM Agents

    The central contribution of this work is a multi-agent verification
    protocol for natural-language-to-SQL (NL2SQL) translation that
    improves end-to-end execution accuracy on cross-schema queries by
    routing each candidate SQL through a debate among three distinct
    LLM critics before execution. On the BIRD-bench cross-database split,
    our protocol recovers 8.2 percentage points of execution accuracy
    over a single-shot baseline of comparable inference cost, closing
    roughly half the gap between the baseline and an oracle SQL selector.

    We instantiate the protocol with three critic roles: a
    schema-grounding critic that checks each referenced column against
    the catalog, a join-cardinality critic that estimates whether the
    proposed plan is shape-consistent with the foreign-key graph, and
    an execution-trace critic that runs the candidate against a sample
    of the table. Critic disagreements are resolved by a fourth
    aggregator LLM whose decisions we audit. In the course of the audit
    we observed that the per-critic confidence scores reported by
    current LLM-based NL2SQL pipelines are essentially uninformative on
    cross-schema queries: their AUROC for distinguishing executable
    from non-executable SQL is below 0.55 on BIRD, and on the held-out
    Spider-DK slice the confidence ordering is anti-correlated with
    actual correctness on join-heavy queries (Spearman rho = -0.21).
    To quantify this we introduce a schema-conditional calibration
    error (SCCE) that adjusts ECE for the heterogeneous prior over
    per-database difficulty; SCCE admits a per-schema decomposition
    without requiring a held-out per-schema validation pool.

    These calibration findings ultimately reframe the contribution. The
    central claim of this paper is that current LLM-based NL2SQL
    systems are systematically miscalibrated in a way that single-shot
    generation cannot repair -- multi-agent verification is valuable
    not because it raises raw execution accuracy, but because it
    surfaces calibration failures that would otherwise be invisible to
    a downstream user. The 8.2-point accuracy gain is then a corollary
    of the calibration analysis.
