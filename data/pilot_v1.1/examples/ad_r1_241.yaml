engineered_flaws:
  R1.1: [F1.1.b]
  R1.5: [F1.5.a]
  notes: |
    Two compound issues, both detectable from careful reading of the
    section alone (no specialized recall of the NL2SQL literature
    required).

    R1.1 contribution slip (F1.1.b): Para 1 commits to a contribution --
    "a multi-agent verification protocol... that improves end-to-end
    execution accuracy" -- with the BIRD 8.2-point gain as the
    headline evidence. Para 3 explicitly reframes the contribution:
    "the central claim of this paper is that current LLM-based NL2SQL
    systems are systematically miscalibrated... The 8.2-point accuracy
    gain is then a corollary of the calibration analysis." These two
    framings are related but not equivalent -- the first sells an
    accuracy-improving system, the second sells an empirical
    miscalibration finding for which the system is merely an instrument.
    The section never commits to one as load-bearing; the slip is
    overt and signaled by the word "reframe."

    R1.5 buried contribution (F1.5.a): The most concretely novel
    artifact in the section is SCCE, a new calibration metric with a
    per-schema decomposition that does not require per-schema held-out
    data. SCCE appears only mid-paragraph in para 2, introduced as a
    sub-step ("To quantify this we introduce...") with no signposting
    in the section opening, no mention in the contribution sentences
    of paras 1 or 3, and no follow-up in the closing. A reader scanning
    the topic sentences would not see that a new metric is being
    proposed.

    Compound: resolving R1.1 (choose one contribution) forces a
    decision about whether SCCE is the contribution, a tool, or
    incidental -- which is exactly the R1.5 surfacing fix. Conversely,
    promoting SCCE out of mid-paragraph (R1.5) forces a rewrite of
    both the para 1 and para 3 contribution sentences (R1.1), since
    neither currently mentions it.

