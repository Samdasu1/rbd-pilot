acceptable_outputs_summary: |
  Points out that the section advances at least two distinct
  contribution claims -- a verification protocol that improves
  execution accuracy (para 1) and an empirical miscalibration finding
  for which the protocol is merely an instrument (para 3) -- and that
  the genuinely novel artifact, the SCCE calibration metric, is buried
  mid-paragraph with no signposting in opening or closing. Recommends
  choosing one of the three candidate contributions as load-bearing
  and restructuring the opening and closing sentences so that the
  chosen contribution is foregrounded throughout.

bad_outputs_summary: |
  Polishes prose, tightens the BIRD/Spider-DK numerical reporting, or
  treats the protocol contribution and the miscalibration contribution
  as compatible framings of one idea. Suggests adding ablations on the
  three critic roles or extending to more benchmarks while leaving
  SCCE as a one-sentence parenthetical, and does not flag the explicit
  contribution reframe in para 3 as a structural problem.

