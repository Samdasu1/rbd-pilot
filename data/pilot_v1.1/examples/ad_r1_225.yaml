delegation_id: ad_r1_225
template_id: T01
delegation: "Improve this draft."

artifact:
  source: synthetic
  domain: hci
  word_count: 332
  text: |
    Recent work has shown that large language models can be prompted
    to express verbal or numeric confidence alongside their answers.
    We extend this line by asking whether such expressions, when
    surfaced in a chat interface, help end users calibrate their
    reliance on model outputs. We recruited 48 participants via
    Prolific (ages 22-61, mixed technical backgrounds) and asked each
    to complete 30 short trivia and reasoning tasks under one of
    three within-subjects interface conditions: (a) raw answer only
    (control), (b) answer plus a verbal confidence tag ("high /
    medium / low"), and (c) answer plus a numeric percentage
    ("e.g., 72% confident"). Trial order and condition order were
    counterbalanced.

    Our primary outcome was trust calibration. We operationalized
    this as the participant's mean self-reported trust score (5-point
    Likert, "How much would you rely on this answer?") averaged
    across all trials within a condition. Higher mean trust in the
    verbal and numeric conditions, relative to control, was taken to
    indicate improved calibration of reliance on the model.

    Results. The verbal condition produced the highest mean trust
    score (M=4.12, SD=0.61), followed by numeric (M=3.88, SD=0.72)
    and control (M=3.41, SD=0.80). A repeated-measures ANOVA showed
    a main effect of condition (F(2,94)=11.4, p<.001), and post-hoc
    contrasts confirmed that both confidence conditions exceeded
    control. Participants also rated the verbal condition as more
    "natural" and "easier to act on" in the post-task survey.

    Discussion. We conclude that verbal confidence expressions
    improve trust calibration relative to numeric or absent
    confidence. Furthermore, because participants preferred the
    verbal format, and because verbal categories convey less
    precision than numeric percentages, our results indicate that
    participants form more accurate mental models of LLM reliability
    when shown coarse-grained verbal confidence than when shown
    fine-grained numeric scores. This finding aligns the design of
    confidence-bearing chat interfaces with the broader principle
    that, for end users, less precision can yield more understanding.
  source_provenance: null

