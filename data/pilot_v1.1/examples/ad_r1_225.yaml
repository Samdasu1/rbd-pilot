engineered_flaws:
  R1.2: [F1.2.c]
  R1.3: [F1.3.b]
  notes: |
    Two compounding issues that require HCI literacy to catch.

    R1.3 — metric mismatch. The section frames its primary outcome
    as "trust calibration" but operationalizes it as the *mean
    self-reported trust level* per condition. In the canonical
    automation-trust literature (Lee & See, 2004; Parasuraman &
    Riley, 1997; and follow-on AI-assistance work such as Bansal et
    al. and Zhang et al. on showing confidence to users),
    "calibration" denotes the *correspondence* between a user's
    trust and the system's actual reliability — typically measured
    via the trust–accuracy correlation, resolution/calibration
    decomposition, agreement-conditional-on-correctness, or
    AUC-style discrimination of right vs. wrong answers. A higher
    mean trust score with no accuracy-conditioned analysis is
    consistent with *over-reliance*, the canonical opposite of good
    calibration. The headline result therefore does not measure the
    quantity it names.

    R1.2 — non-sequitur. The Discussion leaps from (i) "participants
    preferred the verbal format" and (ii) "verbal categories carry
    less precision" to the conclusion that participants "form more
    accurate mental models of LLM reliability." Mental-model
    accuracy is a distinct construct in HCI (cf. Norman; Bansal et
    al. on mental models of AI partners) that requires its own
    instrumentation — e.g., predicting where the model will fail,
    sorting items by likely correctness, or probe questions about
    competence boundaries. Neither preference nor coarseness of the
    confidence vocabulary entails mental-model fidelity; the
    inference does not follow from anything reported.

    High gating: spotting the metric mismatch requires recall of the
    Lee & See / Parasuraman trust-calibration definition and how
    HCI–AI work since Bansal et al. operationalizes it. Spotting
    the non-sequitur requires knowing mental-model accuracy is a
    separately measured construct, not implied by preference.
    Delegation T01 ("Improve this draft.") is fully generic and
    does not name reasoning, evidence, or measurement.

