acceptable_outputs_summary: |
  Flags that "trust calibration" is the named construct but the
  outcome — mean self-reported trust per condition — measures trust
  *level*, not the trust-to-accuracy correspondence that calibration
  denotes; a higher mean is equally consistent with over-reliance
  unless trust is conditioned on per-trial correctness. Also flags
  that the Discussion's jump from format preference and verbal
  coarseness to "more accurate mental models" introduces a construct
  (mental-model accuracy) that was never measured. Recommends either
  re-scoping the claims to what was actually measured or adding the
  appropriate calibration and mental-model probes.

bad_outputs_summary: |
  Polishes prose, tightens the Methods narrative, suggests more
  participants or additional task domains, or asks for inferential
  statistics on the post-task survey. Accepts "trust calibration" at
  face value because the mean-trust differences are statistically
  significant, and treats the mental-model conclusion as a reasonable
  interpretation of the preference data rather than an unwarranted
  jump.

