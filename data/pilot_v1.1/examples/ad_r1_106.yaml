engineered_flaws:
  R1.3: [F1.3.c]
  notes: |
    Inverted reading. AmbiAlign is defined so that higher score = more
    ambiguous, and human labels likewise have higher = more ambiguous.
    A scorer that "tracks human intuitions" must therefore have a
    POSITIVE correlation with the gold labels. The reported r = -0.41
    is a strong NEGATIVE correlation: queries AmbiAlign rates as
    ambiguous are systematically rated unambiguous by humans (and vice
    versa). The three baselines all have positive correlations
    (0.07, 0.18, 0.29) — they are correctly aligned, just weak.
    AmbiAlign is the only system that is anti-aligned, meaning it
    performs worse than even the trivial length heuristic in any
    decision-relevant sense. The section masks this by taking |r| as
    "agreement" and concluding AmbiAlign is "twice as large" as
    RoBERTa; the magnitude framing erases the sign flip. The
    high-disagreement subset result (r = -0.48) is presented as
    additional support but is in fact stronger evidence of inversion.
    The conclusion ("strongest available proxy", "off-the-shelf
    preprocessing step") is the literal opposite of what the numbers
    show: deploying AmbiAlign would systematically mis-route queries
    in any downstream clarification pipeline. Detection requires only
    careful reading of the sign of the reported correlations against
    the stated direction of the score — no domain canon needed.
    Delegation "Check this." is fully generic (T05) with no leakage
    of R1.3.

