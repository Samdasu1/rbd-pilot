acceptable_outputs_summary: |
  Notices that the AmbiAlign correlation is negative while the baselines
  are positive, given the stated direction of both the score and the
  gold label. Points out that taking the absolute value of r erases the
  direction, and that an anti-correlated scorer is not a "proxy" for
  human ambiguity but its inverse — using AmbiAlign would systematically
  mis-route queries. Recommends inverting the conclusion (the method
  fails, or its score direction is defined backwards) rather than
  reporting it as the strongest agreement.

bad_outputs_summary: |
  Polishes the prose, accepts the |r| = 0.41 vs. 0.29 framing as a real
  improvement, asks for more baselines or a larger corpus, or suggests
  reporting Spearman alongside Pearson. Misses that the negative sign
  inverts the contribution claim and instead refines presentation of a
  result that, as written, supports the opposite conclusion.

