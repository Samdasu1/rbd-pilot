engineered_flaws:
  R1.4: [F1.4.b]
  notes: |
    The section claims "first application of multi-sample reasoning
    aggregation to clinical variant interpretation" while describing a
    method that is verbatim self-consistency: sample N reasoning traces
    at non-zero temperature, majority-vote the final label. The obvious
    nearest neighbor — self-consistency decoding for chain-of-thought
    reasoning — is not cited or contrasted. More broadly, ensemble /
    majority-vote aggregation over classifier outputs is textbook prior
    art in clinical NLP and variant prioritization (e.g. REVEL,
    MetaSVM-style meta-predictors that aggregate component scores), and
    none of that lineage is mentioned either. The section even uses the
    phrase "well-known benefits of sampling-then-aggregating" while
    asserting first-of-kind status, which makes the gap detectable from
    the text alone — a careful reader notices the method is a known
    pattern repackaged, without needing canonical-paper recall (low
    gating). Conceptual object, experiment, and writing are otherwise
    clean; only the novelty positioning is broken.

