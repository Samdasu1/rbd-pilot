artifact:
  source: synthetic
  domain: bioinformatics
  word_count: 285
  text: |
    Predicting the clinical pathogenicity of variants of unknown
    significance (VUS) remains a central bottleneck in medical genetics.
    Here we introduce GenoReason, a novel framework that uses large
    language models to reason about VUS by drawing on functional,
    evolutionary, and clinical evidence aggregated from public databases.
    Unlike standard pathogenicity classifiers that produce a single point
    prediction, GenoReason generates multiple independent reasoning traces
    for each variant and aggregates them into a final classification.

    The core methodological innovation of GenoReason is its
    ensemble-of-reasoning-paths design. For each VUS, we prompt the model
    with a structured template enumerating the available evidence (allele
    frequency in gnomAD, ClinVar entries for the gene, predicted impact on
    protein structure, presence in known disease pathways). We then sample
    N=20 reasoning trajectories from the model at temperature 0.7 and take
    a majority vote over the final pathogenicity label (Benign / Likely
    Benign / VUS / Likely Pathogenic / Pathogenic). This
    sampling-and-voting approach is, to our knowledge, the first
    application of multi-sample reasoning aggregation to clinical variant
    interpretation.

    We evaluate GenoReason on a held-out set of 1,840 variants curated
    from ClinVar with high-confidence labels. Compared against a
    single-trace baseline (the same model with N=1), GenoReason improves
    macro-F1 from 0.61 to 0.74. We report consistent gains across rare and
    common variants and across coding and non-coding regions. Our
    contribution lies in showing that the well-known benefits of
    sampling-then-aggregating can transfer cleanly to the clinical
    genomics setting, where variant evidence is heterogeneous and
    individual reasoning chains are brittle. We expect this approach to
    motivate a new line of work on aggregation-based clinical NLP systems,
    and we release code and prompts to support reproducibility.
