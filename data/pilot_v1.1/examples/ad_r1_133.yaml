acceptable_outputs_summary: |
  Flags that the "first application" claim is undermined by an obvious
  unmentioned predecessor — sampling multiple reasoning chains and
  majority-voting is exactly self-consistency decoding, and ensemble
  meta-predictors are standard in variant interpretation. Names at
  least one nearest-neighbor reference class (self-consistency CoT,
  REVEL/MetaSVM-style aggregators, or ensemble clinical NLP) the
  section should be contrasted against, and suggests rewording the
  contribution to a defensible delta (e.g. transfer to the clinical
  variant setting) rather than first-of-kind.

bad_outputs_summary: |
  Polishes the prose, tightens the abstract, or suggests strengthening
  the experiments (more variants, additional metrics, ablations on N).
  Accepts the first-of-kind framing and praises the
  ensemble-of-reasoning-paths design as a methodological innovation.
  May add tangential citations to clinical-LLM work without
  identifying that the core method is unattributed prior art.

