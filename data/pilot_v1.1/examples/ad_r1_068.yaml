artifact:
  source: synthetic
  domain: programming_languages
  word_count: 240
  text: |
    We propose Polysem, a semantic-disambiguation framework for
    natural-language program synthesis. The central claim of this section
    is that semantic constraints on program behavior are sufficient to
    resolve specification ambiguity without requiring user interaction.
    By enforcing well-typedness and termination at synthesis time, Polysem
    reduces the space of plausible programs to a single canonical
    candidate per intent.

    Polysem operates in two stages. First, the natural-language prompt is
    parsed using a probabilistic context-free grammar (PCFG) trained on
    Stack-Overflow code-comment pairs. The parser produces a forest of
    derivations ranked by their PCFG likelihood. Second, the top-K parses
    are converted to abstract syntax trees and filtered by static
    type-checking against the target signature. The first parse that
    type-checks is returned as the synthesized program.

    We evaluate Polysem on the SPoC benchmark (Kulal et al., 2019) and on
    a held-out subset of HumanEval. Polysem achieves 71.3% top-1 accuracy
    on SPoC, exceeding the published 55.2% baseline of greedy beam search.
    On HumanEval, the system reaches 41% pass@1.

    We conclude that probabilistic parsing combined with type-directed
    filtering yields strong results for natural-language program
    synthesis. In particular, we find that the PCFG ranking is the
    dominant contributor: removing the type-check filter degrades top-1
    accuracy by only 1.8 points, while replacing the PCFG with a uniform
    distribution drops accuracy to 12%. This supports the broader thesis
    that lightweight statistical parsing of natural-language prompts,
    without semantic reasoning, is the primary lever for accurate code
    synthesis.
