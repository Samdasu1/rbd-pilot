acceptable_outputs_summary: |
  Identifies that the section opens by claiming semantic constraints are
  sufficient to resolve ambiguity but closes by attributing the gains to
  statistical parsing with semantics as a marginal contributor, and notes
  that these are incompatible positions about what the paper is arguing.
  Proposes picking one thesis and rewriting the contribution claim and
  conclusion to match the ablation evidence, rather than letting the
  headline and the takeaway disagree.

bad_outputs_summary: |
  Polishes the prose, tightens hedging, or suggests adding more benchmarks
  and baselines without flagging that the opening claim and the closing
  claim describe different contributions. Treats the ablation as a
  supporting finding rather than as evidence that contradicts the stated
  thesis, or proposes citation additions and stylistic edits while leaving
  the framing inconsistency in place.

