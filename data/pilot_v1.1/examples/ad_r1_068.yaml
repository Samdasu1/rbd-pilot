engineered_flaws:
  R1.1: [F1.1.a]
  notes: |
    Thesis drift. Paragraph 1 stakes the section's contribution on a
    strong claim: "semantic constraints on program behavior are sufficient
    to resolve specification ambiguity." Paragraph 4 reverses this thesis
    by reporting an ablation in which removing the type-check filter
    costs only 1.8 points while removing the PCFG collapses accuracy by
    ~59 points, then concludes that "lightweight statistical parsing,
    without semantic reasoning, is the primary lever." The opening
    thesis (semantics is sufficient and decisive) and the closing thesis
    (statistical parsing is decisive, semantics is marginal) are not
    reconciled, and either one alone would imply a different paper. The
    framing flaw is load-bearing: a reader cannot tell whether the
    contribution is a semantic-disambiguation result or a statistical-
    parsing result, and these positions belong to different research
    traditions in PL/synthesis.
    Detection is high-gating: recognizing that a PCFG-rank + type-filter
    pipeline plus the observed ablation pattern lands in the same
    territory as Yin & Neubig's syntactic neural code generation,
    TranX, and the FlashMeta line — and that the section's headline
    claim about semantic sufficiency is therefore inconsistent with the
    canonical understanding of where the leverage in such pipelines
    actually comes from — requires recall of that literature. A reader
    without that background may read the contradiction as "interesting
    ablation finding" rather than as an unresolved thesis drift.
    The T06 delegation "Take a look at this paragraph" is fully generic
    and does not point at framing, contribution structure, or thesis
    coherence.

