acceptable_outputs_summary: |
  Flags that "Patel and Rajagopal (2021)" appears to be a fabricated or
  unverifiable reference and that the section's main causal claim — that
  contrastive disambiguation is the primary driver of the gain over the
  AmbigQA baseline — rests entirely on that citation. Recommends
  verifying the reference against a bibliographic source and, if it
  cannot be located, removing both the attribution and the dependent
  ablation interpretation, or substituting a real prior work that
  actually introduces the loss being used.

bad_outputs_summary: |
  Suggests prose tightening, restructuring the experimental paragraph,
  adding more languages or datasets, or comparing to additional
  baselines while accepting the Patel and Rajagopal citation at face
  value. Praises the methodological grounding or the clarity of the
  ablation without questioning whether the cited paper actually exists.

