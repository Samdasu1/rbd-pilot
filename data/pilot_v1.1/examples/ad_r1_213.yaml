engineered_flaws:
  R1.7: [F1.7.a]
  notes: |
    Fabricated citation (F1.7.a). "Patel and Rajagopal (2021)" and their
    "contrastive disambiguation procedure" do not exist. The fabricated
    work is load-bearing: the section explicitly attributes the primary
    driver of its gains over the AmbigQA baseline to this method, names
    a specific number (+6.4 F1 on AmbigNQ-dev) supposedly reported by
    Patel and Rajagopal, and uses their loss term as component (ii) of
    the training objective. The ablation result (47.0 F1-answer) is
    explicitly framed as consistent with their reported gains. If the
    citation is fabricated, the methodological provenance, the
    contribution claim, and the interpretation of the ablation all
    collapse. Detection requires moderate familiarity with the AmbigQA
    / open-domain QA literature: a reader in the area would not
    recognize the names or the specific result and would attempt to
    locate the paper. Min et al. (2020) (the AmbigQA paper) is real and
    correctly attributed, which makes the fabricated citation more
    insidious — the surrounding scholarship looks valid. Delegation T10
    ("Help me with this section.") is fully generic and gives no signal
    about the load-bearing dim.

