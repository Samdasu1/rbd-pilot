artifact:
  source: synthetic
  domain: nlp
  word_count: 305
  text: |
    Open-domain question answering systems often return a single answer
    per question, but recent work has shown that many questions admit
    multiple valid interpretations and answers (Min et al., 2020). To
    handle such cases, prior work has proposed disambiguation pipelines
    that rewrite the underlying question to make each interpretation
    explicit before answering.

    In this section we describe DISAMBIG-RR, a retrieve-then-rewrite
    system for ambiguous open-domain QA. The system takes as input a
    question and a set of candidate passages retrieved by a dense
    retriever, and produces a set of (rewritten question, answer) pairs
    covering the plausible interpretations.

    Our rewriting module is initialized from BART-large fine-tuned on
    the AmbigNQ training set. We follow the contrastive disambiguation
    procedure of Patel and Rajagopal (2021), who showed that contrasting
    candidate answers during decoding improves coverage of distinct
    interpretations by 6.4 F1 on AmbigNQ-dev. This loss is the primary
    driver of our reported gains over the AmbigQA baseline.

    Concretely, we train with a multi-task objective that combines
    (i) standard sequence-to-sequence loss for question rewriting and
    (ii) the contrastive disambiguation term from Patel and Rajagopal.
    During inference, we generate up to k=5 candidate rewrites per
    question and prune duplicates by exact-match on the predicted
    answer span.

    We evaluate on AmbigNQ-test and report 49.1 F1-answer and 32.7
    EDIT-F1 for question rewriting, compared to 46.2 / 30.1 for the
    SpanSeqGen baseline of Min et al. (2020). The bulk of the gain
    (2.3 F1-answer) is attributable to contrastive disambiguation;
    ablating this component drops performance to 47.0 F1-answer, in
    line with the gains reported by Patel and Rajagopal in their
    original setup.

    These results suggest that contrastive objectives transfer well
    from the disambiguation setting of Patel and Rajagopal to the
    AmbigQA task, and that retrieval quality is no longer the primary
    bottleneck for current systems. We position DISAMBIG-RR as a strong
    baseline for future work on multi-answer open-domain QA.
