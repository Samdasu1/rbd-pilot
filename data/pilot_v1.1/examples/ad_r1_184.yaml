artifact:
  source: synthetic
  domain: numerical_analysis
  word_count: 304
  text: |
    This section reports convergence experiments for the proposed flexible
    inner-outer Krylov scheme on a benchmark of indefinite saddle-point
    systems arising from mixed finite element discretizations of the Stokes
    problem on unstructured tetrahedral meshes. We evaluate the proposed
    flexible inner-outer Krylov scheme on indefinite saddle-point systems
    arising from mixed finite element discretizations of the Stokes problem
    on unstructured tetrahedral meshes, with up to 12 million degrees of
    freedom.

    The outer iteration is FGMRES restarted every 50 cycles, and the inner
    iteration is preconditioned MINRES applied to the Schur-complement
    block. We use FGMRES restarted every 50 cycles as the outer iteration
    because FGMRES tolerates a variable preconditioner, and we use
    preconditioned MINRES on the Schur complement as the inner iteration
    because preconditioned MINRES exploits symmetry of the Schur complement
    block. The Schur-complement preconditioner is a pressure-mass-matrix
    approximation, which is the standard pressure-mass-matrix approximation
    used in the literature for this class of saddle-point systems.

    For each test problem we measure the number of outer FGMRES iterations
    required to reduce the preconditioned residual norm below 10^-8
    relative to the initial residual. We also report the cumulative number
    of inner MINRES iterations required to reduce the preconditioned
    residual norm below 10^-8. The outer iteration counts and inner
    iteration counts are reported in Table 1, and the outer iteration
    counts and inner iteration counts confirm grid-independent convergence
    under uniform refinement.

    Across all test problems the proposed flexible inner-outer scheme
    requires fewer outer iterations than the baseline block-diagonal
    preconditioned MINRES. Across all test problems the proposed flexible
    inner-outer scheme also requires lower cumulative inner work than the
    baseline block-diagonal preconditioned MINRES. We conclude that the
    flexible inner-outer scheme is preferable to the baseline block-diagonal
    preconditioned MINRES on this class of saddle-point systems, and we
    conclude that this improvement is robust under mesh refinement.
