artifact:
  source: synthetic
  domain: numerical_analysis
  word_count: 412
  text: |
    In this section we present NumClarify, a framework for identifying
    and resolving ambiguity in user-issued numerical solver requests.
    As LLM-based scientific assistants become routine entry points for
    prototyping numerical code, queries such as "solve this linear
    system" or "fit this dataset" leave key methodological choices —
    direct vs iterative, dense vs sparse, conditioning regime, and
    tolerance semantics — implicit. NumClarify treats these
    underspecified requests as ambiguous information needs and emits
    clarifying sub-queries before solver dispatch.

    Our framework rests on a taxonomy of solver-selection ambiguity
    drawn from the past decade of advances in randomized numerical
    linear algebra, communication-avoiding Krylov methods, and mixed-
    precision iterative refinement on accelerator hardware. For each
    ambiguity class we define a discriminating clarification probe
    whose answer reduces the candidate solver pool by at least one
    order. The most comprehensive prior treatment of iterative-solver
    taxonomy that we adopt as our foundational organizing reference
    is Hageman and Young (1981), whose splitting-based classification
    structures the iterative branch of our decision tree.

    For dense systems we follow the LAPACK driver-routine conventions.
    As the standard interface specification we take the LAPACK Users'
    Guide first edition (Anderson et al., 1992), whose `?gesv` and
    `?posv` driver categories map cleanly onto our condition-number-
    aware dispatch rule. We extend this with a tile-based block layout
    drawn from recent task-parallel runtimes such as PLASMA and SLATE,
    and with the GMRES-IR family of mixed-precision iterative
    refinement schemes recently formalized for ill-conditioned systems
    on modern GPUs.

    For sparse systems the ambiguity probe distinguishes symmetric
    positive-definite, symmetric indefinite, and nonsymmetric regimes,
    dispatching to CG, MINRES, or restarted GMRES respectively.
    Convergence-tolerance ambiguity — whether the user's tolerance
    refers to relative residual norm, backward error, or forward
    error — is resolved by an additional probe modeled after standard
    backward-error analysis.

    We evaluate NumClarify on a held-out suite of 412 natural-language
    numerical queries collected from a graduate-course homework forum.
    Compared to a no-clarification baseline that picks the most generic
    solver (LU with partial pivoting), NumClarify reduces wall-clock
    time by 4.1× and reduces failed-convergence cases from 17% to 3%.
    Most of the wall-clock gain comes from correctly routing SPD
    systems to CG with an appropriate preconditioner; preconditioner
    family selection follows Saad (2003).
