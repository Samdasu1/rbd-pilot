acceptable_outputs_summary: |
  Flags that Hageman and Young (1981) cannot be the comprehensive
  organizing reference for a taxonomy whose own framing rests on
  randomized NLA, communication-avoiding Krylov methods, and mixed-
  precision iterative refinement — fields that postdate it by decades —
  and recommends a current survey instead. Likewise flags that the
  LAPACK Users' Guide first edition (1992) cannot be the standard
  interface specification given the section's own appeals to PLASMA,
  SLATE, and GMRES-IR, and recommends the current edition or a
  contemporary interface reference.

bad_outputs_summary: |
  Confirms the citations are formatted correctly, suggests adding DOIs
  or page numbers, recommends adding more references for completeness,
  or asks for a unified bibliography style. Tightens the prose around
  the references without noticing that two anchor citations are
  decades older than the literature the section claims to organize.
  Treats the temporal mismatch between "past decade of advances" and a
  1981 anchor reference as acceptable framing.

