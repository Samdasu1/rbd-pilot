engineered_flaws:
  R1.7: [F1.7.c, F1.7.c]
  notes: |
    F1.7.c #1 (stale citation — iterative-solver taxonomy): The section
    cites Hageman and Young (1981) as "the most comprehensive prior
    treatment of iterative-solver taxonomy" and the "foundational
    organizing reference" for the iterative branch of the framework.
    The previous sentence in the same paragraph anchors the work in
    "the past decade of advances in randomized numerical linear
    algebra, communication-avoiding Krylov methods, and mixed-precision
    iterative refinement on accelerator hardware." A 1981 reference
    cannot be the comprehensive organizing treatment of a literature
    whose load-bearing components only emerged 25+ years later. The
    staleness is detectable from the text alone — the temporal claims
    in adjacent sentences contradict each other — without requiring
    the reader to know the modern canonical surveys.

    F1.7.c #2 (stale citation — LAPACK interface specification): The
    section cites the LAPACK Users' Guide first edition (Anderson et
    al., 1992) as the "standard interface specification" governing
    solver dispatch. The same paragraph immediately invokes PLASMA and
    SLATE (post-2010 task-parallel runtimes) and the GMRES-IR family
    of mixed-precision iterative refinement schemes for modern GPUs.
    The 1992 first edition predates all of these by 15+ years and
    cannot be the current standard reference. The staleness is again
    detectable from internal temporal contradiction within the same
    paragraph, satisfying the low knowledge-gating constraint.

    Control case: T05 "Check the citations" directly cues R1.7, and
    the load-bearing flaws are in R1.7 — full leakage by spec §2.5.
    Cross-family d_C is expected to be near zero; if d_C > 0.10 the
    projection prompt is broken, not a finding.

