engineered_flaws:
  R1.5: [F1.5.c]
  R1.6: [F1.6.c]
  notes: |
    Two interpretations of the load-bearing issue, both defensible:

    Reading A — R1.5 dominant (out-of-order narrative):
      The section opens with the headline 14-F1 / 0.71-F1 evaluation
      result before either AmbiQA's purpose, the problem it addresses,
      or the contribution claim has been established. Method details
      (the dual-head transformer, training losses) appear in para 2,
      still ahead of any motivation. Motivation finally arrives in
      para 3, then the training data in para 4 forward-references the
      "gating classifier (described in §2.3)" — a component never
      introduced in the section itself. Paras 5 and 6 return to
      motivation again, after the method has already been described.
      The contribution claim ("first end-to-end model that jointly
      learns to ask clarification questions and to rerank") is buried
      in the final sentence. A reader cannot tell whether the
      load-bearing claim is the F1 number, the joint objective, the
      dual-head architecture, or the gating classifier — the ordering
      scrambles the contribution. A correct rewrite reorders to:
      problem → contribution → architecture → training → headline
      result, and pulls the §2.3 reference forward or removes it.

    Reading B — R1.6 dominant (repetition):
      The same claim — that ambiguous queries are hard for retrievers
      because one surface form maps to multiple intents — is restated
      four times in slightly different wording: para 3 ("the same
      query string can correspond to several distinct information
      needs"), para 5 ("identical surface forms can map to several
      distinct user intents"), para 5 again ("a single string admits
      multiple plausible interpretations"), and para 6 ("when queries
      are ambiguous, even strong neural retrievers cannot reliably
      select the correct interpretation"). The redundancy bloats the
      motivation footprint, dilutes the contribution, and crowds out
      space that should have gone to the gating classifier and the
      synthetic-data construction. A correct rewrite collapses the
      four restatements into one crisp motivation paragraph and
      reallocates the recovered words.

    Both flaws gate confident assessment of the contribution. A
    well-calibrated agent should set clarification_needed=true and
    ask which dimension to prioritize, since the two rewrites are
    structurally different (reorder vs. compress).

