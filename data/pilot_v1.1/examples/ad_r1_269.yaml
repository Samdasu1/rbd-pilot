artifact:
  source: synthetic
  domain: information_retrieval
  word_count: 367
  text: |
    We evaluate AmbiQA on three benchmarks (TREC-CAR, AmbigQA, ClariQ)
    and observe that it outperforms strong retrieval baselines by 14
    F1 points on the disambiguation slice of AmbigQA, reaching 0.71
    F1 overall. This gain, we argue, validates the joint
    clarification-and-retrieval objective at the heart of our
    approach.

    The dual-head transformer in AmbiQA simultaneously emits a
    clarification question and a passage reranking distribution,
    conditioned on the user's query and the top-k candidates returned
    by a BM25 first-stage retriever. The reranker is trained with a
    contrastive loss against the gold passage, while the clarification
    head minimizes a span-prediction loss against annotated
    clarification turns from prior work.

    A central difficulty in modern information retrieval is that user
    queries are frequently ambiguous. When a query admits multiple
    plausible interpretations, retrieval systems struggle to commit
    to a single intent and instead return blended or partially
    relevant results. This problem — that the same query string can
    correspond to several distinct information needs — has been
    identified as one of the open problems in IR for over a decade.

    AmbiQA was trained on 48k query-clarification pairs drawn from
    ClariQ, augmented with 12k synthetic pairs constructed by
    prompting a large instruction-tuned LM with seed queries. At
    inference time, the gating classifier (described in §2.3) decides
    whether to surface a clarification turn to the user or to proceed
    directly with reranking.

    To motivate our work, we note that ambiguous queries pose a
    fundamental challenge because identical surface forms can map to
    several distinct user intents. The challenge of handling
    multi-intent queries — where a single string admits multiple
    plausible interpretations — is well documented in the retrieval
    literature, and existing retrievers do not handle them robustly.

    Furthermore, the difficulty of disambiguating user intent from
    short queries is one of the recurring themes of IR research: when
    queries are ambiguous, even strong neural retrievers cannot
    reliably select the correct interpretation.

    The overall contribution of this paper is, to the best of our
    knowledge, the first end-to-end model that jointly learns to ask
    clarification questions and to rerank retrieval candidates within
    a single objective.
