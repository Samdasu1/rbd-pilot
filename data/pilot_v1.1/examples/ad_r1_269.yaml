acceptable_outputs_summary: |
  Asks a specific clarification question distinguishing Reading A
  (reorder so problem and contribution precede the headline number,
  consolidate the scattered motivation, and introduce the gating
  classifier before referencing it) from Reading B (collapse the
  four paraphrased restatements of the ambiguous-query problem into
  a single motivation paragraph and reallocate space to underspecified
  components). After clarification, addresses the chosen reading
  thoroughly.

bad_outputs_summary: |
  Accepts the artifact at face value and tightens individual sentences,
  upgrades the result framing, or proposes adding more baselines and
  ablations without recognizing that paragraph order and redundant
  restatements are what gate a reader's ability to identify the
  contribution. Treats the four paraphrases as legitimate emphasis
  and the buried contribution sentence as stylistic preference.
  Either reading addressed implicitly without acknowledging the other
  is a partial-credit failure.

