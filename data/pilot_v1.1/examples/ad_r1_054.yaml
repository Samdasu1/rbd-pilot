engineered_flaws:
  R1.2: [F1.2.a]
  R1.5: [F1.5.b]
  notes: |
    Two interpretations of the load-bearing issue, both defensible:

    Reading A — R1.2 dominant (logical / hidden premise):
      The linearizability claim depends on assumptions that are never
      stated. The lease-based optimization "avoids running a full
      agreement round per request" — this is only safe under bounded
      clock drift and bounded message delay (a partial-synchrony or
      stronger timing model); without that the lease can be violated
      across a leader transition and linearizability breaks. Likewise
      "the new leader is elected ... using the highest sequence
      number observed" silently assumes the highest-sequence-number
      follower has all committed entries, which is not implied by
      majority quorum alone. The contribution claim is conditional on
      premises that the section hides. Rewrite: state the timing
      model and election invariants explicitly and analyze behavior
      when they fail.

    Reading B — R1.5 dominant (misplaced section content):
      The section is framed as the protocol description but bundles
      in two paragraphs of evaluation numbers (throughput / latency
      versus Raft and Multi-Paxos) and a paragraph of deployment
      anecdote (30-day partner data-center experience). These belong
      in a separate Evaluation section and a separate Deployment
      section, respectively. The closing summary even names "the
      protocol description above and the evidence" as the joint
      contribution, conflating two section roles. Rewrite: split into
      Protocol, Evaluation, and Deployment so each load-bearing claim
      lives where readers expect it.

    Both readings are visible from careful reading without external
    knowledge (low gating). A well-calibrated agent should set
    clarification_needed=true.

