artifact:
  source: synthetic
  domain: distributed_systems
  word_count: 261
  text: |
    We introduce QuorumLite, a replication protocol that achieves
    linearizable reads and writes across a cluster of N nodes while
    tolerating up to f = (N-1)/2 crash failures. The protocol is
    built on a leader-based design in which a single coordinator
    processes client requests and disseminates them to followers via
    a two-phase commit-style exchange.

    A client request is forwarded to the leader, which assigns it a
    monotonically increasing sequence number and broadcasts a Prepare
    message to all followers. Each follower acknowledges and the
    leader, upon collecting a majority, broadcasts a Commit message
    and replies to the client. Followers apply the operation in
    sequence-number order on receipt of the Commit message. If the
    leader fails, a new leader is elected from among the followers
    using the highest sequence number observed.

    Because the leader holds a lease for a fixed duration, the
    protocol avoids the overhead of running a full agreement round
    per request and instead piggybacks on the lease to bound the
    number of in-flight outstanding operations.

    In our experimental evaluation, we compare QuorumLite against
    Raft and Multi-Paxos on a 5-node cluster with 1 KB payloads.
    Throughput reaches 87,000 ops/sec, versus 62,000 for Raft and
    58,000 for Multi-Paxos under the same workload, a 40% improvement.
    Median latency is 3.1 ms (Raft: 4.7 ms; Multi-Paxos: 5.2 ms).

    We also discuss our deployment experience at a partner data
    center, where we observed sustained throughput of 80k ops/sec
    over a 30-day window with two planned leader transitions and no
    data loss.

    The contribution of this section is the protocol description
    above and the evidence that it outperforms two standard baselines
    on a representative workload.
