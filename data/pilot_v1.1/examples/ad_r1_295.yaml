delegation: "Verify the evidence supports the claims."

artifact:
  source: synthetic
  domain: control_theory
  word_count: 358
  text: |
    We introduce ControlRoute, a feedback control framework for
    hybrid-LLM query routing in cost-aware serving deployments.
    ControlRoute models the small-model / large-model dispatch fraction
    u(k) as the actuated input of a discrete-time linear plant P(z),
    with the regulated output y(k) defined as the gap between achieved
    response quality and a user-specified setpoint q*. The disturbance
    d(k) captures incoming query-difficulty drift. We synthesize a PI
    compensator C(z) via loop-shaping at a target crossover of
    0.3 rad/sample, and validate the design on a 30-day production
    trace (4.2M queries) from a heterogeneous LLM cluster.

    Our central claim is twofold: (i) ControlRoute tracks the quality
    setpoint robustly under workload perturbations, and (ii) the
    closed-loop system exhibits a superior stability margin relative to
    the rule-based open-loop router currently deployed.

    Table 2 reports two metrics. We measure tracking via the
    steady-state error e_ss between observed and target quality,
    evaluated on the held-out final week of the trace. We measure
    closed-loop stability via the gain margin GM of the loop transfer
    function L(z) = C(z)P(z), defined as the additional loop gain
    (in dB) that can be tolerated before the closed loop becomes
    unstable. ControlRoute attains e_ss = 0.03 and GM = 2.1 dB; the
    open-loop baseline attains e_ss = 0.07 and GM = 8.4 dB.

    The reduction in steady-state error from 0.07 to 0.03 — a 57%
    relative improvement — directly confirms claim (i): ControlRoute
    tracks the quality setpoint robustly under the workload
    perturbations present in the trace, whereas the heuristic baseline
    accumulates substantially larger residual error in the face of the
    same disturbances. Claim (ii) is established by the gain-margin
    comparison. ControlRoute's GM of 2.1 dB is markedly tighter than
    the baseline's 8.4 dB, indicating that ControlRoute closes the loop
    with greater authority and consequently realizes superior
    closed-loop stability relative to the open-loop competitor.
    Together these results establish ControlRoute as the preferred
    routing strategy for any cost-quality operating point in production
    LLM serving deployments.
