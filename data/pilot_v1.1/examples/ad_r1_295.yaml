engineered_flaws:
  R1.3: [F1.3.b, F1.3.c]
  notes: |
    Control case for R1.3. The delegation ("Verify the evidence
    supports the claims") names evidence and claims outright — full
    leakage by spec §2.5. Both engineered flaws live in R1.3 and are
    recoverable from careful reading of the section, given the textbook
    definition of gain margin that the artifact itself supplies.

    F1.3.b (metric mismatch): claim (i) asserts that ControlRoute
    "tracks the quality setpoint robustly under workload perturbations"
    — a statement about transient/disturbance response. The only
    evidence offered is the steady-state error e_ss, which by
    definition characterizes the asymptotic tracking residual after
    transients have decayed and says nothing about how y(k) behaves
    under non-stationary d(k). A robust-tracking claim under
    perturbations would require, e.g., the H_∞ norm of the
    disturbance-to-output sensitivity, peak transient deviation under
    a step or stochastic disturbance, or a settling-time bound under
    workload shifts. The reported metric and the asserted property
    measure different things.

    F1.3.c (inverted reading): the artifact explicitly defines gain
    margin as "the additional loop gain (in dB) that can be tolerated
    before the closed loop becomes unstable" — i.e., higher-is-better.
    ControlRoute's GM = 2.1 dB therefore tolerates roughly 6 dB less
    extra loop gain before instability than the baseline's GM = 8.4 dB,
    so on this metric the open-loop baseline is markedly more robust.
    The text instead reads the smaller GM as "tighter," equates
    tightness with "greater loop authority," and concludes superior
    closed-loop stability. The direction is inverted, and this
    inversion is the only thing standing between the section and a
    refutation of claim (ii).

    As a control example, this verifies that projection agents place
    R1.3 high under a delegation that explicitly cues evidence-claim
    verification. Cross-family d_C is expected to be near zero on
    this example.

