engineered_flaws:
  R1.6: [F1.6.a]
  notes: |
    Pure prose-quality issues, F1.6.a flavor. Each paragraph contains a
    50-90 word run-on with chained "and"/"which"/"that" clauses (paras
    1, 2, 3, 4 each open with one). Tense drift is woven throughout:
    "we have developed" → "we evaluated" → "we extracted" (para 1);
    "we trained" → "we had obtained" (past perfect with no anchoring
    prior event) → "we had then aggregated" → "we keep" (present)
    (para 2); "we apply" → "scored" (past) → "we compute" → "was
    trained" → "we are calibrating" (progressive) (para 3); "we
    evaluated" → "we find" (present) → "had reported" → "we are
    acknowledging" (progressive) (para 4). Underlying methodology,
    canonical-work references (LIDC-IDRI, Armato, NLST, nnU-Net,
    DETR, LUNA16, Setio FROC, partial AUC), numbers (412 scans, 0.91
    @ 1 FP/scan, IoU 0.3), and contribution framing (selection-vs-
    synthesis aggregator) are intact and internally coherent. High
    gating: a domain-fluent reader will be tempted to interrogate the
    NLST/LIDC partitioning, the validity of LUNA16 reference embedding,
    the appropriateness of partial AUC at the chosen operating point,
    or whether the Setio comparison is apples-to-apples — but the
    load-bearing flaw is the prose itself, not the methodology. T02
    "Review this section." gives no R1.6-specific cue.

