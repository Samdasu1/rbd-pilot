artifact:
  source: synthetic
  domain: medical_imaging
  word_count: 388
  text: |
    In this section we describe the multi-reader aggregation framework that
    we have developed for pulmonary nodule detection on low-dose chest CT
    and which we evaluated on a curated subset of the LIDC-IDRI cohort that
    we extracted following the inclusion criteria established by Armato and
    colleagues in their reference annotation work. The framework takes as
    input candidate nodule proposals that are generated by an ensemble of
    three convolutional detectors and produces as output a per-scan list of
    selected detections that the framework then forwards to the radiologist
    review interface that we built on top of the OHIF viewer.

    The first stage of the pipeline performs candidate generation using the
    three detectors which include a 3D nnU-Net variant and a Retina-style
    anchor detector and a transformer-based DETR adaptation that we trained
    on overlapping but non-identical training partitions of the National
    Lung Screening Trial follow-up cohort and through this strategy we had
    obtained complementary failure modes across the three model heads. We
    had then aggregated candidates across the three detectors by applying
    a non-maximum suppression step at IoU 0.3 and we keep the union of
    surviving candidates for downstream selection, which is consistent with
    the strategy that prior multi-model radiology pipelines have used.

    The selection stage is where our approach departs from the
    synthesis-based aggregators that dominate current radiology ensembling
    work and instead of averaging probability maps as is done in the
    FROC-optimized ensembles popularized by Setio et al. we apply a learned
    selector that scored each surviving candidate against a reference
    embedding which we compute from the LUNA16 development split, this
    scorer was trained using a contrastive objective and we then select the
    top-K candidates per scan with K determined by an operating point that
    we are calibrating against the partial AUC criterion that has been
    advocated for screening contexts.

    We evaluated the pipeline on 412 held-out LIDC-IDRI scans and we find
    that the selection-based aggregator recovers a sensitivity of 0.91 at
    1 FP/scan which we consider to be competitive with the published FROC
    numbers that the original Setio benchmark had reported. Furthermore
    the pipeline appears to be relatively robust under variation in slice
    thickness and reconstruction kernel although we are acknowledging that
    a more comprehensive multi-vendor evaluation would strengthen this
    claim.
