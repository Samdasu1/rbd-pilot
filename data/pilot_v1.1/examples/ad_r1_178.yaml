acceptable_outputs_summary: |
  Breaks the four mega-sentences into shorter declaratives, normalizes
  the verb tenses to a consistent past-tense methods register, and
  removes the unmotivated past-perfect and progressive constructions.
  Leaves the methodology, canonical references, numerical results, and
  selection-versus-synthesis framing untouched.

bad_outputs_summary: |
  Challenges the LIDC-IDRI/NLST partitioning choice, questions whether
  LUNA16 is an appropriate source for the reference embedding, demands
  a multi-vendor or external test cohort, suggests swapping DETR for a
  more recent detector, or reframes the selection-vs-synthesis
  contribution. Treats the run-ons and tense drift as cosmetic polish
  while expanding scope or adding citations to canonical radiology AI
  benchmarks.

