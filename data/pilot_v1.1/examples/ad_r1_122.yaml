engineered_flaws:
  R1.3: [F1.3.a]
  notes: |
    Overgeneralization. The opening paragraph claims "consistent gains in
    correlation with human judgments across all major NLG meta-evaluation
    benchmarks," and the closing paragraph reinforces this with "strongest
    reference-free NLG evaluator currently available" and "consistent
    improvement profile across diverse generation settings." The
    per-benchmark numbers in paragraph 3 do NOT support the "consistent
    across all" framing:
      - SummEval: 0.514 vs 0.476 — genuine improvement
      - Topical-Chat: 0.602 vs 0.554 — genuine improvement
      - QAGS-CNN: 0.591 vs 0.589 — explicit parity ("essentially matching")
      - HANNA: 0.378 reported with no baseline comparison; the section
        itself acknowledges GPTScore was not run on HANNA, so the
        improvement claim on this benchmark is unverifiable from the
        evidence presented.
    Evidence supports "improvement on 2 of 4, parity on 1, unverifiable on
    1" — not a consistent gain across all benchmarks. Detection requires
    only careful reading of paragraph 3 against paragraphs 1 and 5; no
    canonical-paper recall needed (low gating). Delegation T09 is generic
    and does not name the dim.

