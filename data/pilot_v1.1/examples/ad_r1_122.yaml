acceptable_outputs_summary: |
  Audits the per-benchmark Spearman numbers against the "consistent gains
  across all" and "strongest reference-free evaluator" claims. Identifies
  that QAGS-CNN is explicitly a parity result, that HANNA has no baseline
  comparison and so cannot support an improvement claim, and recommends
  rewording to "improvement on SummEval and Topical-Chat, parity on
  QAGS-CNN, no comparison on HANNA" — or running GPTScore on HANNA to
  close the gap.

bad_outputs_summary: |
  Polishes prose, suggests adding more benchmarks or more baselines,
  questions the rubric-conditioning novelty, or proposes a stronger
  ablation. Accepts the "consistent across all" and "strongest available"
  framing at face value without auditing the four reported numbers
  against the headline claim.

