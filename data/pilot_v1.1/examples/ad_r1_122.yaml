artifact:
  source: synthetic
  domain: generative_ml
  word_count: 308
  text: |
    We introduce EvalLLM, a reference-free NLG evaluator built atop GPT-4
    that delivers consistent gains in correlation with human judgments
    across all major NLG meta-evaluation benchmarks. EvalLLM follows a
    chain-of-thought scoring protocol: the model first generates a short
    rubric tailored to the target dimension (coherence, fluency, relevance,
    or factuality), then assigns a 1–5 score conditioned on the source and
    candidate output.

    We evaluate EvalLLM on four widely-used meta-evaluation benchmarks:
    SummEval (news summarization), Topical-Chat (open-domain dialogue),
    QAGS-CNN (factual consistency), and HANNA (story generation). For each
    benchmark we report sample-level Spearman correlation against human
    ratings, averaged over annotated dimensions and aggregated across the
    test split.

    On SummEval, EvalLLM reaches a Spearman ρ of 0.514 compared to
    GPTScore's 0.476, a relative improvement of approximately 8%. On
    Topical-Chat, EvalLLM achieves ρ = 0.602 versus GPTScore's 0.554, again
    improving over the prior reference-free baseline. On QAGS-CNN, EvalLLM
    reports ρ = 0.591, essentially matching GPTScore's 0.589. On HANNA,
    EvalLLM achieves ρ = 0.378; we do not report a GPTScore figure for
    this benchmark since the original GPTScore paper does not include
    HANNA in its evaluation suite.

    We attribute these gains to the rubric-conditioned chain-of-thought
    protocol, which appears to focus the model's attention on
    dimension-relevant features of the candidate text. Ablating the rubric
    step reduces Spearman correlation by an average of 0.04 across
    SummEval and Topical-Chat.

    Taken together, these results establish EvalLLM as the strongest
    reference-free NLG evaluator currently available. The consistent
    improvement profile across diverse generation settings — summarization,
    dialogue, factuality, and story generation — suggests that
    rubric-conditioned LLM judges generalize well to new NLG tasks without
    additional task-specific tuning, positioning EvalLLM as a drop-in
    replacement for traditional reference-based metrics such as BLEU and
    ROUGE in future NLG benchmarking pipelines.
  source_provenance: null

