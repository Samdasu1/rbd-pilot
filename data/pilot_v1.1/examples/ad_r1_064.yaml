engineered_flaws:
  R1.1: [F1.1.a]
  notes: |
    Thesis drift. Para 1 stakes the load-bearing claim on "formal Lyapunov
    stability guarantees" and a "certifiable region of attraction" coupling
    language grounding to closed-loop stability analysis. The body, however,
    never constructs a Lyapunov function, never derives a region of
    attraction, and never analyzes the stability of switching between
    candidate references (which is the non-trivial part — switched-system
    stability under arbitrary interpretation flips is not implied by inner-
    loop PD tuning). By Para 4 the thesis has silently migrated to an
    empirical claim: "more robust and natural human-robot dialog" and "a
    practical recipe for deploying language-driven robots." The contribution
    a reader is asked to accept at the end (empirical robustness of a
    confidence-thresholded chooser) is a different load-bearing claim than
    the one introduced (formally stable language-mediated control). Either
    framing could be defensible on its own; the section as written conflates
    them. Detection is from careful reading alone — no canonical-paper
    recall is required (low gating). T02 "Review this section" does not
    signal R1.1 specifically; it is a generic review request.

