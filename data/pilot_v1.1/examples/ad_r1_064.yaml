acceptable_outputs_summary: |
  Identifies that the opening claim (formal stability guarantees, certifiable
  region of attraction for the language-mediated loop) is not what the
  section actually delivers, and that the closing claim has migrated to an
  empirical robustness/usability result. Recommends either committing to the
  formal claim (and providing the switched-system stability argument) or
  rewriting the contribution as an empirical study and dropping the
  Lyapunov framing. Does not treat the issue as prose-level polish.

bad_outputs_summary: |
