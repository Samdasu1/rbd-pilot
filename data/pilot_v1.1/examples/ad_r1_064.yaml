  experiments and baselines while leaving the mismatch between the
  formally framed contribution and the empirically supported one untouched.
  Suggests citations for Lyapunov methods or for LLM grounding without
  noticing that the section's stated thesis is not the thesis its evidence
  supports. Questions the choice of τ or the user-study scale without
  flagging the drift.

