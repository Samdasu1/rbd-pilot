acceptable_outputs_summary: |
  Identifies the two "first" claims as unsupported and names canonical
  nearest-neighbor lines of work the section should be contrasted against
  — multiple model adaptive control, supervisory switching control,
  gain scheduling, explicit/event-triggered MPC, or transfer-learning
  approaches to controller adaptation. Suggests rewording the
  contribution to a defensible delta (e.g. a specific learned-gate design
  or quantitative regime) rather than a sweeping primacy claim.

bad_outputs_summary: |
  Accepts the "first" framing and suggests sharpening the writing, adding
  more benchmarks, tightening the IAE comparison, or expanding the
  ablation. Praises the meta-model gate as a novel control architecture
  without questioning whether selecting between cheap and expensive
  controllers at runtime is in fact a long-standing problem with an
  established literature.

