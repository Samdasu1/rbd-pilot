engineered_flaws:
  R1.4: [F1.4.a]
  notes: |
    Two unsupported "first" claims sit in heavily trodden control-theory
    territory. The claim that CostMPC is "the first framework that performs
    per-sample, query-conditional supervisory selection between a cheap
    and an expensive controller" ignores a long lineage: multiple model
    adaptive control (Athans, Narendra), supervisory switching control
    (Morse, Hespanha, Liberzon), gain scheduling, explicit/multi-parametric
    MPC (Bemporad et al.), and event-triggered MPC — all of which gate
    expensive control-law evaluation on instantaneous regime estimates.
    The "first cross-plant transfer for online controller selection" claim
    is similarly unsupported: transfer learning for controller adaptation
    and L1/L4 adaptive control with model libraries are well-studied. The
    engineering pipeline (MLP gate, residual window, IAE evaluation) is
    coherent — only the novelty positioning is broken. Detection requires
    moderate field recall (knowing MMAC / supervisory switching exists);
    a careful reader without that recall might miss it.

