artifact:
  source: synthetic
  domain: control_theory
  word_count: 285
  text: |
    We introduce CostMPC, a supervisory controller selection framework that
    learns at runtime whether to dispatch a given operating-point query to
    a cheap PID law or an expensive nonlinear MPC. The motivation is
    straightforward: in industrial process control, a substantial fraction
    of plant trajectories sit well inside the linear regime where a tuned
    PID achieves tracking error indistinguishable from full nonlinear MPC,
    yet the latter is invoked uniformly, paying its quadratic-program solve
    cost on every sample.

    CostMPC trains a lightweight meta-model — a two-layer MLP on residual
    statistics over a 50-sample sliding window — to predict, for each
    incoming reference, whether the PID law's expected closed-loop tracking
    error will fall within a user-specified tolerance. When the predicted
    error is below threshold, control is delegated to PID; otherwise the
    QP is solved. To our knowledge, this is the first framework that
    performs per-sample, query-conditional supervisory selection between
    a cheap and an expensive controller in the process-control setting.

    We validate CostMPC on the Tennessee Eastman benchmark and on a
    four-tank cascade. On Tennessee Eastman, CostMPC reduces average solver
    invocations by 62% relative to always-on MPC while keeping IAE within
    3% of the MPC baseline. On the four-tank system, the savings are 71%
    with IAE degradation of 2.4%. We further show that the meta-model
    generalizes: a regressor trained on Tennessee Eastman transfers to the
    four-tank plant with only 4% IAE degradation after a brief calibration
    phase, which we believe constitutes the first demonstration of
    cross-plant transfer for online controller selection.

    Section 5 ablates the window size and threshold; Section 6 outlines
    safety arguments under the gating policy.
