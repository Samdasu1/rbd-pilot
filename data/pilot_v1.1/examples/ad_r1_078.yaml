artifact:
  source: synthetic
  domain: computer_vision
  word_count: 304
  text: |
    We present VisCons, a method for improving compositional visual
    reasoning in vision-language models (VLMs) through inference-time
    self-consistency over sampled rationales. Building on the observation
    that diverse reasoning paths often converge on the correct answer when
    marginalized, VisCons samples K=20 chain-of-thought traces from a
    frozen VLM (LLaVA-1.5, InstructBLIP) at temperature 0.7 and aggregates
    the final answers via plurality vote. Our central thesis is that
    rationale diversity at decode time, not model scale or additional
    supervision, is the principal lever for unlocking latent compositional
    reasoning in mid-sized open VLMs.

    We instantiate VisCons on GQA, A-OKVQA, and CLEVRER. For each
    image-question pair, we sample K rationales conditioned on the prompt
    "Describe what is in the image, then reason step by step before
    answering." The final answer is selected by majority vote over the K
    parsed answer spans, with ties broken by total log-likelihood.

    To strengthen the consistency signal, we further introduce a
    rationale-distillation stage in which high-agreement rationales drawn
    from a stronger teacher VLM are used to fine-tune the student via
    token-level cross-entropy for three epochs at learning rate 2e-5.
    After this stage, the student's single-sample accuracy on A-OKVQA
    rises from 56.2% to 61.8%, exceeding the K=20 inference-time-only
    result of 60.4%. On CLEVRER the gap is wider: 48.1% single-sample
    after distillation versus 44.7% with inference-time voting alone.

    Our ablations confirm that this distillation stage, rather than
    decode-time aggregation, is the principal driver of the reported
    gains: removing it shrinks the improvement over the baseline by
    roughly 70%. We therefore argue that consistency-filtered rationale
    supervision during fine-tuning is the right way to unlock compositional
    reasoning in mid-sized VLMs, and that inference-time sampling alone
    leaves substantial accuracy on the table.
