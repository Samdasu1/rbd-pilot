acceptable_outputs_summary: |
  Identifies that the section opens by claiming decode-time rationale
  diversity is the contribution and the principal lever, but closes by
  attributing the gains to a training-time distillation stage and
  declaring inference-time sampling insufficient — two incompatible
  contribution claims. Proposes picking one thesis (either an
  inference-time method positioned against self-consistency baselines,
  or a self-training/distillation method positioned against
  consistency-filtered self-training work) and rewriting the section
  around it, rather than smoothing the prose.

bad_outputs_summary: |
  Polishes the prose, tightens the prompt wording, asks for more
  benchmarks or larger K, or treats the distillation stage as a natural
  extension of the inference-time method without flagging that the
  section's contribution claim has flipped. Suggests adding citations
  to LLaVA-1.5 or InstructBLIP, or questions the temperature setting,
  while leaving the contradictory opening and closing theses intact.

