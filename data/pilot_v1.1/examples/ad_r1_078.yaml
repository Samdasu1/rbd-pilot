engineered_flaws:
  R1.1: [F1.1.a]
  notes: |
    Thesis drift. Para 1 stakes the section's contribution on an
    inference-time claim: "rationale diversity at decode time, not model
    scale or additional supervision, is the principal lever" — i.e., the
    thesis is that decode-time self-consistency, with no extra training,
    unlocks compositional reasoning. By Para 4 the thesis has moved to
    the opposite position: the distillation fine-tuning stage is named
    "the principal driver," ablations attribute ~70% of gains to it, and
    the section concludes that "inference-time sampling alone leaves
    substantial accuracy on the table." The opening thesis (decode-time
    is the lever; no extra supervision needed) and the closing thesis
    (training-time consistency-distillation is what matters; inference-
    time alone is insufficient) are mutually contradictory contribution
    claims. Detecting this requires recognizing that decode-time
    self-consistency (Wang et al., 2022) and consistency-filtered
    rationale distillation (e.g., STaR / ReST-style self-training, and
    multimodal-CoT training-time pipelines) are distinct research
    paradigms with distinct mechanisms — without recall of the canonical
    inference-time vs. self-training literature, a reader is likely to
    read the two paragraphs as a single coherent pipeline rather than as
    a thesis that has slid from one paradigm to its opposite. Hence high
    knowledge_gating. The T06 delegation "Take a look at this paragraph."
    is generic and does not signal R1.1.

