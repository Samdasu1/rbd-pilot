artifact:
  source: modified-real
  domain: power_systems_v2g
  word_count: 215
  text: |
    This paper quantified a substantial commitment collapse in constrained
    reinforcement learning for V2G fleet aggregation across three European
    markets. Neither soft penalties (PPO, ~45%), Lagrangian relaxation
    under a static horizon (CMDP, ~50%), nor horizon-matched retraining
    (CMDP rolling-trained, 0%) achieves market-viable commitment under
    rolling re-planning.

    Our comparison spans pure RL, an engineered model-based stack, and
    two hybrid coupling schemes (post-hoc and integrated). The integrated
    form is realized within an LP optimizer; whether end-to-end RL
    architectures can internalize the inter-window coupling as a
    differentiable constraint while preserving arbitrage capability
    remains open. Historical day-ahead prices are replayed but fleet
    dynamics remain simulated; absolute cost figures are relative
    rather than deployment-grade projections.

    The model-based combined strategy maintains greater than 99.6%
    commitment by integrating inter-window coupling directly into its
    LP objective. Supplementary coupling experiments clarify that
    post-hoc coupling applied to RL restores commitment to 100% but
    eliminates arbitrage revenue, indicating that coupling must be
    integrated into the planning objective.

    PPO commitment weight and CMDP learning rate were not exhaustively
    tuned, though gradient dominance suggests soft-penalty remedies
    are structurally limited. Battery degradation is not modeled;
    heterogeneous fleets would alter the constraint landscape. Training
    under the rolling protocol was evaluated on all three markets and
    yielded zero commitment.

    Future work should develop end-to-end RL architectures that
    internalize the coupling constraint during training.
  source_provenance: paper_4_isgt_conclusion_plus_limitations_blended

