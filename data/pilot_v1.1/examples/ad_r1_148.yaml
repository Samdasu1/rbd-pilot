artifact:
  source: synthetic
  domain: speech_recognition
  word_count: 245
  text: |
    Spoken language understanding has matured rapidly with the advent of
    large speech models, yet evaluating how well ASR systems handle complex
    multi-step spoken instructions remains underexplored. We introduce
    SpokenStep, a benchmark and evaluation protocol for assessing ASR
    robustness on compound voice commands that include conditionals,
    sequencing, and intra-utterance reference resolution.

    SpokenStep contains 4,200 utterances recorded by 86 speakers across 12
    task domains (smart-home control, calendar, navigation, transcription
    editing, etc.). Each utterance is annotated with a decomposition into
    atomic sub-instructions and a target action sequence. We score systems
    with a Decomposed Instruction Recognition Score (DIRS), which credits
    partial fulfillment when an ASR-derived transcript supports correct
    execution of a subset of the atomic steps. This decomposed scoring is,
    to our knowledge, the first metric for ASR that aligns transcription
    quality with downstream multi-step instruction execution rather than
    with surface word-level fidelity.

    We benchmark four contemporary ASR systems on SpokenStep and report
    DIRS scores ranging from 0.41 to 0.67. Word error rate (WER) on the
    same recordings ranges from 6.8% to 11.2%, and we observe weak rank
    correlation (Spearman 0.31) between WER and DIRS — confirming that
    conventional WER is an inadequate proxy for instruction-execution
    quality.

    Our contribution is threefold. First, we provide the first large-scale
    spoken multi-step instruction corpus with sub-instruction annotations.
    Second, we introduce DIRS as a downstream-aligned ASR evaluation
    metric. Third, our analysis exposes the WER-DIRS divergence as a
    structural problem in current ASR evaluation practice. We expect
    SpokenStep to motivate new training objectives for voice-agent ASR
    systems where partial-credit recognition of atomic sub-tasks matters
    more than overall transcription minimization.
