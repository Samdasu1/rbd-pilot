acceptable_outputs_summary: |
  Flags that the section makes multiple "first" claims without naming
  any nearest-neighbor prior benchmark or metric, and points out at
  least one concrete comparator the authors should position against
  (e.g. existing spoken-instruction or spoken-language-understanding
  benchmarks, semantic/intent error rates, slot-filling F1 evaluations).
  Suggests rewording the contributions to a defensible delta over a
  named baseline rather than against an unspecified void.

bad_outputs_summary: |
  Tightens prose, fixes phrasing, reorders the contribution list, or
  suggests adding more speakers or domains to SpokenStep. Accepts the
  three "first" claims at face value and praises the WER-DIRS analysis
  as a clean novelty story, without noting that no comparator benchmark
  or metric is named anywhere in the section.

