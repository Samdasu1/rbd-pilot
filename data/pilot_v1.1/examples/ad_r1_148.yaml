engineered_flaws:
  R1.4: [F1.4.b]
  notes: |
    The section advances three "first" claims — first large-scale spoken
    multi-step instruction corpus with sub-instruction annotations, first
    ASR metric aligned with downstream multi-step execution, and a novel
    diagnosis of the WER-vs-execution gap — without naming a single
    nearest-neighbor prior work. Spoken-instruction benchmarks and
    semantic/intent-aware ASR metrics are an active area (spoken-intent
    corpora, slot-filling F1, semantic error rate, conversational voice
    assistant evals), but the section cites zero comparators and stakes
    its novelty in a vacuum. Detection does not require canonical-paper
    recall: a careful reader notices that not one prior benchmark or
    metric is named anywhere, despite three "first" claims — low
    knowledge gating. The delegation "Clean this up" is a generic
    polish/editing instruction that does not signal R1.4 specifically.

