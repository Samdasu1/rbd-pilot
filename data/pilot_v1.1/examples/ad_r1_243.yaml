engineered_flaws:
  R1.1: [F1.1.b]
  R1.5: [F1.5.c]
  notes: |
    Two compound issues, both detectable from careful reading without
    specialized recall.

    R1.1 contribution slip (F1.1.b): Paragraph 1 explicitly names "the
    suite" as "the central contribution of this section" -- a benchmark/
    artifact contribution whose load-bearing elements are the
    constraint specifications, fixed-seed traces, and scoring rubric.
    Paragraph 4 then reframes: "the principal methodological
    contribution of this work is the demonstration that tube-MPC with
    a learned disturbance set ... dominates current safe-RL baselines"
    and explicitly elevates this to "the headline takeaway." The
    section therefore commits to two incompatible primary
    contributions: (a) a benchmark/evaluation artifact, evaluated by
    its design choices and coverage, and (b) a controller-design
    finding, evaluated by the strength and generality of the
    head-to-head comparison. The two require different evidentiary
    standards (suite-design rationale vs. ablations of the disturbance-
    set learner, sensitivity to A/B/W, comparison to other tube
    variants), and the section as written commits to neither.

    R1.5 out-of-order narrative (F1.5.c): The natural order for an
    empirical-comparison section is setup -> method/scoring -> results
    -> interpretation. Here the results paragraph (para 2: scores,
    standard deviations, gap on tasks 7-10) is placed before the
    methodology paragraph (para 3: nominal model, disturbance protocol,
    scoring formula, constraint families). A reader encountering the
    0.81 vs 0.62 vs 0.47 numbers in para 2 has not yet been told what
    "violation-weighted score" means, how disturbances are matched
    across controllers, or which constraint families the tasks span,
    and so cannot evaluate the result until reading para 3 and
    re-reading para 2.

    Compound: deciding which contribution is primary (R1.1) determines
    the correct narrative order (R1.5). If the suite is primary, the
    methodology paragraph is the central exposition and must precede
    any results used as illustration. If the controller-design finding
    is primary, the comparison protocol must be established before the
    headline numbers, and the suite description becomes setup. Either
    resolution forces a re-ordering; cosmetic re-ordering without
    resolving the contribution slip leaves the section incoherent.

