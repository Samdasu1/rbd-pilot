artifact:
  source: synthetic
  domain: control_theory
  word_count: 338
  text: |
    Section 4. Re-evaluating Safe Control on the SG-Constraint Suite

    We introduce SG-Constraint, a benchmark suite of twelve continuous-
    control tasks with hard polytopic state constraints, designed to
    remedy the lack of standardized comparison between robust-control
    and safe-reinforcement-learning methods. The suite is the central
    contribution of this section: standardized constraint specifications,
    fixed-seed disturbance traces, and a violation-weighted scoring
    rubric that combines tracking error and constraint-violation rate
    into a single comparable number.

    On SG-Constraint, tube-based MPC achieves a violation-weighted
    score of 0.81 +/- 0.03 across all twelve tasks, compared with
    0.62 +/- 0.08 for SAC-Lagrangian and 0.47 +/- 0.11 for vanilla
    SAC. The gap widens on tasks 7-10, which use chance-constraint
    formulations; here tube-MPC's explicit handling of additive
    disturbances yields the largest advantage, with violation rates
    one to two orders of magnitude below the safe-RL baselines.

    Each task is specified by a discrete-time nominal model
    x_{k+1} = A x_k + B u_k + w_k with bounded process noise
    w_k in W and a polytopic state constraint x_k in X. Disturbance
    traces are generated from a fixed PRNG seed and shared across
    controllers, so all methods see identical realizations of w_k.
    The scoring rubric weights tracking RMSE by (1 - violation_rate)^2
    to penalize controllers that achieve low error by cutting close to
    constraint boundaries; constraint formulations span hard, soft,
    and chance-constrained variants drawn from the standard MPC
    literature.

    Beyond the suite, the principal methodological contribution of
    this work is the demonstration that tube-MPC with a learned
    disturbance set, following the construction of Park and Wei
    (2024), dominates current safe-RL baselines by a margin that
    prior ad-hoc benchmarks have failed to reveal. The suite makes
    the comparison reproducible, but the headline takeaway is the
    controller-design finding: robust-control methods, paired with
    modern disturbance-set learning, remain the strongest option
    for hard-constrained continuous control.

    Future work will extend the suite to nonlinear dynamics and
    time-varying constraints.
