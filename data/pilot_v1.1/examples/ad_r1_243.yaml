acceptable_outputs_summary: |
  Identifies that the section commits to two incompatible primary
  claims -- the benchmark suite as artifact vs. the tube-MPC-with-
  learned-disturbance-set finding as controller-design takeaway --
  and asks the authors to choose one as load-bearing, since each
  demands different supporting evidence. Also notes that the
  results paragraph appears before the methodology/scoring
  paragraph, so the headline numbers are unreadable on first pass,
  and recommends moving the setup-and-scoring exposition ahead of
  the results, with the final ordering driven by whichever
  contribution is chosen as primary.

bad_outputs_summary: |
  Tightens prose, suggests adding more baselines or error bars,
  or recommends a clearer section title, while accepting both
  contribution framings as compatible halves of one story.
  Re-orders paragraphs cosmetically (e.g., moves the future-work
  sentence) without resolving which claim is load-bearing, or
  fixes the contribution slip while leaving the results-before-
  methodology ordering intact.

