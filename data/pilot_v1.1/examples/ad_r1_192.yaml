artifact:
  source: synthetic
  domain: drug_discovery_ml
  word_count: 268
  text: |
    In this section we describe the multi-agent retrieval system that we
    build for ligand prioritization in early-stage hit identification and
    the system takes as input a target protein sequence along with a
    candidate library of small molecules and it then routes the candidates
    through a panel of specialized scoring agents that we had developed
    during preliminary work and we collect their outputs into a unified
    ranking that downstream chemists then inspect.

    The agent panel consists of three components which are a docking-score
    agent a ligand-similarity agent and a pharmacophore-matching agent and
    each agent produces a scalar score together with a short natural
    language rationale that we found useful during debugging and the
    rationales are passed along to the aggregator together with the scores
    so that the aggregator can weigh agreement and disagreement before
    emitting a final ordering over the candidate set.

    For aggregation we implemented a learned selection head that takes as
    input the per-agent scores and the per-agent rationale embeddings and
    it predicts which single agent's ranking should be trusted for a given
    target which is a design choice that we made after observing that
    blended aggregation tends to dilute strong signals from individual
    agents in cases where one agent is correct and the others are
    confidently wrong.

    We evaluate the system on a panel of 12 kinase targets that we drew
    from a publicly released benchmark and the selection-based aggregator
    recovers more known actives in the top-50 cut than the synthesis-based
    baseline that we had implemented for comparison and we observe this
    pattern across most of the targets in the panel.
