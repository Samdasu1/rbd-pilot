    sentence of 50-70 words. Tense drifts between present ("we build",
    "the system takes", "we evaluate", "recovers") and past ("we had
    developed", "we found", "we made", "we had implemented") within and
    across paragraphs without principled justification. Underlying
    methodology (panel of three agents, learned selection head, 12
    kinase target benchmark, top-50 cut comparison) and the contribution
    framing (selection over synthesis aggregation) are intact — only the
    writing is bad. Detection requires only careful reading, no
    pharmacology or ML expertise (low gating). Delegation T05 "Check
    this." is maximally generic and does not point at R1.6 specifically.

