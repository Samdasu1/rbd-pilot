artifact:
  source: synthetic
  domain: physics_informed_ml
  word_count: 318
  text: |
    We introduce ReFlow-PINN, a physics-informed neural network for solving
    the incompressible Navier-Stokes equations in the turbulent regime
    (Re >= 1e4), where direct numerical simulation remains prohibitively
    expensive. ReFlow-PINN parameterizes the velocity and pressure fields
    as a multi-layer perceptron with sinusoidal activations and trains by
    minimizing the standard composite loss
    L = L_data + lambda_pde * L_pde + lambda_bc * L_bc, where L_pde
    penalizes the residual of the momentum and continuity equations
    evaluated at collocation points sampled uniformly in the spatiotemporal
    domain.

    Our central claim is that ReFlow-PINN recovers the underlying flow
    field at any Reynolds number for which the PDE admits a unique weak
    solution, since by driving the PDE residual to arbitrarily small
    values we recover a function that satisfies the governing equations
    almost everywhere. We formalize this in Proposition 1: given a
    network of sufficient capacity, gradient descent on L drives L_pde
    below any prescribed tolerance epsilon, and any function with
    residual below epsilon is within O(epsilon) of the true solution in
    the appropriate Sobolev norm.

    We evaluate ReFlow-PINN on a 2D periodic Kolmogorov flow at
    Re = 1000, 5000, and 20000. The architecture is a 6-layer MLP with
    256 units per layer; we use Adam (lr 1e-3) followed by L-BFGS
    refinement. L_data is supplied by 200 sparse velocity probes drawn
    from a high-resolution spectral simulation. After 200k iterations,
    ReFlow-PINN attains relative L2 error of 4.1% at Re=1000, 7.8% at
    Re=5000, and 19.4% at Re=20000.

    We attribute the moderate error growth at Re=20000 to insufficient
    collocation density and expect that increasing the collocation budget
    by 4x would reduce this error proportionally. The approach generalizes
    naturally to compressible flow and to three-dimensional turbulence;
    we leave both extensions to future work. ReFlow-PINN thus provides a
    mesh-free alternative to spectral solvers in the turbulent regime,
    with the additional benefit that no explicit subgrid model is
    required because the residual loss enforces the full Navier-Stokes
    equations directly at every collocation point.
