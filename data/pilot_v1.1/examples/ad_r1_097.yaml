engineered_flaws:
  R1.2: [F1.2.a]
  notes: |
    Hidden premise. The contribution chain is: gradient descent on L
    drives L_pde below epsilon -> small residual implies small solution
    error -> ReFlow-PINN recovers the true flow. The second link is
    standard (residual stability for sufficiently regular weak
    solutions); the first link is asserted in Proposition 1 ("gradient
    descent on L drives L_pde below any prescribed tolerance epsilon")
    but is exactly the property that fails for convection-dominated and
    high-Reynolds regimes. The canonical PINN failure-mode literature
    (Krishnapriyan et al. 2021, "Characterizing possible failure modes
    in physics-informed neural networks"; Wang, Yu, Perdikaris 2022 on
    NTK / spectral bias of PINNs; Wang, Teng, Perdikaris 2021 on the
    gradient pathology of multi-objective PINN losses) shows that for
    stiff or convection-dominated PDEs the residual loss landscape is
    pathological and gradient-based optimization does NOT drive L_pde
    below epsilon at fixed compute -- the optimizer stalls or converges
    to a trivial / smoothed solution. The Re=20000 error of 19.4% is
    consistent with this stall, not with "insufficient collocation
    density." The hidden, unjustified premise is the trainability claim
    in Proposition 1; without it, the entire recovery argument
    collapses. Detection requires recall of the PINN failure-mode
    canon (high knowledge gating); careful reading alone may flag the
    error growth pattern but cannot identify the unstated premise. T06
    "Take a look at this paragraph" does not leak R1.2.

