engineered_flaws:
  R1.3: [F1.3.a]
  R1.6: [F1.6.a]
  notes: |
    Two compound issues, with the R1.3 flaw deliberately gated on
    canonical AD-literature recall.

    R1.3 — overgeneralization (F1.3.a). The section asserts that
    "deep neural anomaly detectors uniformly outperform classical
    baselines such as isolation forest, local outlier factor, and
    one-class SVM across the full range of anomaly-detection
    settings," and uses this as license to skip detector-family
    justification entirely ("a closed question"). Para 2 doubles
    down with "Deep SVDD is known to dominate the classical
    detectors that we listed above" and the closing claim that the
    gate "generalizes across both generator architectures and
    target genres without per-deployment tuning" by virtue of its
    detector family. This is a known overreach: Han et al.'s
    ADBench (NeurIPS 2022) systematically shows that on tabular and
    embedding-style features, classical detectors — Isolation
    Forest in particular — remain competitive with or superior to
    deep one-class methods including Deep SVDD across most of the
    benchmark suite, and Ruff et al.'s own follow-up work
    acknowledges Deep SVDD's sensitivity to representation
    collapse. The section also implicitly inherits the contested
    "deep ⇒ better generalization" framing without engaging with
    the within-distribution-only training assumption that Deep SVDD
    rests on. Detection requires recall of ADBench-style findings
    and of the Deep SVDD failure-mode literature; a reader who only
    knows AD by name will find the claim plausible.

    R1.6 — run-ons and tense drift (F1.6.a). Para 1 sentence 2 is a
    ~70-word run-on stitched together with comma splices ("...and
    rating quality collapses, and we wanted... without retraining
    either component, the gate has to be cheap..."). Tense drifts
    inside the same sentence from past ("we wanted a lightweight
    gate") to present-deontic ("the gate has to be cheap"). Para 2
    sentence 1 is an ~80-word run-on that drifts past → present →
    future inside one breath: "a Deep SVDD head was then trained...
    the head trains in under an hour... we will score every
    candidate generation..." Para 2 sentence 2 is another long
    comma-spliced compound.

    The two flaws compound: the run-on prose smuggles the
    overgeneralization past a quick read by burying "uniformly
    outperform... across the full range" inside a long sentence
    whose surface concern is workflow framing. Fixing the prose
    alone leaves the inflated literature claim and the dependent
    contribution claim ("generalizes... by virtue of its detector
    family") intact; auditing the claim alone leaves a section
    whose every long sentence still drifts in tense and runs on
    through comma splices.

