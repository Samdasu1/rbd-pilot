artifact:
  source: synthetic
  domain: anomaly_detection
  word_count: 345
  text: |
    We propose Storyguard, an anomaly-detection front end that filters
    obviously degenerate model generations before they are routed to
    Mechanical Turk annotators for Likert evaluation. The motivation
    is straightforward and we assume it without further argument: when
    more than roughly a quarter of the items in a HIT batch are
    incoherent, annotators begin to anchor their ratings on the worst
    items and rating quality collapses, and we wanted a lightweight
    gate that can be inserted between any open-ended generator and any
    AMT pipeline without retraining either component, the gate has to
    be cheap, calibrated, and architecture-agnostic. We adopt a deep
    one-class formulation for the gate. We do this because it is by
    now established in the anomaly detection literature that deep
    neural anomaly detectors uniformly outperform classical baselines
    such as isolation forest, local outlier factor, and one-class SVM
    across the full range of anomaly-detection settings, which makes
    the family-level choice a closed question and lets us focus the
    methods section on the embedding pipeline rather than on detector
    selection.

    Concretely, story candidates are first encoded by a frozen
    sentence encoder, the encoder is the off-the-shelf MPNet
    checkpoint, and a Deep SVDD head was then trained on the
    embeddings of approximately twelve thousand human-written stories
    drawn from the WritingPrompts subreddit, the head trains in under
    an hour on a single GPU and converges to a stable center within
    30 epochs and at inference time we will score every candidate
    generation by its squared Euclidean distance from the learned
    center, and candidates above the 90th-percentile of the
    human-story score distribution are dropped before the batch is
    shipped to AMT. Because Deep SVDD is known to dominate the
    classical detectors that we listed above, and because the
    embedding stage is held fixed, we can attribute any downstream
    quality lift in the AMT ratings entirely to the gating step
    itself, and we treat this as the principal methodological
    contribution of the section: a one-shot anomaly gate that, by
    virtue of its detector family, generalizes across both generator
    architectures and target genres without per-deployment tuning.
  source_provenance: null

