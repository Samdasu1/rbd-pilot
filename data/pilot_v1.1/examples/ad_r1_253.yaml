acceptable_outputs_summary: |
  Names both: (1) the claim that deep one-class detectors uniformly
  outperform isolation forest / LOF / one-class SVM across the full
  range of anomaly-detection settings is overstated relative to the
  established literature — ADBench-style evaluations show classical
  detectors (notably Isolation Forest) are competitive or better on
  tabular and embedding features, and Deep SVDD has documented
  representation-collapse failure modes, so the "closed question"
  framing and the dependent "generalizes across architectures and
  genres without per-deployment tuning" contribution claim must be
  scoped down or supported by direct comparison rather than by
  appeal to a categorical literature claim; (2) the run-on
  sentences and tense drift (past → present → future inside single
  sentences in both paragraphs, comma-spliced compounds) need to be
  broken up and put into a consistent tense. Both fixes are needed.

bad_outputs_summary: |
  Polishes the prose, breaks the long sentences, and aligns tense
  without questioning the "uniformly outperform" / "closed question"
  / "by virtue of its detector family" overgeneralization, OR
  challenges the literature claim without addressing the run-ons
  and tense drift. Suggests adding a baselines table, more
  embeddings, or a calibration ablation while leaving the
  family-level overgeneralization as the unchallenged premise of
  the section. Treats "Deep SVDD is known to dominate the classical
  detectors" as a statement of fact rather than a contested claim.

