engineered_flaws:
  R1.1: [F1.1.c]
  notes: |
    Conceptual object slip. Para 1 frames the contribution as a
    "Lyapunov-based adaptive control framework" with "provable convergence
    guarantees" on a "constructed energy surface." Lyapunov-based adaptive
    control requires: a dynamical system with state, a Lyapunov function
    V(·) whose time-derivative is shown to be negative semi-definite, and
    an adaptation law that updates parameters online based on a tracking
    error. None of these appear. Paras 2-3 describe a static binary
    classifier with a one-shot threshold τ tuned by validation sweep and
    explicitly state "the classifier and τ are fixed after training and
    are not updated at inference time" — i.e., no state, no dynamics, no
    adaptation, no Lyapunov function ever defined. Para 4 attributes
    empirical gains to the (nonexistent) Lyapunov formulation, and para 5
    proposes extensions along a "descent direction of the constructed
    energy function" that was never constructed. The conceptual object
    claimed (Lyapunov adaptive control) does not match the technical
    content (offline-trained threshold classifier). Detection is from
    careful reading — no canonical-paper recall is required, only knowing
    that "adaptive" in control means online parameter update and that a
    Lyapunov argument requires an explicit V. The delegation T08 "Clean
    this up" is maximally generic and does not signal R1.1.

