artifact:
  source: synthetic
  domain: control_theory
  word_count: 342
  text: |
    We present LyapRoute, a Lyapunov-based adaptive control framework for
    query routing in hybrid large-language-model deployments. By formulating
    the cost-quality tradeoff as a stability problem on a constructed energy
    surface, LyapRoute provides provable convergence guarantees for routing
    policies under non-stationary query distributions, and is more robust
    than reactive heuristics that treat each query in isolation.

    The setup is as follows. Each incoming query x is associated with a
    difficulty score d(x) ∈ [0,1] estimated by a learned predictor. The
    system maintains two backends: an edge-deployable small model M_s and a
    cloud-hosted large model M_l. The router π chooses exactly one backend
    per query, and the operator specifies a target cost budget B ∈ [0,1]
    corresponding to the fraction of queries permitted to call M_l.

    We train a binary classifier f_θ : x → {0,1} on a held-out set of 50k
    queries, labeled by whether the small model's output agreed with the
    large model's output under BERTScore above 0.85. At deployment, queries
    with f_θ(x) > τ are routed to M_l and the rest to M_s. The threshold τ
    is selected to meet B by sweeping over [0,1] on a validation set and
    selecting the value at which the empirical cloud-call frequency matches
    B. The classifier and τ are fixed after training and are not updated at
    inference time.

    On MMLU and TriviaQA, LyapRoute achieves 94% of the large model's
    accuracy while routing only 38% of queries to the cloud, compared to
    91% accuracy at 50% cloud routing for a random baseline. We attribute
    this favorable cost-quality frontier to the Lyapunov formulation, which
    guarantees that deviations in input statistics are automatically
    compensated. The energy-surface design also ensures monotone descent
    toward the optimal cost-quality operating point.

    We argue that the Lyapunov-based perspective provides a principled
    foundation for extending the framework to multi-model routing, where K
    candidate backends could be ranked along the descent direction of the
    constructed energy function. A full stability analysis under heavy-
    tailed query distributions is left to future work.
