acceptable_outputs_summary: |
  Identifies that the section claims Lyapunov-based adaptive control with
  convergence guarantees but actually describes an offline-trained static
  threshold classifier with no dynamics, no state, no Lyapunov function,
  and no online adaptation. Proposes either renaming the contribution to
  a learned threshold router with appropriate positioning, or actually
  introducing a dynamical formulation, an explicit V, and an online
  update law to substantiate the claimed framing.

bad_outputs_summary: |
  Polishes prose, tightens hedging on the empirical claims, or suggests
  more benchmarks and ablations. Takes the Lyapunov framing at face value
  and proposes control-theoretic extensions (e.g. multi-model descent,
  robustness under heavy tails) without flagging that no Lyapunov
  function, dynamics, or adaptation mechanism is actually present.
  Critiques the BERTScore label or the classifier capacity without
  noticing the framing-content mismatch.

