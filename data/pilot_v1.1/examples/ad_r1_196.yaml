acceptable_outputs_summary: |
  Flags that the (Chen et al., 2021) reference is stale: the section
  trains and evaluates on AmbigSQL v3 — a substantially different
  artifact (added queries, five-way taxonomy, clarification annotations,
  new metric) — but cites only the original v1 paper. Recommends
  replacing or supplementing the citation with the v3 release paper, or
  at minimum citing both and making the version explicit at every
  numeric claim. May also note that the headline accuracy numbers are
  not currently traceable to a cited artifact.

bad_outputs_summary: |
  Polishes prose, suggests adding more baselines or ablations, or
  comments on the framing of the ambiguity taxonomy without noticing
  that the load-bearing benchmark citation points to a superseded
  version. Accepts "(Chen et al., 2021)" as the reference for v3
  artifacts. Adds peripheral citations (e.g., to clarification-dialogue
  literature) without correcting the stale benchmark reference.

