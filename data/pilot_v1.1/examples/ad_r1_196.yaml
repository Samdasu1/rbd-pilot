engineered_flaws:
  R1.7: [F1.7.c]
  notes: |
    Stale citation, detectable from the section's own text. Para 2
    introduces "the AmbigSQL benchmark (Chen et al., 2021)" as the
    resource the policy is trained on. Para 3 then states that the
    actual training and evaluation use "the AmbigSQL v3 release," which
    "expands the original split with 4,200 additional queries" and
    "introduces a five-way ambiguity taxonomy" (the original being
    binary, per para 4). Para 4 explicitly distinguishes the v3 release
    from "the original AmbigSQL release [which] contained only binary
    ambiguity labels and did not support the five-way taxonomy our
    policy is trained against." The 2021 citation is therefore stale —
    it points to the v1 work, but every load-bearing methodological
    artifact (the 4,200 added queries, the five-way taxonomy, the
    clarification-question annotations, the ambiguity-weighted execution
    accuracy metric, the 8,400 fine-tuning examples, the dev split
    evaluated against) belongs to v3, which would have its own (later)
    citation. Detection requires only careful reading: the section
    itself names "v3" five times and contrasts it with "the original"
    while citing only the original. The contribution claim is
    downstream — the 73.4% / 6.1-point / 12% headline numbers are
    measured on v3 artifacts that the section does not properly cite,
    so a reader cannot trace the benchmark version to a specific paper.
    Delegation T09 ("What do you think?") is maximally generic and
    leaks nothing about R1.7.

