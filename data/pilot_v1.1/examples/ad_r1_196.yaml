artifact:
  source: synthetic
  domain: databases
  word_count: 355
  text: |
    Ambiguity remains a central challenge for natural-language interfaces
    over relational databases. When a user asks "show me the top
    customers," the system must decide whether "top" means highest
    revenue, highest order count, or longest tenure — a disambiguation
    that, if handled silently by the LLM, can produce confidently wrong
    SQL. Recent work has reframed text-to-SQL as a two-stage problem:
    (1) detect whether a question is ambiguous, and (2) elicit
    clarification or commit to a defensible default.

    We build on this line of work and introduce ClarifySQL, a
    clarification-aware text-to-SQL system that combines schema-grounded
    ambiguity detection with a learned policy for when to ask the user.
    Our policy is trained on the AmbigSQL benchmark (Chen et al., 2021),
    the canonical resource for evaluating ambiguity handling in
    text-to-SQL.

    Specifically, we use the AmbigSQL v3 release, which expands the
    original split with 4,200 additional queries collected from
    production analytics workloads and introduces a five-way ambiguity
    taxonomy (column ambiguity, value ambiguity, aggregation ambiguity,
    join-path ambiguity, and intent ambiguity). The v3 schema also adds
    clarification-question annotations, allowing supervised training of
    the clarification policy without synthetic data generation. We
    follow the v3 evaluation protocol, including the ambiguity-weighted
    execution accuracy metric.

    Compared to BIRD (Li et al., 2023) and Spider (Yu et al., 2018),
    AmbigSQL v3 is the only benchmark that explicitly labels ambiguity
    types and includes ground-truth clarification questions — both
    essential for training and evaluating systems that must decide when
    to ask. The original AmbigSQL release contained only binary
    ambiguity labels and did not support the five-way taxonomy our
    policy is trained against.

    ClarifySQL is built on Llama-3.1-8B with a lightweight clarification
    head fine-tuned on 8,400 v3 examples. On the v3 dev split, we report
    73.4% ambiguity-weighted execution accuracy, a 6.1-point improvement
    over the strongest baseline (a Llama-3.1-8B model fine-tuned without
    the clarification head). We also report a 12% reduction in
    confidently-wrong SQL generations on production-style ambiguous
    queries, suggesting that the clarification policy generalizes beyond
    the labeled distribution.

    These results position ClarifySQL as a step toward production-grade
    text-to-SQL systems that handle ambiguity proactively rather than
    papering over it with confident generation.
