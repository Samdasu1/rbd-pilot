engineered_flaws:
  R1.2: [F1.2.b]
  notes: |
    Cross-section contradiction (F1.2.b) on R1.2. Paragraph 1 stakes
    the contribution on a strict blind protocol: "the response area
    exposed no model identifier" and "the routing log was never
    surfaced in the UI," and the central claim (content-driven vs.
    identity-driven trust separation) is explicitly licensed by this
    blindness. Paragraph 2 then describes a visible per-response
    routing badge (green leaf for local, blue cloud for cloud) that
    participants hovered over before rating; paragraph 3 reports
    "hover-then-rate" effects keyed on the cloud badge. A visible
    leaf/cloud badge is itself a model identifier in the response
    area, so the deployment was not blind in the sense paragraph 1
    requires, and the headline conclusion about cleanly separating
    content-driven from identity-driven trust is not actually
    supported by the described instrumentation. Detection requires
    reading the paragraphs together and noticing that the UI
    instrumentation in P2/P3 negates the methodological commitment
    of P1; moderate HCI gating because the reader must recognise
    that visible backend cues invalidate a "blind" trust-calibration
    claim, but no canonical citation recall is required. The T02
    delegation ("Review this section.") is generic and does not
    point at internal consistency.

