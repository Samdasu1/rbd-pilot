artifact:
  source: synthetic
  domain: hci
  word_count: 320
  text: |
    We present ChatLane, a chat assistant that routes each user turn
    between an on-device 1.3B-parameter model and a cloud-hosted
    70B-parameter model using a learned difficulty estimator. The
    principal HCI contribution of this paper is a 14-day field
    deployment (N=42 knowledge workers, mixed roles) that characterizes
    how users calibrate trust toward a hybrid LLM system. A central
    methodological commitment of our study is that participants were
    kept blind to routing decisions for the entire deployment: the
    response area exposed no model identifier, latency was equalized
    via an artificial delay on local responses, and the routing log
    was never surfaced in the UI. This blind protocol is what licenses
    our core claim, namely that the trust patterns we observe can be
    attributed to response content alone, rather than to brand or
    capacity cues attached to backend identity.

    The deployment took place across two organizations and used a
    within-subjects design. Each participant interacted with ChatLane
    for at least 30 minutes per day on tasks of their own choosing and
    rated each response on a 7-point usefulness scale. After every
    fifth turn, the assistant surfaced a brief in-context survey
    ("Was this response from the fast local model or the large cloud
    model?") so that we could correlate stated attribution with
    measured trust across the deployment window. We additionally
    instrumented the UI to record which routing badge — a small green
    leaf for local responses, a blue cloud for cloud responses —
    participants hovered over before submitting their rating.

    Across 18,704 logged turns, hover-then-rate sequences revealed
    that participants spent 2.3x longer on responses immediately after
    a cloud-badge hover, and the in-context attribution survey was
    answered correctly 71% of the time. We conclude that ChatLane's
    blind deployment cleanly separates content-driven from
    identity-driven trust, and that the resulting calibration curves
    can be reused by designers of future hybrid assistants who wish
    to avoid confounding their evaluation with backend cues.
