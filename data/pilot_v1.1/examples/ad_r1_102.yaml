acceptable_outputs_summary: |
  Flags that the stated blind-deployment protocol is contradicted by
  the visible per-response leaf/cloud badge described later in the
  same section, and notes that the headline claim about separating
  content-driven from identity-driven trust is not licensed once the
  badge is in the UI. Suggests resolving by either dropping the badge
  (truly blind) or rewriting the contribution as trust calibration
  under transparent backend cues. Names the specific paragraph pair
  in conflict.

bad_outputs_summary: |
  Polishes prose, asks for more participants or a longer deployment,
  requests additional baselines, or suggests reporting effect sizes
  and IRB details — without noticing that the visible routing badge
  contradicts the blind-protocol framing. Praises the within-subjects
  design or the in-context attribution survey while leaving the
  central inconsistency between P1 and P2/P3 unflagged.

