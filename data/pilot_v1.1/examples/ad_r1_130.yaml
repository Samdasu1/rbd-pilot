artifact:
  source: synthetic
  domain: programming_languages
  word_count: 350
  text: |
    We introduce CalibSynth, a program synthesis system that emits
    calibrated confidence scores alongside synthesized programs. The
    novelty of CalibSynth lies in its ability to communicate uncertainty
    about candidate programs to downstream users, allowing them to defer
    to a human when synthesis confidence is low. We position this as a
    clear step forward over standard code-generation pipelines, which
    return top-k candidates without any principled uncertainty signal.

    Our approach trains a temperature-scaled head on top of a standard
    transformer-based code model. Given a specification (input-output
    examples plus an optional natural-language hint), CalibSynth produces
    a ranked list of candidate programs together with a per-program
    confidence score in [0,1]. We evaluate calibration using expected
    calibration error (ECE) and selective accuracy.

    We compare CalibSynth against two baselines: (1) raw softmax
    probabilities from a Codex-style code completion model, and (2) a
    frequency-based heuristic that scores candidates by how often they
    appear in the model's top-k beam. CalibSynth achieves an ECE of
    0.043 versus 0.18 for raw softmax and 0.22 for the frequency
    heuristic. On a held-out subset of HumanEval-style problems,
    selective accuracy at 50% coverage is 91.2% for CalibSynth versus
    78.3% for the strongest baseline. We take this as evidence that
    CalibSynth represents the first principled treatment of synthesis-time
    uncertainty in program induction.

    The architecture is a modest extension of a standard code transformer:
    roughly 200 lines of additional PyTorch on top of a HuggingFace-style
    backbone. We believe this lightweight footprint will encourage
    adoption, particularly in IDE-integrated tooling where existing
    LLM-based code completion already dominates. CalibSynth's core
    contribution — calibrated confidence at the program level — fills a
    gap that prior LLM-based code-generation work has left open, and we
    expect it to become a standard component of next-generation
    programming assistants.

    In Section 5 we discuss how the temperature-scaling parameter must
    be re-fit per task family; we leave a fully task-agnostic calibration
    scheme to future work. We close by noting that our framework is
    orthogonal to the choice of base model, and we expect the calibration
    gains to transfer cleanly as code LLMs continue to scale.
