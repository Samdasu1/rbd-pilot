acceptable_outputs_summary: |
  Flags that the baselines are limited to LLM code-completion methods and
  miss the program-synthesis literature, where probabilistic ranking and
  uncertainty over candidate programs have been studied for years (e.g.
  Sketch, Synquid, PROSE/FlashFill, PHOG, JSNice, learned-ranking
  synthesizers). Suggests rewording the "first principled treatment"
  claim to a defensible delta against that actual field, and naming at
  least one canonical synthesis system as a contrast point.

bad_outputs_summary: |
  Polishes the prose, tightens the contribution sentences, or suggests
  adding more HumanEval-style benchmarks and a deeper calibration-metric
  discussion. Accepts the "first principled treatment" framing and the
  LLM-only baseline set at face value. May add peripheral citations to
  calibration or LLM-evaluation work without questioning whether the
  nearest-neighbor field has been correctly identified.

