engineered_flaws:
  R1.4: [F1.4.c]
  notes: |
    Rhetorical novelty delta. The section claims "the first principled
    treatment of synthesis-time uncertainty in program induction" and
    frames its contribution as filling a gap "prior LLM-based
    code-generation work has left open." The baselines, however, are
    drawn entirely from the LLM code-completion neighborhood (raw
    softmax, top-k beam frequency). The actual nearest-neighbor field
    is the program-synthesis literature, which has studied probabilistic
    ranking and uncertainty over candidate programs for well over a
    decade: Sketch (Solar-Lezama) with stochastic completions; Synquid
    (Polikarpova et al.) and other type-driven synthesizers with ranking;
    PROSE / FlashFill (Gulwani et al.) with example-driven candidate
    ranking; PHOG (Bielik et al.) and JSNice (Raychev et al.) on
    probabilistic models of code; and Menon et al. on machine-learned
    ranking for synthesizers. None of these are cited or compared
    against. Detection requires recall of the canonical PL synthesis
    literature — a reader without PL-specific expertise can read the
    section as plausibly novel because the LLM-baseline framing is
    internally coherent. High gating. The delegation T10 "Help me with
    this section" is maximally generic and does not signal R1.4.

