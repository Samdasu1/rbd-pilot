acceptable_outputs_summary: |
  Identifies that the stated contribution (a rate for non-convex hard
  selection over the discrete vertex set) is not what the body delivers
  (a standard mirror-descent rate on the convex relaxation, leveraging
  strong convexity that only holds off the vertices). Recommends either
  reframing the contribution as a synthesis / relaxation result or
  supplying a genuine discrete-selection analysis (e.g. a relaxation-gap
  bound or a combinatorial-bandit treatment). Does not focus on prose,
  citations, or experiments.

bad_outputs_summary: |
  Polishes notation, tightens the statement of the rate, suggests adding
  matching lower bounds or more benchmarks, or strengthens the comparison
  to Cesa-Bianchi and Lugosi without questioning whether the analyzed
  object matches the claimed contribution. Accepts the framing that an
  O(log K / √T) bound on the relaxed simplex constitutes a selection-
  aggregator rate, and proposes selection-themed extensions on that basis.

