engineered_flaws:
  R1.1: [F1.1.a]
  notes: |
    Thesis drift on the contribution claim. Para 1 stakes the contribution as
    a "non-convex hard-selection" rate, explicitly distinguishing the
    discrete-vertex problem from the convex relaxation and promising "the
    first O(1/√T) rate for selection aggregators." Para 2 then silently
    switches the analyzed object: mirror descent is run on "the relaxed
    simplex" — i.e. the convex hull, which is precisely the synthesis
    problem the paper is claiming to differentiate from. Para 3 doubles down
    by asserting strong convexity of L on the relaxed simplex, a property
    that exists only because we left the vertex set; it cannot certify
    anything about hard selection. Para 4 then re-asserts the non-convex
    selection guarantee as if it had been proved. Fixing this requires
    rewriting the contribution claim to either (a) honestly position the
    paper as a synthesis / convex-relaxation rate result, or (b) actually
    analyze the discrete vertex problem (e.g. via a combinatorial bandit or
    a rounding argument with a relaxation-gap bound). Detection requires the
    reader to notice that "relaxed simplex" + "strong convexity" together
    rule out the discrete-selection interpretation — moderate optimization
    fluency, no obscure recall. The delegation T02 "Review this section" is
    generic and does not signal R1.1 specifically.

