artifact:
  source: synthetic
  domain: optimization_theory
  word_count: 352
  text: |
    We study the candidate-selection problem that arises in multi-agent LLM
    pipelines, where K agents produce candidate outputs and an aggregator must
    commit to a single response. We formalize selection as a non-convex
    stochastic optimization problem: minimize over the K vertices of the
    probability simplex the expected loss L(p) = E_{x~D}[ℓ(Σ_i p_i φ_i(x))],
    where φ_i is the i-th agent's response map. Our central contribution is a
    convergence-rate analysis for this non-convex hard-selection objective
    under bandit-style feedback, establishing the first O(1/√T) rate for
    selection aggregators in this regime.

    Prior work frames aggregation as either synthesis (a convex combination
    over the simplex) or selection (a vertex of the simplex). The latter is
    harder to analyze because the feasible region is discrete; standard
    projected-SGD machinery applies only to the relaxed convex hull. We
    therefore study a stochastic mirror-descent scheme on the relaxed simplex
    with step size η_t = c/√t and Bregman divergence equal to negative
    entropy. We prove this scheme converges to the optimal mixed strategy at
    rate O(log K / √T), matching the optimal rate for online learning over
    the simplex (Cesa-Bianchi and Lugosi, 2006).

    A key step is to show that L is L-smooth and μ-strongly convex on the
    relaxed simplex when the agent maps φ_i are bounded and the loss ℓ is
    twice differentiable with bounded Hessian. Under these conditions, mirror
    descent with entropy regularization achieves O((L/μ) log(1/ε)) iteration
    complexity to reach ε-suboptimality, and we instantiate this bound for
    softmax aggregation, recovering the rates of Bubeck (2015).

    These results characterize the cost of selection in agent ensembles: the
    regret bound scales only logarithmically in K, suggesting that large
    candidate pools are not a fundamental bottleneck. We verify this
    empirically in Section 5. We further argue that the non-convex landscape
    of hard selection imposes no additional rate penalties beyond the
    simplex-bandit rates established here, and conclude that selection-based
    aggregation enjoys the same optimization-theoretic guarantees as
    synthesis up to log factors.
  source_provenance: null

