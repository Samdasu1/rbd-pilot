  domain: control_theory
  word_count: 215
  text: |
    We propose StableMPC, a robust model-predictive controller for
    nonlinear systems with bounded disturbance. Our approach handles
    arbitrary nonlinearities by treating the prediction model as a
    black-box function, eliminating the need for system-specific
    linearization or explicit Lyapunov analysis.

    The controller solves a finite-horizon optimization at each
    timestep. The cost function penalizes tracking error and control
    effort. The constraint set encodes box bounds on actuators and
    states. We solve the resulting nonlinear program using sequential
    quadratic programming (SQP) with a custom warm-start strategy.

    A key theoretical contribution is our recursive feasibility proof.
    The proof relies on a quadratic Lyapunov function constructed from
    the state cost matrix Q, demonstrating that the feasibility set is
    invariant under the closed-loop dynamics. This Lyapunov-based
    argument extends classical MPC stability results to our nonlinear
    setting.

    We evaluate StableMPC on three benchmarks: a quadrotor stabilization
    task, a robotic arm reaching task, and a vehicle lane-keeping task.
    Across all three, StableMPC achieves tracking error within 5% of an
    LQR baseline while satisfying actuator constraints throughout
    operation.

    The closed-loop performance is robust to disturbance levels up to
    20% of nominal actuator authority. Beyond this, occasional
    constraint violations occur but the system recovers within five
    timesteps in all observed cases.

    We position StableMPC as a deployment-ready controller for nonlinear
    systems where black-box prediction models are sufficient.
