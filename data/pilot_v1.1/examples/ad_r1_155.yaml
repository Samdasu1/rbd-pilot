  paragraph 3) and related work (currently paragraph 4) belong before
  the method introduction, and the formal generative-model specification
  (currently paragraph 5) belongs immediately after the prose method
  intro rather than after the experimental results. Proposes a concrete
  reordered structure such as motivation → related work → method intro →
  formal model → results, with rationale that the current flow forces
  the reader to backtrack to reconstruct why the model is needed and
  what it actually is.

bad_outputs_summary: |
