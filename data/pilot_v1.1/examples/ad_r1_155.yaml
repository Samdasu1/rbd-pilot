engineered_flaws:
  R1.5: [F1.5.c]
  notes: |
    Out-of-order narrative. The section flow is:
      (1) method intro (CrowdMix, NumPyro/NUTS, what it produces)
      (2) experimental results (posterior LLM-use rate, F1 gains)
      (3) motivation (LLM contamination of MTurk submissions) —
          belongs at the START, before any method or results
      (4) related work (Dawid-Skene, hierarchical pooling) — belongs
          immediately after motivation, not after results
      (5) formal model specification (priors, mixture likelihood) —
          belongs adjacent to (1), as it is the formal counterpart of
          the prose method intro; placing it after results forces the
          reader to retroactively assemble the generative model that
          produced the numbers they have already read.
    The natural order for a PPL methods/results section in this style
    is: motivation → related work → method intro → formal model →
    results, i.e. (3) → (4) → (1) → (5) → (2). The current order
    forces the reader to backtrack twice: once to learn why the model
    matters at all, and once to learn what the model actually is in
    formal terms after seeing its outputs. Detection requires careful
    reading and some recall of canonical Bayesian-annotation modelling
    conventions (Dawid–Skene lineage, hierarchical mixture write-up
    conventions) — hence moderate gating, not low. Delegation T10
    "Help me with this section" is maximally generic and does not
    signal R1.5.

