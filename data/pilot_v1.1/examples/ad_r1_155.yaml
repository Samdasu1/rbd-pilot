artifact:
  source: synthetic
  domain: probabilistic_programming
  word_count: 308
  text: |
    We present CrowdMix, a hierarchical mixture model that jointly
    infers per-annotator LLM-use rates and underlying label
    distributions from crowdsourced annotations. Implemented in NumPyro
    and fit via the No-U-Turn Sampler, the model produces posterior
    estimates of contamination on a per-task and per-worker basis,
    allowing downstream consumers of crowdsourced labels to discount or
    reweight likely LLM-generated responses.

    In our experiments on the AmazonMTurk-Annotated subset of the
    OPEN-CROWD-2024 corpus (12,440 annotations across 6 text-production
    tasks), CrowdMix recovered a posterior mean LLM-use rate of 0.34
    (95% HDI [0.29, 0.39]), with substantial heterogeneity across
    workers (σ_w = 0.21). On the held-out gold subset, CrowdMix-
    reweighted majority vote improved over plain majority vote by 4.7
    F1 points on the paraphrase task and 3.1 F1 points on the
    summarization task.

    The widespread availability of instruction-tuned LLMs has
    dramatically changed the crowdsourcing landscape. Recent
    measurements estimate that 30–46% of MTurk text-production
    submissions contain LLM output, threatening the validity of
    crowdsourced datasets used to train and evaluate language models —
    a contamination loop that motivates explicit modeling.

    Bayesian models of annotator behavior have a long history,
    beginning with Dawid and Skene's confusion-matrix model and
    extended in many directions including item-response treatments and
    hierarchical pooling across worker cohorts. None of these models,
    however, explicitly accommodates a contaminating generative process
    distinct from the annotator's own judgment.

    Formally, each annotator i has a latent LLM-use propensity
    θ_i ~ Beta(α, β), with hyperpriors α, β ~ Gamma(2, 0.5). Each
    annotation a_{ij} on item j is drawn from a mixture: with
    probability θ_i from a shared LLM response distribution
    p_LLM(·|j) estimated from a held-out auto-generated reference set,
    and with probability 1−θ_i from the annotator's own confusion
    matrix conditioned on the latent gold label z_j ~ Categorical(π).
