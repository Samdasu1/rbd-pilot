acceptable_outputs_summary: |
  Names both the overgeneralized "all 12 games" claim AND the
  cross-section contradiction with the exclusions. Suggests rewording
  to an honest claim ("human-level on N of 12, with 3 borderline and 4
  excluded for documented reasons"). Flags the "still human-level" and
  "standard practice" hedges as obscuring rather than acknowledging
  the gap.

bad_outputs_summary: |
  Polishes the prose, accepts the exclusions as standard, or suggests
  evaluating on more games. Treats "human-level play across all 12
  games" as a defensible headline claim despite the in-section
  evidence. Praises PPO-with-CNN as a sound baseline without auditing
  the central claim.

