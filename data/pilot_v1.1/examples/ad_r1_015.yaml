delegation: "Take a look at this paragraph."

artifact:
  source: synthetic
  domain: reinforcement_learning
  word_count: 215
  text: |
    Our agent achieves human-level play across all 12 Atari games we
    evaluate. We train using PPO with a CNN encoder and a value-function
    head, following the standard architecture from prior work. After 50M
    environment steps per game, our agent reaches scores that match or
    exceed the published human baseline.

    Specifically, on Pong, Breakout, Space Invaders, and Asteroids, our
    agent reaches 95-110% of the human baseline. On Q*bert, Frostbite,
    and Seaquest, it reaches 85-95% of human (which we still consider
    human-level given the noise in the human baseline). On Montezuma's
    Revenge, the agent reaches 12% of human, but as is standard practice
    we excluded this game from the headline metric due to its
    hard-exploration character.

    We also excluded Asterix from our final evaluation because we found
    that reward shaping was unstable across random seeds. Bowling and
    Atlantis were similarly excluded for analogous reasons related to
    reward sparsity.

    Across the remaining games we evaluated, our agent demonstrates
    strong performance and we argue this represents a meaningful step
    toward general game-playing competence in the Atari benchmark suite.

    The full per-game scores are reported in Appendix A, and we hope
    future work will extend our approach to additional games and to
    more challenging exploration regimes such as Pitfall and Tennis,
    which our current PPO-based pipeline does not handle reliably.
  source_provenance: null

