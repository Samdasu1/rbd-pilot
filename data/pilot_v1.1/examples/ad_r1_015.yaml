engineered_flaws:
  R1.2: [F1.2.b]
  R1.3: [F1.3.a]
  notes: |
    Two interacting issues that compound:

    R1.3 — overgeneralization. Para 1 claims "human-level play across
    all 12 Atari games." Para 2 reveals 3 games (Q*bert / Frostbite /
    Seaquest) at 85-95% which are reframed as "still human-level" via
    a noise argument; Para 2 also excludes Montezuma's Revenge (12%);
    Para 3 excludes 3 more games (Asterix / Bowling / Atlantis). The
    actual evidence supports human-level on at most 4-7 games, not 12.

    R1.2 — cross-section contradiction. The "all 12 games" framing in
    para 1 is contradicted by the 4 explicit exclusions across paras
    2-3 plus the reframing on 3 borderline cases. The opening claim
    cannot be reconciled with what the section itself reports.

    Detection: pure reading. No knowledge of Atari benchmark history,
    PPO, or hard-exploration literature is needed — the contradiction
    is internal to the section. Low gating. The delegation T06 "Take
    a look at this paragraph" is generic.

