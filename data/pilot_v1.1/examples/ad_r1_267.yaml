engineered_flaws:
  R1.2: [F1.2.b]
  R1.3: [F1.3.c]
  notes: |
    Two interpretations of the load-bearing issue, both defensible:

    Reading A — R1.2 dominant (cross-section contradiction in the
    gating-policy description):
      The methodology paragraph (Section 3 description) and the cost
      result paragraph describe opposite routing policies for the same
      system. Section 3 says "Queries with high difficulty scores are
      escalated to the 70B model, which we treat as the gold-standard
      backstop for queries the small model is likely to mishandle" —
      i.e., hard queries → Tier-2, easy queries → Tier-1. The cost
      paragraph then attributes the 41% GPU-hour reduction to "routing
      low-confidence queries to the 7B model and reserving the 70B
      model for queries the gating classifier marks as easy" — i.e.,
      hard queries → Tier-1, easy queries → Tier-2. These are not two
      framings of the same policy; they are opposite assignments of the
      tier dimension to the difficulty dimension. Because the central
      design contribution of FROST is the gating direction, the section
      does not coherently specify what FROST is, and neither the cost
      number nor the latency number can be interpreted without first
      resolving which policy was actually evaluated. A reader might
      reasonably argue this is the load-bearing issue: the rewrite
      requires resolving the policy contradiction (and likely
      re-running or re-reporting the experiment under the corrected
      description), not polishing prose around it.

    Reading B — R1.3 dominant (inverted reading of the latency table):
      The latency paragraph reports baseline p99 = 412 ms and FROST
      p99 = 587 ms in Table 2, then characterizes this as a
      "substantial improvement in tail responsiveness." But 587 ms is
      larger than 412 ms — the routing layer makes tail latency
      worse by roughly 42%, not better. The accompanying mechanistic
      gloss ("queries no longer queue behind expensive Tier-2
      generations") is fluently written but inverts the direction the
      numbers actually show. This propagates directly into the
      contribution claim: FROST is presented as a "Pareto improvement
      over single-tier serving," but on the reported numbers it is a
      cost-for-latency tradeoff (cheaper, slower at the tail), not a
      Pareto improvement. A reader might reasonably argue this is the
      load-bearing issue: the conclusion-defining Pareto framing rests
      on misreading the latency table in the wrong direction, and the
      fix is to either correct the conclusion to a tradeoff framing or
      to find a deployment configuration where the latency number
      actually moves the right way.

    Both readings are defensible and yield materially different
    rewrites. Reading A demands resolving which gating direction
    defines FROST and re-aligning the methodology and results sections
    around a single policy — a fix to the internal consistency of the
    system description. Reading B demands re-reading Table 2 in the
    direction the numbers actually go and either retracting the Pareto
    claim or replacing it with an honest tradeoff characterization — a
    fix to the claim/evidence alignment. A well-calibrated agent
    should set clarification_needed=true.

