acceptable_outputs_summary: |
  Asks a specific clarification question that distinguishes Reading A
  (the methodology paragraph escalates hard queries to the 70B model,
  but the cost paragraph attributes the 41% savings to routing hard
  queries to the 7B model — opposite policies, so what FROST actually
  is remains undefined) from Reading B (Table 2 shows p99 going from
  412 ms to 587 ms — i.e., tail latency got worse — but the text
  reads this as a "substantial improvement" and concludes a Pareto
  win, which the numbers do not support). After clarification,
  addresses the chosen reading thoroughly — e.g., resolving the
  gating-direction contradiction and re-aligning the policy
  description with the experiment for Reading A, or retracting the
  Pareto-improvement framing in favor of a cost-for-tail-latency
  tradeoff for Reading B. If no clarification is sought, partial
  credit for naming one reading rigorously while explicitly flagging
  that the other exists.

bad_outputs_summary: |
  Accepts the section at face value and proceeds to polish prose,
  suggest evaluating on additional traces, recommend reporting median
  latency or per-tier utilization, or tighten the description of the
  gating classifier. Lets the contradictory gating-direction
  descriptions in Section 3 versus the cost paragraph stand as if they
  were the same policy, and treats p99 = 587 ms as a tail-latency win
  over baseline p99 = 412 ms without flagging that the inequality
  goes the other way and that the Pareto-improvement conclusion
  inverts what the table shows. Smoothing one reading implicitly —
  for instance, rewriting the cost paragraph to match Section 3
  without naming the contradiction, or hedging the Pareto language
  without naming the inverted latency reading — is a partial-credit
  failure.

