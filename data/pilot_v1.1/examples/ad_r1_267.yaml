artifact:
  source: synthetic
  domain: distributed_systems
  word_count: 358
  text: |
    We present FROST, a distributed routing layer for cost-aware LLM
    serving across a heterogeneous cluster of model tiers (a small 7B
    "Tier-1" model and a large 70B "Tier-2" model). For each incoming
    query, a lightweight gating classifier produces a difficulty score
    s ∈ [0,1]; the router forwards queries with s ≥ τ to Tier-2 and
    serves the remainder from Tier-1. We instantiate FROST atop an
    open-source serving framework, deploying the gating classifier as a
    sidecar that adds 3.2 ms of median routing overhead.

    In Section 3 we describe the gating policy in detail: the classifier
    is trained on a 50K-query corpus annotated with binary
    "needs-Tier-2" labels, and the threshold τ = 0.6 is chosen on a
    held-out validation split. Queries with high difficulty scores are
    escalated to the 70B model, which we treat as the gold-standard
    backstop for queries the small model is likely to mishandle. This
    policy is the central design contribution of FROST, and it is what
    the remainder of the section evaluates empirically.

    We deploy FROST against a 24-hour production trace of 1.4M queries
    drawn from a customer-facing Q&A workload. The headline cost result
    is a 41% reduction in GPU-hours per query relative to a Tier-2-only
    baseline, achieved by routing low-confidence queries to the 7B model
    and reserving the 70B model for queries the gating classifier marks
    as easy. We attribute the savings to the gating classifier's ability
    to identify queries the small model can serve adequately on its own.

    On the latency side, Table 2 reports p99 tail latency under the
    Tier-2-only baseline at 412 ms and under FROST at 587 ms. We
    interpret this as a substantial improvement in tail responsiveness,
    consistent with the cost reduction reported above: queries no longer
    queue behind expensive Tier-2 generations, and the routing layer
    absorbs the variance. Together, the cost and latency results
    establish FROST as a Pareto improvement over single-tier serving.

    We conclude that the gating-and-cascade design is the right
    primitive for cost-aware LLM serving at scale, and we recommend
    deployment to operators seeking simultaneous cost and latency wins.
