artifact:
  source: synthetic
  domain: climate
  word_count: 412
  text: |
    In this section we present ClimaSim, a framework that uses generative
    agents to simulate household-level climate adaptation behavior in
    coastal flood-risk communities. ClimaSim instantiates each household
    as a generative agent with a memory stream of weather observations,
    social ties, and prior adaptation actions (e.g., elevating utilities,
    purchasing flood insurance, evacuating). Agents update beliefs about
    flood risk after each simulated season and reflect on neighbors'
    choices to plan their own next actions, following the architecture
    pattern of recent generative-agent work for interactive simulacra.

    The motivation for ClimaSim rests on two observations. First, observed
    adaptation rates among coastal U.S. households remain well below the
    rates predicted by expected-utility models of flood-risk response,
    with empirical adoption of elevation retrofits and flood-insurance
    purchase lagging actuarial-optimal benchmarks by 20–40%. Second, this
    gap is widely attributed to bounded rationality, social learning
    effects, and protective-action decision dynamics that purely rational
    -actor frameworks cannot capture. Generative agents, with their
    capacity for naturalistic memory and reflection, offer a route to
    representing these mechanisms without hand-coding behavioral rules.

    To our knowledge, ClimaSim is the first agent-based simulation of
    climate adaptation that uses LLM-driven agents in place of rule-based
    behavioral modules. We evaluate ClimaSim on a synthetic coastal
    community of 240 households calibrated to demographic distributions
    from the American Community Survey for Miami-Dade and Charleston
    counties. Flood realizations are drawn from downscaled CMIP6 ensemble
    projections under SSP2-4.5 and SSP5-8.5 (Eyring et al., 2016).

    We compare ClimaSim against a no-learning baseline in which households
    retain their initial adaptation propensity throughout the simulation.
    ClimaSim produces 31% higher cumulative adaptation uptake by simulated
    year 10 under SSP5-8.5, and reproduces the empirically observed
    clustering of adaptation choices within social neighborhoods — a
    phenomenon that purely individualistic decision models fail to
    generate.

    A central methodological contribution of ClimaSim is the use of free-
    form natural-language reflection in place of utility maximization.
    Each agent, after each flood season, generates a short journal entry
    summarizing its experience and its neighbors' visible actions, and
    conditions next-period choices on this entry rather than on a numeric
    utility function. This allows the simulation to surface qualitative
    drivers of inaction — denial, fatalism, cost-anchoring on past
    premiums — that are absent from standard climate-adaptation models.
