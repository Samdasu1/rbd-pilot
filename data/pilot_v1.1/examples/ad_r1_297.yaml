acceptable_outputs_summary: |
  Flags that the "first agent-based simulation of climate adaptation"
  claim is positioned against an unnamed prior literature of rule-based
  ABMs of adaptation that the section itself implicitly acknowledges
  but never cites, and recommends anchoring the novelty claim to that
  upstream line of work. Also flags that the motivating constructs —
  bounded rationality, social learning, protective-action decision
  dynamics — are invoked as received consensus without any supporting
  citation, and recommends adding the canonical references that the
  "widely attributed" framing presupposes.

bad_outputs_summary: |
  Confirms the citation format is fine, suggests adding DOIs or page
  numbers for Eyring et al. (2016), recommends a more recent CMIP
  iteration, or asks for a unified bibliography. Tightens prose around
  the existing references without noticing that the novelty claim
  presupposes an uncited prior ABM-for-adaptation literature, or that
  the load-bearing behavioral motivation invokes named theoretical
  constructs as consensus while citing none of them.

