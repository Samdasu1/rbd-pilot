engineered_flaws:
  R1.7: [F1.7.b, F1.7.b]
  notes: |
    F1.7.b #1 (missing key prior work — agent-based climate adaptation
    modeling): Paragraph 3 asserts that "ClimaSim is the first agent-
    based simulation of climate adaptation that uses LLM-driven agents
    in place of rule-based behavioral modules." The qualifier "in place
    of rule-based behavioral modules" is itself an admission that a
    body of rule-based agent-based models of climate adaptation exists
    and is the very thing ClimaSim positions itself against — yet no
    such prior work is cited anywhere in the section. The internal
    contradiction is detectable from the text alone: the novelty claim
    presupposes the existence of an upstream ABM-for-adaptation
    literature that the section simultaneously fails to anchor with
    any citation. A reader does not need to know the canonical names
    in that literature to see that the missing anchor is conspicuous.

    F1.7.b #2 (missing key prior work — behavioral motivation): The
    motivating premise in paragraph 2 names three specific theoretical
    constructs — bounded rationality, social learning effects, and
    protective-action decision dynamics — and asserts that the
    adaptation gap "is widely attributed" to them. Each of these is a
    named construct from a canonical line of behavioral / disaster-
    response research, and the section's own framing ("widely
    attributed") signals that these are received findings from prior
    literature. They are nonetheless presented with no citation, and
    they are load-bearing: the entire justification for using
    generative agents in place of expected-utility modeling depends on
    them. The absence is detectable from the text because the section
    explicitly invokes prior consensus while citing nothing for it.

    Control case: T05 "Check the citations" directly cues R1.7, and
    the load-bearing flaws are in R1.7 — full leakage by spec §2.5.
    Cross-family d_C is expected to be near zero; if d_C > 0.10 the
    projection prompt is broken, not a finding.

