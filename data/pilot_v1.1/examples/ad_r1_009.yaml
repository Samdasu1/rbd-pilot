engineered_flaws:
  R1.7: [F1.7.b]    # missing key prior work
  notes: |
    The section surveys graph-based ANN methods and names ScaNN, DiskANN,
    and NSG, but does NOT cite HNSW (Malkov & Yashunin, 2018), which is
    the canonical graph-based ANN method and the de facto modern
    baseline. Any reviewer who has worked on ANN will spot the omission
    immediately. NSG and DiskANN are themselves successors / variants in
    the HNSW lineage; citing them without citing HNSW is a load-bearing
    scholarship gap (F1.7.b). The conceptual object, novelty positioning
    against the named works, and contribution claim are otherwise
    coherent — only the prior-work attribution is broken. The
    contribution claim ("strongest prior baseline at same recall@10") is
    also potentially compromised if HNSW is not in the comparison.

