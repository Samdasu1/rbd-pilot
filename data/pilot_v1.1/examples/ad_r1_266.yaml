artifact:
  source: synthetic
  domain: distributed_systems
  word_count: 323
  text: |
    In this section we describe DRouter, our distributed routing layer
    for multi-LLM serving infrastructures. The evaluation in §4 shows
    that DRouter achieves 38% lower p99 tail latency than the
    round-robin baseline on a heterogeneous fleet of seven model
    endpoints, and we attribute this primarily to the queue-aware
    admission policy described below.

    DRouter sits between client request streams and a pool of LLM
    inference workers, each of which exposes a heterogeneous capacity
    profile (varying batch sizes, KV-cache footprints, and per-token
    latency curves) and the router maintains a per-worker queue depth
    estimate that gets updated on each completion event so that
    admission decisions can be made without polling the workers
    directly which would have introduced additional RTT overhead.

    The motivation for this work stems from a recurring operational
    problem: in production multi-LLM deployments, naive load balancers
    route requests by request count rather than by predicted compute
    cost, which causes long-context requests to pile up on a single
    worker while short-context requests starve elsewhere on the fleet.
    Without a cost-aware admission layer, tail latency degrades sharply
    as request length distributions skew.

    Our scheduler uses a two-level architecture. At the top level, a
    request classifier estimates predicted token cost from the prompt
    prefix; at the bottom level, the per-worker admission controller
    compared the estimated cost against a budget derived from the
    worker's current queue depth and historical throughput, and it
    then either admitted the request or forwarded it to the next-best
    worker.

    The classifier was trained on a corpus of 2.1M historical requests
    and predicts output token count with mean absolute error of 41
    tokens; this is described in greater depth in §3.2. Cost estimates
    feed into the admission controller via a shared memory channel, the
    channel was implemented as a lock-free ring buffer to avoid
    contention.

    In summary, DRouter is the first multi-LLM routing system that we
    are aware of which co-designs cost prediction with admission control
    across heterogeneous worker pools.
