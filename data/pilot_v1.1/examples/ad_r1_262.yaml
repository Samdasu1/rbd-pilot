acceptable_outputs_summary: |
  Names both load-bearing issues. For the structural problem,
  identifies that the section reports headline MRR gains and an
  entropy-term ablation before either the FacetRank architecture
  or the facet-entropy objective has been defined, and that the
  motivation and contribution-framing paragraphs sit after the
  results rather than before; proposes a reorder to motivation →
  method → evaluation → results → contribution framing so the
  ablation is intelligible at first read and the closing claim
  lands after the reader has the necessary context. For the
  citation gap, names the missing canonical anchors — Aliannejadi
  et al. (SIGIR 2019) for the Qulac evaluation collection,
  Zamani et al. (CIKM 2020) for the MIMICS data and the original
  facet-based clarification framing, Kong & Allan (SIGIR 2013)
  and the neural facet-extraction follow-ons (e.g. Hashemi et al.
  2020) for the facet-coverage lineage, and Rosset et al. (SIGIR
  2020) for the "useful question" framing — and indicates where
  each belongs. Recognizes that the "label-free facet signal"
  novelty claim cannot be evaluated until those anchors are in
  place.

bad_outputs_summary: |
  Polishes prose, tightens transitions, suggests defining
  "facet-discriminativeness" more carefully, or recommends an
  additional ablation. Accepts the implicit framing that
  FacetRank's facet-coverage scoring is novel without checking
  whether the Qulac, MIMICS, or query-facet-extraction literatures
  already established the task and the signal. Addresses only one
  issue — e.g. reorders the paragraphs but leaves the citation
  gap, or adds a couple of conversational-search references
  without identifying Aliannejadi et al. and Zamani et al. as
  the dataset originators whose absence undermines the evaluation
  framing.

