engineered_flaws:
  R1.5: [F1.5.c]    # out-of-order narrative: results paragraph precedes the method, motivation arrives last
  R1.7: [F1.7.b]    # missing canonical clarifying-question and facet-extraction prior work
  notes: |
    Two interacting flaws:

    R1.5 — out-of-order narrative. The section's logical arc is
    inverted. Paragraph 1 states the task and names the proposed
    ranker. Paragraph 2 then reports headline numbers (MRR gains
    on Qulac, generalization on MIMICS-Click, ablation of the
    entropy term) before the reader knows what FacetRank actually
    is. Paragraph 3 finally describes the two-tower architecture,
    the cluster-based facet proxy, and the contrastive training
    signal. Paragraph 4 returns to motivation — why facet-coverage
    scoring is preferable to relevance-driven question ranking —
    and only at the end positions the contribution against prior
    facet-aware approaches. The natural section order is
    motivation → method → evaluation → results → contribution
    framing; here results sit at position 2 and motivation at
    position 4, so the ablation in paragraph 2 is unintelligible
    on first read (the "entropy term" has not yet been defined)
    and the contribution claim in paragraph 4 lands after the
    reader has already been told the numbers. Subtlety: each
    paragraph is locally well-written; the defect is purely at
    the section level, and a polish-only response would not
    detect it.

    R1.7 — missing canonical prior work. The section evaluates on
    Qulac and on MIMICS-Click but cites neither the Qulac paper
    (Aliannejadi, Kiseleva, Chuklin, Dalton & Burtsev, SIGIR 2019,
    "Asking Clarifying Questions in Open-Domain Information-
    Seeking Conversations") nor the MIMICS data-collection and
    facet-based clarification paper (Zamani, Mitra, Chen, Lueck,
    Diaz, Bennett, Craswell & Dumais, CIKM 2020, "Generating
    Clarifying Questions for Information Retrieval" / "MIMICS:
    A Large-Scale Data Collection for Search Clarification").
    The section's framing of facet-coverage and entropy reduction
    over query facets stands directly on Kong & Allan (SIGIR
    2013, "Extracting Query Facets from Search Results") and on
    follow-on neural facet-extraction work (e.g. Hashemi, Zamani
    & Croft, SIGIR 2020 on guided transformer / facet-aware
    document ranking); neither lineage is acknowledged. The
    "useful question" framing the introduction implicitly invokes
    is from Rosset, Xiong, Song, Campos, Craswell, Tiwary &
    Bennett (SIGIR 2020, "Leading Conversational Search by
    Suggesting Useful Questions"), again uncited. Moderate
    gating: any reader who has worked on conversational search,
    query facets, or the TREC CAsT / ClariQ ecosystems will see
    these omissions on first pass, because the section's entire
    evaluation collection and its core "facet-discriminative
    question" framing were defined in those works.

    Combined: fixing R1.5 alone (reordering to motivation →
    method → evaluation → contribution framing) yields a clean
    arc whose closing contribution claim — a "label-free facet
    signal" reaching gains "previously seen only with supervised
    facet annotations" — still goes uncalibrated against the
    Qulac, MIMICS, and Kong & Allan lineages it implicitly
    depends on. Fixing R1.7 alone (adding Aliannejadi et al.
    2019, Zamani et al. 2020, Kong & Allan 2013, Hashemi et al.
    2020, Rosset et al. 2020) leaves the inverted narrative in
    place, so the now-properly-anchored contribution still lands
    after the headline numbers and the reader still encounters
    an undefined "entropy term" in the ablation. Both must be
    addressed for the section's contribution claim to be
    legible.

