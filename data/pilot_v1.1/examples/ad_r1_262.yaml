artifact:
  source: synthetic
  domain: information_retrieval
  word_count: 348
  text: |
    Facet coverage has emerged as a central object of study in
    conversational search: when an initial query is ambiguous, the
    system should ask a clarifying question whose answer maximally
    narrows the user's intended facet. We propose FacetRank, a
    learned ranker that scores candidate clarifying questions by
    their expected information gain over a latent facet
    distribution.

    On the public Qulac collection, FacetRank improves MRR by 4.1
    points over a BM25 baseline and by 1.3 points over a strong
    BERT cross-encoder retrained on clarification-question pairs;
    the gain is concentrated on queries whose top-ranked initial
    document is below 0.4 nDCG@5. We also report a 2.7-point gain
    on a held-out subset of MIMICS-Click, suggesting that the
    facet-coverage signal generalizes beyond the training
    distribution. Ablating the entropy term collapses the gain to
    0.4 points, confirming that facet-discriminativeness, rather
    than question fluency, drives the improvement.

    The FacetRank model is a two-tower architecture in which one
    tower encodes the user query together with the top-k retrieved
    documents and the other tower encodes a candidate clarifying
    question. We compute a facet-distribution proxy by clustering
    the top-k documents under a fixed sentence encoder, then score
    each candidate question by its expected reduction in cluster
    entropy conditional on a synthetic answer drawn from a small
    LM. Training uses a contrastive loss over (query, positive
    question, negative question) triples mined from session-pair
    logs.

    The motivation for facet-coverage scoring is that traditional
    relevance-driven question rankers tend to surface clarifying
    questions that are themselves ambiguous — they ask about the
    most popular facet rather than the most discriminating one.
    By targeting expected reduction in facet entropy, our ranker
    prefers questions that partition the candidate-document space,
    even when the resulting question is lexically unusual.
    Compared to facet-aware approaches that depend on a labeled
    intent taxonomy, our method requires no labeled facet
    inventory; the cluster proxy is constructed at inference
    time. We see this as the section's core contribution: a
    label-free facet signal that reaches the gains previously
    seen only with supervised facet annotations.
  source_provenance: null

