artifact:
  source: synthetic
  domain: climate
  word_count: 322
  text: |
    We present ClimaCast, a framework for cost-aware climate-impact
    forecasting that selectively routes regional climate queries
    between a small surrogate model and a full-resolution Earth System
    Model (ESM) ensemble. ClimaCast targets decision-support workflows
    in which municipal planners query likely regional climate
    trajectories under different emissions scenarios to inform
    long-horizon infrastructure decisions.

    The core of ClimaCast is a lightweight gradient-boosted router
    that predicts, from a 64-dimensional encoding of each query
    (region, variable, horizon, scenario), whether the surrogate's
    output will fall within tolerance of the full-ensemble result.
    When the router's confidence falls below threshold τ, ClimaCast
    falls back to the full ESM ensemble. We train and evaluate against
    the CMIP5 multi-model ensemble (Taylor et al., 2012), which we
    treat throughout as the gold-standard reference for projected
    regional climate. The newer CMIP6 ensemble is referenced only as
    a sanity check in our appendix.

    On a held-out evaluation set of 1,200 planner-style queries drawn
    from the 2024 U.S. National Climate Assessment, ClimaCast reduces
    total ensemble compute by 6.2% relative to an always-full-ensemble
    baseline, while incurring a mean absolute deviation of 0.08°C in
    projected regional temperature anomaly against the full-ensemble
    reference. We position this as a substantial advance in
    cost-effective climate forecasting and a fundamental shift in how
    decision-support pipelines should marshal expensive ensemble
    compute.

    Compared to a uniform-sampling baseline that subsamples ensemble
    members at random, ClimaCast achieves lower deviation at matched
    compute. Together with the IPCC AR5 (2014) projection framework —
    which remains the canonical scenario backbone for our experiments
    — this demonstrates that learned routing constitutes a new state
    of the art for compute-aware climate inference.

    Our results establish ClimaCast as the new standard for
    compute-aware climate forecasting and open a path to broad
    deployment in municipal and regional planning workflows.
