engineered_flaws:
  R1.4: [F1.4.c]
  R1.7: [F1.7.c]
  notes: |
    Two compound issues, both visible from careful reading without
    requiring climate-domain expertise:

    R1.4 — rhetorical delta. The section's reported numerical delta is
    a 6.2% reduction in ensemble compute at the cost of a 0.08°C mean
    absolute deviation in projected regional temperature anomaly
    against the section's own reference. The rhetoric layered over
    these numbers is grossly disproportionate: "substantial advance,"
    "fundamental shift in how decision-support pipelines should
    marshal expensive ensemble compute," "new state of the art for
    compute-aware climate inference," and "the new standard for
    compute-aware climate forecasting." A 6% efficiency tweak with
    near-zero accuracy change does not support "fundamental shift" or
    "new standard" framing. The mismatch is detectable purely from
    juxtaposing the results paragraph with the positioning sentences.

    R1.7 — stale citation. The section's gold-standard reference is
    the CMIP5 multi-model ensemble (Taylor et al., 2012) and its
    canonical scenario backbone is IPCC AR5 (2014). Yet the section
    itself draws its evaluation queries from the 2024 U.S. National
    Climate Assessment and explicitly acknowledges that "the newer
    CMIP6 ensemble" exists (relegated to an appendix sanity check). A
    reader does not need to know CMIP6 release dates or AR6 to flag
    the inconsistency: the section internally pairs a 2024 evaluation
    distribution with 2012/2014 sources held up as "gold-standard" and
    "canonical," and openly names a newer ensemble it declines to use.

    Combined: fixing R1.4 alone (toning the rhetoric to match a 6%
    efficiency gain) leaves the comparison anchored to a stale
    reference set, so the deviation numbers themselves remain
    questionable (R1.7). Conversely, re-anchoring to CMIP6 / AR6
    (R1.7) would change the deviation numbers and force a re-statement
    of the contribution's actual delta (R1.4).

