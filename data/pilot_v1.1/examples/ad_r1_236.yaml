acceptable_outputs_summary: |
  Names that the positioning language ("substantial advance,"
  "fundamental shift," "new state of the art," "the new standard")
  is grossly out of proportion to the reported 6.2% compute saving
  and 0.08°C deviation, and recommends rewriting the contribution
  claim to match the modest efficiency gain actually demonstrated.
  Separately flags that the gold-standard reference (CMIP5, 2012) and
  scenario backbone (IPCC AR5, 2014) are superseded — the section
  itself signals this by drawing queries from the 2024 NCA and
  acknowledging CMIP6 — so the comparison must be re-anchored to the
  current ensemble and assessment cycle before the deviation numbers
  can be trusted.

bad_outputs_summary: |
  Polishes the prose, tightens the router description, and suggests
  an extra ablation on threshold τ. Accepts the "fundamental shift"
  and "new standard" framing at face value, perhaps strengthening it
  further. Does not notice that a 6% gain cannot bear that rhetoric,
  nor that pairing a 2024 evaluation set with CMIP5/AR5 as
  "gold-standard" and "canonical" is internally inconsistent.

