acceptable_outputs_summary: |
  Audits the per-plant numbers against the "consistent improvements
  across all benchmark plants" and "uniformly superior" framing.
  Identifies that the manipulator is at parity, the CSTR comparison is
  missing (so unverifiable), and the four-tank system is a regression.
  Recommends rewording to "improves on 2 of 5 plants, parity on 1,
  regression on 1, with the CSTR baseline missing" or asks for the
  omitted CSTR tube-MPC number to be reinstated before any
  across-the-board claim is made.

bad_outputs_summary: |
  Polishes the prose, suggests adding more benchmark plants, queries the
  novelty of the constraint-tightening scheme, or asks for stability
  proofs — while accepting "consistent improvements across all" and
  "uniformly superior" at face value. Suggests peripheral additions
  (computational cost tables, robustness margins) without auditing the
  existing sweeping claim against the existing per-plant evidence.

