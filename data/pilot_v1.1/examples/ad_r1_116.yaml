artifact:
  source: synthetic
  domain: control_theory
  word_count: 296
  text: |
    We propose RobustMPC-U, a model predictive controller that incorporates
    learned uncertainty estimates from a neural surrogate of the plant
    dynamics. The controller achieves consistent stability and tracking
    improvements across all benchmark plants compared to nominal and
    tube-MPC baselines, demonstrating the broad applicability of
    uncertainty-aware constraint tightening for safety-critical control.

    We evaluate on five canonical benchmarks: an inverted pendulum
    (Plant A), a quadrotor altitude/attitude system (Plant B), a two-link
    planar manipulator (Plant C), a continuous stirred-tank reactor —
    CSTR (Plant D), and a coupled four-tank system (Plant E). For each
    plant we compare against a tube-MPC baseline on integrated absolute
    tracking error (ITAE) and worst-case constraint-violation rate over
    100 randomized initial conditions with bounded process noise.

    On the inverted pendulum, RobustMPC-U reduces ITAE from 1.42 to 1.05
    (a 26% reduction) and eliminates constraint violations entirely
    (0% vs. the baseline's 4%). On the quadrotor, ITAE drops from 0.83
    to 0.71 (14% reduction) with the violation rate falling from 2% to
    0%. On the two-link manipulator, ITAE is 2.18 versus the baseline's
    2.20 — essentially identical — and violation rates match at 1%. On
    the CSTR, RobustMPC-U reports an ITAE of 0.94; we omit the tube-MPC
    number in this section for space. On the four-tank system,
    RobustMPC-U yields ITAE of 3.41 versus the baseline's 3.12, a
    regression of roughly 9%, with a slight increase in violation rate
    (3% vs. 2%).

    We attribute the gains to the constraint-tightening procedure
    derived from the learned uncertainty bounds, which adaptively
    expands or contracts the admissible region in response to local
    model confidence. Taken together, these results establish
    RobustMPC-U as a uniformly superior approach to uncertainty-aware
    predictive control across the standard plant classes considered in
    the recent literature, and motivate its deployment on
    higher-dimensional industrial systems.
