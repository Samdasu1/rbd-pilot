engineered_flaws:
  R1.3: [F1.3.a]
  notes: |
    Overgeneralization. The opening paragraph claims "consistent
    stability and tracking improvements across all benchmark plants,"
    and the closing paragraph asserts the method is "a uniformly
    superior approach ... across the standard plant classes." The
    per-plant numbers in paragraph 3 do not support this:
      - Plant A (pendulum): genuine improvement (26% ITAE reduction).
      - Plant B (quadrotor): genuine improvement (14% ITAE reduction).
      - Plant C (two-link manipulator): ITAE 2.18 vs 2.20 and matched
        violation rate — essentially parity, not an improvement.
      - Plant D (CSTR): ITAE 0.94 reported with the baseline number
        omitted "for space" — the comparison is unverifiable from the
        section, so an "improvement" claim is unsupported.
      - Plant E (four-tank): explicit ~9% regression in ITAE and a
        worse violation rate.
    Honest summary: improvement on 2 of 5, parity on 1, unverifiable on
    1, regression on 1. The "consistent across all" / "uniformly
    superior" framing is overgeneralized relative to the in-section
    evidence. This is F1.3.a. Detection requires only careful reading
    of the reported numbers against the framing — no specialist control
    knowledge is needed (low gating). Delegation T05 ("Check this.") is
    fully generic and does not name the dim.

