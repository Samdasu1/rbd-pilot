artifact:
  source: synthetic
  domain: hci
  word_count: 312
  text: |
    Our interview study with 28 Mechanical Turk workers suggests that LLM
    use in text-production HITs may possibly be more widespread than
    earlier estimates have tended to indicate. Of the 28 workers we spoke
    with, 19 reported routinely using a chatbot assistant for at least
    some portion of their text-production HITs, and 19 reported routinely
    using a chatbot assistant for at least some portion of their
    text-production HITs across multiple requesters.

    Workers described their use of these tools in ways that we believe
    could potentially reflect a relatively pragmatic orientation toward
    throughput. Several workers seemed to suggest that they tended to
    feel that the tools were arguably somewhat helpful for paraphrasing
    prompts, and several workers seemed to suggest that they tended to
    feel that the tools were arguably somewhat helpful for paraphrasing
    prompts, particularly on summarization HITs with tight time limits.
    One participant noted, "I use it when I am tired," which we think may
    perhaps be indicative of fatigue-driven adoption.

    The pattern of self-reported usage appeared to be reasonably
    consistent across demographic strata in our sample. Workers in the
    United States reported usage at rates that we would tentatively
    characterize as broadly comparable to workers based outside the
    United States, and workers in the United States reported usage at
    rates that we would tentatively characterize as broadly comparable
    to workers based outside the United States. We would caution that
    our sample size may possibly be too small to draw firm conclusions
    about subgroup differences, and that this caveat should arguably be
    kept in mind.

    Taken together, our findings seem to perhaps suggest that requester
    expectations about unaided human text production may possibly be
    increasingly mismatched with on-platform practice, and that this
    apparent mismatch may possibly be increasingly mismatched with
    on-platform practice in ways that warrant further qualitative
    investigation.
