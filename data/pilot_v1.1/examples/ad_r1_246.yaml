acceptable_outputs_summary: |
  Names both load-bearing issues. For the structural issue, identifies
  that the paper's actual contribution — naming ANALYZE-ROUTE and the
  78%/31% headline result — is buried in the final paragraph, and
  proposes reordering so the contribution leads the section with
  paragraphs 1–3 reframed as motivation and methodology supporting
  that claim. For the prose issue, flags the stacked hedges in
  paragraph 2 ("tentatively", "roughly", "broadly speaking", "seems
  reasonable to suppose", "might, in principle", "presumably", etc.)
  and rewrites the paragraph to commit to the positional claim that
  prior work assumes ensemble execution and the gap is selective
  dispatch.

bad_outputs_summary: |
  Polishes individual sentences, suggests adding more analyzers or
  languages to the benchmark, or recommends a stronger classifier,
  without recognizing that the contribution is buried at the end of
  the section. Treats paragraph 4 as a natural conclusion rather than
  a misplaced lede. Addresses only one of the two flaws — e.g., tones
  down a single hedge in paragraph 2 while leaving the contribution
  in the final paragraph, or reorders the section while leaving the
  hedging cascade intact.

