engineered_flaws:
  R1.5: [F1.5.a]
  R1.6: [F1.6.b]
  notes: |
    Two interacting flaws.

    R1.5 — buried contribution. The section's actual contribution
    ("we introduce ANALYZE-ROUTE, the first per-commit routing
    benchmark for static analyzer selection, together with a routing
    policy achieving 78% union-recall at 31% compute cost") is the
    final paragraph. Paragraphs 1–3 read as background, related work,
    and experimental setup — none of them announces what the paper
    contributes. A reader scanning the opening cannot tell whether
    this is a benchmark paper, a measurement study, an aggregation
    proposal, or a router proposal until the very last paragraph. The
    canonical fix is to lead with the contribution sentence — name
    ANALYZE-ROUTE and the headline result up front — and then frame
    paragraphs 1–3 as motivation and methodology supporting that
    claim. The current ordering also makes paragraph 2's literature
    survey land as the de facto thesis of the section, since it is
    the only paragraph that articulates a positional view ("a more
    selective approach might offer some benefits"). That placement
    inverts the relationship between contribution and motivation.

    R1.6 — hedging cascade. Paragraph 2 stacks hedges across two
    sentences: "tentatively surveyed", "roughly thirty", "broadly
    speaking", "tend to share", "seems reasonable to suppose",
    "might, in principle", "some benefits", "presumably depend",
    "not always easy to characterize precisely in advance". The
    cascade weakens what should be the section's positional argument
    (that selective routing is preferable to ensemble-and-merge) into
    an unfalsifiable softening. The fix is to commit to the claim:
    state directly that prior work assumes all analyzers run, and
    that the gap is selective dispatch.

    Detection: identifying the buried contribution requires recognizing
    that ANALYZE-ROUTE is the load-bearing artifact of the paper and
    that PL/SE benchmark papers conventionally foreground the named
    benchmark and its headline number; this is moderate field
    knowledge. The hedging cascade is surface-detectable on careful
    reading.

    T02 "Review this section." is generic and does not hint at
    structure, contribution placement, or prose register.

