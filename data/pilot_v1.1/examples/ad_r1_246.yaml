artifact:
  source: synthetic
  domain: programming_languages
  word_count: 332
  text: |
    Static analyzers for production codebases vary widely in their
    precision-recall profiles, language coverage, and runtime cost.
    Infer specializes in interprocedural memory-safety reasoning on
    C/C++ and Java; CodeQL emphasizes taint-tracking on a unified
    dataflow graph; SpotBugs targets idiomatic Java bug patterns; and
    Semgrep favors syntactic patterns expressible by lightweight rules.
    In practice, teams running CI pipelines against repositories with
    mixed language and structural composition tend to invoke several
    of these tools in parallel, which inflates compute cost and
    produces overlapping or contradictory reports that engineers then
    triage by hand.

    A range of recent work has explored this tooling redundancy.
    SARIF-based aggregation pipelines normalize finding formats;
    differential analyzers attempt to deduplicate across tools; and
    several authors have proposed cost models for analyzer scheduling.
    We tentatively surveyed roughly thirty such systems and found
    that, broadly speaking, they tend to share a common assumption —
    namely, that all analyzers are run, and the question is only how
    to merge or filter their outputs after the fact. It seems
    reasonable to suppose that a more selective approach might, in
    principle, offer some benefits, although the magnitude of those
    benefits would presumably depend on workload characteristics that
    are not always easy to characterize precisely in advance.

    Section 4 reports on our experiments. We collected 11,400 commits
    from 47 open-source repositories spanning C, C++, Java, Python,
    and TypeScript. For each commit we ran all four analyzers to
    ground truth and recorded findings, runtimes, and false-positive
    rates against a manually adjudicated subset. We then trained a
    lightweight gradient-boosted classifier over commit-level features
    (changed-file types, AST-level edit summaries, repository priors)
    to predict, per commit, the analyzer most likely to produce a
    true-positive finding within a fixed time budget.

    In this paper we introduce ANALYZE-ROUTE, the first per-commit
    routing benchmark for static analyzer selection, together with a
    routing policy that achieves 78% of the union-recall of the
    four-tool ensemble at 31% of its compute cost. The benchmark,
    dataset, and reference router are released under an open license.
  source_provenance: null

