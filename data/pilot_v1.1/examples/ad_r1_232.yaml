acceptable_outputs_summary: |
  Flags both load-bearing issues. For the metric, points out that the
  section defines selective prediction as a per-example ranking
  property (abstain on would-be errors, commit on would-be correct)
  but reports ECE, which is a binned global-average miscalibration
  invariant to that ranking — so a lower-ECE model is not necessarily
  a better selective predictor, the cross-backbone ranking is not
  warranted, and the deployment recommendation that the rest of the
  paper inherits is unsupported; recommends a ranking-based metric
  such as AURC, risk at fixed coverage, or AUROC for misclassification
  detection. For the citation, notes that Hendrycks and Gimpel (2017)
  evaluate maximum softmax probability with AUROC/AUPR on the
  misclassification-detection task and do not establish ECE as the
  canonical selective-prediction metric, and asks the authors to
  remove or replace the attribution.

bad_outputs_summary: |
  Polishes the prose, suggests adding more backbones, more shift
  datasets, error bars on ECE, or a temperature-scaling sensitivity
  analysis. Accepts ECE as the selective-prediction metric without
  questioning the construct match against the section's own
  definition, and accepts the Hendrycks and Gimpel attribution
  without verification. Addresses at most one of the two issues
  (e.g., recommends reporting per-shift ECE breakdowns) while
  leaving the metric-construct mismatch and the misattributed
  citation intact.

