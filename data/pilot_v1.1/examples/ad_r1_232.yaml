engineered_flaws:
  R1.3: [F1.3.b]
  R1.7: [F1.7.a]
  notes: |
    Two load-bearing flaws that jointly determine the section's
    contribution.

    R1.3 — metric mismatch. The section explicitly defines its object
    of measurement as *selective prediction*: a model's ability to
    abstain on examples it would otherwise misclassify and predict
    confidently on those it gets right. This is a *ranking* property
    of confidence over correct vs. incorrect predictions. The metric
    actually reported, Expected Calibration Error (ECE), measures the
    average gap between binned confidence and binned accuracy — a
    *global average miscalibration* property that is invariant to the
    pointwise confidence ordering of correct vs. incorrect examples.
    A model can attain near-zero ECE while ranking errors no better
    than chance (e.g., underconfident on correct examples and
    overconfident on incorrect examples in compensating amounts), and
    a model can rank errors near-perfectly while having large ECE
    (any monotone confidence transform preserves selective
    performance but distorts ECE). The section's interpretive claim
    — "ViT-B/16's lower ECE as direct evidence ... strongest
    selective-prediction ability" — is therefore unsupported by the
    metric chosen. Fixing this requires a metric tied to the ranking
    property the section defined, e.g., AURC (area under the
    risk-coverage curve), selective-prediction risk at fixed
    coverage, or AUROC for misclassification detection — which would
    in general re-rank the three backbones and change the deployment
    recommendation that the rest of the paper inherits.

    R1.7 — fabricated/misattributed citation. The section attributes
    to Hendrycks and Gimpel (2017) the claim that "Expected
    Calibration Error (ECE) is the canonical metric for evaluating a
    model's ability to detect its own misclassifications." The cited
    paper ("A Baseline for Detecting Misclassified and
    Out-of-Distribution Examples") in fact proposes maximum softmax
    probability as a baseline detector and evaluates it with AUROC
    and AUPR on the misclassification-detection task; ECE is not the
    metric they advance for this purpose, and the broader ECE
    formulation is associated with Guo et al. (2017) in a calibration
    (not selective-prediction) framing. The citation is real but the
    methodological authority the section claims from it is fabricated,
    and that authority is precisely what licenses the metric choice
    above.

    Moderate gating: catching the metric mismatch requires noticing
    that the defined object (a per-example ranking property) and the
    reported quantity (a binned global average) are different kinds of
    objects — visible from careful internal reading but easier with
    selective-prediction literacy. Catching the citation
    misattribution requires recall of what Hendrycks and Gimpel
    (2017) actually evaluate, which is canonical CV/uncertainty
    knowledge but not common-reader knowledge.

