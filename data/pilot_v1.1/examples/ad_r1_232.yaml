artifact:
  source: synthetic
  domain: computer_vision
  word_count: 318
  text: |
    Modern vision transformers (ViTs) achieve strong top-1 accuracy on
    ImageNet, but their behavior on inputs they should refuse remains
    poorly understood. We study whether a pre-trained ViT-B/16 "knows
    what it knows" — that is, whether its confidence outputs reliably
    indicate when a prediction should be trusted versus abstained from.
    This selective-prediction capability is critical for deployment in
    clinical imaging and autonomous driving, where silently wrong
    predictions are far more costly than an explicit refusal.

    We define our object of study as the model's ability to *selectively
    predict*: given a held-out test set, an ideal selective classifier
    abstains on examples it would otherwise misclassify and predicts
    confidently on those it gets right. To measure this property, we
    follow the practice introduced by Hendrycks and Gimpel (2017), who
    established that Expected Calibration Error (ECE) is the canonical
    metric for evaluating a model's ability to detect its own
    misclassifications. We compute ECE with 15 equal-mass bins on the
    temperature-scaled softmax outputs.

    We evaluate three vision backbones — ViT-B/16, ConvNeXt-B, and
    Swin-B — on ImageNet-V2 and ImageNet-Sketch. After temperature
    scaling, ViT-B/16 attains the lowest ECE (0.018 on ImageNet-V2,
    0.041 on ImageNet-Sketch), followed by Swin-B (0.024, 0.052) and
    ConvNeXt-B (0.031, 0.067). We interpret ViT-B/16's lower ECE as
    direct evidence that it has the strongest selective-prediction
    ability among the three backbones, and recommend it as the default
    choice for safety-critical deployment.

    A central methodological position of this work is that calibration
    error, when measured post-hoc on a representative validation set,
    is sufficient to characterize a vision backbone's selective-
    prediction quality. This framing grounds the remainder of the
    paper: subsequent sections use ECE as the sole criterion for
    ranking architectures, training recipes, and pre-training datasets,
    and our recommendations to practitioners follow directly from this
    ranking.
