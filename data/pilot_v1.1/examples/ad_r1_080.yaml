engineered_flaws:
  R1.1: [F1.1.b]
  notes: |
    Contribution slip. Paragraph 1 names the central contribution as
    "a novel graph attention mechanism" — implying an architectural
    innovation. Paragraph 3 then reveals that the GAT is used
    off-the-shelf with default heads and hyperparameters from
    Veličković et al., concatenated to a cross-encoder via a standard
    MLP head. No new attention computation, gating, or message-passing
    rule is introduced. The closing paragraph completes the slip by
    re-listing the contributions as (i) a benchmark dataset and (ii)
    baseline numbers — neither of which is a novel architectural
    mechanism. A reader cannot tell whether the paper claims a new
    GNN mechanism, a new benchmark, or a baseline study, and fixing
    the section requires picking one and aligning the framing with the
    technical content. Detection is from careful reading of paragraphs
    1, 3, and 5 against each other; no recall of canonical GNN
    literature is needed (low gating). The delegation T08 "Clean this
    up" is generic polish-language and does not signal R1.1.

