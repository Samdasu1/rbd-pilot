artifact:
  source: synthetic
  domain: graph_neural_networks
  word_count: 322
  text: |
    We present GraphClarifyKG, a method for ranking candidate clarifying
    questions in conversational search grounded on knowledge graphs.
    Existing approaches treat clarifying-question selection as a flat
    text-ranking problem and ignore the entity structure of the
    underlying KG. The central contribution of this paper is a novel
    graph attention mechanism that computes question relevance by
    jointly attending over entity neighborhoods and the user's prior
    turns, yielding a question-specific subgraph embedding tailored to
    the conversational state.

    Background. Given a user query q and a candidate clarifying
    question c, prior systems encode (q, c) with a cross-encoder and
    rank by the resulting score. KG-grounded variants extract entities
    from q via standard NER, retrieve their k-hop neighborhoods from
    Wikidata, and feed the resulting subgraph through a Graph Attention
    Network. Our setup follows this pipeline.

    The method works as follows. We embed each entity using pretrained
    TransE vectors and propagate them over the retrieved subgraph with
    a 2-layer GAT using the default attention heads and hyperparameters
    from Veličković et al. We then concatenate the mean-pooled entity
    embedding with the cross-encoder representation of (q, c) and pass
    the result through an MLP scoring head trained with margin loss.
    Because both the GAT and the cross-encoder are off-the-shelf, the
    full system trains end-to-end in under three GPU-hours on a single
    A100.

    We evaluate on the ClariQ-KG benchmark, which we release alongside
    this paper. Our system achieves Recall@1 of 0.61, compared with
    0.54 for a cross-encoder baseline that ignores graph context. We
    attribute the gain to the inclusion of entity-neighborhood
    information from the retrieved subgraph.

    In summary, this paper contributes (i) ClariQ-KG, the first dataset
    pairing CAsT-style clarifying-question pools with Wikidata entity
    links, and (ii) baseline numbers for cross-encoder and KG-augmented
    rankers, establishing the difficulty of the task and providing a
    reference point for future work on graph-grounded clarification in
    conversational search.
