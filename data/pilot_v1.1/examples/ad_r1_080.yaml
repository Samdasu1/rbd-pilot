acceptable_outputs_summary: |
  Flags that the stated central contribution (a novel graph attention
  mechanism) is not actually delivered — the GAT is used off-the-shelf
  with default settings — and that the closing summary quietly relists
  the contributions as a dataset plus baseline numbers. Proposes either
  reframing the paper around the benchmark/baseline contribution and
  removing the architectural-novelty claim, or actually describing a
  new attention or message-passing mechanism that justifies the
  paragraph-1 framing.

bad_outputs_summary: |
