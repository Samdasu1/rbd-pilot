artifact:
  source: synthetic
  domain: generative_ml
  word_count: 298
  text: |
    Recent advances in retrieval-augmented generation have largely
    treated open-domain QA as a single-answer prediction task, despite
    repeated observations that a substantial fraction of natural-language
    questions admit multiple valid interpretations. We introduce
    DISAMBIG-FiD, the first end-to-end generative model for ambiguity-
    aware open-domain QA, which jointly detects question ambiguity,
    enumerates plausible interpretations, and emits a disambiguated
    (question, answer) pair for each. Unlike prior pipeline approaches
    that decompose disambiguation into separate retrieval, classification,
    and rewriting modules, our system trains a single seq2seq backbone
    that performs all three steps in one forward pass.

    Our architecture proceeds as follows. A dense passage retriever
    (DPR-style, with a Wikipedia index of 21M passages) returns the
    top-100 passages; an ambiguity classifier head over the retrieved
    set predicts whether the question is ambiguous; if so, a T5-large
    rewriter emits a set of disambiguated questions, and a separate
    fusion-in-decoder reader then answers each rewritten question
    independently. The three components are trained sequentially, each
    with its own objective, and combined at inference time.

    We fine-tune all components on the AmbigNQ training split (Min et
    al., 2020), which provides gold disambiguated (question, answer)
    pairs for ambiguous NQ-Open questions. The retriever uses standard
    DPR contrastive loss; the classifier uses binary cross-entropy on
    AmbigNQ ambiguity labels; the rewriter is supervised on AmbigNQ
    disambiguated questions.

    On the AmbigNQ dev split, DISAMBIG-FiD achieves 48.1 F1_ans (all)
    and 41.7 F1_BLEU on disambiguated questions, improving over
    SpanSeqGen by 5.3 F1_ans. We attribute these gains to our
    supervision-free approach: because our model never sees gold
    AmbigNQ disambiguations during training and instead extracts weak
    ambiguity signals from Wikipedia disambiguation pages, it
    generalizes to held-out ambiguity types better than supervised
    baselines.

    We position DISAMBIG-FiD as a step toward QA systems that surface,
    rather than collapse, the multiple legitimate interpretations of
    user queries. Code and checkpoints will be released.
