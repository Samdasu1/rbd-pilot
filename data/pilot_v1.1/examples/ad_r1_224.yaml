acceptable_outputs_summary: |
  Names both: (1) the framing as a single-backbone, end-to-end model
  is incompatible with the actual architecture, which is a
  sequentially trained DPR + classifier + T5-rewriter + FiD pipeline —
  the authors must either drop the "end-to-end / single seq2seq
  backbone" claim and reposition against pipeline baselines, or
  redesign the system to actually share parameters and train jointly;
  (2) the training section says all components are fine-tuned on
  AmbigNQ gold disambiguations while the results section attributes
  gains to a supervision-free regime that uses only Wikipedia
  disambiguation pages — these describe different runs and one of the
  two has to be retracted before any claim about generalization to
  held-out ambiguity types is interpretable.

bad_outputs_summary: |
  Polishes prose, tightens the abstract, suggests adding ablations on
  retrieval depth or beam width, recommends more baselines, or asks
  for a qualitative example table. Treats "end-to-end" and the
  pipeline description as compatible framings of the same system, and
  treats "fine-tuned on AmbigNQ" alongside "supervision-free … weak
  signals from Wikipedia" as complementary descriptions rather than
  mutually exclusive training regimes. Adds citations to FiD, DPR, or
  AmbigNQ without flagging that the contribution claim and the
  supervision claim are each internally unsupported by the section's
  own text.

