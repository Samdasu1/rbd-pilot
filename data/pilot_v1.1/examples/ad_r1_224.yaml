engineered_flaws:
  R1.1: [F1.1.b]
  R1.2: [F1.2.b]
  notes: |
    Two compound issues:

    R1.1 — contribution slip. Para 1 frames the contribution as "the
    first end-to-end generative model" that "trains a single seq2seq
    backbone that performs all three steps in one forward pass" and
    explicitly contrasts this with "prior pipeline approaches that
    decompose disambiguation into separate retrieval, classification,
    and rewriting modules." Para 2 then describes exactly such a
    pipeline: DPR retriever → ambiguity classifier head → T5-large
    rewriter → separate FiD reader, with "the three components trained
    sequentially, each with its own objective." The stated
    contribution (end-to-end, single backbone) and the delivered
    contribution (a sequentially trained DPR+T5+FiD pipeline) are
    different objects. High gating: detecting this requires knowing
    that "end-to-end" in the open-domain QA literature means joint
    training of retriever and reader (cf. REALM, RAG end-to-end
    variants, EMDR2), that DPR + T5 rewriter + FiD trained with
    separate losses is the canonical pipeline configuration, and that
    SpanSeqGen — the AmbigNQ baseline being beaten — was already a
    single-model approach to the same task, so the "first end-to-end"
    claim is not even consistent with the comparison being drawn.

    R1.2 — cross-section contradiction. The training section (para 3)
    states explicitly: "We fine-tune all components on the AmbigNQ
    training split… which provides gold disambiguated (question,
    answer) pairs," and itemizes that the rewriter is "supervised on
    AmbigNQ disambiguated questions" and the classifier on "AmbigNQ
    ambiguity labels." The results section (para 4) attributes gains
    to a "supervision-free approach: because our model never sees gold
    AmbigNQ disambiguations during training and instead extracts weak
    ambiguity signals from Wikipedia disambiguation pages." These
    cannot both hold: the model is either supervised on AmbigNQ
    disambiguations or it is not. High gating: knowing what AmbigNQ
    provides as a supervision signal (multiple gold disambiguated QA
    pairs per ambiguous question) versus what Wikipedia disambiguation
    pages provide (entity-level distant supervision over surface forms)
    is required to see that these are categorically different training
    regimes that cannot describe the same run.

    Combined: the section's headline claim (end-to-end, supervision-
    free generalization) is contradicted by its own methods section
    (sequentially trained pipeline, AmbigNQ-supervised). Polishing
    prose without addressing either inconsistency leaves the
    contribution unfounded.

