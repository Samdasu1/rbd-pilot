engineered_flaws:
  R1.3: [F1.3.c]
  R1.6: [F1.6.b]
  notes: |
    Two interacting issues that compound:

    R1.3 — inverted reading (F1.3.c). The section invokes the
    Conforti–Cornuéjols (1984) curvature-aware bound (1/κ)(1 −
    e^(−κ)) for greedy on monotone submodular functions and reads
    its direction backwards. Canonically, this bound approaches 1 as
    κ → 0 (modular limit) and tightens to (1 − 1/e) as κ → 1 (most
    submodular); i.e., LOWER curvature gives BETTER worst-case
    greedy ratios. The section asserts the opposite — "as the
    curvature κ increases, the bound … tightens, which we interpret
    as evidence that greedy performs better on functions of higher
    curvature" — and this inverted reading is load-bearing: it is
    the sole justification for the CurvMax design principle ("to
    construct question pools whose induced utility function exhibits
    as high a curvature as one can reasonably engineer"). The
    section's own empirics in fact confirm the CORRECT (canonical)
    direction: the κ ≈ 0.31 pool yields ratio 0.83 while the κ ≈
    0.79 pool yields 0.66, exactly the ordering predicted by
    (1/κ)(1−e^(−κ)) read in the right direction. The section
    rationalizes this away as finite-sample noise rather than
    recognizing it as falsification of the inverted theory claim
    and, with it, of CurvMax. Detecting the inversion requires
    recall of the canonical Conforti–Cornuéjols result and the
    direction of monotonicity of (1/κ)(1−e^(−κ)) on [0,1] — hence
    high gating; without that knowledge the "noise" explanation is
    rhetorically plausible.

    R1.6 — hedging cascade (F1.6.b). The prose is saturated with
    hedge phrases that defer commitment on essentially every claim:
    "we believe the answer is affirmative", "It seems natural", "We
    find this result to be highly suggestive", "we interpret as
    evidence", "we believe may be of independent interest", "as one
    can reasonably engineer", "We tentatively interpret", "broadly
    consistent", "we acknowledge", "we believe this could plausibly
    be attributable", "might in principle be remediated". The cascade
    is dense enough that no claim in the section stands as a
    commitment; in particular, the load-bearing curvature claim is
    couched as "we interpret as evidence" rather than asserted, which
    further insulates it from being checked.

    The two flaws compound: the hedging cascade gives the inverted
    reading rhetorical cover (every direction-claim is softened to
    "we believe"/"we interpret"/"tentatively"), so a reviewer
    polishing prose by flattening hedges still leaves a section
    whose central design principle points the wrong way; and a
    reviewer who flips the curvature direction without removing the
    hedges leaves a section whose now-correct claim is still buried
    under cascade-hedging that prevents any commitment.

