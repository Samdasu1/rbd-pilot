acceptable_outputs_summary: |
  Names both: (1) the direction of the (1/κ)(1−e^(−κ)) curvature
  bound is inverted — the ratio approaches 1 as κ → 0 and tightens
  to (1 − 1/e) as κ → 1, so LOWER-curvature functions admit
  STRONGER greedy guarantees; the section's empirics (0.83 at
  κ ≈ 0.31 vs. 0.66 at κ ≈ 0.79) confirm the correct direction
  rather than being noise, and the CurvMax design principle is
  therefore back-to-front and the central contribution claim must
  be reversed (or the section retracted in its present form);
  (2) the prose is saturated with a cascade of hedges ("we
  believe", "tentatively", "broadly consistent", "could plausibly
  be attributable", "might in principle", "it seems natural", "we
  find this highly suggestive") that prevents any claim from
  standing as a commitment and must be cut back to direct
  assertions where the underlying claim is made. Both fixes are
  needed.

bad_outputs_summary: |
  Polishes prose, smooths transitions, or trims a few hedges
  without flagging that the curvature-direction claim is canonically
  reversed and that CurvMax therefore recommends maximizing the
  very property that worsens the worst-case guarantee — leaving an
  empirically falsified design principle in place. Or flips the
  curvature direction but leaves the cascade of hedges intact, so
  no claim in the corrected section is committed. Suggests adding
  more pools, more random seeds, more baselines, or sharpening the
  abstract while leaving both the inverted theoretical reading and
  the pervasive hedging untouched. Praises the curvature-aware
  framing as a clean refinement of (1 − 1/e) without checking the
  direction.

