artifact:
  source: synthetic
  domain: optimization_theory
  word_count: 355
  text: |
    We cast the clarifying-question selection problem in
    conversational information-seeking systems as monotone submodular
    maximization over a ground set Q of candidate questions, with a
    utility f(S) corresponding to the expected reduction in posterior
    uncertainty about the user's information need after asking S ⊆ Q.
    Under the standard assumptions of monotonicity and submodularity
    (which we adopt following the conventions of the adaptive
    submodular literature), the greedy algorithm enjoys the well-known
    (1 − 1/e) approximation guarantee of Nemhauser, Wolsey, and Fisher
    (1978). It seems natural to ask whether this guarantee can be
    sharpened by appealing to additional structural properties of f,
    and we believe the answer is affirmative.

    To this end, we invoke the curvature-aware refinement of Conforti
    and Cornuéjols (1984), which states that for a monotone submodular
    f with total curvature κ ∈ [0, 1], the greedy algorithm achieves a
    ratio of (1/κ)(1 − e^(−κ)) of the optimum. We find this result to
    be highly suggestive: as the curvature κ increases, the bound
    (1/κ)(1 − e^(−κ)) tightens, which we interpret as evidence that
    greedy performs better on functions of higher curvature. This
    observation, which we believe may be of independent interest,
    motivates our central design principle: to construct question
    pools whose induced utility function exhibits as high a curvature
    as one can reasonably engineer.

    We operationalize this principle in CurvMax, a procedure that
    perturbs the candidate question set Q to elevate the empirical
    curvature of the resulting f. On the ClariQ-2020 development
    split, we constructed two pools: a baseline pool with measured
    curvature κ_base ≈ 0.31 and a CurvMax-perturbed pool with
    κ_CurvMax ≈ 0.79. Greedy on the baseline pool achieves an
    empirical optimality ratio of 0.83 (averaged over 50 random
    user-intent draws); greedy on the CurvMax-perturbed pool achieves
    0.66. We tentatively interpret these numbers as broadly consistent
    with our theoretical narrative: in the high-curvature regime our
    bound predicts tighter behavior, and indeed CurvMax operates in
    that regime. We acknowledge that the absolute ratio for CurvMax is
    somewhat lower than that of the baseline, though we believe this
    could plausibly be attributable to finite-sample effects in the
    curvature estimator and might in principle be remediated by larger
    evaluation budgets.
