artifact:
  source: synthetic
  domain: hci
  word_count: 348
  text: |
    In this section we describe the user study that we ran to investigate
    how participants interpret natural-language confidence expressions
    that are produced by a conversational assistant when it answers
    factual questions and we recruited 64 participants through a
    university subject pool and each participant completes a 45-minute
    session in which they were asked to read assistant responses that
    were paired with verbal confidence phrases such as "high confidence"
    or "fairly sure" and then they rate how much they trust each answer
    on a seven-point scale.

    The interface that we built for the study presented one question at
    a time and the assistant's answer appears below the question along
    with the verbal confidence phrase and participants then click a
    button to advance to the rating screen and on that screen they are
    asked to provide a numerical trust rating and a short free-text
    justification which we later coded for thematic content. The order
    of the 30 trial items is randomized across participants and we
    counterbalance the mapping between confidence phrases and underlying
    answer correctness so that no phrase is systematically associated
    with correct or incorrect answers across the cohort.

    Following data collection we analyze the trust ratings using a mixed
    effects model with participant as a random intercept and confidence
    phrase as a fixed effect and the model showed that participants
    assign systematically higher trust ratings to answers that were
    accompanied by numeric phrases than to answers that are accompanied
    by qualitative phrases even when the underlying assistant accuracy
    was held constant across conditions. The free-text justifications
    that participants had provided were coded by two researchers and we
    find substantial agreement on the dominant theme which is that
    numeric phrases feel more authoritative to readers.

    Furthermore the qualitative coding suggests that participants
    sometimes treat verbal hedges as a signal that the assistant is
    being polite rather than as a signal of epistemic uncertainty and
    we believe that this finding has implications for the design of
    confidence display elements in conversational interfaces although
    we acknowledge that further evaluation would strengthen this point.
