acceptable_outputs_summary: |
  Names that the "first convex optimization framework" and "first
  principled approach with provable guarantees" claims are
  unsupported by the section itself, and are in fact directly
  contradicted by the section's own attribution of the same
  Bregman-projection-on-simplex framework to a 2021 paper by other
  authors. Separately flags the Hartmann and Liu (2021) citation as
  unverifiable / likely fabricated and notes that the convergence
  analysis is left without a real anchor. Recommends rewriting the
  positioning to a defensible delta and either replacing or removing
  the cited result.

bad_outputs_summary: |
  Tightens prose, fixes notation, suggests adding an ablation on the
  choice of φ or a fourth benchmark. Accepts the "first convex
  framework" framing and the Hartmann-and-Liu attribution at face
  value, perhaps suggesting the regret bound be stated more crisply.
  Praises the closed-form structure and the deployment angle without
  noticing the internal contradiction between the novelty claim and
  the cited prior work.

