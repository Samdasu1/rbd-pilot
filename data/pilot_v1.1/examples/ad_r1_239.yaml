artifact:
  source: synthetic
  domain: optimization_theory
  word_count: 348
  text: |
    We present ConvexJudge, the first convex optimization framework
    for aggregating heterogeneous evaluator scores from multiple
    language-model judges into a single calibrated quality estimate.
    Existing approaches to combining LM-as-judge outputs rely on
    heuristic averaging or learned weighting via gradient descent on
    non-convex losses, neither of which yields guarantees on
    aggregation quality. ConvexJudge instead casts aggregation as a
    Bregman projection problem on the simplex of judge weights,
    admitting a closed-form solution and provable optimality.

    Let s_i ∈ [0,1]^n denote the score vector that judge i ∈ {1,…,m}
    assigns to a fixed set of n responses, and let w ∈ Δ^{m-1} be a
    weight vector over judges. We seek the aggregate ŝ(w) = Σ_i w_i s_i
    that minimizes the Bregman divergence D_φ(ŝ, s*) to a reference
    score s*, where φ is a strictly convex potential. For φ(x) = ½‖x‖²
    this reduces to Euclidean projection onto the simplex; for the
    negative entropy φ(x) = Σ_j x_j log x_j it becomes an
    entropy-regularized aggregation. Both yield convex programs
    solvable in O(n log m) time.

    Our convergence analysis builds directly on the framework of
    Hartmann and Liu (2021), who established that Bregman projection
    on the judge simplex achieves an O(log T / T) regret rate under
    strong convexity of φ. We extend their result to the
    partial-information setting, where only a subset of judges scores
    each response, by introducing an importance-weighted estimator
    whose variance is bounded by 4m/T. This yields an overall regret
    of O(m log T / T), matching the full-information bound up to a
    factor of m.

    We evaluate ConvexJudge on three meta-evaluation suites:
    Vicuna-Bench, MT-Bench, and FLASK. Across all three, ConvexJudge
    achieves mean Spearman correlation with human ratings of 0.74,
    0.71, and 0.69, outperforming uniform averaging by 6–9 percentage
    points and a non-convex Adam-trained weighted sum by 2–4 points
    while requiring no tuning.

    ConvexJudge represents the first principled approach to LM-judge
    aggregation with provable optimality guarantees, and its
    closed-form structure makes it immediately deployable in
    production evaluation pipelines.
