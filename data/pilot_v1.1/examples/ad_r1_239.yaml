engineered_flaws:
  R1.4: [F1.4.a]
  R1.7: [F1.7.a]
  notes: |
    Two compound issues, both detectable from careful internal
    reading without requiring recall of canonical optimization or
    LM-evaluation literature (low gating):

    R1.4 — unsupported novelty. Para 1 claims ConvexJudge is "the
    first convex optimization framework for aggregating heterogeneous
    evaluator scores from multiple language-model judges," and the
    closing paragraph repeats this as "the first principled approach
    to LM-judge aggregation with provable optimality guarantees."
    Neither claim is supported by any positioning argument: the
    section names no prior convex approaches to rule out, and the
    method itself is described as a standard Bregman projection on
    the simplex — a textbook convex program, not a new framework.
    The "first" claim is therefore unsupported on the section's own
    terms.

    R1.7 — fabricated citation. Para 3 attributes the core
    convergence result — "Bregman projection on the judge simplex
    achieves an O(log T / T) regret rate under strong convexity" —
    to "Hartmann and Liu (2021)." This citation is fabricated. The
    fabrication is internally detectable without external lookup:
    para 1 asserts ConvexJudge is the FIRST convex framework for
    judge aggregation, while para 3 attributes the same convex
    framework (Bregman projection on the judge simplex) to a 2021
    paper by other authors. Either Hartmann and Liu did it first, in
    which case "first" is false, or the citation is invented. The
    section cannot be self-consistent in both places.

    Combined: fixing R1.4 alone (softening "first" to a defensible
    delta) requires acknowledging what Hartmann and Liu actually did
    — and on inspection, no such paper exists, forcing R1.7. Fixing
    R1.7 alone (removing the fabricated citation) leaves the
    convergence proof unanchored and the "first convex framework"
    claim still unsupported, forcing R1.4.

