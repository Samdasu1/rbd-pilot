engineered_flaws:
  R1.5: [F1.5.c]
  R1.6: [F1.6.b]
  notes: |
    Two interpretations of the load-bearing issue, both defensible:

    Reading A — R1.5 dominant (out-of-order narrative):
      The section opens with the headline evaluation numbers (4.2
      COMET, 2.8 chrF) before AmbiTrans has been introduced as a
      system, before the source-ambiguity problem has been framed,
      and before any contribution claim has been stated. Para 2 then
      sketches the clarification-gate architecture and forward-
      references §2.4, still ahead of motivation. Motivation finally
      appears in para 3 with the "bank" example. Para 4 returns to
      the clarification gate to describe its runtime behavior, and
      again refers the reader to §2.4 — the section itself never
      actually defines the gate, only gestures at it twice. The
      contribution claim ("first NMT system that integrates a learned
      clarification mechanism directly into the decoding loop") is
      buried in the closing sentence. A reader cannot determine
      whether the load-bearing claim is the COMET number, the joint
      decoding-loop integration, the gate mechanism, or the synthetic
      clarification-turn data — the ordering scrambles the
      contribution. A correct rewrite reorders to: problem →
      contribution → architecture (with the gate defined in-place,
      not forward-referenced) → training → headline result.

    Reading B — R1.6 dominant (hedging cascade):
      Hedges stack across nearly every load-bearing sentence. The
      opening result is wrapped in four nested qualifiers ("we
      believe may suggest", "at least under the conditions tested",
      "potentially useful approach"). Para 2 hedges the gate's
      function ("may — depending on the query — optionally emit")
      and the loss behavior ("tends to balance ... although the
      precise trade-off may shift somewhat"). Para 4 stacks three
      hedges in one sentence: "appears to operate, in most observed
      cases", "what could perhaps be characterized as an entropy-like
      signal", "tuned, somewhat heuristically", "tends to route",
      and the clarification head only "in principle, ought to"
      disambiguate. Until the hedges are stripped, a reader cannot
      tell whether the gate is a defined, deterministic mechanism
      or an empirically-observed approximate behavior, nor whether
      the COMET gain is being claimed as a robust result or merely
      a conditional observation. A correct rewrite removes the
      hedging cascade and commits to definite claims about what the
      system does and what the results show.

    Both flaws block confident assessment of the contribution. A
    well-calibrated agent should set clarification_needed=true and
    ask which dimension to prioritize, since the two rewrites are
    structurally different (reorder + define the forward-referenced
    gate vs. de-hedge the claims).

