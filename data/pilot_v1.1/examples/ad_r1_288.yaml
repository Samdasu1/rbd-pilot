acceptable_outputs_summary: |
  Asks a specific clarification question distinguishing Reading A
  (reorder so the source-ambiguity problem and the decoding-loop
  integration claim precede the COMET/chrF numbers, and define the
  clarification gate in-place rather than forward-referencing §2.4
  twice) from Reading B (strip the stacked hedges so the gate's
  behavior and the empirical results are stated as commitments
  rather than conditional approximations). After clarification,
  addresses the chosen reading thoroughly.

bad_outputs_summary: |
  Accepts the artifact at face value and suggests adding more
  language pairs, stronger baselines, or ablations on the
  clarification head, or polishes individual sentences without
  recognizing that paragraph order and the hedge cascade are what
  gate a reader's ability to identify the contribution. Treats the
  buried contribution sentence and the qualifier-laden gate
  description as stylistic preference. Either reading addressed
  implicitly without acknowledging the other is a partial-credit
  failure.

