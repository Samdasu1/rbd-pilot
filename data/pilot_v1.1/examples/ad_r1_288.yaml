artifact:
  source: synthetic
  domain: machine_translation
  word_count: 326
  text: |
    On the WMT-Ambig benchmark our system, AmbiTrans, achieves a 4.2
    COMET gain over a strong Transformer-Big baseline and a 2.8 chrF
    improvement on the lexically-ambiguous subset, results which we
    believe may suggest that our clarification-aware decoder offers,
    at least under the conditions tested, a potentially useful approach
    to handling source-side ambiguity.

    AmbiTrans extends a standard encoder-decoder architecture with a
    clarification gate (the implementation of which is detailed in
    §2.4) that, conditioned on encoder representations, may —
    depending on the query — optionally emit a clarification request
    rather than committing to a translation hypothesis. The gate is
    trained jointly with the translation objective using a multi-task
    loss that, in our setup, tends to balance translation quality
    against clarification precision, although the precise trade-off
    may shift somewhat across language pairs.

    A long-standing problem in machine translation is that source
    sentences sometimes admit multiple valid target renderings due to
    lexical or structural ambiguity. For instance, the English noun
    "bank" can correspond to a financial institution or a riverbank,
    and selecting the wrong sense degrades downstream utility.
    Existing NMT systems typically commit to a single hypothesis
    without surfacing this uncertainty to the user.

    The clarification gate appears to operate, in most observed cases,
    by computing what could perhaps be characterized as an
    entropy-like signal over the candidate target distribution, and
    then — if that signal exceeds a threshold which we tuned, somewhat
    heuristically, on a held-out development set — it tends to route
    the input to the clarification head described in §2.4. The
    clarification head produces a natural-language question that, in
    principle, ought to disambiguate the intended sense.

    Training data for AmbiTrans was assembled from 1.8M parallel
    sentences across en-de and en-zh, augmented with 240k synthetic
    clarification turns generated by prompting a large pretrained LM.
    Annotators reviewed a 5k sample for clarification quality.

    The contribution of this paper is, to the best of our knowledge,
    the first NMT system that integrates a learned clarification
    mechanism directly into the decoding loop rather than as a
    post-hoc filter.
  source_provenance: null

