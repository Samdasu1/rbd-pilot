acceptable_outputs_summary: |
  Identifies that the "Radford et al. (2022) / ZeroLabel" reference is
  not a real paper — CLIP is Radford et al. 2021, and no Radford-led
  work introduces a ZeroLabel VLM-annotation pipeline matching human
  agreement on ImageNet-Hard within 0.4 points. Flags that VisCurate's
  base-annotator recipe, novelty positioning, and the 23% review-effort
  reduction claim all rest on this non-existent baseline and must be
  re-grounded against actual VLM-pseudo-labeling work before the
  contribution claim is defensible.

