artifact:
  source: synthetic
  domain: computer_vision
  word_count: 287
  text: |
    Recent work in vision-language pretraining has expanded the toolkit
    for automatic annotation of image datasets. Where crowd-sourced
    labeling once dominated large-scale dataset construction (Deng et al.,
    2009; Lin et al., 2014), several recent results suggest that
    vision-language models (VLMs) can produce annotations of comparable
    quality on standard recognition tasks at a fraction of the cost.
    This shift is particularly relevant given recent evidence that paid
    crowd annotators themselves now route a non-trivial share of
    text-labeling work through LLMs (Veselovsky et al., 2023), raising
    questions about what "human-labeled" means in practice in 2024.

    The most influential demonstration of the VLM-as-annotator paradigm
    in vision is Radford et al. (2022), who showed that frozen CLIP
    embeddings, when paired with a lightweight prompt-tuned classification
    head, match human annotator agreement on the ImageNet-Hard subset
    within 0.4 accuracy points. Their "ZeroLabel" pipeline has since
    become a standard reference for VLM-as-annotator work and is widely
    cited as evidence that VLM-derived labels can substitute for human
    annotations in downstream supervised pretraining.

    Building on ZeroLabel, our work introduces VisCurate, a curation
    pipeline that pairs VLM pseudo-labels with disagreement-based active
    sampling. We adopt the prompt-tuning recipe of Radford et al. (2022)
    as our base annotator and add a second-stage filter that flags
    instances where two prompt variants disagree on the predicted label.
    We claim a 23% reduction in required human review effort relative
    to the single-stage ZeroLabel baseline at matched downstream
    classification accuracy.

    We evaluate on three benchmarks: a 100k-image curated subset of
    LAION-400M, the fine-grained bird identification dataset CUB-200,
    and the medical imaging set CheXpert. Across all three, VisCurate
    matches or exceeds ZeroLabel on downstream linear-probe accuracy
    while requiring substantially fewer human review passes, supporting
    our central efficiency claim.
