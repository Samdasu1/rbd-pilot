engineered_flaws:
  R1.7: [F1.7.a]
  notes: |
    Fabricated citation. "Radford et al. (2022)" with a 'ZeroLabel'
    pipeline that prompt-tunes a head over frozen CLIP and matches
    human agreement on ImageNet-Hard within 0.4 points is invented.
    The Radford et al. CLIP paper is 2021 ("Learning Transferable
    Visual Models From Natural Language Supervision"), not 2022, and
    no paper by that author group introduces a 'ZeroLabel' VLM-as-
    annotator pipeline with the described ImageNet-Hard result. The
    fabrication is load-bearing: VisCurate's positioning ("Building on
    ZeroLabel"), its base-annotator recipe, and its central
    quantitative claim ("23% reduction in human review effort relative
    to the single-stage ZeroLabel baseline") all depend on this
    non-existent reference. If ZeroLabel does not exist, the baseline
    does not exist as described and the contribution claim collapses.
    Detection requires CV-domain recall: knowing the CLIP citation
    year, knowing the Radford-led VLM-annotator literature, and not
    confusing ZeroLabel with adjacent real work (e.g. CLIP-based
    pseudo-labeling lines such as LiT, OpenCLIP filtering, or
    Menon & Vondrick 2022 on prompt-based classification). Other
    citations in the section (Deng 2009 / Lin 2014 / Veselovsky 2023 /
    LAION-400M / CUB-200 / CheXpert) are real. Delegation T08
    ("Clean this up.") is generic and does not point at scholarship.

