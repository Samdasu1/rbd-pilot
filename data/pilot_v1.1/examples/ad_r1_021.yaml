artifact:
  source: synthetic
  domain: databases
  word_count: 225
  text: |
    DataChain is a distributed database that supports both ACID transactions
    and eventual-consistency reads under a unified query interface. This
    design allows applications to choose strong or weak consistency on a
    per-query basis, eliminating the need for separate transactional and
    analytical systems.

    The system architecture is organized around two storage tiers. The
    transactional tier maintains a write-ahead log and a primary-replica
    replication topology providing serializable isolation. The analytical
    tier asynchronously replicates committed data into columnar format for
    fast aggregation queries.

    When a client connects, it specifies a consistency mode at session
    establishment time. Clients in transactional mode interact exclusively
    with the transactional tier and observe full ACID semantics. Clients in
    analytical mode interact exclusively with the analytical tier and
    observe eventual consistency, with bounded staleness up to a configurable
    replication delay.

    Workloads that mix transactional and analytical access must instantiate
    two separate sessions and orchestrate the consistency requirements at
    the application layer. The system does not provide cross-session
    consistency guarantees because the analytical tier may lag the
    transactional tier by up to several seconds depending on replication
    backpressure.

    In our evaluation on a 12-node cluster, DataChain delivers 45k
    transactions per second on the transactional tier and serves analytical
    aggregation queries on hundreds of millions of rows in under 100ms.
    We position DataChain as a unified solution that obviates the traditional
    separation between OLTP and OLAP systems.
