engineered_flaws:
  R1.4: [F1.4.b]
  notes: |
    The load-bearing novelty claim is "the first crowdsourced evaluation
    framework for learned manipulation policies." The obvious nearest
    neighbor — preference-based reward learning from human feedback for
    robot/agent behaviors, which has used crowdsourced pairwise
    comparisons of policy rollout videos for years — is entirely
    unacknowledged. The section's own framing ("human judgment is
    increasingly used as the gold standard," "human-in-the-loop
    benchmarking") implies the area exists, and the only contrast it
    draws is against "small in-lab user studies (n < 20)," which
    sidesteps the large-scale crowdsourced preference-learning literature
    that is the actual nearest neighbor. Detection is structural: any
    careful reader notices that a paper claiming "first crowdsourced
    evaluation of manipulation policies" never engages with crowdsourced
    preference learning for robot behaviors — no canonical-paper recall
    required (low gating). The Likert-vs-pairwise distinction could
    plausibly carve out a defensible delta, but the section never makes
    that argument because it never names the neighbor. The T10 delegation
    "Help me with this section" is maximally generic and does not signal
    R1.4 specifically.

