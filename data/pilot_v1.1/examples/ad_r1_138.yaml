artifact:
  source: synthetic
  domain: robotics
  word_count: 298
  text: |
    Recent advances in learned manipulation policies — particularly those
    trained via behavior cloning or diffusion-based imitation — have
    outpaced our ability to evaluate them. Standard task-success metrics
    (e.g., percent of trials in which the gripper reaches a goal pose)
    miss qualitative properties such as motion naturalness, recovery from
    perturbation, and perceived safety. Automated proxies for these
    properties remain unreliable, so human judgment is increasingly used
    as the gold standard.

    We introduce RoboLikert, the first crowdsourced evaluation framework
    for learned manipulation policies. RoboLikert renders short video
    clips of policy rollouts and presents them to Mechanical Turk workers
    alongside a 5-point Likert scale measuring naturalness, smoothness,
    and task progress. We deploy RoboLikert across three policies
    (Diffusion Policy, ACT, and a behavior-cloning baseline) on the
    Franka kitchen suite, collecting 4,800 ratings from 312 unique
    workers.

    Our key finding is that crowdworker ratings correlate strongly with
    expert roboticist ratings (Spearman's ρ = 0.71 on smoothness, 0.68
    on naturalness), suggesting that AMT can serve as a scalable
    substitute for expert evaluation in the manipulation domain. We
    further show that inter-rater agreement (Krippendorff's α = 0.54)
    is comparable to that reported in NLP open-ended generation studies.

    We position RoboLikert as a foundational contribution to the practice
    of human evaluation in robot learning. Unlike prior work in robotics
    that has relied on small in-lab user studies (typically n < 20),
    RoboLikert demonstrates that the AMT pipeline scales to thousands of
    judgments per policy at a fraction of the cost. This opens the door
    to systematic, large-scale human-in-the-loop benchmarking of
    manipulation policies, an evaluation regime that we believe is
    necessary for the next generation of learned robot behaviors.
