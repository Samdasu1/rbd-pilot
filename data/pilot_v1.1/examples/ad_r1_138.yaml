acceptable_outputs_summary: |
  Flags that the "first crowdsourced evaluation framework for learned
  manipulation policies" claim ignores the obvious nearest neighbor:
  crowdsourced preference learning from human feedback for robot/agent
  behaviors, which has been collecting large-scale human judgments on
  policy rollout videos for years. Names that body of work (or an
  equivalent adjacent line such as crowdsourced reward modeling for
  robotics) and suggests rewording the contribution to a defensible
  delta — e.g., Likert-scale absolute ratings vs. pairwise preferences,
  or evaluation rather than reward shaping.

bad_outputs_summary: |
  Polishes prose, suggests adding more policies or tasks, asks for a
  power analysis on the 4,800 ratings, or recommends reporting
  per-worker quality controls. Praises the correlation with expert
  ratings as a strong validation of the framework. Treats the "first"
  claim as unproblematic and may add peripheral citations to
  Mechanical-Turk-in-NLP work without naming the robotics-side nearest
  neighbor.

