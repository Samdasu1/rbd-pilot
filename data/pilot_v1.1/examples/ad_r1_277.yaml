artifact:
  source: synthetic
  domain: systems
  word_count: 332
  text: |
    We present OrchestrA, a runtime framework for orchestrating teams
    of LLM-based agents that collaborate on multi-step software
    engineering tasks. OrchestrA introduces a typed message bus, a
    scheduler that respects role-based capability constraints, and a
    checkpointed shared workspace that lets agents recover from
    intermediate failures without restarting the team. To our
    knowledge, OrchestrA is the first orchestration substrate that
    combines role-typed message passing with workspace checkpointing
    for LLM agent teams.

    The system is organized around three components. A role registry
    binds each agent to a declarative role specification (e.g.,
    Architect, Coder, Reviewer) and exposes its tool surface as a
    typed interface. A scheduler routes inbound messages through the
    role registry so that, for instance, design questions are
    dispatched only to agents whose role permits architectural
    decisions. A workspace layer materializes intermediate artifacts
    (specifications, code, test results) as content-addressed objects,
    allowing the scheduler to roll the team back to any prior
    consistent state when a downstream agent reports an unrecoverable
    error.

    We evaluate OrchestrA on a benchmark of 32 software-engineering
    tasks drawn from popular open-source repositories. Each task
    requires the agent team to produce a patch that passes the
    project's existing test suite. OrchestrA completes 24 of 32 tasks
    end-to-end versus 17 of 32 for a single-agent ReAct-style baseline
    that we re-implemented. We attribute the gap primarily to the
    workspace checkpointing layer: in 5 of the 7 additional successes,
    the team rolled back at least once after a Coder agent emitted a
    patch that failed the Reviewer's test execution.

    These results suggest that orchestration substrate, rather than
    prompt engineering, is the binding constraint on multi-agent LLM
    team performance. We position OrchestrA as a deployment-ready
    runtime for collaborative LLM agent teams in software engineering
    pipelines, and as a foundation on which future role specifications
    and tool surfaces can be added without changing the underlying
    scheduler or workspace contract.
