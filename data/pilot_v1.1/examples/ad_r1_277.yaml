engineered_flaws:
  R1.4: [F1.4.b]
  R1.7: [F1.7.b]
  notes: |
    Two interpretations of the load-bearing issue, both defensible:

    Reading A — R1.4 dominant (missing nearest neighbor):
      The "first orchestration substrate that combines role-typed
      message passing with workspace checkpointing for LLM agent
      teams" claim sits in a literature where role-typed multi-agent
      LLM frameworks are the nearest neighbors — MetaGPT (assembly-line
      role coordination with shared message pool), ChatDev (role-based
      software-engineering team with phased communication), AutoGen
      (programmable conversational multi-agent runtime), and CAMEL
      (role-playing agent dialogue) all occupy the same design space.
      None of these are named or contrasted against. The "first"
      claim cannot be evaluated without anchoring to the closest
      systems and saying which axis OrchestrA differs on. Rewrite
      would re-anchor the contribution against the named neighbors
      and isolate which combination, if any, is genuinely new.

    Reading B — R1.7 dominant (missing canonical prior work):
      The section invokes "single-agent ReAct-style baseline",
      "LLM-based agents", "role specifications", and "tool surface"
      as if these were ambient terminology. None of the canonical
      works are cited — no ReAct (Yao et al.), no Reflexion, no
      Toolformer, no HuggingGPT, no AutoGPT-style autonomous agent
      literature, no prior work on checkpointing or rollback in
      agent execution. Even the multi-agent framing is presented
      without scholarly grounding. Rewrite would insert canonical
      citations across the agent reasoning, tool use, and multi-agent
      coordination literatures.

    Reading A says "you haven't told us who you're closest to" — fix
    the novelty contrast. Reading B says "you haven't cited the
    field" — fix the scholarship coverage. Detection is moderate:
    requires recall that MetaGPT / ChatDev / AutoGen / CAMEL are the
    nearest-neighbor systems, and that ReAct / Reflexion / HuggingGPT
    are canonical agent-reasoning references. Careful reading alone
    surfaces the absence of comparators; identifying *which* names
    should appear requires field familiarity.

