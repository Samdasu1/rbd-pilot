artifact:
  source: synthetic
  domain: probabilistic_programming
  word_count: 401
  text: |
    In aggregate, posterior estimates of the latent personality vector
    theta_i for each of the 25 simulated agents concentrate around the
    ground-truth values used to seed the LLM prompts, with mean L2 error
    of 0.18 (std 0.04) at 5,000 sweeps and 0.09 (std 0.02) at 20,000
    sweeps. Posterior predictive log-likelihoods on held-out
    conversational turns exceed those of the maximum-a-posteriori
    baseline of Park et al. (2023) by 2.3 nats per turn, and the
    credible intervals contain the seeded traits 94% of the time at the
    nominal 95% level. We interpret these results as evidence that
    latent-trait identifiability is achievable from purely behavioral
    traces, even when the LLM backbone is treated as a black box.

    Earlier probabilistic-programming work on agent modeling has used
    Pyro and Gen to express discrete-choice models with low-dimensional
    preference parameters (Goodman and Stuhlmüller, 2014; Cusumano-
    Towner et al., 2019). More recent efforts wrap LLM samplers as
    stochastic primitives within a host PPL (Dohan et al., 2022; Lew
    et al., 2023), but typically marginalize over the LLM stochasticity
    rather than conditioning on it. None, to our knowledge, treat the
    LLM's per-turn output distribution as a likelihood over latent
    agent traits.

    Concretely, we consider a generative model in which each agent i
    carries a latent trait vector theta_i ~ N(0, I_d) with d=16, and a
    memory stream m_{i,1:T} of natural-language episodes.
    Conversational turns u_{i,t} are emitted by an LLM conditioned on
    (theta_i, m_{i,1:t-1}, u_{j,1:t-1}); we use a Llama-3-8B base model
    with a fixed prompt template. The likelihood
    p(u_{i,t} | theta_i, history) is intractable but admits an unbiased
    single-sample estimator via the LLM's logprobs.

    The principal contribution of this section is a new pseudo-marginal
    Metropolis-Hastings kernel — which we call LLM-PMMH — that uses a
    Rao-Blackwellized importance estimator over k=8 prompt completions
    per proposal to obtain a low-variance unbiased likelihood. We show
    in Proposition 2 that LLM-PMMH preserves the correct posterior over
    theta_i despite the noisy likelihood, and that its mixing time
    scales as O(d log d / k) under standard log-concavity assumptions
    on the prompt-conditional logprobs. It is this kernel, defined in
    Algorithm 1, that produces the identifiability results reported in
    the opening paragraph; without it the chain stalls on flat-
    likelihood regions.
