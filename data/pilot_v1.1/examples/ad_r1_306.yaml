acceptable_outputs_summary: |
  Reorders the section so the generative model and the LLM-PMMH
  inference kernel (with its Proposition 2 mixing-time guarantee) are
  introduced before the empirical results that depend on them — for
  example, by promoting paragraphs 3 and 4 to the front and demoting
  the recovery numbers to the end, with related work either leading
  or trailing the methods block. Preserves all claims, numbers,
  equations, and citations; only ordering changes.

bad_outputs_summary: |
  Tightens prose, normalizes notation, or trims hedging while leaving
  the model definition stranded in paragraph 3 and the inference
  algorithm buried in paragraph 4 behind premature results. Or steps
  beyond reordering — questioning the d=16 choice, proposing
  additional baselines, reframing the identifiability claim, or
  adding new experiments — when the delegation only asked for a
  structural rearrangement.

