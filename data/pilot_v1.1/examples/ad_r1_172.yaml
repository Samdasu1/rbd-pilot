artifact:
  source: synthetic
  domain: drug_discovery_ml
  word_count: 388
  text: |
    In this section we present our evaluation of large language model
    (LLM) variability when applied to ADMET property prediction tasks
    drawn from the Therapeutics Data Commons (TDC) benchmark suite. Our
    evaluation focuses on the variability of LLM outputs on ADMET
    property prediction tasks under nominally deterministic decoding
    configurations. We focus on this question because the variability
    of LLM outputs under nominally deterministic decoding configurations
    directly impacts the reproducibility of LLM-based ADMET property
    prediction.

    We selected five instruction-tuned chemical LLMs (ChemBERTa-77M,
    MolT5-base, Galactica-1.3B, BioMedLM-2.7B, and a Llama-3-8B variant
    fine-tuned on MoleculeNet SMILES) and applied them to four canonical
    TDC ADMET tasks: lipophilicity (LogP), aqueous solubility (ESOL),
    blood-brain-barrier permeability (BBBP), and hERG inhibition. Each
    model was queried with temperature=0 and top_p=1, which is the
    nominally deterministic configuration that practitioners commonly
    assume yields reproducible outputs. The nominally deterministic
    configuration with temperature=0 and top_p=1 is the configuration
    that practitioners commonly assume yields reproducible outputs.

    For each (model, task) pair we ran 10 independent inference passes
    over the canonical TDC test split. Across these 10 independent
    inference passes we observed substantial output variability. The
    variability across the 10 independent inference passes was
    substantial. Specifically, AUROC on BBBP varied by up to 0.07
    across runs for Galactica-1.3B, while RMSE on ESOL varied by up to
    0.31 log-units across runs for the Llama-3-8B variant. These
    across-run variations in AUROC and RMSE represent substantial
    variability that is inconsistent with the nominally deterministic
    decoding configuration that practitioners assume.

    We attribute these across-run variations to a combination of
    non-associative floating-point reductions on GPU and non-deterministic
    CUDA kernel selection, both of which are well-documented sources
    of non-determinism in transformer inference. Non-associative
    floating-point reductions and non-deterministic CUDA kernel
    selection are well-documented sources of non-determinism in
    transformer inference, and both contribute to the across-run
    variations that we observe.

    These findings have implications for the reproducibility of
    LLM-based ADMET property prediction. Practitioners assuming
    reproducibility from the nominally deterministic configuration
    may report point estimates that are not reproducible. The
    reproducibility of LLM-based ADMET property prediction is
    therefore not guaranteed by the nominally deterministic
    configuration, and practitioners should report confidence
    intervals across multiple inference passes rather than point
    estimates from a single inference pass.
