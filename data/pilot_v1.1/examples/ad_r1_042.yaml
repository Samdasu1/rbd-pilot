artifact:
  source: modified-real
  domain: power_systems_v2g
  word_count: 205
  text: |
    PPO consistently fails to honor commitment across all evaluated
    markets and all evaluated configurations. The PPO agent achieves
    44.8 to 45.9 percent commitment across the three European markets,
    a range so narrow that it confirms the policy ignores the
    commitment signal entirely. Our experiments demonstrate that PPO
    is fundamentally and uniformly incapable of commitment-aware
    operation in any market, regardless of price dynamics or fleet
    parameters.

    The soft penalty term in the PPO reward is dominated by the
    arbitrage gradient — a single high-price discharge can exceed the
    cumulative commitment penalty over an entire episode. The
    near-identical commitment across markets with distinct price
    dynamics confirms that the policy treats commitment as effectively
    invisible.

    The contrast with constrained MDP reveals complementary failure
    modes: PPO's soft penalty fails at the learning stage (gradient
    signal overwhelmed), while CMDP's Lagrangian succeeds at learning
    (~85% training commitment) but fails at deployment (horizon-dependent
    calibration does not transfer to rolling re-planning). Neither
    approach achieves market-viable commitment under any condition we
    tested.

    These findings establish that all bare RL approaches are
    fundamentally unsuitable for commitment-binding V2G markets across
    all conditions. The model-based combined strategy, by contrast,
    consistently achieves greater than 99% commitment under every
    market condition and every fleet configuration that we have
    evaluated.
  source_provenance: paper_4_isgt_results_ppo_failure_modified

