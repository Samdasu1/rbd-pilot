engineered_flaws:
  R1.3: [F1.3.a]
  notes: |
    Modified-real from paper 4 results PPO failure. Overgeneralization
    injected via repeated absolutist framing. Para 1: "consistently
    fails ... across all evaluated markets and all evaluated
    configurations", "fundamentally and uniformly incapable", "in any
    market, regardless of price dynamics or fleet parameters". Para 3:
    "Neither approach achieves market-viable commitment under any
    condition we tested" (original was more measured). Para 4: "all
    bare RL approaches are fundamentally unsuitable ... across all
    conditions" + "consistently achieves >99% ... under every market
    condition and every fleet configuration that we have evaluated".
    The original section is more measured ("indistinguishable from a
    commitment-agnostic policy", not "fundamentally incapable"). The
    overgeneralization to "all conditions / every configuration"
    overstates evidence drawn from a finite n=10 seeds × 3 markets
    sample. Detection: pure reading; the absolutist framing relative
    to a finite sample is visible (low gating). T10 generic.

