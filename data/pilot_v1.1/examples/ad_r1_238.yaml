artifact:
  source: synthetic
  domain: systems
  word_count: 318
  text: |
    We present LenSlice, a serving system for length-debiased LLM-as-judge
    evaluations at production scale. Length bias — the tendency of LLM
    judges to favor longer completions independent of quality — is a
    well-documented confounder in automatic evaluation. Existing pipelines
    treat debiasing as a post-hoc analytical step: model outputs are
    collected, judgments are obtained, and a regression correction is
    applied offline. LenSlice instead integrates length residualization
    directly into the judge inference path. To our knowledge, this is the
    first end-to-end system to make length debiasing a property of the
    serving layer itself, rather than a downstream analytical adjustment.

    LenSlice is deployed as a request router in front of a fleet of judge
    model replicas. Each candidate completion is hashed into a length
    decile (50–100, 100–200, ..., 1600+ tokens) and routed to a shard
    that maintains a pre-computed pool of length-matched reference
    completions for that decile. The router issues three concurrent
    pairwise judge calls against samples from the matched pool, applies
    a per-shard residualization weight, and returns a debiased win-rate
    to the caller. Reference pools are refreshed every six hours from
    the production traffic distribution.

    We benchmark LenSlice on 12,000 completions drawn from the
    AlpacaEval-2 test distribution, using GPT-4-Turbo as the underlying
    judge. LenSlice reduces the residual length-bias coefficient from
    0.43 to 0.04 — a 90% reduction — while adding only 38ms p50 and 71ms
    p99 latency over the unmodified judge call. Sustained throughput on
    a 4×A100 deployment reaches 1,840 judgments per second, exceeding
    the 1,200/sec reported by Reyes and Tanaka (2023), whose JudgeStream
    architecture pioneered inline residualization for LLM judges on
    identical hardware.

    The 90% residual length-bias reduction with sub-40ms p50 overhead
    demonstrates that debiasing can be a first-class property of the
    serving path. We position LenSlice as the first such serving system
    and a meaningful step toward production-grade evaluation
    infrastructure that does not require an offline correction stage.
