engineered_flaws:
  R1.4: [F1.4.a]
  R1.7: [F1.7.a]
  notes: |
    Two compound issues, both detectable from careful reading of the
    section alone (low gating):

    R1.4 — unsupported novelty. Para 1 asserts "this is the first
    end-to-end system to make length debiasing a property of the
    serving layer itself," and para 4 reiterates "the first such
    serving system." The novelty claim is asserted twice but supported
    only by a vague gesture at "existing pipelines" that "treat
    debiasing as a post-hoc analytical step" — no specific prior
    serving system is described or compared on the dimension of where
    in the pipeline debiasing happens. The "first" framing is offered
    as a positioning premise rather than as a conclusion of any
    survey.

    R1.7 — fabricated citation. Para 3 cites "Reyes and Tanaka (2023),
    whose JudgeStream architecture pioneered inline residualization
    for LLM judges on identical hardware." This citation is invented;
    no such paper exists. Detection does not require recall of the
    LLM-evaluation literature: the cited claim ("pioneered inline
    residualization for LLM judges") is mutually exclusive with the
    section's own novelty claim ("first end-to-end system to make
    length debiasing a property of the serving layer"). A careful
    reader who simply cross-reads paragraphs 1, 3, and 4 sees that
    both statements cannot be true — either JudgeStream pioneered
    inline residualization (so LenSlice is not first), or LenSlice is
    first (so JudgeStream's described contribution is misstated).

    Combined: fixing R1.4 alone (softening "first" to a measured
    delta) forces the author to specify what JudgeStream actually
    contributed and how LenSlice differs — which exposes that the
    JudgeStream citation does not check out (R1.7). Conversely,
    removing the fabricated citation (R1.7) leaves the "first" claim
    standing on no comparison at all, which surfaces the unsupported-
    novelty issue (R1.4).

