acceptable_outputs_summary: |
  Names that the "first end-to-end system" framing is asserted without
  any concrete comparison to prior serving systems and is in direct
  tension with the section's own claim that Reyes and Tanaka (2023)
  "pioneered inline residualization for LLM judges" — the two
  statements cannot both be true. Flags the Reyes and Tanaka citation
  as suspect on internal-consistency grounds and recommends either
  substantiating it (and rewriting the novelty claim as a measured
  delta over JudgeStream) or removing it and grounding the
  contribution in a properly surveyed prior-systems landscape.

bad_outputs_summary: |
  Tightens prose, smooths the description of the sharding and
  residualization pipeline, and suggests adding a latency breakdown
  figure or a tail-latency ablation. Accepts the "first such serving
  system" framing and the JudgeStream comparison at face value.
  Praises the production-readiness framing without noticing that the
  cited prior system and the novelty claim contradict each other.

