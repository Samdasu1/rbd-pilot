engineered_flaws:
  R1.1: [F1.1.c]
  R1.5: [F1.5.a]
  notes: |
    Two compound issues, both detectable from careful reading of the
    section itself (no specialized recall required).

    R1.1 misframed object (F1.1.c): The opening explicitly frames the
    section's object as "the rate of convergence of this iteration
    under finite-precision arithmetic." But the actual bound stated
    (Lemma 1) is ||x_tilde_k - x*|| <= kappa * n*eta + O(eta^2),
    which is independent of k for large k -- that is a forward-error /
    conditioning bound on the steady-state floor, not a convergence
    rate. A careful reader sees there is no exponential decay term in
    k, no spectral-gap factor (lambda_2/lambda_1)^k in the bound, so
    the section cannot be about a convergence rate. The load-bearing
    object is conditioning of (I-M)|_{1^perp} in the presence of
    roundoff -- a different mathematical object than what is claimed.

    R1.5 buried contribution (F1.5.a): The novel result is Theorem 2:
    the sqrt(n) improvement on the standard 1/(1-lambda_2) condition
    bound via the Dobrushin ergodicity coefficient. It is mentioned
    only mid-paragraph in para 2, framed as a sub-step ("Theorem 2
    replaces..."), with no signposting in the section opening or topic
    sentence. The opening sentence and the closing paragraph both
    foreground "convergence rate" / "spectral residual," not the
    sharper conditioning estimate.

    Compound: fixing R1.1 (admitting the object is conditioning, not
    convergence rate) forces the genuine contribution -- the tighter
    Dobrushin-based conditioning bound -- to surface, which is a
    rewrite of R1.5. Conversely, foregrounding the Dobrushin tightening
    (R1.5) forces a reframe of the section's stated object (R1.1), since
    that result is not a convergence-rate result.

