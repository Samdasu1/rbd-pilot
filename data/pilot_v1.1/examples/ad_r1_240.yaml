  text: |
    Section 4. Stability of Iterative Sense-Probability Refinement

    The iterative sense-probability refinement used in recent
    LLM-pipeline disambiguation modules takes the form
    x_{k+1} = M x_k / ||M x_k||_1, where M is a row-stochastic matrix
    encoding co-occurrence-derived sense-transition probabilities.
    The standard treatment is as a power iteration on the simplex,
    and existing analyses report convergence rates of the form
    ||x_k - x*|| <= C (lambda_2 / lambda_1)^k. Our concern in this
    section is the rate of convergence of this iteration under
    finite-precision arithmetic, which has not, to our knowledge,
    been treated rigorously in the disambiguation literature.

    We adopt the standard Wilkinson backward-error model: each
    matrix-vector product is computed with relative error bounded by
    n*eta, where eta is unit roundoff. A direct calculation (Lemma 1)
    shows that the computed iterate x_tilde_k satisfies
    ||x_tilde_k - x*|| <= ||(I - M)^+||_{1^perp} * n*eta + O(eta^2)
    once the spectral component has decayed. The leading term depends
    on kappa((I-M)|_{1^perp}), the condition number of the
    off-stochastic block, and is independent of k for large k.
    Theorem 2 replaces the worst-case bound
    kappa((I-M)|_{1^perp}) <= 1/(1 - lambda_2) with the sharper
    estimate (1 - tau(M))^{-1} / sqrt(n), where tau(M) is the
    Dobrushin ergodicity coefficient. The improvement is a sqrt(n)
    factor in the dimension; for the disambiguation matrices of
    Park et al., n ranges from 50 to 400, giving an order-of-magnitude
    tightening on representative instances.

    Numerical experiments on the WiC-Amb benchmark confirm the
    predicted scaling. We close by noting that the iteration's
    behavior in exact arithmetic is well understood; the regime in
    which our analysis is informative is precisely the regime in
    which finite-precision effects dominate the spectral residual,
    and so the present results complement rather than replace the
    standard spectral-gap convergence picture.
