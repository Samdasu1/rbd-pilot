artifact:
  source: synthetic
  domain: probabilistic_programming
  word_count: 224
  text: |
    We present a probabilistic programming interface that compiles user
    models written in a high-level DSL into efficient inference code. Our
    compiler optimization centers on a key transformation that we now
    describe and which we believe represents the main technical
    contribution of the work.

    The transformation rewrites discrete latent variables into a
    marginalized form whenever the conditional structure of the model
    permits. This marginalization assumes that the latent variable's
    posterior is conjugate to the prior under the observation model,
    which is a common case in probabilistic graphical models. When this
    assumption holds the inference cost reduces by an order of magnitude.

    Many practitioners write models with discrete latents anyway and might
    benefit from the transformation. The compiler analyzes the model
    graph to determine applicability of the transformation and applies it
    where it is safe.

    In experimental evaluation we found that on a benchmark suite of 23
    user-written models the transformation was applied to 17 models and
    led to inference speedup ranging from 1.2x to 18x with median 3.4x.

    In settings where the conjugacy assumption is violated the
    transformation is skipped and the inference proceeds without
    modification but the user is not warned about this fact during
    compilation. We discuss the compiler's safety analysis in more
    detail in Section 4, where we describe the static checks that
    determine when the transformation is or is not applied.
  source_provenance: null

