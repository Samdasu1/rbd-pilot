engineered_flaws:
  R1.2: [F1.2.a]
  R1.6: [F1.6.a, F1.6.c]
  notes: |
    Two interpretations of the load-bearing issue, both defensible:

    Reading A — R1.2 dominant (logical / hidden assumption):
      The transformation's correctness depends on the conjugacy
      assumption. Para 5 reveals that when the assumption fails, the
      transformation is silently skipped — but the section does not
      analyze whether downstream inference is still correct, whether
      users get any signal, or whether the silent fallback can introduce
      bias. The hidden-assumption issue is the central concern: the
      contribution's correctness depends on a precondition that is
      handled invisibly.

    Reading B — R1.6 dominant (writing):
      Para 1 contains a 30-word run-on with hedging chain ("which we
      now describe and which we believe represents the main technical
      contribution"). Para 3 starts with vague "Many practitioners ...
      might benefit", echoing the ambiguity of the contribution.
      Para 5 buries the silent-fallback issue in a long passive
      sentence. A reader could plausibly argue that until the prose is
      cleaned up, the logical issue (Reading A) cannot even be
      identified clearly — the writing obscures it.

    Both readings yield different rewrites. Reading A: add an explicit
    correctness analysis and a user warning. Reading B: rewrite the
    section so claims are crisp; the logical issue may then be already
    visible without adding new content. A well-calibrated agent should
    set clarification_needed=true.

