artifact:
  source: synthetic
  domain: databases
  word_count: 376
  text: |
    We propose RouteSQL, a multi-LLM routing layer for text-to-SQL
    workloads that dispatches each natural-language query to one of
    several backend LLMs based on a learned cost-quality tradeoff.
    RouteSQL achieves uniformly improved execution accuracy over
    single-model baselines across the full suite of text-to-SQL
    benchmarks, while reducing average inference cost by roughly 38%. We
    argue that this establishes routing as a strictly dominant
    deployment strategy for production text-to-SQL systems.

    We benchmark RouteSQL against the strongest single-model baseline
    available for each suite — GPT-4 with the DAIL-SQL prompting
    strategy — across five widely used evaluations: Spider (dev), BIRD
    (dev), WikiSQL, KaggleDBQA, and SParC. Execution accuracy is
    computed under the standard execution-match protocol; we use the
    published splits without modification.

    On Spider-dev, RouteSQL reaches 86.7% execution accuracy compared
    to the DAIL-SQL/GPT-4 baseline of 84.4%, a 2.3-point gain. On
    BIRD-dev, RouteSQL achieves 57.4% compared to the baseline's 55.9%,
    a 1.5-point gain. On WikiSQL, RouteSQL reports 89.1% execution
    accuracy; the DAIL-SQL/GPT-4 baseline on this dataset is 89.6%. On
    KaggleDBQA, RouteSQL reaches 38.2% execution accuracy, with no
    baseline number reported in this section. On SParC (multi-turn),
    RouteSQL achieves a question-match score of 64.2% compared to the
    baseline's 65.1%.

    Cost analysis confirms the efficiency claim: by routing roughly 71%
    of queries to a smaller open-weights model (Qwen-7B-SQL-tuned),
    RouteSQL lowers per-query cost from $0.011 to $0.0068 on average, a
    38% reduction. The router itself adds approximately 12ms of
    overhead per query, which is negligible relative to backend
    latency.

    The routing decision uses a lightweight classifier trained on
    query-feature embeddings including schema-link cardinality, join
    depth, and aggregation count. We find that simpler queries
    (single-table, no aggregation) are reliably handled by the smaller
    backend with no quality loss, while complex multi-join queries
    benefit from the larger backend. This decomposition of the
    workload, combined with the consistent accuracy gains across
    benchmarks reported above, positions RouteSQL as the strongest
    deployment-ready text-to-SQL routing system to date and supports
    the broader claim that multi-LLM routing dominates monolithic
    deployment for structured-query workloads.
