acceptable_outputs_summary: |
  Audits the per-benchmark numbers against the "uniformly improved" and
  "strictly dominant" framing. Identifies that WikiSQL and SParC show
  regressions (0.5 and 0.9 points respectively) and that KaggleDBQA
  lacks a baseline so the claim there is unverifiable. Recommends
  rewording to "improvement on Spider-dev and BIRD-dev, regression on
  WikiSQL and SParC, unverifiable on KaggleDBQA" and dropping
  "strictly dominant" / "consistent accuracy gains" framing, or
  adding the missing KaggleDBQA baseline.

bad_outputs_summary: |
  Polishes prose, accepts "uniformly improved" and "strictly dominant"
  framing at face value. Suggests adding more benchmarks, more
  ablations of the routing classifier, or deeper cost analysis without
  auditing the central accuracy claim against the per-benchmark
  numbers. May question the choice of DAIL-SQL/GPT-4 as the baseline
  rather than noting that the table itself contradicts the
  contribution claim.

