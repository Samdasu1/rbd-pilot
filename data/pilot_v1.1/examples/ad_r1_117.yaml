engineered_flaws:
  R1.3: [F1.3.a]
  notes: |
    Overgeneralization. The opening paragraph claims "uniformly improved
    execution accuracy over single-model baselines across the full suite
    of text-to-SQL benchmarks" and asserts routing is "a strictly
    dominant deployment strategy." The closing paragraph reiterates
    "consistent accuracy gains across benchmarks." The per-benchmark
    numbers in paragraph 3 do not support this:
      - Spider-dev: +2.3 (genuine gain)
      - BIRD-dev:   +1.5 (genuine gain)
      - WikiSQL:    89.1 vs 89.6 baseline (regression of 0.5)
      - KaggleDBQA: 38.2, no baseline reported in-section (unverifiable)
      - SParC:      64.2 vs 65.1 baseline (regression of 0.9)
    So the evidence supports "improvement on 2 of 5, regression on 2 of
    5, unverifiable on 1," not "uniform improvement across the full
    suite." The "strictly dominant" framing in para 1 is also
    overgeneralized: dominance would require accuracy never worse on
    any benchmark, which the WikiSQL and SParC numbers contradict. The
    cost-reduction claim is independently supported and not at issue.
    Knowledge gating is moderate because the reader must know that
    DAIL-SQL/GPT-4 and the named benchmarks are real reference points
    and that "execution accuracy" / "question match" comparisons across
    them are commensurable, but the flaw itself is detectable from
    careful number-reading once those reference points are recognized.
    Delegation T02 ("Review this section.") is generic and does not
    leak the dim.

