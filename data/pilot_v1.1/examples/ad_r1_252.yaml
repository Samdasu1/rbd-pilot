artifact:
  source: synthetic
  domain: bioinformatics
  word_count: 297
  text: |
    We present GenoCoord, a communicative multi-agent framework in
    which specialized LLM agents collaboratively assemble single-cell
    RNA-seq integration pipelines from natural-language atlas-
    construction queries. The framework comprises a Planner agent
    that decomposes the query, a MethodSelector agent that chooses
    integration methods, and an Auditor agent that verifies output
    quality. The MethodSelector is grounded in the Luecken et al.
    (2022) scIB benchmark: when the user requests atlas-scale
    integration with strong biological-signal preservation, the
    MethodSelector defaults to Harmony, which Luecken et al. report
    as the top-ranked method on biological conservation across their
    evaluation suite.

    This grounding is central to our pipeline-assembly logic.
    Specifically, Harmony's first-place ranking on biological-
    conservation metrics in the scIB benchmark — the gold-standard
    atlas-integration evaluation — is what licenses the
    MethodSelector's default choice. By tying method selection to
    Luecken et al.'s leading performer on bio-conservation, GenoCoord
    avoids the failure mode of generalist LLMs that recommend tools
    without empirical grounding. We evaluated GenoCoord on a held-out
    collection of 18 atlas-construction queries spanning PBMC, lung,
    and pancreas datasets; the system produced executable pipelines
    for all 18 queries with no manual intervention.

    The default selection of Harmony for atlas-scale tasks —
    justified by its position as the leading method on the
    biological-conservation axis of the scIB benchmark — is the
    load-bearing architectural commitment of GenoCoord. We position
    MethodSelector's grounding in Harmony's top scIB bio-conservation
    score as the central contribution of this work: it is precisely
    because Luecken et al. (2022) found Harmony to be the strongest
    method for preserving biological variance across batches that the
    MethodSelector can confidently default to it without further
    per-query deliberation. Future extensions will explore whether
    this grounding generalizes beyond the bio-conservation axis on
    which Harmony so clearly dominates the scIB benchmark.
