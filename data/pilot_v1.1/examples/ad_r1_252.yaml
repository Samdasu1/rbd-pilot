engineered_flaws:
  R1.3: [F1.3.c]
  R1.6: [F1.6.c]
  notes: |
    Two interacting issues that compound:

    R1.3 — inverted reading (F1.3.c). The section's central empirical
    grounding is a claim about the Luecken et al. (2022) scIB
    benchmark ("Benchmarking atlas-level data integration in
    single-cell genomics", Nat. Methods). The section asserts
    repeatedly that Harmony is the "top-ranked method on biological
    conservation" / "first-place ranking on biological-conservation
    metrics" / "leading method on the biological-conservation axis"
    in that benchmark. This inverts the canonical finding. The
    actual scIB benchmark reports that scANVI and scVI dominate the
    biological-conservation axis on complex integration tasks, while
    Harmony ranks highly on batch correction but is middling on
    biological conservation — particularly for atlas-scale tasks
    with strong nested batch structure. The section has flipped the
    direction of the canonical result and built its central
    architectural justification on the flipped reading: the
    MethodSelector's default and the section's "load-bearing
    architectural commitment" both derive from a finding that the
    cited benchmark does not actually report.

    R1.6 — repetition (F1.6.c). The same Harmony-tops-bio-
    conservation claim is restated at least six times in slightly
    varied wording: "top-ranked method on biological conservation" /
    "first-place ranking on biological-conservation metrics" /
    "Luecken et al.'s leading performer on bio-conservation" /
    "leading method on the biological-conservation axis" /
    "Harmony's top scIB bio-conservation score" / "the strongest
    method for preserving biological variance across batches" / "the
    bio-conservation axis on which Harmony so clearly dominates the
    scIB benchmark." The repetition is not elaboration; the same
    empirical proposition recurs almost verbatim in slightly
    different phrasings, and the contribution claim at the end of
    para 3 leans on the cumulative force of these restatements.

    The two flaws compound: the repeated framing produces an
    illusion of empirical grounding that the inverted reading
    cannot support — fixing only the repetition leaves a section
    whose central claim still misrepresents the cited benchmark;
    fixing only the inversion leaves a section in which the (now
    corrected) grounding is restated six or seven times.

    Detection: requires recall of what the scIB benchmark (Luecken
    et al. 2022, Nat. Methods) actually reported about Harmony
    versus scANVI/scVI on biological-conservation metrics. A reader
    without this domain knowledge could read the section without
    flagging the inversion, since the section's internal logic is
    self-consistent. High gating. T10 delegation ("Help me with
    this section.") is maximally generic and names neither dim.

