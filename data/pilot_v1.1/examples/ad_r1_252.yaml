acceptable_outputs_summary: |
  Names both: (1) the cited scIB benchmark does not actually rank
  Harmony first on biological conservation — scANVI/scVI lead that
  axis on complex atlas-scale tasks while Harmony's strength is
  batch correction, so the section's central empirical grounding
  and the architectural commitment built on it are inverted and
  must be reversed or retracted; (2) the same Harmony-tops-bio-
  conservation claim is restated six or more times in slightly
  varied wording across the three paragraphs and should collapse
  to a single statement. Both fixes are needed.

