engineered_flaws:
  R1.3: [F1.3.a]
  notes: |
    Overgeneralization (F1.3.a) in R1.3. The opening paragraph claims
    "across every evaluation setting we considered, ClarifyASR delivers
    substantial gains" and "universally applicable strategy." The closing
    paragraph escalates to "consistent WER reductions across read,
    conversational, and far-field conditions" and recommends it "as a
    default component for production deployments." The middle paragraph's
    own numbers do not support this:
      - LibriSpeech test-clean: 2.1 vs 2.3 (improvement)
      - TED-LIUM-3: 5.4 vs 5.9 (improvement)
      - LibriSpeech test-other: 5.8 vs 5.7 (regression)
      - Switchboard: 11.2 vs 11.2 (parity)
      - CHiME-6 dev: 36.4 vs 35.9 (regression)
      - VA-Log: 9.1 vs 8.8 (regression)
    Of six conditions: 2 improvements (both read speech), 1 parity, 3
    regressions. Conversational (Switchboard parity, VA-Log regression)
    and far-field (CHiME-6 regression) categories are NOT improved —
    yet the closing claim explicitly names them as showing "consistent
    WER reductions." The pilot (n=12) is far too small to support a
    "perceived-quality" generalization claim, but the central
    overgeneralization is the WER table vs. headline framing. Detection
    requires only careful reading of the section; no canonical-paper
    recall needed (low gating). Delegation "Review this section." is
    generic and does not name the flaw.

