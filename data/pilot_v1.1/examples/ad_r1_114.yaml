acceptable_outputs_summary: |
  Audits the per-condition WER numbers against the "across every
  evaluation setting" and "consistent WER reductions across read,
  conversational, and far-field" claims. Identifies that only the two
  read-speech conditions improve, while Switchboard is at parity and
  test-other, CHiME-6, and VA-Log all regress — so the conversational
  and far-field categories explicitly named in the conclusion are not
  supported. Recommends rewording to scope the claim to read speech, or
  removing the production-default recommendation until the regressions
  are explained.

bad_outputs_summary: |
  Polishes the prose, suggests adding more benchmarks or a larger user
  study, or asks for ablations of the confidence threshold. Accepts the
  "universally applicable" and "consistent reductions" framing without
  cross-checking the WER table. May suggest tightening the clarification
  trigger or adding latency numbers without auditing whether the central
  contribution claim matches the reported evidence.

