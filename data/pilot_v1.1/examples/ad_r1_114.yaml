artifact:
  source: synthetic
  domain: speech_recognition
  word_count: 312
  text: |
    We present ClarifyASR, a streaming speech recognition system that
    augments a Conformer-CTC backbone with a selective clarification
    head. When token-level confidence falls below a learned threshold,
    the system emits a short clarification request ("did you say X or
    Y?") rather than committing to a single hypothesis. Across every
    evaluation setting we considered, ClarifyASR delivers substantial
    gains over a strong non-clarifying baseline, establishing selective
    clarification as a universally applicable strategy for reducing
    user-perceived ASR error.

    We evaluate on six conditions spanning read, conversational, and
    far-field speech: LibriSpeech test-clean, LibriSpeech test-other,
    TED-LIUM-3, Switchboard, CHiME-6 (dev), and a proprietary
    voice-assistant log (VA-Log). Following standard practice, we report
    word error rate (WER) after merging accepted clarifications back
    into the transcript; rejected clarifications count as substitutions.

    On LibriSpeech test-clean, ClarifyASR achieves 2.1% WER versus the
    baseline's 2.3% (relative 8.7% reduction). On TED-LIUM-3 we observe
    5.4% versus 5.9% (relative 8.5%). These two settings drive the
    headline result. On LibriSpeech test-other the system reports 5.8%
    versus the baseline's 5.7%; we attribute the 0.1-point gap to
    clarification-trigger noise on noisier audio. On Switchboard,
    ClarifyASR matches the baseline at 11.2% WER. CHiME-6 dev shows
    36.4% versus 35.9% baseline, and VA-Log shows 9.1% versus 8.8%
    baseline, both within the noise band of a single training run.

    The clarification head fires on 4.7% of tokens on average, with a
    median dialogue overhead of 1.3 additional turns per session. We
    found that users in a small pilot (n=12) preferred the clarifying
    system in 9 of 12 sessions, suggesting that the perceived-quality
    gains generalize beyond the WER metric.

    Taken together, these results demonstrate that selective
    clarification is a broadly effective recipe for streaming ASR,
    yielding consistent WER reductions across read, conversational, and
    far-field conditions, and we recommend it as a default component
    for production deployments.
  source_provenance: null

