acceptable_outputs_summary: |
  Notices that the headline claim is about magnitude-dependent bias
  (and quotes a specific 35% reduction figure) while the evidence
  paragraph reports only aggregate accuracy, macro-F1, and ROC-AUC,
  none of which measure how bias varies with apparent magnitude.
  Recommends reporting per-magnitude-bin bias, a calibration-vs-
  magnitude curve, or the residual-vs-magnitude slope, and either
  sourcing the "35% reduction" number from such a measurement or
  rewording the claim to match what the aggregate metrics actually
  demonstrate.

bad_outputs_summary: |
  Accepts the bias-reduction framing and polishes the prose, suggests
  evaluating on additional surveys (e.g. LSST/Rubin simulations) or
  swapping the XGBoost backbone for a deep model, or quibbles over
  the 0.5-point AUC improvements being marginal — without noticing
  that the reported metrics cannot in principle support a claim
  about magnitude-dependent bias.

