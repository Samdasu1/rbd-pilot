engineered_flaws:
  R1.3: [F1.3.b]
  notes: |
    Metric mismatch. The central claim is quantitative and specific:
    "RegMagD reduces the magnitude-dependent classification bias of
    the underlying classifier by approximately 35% on average" and is
    restated in the conclusion as "substantially reduces the
    magnitude-dependent bias ... across three large photometric
    surveys." However, the only metrics reported in the evidence
    paragraph are aggregate top-1 accuracy, macro-F1, and ROC-AUC
    computed over the entire test split. None of these metrics
    measure magnitude-dependent bias: they are scalar summaries that
    average across the magnitude axis and would not change if a
    bright-source over-prediction were exactly cancelled by a faint-
    source under-prediction. To support the stated claim the section
    would need bias stratified by apparent magnitude bin (e.g.
    per-class predicted fraction minus true fraction as a function of
    m_r), a calibration-vs-magnitude curve, or the slope of residual
    bias against magnitude. The reported "35% reduction" number is
    not derivable from any number in the table. Detection requires
    only careful reading — the mismatch between "magnitude-dependent
    bias" (the claim) and "aggregate accuracy/F1/AUC" (the evidence)
    is visible without astronomy expertise (low gating). Delegation
    T02 is generic and does not name the dim.

