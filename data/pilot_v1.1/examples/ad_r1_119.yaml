artifact:
  source: synthetic
  domain: astronomy
  word_count: 297
  text: |
    We introduce RegMagD, a lightweight regression-based debiasing layer
    for automatic transient classifiers, motivated by the observation
    that off-the-shelf classifiers exhibit strong magnitude-dependent
    biases — typically over-predicting Type Ia supernovae among bright
    sources and under-predicting them among faint sources near the
    survey detection limit. Across all three benchmarks evaluated,
    RegMagD reduces the magnitude-dependent classification bias of the
    underlying classifier by approximately 35% on average, restoring
    near-uniform per-class performance across the apparent magnitude
    range.

    We benchmark on three commonly used transient-classification
    datasets: the ZTF Bright Transient Survey (ZTF-BTS), the ALeRCE
    alert-stream classification benchmark (ALeRCE-DR1), and the
    PLAsTiCC-2018 test split. For each dataset we train the same
    XGBoost backbone with and without the RegMagD post-processing
    layer and report standard classification metrics: top-1 accuracy,
    macro-averaged F1, and ROC-AUC, evaluated over the entire test
    split.

    On ZTF-BTS, the RegMagD classifier reaches 91.4% accuracy versus
    90.6% for the unmodified baseline, a 0.8-point improvement.
    Macro-F1 is 88.9 versus 87.8 (+1.1), and ROC-AUC is 0.954 versus
    0.949. On ALeRCE-DR1, accuracy is 88.5% (vs 88.0%), F1 is 84.4
    (vs 83.7), AUC is 0.928 (vs 0.925). On PLAsTiCC-2018, accuracy is
    84.6% (vs 83.7%), F1 is 80.3 (vs 79.1), AUC is 0.903 (vs 0.898).

    These results confirm that RegMagD substantially reduces the
    magnitude-dependent bias of automatic transient classifiers
    across three large photometric surveys, supporting our central
    claim that regression-based post-processing is an effective and
    survey-agnostic strategy for debiasing automatic evaluators in
    time-domain astronomy. The cost is negligible: training the
    regression layer takes under two minutes on a single CPU and the
    per-alert inference overhead is below 0.1 ms.
