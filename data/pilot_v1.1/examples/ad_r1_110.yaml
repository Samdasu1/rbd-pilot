engineered_flaws:
  R1.3: [F1.3.c]
  notes: |
    Inverted reading. Every reported Pearson correlation between
    inter-agent disagreement and a translation-quality metric is
    NEGATIVE: r = âˆ’0.38 (COMET-22), r = âˆ’0.31 (chrF), r = âˆ’0.27 (BLEU),
    and per-pair r = âˆ’0.42 / âˆ’0.35 / âˆ’0.36. Because COMET-22, chrF, and
    BLEU are all higher-is-better metrics, a negative correlation means
    higher disagreement is associated with LOWER consensus quality. The
    prose reads each of these in the opposite direction: it claims
    disagreement is "informative" of high quality, that high
    disagreement "reliably signals strong final outputs," and that
    round-one disagreement is "a robust positive indicator" of
    consensus quality. The closing recommendation compounds the
    inversion: it tells practitioners to flag LOW-disagreement segments
    for human review on the grounds that those are the low-quality
    cases â€” but the data say the opposite (high-disagreement segments
    are the lower-quality ones). Detection requires a reader to know
    that COMET-22 / chrF / BLEU are higher-is-better and that a
    negative Pearson r is an inverse relationship; no recall of
    specific canonical works is needed (moderate gating). Delegation
    T03 ("Make this stronger.") gives no hint at the load-bearing dim.

