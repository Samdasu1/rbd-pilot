engineered_flaws:
  R1.5: [F1.5.c]
  R1.6: [F1.6.a, F1.6.c]
  notes: |
    Two compound issues:

    R1.5 — out-of-order structure. Section flow is:
      (1) experimental observations / hedge about indirect comparison
      (2) contribution: "we propose RetrieveCascade" (one sentence)
      (3) detailed implementation (BM25 / dense / re-ranker)
      (4) hyperparameters (K1, K2)
      (5) experimental setup (splits, metrics)
    The natural ordering is: contribution → method → setup →
    experiments. Currently the contribution sits as a single sentence
    sandwiched between empirical observations and implementation.
    Para 1 (observations) belongs in or near the experiments
    paragraph, not before the contribution claim.

    R1.6 — prose issues. Para 1 is a single 50+-word run-on. Para 3
    uses mechanical "First / Second / Third" repetition over three
    short clauses. Hedging cascade in para 1 ("reasonably competitive",
    "somewhat indirect", "as faithfully as possible given the available
    resources").

    Detection: both issues visible from careful reading without external
    knowledge. Low gating. Delegation T01 "Improve this draft" is
    maximally generic.

