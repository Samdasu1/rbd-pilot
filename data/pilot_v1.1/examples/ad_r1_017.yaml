artifact:
  source: synthetic
  domain: information_retrieval
  word_count: 213
  text: |
    On the four datasets that we have evaluated namely MS-MARCO and
    Natural Questions and TriviaQA and HotpotQA we have observed
    performance numbers that we believe to be reasonably competitive with
    prior published baselines although the comparison is somewhat indirect
    because some of the prior baselines used slightly different evaluation
    protocols which we attempt to reproduce as faithfully as possible
    given the available resources.

    We propose RetrieveCascade, a hybrid sparse-dense retrieval approach
    that uses a learned re-ranking step.

    The implementation of the cascade involves several components which we
    now describe. First we have the sparse retrieval stage which uses BM25
    with default parameters. Second we have the dense retrieval stage
    which uses a sentence-transformer model fine-tuned on a 1M
    query-passage dataset that we curated. Third we have the re-ranking
    stage that combines the top-100 from each retrieval method using a
    learned scoring function.

    Concretely the BM25 stage retrieves K1=1000 candidates per query. The
    dense stage retrieves K2=1000 candidates per query. The re-ranker
    scores all up to 2000 unique candidates and returns the top-10.

    For our experiments we used the standard splits from each dataset and
    report MRR and recall@10 in Table 2. We additionally report nDCG@10
    and the per-dataset breakdown in Appendix B for readers interested in
    dataset-specific behavior across the four evaluation corpora.
  source_provenance: null

