artifact:
  source: synthetic
  domain: bioinformatics
  word_count: 232
  text: |
    Across the three benchmark corpora that we examined namely
    BC5CDR and NCBI-Disease and BioASQ-Task7b we observed F1
    scores that we believe to be broadly comparable to those
    reported by recent transformer-based pipelines although the
    precise comparison is arguably somewhat complicated by the
    fact that prior work used slightly different entity-span
    normalization conventions which we approximated as faithfully
    as the published descriptions appeared to permit.

    We introduce VariantTalk, a retrieval-augmented language-model
    pipeline for annotating clinically significant variants in
    unstructured case reports.

    The annotation pipeline proceeds in three stages. A
    named-entity-recognition pass first extracts candidate variant
    strings using a fine-tuned BioBERT classifier. A retrieval
    stage then queries a local mirror of ClinVar and dbSNP for
    canonical identifiers matching the extracted strings under a
    normalized HGVS form. A re-ranking stage finally uses a frozen
    instruction-tuned LLM to score each candidate-evidence pair
    and emit a pathogenicity tag drawn from a five-level ACMG-style
    vocabulary.

    For the NER stage we use a learning rate of 2e-5 with batch
    size 16 over five epochs. The retrieval stage returns up to 50
    candidate identifiers per query string. The re-ranker scores
    all retrieved pairs with a chain-of-thought prompt of fixed
    length 512 tokens, decoded greedily.

    For evaluation we use the official train/development/test
    splits of each benchmark and report micro-averaged F1 against
    the consensus annotations. We additionally include
    per-mutation-type breakdowns and a confusion analysis in
    Supplement S2 for readers interested in performance variation
    across substitution, insertion, and deletion classes.
  source_provenance: null

