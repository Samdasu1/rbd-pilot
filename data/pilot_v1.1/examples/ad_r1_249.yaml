engineered_flaws:
  R1.5: [F1.5.c]
  R1.6: [F1.6.b]
  notes: |
    Two interacting flaws.

    R1.5 — out-of-order narrative. The section opens (para 1) with
    empirical observations and a hedged comparison to prior
    transformer pipelines, then drops a one-sentence contribution
    claim (para 2: "We introduce VariantTalk…"), then describes
    the three-stage method (para 3), then lists hyperparameters
    (para 4), and only at the end introduces the evaluation setup
    — splits, metrics, supplementary breakdowns (para 5). The
    natural ordering for a tool/methods section is: contribution
    claim → method → experimental setup → results. Currently
    results appear before the contribution is even named, the
    setup appears after the results that depend on it, and the
    contribution sentence is sandwiched as a single isolated
    paragraph between observations and implementation. Fixing the
    section requires moving para 2 (and ideally an expanded
    framing) to the top, retaining para 3 (method), promoting
    para 5 (setup) before any results, and folding para 1's
    observations into a results paragraph that follows.

    R1.6 — hedging cascade. Para 1 stacks four hedges in a single
    sentence: "we believe to be", "broadly comparable", "arguably
    somewhat complicated", "approximated as faithfully as the
    published descriptions appeared to permit". The cumulative
    effect is to leave the reader unable to extract any committed
    claim about how VariantTalk compares to prior work — every
    candidate claim is softened and then softened again. The fix
    is to cut the cascade to a single, scoped qualification (e.g.
    name the specific normalization difference and state that
    F1 numbers are reported under the authors' reproduction of
    the prior protocol) so the comparison either commits to a
    claim or explicitly defers it.

    Detection: both issues are visible from careful reading
    without external knowledge — the reader does not need to
    recognize specific bioinformatics canon, only to notice that
    results precede the contribution claim and that para 1 chains
    hedges. Low gating. T02 "Review this section." is maximally
    generic and does not hint at structure or prose.

