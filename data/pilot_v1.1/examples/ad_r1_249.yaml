acceptable_outputs_summary: |
  Names both load-bearing issues. For the structural issue,
  identifies that the section presents results before naming the
  contribution and lists hyperparameters before the evaluation
  setup, and proposes a reorder where the contribution claim
  leads, followed by method, then setup, then results — moving
  para 1's observations into a results block and lifting para 2
  to the top. For the prose issue, flags the stacked hedges in
  para 1 ("we believe to be", "broadly comparable", "arguably
  somewhat complicated", "as faithfully as the published
  descriptions appeared to permit") and rewrites the sentence to
  either commit to a scoped comparison claim or defer it
  explicitly under a single qualification.

bad_outputs_summary: |
  Polishes individual sentences, recommends additional
  benchmarks or a stronger re-ranker, or suggests upgrading
  BioBERT to a newer encoder without recognizing that the
  section is structured backwards. Accepts the leading hedged
  results paragraph as a reasonable opening and tightens its
  grammar instead of removing the hedging cascade. Addresses
  only one of the two flaws — e.g., reorders the section while
  leaving the hedge stack intact, or rewrites the hedges while
  leaving the contribution claim buried after the results.

