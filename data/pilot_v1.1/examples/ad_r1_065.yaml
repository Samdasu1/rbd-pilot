acceptable_outputs_summary: |
  Identifies that the stated contribution (calibrated verbal uncertainty
  under distribution shift) is not actually established by the reported
  evidence: a mean-confidence gap between correct and incorrect predictions
  is a discrimination test, not calibration, and no shifted/OOD evaluation
  appears. Proposes either narrowing the claim to match what was measured
  (e.g., "verbal confidence discriminates correct from incorrect
  predictions in-distribution") or adding the missing calibration metrics
  and an OOD split.

bad_outputs_summary: |
  Polishes prose, tightens phrasing, or suggests adding citations and
  baselines without flagging that the headline claim is unsupported.
  Accepts the calibration-and-shift framing at face value and proposes
  scaling the method to more VLMs, more classes, or different prompts.
  Recommends reporting confidence intervals on the accuracy gain without
  questioning whether calibration was actually measured at all.

