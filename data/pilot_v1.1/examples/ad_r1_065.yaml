engineered_flaws:
  R1.1: [F1.1.a]
  notes: |
    Thesis drift. Para 1 stakes the contribution on two specific claims:
    (a) the verbal confidences are *well calibrated*, and (b) this holds
    *under distribution shift*. The body delivers neither. What is
    actually measured is (i) a small accuracy gain (71.4 vs 69.8) and
    (ii) a mean-confidence gap between correct and incorrect predictions
    — i.e. a discrimination/separation result, not a calibration result
    (no reliability diagram, no ECE, no Brier score, no per-bin
    empirical-frequency comparison). And the evaluation is on a single
    in-distribution split of iNat-Mini; no OOD or shifted test set is
    described, so "under distribution shift" is unsupported. The
    conclusion paragraph then re-asserts the original claim verbatim,
    completing the drift. Detecting this requires only careful reading of
    what the experiments measure versus what the abstract-style framing
    promises — no canonical-paper recall is needed (low gating). The
    T01 delegation "Improve this draft." is generic and does not signal
    R1.1.

