artifact:
  source: synthetic
  domain: computer_vision
  word_count: 298
  text: |
    We introduce VerbalCalib-CLIP, a method for eliciting calibrated verbal
    uncertainty from vision-language models on fine-grained image
    classification. Our central claim is that, after lightweight instruction
    tuning, a frozen CLIP-based VLM can produce confidence phrases ("very
    confident", "somewhat confident", "uncertain") whose induced
    probabilities are well calibrated under realistic distribution shift,
    matching or exceeding the calibration of softmax-based baselines.

    Our pipeline prepends each query with the prompt "Identify the species
    and rate your confidence in words" and reads the highest-likelihood
    verbal label from a fixed five-bin vocabulary. We map each verbal bin
    to a scalar probability via a held-out linear regression fit on
    iNat-Mini, yielding monotone but non-uniform spacing across the five
    bins.

    We evaluate on iNat-Mini (10k images, 312 species classes). Top-1
    accuracy is 71.4% with verbal prompting versus 69.8% without, a small
    but consistent gain across three random seeds. We further compute the
    average emitted confidence on correct (0.83) and incorrect (0.61)
    predictions and find a clear separation: the model's verbal confidence
    is higher when it is right than when it is wrong, with a Mann-Whitney U
    test rejecting the null at p < 0.001. We interpret this gap as evidence
    that the verbal channel carries meaningful uncertainty signal.

    Figure 3 plots the per-class accuracy distribution and shows that the
    model is more accurate on common species than rare ones, consistent
    with the long-tailed structure of iNaturalist. A qualitative inspection
    of ten random failure cases shows the model often hedges with
    "somewhat confident" rather than "very confident".

    Together, these results establish that VerbalCalib-CLIP yields
    calibrated verbal uncertainty under distribution shift, providing a
    foundation for deployment in citizen-science applications where
    reliable confidence estimates are essential. We expect the framework to
    generalize to other VLMs without modification.
