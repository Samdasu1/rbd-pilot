acceptable_outputs_summary: |
  Names the missing canonical citations — at minimum AutoGen (Wu et al.,
  2023) and ChatDev (Qian et al., 2023), and ideally MetaGPT (Hong et
  al., 2023) — and flags that any related-work survey of multi-agent
  LLM frameworks must include them. Notes that the "first to enforce
  typed inter-agent communication" novelty claim and the "strongest
  prior multi-agent baseline" comparison claim are both compromised
  until AutoGen in particular is surfaced and addressed. Suggests
  inserting these works into the prior-work taxonomy and revisiting the
  contribution framing accordingly.

