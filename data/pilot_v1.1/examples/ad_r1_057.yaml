engineered_flaws:
  R1.7: [F1.7.b]
  notes: |
    The related-work survey of multi-agent LLM frameworks names CAMEL,
    Generative Agents, HuggingGPT, and ReAct, but omits the two most
    direct and canonical baselines: AutoGen (Wu et al., 2023) and
    ChatDev (Qian et al., 2023). AutoGen is the most widely deployed
    multi-agent LLM framework and explicitly supports structured /
    typed messages between agents — directly undercutting the section's
    "first multi-agent LLM framework to enforce typed inter-agent
    communication" novelty claim. ChatDev is the canonical multi-agent
    LLM framework for software development with role-specialized
    agents, and is the obvious baseline for any system evaluated on a
    "software-development task suite." Detection requires familiarity
    with the multi-agent LLM literature circa 2023 (high gating); the
    section's internal text is consistent. The "23% improvement over
    the strongest prior multi-agent baseline among the works surveyed
    above" is also load-bearing here — once AutoGen / ChatDev are
    surfaced, the strongest-baseline framing collapses unless they are
    in the comparison. Delegation T01 ("Improve this draft.") is
    maximally generic and does not point at scholarship.

