  domain: nlp
  word_count: 375
  text: |
    Multi-agent collaboration with large language models (LLMs) has
    emerged as a promising paradigm for tackling complex, multi-step
    problems that exceed the capacity of a single prompt. By decomposing
    a task across role-specialized agents that exchange natural-language
    messages, recent systems have shown gains on planning, reasoning,
    and tool-use benchmarks compared to monolithic LLM baselines.

    Prior work in this area can be grouped into three threads. First,
    role-playing and self-organizing agent societies, exemplified by
    CAMEL (Li et al., 2023), instantiate cooperative dialogues between
    an "AI user" and an "AI assistant" agent and demonstrate that role
    assignment alone can elicit substantive task progress without
    explicit orchestration. Second, behavior-grounded simulations such
    as Generative Agents (Park et al., 2023) embed memory and reflection
    modules into agent loops to produce believable long-horizon behavior.
    Third, tool-augmented controllers — HuggingGPT (Shen et al., 2023)
    and ReAct (Yao et al., 2022) — interleave reasoning with API calls
    but operate primarily as single-agent systems orchestrating external
    tools rather than peer agents.

    Across these threads, the dominant pattern is unstructured
    natural-language exchange: agents communicate in free-form text,
    and coordination emerges (or fails to emerge) from the conversation
    itself. We argue that this is the central limitation of the
    multi-agent paradigm as it stands. Free-form messages create
    ambiguity at handoff points, allow hallucinations from one agent to
    propagate to the next, and offer no mechanism for verifying that an
    upstream artifact (a plan, a function signature, a test
    specification) satisfies the downstream agent's preconditions.

    In this paper we propose StructAgents, a multi-agent framework that
    replaces free-form messages with typed, schema-validated artifacts
    at every inter-agent boundary. Agents communicate by emitting and
    consuming structured documents — task plans, interface
    specifications, code units, and test reports — each governed by a
    validator that rejects malformed handoffs before they reach the
    next agent. We instantiate StructAgents on a software-development
    task suite and report a 23% absolute improvement in end-to-end
    pass rate over the strongest prior multi-agent baseline among the
    works surveyed above, with the largest gains on tasks requiring
    deep cross-agent dependencies. We position StructAgents as the
    first multi-agent LLM framework to enforce typed inter-agent
    communication, and we believe this design principle generalizes
    beyond code synthesis to any domain where downstream agents must
    trust upstream artifacts.
