acceptable_outputs_summary: |
  Flags that the only baseline across all three experiments is the
  authors' own prior protocol and that the "strict improvement" framing
  is therefore unsupported. Names concrete missing comparators from the
  multi-agent consensus literature (e.g. weighted/Metropolis-Hastings
  consensus, distributed Kalman fusion, event-triggered or leader-follower
  schemes, MPC-based coordination). Suggests rewording the contribution
  to a defensible delta against the actual field rather than against the
  authors' own averaging baseline.

bad_outputs_summary: |
  Polishes the prose, tightens the experimental description, or asks for
  more agents / additional benchmark tasks while leaving the
  self-comparison structure intact. Praises selection-based aggregation
  as a clean conceptual contribution, suggests sharpening the dynamics
  model in Section 4, or recommends adding peripheral citations without
  questioning the novelty framing or the choice of baseline.

