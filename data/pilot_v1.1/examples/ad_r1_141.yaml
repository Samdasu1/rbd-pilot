artifact:
  source: synthetic
  domain: control_theory
  word_count: 332
  text: |
    We present SelectConsensus, a distributed consensus protocol for
    heterogeneous multi-agent control systems in which each agent proposes
    a candidate control action and a designated leader selects, rather than
    averages, the chosen action at each timestep. This selection-based
    aggregation contrasts with the averaging-based consensus that has
    dominated multi-agent control since its inception, and we show it
    yields substantially better tracking performance under sensor
    heterogeneity.

    We evaluate SelectConsensus on three benchmark tasks: cooperative
    formation control of a 6-quadrotor swarm, decentralized voltage
    regulation on a 9-bus microgrid, and coordinated lane-keeping in a
    4-vehicle platoon. On the formation task, SelectConsensus attains an
    RMS tracking error of 0.21 m, compared with 0.34 m for SimpleAverage
    (our previous protocol, Author et al., 2023). On the microgrid task,
    bus-voltage deviation drops from 2.7% to 1.9% relative to
    SimpleAverage. On the platoon task, mean headway error improves from
    0.18 m to 0.12 m against SimpleAverage.

    Section 4 introduces the selection rule: at each timestep the leader
    picks the candidate action that minimizes a one-step predicted residual
    under a shared linearized dynamics model. The intuition is that in
    heterogeneous teams the best individual estimate is more informative
    than a blended one, because averaging contaminates the strongest
    candidate with weaker ones. The ablation in Section 5 confirms that
    disabling the selection step — reverting to averaging — degrades all
    three metrics by roughly the margin reported above.

    We position SelectConsensus as the natural successor to SimpleAverage,
    retaining its decentralized communication topology while replacing the
    aggregation rule. The implementation requires changing only the
    aggregation block in a standard consensus stack, fewer than 80 lines in
    our ROS2 codebase, which we believe lowers the bar for adoption in
    operational fleets. Taken together, our results establish
    selection-based aggregation as a strict improvement over averaging-based
    consensus and open a new design space for multi-agent control under
    heterogeneity.
