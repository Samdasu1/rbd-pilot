engineered_flaws:
  R1.4: [F1.4.c]
  notes: |
    Rhetorical novelty. The section claims "substantially better
    performance" and "a strict improvement over averaging-based consensus"
    but the only baseline across all three experiments (formation,
    microgrid, platoon) is SimpleAverage — the authors' own prior protocol.
    The broader multi-agent consensus control literature (weighted /
    Metropolis-Hastings consensus, event-triggered consensus, distributed
    Kalman or Bayesian fusion, leader-follower with adaptive gains,
    MPC-based coordination) is entirely absent from the comparison. The
    delta against vanilla averaging is real but is not a delta against the
    actual field. Detection requires only noticing that every baseline is
    "SimpleAverage (Author et al., 2023)" — no recall of canonical
    consensus-control results is needed, hence low gating. The T01
    delegation "Improve this draft." is generic and does not point at R1.4.

