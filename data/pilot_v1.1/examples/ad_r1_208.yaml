engineered_flaws:
  R1.7: [F1.7.c]
  notes: |
    Stale citation (F1.7.c). The methods section anchors its RNA-seq
    pipeline on TopHat2 (Kim et al., 2013) and Cufflinks/Cuffdiff
    (Trapnell et al., 2012) — the original "tuxedo suite." Both tools
    were officially deprecated by their own developers in 2016, when
    the Trapnell/Salzberg/Pertea group published the "new tuxedo"
    protocol (Pertea et al., Nat. Protocols 2016) recommending HISAT2
    (Kim et al., 2015/2019) for alignment and StringTie / Salmon /
    kallisto for quantification. Citing TopHat2+Cufflinks as the
    pipeline of record in a 2026 paper is anachronistic, not merely
    suboptimal: FPKM estimates from Cufflinks have known length and
    library-composition biases that transcript-level EM methods (Salmon,
    kallisto) correct, and those FPKM-derived deciles are the load-
    bearing input features fed to the LLM. The benchmark's validity
    therefore rests on a quantification method the original authors
    have themselves superseded. Detection requires moderate field
    knowledge: any practitioner who runs RNA-seq pipelines knows
    TopHat is deprecated, but a generalist reviewer may not. The
    delegation T10 is fully generic and does not leak the dim.

