artifact:
  source: synthetic
  domain: bioinformatics
  word_count: 287
  text: |
    We construct a benchmark of human RNA-seq experiments to evaluate the
    ability of large language models to predict tissue-specific gene
    function from expression context. Raw reads were obtained from the
    GTEx v8 release across 17 tissue types (n=2,431 samples) and
    processed using a standard tuxedo-suite pipeline.

    Reads were aligned to the GRCh38 reference using TopHat2 (Kim et al.,
    2013) with default parameters and a Bowtie2 (Langmead and Salzberg,
    2012) index built from GENCODE v38 annotations. Transcript-level
    quantification was performed with Cufflinks (Trapnell et al., 2012),
    yielding FPKM estimates for each annotated transcript. Differential
    expression between tissues was assessed using Cuffdiff with a 5%
    false discovery rate threshold.

    Gene-level FPKM values were log-transformed and binned into
    expression deciles per tissue. These deciles served as the context
    features supplied to the LLM prompts described in Section 4. For
    each gene, we constructed a prompt containing the gene symbol, its
    expression decile in the target tissue, and the three highest-
    expressing co-regulated genes (Pearson r > 0.6 across samples). The
    LLM was asked to predict the tissue-relevant Gene Ontology
    biological process.

    We compared predictions against ground-truth GO annotations from the
    GOA human release (October 2024). Three LLMs were evaluated: GPT-4
    (OpenAI), Claude 3 Opus (Anthropic), and Llama-3-70B (Meta). Each
    model received identical zero-shot prompts; we report precision@5
    and AUPRC averaged across tissues in Table 2.

    Our pipeline supports reproducibility: all intermediate files (BAM,
    FPKM matrices, prompts, model outputs) are released under CC-BY-4.0.
    The use of well-established alignment and quantification tools
    ensures that subsequent re-evaluation can be performed without
    re-engineering the data processing layer.
