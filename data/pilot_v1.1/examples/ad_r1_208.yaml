acceptable_outputs_summary: |
  Flags that TopHat2 and Cufflinks have been deprecated by their own
  developers since 2016 and that a current RNA-seq pipeline would use
  HISAT2 or STAR for alignment and Salmon, kallisto, or StringTie for
  quantification. Notes that the FPKM-derived expression deciles are
  the load-bearing input to the LLM benchmark, so the stale tool
  choice is not cosmetic — it threatens the validity of the input
  features and therefore the benchmark's contribution claim. Suggests
  re-running with the modern pipeline or at minimum citing and
  justifying the choice against the current standard.

bad_outputs_summary: |
  Polishes the methods prose, suggests adding more LLMs to the
  comparison, requests a power analysis on n=2,431, or recommends
  reporting additional metrics — without flagging that the
  alignment/quantification tools are deprecated. May praise the
  pipeline as "well-established" (echoing the section's own framing)
  and add peripheral citations (e.g. additional GO resources) while
  leaving TopHat2/Cufflinks in place.

