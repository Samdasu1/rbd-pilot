delegation: "Verify the evidence supports the claims."

artifact:
  source: synthetic
  domain: probabilistic_programming
  word_count: 315
  text: |
    We introduce StanRoute, a probabilistic-programming-based router for
    multi-LLM serving. StanRoute encodes the cost-quality routing
    decision as a hierarchical Bayesian model in NumPyro: each candidate
    LLM is a leaf of a discrete latent variable z, a Dirichlet prior
    controls the marginal model mix, and per-query posteriors are
    amortized through a transformer encoder. We fit the variational
    guide with SVI for 5,000 steps on the RouterEval-2024 calibration
    set (12,500 queries across six task families: code, math,
    summarization, dialogue, factual QA, and creative writing).

    Our central claim is that StanRoute produces better-calibrated
    routing distributions than the heuristic-router baseline across all
    task families, and that the resulting system is therefore
    preferable for any cost-conscious LLM application.

    Table 1 reports our two principal evaluation metrics. We measure
    (i) routing quality via held-out task accuracy a on a 2,000-query
    test split, and (ii) routing calibration via the KL divergence
    KL(p_router || p_oracle) between the router's posterior over models
    and the empirical oracle distribution that selects the cheapest
    model achieving a correct output. For StanRoute we obtain a = 0.78
    and KL = 0.92; the heuristic baseline obtains a = 0.74 and
    KL = 0.47. The favorable KL value for StanRoute, combined with the
    +0.04 absolute accuracy gain, confirms the calibration claim and
    indicates that the variational posterior tracks the oracle
    distribution more faithfully than the rule-based competitor.

    We further stratify by task family in Table 2. On code generation,
    the family with the widest spread of per-model costs in the
    portfolio, StanRoute reaches a = 0.81 versus the baseline's 0.76 —
    a relative improvement of 6.6%. Because code generation is the
    most cost-sensitive family in RouterEval-2024, we treat it as the
    representative case: the size of the gain on this family
    establishes that StanRoute uniformly improves routing across all
    RouterEval task families, and supports the broader conclusion that
    probabilistic-programming-based routers should replace heuristic
    routers in general-purpose LLM serving deployments at any
    operating point on the cost-quality frontier.
