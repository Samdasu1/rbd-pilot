acceptable_outputs_summary: |
  Notes that KL(p_router || p_oracle) is lower-is-better, so
  StanRoute's KL = 0.92 is in fact worse than the baseline's
  KL = 0.47, inverting the calibration conclusion drawn in the text.
  Flags that the "uniformly improves across all task families" and
  "any operating point on the cost-quality frontier" claims rest on
  the code-generation result alone, with the other five families
  unreported. Recommends either reversing the calibration claim or
  reporting per-family accuracy and KL before any uniform-improvement
  language is retained.

bad_outputs_summary: |
  Treats the section as well-supported because two metrics are
  tabulated and the +0.04 accuracy gain is positive. Suggests adding
  more SVI steps, a deeper amortizing encoder, or a comparison to an
  MCMC variant, while accepting the KL reading at face value.
  Polishes the language around Table 2 or asks for a confidence
  interval on the 6.6% gain without questioning the leap from one
  family to "all task families."

