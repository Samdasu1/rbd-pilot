engineered_flaws:
  R1.3: [F1.3.a, F1.3.c]
  notes: |
    Control case for R1.3. The delegation ("Verify the evidence
    supports the claims") names "evidence" and "claims" outright —
    full leakage by spec §2.5. Both engineered flaws live in R1.3 and
    are recoverable from careful reading without probabilistic-
    programming domain expertise beyond the definitions stated in the
    artifact itself.

    F1.3.c (inverted reading): the section's only genuine calibration
    metric is the KL divergence KL(p_router || p_oracle) between the
    router's posterior and the empirical oracle distribution. KL is
    lower-is-better — KL = 0 corresponds to the router matching the
    oracle exactly. StanRoute reports KL = 0.92 versus the baseline's
    KL = 0.47, so by this metric the heuristic baseline is in fact
    closer to the oracle than StanRoute. The text instead reads the
    StanRoute value as "favorable" and as confirming the calibration
    claim. The direction is inverted, and this inversion is the only
    thing standing between the section and a refutation of its
    headline claim.

    F1.3.a (overgeneralization): Table 2 is summarized via a single
    family (code generation, +0.05 absolute / +6.6% relative
    accuracy), and that single result is then promoted to "StanRoute
    uniformly improves routing across all RouterEval task families"
    and to a deployment recommendation at "any operating point on the
    cost-quality frontier." The remaining five families (math,
    summarization, dialogue, factual QA, creative writing) are named
    in the calibration set description but are not shown to support
    the uniform-improvement or any-operating-point conclusions.

    As a control example, this verifies that projection agents place
    R1.3 high under a delegation that explicitly cues evidence-claim
    verification. Cross-family d_C is expected to be near zero on
    this example.

