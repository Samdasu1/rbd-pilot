acceptable_outputs_summary: |
  Identifies that the section claims MPC but describes reactive control,
  and proposes either (a) renaming the contribution to reactive
  collision-detection with appropriate positioning, or (b) actually
  describing a model-predictive horizon and optimization. Does not focus
  on prose polish or on adding more experiments.

bad_outputs_summary: |
  Polishes the prose, suggests adding more trials or environments, or
  questions whether the failure rate (3/200) is acceptable. Treats the
  framework as legitimate MPC and proposes MPC-related extensions.
  Strengthens the comparison to reactive baselines without flagging that
  the proposed method is itself reactive.

