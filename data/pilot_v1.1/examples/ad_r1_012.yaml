engineered_flaws:
  R1.1: [F1.1.c]
  notes: |
    Conceptual object slip. Para 1 names the contribution
    "ModelPredictiveSafety, a model-predictive control framework" — MPC
    typically reasons over a finite horizon with a model, optimizing a
    cost. Para 2 then describes the actual algorithm: distance check
    against a threshold + deceleration command — i.e. reactive control
    with no horizon, no model rollout, no optimization. The conceptual
    object claimed (MPC) does not match the technical content (reactive).
    Para 4 doubles down ("model-predictive reasoning yields smoother
    interaction") even though no model-predictive reasoning is described.
    Detection requires careful reading of the algorithm description; no
    canonical-paper recall needed (low gating). The delegation T05
    "Check this" is generic and does not signal R1.1 — it could
    plausibly signal any verification task.

