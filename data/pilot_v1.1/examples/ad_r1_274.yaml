acceptable_outputs_summary: |
  Asks a specific clarification question that distinguishes Reading A
  (the reported ECE numbers actually point in the opposite direction
  from the headline claim — CALIGRA's calibration error is larger
  than the uncalibrated baseline's on both splits, which on a
  calibration-error metric means worse calibration, not better) from
  Reading B (the load-bearing theoretical anchor is a 2017 calibration
  result whose conclusions about temperature scaling have been
  materially narrowed by post-2020 work on ViT-class and
  VLM/open-vocabulary-detector calibration that the section does not
  engage). After clarification, addresses the chosen reading
  thoroughly: either retracting or reorienting the empirical claim
  against the actual direction of the ECE numbers, or replacing the
  stale theoretical anchor with an account grounded in the current
  calibration literature for the architecture class CALIGRA targets.

bad_outputs_summary: |
  Polishes prose, suggests more grounding benchmarks beyond RefCOCOg,
  more backbones, or a larger recalibration set. Accepts the ECE
  numbers at face value as evidence that CALIGRA improves calibration
  without noticing that 0.094 > 0.058 and 0.137 > 0.108 mean worse
  calibration on a calibration-error metric. Accepts Guo et al. (2017)
  as the currently-operative theoretical treatment for ViT-backed
  open-vocabulary grounding heads and lets the inherited
  "convergence-properties" claim stand without surfacing the
  post-2020 calibration work that has narrowed its scope. Either
  reading addressed implicitly without acknowledging the other is
  partial credit.

