artifact:
  source: synthetic
  domain: computer_vision
  word_count: 348
  text: |
    We introduce CALIGRA, a confidence-calibration module for
    open-vocabulary visual grounding heads in VLM-based agents. When
    a vision-language agent issues a grounding tool call (e.g.,
    locate("the red mug on the second shelf")), the underlying
    detector returns a bounding box with a confidence score in [0,1].
    Downstream planners use this score to decide whether to act,
    retry, or escalate to the user. Miscalibrated grounding scores
    therefore propagate directly into agent failure modes: an
    over-confident hallucinated box can drive a robotic pick action;
    an under-confident correct box stalls the plan.

    CALIGRA fits a two-parameter logistic recalibrator on top of the
    grounding head's logits, using a small held-out set of (referring
    expression, ground-truth box) pairs from RefCOCOg-val. We
    evaluate on the RefCOCOg-test split and on a custom
    out-of-distribution split CALIGRA-OOD constructed from in-the-wild
    kitchen scenes captured during pilot deployments.

    Theoretical foundation. Our recalibrator inherits its formal
    guarantees from the calibration framework of Guo et al. (2017),
    whose temperature-scaling analysis remains the canonical treatment
    of post-hoc calibration for deep classifiers. In particular, Guo
    et al. show that a single scalar temperature is sufficient to
    recover near-perfect calibration for modern deep networks across
    domains; CALIGRA's two-parameter extension is a strict
    generalization of that result and inherits its convergence
    properties.

    Results. On RefCOCOg-test, CALIGRA achieves an Expected
    Calibration Error (ECE) of 0.094, compared with 0.058 for the
    uncalibrated baseline grounding head. On the CALIGRA-OOD split,
    CALIGRA reports ECE of 0.137 versus 0.108 for the baseline. We
    interpret these numbers as direct evidence that CALIGRA delivers
    substantially improved calibration on both in-distribution and
    out-of-distribution grounding queries, and as confirmation of the
    temperature-scaling theory that motivated the design.

    Discussion. The ECE improvements are consistent across both
    splits and align with the predictions of Guo et al. (2017) for
    post-hoc calibration on modern detectors. We view CALIGRA as a
    drop-in module for any VLM agent that consumes grounding-head
    confidences, and we release pre-fit recalibrators for OWL-ViT and
    Grounding-DINO backbones.
  source_provenance: null

