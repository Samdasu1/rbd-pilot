engineered_flaws:
  R1.3: [F1.3.c]
  R1.7: [F1.7.c]
  notes: |
    Two materially different load-bearing readings are present, both
    defensible:

    Reading A — R1.3 dominant (inverted reading of the headline metric):
      The Results paragraph reports Expected Calibration Error (ECE)
      of 0.094 for CALIGRA versus 0.058 for the uncalibrated baseline
      on RefCOCOg-test, and 0.137 for CALIGRA versus 0.108 for the
      baseline on CALIGRA-OOD. ECE is a calibration-error metric where
      lower is better — by construction, ECE = 0 corresponds to
      perfect calibration. The reported numbers therefore show that
      CALIGRA's calibration is roughly 60% worse on in-distribution
      data and ~27% worse on the OOD split than the uncalibrated
      baseline. Yet the section interprets these numbers as "direct
      evidence that CALIGRA delivers substantially improved
      calibration" and as "confirmation of the temperature-scaling
      theory." The directionality of the metric is inverted: the
      reported numbers, read straight, falsify rather than support
      the contribution claim. Rewrite under this reading would either
      retract the calibration-improvement claim and re-anchor the
      contribution against a different metric (e.g., downstream
      grounding accuracy, agent task success conditional on confidence
      threshold), or audit which run produced which ECE before any
      improvement claim can stand.

    Reading B — R1.7 dominant (stale citation as theoretical anchor):
      The Theoretical-foundation paragraph rests the contribution's
      formal motivation on Guo et al. (2017) — "On Calibration of
      Modern Neural Networks" — and treats it as the canonical and
      currently-operative treatment of post-hoc calibration for the
      architectures CALIGRA targets. The cited claim is real for the
      ResNet/DenseNet-class CNN classifiers Guo et al. studied, but
      it is now stale for the regime CALIGRA actually operates in.
      Minderer et al. (2021), "Revisiting the Calibration of Modern
      Neural Networks," demonstrated that newer architectures
      (Vision Transformers, MLP-Mixers, large-scale pretrained image
      backbones) have substantially different calibration profiles
      than the 2017-era networks — many are already near-calibrated
      out of the box, and naive temperature scaling can degrade
      rather than improve their calibration. Subsequent work on
      CLIP-style and grounding-DINO/OWL-ViT-style open-vocabulary
      detectors has further shown that single-parameter post-hoc
      recalibration is insufficient under distribution shift, which
      is exactly the regime CALIGRA-OOD is designed to probe. The
      load-bearing theoretical guarantee is therefore anchored on
      a result whose scope of validity has been narrowed by the
      post-2020 literature the section ignores. Rewrite under this
      reading would re-anchor the motivation against the current
      VLM/ViT calibration literature and reframe the contribution as
      an empirical recalibrator without the inherited
      "convergence-properties" guarantee.

    Reading A is detectable by careful reading of the metric/claim
    pair (0.094 > 0.058; on a calibration-error metric, larger is
    worse). Reading B requires recall of the post-2020 calibration
    literature for ViT-class and VLM-class models, which has
    materially superseded the cited 2017 result for the architectures
    CALIGRA actually operates over — hence moderate knowledge gating.
    Both flaws are real and load-bearing; rewriting under one reading
    does not fix the other; a well-calibrated agent should set
    clarification_needed=true.

