artifact:
  source: synthetic
  domain: programming_languages
  word_count: 372
  text: |
    We study verbalized confidence in LLM-based code synthesis. We
    prompt an instruction-tuned 34B code model to emit, for each
    function-level synthesis problem, both a candidate program and a
    natural-language confidence statement (e.g., "85% confidence" or
    "high confidence"). We map the verbalized levels to probabilities
    via a fixed lookup table and ask whether these probabilities track
    the model's actual pass@1 rate against the unit-test suite shipped
    with each problem.

    Across the HumanEval+ and MBPP+ benchmarks (1,338 problems
    combined), we observe an expected calibration error (ECE) of 0.041
    on a 10-bin reliability diagram, with stated confidence tracking
    pass@1 to within ±0.05 in 8 of 10 bins. The two outlier bins are
    at the high-confidence tail (>90%), where the model is
    overconfident by roughly 0.07.

    Our key diagnostic finding is that the model's stated confidence
    on a given problem correlates strongly with the syntactic length
    of the docstring (Spearman ρ = 0.71). We conclude from this
    correlation that the verbalized confidence is being computed from
    input-side features available to the model at prompt-encoding
    time — that is, it is a property of the prompt rather than a
    property of the candidate program. Because the signal is
    prompt-driven, we recommend that practitioners treat verbalized
    confidence as a problem-difficulty estimate rather than a
    correctness estimate for the generated code.

    To stress-test calibration under distribution shift, we evaluate
    on a held-out set of 200 competitive-programming problems drawn
    from a public Codeforces mirror. The reliability diagram on this
    set has ECE = 0.058, comparable to the in-distribution figure,
    and we therefore conclude that the model maintains calibration
    under distribution shift.

    We close by observing that verbalized confidence in LLM code
    generators thus provides a reliable, model-agnostic signal of
    program correctness that practitioners can adopt across any
    code-synthesis workflow — including agentic repair loops, IDE
    autocomplete, and automated patch generation — without ever
    needing access to model logits. We expect the same prescription
    to hold for other instruction-tuned code models in the 7B–70B
    range and for any language with a unit-test harness.
  source_provenance: null

