engineered_flaws:
  R1.2: [F1.2.c]
  R1.3: [F1.3.a]
  notes: |
    Two interpretations of the load-bearing issue, both defensible:

    Reading A — R1.2 dominant (non-sequitur in the diagnostic argument):
      The diagnostic paragraph performs an unsupported inferential jump.
      The observation is that verbalized confidence correlates with
      docstring length (Spearman ρ = 0.71). From this single
      correlation, the section concludes that "the verbalized
      confidence is being computed from input-side features" and
      therefore "is a property of the prompt rather than a property
      of the candidate program." This does not follow. A correlation
      between confidence and a prompt feature is consistent with many
      mechanisms: docstring length itself correlates with intrinsic
      problem difficulty (and hence pass@1), so confidence can be
      driven by the candidate program's quality and still co-move
      with docstring length; the model could be using docstring
      length as one of many features alongside program-internal
      signals; or the correlation could reflect a mediating variable
      (problem clarity) that affects both confidence and code
      quality. The "prompt-driven, not program-driven" conclusion
      would require an intervention — e.g., holding the program
      fixed while varying docstring length, or holding the docstring
      fixed while varying generated programs — and no such
      intervention is reported. The non-sequitur is load-bearing
      because the section's prescriptive recommendation
      ("treat verbalized confidence as a problem-difficulty estimate
      rather than a correctness estimate") rests entirely on this
      single inferential leap, and inverts the operational meaning
      of the calibration result. A reader might reasonably argue
      this is the load-bearing issue: the causal story is unsupported
      and rewriting starts with either a controlled ablation or a
      retraction of the prompt-vs-program claim.

    Reading B — R1.3 dominant (overgeneralization beyond the evidence):
      The closing paragraph claims verbalized confidence provides a
      "reliable, model-agnostic signal of program correctness" that
      practitioners can adopt "across any code-synthesis workflow —
      including agentic repair loops, IDE autocomplete, and automated
      patch generation," and predicts the prescription holds "for
      other instruction-tuned code models in the 7B–70B range and
      for any language with a unit-test harness." The actual evidence
      is a single 34B model evaluated on two function-level synthesis
      benchmarks (HumanEval+, MBPP+) plus one Codeforces-derived
      held-out set, all judged by unit tests at function granularity.
      Nothing in the experiments licenses the "model-agnostic" claim
      (no second model is tested), the workflow-generality claim
      (agentic repair, autocomplete, and patch generation are
      qualitatively different tasks with different correctness
      criteria — none of them are evaluated), the cross-language
      claim (the benchmarks are Python-only), or the size-range
      claim (7B and 70B models are not evaluated). The
      contribution-defining generality claims outrun the evidence
      substantially. A reader might reasonably argue this is the
      load-bearing issue: tightening the scope of the conclusion to
      function-level Python synthesis with the evaluated model — and
      adding cross-model, cross-language, or workflow-transfer
      evidence to support whatever broader claims survive — is what
      the section actually needs.

    Both readings yield materially different rewrites. Reading A
    demands a controlled ablation on prompt vs. program features
    (or a retraction of the prompt-driven causal claim) — a fix to
    the argument's logical structure. Reading B demands restricting
    the conclusion to the evaluated regime and adding cross-model
    and cross-workflow evidence — a scope/evidence fix. A
    well-calibrated agent should set clarification_needed=true.

