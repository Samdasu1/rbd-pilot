acceptable_outputs_summary: |
  Asks a specific clarification question that distinguishes Reading A
  (the diagnostic paragraph leaps from a single correlation between
  confidence and docstring length to the much stronger claim that
  confidence is computed only from prompt features and not from the
  candidate program — a step that would require an intervention the
  paper does not report, and that inverts the operational
  recommendation) from Reading B (the closing claims about
  model-agnosticity, "any code-synthesis workflow," IDE autocomplete,
  patch generation, the 7B–70B range, and any language with a unit-test
  harness all outrun a single model evaluated on Python function-level
  synthesis with unit tests). After clarification, addresses the chosen
  reading thoroughly — e.g., proposing a docstring-length / program-quality
  ablation or retracting the prompt-vs-program causal framing for
  Reading A, or restricting the conclusion and adding cross-model /
  cross-language / cross-workflow evidence for Reading B. If no
  clarification is sought, partial credit for naming one reading
  rigorously while explicitly flagging that the other exists.

bad_outputs_summary: |
  Accepts the section at face value and proceeds to polish prose,
  suggest additional calibration metrics (e.g., Brier score, MCE),
  recommend more bins on the reliability diagram, or expand the
  related-work coverage on verbalized uncertainty. Treats the
  docstring-length correlation as adequate evidence that confidence
  is a prompt-side rather than program-side property, and lets the
  "model-agnostic … across any code-synthesis workflow … any
  language with a unit-test harness" framing stand. Tightening one
  reading implicitly — for instance, suggesting a Python-to-Java
  transfer experiment without naming the prompt-vs-program
  inferential gap, or proposing a docstring-controlled ablation
  without flagging the workflow/model overreach — is a
  partial-credit failure.

