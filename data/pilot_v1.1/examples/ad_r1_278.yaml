acceptable_outputs_summary: |
  Asks a specific clarification question that distinguishes Reading A
  (the reported engagement metric does not measure the cognitive-load
  construct the claim invokes) from Reading B (the section ignores the
  canonical body of attention-aware-computing work that defines the
  problem space). After clarification, addresses the chosen reading
  thoroughly — either tightening the claim/metric pair or re-anchoring
  the novelty positioning against the existing literature.

bad_outputs_summary: |
  Polishes prose, suggests a longer field study, more participants, or
  more τ values. Accepts CTR as a valid measure of interruption cost
  and treats the cognitive-load claim as established. Accepts the
  "new methodology" framing without surfacing the existing HCI work
  on cost-of-interruption modeling and opportune-moment notification.
  Either reading addressed implicitly without acknowledging the other
  is partial credit.

