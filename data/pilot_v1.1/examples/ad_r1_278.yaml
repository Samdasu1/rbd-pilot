artifact:
  source: synthetic
  domain: hci
  word_count: 306
  text: |
    We introduce CalmCPO, an adaptive notification agent that uses
    constrained policy optimization to balance user engagement against
    interruption cost in mobile productivity applications. The agent
    decides, at each candidate notification moment, whether to deliver,
    defer, or suppress the notification, with the goal of reducing user
    interruption load while preserving timely delivery of high-priority
    messages.

    The agent is trained with a CPO-style update that bounds an expected
    interruption-cost surrogate per session at a user-configurable
    threshold τ. Reward is shaped by per-notification engagement and a
    delay penalty; cost is the predicted probability that the user is in
    a focused work state, estimated from a logistic classifier over
    keystroke cadence, foreground app, and accelerometer features.

    We deployed CalmCPO in a four-week field study with 38 knowledge
    workers running our Android client on their primary device.
    Engagement was measured as click-through rate (CTR) on delivered
    notifications, and we compared against the device's stock
    notification scheduler.

    Results. CalmCPO achieved a CTR of 24.1%, compared with 18.7% for
    the baseline scheduler — a 5.4 percentage-point absolute improvement.
    We interpret this as direct evidence that CalmCPO reduces user
    interruption cost: by deferring notifications away from focus periods,
    the system converts low-quality interruptions into higher-quality
    ones, lowering the cognitive load of the average user's day.

    We argue that this work demonstrates the value of constraint-based
    RL for interactive systems and contributes a new methodology for
    attention-aware notification scheduling. The deployed model adds
    less than 3 ms of on-device latency per scheduling decision and
    runs entirely client-side, preserving user privacy.

    Hyperparameters and the full constraint-bound sweep over τ ∈
    {0.05, 0.1, 0.2, 0.4} are reported in Appendix B; we found τ = 0.1
    to be a good operating point and used it for the headline result
    above. Code and the per-session interaction logs (anonymized) will
    be released on acceptance.
