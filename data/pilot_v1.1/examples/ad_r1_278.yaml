engineered_flaws:
  R1.3: [F1.3.b]
  R1.7: [F1.7.b]
  notes: |
    Two interpretations of the load-bearing issue, both defensible:

    Reading A — R1.3 dominant (metric mismatch):
      The headline claim is that CalmCPO "reduces user interruption
      cost" and "lowers cognitive load." The metric actually reported
      is click-through rate (CTR) on delivered notifications — a pure
      engagement metric. CTR does not measure interruption cost or
      cognitive load; in fact, higher CTR is consistent with the system
      successfully attracting attention, which is the opposite of
      reducing interruption burden. The Results paragraph explicitly
      labels the CTR delta as "direct evidence" of cognitive-load
      reduction, but the metric simply does not measure that construct.
      Rewrite under this reading would either (a) replace the claim
      with an engagement claim that CTR can support, or (b) add an
      actual interruption-cost measurement (self-report, task-completion
      time, focus-session disruption rate) before the cognitive-load
      claim can stand.

    Reading B — R1.7 dominant (missing key prior work):
      The section positions itself as contributing "a new methodology
      for attention-aware notification scheduling" without engaging the
      canonical HCI literature on exactly this problem — Horvitz et
      al.'s notification-platform / BusyBody work on cost-of-interruption
      modeling, Mark et al.'s field studies on interruption recovery,
      and Iqbal & Bailey's work on opportune-moment notification. These
      are the load-bearing prior works that any HCI reviewer would
      expect; their absence is not a citation oversight but a framing
      problem, because the contribution stops being "new methodology"
      and becomes "a CPO-based instantiation of an established
      attention-aware scheduling agenda." Rewrite under this reading
      would re-anchor the novelty claim against the existing line of
      work and reframe the contribution as a method-level refinement
      rather than a new problem statement.

    Reading A is detectable by careful reading of the metric/claim pair.
    Reading B requires recall of canonical HCI attention-aware-computing
    references — hence moderate gating. Both flaws are real; rewriting
    under one does not fix the other; a well-calibrated agent should
    set clarification_needed=true.

