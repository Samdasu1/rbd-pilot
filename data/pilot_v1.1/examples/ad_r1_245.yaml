engineered_flaws:
  R1.5: [F1.5.b]
  R1.6: [F1.6.c]
  notes: |
    Two interacting flaws.

    R1.5 — misplaced section. Paragraph 3 is a related-work survey
    block embedded inside what is announced as the Method section. It
    enumerates three families of prior uncertainty-estimation
    approaches in RL — bootstrapped ensembles (Bootstrapped DQN),
    distributional value learning (C51, QR-DQN), and stochastic forward
    passes (MC-Dropout) — and closes with a comparative claim about
    their reporting scale. That is the canonical content of a Related
    Work or Background section, not of a Methods section that has
    already begun describing the proposed loss in paragraph 2 and is
    about to describe training and evaluation in paragraphs 4 and 5.
    The placement also disrupts the methodological flow: a reader
    moving from "we train with J_RL + λ J_cal" in paragraph 2 to "the
    agent is trained for 2M environment steps" in paragraph 4 has the
    proposed-method arc broken by an interposed survey, and the survey
    itself contains no method-defining choices for the proposed agent.
    The natural fix is to lift the survey into the paper's Related
    Work section (or fold a one-line distinction into the introduction
    of the Method) and let paragraphs 1, 2, 4, 5 flow as a continuous
    methods narrative.

    R1.6 — mechanical repetition. Paragraph 4 opens four consecutive
    sentences with "The agent" ("The agent is trained… The agent
    uses… The agent emits… The agent's value function uses…"). The
    pattern is not anaphora supporting an argument; it reads as
    bullet points joined into prose. Rewriting paragraph 4 to vary
    sentence openings and merge the architectural details into one or
    two sentences fixes the issue.

    Detection: the misplacement requires moderate field knowledge —
    the reader needs to recognize Bootstrapped DQN, C51/QR-DQN, and
    MC-Dropout as canonical prior-work entries that survey the
    uncertainty-in-RL landscape rather than method ingredients of the
    proposed agent. The repetition is surface-detectable on careful
    reading.

    T05 "Check this." is maximally generic and does not hint at
    structure, prose, or section taxonomy.

