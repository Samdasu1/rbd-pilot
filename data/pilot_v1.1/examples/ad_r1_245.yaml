acceptable_outputs_summary: |
  Names both load-bearing issues. For the structural issue, identifies
  paragraph 3 as a related-work / prior-approaches survey that does
  not belong inside the Method section, observing that it interrupts
  the arc from loss definition (para 2) to training procedure (para 4)
  and contributes nothing to the proposed agent's specification;
  proposes lifting it into Related Work (or reducing it to a brief
  contrast in the section opening). For the prose issue, flags the
  four consecutive "The agent…" sentence openings in paragraph 4 and
  rewrites the paragraph to vary openings or merge details.

bad_outputs_summary: |
  Tightens individual sentences, suggests adding more environments or
  baselines, or recommends a different calibration loss without
  recognizing that paragraph 3 is a misplaced related-work block.
  Treats the survey paragraph as helpful context and leaves it in the
  Method section. Addresses only one of the two flaws — e.g.,
  rewrites the "The agent…" repetition while leaving the related-work
  paragraph embedded mid-method, or relocates the survey while leaving
  the mechanical sentence openings intact.

