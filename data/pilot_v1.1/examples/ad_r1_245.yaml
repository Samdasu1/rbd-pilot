artifact:
  source: synthetic
  domain: reinforcement_learning
  word_count: 374
  text: |
    We consider an agent π that, in addition to selecting an action a_t
    at each step, emits a verbal confidence token c_t drawn from a
    discrete vocabulary V_c = {"unsure", "moderate", "confident"}. The
    token is decoded jointly with the action from the agent's policy
    head and is supervised against a target derived from the value
    function's TD error history at the corresponding state. Our goal is
    to recover, at deployment time, a verbal label whose associated
    empirical return distribution matches the label's stated semantics
    — that is, returns conditioned on the "confident" token should
    concentrate above those conditioned on "unsure".

    We train the joint policy with a calibration-aware loss
    J(θ) = J_RL(θ) + λ · J_cal(θ), where J_RL is a standard PPO
    objective and J_cal is the cross-entropy between the emitted
    confidence distribution and a binned target derived from the
    running standard deviation of bootstrapped value estimates. The
    coefficient λ is annealed from 0.1 to 1.0 over the first 25% of
    training to prevent the calibration term from dominating before the
    value function has stabilized.

    Prior work on uncertainty estimation in RL has largely fallen into
    three families. Bootstrapped DQN (Osband et al.) maintains an
    ensemble of Q-heads and uses head disagreement at deployment as a
    proxy for epistemic uncertainty. Distributional RL methods such as
    C51 and QR-DQN model the full return distribution, from which
    interval-style uncertainty estimates can be extracted. A third
    family, exemplified by MC-Dropout applied to value functions,
    treats stochastic forward passes as posterior samples. These
    approaches share the property that uncertainty is reported on a
    continuous scalar scale and is not directly interpretable as a
    verbal label.

    The agent is trained for 2M environment steps on the four MinAtar
    games. The agent uses a 3-layer convolutional backbone with 64
    channels per layer. The agent emits both the action distribution
    and the confidence distribution from a shared head with two output
    projections. The agent's value function uses a separate two-layer
    MLP on the same convolutional features.

    For evaluation we hold out 50K transitions from each game and
    report the expected calibration error of the verbal labels against
    the empirical return distribution, alongside the mean episode
    return. We also report the fraction of episodes in which the agent
    emits at least one "unsure" token, as a coarse measure of
    selectivity.
