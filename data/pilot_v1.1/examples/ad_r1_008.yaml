engineered_flaws:
  R1.5: [F1.5.a]    # buried contribution
  notes: |
    The actual contribution claim — that this work is a
    deployment-validated automated turn-cue system — is stated only in
    the FINAL paragraph, after four paragraphs of related work,
    methodology, and results. A reader entering the section does not
    know what the paper does until paragraph 5 of 5. The natural
    section structure for a contribution-style write-up would be:
      contribution claim (1) → context / RW (2) → method (3) → result (4)
    Here the order is:
      RW (1) → method (2) → analysis (3) → result (4) → contribution (5)
    Subtlety: the section reads naturally if you read it linearly to the
    end, but the contribution is genuinely buried — a section-level
    reorder is required, not just a sentence-level move. Many ML/HCI
    sections do bury contribution and not all readers consider this a
    flaw, which is why the example is intentionally subtle. The
    conceptual object, evidence, novelty, and prose are otherwise
    intact.

