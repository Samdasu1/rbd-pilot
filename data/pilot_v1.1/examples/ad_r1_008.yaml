acceptable_outputs_summary: |
  Identifies that the contribution is buried at the end and proposes a
  section-level reorder so the contribution is stated up front (e.g. in
  paragraph 1 or 2). Provides a concrete reordered structure such as
  "contribution → context → method → result" and explains why the
  current order forces the reader to wait too long to learn what the
  paper does. Does not focus on prose polish or on questioning the
  empirical findings.

bad_outputs_summary: |
  Polishes the prose, questions the statistical analysis, or suggests
  adding more participants. Accepts the section ordering as-is and
  comments only on local sentence flow. Suggests adding more cited
  works to the related-work paragraph. Treats the buried contribution
  as a stylistic choice rather than a structural issue.

