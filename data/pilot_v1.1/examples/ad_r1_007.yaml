engineered_flaws:
  R1.3: [F1.3.a]    # overgeneralization
  notes: |
    The opening paragraph claims "consistent state-of-the-art performance
    across all benchmarks," and the closing paragraph says the model is
    "the strongest unified segmentation model on standard benchmarks." The
    table-style numbers in paragraph 2 do NOT support this:
      - Cityscapes: surpass by 0.7 mIoU (genuine improvement)
      - ADE20K: surpass by 0.8 mIoU (genuine improvement)
      - Pascal-Context: matches the SOTA (NOT a surpass)
      - COCO-Stuff: 47.9 mIoU reported, with no comparison to prior SOTA
        (the actual ViT-Adapter / Mask2Former numbers on COCO-Stuff are
        in the 47.5–48.6 range; without the comparison the claim is
        unverifiable, and "47.9" likely sits at parity or slight
        regression)
    The "consistent SOTA across all" framing is overgeneralized; the
    evidence supports "improvement on 2 of 4, parity on 1, unverifiable
    on 1." This is F1.3.a (overgeneralization). The conceptual object,
    structure, and prose are otherwise fine.

