acceptable_outputs_summary: |
  Audits the per-benchmark numbers against the "consistent SOTA across
  all" claim. Identifies that Pascal-Context only matches (not surpasses)
  and that COCO-Stuff lacks a comparison to prior SOTA so the "consistent"
  claim is not supported. Suggests rewording to "improves on 2 of 4
  benchmarks, matches on 1, parity-or-regression on 1" or to add the
  missing COCO-Stuff comparison. Flags the "strongest unified segmentation
  model" closing as unsupported.

bad_outputs_summary: |
  Polishes the prose, suggests adding more benchmarks, or questions the
  novelty of the cross-attention module. Accepts the "consistent SOTA"
  claim at face value. Suggests adding ablations of unrelated components
  without auditing the existing claim against the existing evidence.

