artifact:
  source: synthetic
  domain: computer_vision
  word_count: 218
  text: |
    We evaluate SegMaster on four widely-used semantic segmentation
    benchmarks: Cityscapes, ADE20K, Pascal-Context, and COCO-Stuff. Our
    method achieves consistent state-of-the-art performance across all
    benchmarks, demonstrating the broad applicability of the proposed
    cross-attention refinement module.

    On Cityscapes, SegMaster reaches 84.2 mIoU, surpassing the previous
    SOTA InternImage-H (83.5) by 0.7 mIoU. On ADE20K, we achieve 56.1 mIoU
    compared to ViT-Adapter's 55.3, a 0.8 mIoU improvement. On
    Pascal-Context, our method matches the previous SOTA at 67.4 mIoU. On
    COCO-Stuff, our method reports 47.9 mIoU.

    We attribute these gains to the cross-attention refinement module,
    which selectively attends to high-confidence boundary regions and
    ignores ambiguous interior pixels. Ablation studies in Section 5
    confirm that removing this module reduces performance by 1.2 mIoU on
    average across the four benchmarks.

    We further validate generality by evaluating on the panoptic
    segmentation track of COCO-Stuff, where SegMaster achieves a panoptic
    quality (PQ) of 49.3, consistent with our segmentation results. Taken
    together, these results position SegMaster as the strongest unified
    segmentation model on standard benchmarks. We further note that the
    cross-attention refinement module is plug-compatible with existing
    segmentation backbones such as Swin-V2 and InternImage, suggesting
    broader deployment potential beyond the four benchmarks evaluated
    above. Future work will extend this evaluation to medical imaging
    benchmarks where similar refinement strategies have shown promise in
    handling boundary ambiguity at fine spatial scales.
  source_provenance: null

