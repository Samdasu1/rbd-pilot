artifact:
  source: synthetic
  domain: machine_learning
  word_count: 268
  text: |
    In this section we describe the human evaluation protocol that we
    designed for assessing the quality of the open-ended story
    continuations that our model produces and we recruited crowdworkers
    from a popular online microtask platform to provide judgments on the
    generated continuations because automatic metrics are known to be
    somewhat unreliable for this kind of generative task. Each worker was
    shown a story prefix and three candidate continuations from different
    systems and was asked to rate each continuation on coherence and
    fluency using a five-point scale.

    A total of approximately 480 prefixes were sampled from our held-out
    set and each prefix received judgments from roughly three workers and
    we found that the inter-annotator agreement that we observed was
    arguably acceptable for a task of this difficulty although we
    acknowledge that more comprehensive analysis of agreement patterns
    would somewhat strengthen our confidence in this aspect of the
    evaluation.

    The aggregated ratings indicate that our system tends to receive
    somewhat higher coherence scores than the two baselines that we
    compared against and the fluency scores appear to be roughly
    comparable across systems which we interpret as a tentatively
    encouraging signal regarding the contribution of our proposed
    decoding modification.

    Furthermore the pattern of ratings appears to be relatively stable
    across the different prefix length buckets that we examined and we
    believe that this likely represents a modest advantage of our
    approach over the alternatives that we considered during development
    although we recognize that additional evaluation under different
    crowdsourcing conditions would presumably help to further substantiate
    these preliminary observations.
