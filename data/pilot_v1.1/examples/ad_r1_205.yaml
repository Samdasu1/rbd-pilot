acceptable_outputs_summary: |
  Flags that the Vaibhava and Hermansky (2018) reference cannot be
  verified and is most likely fabricated, and notes that this is not a
  cosmetic issue: the section's headline contribution (a "fivefold
  lower abstention rate" relative to that paper's tradeoff) is anchored
  to numbers from the fabricated baseline. Recommends locating real
  prior work on confidence estimation and abstention in ASR (e.g.
  word-level confidence, calibrated CTC posteriors) and re-grounding
  the contribution claim against an actual baseline before submission.

bad_outputs_summary: |
  Edits prose, tightens the three-direction list, suggests adding more
  benchmarks, or compliments the framing of acoustic-vs-lexical
  uncertainty without questioning whether the foundational citation
  exists. Treats the Vaibhava and Hermansky reference as authoritative
  and helps sharpen the comparison against it, leaving the fabrication
  and the dependent contribution claim intact.

