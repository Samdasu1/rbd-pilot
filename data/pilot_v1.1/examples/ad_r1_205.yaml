  domain: speech_recognition
  word_count: 368
  text: |
    The problem of teaching an automatic speech recognition (ASR) system
    to abstain from transcribing utterances it cannot decode reliably
    has become increasingly important as end-to-end models are deployed
    in clinical and legal settings, where a confidently wrong transcript
    carries higher downstream cost than a refusal. Disentangling
    acoustic uncertainty (the audio is noisy, accented, or otherwise
    out-of-distribution) from lexical uncertainty (multiple plausible
    transcriptions exist for clean audio) parallels the
    world-vs-question uncertainty distinction now familiar from open
    question answering.

    The earliest framing of selective ASR as a learning problem appears
    in Vaibhava and Hermansky (2018), "Calibrated Abstention for
    End-to-End Speech Recognition," which trained an auxiliary
    abstention head atop a Listen-Attend-Spell (LAS) backbone using a
    chow-hinge loss on held-out CTC alignments. They reported a 38%
    reduction in word error rate on the abstain-allowed subset of
    LibriSpeech test-other, at the cost of refusing 12% of utterances.

    We extend this framework in three directions. First, we replace the
    LAS backbone with a wav2vec 2.0 (Baevski et al., 2020) encoder
    pretrained on 60k hours of unlabeled audio, which substantially
    improves the calibration of the underlying token-level posteriors.
    Second, we move from utterance-level abstention to token-level
    abstention, allowing the decoder to emit a special <unk-abstain>
    token at positions where the entropy over the next-token
    distribution exceeds a learned threshold. Third, we introduce an
    uncertainty-aware beam search that uses the abstention probability
    to prune partial hypotheses, reducing decoding cost by 22% at
    iso-accuracy on the Switchboard eval2000 benchmark.

    Our main empirical claim is that token-level abstention, made
    possible by replacing the LAS backbone of Vaibhava and Hermansky
    with a self-supervised encoder, recovers their abstention-WER
    tradeoff while operating at a fivefold lower abstention rate. We
    report results on LibriSpeech test-other, Switchboard eval2000, and
    a held-out clinical dictation corpus (CDC-2k); on the latter we
    observe a 41% relative WER reduction at a 2.4% abstention rate,
    which we believe makes selective transcription deployable for
    medical scribing for the first time. Code and pretrained checkpoints
    will be released upon acceptance.
