engineered_flaws:
  R1.7: [F1.7.a]
  notes: |
    The load-bearing citation "Vaibhava and Hermansky (2018), 'Calibrated
    Abstention for End-to-End Speech Recognition'" is fabricated. Hynek
    Hermansky is a real, prominent speech scientist (PLP features,
    modulation spectrogram work) and "Vaibhava" evokes Vaibhava Goel
    (IBM speech), so the author surnames pattern-match to plausible
    co-authors, but no such 2018 paper on a calibrated abstention head
    over a LAS backbone exists. The fabrication is load-bearing in two
    ways: (a) the section presents this paper as the foundational
    framing of selective ASR as a learning problem, and (b) the central
    contribution claim ("recovers their abstention-WER tradeoff while
    operating at a fivefold lower abstention rate") is a head-to-head
    delta against numbers from this nonexistent baseline, so removing
    or correcting the citation invalidates the contribution claim.
    Detection requires recall of canonical ASR scholarship — a careful
    reader unfamiliar with the field can find the section internally
    coherent. Real prior work on confidence/abstention in ASR (Jiang
    2005 word-confidence; Hermansky's actual modulation work; CTC
    confidence-style methods) is not cited; this is a fabrication
    flaw rather than a missing-citation flaw, but the two interact.

