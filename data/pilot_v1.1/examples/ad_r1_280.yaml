engineered_flaws:
  R1.2: [F1.2.a]
  R1.3: [F1.3.a]
  notes: |
    Two interpretations of the load-bearing issue, both defensible:

    Reading A — R1.2 dominant (hidden premise in the numerical argument):
      The convergence claim rests on a quietly inserted gap. The section
      invokes Gershgorin to assert ρ(αB) ≤ 1 with α = 1/||B||_∞, then
      treats this as if it justified convergence of Richardson iteration.
      But Richardson convergence requires ρ < 1 strictly — the boundary
      case ρ = 1 is exactly what occurs when a judge exhibits strong
      self-preference (a row of B near all-ones drives α||B||_∞ → 1 and
      ρ → 1). The "numerically tractable" headline thus rests on a
      hidden premise — that B is bounded away from this regime — which
      is never stated, never checked, and is in fact violated precisely
      in the cases the method most needs to handle. Additionally, c is
      described as "chosen so that 1^T β = 0" but is never given as a
      function of the data; the fixed point depends on c, so the entire
      recovery is underdetermined unless c is pinned down. A reader
      might reasonably argue this is the load-bearing issue: the central
      numerical claim is unsupported once the hidden premise is named.

    Reading B — R1.3 dominant (overgeneralization beyond evidence):
      The closing sentence claims the method is a "drop-in diagnostic
      for any modern LLM judge without per-model calibration." The
      evidence is three judge families, one held-out human-bias dataset,
      and an r = 0.81 correlation. None of this licenses universality
      across the population of "modern LLM judges," nor does it license
      the no-calibration-needed claim — the experiments do not include
      any cross-judge transfer of α or c. A reader might reasonably
      argue this is the load-bearing issue: the contribution-defining
      generality claim outruns the evidence by a wide margin, and
      tightening the scope is what the section actually needs.

    Both readings yield materially different rewrites. Reading A demands
    a corrected convergence analysis (and a specification of c) — a
    technical fix to the numerical core. Reading B demands restricting
    the conclusion and adding cross-model transfer experiments — a
    scope/evidence fix. A well-calibrated agent should set
    clarification_needed=true.

