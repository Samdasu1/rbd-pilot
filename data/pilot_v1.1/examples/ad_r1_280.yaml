artifact:
  source: synthetic
  domain: numerical_analysis
  word_count: 332
  text: |
    We analyze the numerical conditioning of a fixed-point iteration for
    recovering self-preference bias coefficients from pairwise LLM-judge
    comparisons. Given a judge model J and a candidate pool of K responses,
    we form an empirical preference matrix B ∈ R^{K×K} whose entry B_ij
    is the rate at which J prefers response i to response j across N
    independent comparisons. The self-preference bias vector β ∈ R^{K}
    is then defined as the fixed point of the affine system
    β = αBβ + c, with step size α ∈ (0, 1) and centering vector c chosen
    so that 1^T β = 0. We solve this by Richardson iteration and report
    convergence in fewer than 30 sweeps across all our experiments.

    The convergence rate is governed by ρ(αB), the spectral radius of
    the iteration matrix. We set α = 1 / ||B||_∞, which by the Gershgorin
    disc theorem ensures ρ(αB) ≤ 1, and we observe that the iteration
    converges to a relative residual of 10^{-6} in between 12 and 28
    sweeps across our three benchmark judge families: a GPT-4-class
    model, a Claude-class model, and a 70B open-weights model. This
    confirms that fixed-point recovery of bias coefficients is a
    numerically tractable problem for current LLM-as-judge pipelines.

    The preference rates B_ij are estimated from N = 200 comparisons per
    cell, where each comparison strips authorship metadata before
    presenting the candidate pair to J. The recovered β_i is interpreted
    as the additive bias the judge applies when scoring response i
    relative to a uniform baseline.

    In our experimental evaluation, recovered β values correlate at
    r = 0.81 with a held-out set of human-rated bias scores collected by
    Chen et al. (2024), and the recovery error stays below 5% relative
    L2 across all three families. We therefore conclude that the
    fixed-point iteration provides a stable, accurate, and broadly
    applicable mechanism for self-preference bias estimation, and that
    it can be used as a drop-in diagnostic for any modern LLM judge
    without per-model calibration.
