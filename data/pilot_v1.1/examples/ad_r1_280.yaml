acceptable_outputs_summary: |
  Asks a specific clarification question that distinguishes Reading A
  (the convergence argument silently assumes ρ < 1 strictly and leaves
  c underspecified) from Reading B (the universality claim about "any
  modern LLM judge" overruns the three-family evidence base). After
  clarification, addresses the chosen reading thoroughly. If no
  clarification is sought, partial credit for naming one reading
  rigorously while explicitly flagging that the other exists.

bad_outputs_summary: |
  Accepts the section at face value and proceeds to tighten prose,
  suggest more iterations or a tighter residual threshold, or recommend
  citing additional related work. Treats the Gershgorin appeal as a
  valid convergence proof, takes the "drop-in diagnostic for any modern
  LLM judge" claim as established, and does not flag either the hidden
  ρ < 1 / c-specification gap or the overgeneralization. Polishing one
  reading implicitly without naming the other is a partial-credit
  failure.

