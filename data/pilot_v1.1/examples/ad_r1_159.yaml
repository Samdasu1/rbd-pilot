  samples, recommends additional metrics (e.g. xCOMET) be evaluated,
  or proposes tightening the regression specification. Accepts the
  paragraph order as-is and comments only on sentence-level flow or
  on adding citations to the related-work paragraph, treating the
  delayed contribution statement as an acceptable stylistic choice
