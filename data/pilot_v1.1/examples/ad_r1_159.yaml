acceptable_outputs_summary: |
  Identifies that the contribution claim is buried in the final
  paragraph and proposes a section-level reorder so the proposed
  debiasing procedure and its ranking-changing impact are stated up
  front (paragraph 1 or 2). Provides a concrete reordered structure
  such as "contribution → motivation → method → coefficient results
  → ranking impact" and explains that the current ordering forces the
  reader to wait until the end to learn what the paper actually
  proposes.

bad_outputs_summary: |
