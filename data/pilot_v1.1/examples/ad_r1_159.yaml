engineered_flaws:
  R1.5: [F1.5.a]
  notes: |
    The section's actual contribution — a regression-based post-hoc
    debiasing procedure for neural MT metrics that reorders WMT-23
    system rankings — is stated only in the FINAL paragraph, after
    five paragraphs of related-work framing, motivation, methodology,
    coefficient results, and ranking-shift analysis. A reader entering
    the section does not learn what the paper proposes until paragraph
    6 of 6. The natural ordering for a contribution-style write-up
    would be:
      contribution claim (1) → context / motivation (2) →
      method (3) → coefficient results (4) → ranking impact (5)
    Here the order is:
      RW (1) → bias evidence from prior work (2) → data + method (3) →
      coefficients (4) → ranking impact (5) → contribution (6)
    Subtlety: the section reads as a coherent narrative when read
    linearly, and many empirical-MT sections do bury their pitch under
    related-work framing — so the buried contribution will not stand
    out as a "wrong fact." Only a section-level reorder fixes it; no
    sentence-level edit suffices. Conceptual object, evidence chain,
    novelty, and prose are otherwise intact, and detection requires
    only careful reading (low gating). Delegation T03 "Make this
    stronger." is generic and does not signal R1.5.

