artifact:
  source: synthetic
  domain: machine_translation
  word_count: 312
  text: |
    Neural metrics such as COMET, BLEURT, and learned MT-QE estimators
    have largely supplanted BLEU as the default scoring tool for
    machine-translation system comparison. Freitag et al. and the
    WMT metrics shared task have repeatedly shown that learned metrics
    correlate more strongly with human MQM judgements than n-gram
    metrics, and that they are now the recommended default for system
    ranking.

    A recurring concern, however, is that learned metrics inherit
    confounders from their training data. Recent analyses have
    documented sensitivity to surface attributes — output length,
    punctuation density, and named-entity overlap — that are only
    weakly related to translation adequacy. In a particularly clear
    example, Kocmi and colleagues report that COMET-22 systematically
    over-rewards hypotheses that match the reference's token count to
    within 5%, even when adequacy is held constant by professional
    re-rating.

    To probe this further we collected 18,400 segment-level human MQM
    ratings across English↔German and English↔Chinese WMT-23 systems
    and re-scored each hypothesis with COMET-22, BLEURT-20, and
    MetricX-23. We then fit a partial-residual regression of metric
    score on adequacy rating, treating hypothesis length ratio,
    punctuation density, and reference-overlap as nuisance covariates.

    The fitted coefficients show a residual length-ratio effect of
    +0.041 COMET points per 10% increase in length ratio, even after
    adequacy is partialled out. Punctuation density contributes a
    smaller but non-zero +0.012 per standard deviation. The MetricX
    estimator shows roughly half the length sensitivity of COMET but
    a larger entity-overlap bias.

    Applying our debiased scores to the WMT-23 system rankings reorders
    4 of 14 system pairs in EN→DE and 3 of 12 in EN→ZH, with the
    reordered pairs concentrated among systems with notably short or
    long average outputs.

    In summary, the contribution of this work is a regression-based
    post-hoc debiasing procedure that adjusts neural MT metric scores
    for length, punctuation, and entity-overlap confounds and that
    measurably changes published WMT-23 system rankings.
  source_provenance: null

