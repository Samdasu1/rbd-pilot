engineered_flaws:
  R1.5: [F1.5.b]
  notes: |
    Misplaced section. Paragraph 2 — the "disagreement-as-novelty"
    finding from the validation set, including the 63% statistic on
    rare-transient confirmation — is an empirical result that
    presupposes (a) the three-classifier pipeline (introduced in
    paragraph 3), (b) the ZTF/TNS evaluation set (paragraph 4), and
    (c) the macro-F1 results that establish the pipeline's baseline
    behavior (paragraph 5). Stated up front, before any method or
    dataset has been described, the paragraph references "our three
    member classifiers" and "our validation set" without antecedent
    and asks the reader to take the headline result on faith.
    Structurally it belongs adjacent to or just after paragraph 5
    (results) and before paragraph 6 (interpretation), where it
    would function as a secondary finding feeding the
    representational-diversity argument. The flaw is a single
    discrete misplacement (one paragraph in the wrong slot), not a
    pervasive reordering, distinguishing it from F1.5.c. The flaw is
    detectable from careful reading alone — no canonical-recall
    knowledge of any specific astronomy paper is required (low
    gating). The T06 delegation "Take a look at this paragraph." is
    generic and does not signal R1.5 specifically.

