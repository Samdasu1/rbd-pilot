acceptable_outputs_summary: |
  Identifies that the second paragraph — the validation-set finding
  about classifier disagreement and the 63% rare-transient rate — is
  out of place because it presents an empirical result before the
  pipeline, dataset, and baseline results that the result depends on.
  Recommends moving that paragraph to follow the results paragraph
  (just before the closing interpretation), so the reading order
  becomes motivation → method → data → headline results →
  disagreement-as-novelty finding → interpretation. Frames the fix as
  a discrete relocation of one paragraph, not a wholesale rewrite.

bad_outputs_summary: |
