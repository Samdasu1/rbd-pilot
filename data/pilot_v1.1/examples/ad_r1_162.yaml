artifact:
  source: synthetic
  domain: astronomy
  word_count: 304
  text: |
    Time-domain surveys such as ZTF and the forthcoming Rubin Observatory
    produce alert streams of order 10^6 transient candidates per night.
    Filtering these candidates into astrophysically interesting
    subclasses — supernovae, kilonovae, AGN flares — requires automated
    classifiers that operate within minutes of detection. Recent work by
    Möller et al. and Sánchez-Sáez et al. has argued for ensembles of
    complementary classifiers over single deep models, motivated by the
    observation that no single architecture generalizes across all
    transient classes.

    A notable finding in our validation set is that classifier
    disagreement itself acts as a flag for novelty: 63% of objects on
    which our three member classifiers maximally disagreed were later
    confirmed as rare or peculiar transients — calcium-rich gap
    transients, AT2018cow analogues, or interacting Type IIn SNe. This
    suggests broker logic should treat disagreement as a positive signal
    rather than discarding ambiguous alerts to a low-priority queue.

    Our pipeline, RubinTriage, combines a gradient-boosted tree on
    hand-crafted light-curve features, a recurrent network on irregularly
    sampled photometry, and a contrastive image classifier on
    difference-image cutouts. The three classifiers' posterior
    distributions are aggregated using a stacked logistic meta-learner
    trained on a held-out spectroscopic sample.

    We evaluate RubinTriage on 18 months of ZTF alerts cross-matched
    against TNS classifications. The training set contains 41,200
    spectroscopically confirmed transients across 14 classes; the
    held-out test set contains 5,300 alerts.

    RubinTriage achieves a macro-F1 of 0.81 across the 14 classes,
    outperforming each individual classifier by 4-7 F1 points and
    matching the published Alerce broker on the four classes Alerce
    reports. On rare classes (TDEs, kilonovae candidates) where
    individual classifiers collapse to 0.3 F1, the ensemble reaches 0.55.

    The gain is concentrated in classes where the three architectures'
    inductive biases capture different aspects of the alert — light-curve
    shape, image morphology, contextual features — suggesting that
    ensemble design for transient triage should explicitly maximize
    representational diversity rather than only voting accuracy.
