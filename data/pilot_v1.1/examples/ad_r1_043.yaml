engineered_flaws:
  R1.4: [F1.4.c]
  notes: |
    Modified-real from paper 4 results frontier. Rhetorical novelty
    injected. Para 2: "the first analytical tool to expose
    feasibility-vs-stringency tradeoffs in V2G scheduling." Para 3:
    "This is a meaningful methodological contribution. Whereas prior
    work has reported aggregate commitment statistics, our frontier
    captures the tail-risk behavior". Para 4 closing: "the
    contribution is the frontier methodology itself, applicable to
    any commitment-bound stochastic scheduling problem."

    The reliability frontier is conceptually similar to standard
    survival functions / CVaR / chance-constrained programming —
    well-established tools in stochastic optimization. The original
    paper's analysis_framework explicitly cites Rockafellar's CVaR
    paper and frames the frontier as "analogous to a survival function
    and shares motivation with tail-risk measures like CVaR". The
    modified version drops this acknowledgment and reframes the tool
    as novel. The rhetorical novelty (claiming "first analytical
    tool", "meaningful methodological contribution") substantially
    overstates the originality. Detection: visible from the section
    itself if the reader is familiar with general survival-function
    framing — low gating since the framing-vs-actual-novelty mismatch
    can be seen from the section's own claims. T03 generic.

