artifact:
  source: modified-real
  domain: power_systems_v2g
  word_count: 207
  text: |
    Beyond aggregate means, market participation requires that commitment
    exceed a minimum threshold with high probability. Using the
    reliability curve defined in the analysis framework, this section
    plots each strategy's feasibility rate as a function of the
    commitment threshold.

    Our reliability frontier is the first analytical tool to expose
    feasibility-vs-stringency tradeoffs in V2G scheduling. By plotting
    the cumulative distribution of commitment against threshold, the
    frontier reveals sharp crossover points that map directly to
    market eligibility. The curves reveal that PPO drops to 0%
    feasibility at threshold 0.50, CMDP at threshold 0.55, while the
    combined strategy sustains 100% feasibility through threshold 0.95.

    This is a meaningful methodological contribution. Whereas prior
    work has reported aggregate commitment statistics, our frontier
    captures the tail-risk behavior that determines whether a strategy
    can serve high-commitment markets. The frontier reveals that
    learned constraints offer no practical advantage over the
    unconstrained baseline.

    For ancillary services requiring threshold ≥ 0.90, only the
    combined strategy and predictive LP qualify, with combined
    achieving full eligibility across all seeds and markets. PPO and
    CMDP cannot serve these markets at all under our deployment
    protocol. The reliability frontier provides a unifying tool for
    matching strategy to market: the contribution is the frontier
    methodology itself, applicable to any commitment-bound stochastic
    scheduling problem.
  source_provenance: paper_4_isgt_results_frontier_modified

