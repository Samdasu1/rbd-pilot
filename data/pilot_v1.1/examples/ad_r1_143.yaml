engineered_flaws:
  R1.4: [F1.4.a]
  notes: |
    Unsupported novelty. The section makes three escalating "first"
    claims: (1) "the first method that equips a vision transformer with
    an internal self-evaluation head"; (2) "the first demonstration that
    a vision transformer can be trained to introspect on its own
    classification decisions"; (3) "the first introspective head
    architecture for ViTs." All three sit on top of an extensive
    confidence-estimation and failure-prediction literature for image
    classifiers — ConfidNet (Corbière et al., 2019) trains an auxiliary
    head to predict true class probability for failure detection;
    "Trust Your Model" / DOCTOR-style methods, learned abstention heads,
    and selective-classification work (Geifman & El-Yaniv) all train
    auxiliary correctness predictors decoupled from softmax. Extending
    this to ViT backbones is incremental, not foundational. Detecting
    the flaw requires recognizing that auxiliary correctness-prediction
    heads are an established sub-area (moderate gating) — the artifact's
    methodology, numbers, and selective-prediction setup are all
    internally consistent; only the novelty positioning is broken.

