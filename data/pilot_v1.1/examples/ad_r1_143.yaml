acceptable_outputs_summary: |
  Identifies the unsupported "first" claims and notes that auxiliary
  correctness-prediction heads on top of frozen classifiers are an
  established line of work (e.g. ConfidNet, learned selective-prediction
  / abstention heads, failure-prediction literature). Suggests reframing
  the contribution to a defensible delta — for example, extending such
  heads to ViT [CLS] representations or characterizing behavior under
  ImageNet-C — rather than claiming categorical firsts.

bad_outputs_summary: |
  Polishes the prose, suggests reporting additional metrics (ECE, more
  ImageNet-C severities), or asks for a larger backbone, while accepting
  the three "first" claims at face value. Praises SelfProbe as a novel
  primitive and may even suggest sharpening the novelty language further
  without naming any nearest-neighbor prior work.

