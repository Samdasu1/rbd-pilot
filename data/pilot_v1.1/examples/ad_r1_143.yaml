delegation: "Make this stronger."

artifact:
  source: synthetic
  domain: computer_vision
  word_count: 348
  text: |
    Modern vision transformers (ViTs) trained for image classification
    produce confidence scores that are widely known to be miscalibrated,
    particularly under distribution shift. In this work we ask a related
    but distinct question: can a ViT classifier be made to *know what it
    knows* — that is, to produce a self-assessment of whether its top-1
    prediction is correct, separately from the softmax confidence itself?

    We introduce SelfProbe, the first method that equips a vision
    transformer with an internal self-evaluation head capable of predicting
    its own correctness on a per-example basis. SelfProbe attaches a small
    two-layer MLP to the [CLS] token representation of a frozen ViT-B/16
    backbone and is trained on a held-out split of ImageNet to predict the
    binary "was the top-1 prediction correct" signal. At inference time,
    SelfProbe outputs a scalar in [0,1] that is interpreted as the model's
    self-estimated probability of being correct on that input.

    On ImageNet-Val, SelfProbe achieves an AUROC of 0.847 for
    correct-vs-incorrect separation, substantially above the 0.781 obtained
    by thresholding the raw softmax confidence. On ImageNet-C (severity 3),
    SelfProbe maintains an AUROC of 0.792, while raw-softmax thresholding
    drops to 0.703. To our knowledge, this is the first demonstration that
    a vision transformer can be trained to introspect on its own
    classification decisions in a manner decoupled from softmax confidence.

    We further show that the self-estimated correctness signal is useful
    downstream: in a selective-prediction setting where the model is
    allowed to abstain on 20% of inputs, routing by SelfProbe's score
    yields a 3.1-point accuracy gain on the answered subset compared to
    routing by softmax. This establishes SelfProbe as a novel primitive
    for trustworthy vision systems and the first introspective head
    architecture for ViTs.

    Taken together, our results show that explicit self-evaluation,
    long studied in the language-model literature, is now available for
    image classifiers as well, and we expect SelfProbe to be a useful
    building block for downstream selective-prediction and
    abstention-aware vision pipelines.
  source_provenance: null

