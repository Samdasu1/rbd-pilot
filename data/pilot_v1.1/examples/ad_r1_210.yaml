  domain: medical_imaging
  word_count: 340
  text: |
    Selective classification—the ability of a model to abstain on
    uncertain inputs—is increasingly central to clinical deployment of
    medical imaging systems. In chest X-ray triage, where false
    reassurance carries direct patient harm, a model that defers
    ambiguous cases to a radiologist may be preferable to one that
    always commits. We study selective classification for
    fourteen-pathology chest X-ray classification on the ChestX-ray14
    benchmark (Wang et al., 2017), focusing on the trade-off between
    coverage and risk.

    Prior work on selective prediction in medical imaging is relatively
    sparse. Geifman and El-Yaniv (2017) introduced the SelectiveNet
    framework for general image classification, learning a
    coverage-conditional classifier and selection function jointly.
    Their formulation has since been extended to natural-image domains,
    but adaptation to medical imaging requires care: pathology priors
    are skewed, calibration error is higher, and the cost of
    over-confident predictions is asymmetric. Liu and Zhang (2019)
    directly addressed this gap, reporting 91.2% AUROC at 50% coverage
    on ChestX-ray14 using a deep-ensemble abstention strategy combined
    with temperature scaling, and remain, to our knowledge, the only
    published benchmark for selective classification on this dataset
    prior to our work.

    Our approach, RadAbstain, replaces deep ensembles with a single-pass
    evidential head trained with a Dirichlet-prior loss. This eliminates
    the K-fold inference cost of ensembles while preserving uncertainty
    quality. We jointly train the pathology head and the abstention head
    on the official ChestX-ray14 train split, using the patient-level
    test split for evaluation.

    At 50% coverage, RadAbstain achieves 87.4% AUROC averaged across the
    fourteen pathologies, which we report as the strongest published
    result on this benchmark to date. At full coverage, the method
    matches the underlying classifier's accuracy, confirming that the
    abstention head adds no in-distribution penalty. Per-pathology
    results (Table 2) show consistent gains over the no-abstention
    baseline of Wang et al., with the largest improvements on Pneumonia
    and Edema, where label noise is highest.

    These results establish single-pass evidential abstention as a
    practical alternative to ensembling for medical imaging triage,
    especially under inference-budget constraints typical of hospital
    deployment.
