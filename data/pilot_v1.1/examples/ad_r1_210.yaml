acceptable_outputs_summary: |
  Flags that the cited Liu and Zhang (2019) result of 91.2% AUROC at 50%
  coverage on ChestX-ray14 directly contradicts the section's own claim
  of 87.4% AUROC as "the strongest published result on this benchmark
  to date," and notes that the citation appears fabricated or at minimum
  cannot stand alongside the contribution claim. Recommends verifying
  the cited paper exists and, if it does not, removing the citation and
  rephrasing the priority claim; if it does, repositioning RadAbstain
  against it on a different axis (efficiency, single-pass cost) rather
  than headline AUROC.

bad_outputs_summary: |
  Polishes prose, suggests adding more pathologies or clinical-deployment
  framing, or praises the related-work coverage without noticing that
  the Liu and Zhang (2019) number (91.2%) is higher than the proposed
  method's number (87.4%) and therefore breaks the "strongest published"
  claim. Adds peripheral citations on uncertainty calibration without
  flagging the fabricated/inconsistent prior-work attribution.

