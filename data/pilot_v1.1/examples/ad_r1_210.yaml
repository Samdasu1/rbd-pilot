engineered_flaws:
  R1.7: [F1.7.a]
  notes: |
    Fabricated citation with internal-inconsistency tell (visible without
    external knowledge). Para 2 attributes to "Liu and Zhang (2019)" a
    deep-ensemble abstention result of 91.2% AUROC at 50% coverage on
    ChestX-ray14, framed as "the only published benchmark for selective
    classification on this dataset prior to our work." Para 4 then
    reports the proposed RadAbstain method achieving 87.4% AUROC at 50%
    coverage and asserts this as "the strongest published result on
    this benchmark to date." 87.4 < 91.2, so the section's own cited
    prior number contradicts the contribution claim. The Liu and Zhang
    (2019) citation is fabricated; a careful reader does not need to
    verify its existence in any external index — the numerical
    contradiction inside the section already signals that either the
    citation's reported result is invented or the headline contribution
    claim is wrong. Detection requires only side-by-side reading of
    para 2 and para 4, hence low knowledge_gating. The conceptual
    object (selective classification on ChestX-ray14), the method
    description (single-pass evidential head vs. deep ensembles), and
    the experimental setup are otherwise coherent — only the prior-work
    attribution is broken, and the contribution claim is downstream of
    that break. Delegation T10 is generic.

