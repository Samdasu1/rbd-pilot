engineered_flaws:
  R1.5: [F1.5.b]
  notes: |
    Misplaced section content. The third paragraph ("The pathology of
    vanilla PINNs is by now well documented...") is a related-work
    block — five sentences surveying Krishnapriyan 2021, Wang/Yu/
    Perdikaris 2022, Rahaman 2019, Tancik 2020, and Wang 2021 — that
    belongs in the paper's Related Work / Background section, not in
    Method. It does not introduce any component of SP-PINN, does not
    derive any equation used later, and is not referenced by paragraphs
    1, 2, or 4. Its presence here breaks the method narrative: the
    reader leaves paragraph 2 mid-derivation (gradient balancing) and
    must re-enter the method thread three sentences later in
    paragraph 4 (training loop).
    The fix is structural — extract the entire third paragraph and
    relocate it to Related Work — not a sentence-level rewrite. A
    reader who only polishes prose or trims citations will not address
    the underlying placement problem.
    Knowledge gating is moderate: detecting the misplacement requires
    knowing that Krishnapriyan/Wang/Rahaman/Tancik are canonical
    related-work citations in the PINN/spectral-bias literature, and
    that physics-informed ML papers conventionally separate prior-work
    failure-mode discussion from the method's own derivation. A reader
    without this background may read the paragraph as legitimate
    motivating material. Delegation T10 ("Help me with this section.")
    is generic and does not signal R1.5.

