artifact:
  source: synthetic
  domain: physics_informed_ml
  word_count: 363
  text: |
    Physics-informed neural networks (PINNs) approximate the solution
    u(x,t) of a partial differential equation by training a network u_θ
    to minimize a composite loss with boundary, initial, and PDE-residual
    terms. We propose SP-PINN (Spectral-Preconditioned PINN), which
    targets the spectral bias of coordinate MLPs by inserting a learnable
    Fourier feature mapping φ(x) = [cos(Bx), sin(Bx)] before the first
    hidden layer, where the entries of B are initialized from a Gaussian
    and refined via meta-gradient updates during training.

    Concretely, we minimize L = λ_d L_data + λ_b L_bc + λ_r L_residual,
    with L_residual = (1/N) Σ |𝒩[u_θ](x_i, t_i)|² and 𝒩 the differential
    operator of the PDE. The scalar coefficients λ_d, λ_b, λ_r are set by
    the gradient-balancing scheme of Wang et al. (2022) so that no single
    term dominates the parameter update.

    The pathology of vanilla PINNs is by now well documented.
    Krishnapriyan et al. (2021) showed that PINNs frequently fail on
    convection-dominated problems and proposed curriculum and
    sequence-to-sequence remedies. Wang, Yu, and Perdikaris (2022)
    attributed these failures to imbalanced gradient flows between loss
    components and introduced gradient-norm-based balancing. Rahaman et
    al. (2019) analyzed the broader spectral bias of MLPs, showing that
    low-frequency modes are learned first. Tancik et al. (2020)
    demonstrated that random Fourier features mitigate this bias in
    coordinate-based regression, and Wang et al. (2021) extended the
    Fourier-feature analysis to PDE settings via the eigenstructure of
    the neural tangent kernel.

    Training alternates between (i) a standard Adam step on the network
    parameters θ with B held fixed, and (ii) a meta-gradient step that
    updates B by differentiating through k=5 inner optimization steps of
    the residual loss. We use an inner learning rate of 1e-3 and a meta
    learning rate of 1e-4 throughout. Sampling of collocation points
    follows the residual-adaptive sampling of Wu et al. (2023): at each
    epoch we draw 2N candidate points uniformly in the domain and retain
    the N points with the largest current residual. Pseudocode for the
    full procedure is given in Algorithm 1, and we provide a derivation
    of the meta-gradient in Appendix A.
