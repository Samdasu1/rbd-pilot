acceptable_outputs_summary: |
  Notices that the section advertises three different contributions —
  a denotational semantics, an inference-as-default system, and a
  Python library wrapping sample/observe — and asks the authors to
  commit to one before the section can be evaluated. Separately
  flags that the "first PPL semantics" and "first inference-as-default
  system" claims are asserted without comparison to existing
  programmable-LLM and PPL-over-LLM frameworks (e.g. LMQL, DSPy,
  Outlines, Gen / Anglican-style work over LLM samples) and asks for
  a precise delta against the closest prior system, which axis the
  delta is on, and what evidence supports it.

bad_outputs_summary: |
  Polishes the prose, suggests adding a figure of the architecture or
  another benchmark, and treats the three contribution sentences as
  consistent restatements rather than as different objects. Accepts
  the "first PPL semantics" and "first inference-as-default" claims
  at face value, perhaps requesting a small literature paragraph
  without challenging whether the novelty claim survives once
  programmable-LLM frameworks are named.

