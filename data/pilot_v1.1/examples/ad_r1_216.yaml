artifact:
  source: synthetic
  domain: probabilistic_programming
  word_count: 332
  text: |
    We introduce DialogueProb, a probabilistic programming language for
    inference over role-played multi-agent dialogues with large language
    models. Communicative agents bound by inception-prompt protocols
    generate stochastic conversational trajectories, and our central
    contribution is the first PPL semantics that compositionally handles
    role-induced agent stochasticity. Each agent utterance is treated as
    a sample from a (role, history, template)-conditioned distribution,
    and inception prompts are interpreted denotationally as conditioning
    operators on the joint trajectory measure.

    In §3 we instantiate this semantics on top of a standard
    importance-sampling backend. With a proposal trained to imitate
    role-conditioned agents, DialogueProb matches the wall-clock cost of
    vanilla LLM-agent simulators on AgentBench-Coop, RolePlay-1k, and
    MAS-Eval, while additionally returning calibrated posterior estimates
    over agent trajectories. To our knowledge, this is the first system
    to provide inference-as-default for communicative-agent simulations:
    prior frameworks for multi-agent LLM role-play treat the simulation
    as a forward generative process, not as a probabilistic program one
    can condition on partial observations.

    Three properties emerge from the framework. First,
    partial-observation queries — conditioning on a single agent's final
    answer and inferring the latent intermediate dialogue — are
    expressible without bespoke inference code. Second, importance
    weights over trajectories give a principled handle on selection bias
    in agent self-play data. Third, the guide-network proposal can
    itself be a fine-tuned LLM, bringing amortized inference to bear on
    dialogues without requiring custom variational families.

    The artifact we release is a Python library: practitioners declare
    their role-play protocol with sample / observe primitives bound to a
    role-prompted LLM, and obtain posterior estimates over agent
    trajectories with only a few additional lines of code. We see
    DialogueProb as taking a first step toward making
    programmable-inference tooling — long standard in the PPL community
    — available for the rapidly growing landscape of multi-agent LLM
    systems, and we expect our denotational account to clarify what it
    means for two role-play protocols to be inference-equivalent.
  source_provenance: null

