engineered_flaws:
  R1.1: [F1.1.b]    # contribution slip across paragraphs
  R1.4: [F1.4.a]    # unsupported novelty: bare "first" claims, no positioning
  notes: |
    R1.1 — contribution slip. The load-bearing claim of the section
    drifts across three different objects:
    (i) Para 1 advertises "the first PPL semantics that compositionally
        handles role-induced agent stochasticity" — a denotational /
        theoretical contribution about meaning and conditioning
        operators over trajectory measures.
    (ii) Para 2 silently re-anchors the contribution as "the first
        system to provide inference-as-default for communicative-agent
        simulations" — a systems claim, evaluated on wall-clock cost
        and benchmark suites.
    (iii) Para 4 describes the released artifact as a Python library
        wrapping sample / observe primitives around a role-prompted
        LLM — a tooling claim with no semantic or systems argument
        attached.
    These are three different contributions: a denotational semantics
    is not shown to be compositional anywhere; the systems claim is
    only a runtime tie, not an inference-quality result; and the
    library characterization is narrower than either. A reader trying
    to state what the paper *is* cannot do so without picking one,
    and fixing the slip forces re-scoping evaluation, related work,
    and the abstract.

    R1.4 — unsupported novelty. Two bare "first" claims appear ("first
    PPL semantics that compositionally handles role-induced agent
    stochasticity"; "first system to provide inference-as-default for
    communicative-agent simulations") without any positioning against
    the obvious neighbors in programmable-LLM and PPL-over-generative-
    model work — LMQL, DSPy, Outlines, Guidance, and the line of
    Anglican / Gen-style PPLs that already model LLM-conditioned
    stochastic computations. The novelty claim is asserted, not
    argued: no comparison axis (semantics vs. surface API vs.
    inference quality), no precedent named, no delta stated.

    Knowledge gating is moderate: detecting R1.4 requires recalling
    that programmable-LLM frameworks and PPLs over LLM samples
    already exist, which is canonical to anyone working in the area
    but not derivable from the section's text alone. R1.1 is
    detectable from careful reading of the three differing
    contribution sentences.

    The flaws compound: tightening R1.4 (naming LMQL / DSPy / Gen and
    stating a precise delta) forces a choice of which contribution
    object the delta is *over* (semantics? system? library?), which
    is exactly the choice R1.1 evades.

