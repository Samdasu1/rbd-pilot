acceptable_outputs_summary: |
  Flags that the section's framing of Corbett et al. (2012) as "the
  canonical analysis" and "strongest published baseline" at 100-150ms
  is stale, since the section itself cites CockroachDB, SLOG, and
  YugabyteDB / TiDB as having moved the practical commit-latency floor
  well below that figure. Suggests reframing the baseline against a
  current system (e.g., SLOG or CockroachDB) and re-evaluating whether
  "matching 100-150ms" is still a meaningful contribution claim. May
  also note that the novelty positioning is downstream of fixing the
  baseline reference.

bad_outputs_summary: |
  Polishes prose, asks for more benchmark detail, suggests adding
  another region to the evaluation, or accepts the Corbett-as-baseline
  framing without flagging that the section's own related-work
  paragraph contradicts it. Adds peripheral citations (e.g., further
  Paxos variants or HLC papers) without addressing that the load-bearing
  baseline reference is out of date.

