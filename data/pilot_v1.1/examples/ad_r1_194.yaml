engineered_flaws:
  R1.7: [F1.7.c]
  notes: |
    Stale citation, detectable from internal cues (low gating). The
    section anchors its baseline framing on Corbett et al. (2012),
    calling it "the canonical analysis," "the reference benchmark," and
    "the strongest published baseline on cross-region two-phase commit
    cost," and pegging the relevant latency floor at 100-150ms. The very
    next paragraph then enumerates CockroachDB (30-40ms), SLOG / Ren
    et al. 2019 (single-digit ms), and YugabyteDB / TiDB as having all
    moved the practical floor well below that figure. The 2012 number
    is therefore stale as a frontier reference, and the contribution
    claim ("matches the 100-150ms commit latency reported by Corbett et
    al.") is only meaningful relative to a baseline the section itself
    has documented as superseded. The conceptual object, protocol
    description, and evaluation setup are otherwise coherent — only the
    citation is doing the wrong work. Detection requires no external
    knowledge of CockroachDB, SLOG, or Spanner internals; the
    contradiction is visible in the section's own text. Delegation T02
    is generic.

