  text: |
    The commitment reliability frontier provides a principled basis for
    matching scheduling strategies to market requirements. We identify
    three regimes based on the commitment threshold that a market
    imposes.

    High-commitment markets require near-certain schedule adherence.
    In this regime, only the combined strategy with model-based
    constraints achieves non-zero feasibility at threshold 0.95. All
    RL strategies evaluated are excluded under these conditions.

    Moderate-commitment markets allow some schedule deviation.
    Predictive LP maintains partial feasibility, declining to 63 percent
    at threshold 0.90, though its variance across markets limits its
    reliability. CMDP's feasibility drops to 20 percent at threshold
    0.55 and reaches zero at threshold 0.70. The operational risk of
    deploying a strategy with sub-50 percent feasibility is substantial.

    No-commitment markets, including intra-day spot trading where
    schedules are advisory rather than binding, represent the only
    regime where RL strategies can operate without commitment risk.
    In such settings, PPO's superior arbitrage capability and
    negligible inference cost make it the preferred choice. However,
    these markets typically offer the smallest margins.

    Our contribution is a strategy-selection taxonomy mapping market
    commitment requirements to scheduling strategies; this taxonomy
    reframes the optimization-versus-RL debate as a question of
    market eligibility rather than expected-cost minimization, and
    provides aggregator operators with a principled basis for choosing
    among the five scheduling strategies we evaluate in this work.
  source_provenance: paper_4_isgt_discussion_taxonomy_modified

