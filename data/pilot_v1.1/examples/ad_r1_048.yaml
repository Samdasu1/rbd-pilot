  notes: |
    Modified-real from paper 4 results deployment gap. Conceptual
    object misframing injected. The original section describes a
    specific empirical result: constrained-MDP V2G commitment
    collapses 22-42 pp under rolling deployment in three markets.
    The modified version reframes the contribution as "a contribution
    to safe reinforcement learning more broadly than to V2G
    specifically" — claiming the deployment-gap framework
    "formalizes a new failure mode" and "generalizes beyond
    power-systems applications". The section does not actually
    formalize anything (it reports an empirical observation), and
    the "framework" is a single metric definition (DG = C_train -
    C_deploy) plus the rolling-protocol observation. The conceptual
    object slides from "empirical V2G result" to "general safe-RL
    framework contribution" without justification. F1.1.c misframed
    object — visible from the section text (the section does not
    contain a formal generalization, just empirical observations).
    Low gating. T05 generic.

