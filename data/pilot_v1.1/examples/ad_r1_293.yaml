artifact:
  source: synthetic
  domain: climate
  word_count: 348
  text: |
    In this section we describe our analysis of failure modes across an
    ensemble of regional climate downscaling pipelines that we evaluated
    over the 1980-2020 historical period. We examined output from seven
    CMIP6-forced downscaling pipelines and annotated cases where the
    simulated regional surface trends diverged substantially from the
    ERA5 reanalysis baseline.

    Our annotation procedure identified three recurrent failure patterns.
    The first pattern, which we observed in 412 of the annotated traces,
    involves systematic warm biases in summer surface temperature over
    continental interiors, which represents a substantial deviation from
    the reanalysis baseline. The second pattern, which we observed in
    287 of the annotated traces, involves systematic dry biases in
    monsoon-region precipitation, which represents a substantial
    deviation from the reanalysis baseline. The third pattern, which we
    observed in 156 of the annotated traces, involves systematic
    underestimation of extreme precipitation tails, which represents a
    substantial deviation from the reanalysis baseline.

    To quantify the prevalence of these failure modes we computed the
    fraction of grid cells exhibiting each pattern across the ensemble.
    For the warm-bias pattern the fraction was 0.34 across the ensemble.
    For the dry-monsoon pattern the fraction was 0.21 across the
    ensemble. For the extreme-precipitation pattern the fraction was
    0.18 across the ensemble.

    We further note that across the ensemble the failure patterns that
    we identified across the ensemble appear to cluster by model family,
    suggesting that shared parameterization choices propagate failure
    modes through the ensemble across the ensemble of pipelines we
    examined.

    Our results inform the design of future regional downscaling
    pipelines by highlighting which failure modes recur most
    consistently. The findings also suggest that ensemble diversity does
    not by itself eliminate the failure modes that we identified, and
    that targeted parameterization improvements may be required to
    address the failure modes that we identified across the ensemble of
    pipelines that we examined. We view the failure modes that we
    identified as a starting point for a more systematic taxonomy of
    downscaling failure modes that we identified in this study.
