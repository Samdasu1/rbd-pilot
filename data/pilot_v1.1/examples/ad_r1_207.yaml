artifact:
  source: synthetic
  domain: optimization_theory
  word_count: 287
  text: |
    Stochastic variance reduction has emerged as a central tool for
    finite-sum convex optimization, with foundational works including
    SAG (Schmidt et al., 2017), SAGA (Defazio et al., 2014), and SVRG
    (Johnson and Zhang, 2013). These methods obtain linear convergence
    on strongly convex objectives at per-iteration cost independent of
    the dataset size n.

    Acceleration of variance-reduced methods has been studied through
    Nesterov-style momentum (Allen-Zhu, 2017; Lan and Zhou, 2018) and
    catalyst frameworks (Lin et al., 2015), yielding improved
    condition-number dependence. However, the optimal complexity for
    the composite finite-sum setting under non-uniform smoothness has
    remained elusive.

    We propose RestartIS-Katyusha, an algorithm that combines
    importance-sampled stochastic gradient estimation with periodic
    restart of the momentum sequence. Our analysis shows that for
    L_i-smooth components with average smoothness L̄ and strong-convexity
    parameter μ, RestartIS-Katyusha attains an iteration complexity of

        O( ( n + sqrt( n L̄ / μ ) ) log(1/ε) ),

    matching the lower bound established by Volkov and Petrenko (2018,
    Theorem 3.2) for first-order methods accessing per-component
    gradients with importance sampling. To our knowledge this is the
    first explicit algorithm to attain this bound in the composite
    setting; prior accelerated VR methods (Allen-Zhu, 2017; Lan and
    Zhou, 2018) match the bound only in the uniform-smoothness regime.

    The proof proceeds by a Lyapunov argument tracking the squared
    distance to the optimum together with a primal gap term, in the
    spirit of the analysis in Allen-Zhu (2017). The novel ingredient is
    a restart schedule tied to the importance-sampling probabilities
    p_i ∝ sqrt(L_i), which controls the variance of the gradient
    estimator without inflating the momentum gain.

    We illustrate the bound numerically on logistic regression with
    heterogeneous L_i drawn from a Pareto distribution; RestartIS-
    Katyusha matches our predicted rate, while uniform-sampling
    Katyusha exhibits the worse n L_max / μ scaling expected from
    classical analyses.
