engineered_flaws:
  R1.7: [F1.7.a]
  notes: |
    Fabricated citation: "Volkov and Petrenko (2018, Theorem 3.2)" does
    not exist. The section's headline contribution claim — that
    RestartIS-Katyusha is the "first explicit algorithm to attain this
    bound in the composite setting" — is anchored to this fabricated
    lower bound. The canonical lower bound for first-order methods on
    composite finite-sum convex problems is due to Woodworth and Srebro
    (2016, "Tight Complexity Bounds for Optimizing Composite
    Objectives"), with refinements by Lan and Zhou (2018) and Allen-Zhu
    and Hazan (2016) for the importance-sampling regime. A reviewer
    versed in convex-optimization complexity theory will not recognize
    Volkov–Petrenko, will recall Woodworth–Srebro as the standard
    reference, and will see that the entire optimality framing of the
    contribution rests on a citation that cannot be located. Detection
    requires recall of the canonical complexity-theory literature
    (high gating); nothing in the section is internally inconsistent.
    Fixing the flaw is load-bearing: if the matched bound is in fact
    Woodworth–Srebro's, the "first explicit algorithm" claim must be
    rechecked against the existing accelerated-VR algorithms cited in
    the same paragraph (Allen-Zhu 2017; Lan–Zhou 2018), which may
    already match it under importance sampling. Delegation T10 ("Help
    me with this section.") is generic and does not point at R1.7.

