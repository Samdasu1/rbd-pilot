    technical claims about distribution shift (fragility along "horizon
    shift" and "fleet-size shift" axes) without citing any of the
    canonical distribution-shift work (Quinonero-Candela 2009 covariate
    shift; Sugiyama 2007 importance weighting; Recht et al. 2019
    distribution shift in computer vision; Koh et al. 2021 WILDS
    benchmark; etc.). The claim "both are instances of distribution
    shift but with different mechanisms" should anchor in the
    distribution-shift literature but cites nothing. F1.7.b missing
    key prior work — visible from the section's invocation of
    distribution-shift terminology without any citation, low gating.
