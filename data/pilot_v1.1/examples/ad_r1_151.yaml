artifact:
  source: synthetic
  domain: causal_inference
  word_count: 312
  text: |
    We evaluate the effect of asking a clarifying question on session-level
    user satisfaction in an open-domain conversational search system. To
    estimate the average treatment effect (ATE) of clarification, we apply
    doubly robust (AIPW) estimation with cross-fitted gradient-boosted
    nuisance models for both the outcome regression and the propensity
    score, using five-fold sample splitting following Chernozhukov et al.

    Our log data come from a six-week deployment on a production
    conversational assistant, covering 1.4M sessions in which the system
    either issued a clarifying question or proceeded directly to a single
    result. Treatment assignment was governed by a legacy policy whose
    features partially overlap with the covariates available to us.

    Let Y denote session-level satisfaction (a non-abandonment proxy at 24
    hours), T the indicator of clarification, and X the vector of session
    covariates observed at the policy's decision point — query length,
    embedding entropy, prior-turn count, and a coarse query-intent label.
    We target the population ATE, E[Y(1) - Y(0)], averaged over the
    deployment distribution of X.

    The estimated ATE is +4.7 percentage points (95% CI 3.9-5.5),
    indicating that clarification meaningfully improves satisfaction on
    average across the deployment population.

    Identification of this estimand rests on (i) unconfoundedness given
    X, (ii) overlap, and (iii) consistency. Assumption (i) is plausible
    because the legacy policy is deterministic in X up to a tie-breaking
    randomization, but unobserved upstream intent could still confound.

    A Rosenbaum-bounds sensitivity analysis indicates that an unobserved
    confounder would require Γ ≥ 1.8 to nullify the estimate.

    We further conduct heterogeneous-treatment-effect analysis using
    causal forests: long-tail navigational queries show ATEs near zero,
    while exploratory informational queries show ATEs above 8 points.

    In summary, our contribution is a doubly robust causal estimate of
    the effect of clarification on user satisfaction in production
    conversational search, with sensitivity bounds robust to plausible
    unobserved confounding.
