acceptable_outputs_summary: |
  Proposes a section-level reorder so the estimand and identification
  assumptions appear before the estimator and the numerical result.
  Suggests a concrete ordering — define Y, T, X and the ATE first,
  then state unconfoundedness/overlap/consistency, then the AIPW
  estimator and data, then the point estimate, sensitivity, and HTE —
  and explains that reporting the +4.7pp effect before identification
  is presented inverts the warrant for a causal claim, not merely a
  stylistic preference.

bad_outputs_summary: |
  Polishes prose, tightens the AIPW description, suggests adding more
  baselines or a larger sample, or asks for additional sensitivity
  analyses. Treats the existing paragraph order as acceptable and
  comments only on local clarity. Recommends rewording the Rosenbaum
  bounds sentence or adding citations without addressing that results
  precede identification assumptions in the section flow.

