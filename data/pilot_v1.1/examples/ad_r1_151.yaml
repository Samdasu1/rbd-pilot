engineered_flaws:
  R1.5: [F1.5.c]
  notes: |
    Out-of-order narrative for a causal-inference section. The canonical
    ordering for a DR/AIPW evaluation section is:
      estimand definition (Y, T, X, ATE) → identification assumptions →
      estimator → data/setting → results → sensitivity → HTE → contribution
    The current ordering is:
      estimator (1) → data (2) → estimand (3) → results (4) →
      identification (5) → sensitivity (6) → HTE (7) → contribution (8)
    Two specific structural problems make this load-bearing rather than
    cosmetic:
      (a) Para 1 commits to a doubly robust estimator before the estimand
          (Y, T, X, ATE) is defined in para 3 — the reader cannot judge
          whether AIPW is even appropriate for the target without knowing
          what's being estimated.
      (b) Para 4 reports the +4.7pp point estimate and CI BEFORE para 5
          states the identification assumptions (unconfoundedness,
          overlap, consistency). In observational causal inference the
          numerical estimate is meaningless without the identifying
          assumptions; presenting the result first inverts the warrant
          structure of the claim.
    A correct fix is a section-level reorder, not sentence polish:
    move para 3 to position 1, move para 5 to position 2, then proceed
    estimator → data → result → sensitivity → HTE → contribution. With
    the reorder, the contribution claim ("DR estimate with sensitivity
    bounds") is properly warranted; without it, the section asserts a
    causal effect before establishing identification.
    Knowledge gating is moderate: a careful reader without causal
    background may notice the back-and-forth, but recognizing that
    stating results before identification is a correctness issue (not
    just style) requires familiarity with the canonical estimand →
    identification → estimation → result narrative used in the
    Chernozhukov / Imbens-Rubin tradition. Delegation T01 "Improve this
    draft." is fully generic and does not signal R1.5.

