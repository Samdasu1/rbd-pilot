artifact:
  source: synthetic
  domain: power_systems_v2g
  word_count: 296
  text: |
    We present V2GBid, a market-based bidirectional charging coordination
    framework for distribution-level vehicle-to-grid (V2G) services.
    V2GBid enables an aggregator to procure regulation capacity from a
    heterogeneous fleet of plug-in electric vehicles (PEVs) by
    broadcasting locational marginal prices (LMPs) augmented with a
    regulation premium that reflects the real-time area control error
    reported by the balancing authority.

    Each PEV owner i is modeled as a rational agent maximizing a
    quasi-linear utility u_i(x_i, p) = v_i(x_i) - p . x_i, where x_i is
    the (dis)charging schedule over a 15-minute settlement interval and
    p is the broadcast price vector. Under standard convexity
    assumptions on v_i and a non-degeneracy condition on p, each agent
    admits a unique best response x_i*(p), and the aggregate demand
    function is continuous in p.

    Building on this, we show that the aggregator's price-update rule
    is a contraction mapping in the L^2 norm, with contraction factor
    bounded by the ratio of mean price elasticity to fleet
    heterogeneity. By the Banach fixed-point theorem, the price-response
    loop converges to a unique market-clearing allocation, and we
    derive a closed-form bound on the convergence rate in terms of
    fleet size N and elasticity dispersion.

    Therefore, V2GBid satisfies the sub-second response requirements of
    NERC BAL-003-1 frequency-response obligations, since the contraction
    rate guarantees rapid convergence and the regulation premium
    directly encodes the area control error. The aggregated PEV fleet
    consequently qualifies as a Tier-1 frequency-responsive resource
    without the need for any additional fast-acting reserves.

    We evaluate V2GBid on a modified IEEE 33-bus distribution feeder
    with 1,200 simulated PEVs and report a 23% reduction in regulation
    procurement cost relative to a centralized least-cost dispatch
    baseline, while meeting all voltage and thermal constraints.
