artifact:
  source: synthetic
  domain: reinforcement_learning
  word_count: 348
  text: |
    We trained agents in the MiniGrid-DoorKey-8x8 and ProcGen suite using PPO
    with default hyperparameters. Each agent was trained for 25M environment
    steps across 5 random seeds, with evaluation occurring every 500K steps
    on held-out task instances. Hardware was 4x A40 GPUs and training
    wall-clock averaged 18 hours per seed. Observations were preprocessed
    with the standard ProcGen impala-style encoder; for MiniGrid we used a
    three-layer convolutional trunk followed by a 256-unit GRU.

    Earlier work on hierarchical reinforcement learning has explored the
    option-critic framework, feudal networks, and meta-learned subroutines.
    These approaches share the assumption that subpolicies can be discovered
    or specified prior to deployment. More recently, language-conditioned RL
    has used pretrained LLMs as high-level controllers, but typically
    delegates atomic skills on a fixed schedule rather than reasoning over
    when to delegate at all. We discuss the relationship of our method to
    these lines of work in the next section.

    Our experimental protocol followed the standard ProcGen evaluation:
    agents were trained on 200 levels and evaluated on the full
    distribution. We additionally introduced a delegation-budget constraint:
    agents were limited to k in {1, 3, 10} LLM calls per episode, mirroring
    deployment cost considerations. Returns on MiniGrid-DoorKey-8x8
    averaged 0.71 +/- 0.04 for our method vs 0.58 +/- 0.06 for the
    option-critic baseline at k=3. ProcGen aggregate normalized return
    reached 0.42 vs 0.31 for the same baseline. The gap widens at k=1
    (0.63 vs 0.41 on DoorKey), suggesting that delegation timing matters
    more under tighter budgets than under generous ones.

    The principal contribution of this section, then, is a new criterion
    for delegation timing - what we call the value-of-information gating
    rule - which opens an LLM call only when the entropy of the policy's
    action distribution exceeds a learned state-conditioned threshold
    tau(s). This rule, implemented in roughly fifty lines on top of
    standard PPO, accounts for essentially all of the gain over
    option-critic at low delegation budgets and is what enables the k=1
    results above.
  source_provenance: null

