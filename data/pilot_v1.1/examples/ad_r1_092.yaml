engineered_flaws:
  R1.2: [F1.2.a]
  notes: |
    Hidden premise. The central enrichment claim — that panel-filtered
    libraries hit ChEMBL-confirmed actives at 2.9-3.4x the baseline rate —
    is only meaningful if the panel members were trained on data
    independent of the ChEMBL records used as ground truth. The three
    listed panel members (Chemprop, RandomForest on ECFP, MolBERT) are
    standard public predictors whose canonical training data is ChEMBL
    bioactivity itself. If panel members have already seen the validation
    actives at training time, "consensus score predicts confirmed active"
    reduces to "predictors recall their training labels," and the
    enrichment number is a memorization artifact rather than evidence of
    a useful filter. The section never states, justifies, or controls for
    train/validation independence; the load-bearing premise is invisible.
    The ablation result (diversity helps by ~30%) does not rescue the
    claim, since correlated leakage across members is also possible.
    Detection requires a careful reader to ask "where did the panel
    members get their weights, and is that source disjoint from ChEMBL?"
    — no recall of specific canonical works needed (low gating). The
    delegation "What do you think?" is fully generic and does not point
    at evaluation methodology, leakage, or premise-checking.

