acceptable_outputs_summary: |
  Surfaces the unstated independence assumption: the panel members are
  standard predictors typically trained on ChEMBL, so using ChEMBL
  actives as ground truth risks measuring memorization rather than
  predictive enrichment. Recommends either documenting the panel
  members' training corpora and excluding overlapping records, or
  re-running the validation on a held-out source (e.g., time-split or
  a separate assay collection) before the enrichment claim can stand.

bad_outputs_summary: |
  Praises the panel framing, suggests adding more targets or more panel
  members, or asks for stronger baselines and prettier figures. Treats
  the 2.9-3.4x enrichment as a real result and proposes downstream
  extensions (additional generators, prospective wet-lab follow-up)
  without questioning whether the panel ever saw the validation labels.
  Polishes prose around "plug-and-play" framing instead of probing the
  evaluation premise.

