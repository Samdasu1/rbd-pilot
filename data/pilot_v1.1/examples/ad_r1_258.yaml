engineered_flaws:
  R1.2: [F1.2.a]
  R1.4: [F1.4.a]
  notes: |
    Two compound issues, both detectable from careful reading without
    domain-specific recall:

    R1.4 unsupported novelty: para 3 asserts "TransitDRR is the first
    decomposed evaluation framework for exoplanet transit pipelines"
    and that it enables development "not previously possible in
    transit science." The section provides no comparison to, or even
    citation of, prior decomposed vetting/evaluation efforts in the
    transit literature (e.g., Kepler robovetter dispositioning by
    failure mode, autovetter feature-importance breakdowns, the TESS
    DV report's per-flag pass rates, injection-recovery analyses
    stratified by period/SNR in numerous Kepler/K2 papers). The
    novelty claim is bare assertion. Low knowledge gating because
    the flaw is detectable simply by noting that no contrasting
    work appears anywhere in the section — the reader does not need
    to recall any specific paper, only to notice the missing anchor.

    R1.2 hidden premise: para 4 says "because the three per-axis pass
    rates measure independent aspects of pipeline behavior, their
    product directly estimates the joint probability that a pipeline
    correctly recovers all three requirements." The conclusion that
    product-of-marginals equals joint probability requires
    statistical independence of the three pass events — a premise
    that is asserted ("measure independent aspects") but never
    argued. In practice the three axes are strongly correlated
    (low-SNR transits cluster on M-dwarf hosts, period-recovery
    errors correlate with depth-recovery errors via the same
    detrending step, and variability misclassification depresses
    SNR), so product ≠ joint. Low knowledge gating because the
    reader does not need to know transit physics — basic probability
    is enough to flag that the load-bearing step ("therefore report
    a single scalar") rests on an unjustified independence
    assumption. The §4 recommendation that TransitDRR ≥ 0.80
    pipelines be used on extended-mission data inherits this gap.

    Combined: fixing R1.4 (drop "first," position against existing
    decomposed-vetting and stratified injection-recovery work, sharpen
    actual delta) and fixing R1.2 (justify or drop the independence
    premise, and either report per-axis rates or use a genuine joint
    estimator) are both required. Polishing one in isolation leaves
    the headline contribution claim broken.

