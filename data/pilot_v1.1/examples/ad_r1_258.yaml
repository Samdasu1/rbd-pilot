acceptable_outputs_summary: |
  Names both: (1) the "first decomposed evaluation framework" framing
  ignores existing decomposed-vetting and stratified
  injection-recovery work in the Kepler/TESS literature; the section
  must position against this prior work and sharpen the actual
  delta. (2) The product-equals-joint step in para 4 rests on an
  unstated and implausible independence assumption across the three
  axes; either the independence has to be argued/tested, or the
  product score must be replaced by a true joint estimator (or the
  per-axis rates kept and reported). Both fixes are needed for the
  scalar-recommendation in §4 to stand.

bad_outputs_summary: |
  Polishes prose, tightens the abstract framing, suggests adding
  more pipelines or a larger injection set, and accepts both the
  "first" novelty claim and the product-as-joint step without
  comment. Or addresses one — e.g., softens "first" to "a new" —
  while leaving the independence-premise issue, or vice versa.

