artifact:
  source: synthetic
  domain: astronomy
  word_count: 327
  text: |
    Modern exoplanet detection pipelines applied to TESS Full Frame
    Image (FFI) light curves report aggregate metrics — typically
    precision and recall at a fixed false-positive threshold — that
    obscure pipeline behavior across the diverse parameter space of
    transiting planets. We introduce TransitDRR, a decomposed
    reliability ratio that breaks pipeline evaluation into per-axis
    pass rates over orbital period, transit signal-to-noise, and
    host-star variability class.

    For each candidate Threshold Crossing Event (TCE) emitted by a
    pipeline against our injection-recovery set, three binary
    requirements are assessed: (i) the recovered orbital period
    agrees with the injected period to within 0.1%; (ii) the
    recovered transit depth agrees with the injected depth to within
    1σ; and (iii) the pipeline's stellar-variability flag matches
    the FFI-derived classification used to construct the injection.
    The TransitDRR for a pipeline is then defined as the product of
    the three per-axis pass rates over the injection set.

    To our knowledge, TransitDRR is the first decomposed evaluation
    framework for exoplanet transit pipelines, and it exposes
    failure modes that aggregate recall-at-FPR scores systematically
    hide. By reporting performance along physically meaningful axes,
    TransitDRR enables targeted pipeline development of a kind not
    previously possible in transit science.

    Because the three per-axis pass rates measure independent aspects
    of pipeline behavior, their product directly estimates the joint
    probability that a pipeline correctly recovers all three
    requirements for an arbitrary transit. We therefore report
    TransitDRR as a single scalar in §4, omitting the per-axis
    breakdown for brevity. Pipelines achieving TransitDRR ≥ 0.80 on
    the injection set are recommended for use on the upcoming TESS
    extended-mission sectors.

    Across nine pipelines drawn from the QLP, BLS-search, and
    transit-least-squares families, TransitDRR ranges from 0.34 to
    0.71 on the Year-1 injection set. The decomposed form also
    reveals a sharp drop in recovery for M-dwarf hosts with
    photometric variability above 5 mmag — a regime in which
    aggregate recall stays within 5% of its overall mean.
