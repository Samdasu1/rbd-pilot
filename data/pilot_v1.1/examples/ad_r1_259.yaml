delegation: "What do you think?"

artifact:
  source: synthetic
  domain: climate
  word_count: 322
  text: |
    Regional precipitation forecasts must balance the computational
    cost of high-resolution dynamical downscaling against the accuracy
    demanded by water-resource and flood-risk applications. We propose
    ClimRoute, an adaptive routing system that dispatches each forecast
    query to either a lightweight statistical emulator (a regularized
    linear regression on ERA5 reanalysis predictors) or a
    transformer-based neural emulator (FourCastNet-Precip, our
    1.4B-parameter precipitation-specialized variant) based on a
    learned difficulty score. Compared with prior hybrid systems that
    statically partition workload by lead time, ClimRoute substantially
    advances the state of the art by allowing per-query routing.

    The router is a 12M-parameter MLP trained on 8 years of paired
    forecasts to predict, from synoptic-scale input features, whether
    the statistical emulator will exceed a CRPS threshold relative to
    the neural emulator. At inference, queries below the threshold are
    served by the cheap path; queries above it are escalated. Across
    our test years (2018-2022), ClimRoute reduces aggregate compute by
    63% relative to always running the neural emulator while incurring
    only a 4% CRPS penalty over the all-neural baseline.

    Routing remains effective under climate non-stationarity because
    the difficulty score is computed from synoptic-scale predictors
    that are themselves the inputs to the underlying emulators; this
    internal consistency means that any distribution shift the
    emulators face is reflected in the router's input space. We
    therefore expect the routing thresholds calibrated on 2014-2017 to
    remain valid throughout the 21st-century SSP5-8.5 projections we
    serve in §5.

    Our core advance is the recognition that climate forecast queries
    are heterogeneous in difficulty and that adaptive compute
    allocation is therefore appropriate. To our knowledge, this is the
    first work to apply learned per-query routing to climate emulation,
    and our results establish adaptive routing as a viable paradigm
    for cost-aware climate inference.
  source_provenance: null

