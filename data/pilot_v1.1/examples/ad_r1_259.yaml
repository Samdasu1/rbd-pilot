engineered_flaws:
  R1.2: [F1.2.a]
  R1.4: [F1.4.c]
  notes: |
    Two compound issues:

    R1.4 rhetorical delta: the section's novelty claims —
    "substantially advances the state of the art by allowing per-query
    routing," "core advance is the recognition that climate forecast
    queries are heterogeneous," and "first work to apply learned
    per-query routing to climate emulation" — are rhetorical rather
    than methodological. The actual delta over the relevant nearest
    neighbors is not articulated. Statistical-dynamical hybrid
    downscaling has a long lineage (BCSD, MOS, Vandal et al.'s DeepSD,
    Baño-Medina et al.) where lead-time- or regime-dependent model
    selection is standard; learned per-query routing for compute-cost
    tradeoffs is the same construct as generic hybrid-inference
    routers (e.g., the LLM-routing line the authors implicitly draw
    from) and as mixture-of-experts in weather emulation (Pathak et
    al.'s FourCastNet ensembling, GraphCast cascade variants). The
    "first" framing and the "viable paradigm" framing do not name a
    technical contribution that distinguishes ClimRoute from these.

    R1.2 hidden premise: the para-3 argument — "routing remains
    effective under climate non-stationarity because the difficulty
    score is computed from … predictors that are themselves the inputs
    to the underlying emulators" — silently assumes that the
    *conditional* relationship between input features and the
    emulator-error gap is stationary, not just that the input
    distribution is covered. Under SSP5-8.5 forcing, the statistical
    emulator's conditional bias structure is precisely what diverges
    from the neural emulator's (the statistical emulator inherits
    historical-period regression weights), so the gap function the
    router predicts is itself non-stationary. Input-space coverage is
    necessary but not sufficient. The premise underwrites the
    21st-century-projection validity claim and is never stated, let
    alone defended with a holdout under shifted forcing.

    Combined: fixing R1.4 requires anchoring against the
    statistical-dynamical hybrid-downscaling and weather-emulation
    cascade literature and articulating what is actually new (e.g.,
    CRPS-threshold-calibrated routing, the specific feature set), and
    fixing R1.2 requires either retracting the 21st-century-validity
    claim or supplying out-of-distribution evidence under shifted
    forcing rather than relying on the input-coverage argument.

