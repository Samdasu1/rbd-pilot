acceptable_outputs_summary: |
  Names both: (1) the "first work" / "substantially advances" /
  "viable paradigm" framing has no technical delta against the
  statistical-dynamical hybrid-downscaling lineage (BCSD, DeepSD,
  Baño-Medina) and weather-emulator cascade/ensemble work
  (FourCastNet ensembling, GraphCast variants); the section needs
  to anchor against these and state what is actually new beyond
  importing per-query routing. (2) The para-3 stationarity argument
  silently assumes the input→error-gap conditional is stationary,
  not just that the input distribution is covered; this premise is
  load-bearing for the 21st-century projection claim and either
  needs to be stated and defended (e.g., with an OOD evaluation
  under shifted forcing) or the projection-validity claim must be
  retracted. Both fixes are required.

bad_outputs_summary: |
  Polishes prose, accepts the "first work" and "viable paradigm"
  framings, suggests adding more baselines or more lead times, or
  recommends tightening the CRPS-threshold description. Accepts the
  "input-space coverage implies routing validity under
  non-stationarity" argument at face value and suggests adding more
  21st-century scenarios rather than questioning the underlying
  premise.

