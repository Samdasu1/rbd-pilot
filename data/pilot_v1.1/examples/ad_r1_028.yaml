artifact:
  source: synthetic
  domain: causal_inference
  word_count: 215
  text: |
    Causal inference from observational data is a long-standing challenge
    in statistics and machine learning. Most existing methods rely on
    assumptions about the underlying causal graph or the parametric form
    of the outcome model, which limits their applicability to complex
    real-world settings.

    The classical approach in this area is the matching estimator, which
    pairs treated and control units based on observed covariates. Our
    work builds on the propensity score formulation introduced by
    Rosenbaum and Rubin in 1983.

    Specifically, we extend the propensity score approach with a
    nonparametric weighting scheme that adjusts for residual covariate
    imbalance after matching. The estimator computes inverse probability
    weights for each matched pair and aggregates them via a weighted
    average to obtain the final treatment effect estimate.

    Our experimental evaluation uses three semi-synthetic benchmarks
    derived from the IHDP dataset. On all three, our method achieves
    lower estimated bias than the baseline propensity-score estimator,
    with mean absolute error reductions of 11%, 8%, and 14%.

    The advantages of our approach become clearer when considering
    deployment in policy-evaluation settings, where treatment-effect
    bias has direct consequences for downstream decisions. We argue
    this work represents a meaningful contribution to the practical
    causal-inference toolkit.

    Our contribution, in summary, is a propensity-score-based estimator
    with nonparametric residual weighting that improves on the classical
    propensity-score estimator on the IHDP benchmark family.
