  notes: |
    Two interpretations of the load-bearing issue, both defensible:

    Reading A — R1.4 dominant (novelty positioning):
      The contribution is positioned only against "the baseline
      propensity-score estimator" (Rosenbaum & Rubin 1983). Modern
      causal-inference research uses many advanced estimators —
      doubly-robust methods, targeted learning, machine-learning-based
      causal forests, etc. — none of which are mentioned. The section's
      novelty positioning is anchored to a 1983 baseline only, which
      may make the claimed delta look stronger than it is. Rewrite
      would re-anchor the contribution against contemporary causal-ML
      baselines.

    Reading B — R1.5 dominant (structural / buried contribution):
      The contribution is named in the FINAL paragraph ("Our
      contribution, in summary, is..."), after motivation, related
      work, method, experiments, and a deployment-significance
      discussion. The natural ordering would put the contribution near
      the front. The current ordering reads like the author wrote in
      narrative chronological order rather than putting the load-bearing
      claim where readers expect it. Rewrite would restructure with
      contribution up front.

    Both readings are visible from careful reading without external
    knowledge (low gating). A well-calibrated agent should set
    clarification_needed=true.

