  domain: information_retrieval
  word_count: 312
  text: |
    Multi-step information retrieval, in which a system must satisfy a
    user's underlying need through a sequence of queries against a
    corpus, has emerged as a central challenge for retrieval-augmented
    systems. Real users rarely issue a fully specified request; instead,
    they provide a vague seed and refine through interaction. Modeling
    this gap — between what the user typed and what they actually want
    — is the core problem of underspecification in IR.

    We introduce LongQuest, the first retrieval framework that exposes
    a controllable underspecification dial for long-horizon tasks.
    LongQuest takes a coarse user goal and produces a sequence of
    sub-queries whose specificity is governed by a single scalar
    parameter alpha, allowing operators to trade exploration breadth
    against precision at the corpus level. To our knowledge, no prior
    IR system has offered this form of explicit, tunable
    underspecification across a multi-step retrieval trajectory.

    Related work falls into three categories. First, conversational
    retrieval systems (e.g., Yu et al., 2021) handle clarification
    through dialogue but do not expose an external knob. Second, query
    reformulation methods rewrite a single query rather than plan a
    trajectory. Third, and most directly relevant, Park et al. (2023)
    introduced a tunable specificity parameter for sub-query generation
    in multi-hop retrieval and showed that operators could dial query
    breadth on the HotpotQA-Multistep benchmark; their alpha-controller
    is the closest predecessor to ours.

    LongQuest differs from these works architecturally: it integrates
    the controller into a learned planner rather than a retrieval-time
    post-processor, and it operates over five-step rather than two-hop
    trajectories. We evaluate on TREC-LongTask and on a derived
    MS-MARCO-Horizon split, reporting nDCG@10 across alpha settings and
    showing a 6.8-point gain over the strongest fixed-specificity
    baseline at matched recall.

    These results establish LongQuest as the first practical
    controllable-underspecification framework for long-horizon IR.
