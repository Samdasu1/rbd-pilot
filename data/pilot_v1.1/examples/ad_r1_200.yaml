acceptable_outputs_summary: |
  Identifies that the section's "first controllable-underspecification
  framework for long-horizon IR" claim is contradicted by its own
  citation to Park et al. (2023), whose alpha-controller for tunable
  sub-query specificity is described in the section as the closest
  predecessor. Suggests rewording the novelty claim to a defensible
  delta (e.g., "first to integrate the underspecification controller
  into a learned planner over five-step trajectories") and removing
  or softening the closing "first practical" sentence. May note that
  the architectural-novelty framing in paragraph 4 is downstream of
  this fix.

bad_outputs_summary: |
