engineered_flaws:
  R1.7: [F1.7.b]
  notes: |
    Internal-citation contradiction (visible without external
    knowledge). Paragraph 2 claims LongQuest is "the first retrieval
    framework that exposes a controllable underspecification dial for
    long-horizon tasks" and reinforces this with "no prior IR system
    has offered this form of explicit, tunable underspecification."
    Paragraph 3 then directly cites Park et al. (2023) as having
    "introduced a tunable specificity parameter for sub-query
    generation in multi-hop retrieval" with an "alpha-controller" that
    is "the closest predecessor to ours." The novelty/priority claim
    is contradicted by the section's own related-work citation: the
    architectural deltas listed in paragraph 4 (planner-integrated
    controller, five-step vs. two-hop) describe an extension of Park
    et al., not a first. The closing sentence then repeats the
    untenable "first" claim. Detection requires only careful reading
    of the section; no recall of external IR literature is needed
    (low gating). The delegation T06 is generic and does not direct
    attention to scholarship.

