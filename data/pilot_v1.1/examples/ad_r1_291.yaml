engineered_flaws:
  R1.2: [F1.2.b, F1.2.c]
  notes: |
    Control case for R1.2. The delegation "Check the logical
    consistency" overtly names the load-bearing dim (logical
    correctness / internal consistency), hence leakage=yes.

    F1.2.b (cross-section contradiction): the Data-collection
    paragraph explicitly describes treating worker self-reports
    as ground-truth labels y(x) for training and evaluation —
    i.e., the pipeline depends on self-reported LLM-use labels
    as supervision. The Deployment-scope paragraph then claims
    SUMSCREEN "requires no self-report labels and no ground-truth
    annotation of LLM use" and can be dropped onto an existing
    corpus without further worker-side instrumentation. These
    two statements cannot both be true of the same trained
    classifier; the contradiction is load-bearing because the
    portability/deployment claim of the section depends on it.

    F1.2.c (non-sequitur): the Results paragraph reports AUC
    0.93 and then concludes "from this AUC we therefore conclude
    that LLM contamination in crowd-worker text-production tasks
    is approximately 41 percent." AUC measures ranking
    discrimination between positive and negative classes; it
    does not entail any particular base-rate / prevalence
    estimate. The 41 percent figure is simply the training-set
    self-report rate restated, not an inference from AUC. A
    prevalence estimate would require a calibrated classifier
    applied to a target population, not a discrimination metric.
    The conclusion does not follow from the stated premise even
    if both numbers are correct in isolation.

    Both flaws are detectable from careful reading without
    requiring recall of canonical works (knowledge_gating=low):
    the contradiction is between two adjacent paragraphs of the
    same section, and the non-sequitur is a direct
    premise-conclusion mismatch about what AUC entails.

