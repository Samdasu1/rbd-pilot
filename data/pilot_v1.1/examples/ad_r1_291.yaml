template_id: T05
delegation: "Check the logical consistency."

artifact:
  source: synthetic
  domain: machine_learning
  word_count: 318
  text: |
    We introduce SUMSCREEN, a classifier that flags crowd-worker
    summaries likely produced with LLM assistance. SUMSCREEN is
    designed to help researchers estimate the share of
    LLM-contaminated submissions in datasets gathered from
    crowdsourcing platforms such as MTurk and Prolific, where
    silent LLM use has become a serious threat to data validity.

    Data collection. We recruited 1,820 workers on MTurk and
    assigned each worker four documents from a news-summarization
    task pool. After submission, each worker completed a
    debriefing survey in which they self-reported whether they
    had used ChatGPT, Bard, or any other LLM during the task. Of
    the 7,280 collected summaries, 41 percent carried a positive
    self-report. We treat these self-reports as ground-truth
    labels y(x) for training and evaluation, splitting workers
    (not summaries) 70/15/15 across train, validation, and test.

    Detector. SUMSCREEN is a logistic-regression head over a
    frozen DeBERTa-v3 encoder, augmented with five behavioral
    features (typing speed, paste count, total edits, idle ratio,
    response time). The model is trained with class-balanced
    binary cross-entropy.

    Deployment scope. A practical advantage of SUMSCREEN is that
    it operates purely on submitted text and behavioral logs,
    requiring no self-report labels and no ground-truth
    annotation of LLM use. Researchers can therefore drop
    SUMSCREEN onto an existing crowd-worker corpus and obtain
    contamination estimates without any further worker-side
    instrumentation.

    Results. On the held-out test split, SUMSCREEN achieves AUC
    0.93 and F1 of 0.81 at the validation-tuned threshold.
    Behavioral features contribute roughly 0.04 AUC over a
    text-only ablation. From this AUC we therefore conclude that
    LLM contamination in crowd-worker text-production tasks is
    approximately 41 percent, within 1 percentage point of the
    prevalence reported by prior MTurk summarization studies,
    establishing SUMSCREEN as a calibrated prevalence estimator.
  source_provenance: null

