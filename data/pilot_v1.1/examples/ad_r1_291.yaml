acceptable_outputs_summary: |
  Flags that the Data-collection paragraph trains and evaluates
  SUMSCREEN on worker self-reports as y(x) ground-truth labels,
  which directly contradicts the Deployment-scope paragraph's
  claim that the method requires no self-report labels or
  ground-truth annotation. Separately flags that AUC 0.93 does
  not entail a 41 percent prevalence estimate — AUC is a
  discrimination metric, prevalence is a base-rate estimate, and
  the 41 percent figure is just the training self-report rate
  restated. Suggests either narrowing the deployment claim or
  replacing the AUC-based prevalence conclusion with a calibrated
  estimate on a target population.

bad_outputs_summary: |
  Polishes prose, suggests adding more crowdsourcing platforms,
  proposes additional behavioral features, or recommends
  ablations on the encoder without flagging either the
  supervised-vs-no-labels contradiction across paragraphs or the
  AUC-to-prevalence non-sequitur. Accepts the 41 percent
  contamination claim as supported by the reported AUC. Treats
  the section as logically sound and only requests minor
  clarifications or extra citations.

