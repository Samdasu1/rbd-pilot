engineered_flaws:
  R1.7: [F1.7.a]
  notes: |
    Fabricated citation. The section credits a specific GMRES
    field-of-values residual bound to "Embree and Saad (2019,
    Theorem 3.4)". This paper does not exist: Embree and Saad have
    not coauthored a 2019 GMRES convergence paper of this form. The
    classical field-of-values / disk bound for GMRES is associated
    with Eiermann and Ernst (e.g. Eiermann & Ernst, 2001) and with
    Crouzeix's numerical-range work; the inequality stated in the
    section is a textbook restatement of that lineage, but
    misattributed to a fabricated Embree-Saad reference. Detection
    requires moderate familiarity with the GMRES convergence
    literature — a reader who works on Krylov methods will recognize
    that this attribution is wrong, but it is not a single canonical
    "everyone has read it" omission. The contribution claim ("first
    sketched Krylov method with a field-of-values convergence
    guarantee") rests on the cited bound, so fixing the citation is
    load-bearing rather than cosmetic: if the underlying inequality
    is from Eiermann-Ernst, the chain of reasoning in the convergence
    paragraph must be re-grounded on the correct source. Delegation
    T09 ("What do you think?") is fully generic and gives no signal
    about which dim to attend to.

