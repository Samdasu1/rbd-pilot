acceptable_outputs_summary: |
  Flags that the cited "Embree and Saad (2019, Theorem 3.4)" reference
  appears not to exist and that the field-of-values disk bound for
  GMRES is canonically associated with Eiermann and Ernst (and the
  numerical-range tradition of Crouzeix) rather than an Embree-Saad
  paper. Notes that because the convergence theorem and the "first
  sketched Krylov with a field-of-values guarantee" claim both rest on
  this attribution, the citation must be corrected before the
  contribution claim can stand. Suggests verifying the source and
  re-grounding the bound on the correct reference.

