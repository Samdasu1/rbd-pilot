delegation: "What do you think?"

artifact:
  source: synthetic
  domain: numerical_analysis
  word_count: 318
  text: |
    Iterative solvers for large nonsymmetric linear systems Ax = b
    remain a workhorse of scientific computing, with restarted GMRES
    (Saad and Schultz, 1986) the de facto standard when A is too large
    for direct factorization. The cost of full Arnoldi
    orthogonalization grows quadratically in the iteration count,
    motivating recent work on sketching-based approximations.

    We propose sGMRES-T, a sketched truncated GMRES variant that
    combines randomized subspace embeddings with selective
    re-orthogonalization. The construction extends the sketched GMRES
    framework of Nakatsukasa and Tropp (2021), replacing the dense
    least-squares solve with a truncated update derived from the most
    recent l Arnoldi vectors. Our analysis decomposes the error into a
    sketch component and a truncation component, each controlled under
    standard subspace-embedding hypotheses.

    For the convergence rate, we rely on the residual bound established
    by Embree and Saad (2019, Theorem 3.4), who proved that for any
    matrix A whose field of values lies in a disk D(c, r) with
    r < |c|, the GMRES residual after k iterations satisfies
    ||r_k|| / ||r_0|| <= 2 (r / |c|)^k. Combined with our perturbation
    analysis of the sketched least-squares projection, this yields a
    bound of the form ||r_k|| / ||r_0|| <= (2 + eps) (r / |c|)^k for
    sketch dimension m = O(k log k / eps^2). To our knowledge this is
    the first sketched Krylov method with a field-of-values convergence
    guarantee.

    We evaluate sGMRES-T on the SuiteSparse benchmark suite, reporting
    wall-clock speedups of 1.4-2.1x over restarted GMRES at matched
    residual tolerance for matrices in the 10^5 to 10^6 range. The
    truncation parameter l trades memory for iteration count; we
    recommend l = ceil(log_2 k) as a default. These results position
    sGMRES-T as a practical sketched solver whose theoretical
    guarantees do not degrade with restart length.
