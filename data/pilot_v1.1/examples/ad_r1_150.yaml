engineered_flaws:
  R1.5: [F1.5.a]
  notes: |
    The actual contribution claim — that frozen, off-the-shelf LLM
    embeddings beat purpose-built self-supervised log anomaly
    detectors at comparable cost — is stated only in the FINAL
    paragraph, after four paragraphs of related work, methodology,
    results, and ablations. A reader entering the section does not
    learn what the paper claims as its novelty until paragraph 5 of
    5. The natural section structure for a contribution-style
    write-up would be:
      contribution claim (1) → prior baselines / context (2)
      → method (3) → results + ablations (4)
    Here the order is:
      RW (1) → method (2) → results (3) → ablations (4)
      → contribution (5)
    Detection requires familiarity with the canonical log
    anomaly-detection literature (DeepLog, LogAnomaly, LogBERT,
    Drain3, one-class SVM, the HDFS/BGL/Thunderbird benchmark trio)
    to recognize that the section is in fact making a non-trivial
    novelty claim that is being structurally hidden — a polished
    reader without the canon might assume this is yet another
    incremental log-anomaly paper and miss that the "frozen,
    no-fine-tuning" angle is the contribution. The conceptual
    object, evidence, and prose are otherwise intact; a section-level
    reorder is required, not a sentence-level move. Delegation T10
    "Help me with this section" is maximally generic and does not
    signal R1.5.

