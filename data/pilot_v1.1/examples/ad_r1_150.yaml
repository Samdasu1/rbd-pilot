artifact:
  source: synthetic
  domain: anomaly_detection
  word_count: 318
  text: |
    Anomaly detection in high-cardinality system logs has historically
    relied on parametric subspace methods such as the PCA decomposition
    of Lakhina et al. and on frequency-based statistical baselines.
    Deep approaches extended this line: DeepLog (Du et al., 2017)
    cast template-id sequences as a language-modeling task over an
    LSTM, and LogAnomaly added quantitative pattern features. The
    self-supervised Transformer variant LogBERT (Guo et al., 2021)
    currently sets the strongest published F1 on HDFS and BGL among
    purely structural detectors that do not require labeled anomalies.

    We evaluate on the canonical HDFS, BGL, and Thunderbird benchmarks,
    holding out the final 20% of each trace chronologically and
    reserving 5% of normal windows for calibration. Log templates are
    extracted with Drain3 and embedded with a frozen 7B
    instruction-tuned decoder; we mean-pool the penultimate-layer
    hidden states across template tokens. A one-class SVM in the sense
    of Schölkopf et al. is fit on the calibration embeddings, and a
    held-out rejection radius is applied at test time.

    Across the three benchmarks the resulting detector achieves F1
    scores of 0.987 (HDFS), 0.962 (BGL), and 0.918 (Thunderbird),
    exceeding the published LogBERT numbers by 1.2, 2.4, and 5.1
    points respectively. Inference cost per window is dominated by
    the frozen LLM forward pass at 38ms on a single A10 — comparable
    to LogBERT and well below sequence-to-sequence baselines such as
    LAnoBERT.

    Ablations remove the calibration step and replace mean-pooling
    with [CLS]-token pooling. The calibration step contributes 0.7 F1
    on Thunderbird; pooling choice contributes under 0.2 F1 across
    benchmarks. We further verify against an Isolation Forest baseline
    that the LLM-derived feature space is not trivially separable by
    axis-aligned splits.

    Our contribution is, in summary, the first demonstration that
    frozen general-purpose LLM embeddings — without any
    anomaly-specific fine-tuning or distillation — surpass
    purpose-built self-supervised log anomaly detectors on the
    standard structural benchmarks while remaining within the
    inference budget of established Transformer baselines.
