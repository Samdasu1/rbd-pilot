engineered_flaws:
  R1.5: [F1.5.a]    # buried contribution
  notes: |
    The actual contribution claim — that this is the first
    field-validated hybrid local/central V2G dispatch architecture
    deployable on stock OCPP 2.0.1 infrastructure — is stated only in
    the FINAL paragraph, after four paragraphs of related work,
    deployment description, method, and results. A reader entering the
    section does not learn what the paper claims to contribute until
    paragraph 5 of 5. The natural section structure for a
    contribution-style write-up would be:
      contribution claim (1) → context / RW (2) → deployment + method
      (3) → method detail (4) → result (5)
    Here the order is:
      RW (1) → deployment (2) → method (3) → result (4) → contribution (5)
    Subtlety: the section reads naturally if read linearly, but the
    contribution is genuinely buried — a section-level reorder is
    required, not just a sentence-level move. Many systems-style
    sections do bury the contribution and not all readers consider this
    a flaw, which is why the example is intentionally subtle. Moderate
    gating: identifying *what* the contribution claim actually is
    requires recognizing that "field-validated hybrid dispatch on stock
    OCPP" is the load-bearing novelty (not the MILP, not the 18.4%
    peak reduction, not the FERC 2222 framing), which presumes
    familiarity with what is and isn't novel in V2G control. Conceptual
    object, evidence, and prose are otherwise intact.

