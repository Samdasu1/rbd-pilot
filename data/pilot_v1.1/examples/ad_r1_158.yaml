  domain: power_systems_v2g
  word_count: 289
  text: |
    The integration of electric vehicles into distribution grids through
    vehicle-to-grid (V2G) services has been studied extensively. Wang
    et al. demonstrated that aggregated V2G capacity can provide
    frequency regulation comparable to conventional spinning reserve,
    while Hossain and colleagues quantified revenue streams under FERC
    Order 2222 participation rules. More recent work on commercial
    aggregators has shown that day-ahead bidding strategies remain
    limited by uncertainty in EV state-of-charge (SoC) trajectories and
    plug-in availability windows.

    We instrumented a fleet of 142 commuter EVs across a single feeder
    of a midwestern investor-owned utility over six months. Each vehicle
    reported SoC, GPS, and charging session telemetry every 60 seconds
    via the OCPP 2.0.1 interface. Aggregated real and reactive power
    were measured at the feeder substation transformer at 1-second
    resolution.

    We applied a two-stage dispatch policy: a local rule-based controller
    resident on the EVSE that handles sub-minute regulation response,
    and a centralized MILP optimizer on the utility side that issues
    hourly setpoints. Setpoints pass through a confidence-weighted
    blender that defers to the local controller whenever the optimizer's
    forecast uncertainty exceeds a tunable threshold τ.

    Across the six-month deployment, the hybrid scheme reduced peak
    feeder loading by 18.4% relative to uncontrolled charging, captured
    71% of the regulation revenue achievable by an oracle dispatcher
    with perfect SoC forecasts, and held customer-side SoC-at-departure
    violations below 1.2%. Backhaul traffic to the control center
    dropped 63% relative to a fully centralized baseline.

    In summary, our contribution is the first field-validated hybrid
    local/central V2G dispatch architecture that meets utility-grade
    reliability targets under realistic communication and
    forecast-uncertainty constraints, demonstrating that a
    threshold-blended two-stage policy is deployable on existing
    OCPP 2.0.1 infrastructure without firmware modification.
