artifact:
  source: synthetic
  domain: speech_recognition
  word_count: 312
  text: |
    We introduce ToolASR, a self-supervised tool-augmented speech recognition
    model that, in the spirit of recent work on language models teaching
    themselves to use external APIs, learns to invoke pronunciation and
    named-entity lookup tools during transcription. End-to-end ASR systems
    typically struggle on rare proper nouns and out-of-vocabulary technical
    terms, where dedicated lexical resources outperform purely neural models.
    ToolASR closes this gap by allowing the acoustic model to decide, on its
    own, when to defer to an external lexical tool, and to incorporate the
    returned pronunciation into the recognition hypothesis.

    ToolASR is trained on the LibriSpeech 960h corpus under the standard CTC
    objective. The encoder is a 12-layer Conformer (input: 80-dim log-mel
    filterbanks, 25 ms window, 10 ms hop) producing frame-level character
    posteriors at 40 ms resolution. Decoding is performed with WFST-composed
    beam search of width 32, where the lexicon FST is built from the CMUdict
    pronunciation dictionary augmented with named entities mined from the
    training transcripts. Beam search is constrained so only word sequences
    consistent with the lexicon FST are emitted; out-of-lexicon character
    paths receive a fixed penalty of -8.0.

    On LibriSpeech test-clean, ToolASR reaches a WER of 2.8%, with the
    largest gains on the rare-word subset (8.1% to 5.9% relative to an
    unconstrained CTC baseline). On a held-out medical-terminology
    benchmark, WER drops from 14.2% to 9.7% once the lexicon FST is
    augmented with 1,400 domain pronunciations harvested from MeSH.

    We argue these results demonstrate that letting the model learn when to
    invoke external tools yields substantial improvements over fully
    end-to-end approaches. Future work will extend the self-supervised
    tool-selection mechanism to additional resources, including phoneme-level
    confusion models, accent-specific pronunciation generators, and
    domain-targeted language models surfaced through a unified API.
  source_provenance: null

