acceptable_outputs_summary: |
  Identifies that the section claims a learned, self-supervised tool-invocation
  mechanism but actually describes lexicon-constrained CTC decoding with a
  fixed WFST and a static out-of-lexicon penalty — no learned decision, no
  self-supervision over tool calls. Proposes either renaming the contribution
  to honestly describe vocabulary-constrained ASR (and repositioning against
  the long line of WFST-decoded hybrid/CTC systems) or actually building and
  training the claimed tool-invocation policy. Does not focus on prose polish
  or adding more benchmarks.

bad_outputs_summary: |
  Polishes the prose, suggests additional benchmarks or larger-scale
  pretraining, or asks for clarification on the Conformer hyperparameters.
  Takes the "self-supervised tool-augmented" framing at face value and
  proposes Toolformer-style extensions (more APIs, richer tool returns)
  without noticing that no tool-learning mechanism is actually present.
  Strengthens the rare-word evaluation or argues about the OOV penalty
  value without flagging the mismatch between claim and content.

