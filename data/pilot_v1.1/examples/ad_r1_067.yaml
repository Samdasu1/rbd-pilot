engineered_flaws:
  R1.1: [F1.1.c]
  notes: |
    Conceptual object slip. Para 1 frames the contribution as a model that
    "learns to invoke" external tools, "decides on its own when to defer,"
    and is "self-supervised tool-augmented" — i.e. an ASR analogue of
    Toolformer-style learned tool use. Para 2 then describes the actual
    system: a vanilla Conformer-CTC trained with the standard CTC loss,
    decoded with a fixed WFST lexicon constraint and a static
    out-of-lexicon penalty. There is no tool-invocation decision, no
    learned API call, no self-supervision over when to call a tool — the
    "tool" is a hard-coded decoding-time vocabulary constraint that has
    been standard in hybrid/CTC ASR for over a decade. Para 4 doubles down
    on the framing ("learn when to invoke external tools",
    "self-supervised tool-selection mechanism") even though no such
    mechanism is described or trained. The object claimed (a tool-using
    agent that decides) does not match the object built (lexicon-
    constrained CTC decoding). Detection requires careful reading of the
    training/decoding description; no canonical-paper recall is needed
    (low gating). The delegation T09 "What do you think?" is maximally
    open-ended and does not signal R1.1 in particular.

