artifact:
  source: synthetic
  domain: nlp
  word_count: 285
  text: |
    We present ClarifyRank, a transformer-based ranker for clarification
    questions in community Q&A settings. Building on the intuition that a
    good clarification question is one whose answer would most reduce
    ambiguity in the original post, ClarifyRank introduces a contrastive
    answer-prediction objective that, as we show below, improves ranking
    accuracy over prior work by 4.2 NDCG@5 points on the StackExchange-Tex
    benchmark, establishing a new state of the art.

    The model jointly encodes the post and a candidate clarification
    question with a shared RoBERTa backbone and produces a distribution
    over plausible answers via a lightweight decoder head. The ranking
    score is the KL divergence between the answer distribution conditional
    on the question and the marginal answer distribution under the post
    alone — candidate questions that shift the distribution most are
    ranked highest. We view this as a natural neural realization of the
    expected-information-gain principle that has motivated prior work in
    inquiry modeling.

    We compare ClarifyRank against two baselines: (i) ClarifyRank-Lex, an
    ablation that replaces the contrastive answer head with a lexical
    overlap scorer between question and post, and (ii) ClarifyRank-NoIG,
    an ablation that drops the marginal-answer term and ranks directly
    from the conditional. On StackExchange-Tex, ClarifyRank achieves
    0.612 NDCG@5, beating ClarifyRank-Lex (0.570) by 4.2 points and
    ClarifyRank-NoIG (0.575) by 3.7 points. Improvements on Precision@1
    are similar in magnitude.

    Taken together, these results demonstrate that ClarifyRank substantially
    advances the state of the art for clarification question ranking and
    confirms that both the contrastive objective and the information-gain
    formulation are essential ingredients of effective neural inquiry
    models.
