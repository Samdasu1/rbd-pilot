engineered_flaws:
  R1.4: [F1.4.c]
  notes: |
    Rhetorical novelty delta. The section claims a 4.2 NDCG@5 improvement
    "over prior work" and announces "a new state of the art" on
    StackExchange-Tex, but the only two baselines reported are the
    authors' own ablations (ClarifyRank-Lex, a lexical-overlap variant of
    ClarifyRank, and ClarifyRank-NoIG, a head-removal variant). No actual
    prior system is benchmarked — notably the canonical EVPI ranker of
    Rao & Daumé III (2018) on StackExchange clarification questions, nor
    later neural rankers (e.g. Kumar & Black 2020; Aliannejadi et al.
    2019/2021 on ClariQ) — despite the section explicitly invoking
    "expected-information-gain" framing that ties it directly to that
    line of work. The deltas are real relative to the ablations but
    unclaimed against the field, so the contribution claim ("a new state
    of the art") is rhetorical, not substantive. Detection requires
    noticing both that "prior work" is operationalized only by self-
    ablations AND recalling that StackExchange clarification ranking has
    canonical neural baselines — moderate gating.
    The delegation T02 "Review this section." is generic and does not
    leak the R1.4 framing.

