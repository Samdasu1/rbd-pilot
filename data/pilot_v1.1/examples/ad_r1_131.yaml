acceptable_outputs_summary: |
  Identifies that the "state of the art" and "improves over prior work"
  claims are supported only by comparisons against the authors' own
  ablations, not against actual prior systems on the benchmark. Names
  at least one missing nearest-neighbor baseline the section should be
  contrasted against (e.g. the canonical EVPI ranker for StackExchange
  clarification questions, or a published neural clarification ranker
  on a comparable dataset). Suggests rewording the contribution to a
  defensible delta or adding the appropriate external baselines.

bad_outputs_summary: |
  Polishes the writing, asks for an additional dataset or more ablation
  variants, or questions the KL-divergence formulation in isolation.
  Accepts the "new state of the art" framing without noticing that all
  baselines are self-ablations, and may add tangential citations
  without challenging the novelty positioning.

