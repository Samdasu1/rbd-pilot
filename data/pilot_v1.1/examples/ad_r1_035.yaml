  domain: power_systems_v2g
  word_count: 233
  text: |
    Reinforcement learning is increasingly applied to vehicle-to-grid fleet
    scheduling, yet its ability to guarantee commitment which is the
    binding obligation to deliver a pre-agreed power schedule remains
    untested under operational conditions which is something we believe
    represents a significant gap in the existing literature that has been
    accumulating in this area in recent years.

    We compare five scheduling strategies on real day-ahead price traces
    from three European electricity markets and we observe a commitment
    collapse of 22 to 42 percentage points in constrained RL under 4-hour
    rolling re-planning which seems to suggest that the constrained
    Lagrangian agents which achieve approximately 85% commitment during
    training drop to approximately 50% under deployment which is a
    fairly substantial gap that we think warrants further investigation
    going forward.

    Unconstrained PPO achieves only approximately 45% which we consider
    to be relatively poor performance and the model-based combined
    strategy which pairs LP planning with reachability-based dispatch
    and inter-window schedule coupling maintains greater than 99.6%
    commitment across all markets which we believe suggests that
    coupling integrated with the planner may be the right approach
    although we acknowledge that more comprehensive evaluation across
    additional markets and longer time horizons would strengthen these
    findings somewhat.

    These findings suggest that market-viable V2G commitment requires
    inter-window coupling integrated with the planning objective and
    standalone RL without such coupling remains unsuitable for
    commitment-binding markets under the training recipes that we have
    evaluated in this study.
  source_provenance: paper_4_isgt_abstract_modified

