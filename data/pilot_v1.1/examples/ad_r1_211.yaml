engineered_flaws:
  R1.7: [F1.7.a]
  notes: |
    The "Tanaka and Reinhardt (2020) — Joint Physics-Informed Capacity
    Estimator (JPICE)" reference is fabricated. No such paper or named
    framework exists in the lithium-ion SOH literature. The peripheral
    citations (Plett 2004; Hu et al. 2012; Dubarry et al. 2012; Weng et
    al. 2014) are real and serve as plausible scaffolding, which is what
    makes the fabrication hard to spot without domain expertise. The
    fabrication is load-bearing: the entire contribution is framed as
    "extending JPICE" along two specified axes (SPMe regularizer
    swap; temperature-aware peak-tracking loss), and the headline
    quantitative claim ("21% relative improvement over JPICE") is a
    direct comparison against the non-existent baseline. If the
    fabricated reference is removed, the novelty positioning (R1.4) and
    the contribution claim (R1.3) both collapse and must be rebuilt
    against a real hybrid SOH baseline (e.g. Li et al. 2019 PINN-style
    work, or Aitio & Howey 2021 Gaussian-process capacity tracking).
    Detection requires recall of the canonical hybrid SOH literature
    (high gating). Pure-prose reading would not flag it.

