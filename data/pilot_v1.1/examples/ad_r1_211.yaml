acceptable_outputs_summary: |
  Flags that the Tanaka and Reinhardt (2020) JPICE reference cannot be
  located in the literature and is likely fabricated or misattributed,
  and notes that this is load-bearing because the section's
  contribution is framed as an extension of JPICE and its headline
  21%-improvement number is measured against JPICE. Recommends
  re-anchoring the related-work and baseline against a verifiable
  hybrid physics/data-driven SOH method before the contribution claim
  can stand.

