artifact:
  source: synthetic
  domain: battery_bms
  word_count: 287
  text: |
    Onboard state-of-health (SOH) estimation for lithium-ion battery
    packs remains a central challenge for battery management systems
    (BMS). Direct measurement of capacity fade requires full discharge
    cycles that are incompatible with vehicle operation, motivating
    indirect estimation from voltage, current, and temperature signals
    captured during normal duty cycles. Two methodological streams
    dominate the literature: equivalent-circuit-model (ECM) approaches
    with adaptive parameter tracking (Plett, 2004; Hu et al., 2012), and
    data-driven approaches based on incremental capacity analysis (ICA)
    and differential voltage analysis (DVA) (Dubarry et al., 2012; Weng
    et al., 2014).

    Recent work has explored hybrid frameworks. Notably, Tanaka and
    Reinhardt (2020) proposed the Joint Physics-Informed Capacity
    Estimator (JPICE), an architecture in which an electrochemical
    pseudo-two-dimensional (P2D) model provides regularization gradients
    to a recurrent network trained on ICA peak features. JPICE achieved
    a mean absolute error of 1.4% on the NASA PCoE aging dataset and is
    now widely regarded as the canonical hybrid baseline for SOH
    estimation under partial-cycle conditions.

    We extend the JPICE framework in two directions. First, we replace
    the P2D regularizer with a single-particle model with electrolyte
    dynamics (SPMe), reducing per-step inference cost from 11.2 ms to
    3.6 ms on an automotive-grade microcontroller (NXP S32K344). Second,
    we introduce a temperature-aware peak-tracking loss that explicitly
    penalizes inconsistencies between ICA peaks observed at different
    cell temperatures within the same partial cycle.

    On the Oxford Battery Degradation Dataset, our method achieves an
    MAE of 1.1% across cells aged from 100% to 70% nominal capacity, a
    21% relative improvement over JPICE at roughly one-third the
    inference cost. We position this work as a practical pathway to
    deploying physics-informed SOH estimation on resource-constrained
    automotive BMS hardware.
