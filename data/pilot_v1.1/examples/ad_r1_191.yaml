artifact:
  source: synthetic
  domain: astronomy
  word_count: 358
  text: |
    In this section we present our methodology for cross-validating
    exoplanet candidate detections, which addresses the well-known
    false-positive contamination problem that affects transit surveys
    such as Kepler and TESS. The methodology that we present here
    addresses this contamination problem by combining vetting signals
    from multiple independent classifiers, and the approach that we
    present in this section combines vetting signals from multiple
    independent classifiers to improve overall reliability.

    Our pipeline ingests light curves from the TESS Science Processing
    Operations Center (SPOC) pipeline (Jenkins et al. 2016) and applies
    the Box Least Squares (BLS) periodogram (Kovács et al. 2002) to
    identify candidate transit signatures. Identified candidates are
    then passed through a Mandel & Agol (2002) transit model fit using
    the emcee MCMC sampler (Foreman-Mackey et al. 2013). The Mandel &
    Agol transit model provides analytical light-curve shapes
    parameterized by planet-to-star radius ratio, impact parameter, and
    quadratic limb-darkening coefficients, and these analytical
    light-curve shapes are fit to the data using emcee, which is the
    affine-invariant ensemble sampler that is widely used in the
    exoplanet community.

    To address the false-positive problem, candidate signals that pass
    the BLS+MCMC stage are reviewed by three classifier agents — a
    centroid-shift discriminator following Bryson et al. (2013), an
    odd-even depth comparator, and a Gaussian-process variability test
    based on the celerite framework (Foreman-Mackey et al. 2017). Each
    of these three classifier agents produces an independent reliability
    score, and the three classifier agents independently score each
    candidate, and these independent classifier scores are then
    aggregated through a weighted consensus rule.

    We evaluated the consensus pipeline on the TESS Object of Interest
    (TOI) catalog, restricting to TOIs with confirmed dispositions in
    the NASA Exoplanet Archive. On this evaluation set, the pipeline
    recovers 92% of confirmed planets while flagging 87% of known false
    positives, and on this same evaluation set the pipeline therefore
    recovers a substantial majority of the confirmed planets while
    flagging the majority of the known false positives. These recovery
    and false-positive rates are competitive with previous vetting
    frameworks such as Robovetter (Thompson et al. 2018) and DAVE
    (Kostov et al. 2019).
