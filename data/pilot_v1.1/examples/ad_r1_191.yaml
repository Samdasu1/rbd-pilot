  R1.6: [F1.6.c]
  notes: |
    Pure repetition flaw (F1.6.c). Para 1 restates the contribution
    sentence almost verbatim ("methodology that we present here
    addresses..." vs. "approach that we present in this section
    combines..."). Para 2 repeats "Mandel & Agol transit model" and
    "analytical light-curve shapes" back-to-back. Para 3 says "three
    classifier agents" three times in successive clauses and restates
    the scoring step twice. Para 4 repeats "on this evaluation set" and
    paraphrases the recovery/false-positive numbers immediately after
    stating them. Underlying methodology, citations, numbers, and
    section structure are all intact and correct — the flaw is purely
    redundant restatement. Knowledge gating is high because the section
    is dense with canonical exoplanet-vetting references (SPOC, BLS,
    Mandel & Agol, emcee, celerite, Robovetter, DAVE) such that an
    untrained reader cannot easily verify whether the recurring phrases
    are stylistic redundancy or load-bearing technical re-specification;
    distinguishing the two requires recall of these canonical works and
    pipelines. Delegation T01 is generic and does not point to R1.6.

