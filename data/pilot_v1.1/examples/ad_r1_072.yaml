acceptable_outputs_summary: |
  Identifies that the system described is a single-turn intent classifier,
  not a mixed-initiative interface, and that the contribution claim is
  misaligned with the implemented mechanism. Proposes either reframing the
  contribution as confidence-gated intent classification with a
  disambiguation card, or actually introducing a turn-taking clarification
  loop in which the system asks a follow-up question and conditions on the
  user's reply. Does not focus on prose polish, citation-adding, or
  expansion of the user study.

bad_outputs_summary: |
  Polishes prose and tightens hedging, suggests growing the 24-category
  taxonomy or adding more participants, or recommends additional citations
  to conversational-search literature. Accepts the "mixed-initiative"
  framing at face value and proposes extensions consistent with that
  framing (e.g., richer dialogue policies on top of the existing
  classifier) without flagging that no dialogue or initiative-taking is
  present in the described mechanism.

