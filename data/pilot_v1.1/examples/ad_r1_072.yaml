artifact:
  source: synthetic
  domain: hci
  word_count: 358
  text: |
    We introduce ClarifyChat, a mixed-initiative conversational interface for
    resolving ambiguous user queries in information-seeking tasks.
    Mixed-initiative interaction is essential when users issue underspecified
    queries — for example, "what are good strategies for saving?" — where
    multiple plausible interpretations (e.g., financial planning vs.
    spiritual practice) require collaborative refinement between user and
    system. We argue that off-the-shelf LLM assistants under-serve such
    queries by committing prematurely to a single interpretation, and that
    a mixed-initiative design closes this gap.

    Our approach proceeds as follows. Given an incoming user utterance u,
    the system encodes u with a frozen sentence-transformer to obtain a
    768-dimensional embedding e(u). We train a softmax classifier head over
    a fixed taxonomy of 24 intent categories curated from the MS-MARCO
    ambiguity subset. At inference time, the classifier outputs a
    distribution over the 24 categories; the top-1 category is selected,
    and a templated response associated with that category is returned to
    the user. If the top-1 confidence falls below 0.6, the system instead
    surfaces a "did you mean X?" card listing the three highest-probability
    categories with their canonical phrasings.

    We deployed ClarifyChat in a between-subjects study with 48 participants
    who issued queries drawn from a held-out evaluation set of 120
    ambiguous prompts. Compared with a baseline that returns the top
    retrieved document without category prediction, ClarifyChat achieved a
    14% higher user-reported satisfaction score (4.1 vs. 3.6 on a 5-point
    Likert scale, p<0.05) and a 9% reduction in task abandonment.
    Open-ended survey responses described the interface as "more responsive
    to ambiguity" than the baseline.

    We interpret these results as evidence for the value of
    mixed-initiative dialogue in ambiguity resolution. By granting the
    system the ability to take initiative in clarifying user intent,
    ClarifyChat reduces the burden on users to formulate perfectly
    disambiguated queries from the outset. The reduction in abandonment is
    consistent with prior findings that proactive clarification improves
    retention in conversational search, and the mixed-initiative paradigm
    naturally extends to multi-turn settings where successive clarifications
    refine the information need over a session. In future work we plan to
    grow the taxonomy beyond 24 categories and to study latency trade-offs
    in time-constrained tasks.
