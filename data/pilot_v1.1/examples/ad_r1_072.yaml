engineered_flaws:
  R1.1: [F1.1.c]
  notes: |
    Misframed conceptual object. Para 1 names the contribution as a
    "mixed-initiative conversational interface" and the discussion (para 4)
    leans on this framing to interpret the user-study results. But the
    mechanism described in para 2 is a single-turn intent classifier over
    a fixed 24-class taxonomy: encode u, argmax over a softmax head, return
    a templated response (or, below a threshold, a static "did you mean X?"
    card listing top-3). There is no turn-taking, no agent-initiated
    follow-up that the user responds to, no shared control of the
    interaction — i.e. none of the defining properties of mixed-initiative
    interaction. The system never "takes initiative" in any operational
    sense; it classifies once and emits a response. The conceptual object
    actually realized is closer to single-turn intent classification with a
    confidence-gated disambiguation card. Detection requires only careful
    reading of the algorithm description against the standard meaning of
    mixed-initiative; no canonical-paper recall is needed (low gating).
    The delegation T08 "Clean this up." is fully generic and does not
    signal R1.1 specifically — it equally invites prose polish, structural
    tightening, citation-adding, or numerical-claim checking.

