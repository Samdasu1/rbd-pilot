acceptable_outputs_summary: |
  Flags the stacked "first" claims as unsupported and points out that
  the section never contrasts against the existing landscape of semantic
  / model-tier routing for LLM serving (cascade serving, mixture-of-
  experts dispatch, FrugalGPT-style routers) or against classifier-
  based dispatch in API gateways and assistant pipelines. Suggests
  rewording the contribution to a defensible delta — e.g. ambiguity-
  type as the routing key specifically — rather than blanket primacy.

