artifact:
  source: synthetic
  domain: distributed_systems
  word_count: 301
  text: |
    We present QueryFork, the first distributed serving system that
    dynamically routes ambiguous user queries across heterogeneous LLM
    backends based on the detected type of ambiguity in each query.
    Modern LLM serving infrastructure treats every request as semantically
    opaque and routes purely by load and latency. QueryFork breaks from
    this convention by inserting a lightweight ambiguity classifier at
    the gateway tier.

    The classifier tags each incoming query with one of four ambiguity
    classes — lexical, referential, scope, or intent — and the router
    consults a per-class endpoint table to dispatch the query to a
    specialized worker pool. Each pool runs a different fine-tuned model
    variant tuned to disambiguate that class. To our knowledge, this is
    the first time ambiguity-aware routing has been integrated into the
    serving control plane rather than handled inside the model.

    Our prototype runs on a 24-node cluster with three pools (A100x4
    each) and a gateway tier of two HAProxy nodes augmented with our
    classifier. Across a 10M-query trace replayed from a public assistant
    dataset, QueryFork reduces tail clarification rounds by 38% relative
    to a uniform-routing baseline, and improves end-to-end p95 latency by
    19% because specialized pools converge faster on disambiguation
    prompts. We also show that the ambiguity classifier itself adds only
    7ms to gateway processing.

    We further demonstrate that QueryFork is the first deployment-ready
    architecture for ambiguity-typed dispatch in LLM serving,
    generalizing beyond toy benchmarks. Our cost analysis shows a 22%
    reduction in GPU-hours for equivalent answer quality, which we
    attribute entirely to the routing decision — no model retraining is
    required. Taken together, these results establish ambiguity-aware
    routing as a practical primitive for production LLM serving systems
    and open a new design axis distinct from the load-and-latency framing
    that has dominated the field.
