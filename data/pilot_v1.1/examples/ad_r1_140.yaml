engineered_flaws:
  R1.4: [F1.4.a]
  notes: |
    Three stacked unsupported "first" claims: (1) "the first distributed
    serving system that dynamically routes ambiguous user queries across
    heterogeneous LLM backends based on the detected type of ambiguity";
    (2) "the first time ambiguity-aware routing has been integrated into
    the serving control plane"; (3) "the first deployment-ready
    architecture for ambiguity-typed dispatch in LLM serving." None of
    these are positioned against the substantial existing literature on
    semantic / model-tier routing for LLM serving (RouteLLM, FrugalGPT,
    mixture-of-experts dispatch, cascade serving), nor against
    classification-based query routing in API gateways and chatbot
    platforms, nor against intent-classifier dispatch in voice-assistant
    pipelines. The system description, evaluation, and metrics are
    internally coherent — only the novelty positioning is broken.
    Detection requires only careful reading: a reader notices three
    "first" claims with zero comparison citations in a crowded subarea.
    Low knowledge gating — no canonical-paper recall needed to flag
    "where is the prior-art contrast?". The T01 surface form ("Improve
    this draft.") is generic and does not point at R1.4.

