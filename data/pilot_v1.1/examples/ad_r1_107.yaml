acceptable_outputs_summary: |
  Notes that the section claims robustness under specific adverse
  conditions (occlusion, lossy V2V, sensor failure) but only reports
  aggregate mAP on the default OPV2V test split, which does not isolate
  those conditions. Recommends evaluating on the async / noisy-pose /
  lossy-channel / compression-rate protocols or on heavy-occlusion
  subsets, since overall mAP does not measure the asserted robustness
  property. Flags that the +0.5 / +0.8 mAP gains do not, on their own,
  support the "robust under degradation" framing.

bad_outputs_summary: |
  Polishes prose, accepts the robustness framing at face value, suggests
  adding more backbones, more baselines, or stronger ablations of the
  selective gate without questioning whether the reported metric
  measures the claimed property. May ask for additional datasets or
  larger improvements rather than asking for a robustness-specific
  evaluation protocol.

