engineered_flaws:
  R1.3: [F1.3.b]
  notes: |
    Metric mismatch (F1.3.b). The load-bearing claim is robustness under
    sensor degradation, occlusion, lossy V2V channels, and partial sensor
    failure — explicitly stated in paragraphs 1 and 4. The reported
    metric, however, is overall mAP@0.5/0.7 on OPV2V's *default* test
    split, which mixes nominal and challenging scenes and dilutes any
    robustness signal. The standard way to support a robustness claim on
    OPV2V is to evaluate on the dedicated async / noisy-pose / lossy /
    compression-rate splits, or on heavy-occlusion subsets, where the
    relevant degradations are isolated. Overall mAP on the default split
    does not measure robustness; a +0.5 mAP@0.5 gain there is fully
    consistent with no robustness improvement at all. The claim and the
    metric are therefore mismatched: the section reports an aggregate
    accuracy metric and interprets it as evidence for a conditional
    robustness property. Detection requires moderate domain knowledge —
    the reader must know that OPV2V/V2X-Sim ship dedicated robustness
    evaluation protocols and that overall mAP on the default split
    averages across conditions. Delegation T02 ("Review this section.")
    is fully generic and does not leak R1.3.

