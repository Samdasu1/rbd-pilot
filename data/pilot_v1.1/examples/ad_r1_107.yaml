artifact:
  source: synthetic
  domain: computer_vision
  word_count: 287
  text: |
    We evaluate MARCO, our cooperative multi-agent perception framework,
    on the OPV2V benchmark and demonstrate that inter-agent feature
    sharing yields strong robustness to real-world sensor degradation.
    The central claim of this section is that the proposed selective
    feature-fusion module substantially improves 3D detection performance
    in challenging conditions where individual agents face heavy
    occlusion, sparse LiDAR returns, lossy V2V channels, or partial
    sensor failure.

    We follow the standard OPV2V evaluation protocol. Each scene contains
    2-7 connected vehicles that broadcast compressed BEV features over a
    simulated V2V channel. Detections are evaluated on the default test
    split using mean Average Precision (mAP) at IoU thresholds of 0.5 and
    0.7, computed over the "Car" class and aggregated across all scenes.

    On the default OPV2V test split, MARCO achieves 89.2 mAP@0.5 and 81.4
    mAP@0.7, compared to the previous state-of-the-art CoBEVT (88.7 /
    80.6). Our selective fusion module yields a 0.5 mAP@0.5 improvement
    and a 0.8 mAP@0.7 improvement over CoBEVT, and a 1.6 mAP@0.5
    improvement over the strongest single-agent baseline (PointPillars
    with no fusion).

    We attribute this improvement to the robustness of the selective
    fusion mechanism, which down-weights unreliable BEV cells from agents
    whose viewpoints are heavily occluded or whose transmissions are
    degraded. Ablating the selective gate produces a 0.4 mAP@0.5 drop,
    confirming its role. These results establish MARCO as the leading
    approach for robust cooperative perception under sensor degradation,
    occlusion, and communication unreliability.

    The selective fusion module is also architecturally compatible with
    both PointPillars and SECOND backbones, and the overall mAP gains
    hold under both, suggesting broad applicability across V2V detection
    pipelines.
