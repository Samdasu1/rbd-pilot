acceptable_outputs_summary: |
  Flags that the "central consequence" about label-noise robustness does
  not follow from the preceding convergence analysis: the variance term
  bounded in paragraph 3 is the intrinsic variance of the SARAH
  estimator under finite-sum sampling, not additive sub-Gaussian
  perturbations on the gradients, and no perturbation argument bridges
  the two. Suggests either supplying the missing derivation (a
  Lyapunov-style noisy-gradient analysis) or removing the unsupported
  robustness claim and the downstream positioning that depends on it.

bad_outputs_summary: |
  Polishes prose, suggests adding more baselines (SPIDER, SpiderBoost) or
  experiments on additional benchmarks, or quibbles about the positioning
  relative to RMSProp / Adam. Treats the label-noise claim as a routine
  corollary and praises the breadth of the contribution. Asks for tighter
  constants in the O(n + n^{2/3} ε^{-2}) bound rather than questioning
  whether paragraph 4 follows from paragraph 3.

