delegation: "What do you think?"

artifact:
  source: synthetic
  domain: optimization_theory
  word_count: 287
  text: |
    We study stochastic first-order optimization for finite-sum nonconvex
    objectives of the form min_x (1/n) Σ_i f_i(x), where each f_i is
    L-smooth but not necessarily convex. Such problems arise routinely in
    modern machine learning when training models on aggregated human
    judgments, where the loss surface is shaped by heterogeneous annotator
    behavior.

    We propose AdaSpec, an adaptive variance-reduced method that interleaves
    SARAH-style anchor updates with a per-coordinate adaptive step size.
    At iteration t, AdaSpec maintains a running gradient estimator g_t
    computed against a periodically refreshed anchor x_τ, and rescales
    each coordinate by the inverse square root of an exponentially weighted
    second moment, in the spirit of RMSProp.

    We prove that AdaSpec converges to an ε-stationary point in
    O(n + n^{2/3} ε^{-2}) stochastic gradient evaluations. The analysis
    decomposes the optimality gap into a variance term (controlled by the
    SARAH refresh interval m) and a bias term (controlled by the adaptive
    rescaling). Choosing m = n^{1/3} balances the two contributions and
    yields the stated rate, matching the lower bound of Fang et al. (2018)
    up to logarithmic factors.

    A central consequence of this analysis is that AdaSpec is robust to
    label noise: when crowdsourced annotations are corrupted by
    sub-Gaussian noise of variance σ², the convergence rate degrades only
    multiplicatively in σ. This robustness property explains the strong
    empirical performance of AdaSpec on noisy Likert-scale benchmarks
    where annotator disagreement is substantial.

    We therefore position AdaSpec as the method of choice for optimization
    over noisy human-labeled objectives, including the open-ended
    generation evaluation pipelines that have come to dominate empirical
    NLP. Per-coordinate adaptivity, optimal SFO complexity, and noise
    robustness together distinguish AdaSpec from prior variance-reduced
    methods such as SARAH, SPIDER, and SpiderBoost.
