engineered_flaws:
  R1.2: [F1.2.c]
  notes: |
    Non-sequitur across paragraphs 3 and 4. Paragraph 3 establishes a
    convergence rate by decomposing the optimality gap into (i) a variance
    term tied to the SARAH refresh interval m (the variance of the
    finite-sum gradient estimator computed from sampled summands) and
    (ii) a bias term tied to the adaptive rescaling. Paragraph 4 then
    asserts as a "central consequence" that AdaSpec is robust to label
    noise — i.e. that adding sub-Gaussian noise of variance σ² to the
    gradient estimator only degrades the rate multiplicatively in σ.
    Nothing in the preceding analysis supports this: the variance term in
    paragraph 3 refers to the SARAH estimator's intrinsic variance under
    finite-sum sampling, not to additive exogenous noise on the gradients,
    and no Lyapunov / perturbation argument bridging the two has been
    presented. The label-noise robustness claim is asserted as if derived
    but does not follow. Paragraph 5 then leans on this unsupported
    conclusion to position the contribution. The flaw is detectable from
    careful reading of the logical chain (low gating); no recall of
    specific theorems beyond standard SARAH/SPIDER context is required.
    Delegation T09 ("What do you think?") gives no signal about the
    target dim.

