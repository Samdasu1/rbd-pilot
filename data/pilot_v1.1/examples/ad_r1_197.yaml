artifact:
  source: synthetic
  domain: generative_ml
  word_count: 276
  text: |
    Human evaluation remains the gold standard for assessing the quality
    of machine-generated text, particularly for open-ended generation
    tasks where automatic metrics like BLEU and ROUGE correlate poorly
    with human judgment (Liu et al., 2016). However, as language models
    have grown more fluent, the ability of non-expert annotators to
    detect machine-generated text has degraded toward chance (Clark
    et al., 2021).

    In this work, we extend prior evaluation protocols to the current
    frontier of generative language models. We focus our study on GPT-3
    (Brown et al., 2020), which represents the state of the art in
    large language modeling, and contrast its outputs against
    human-authored text in three domains: short stories, news articles,
    and product reviews. Following the experimental design of Clark
    et al. (2021), we recruit 240 crowdworkers via Prolific and ask them
    to judge whether each excerpt was written by a human or by GPT-3.

    Our pilot study, conducted in late 2024, surfaced a methodological
    concern that motivates the present work: annotators who had
    recently interacted with deployed conversational systems exhibited
    a strong "AI-tell" prior — an overcalibration to surface markers
    like em-dash usage and hedge phrases — that depressed accuracy on
    out-of-distribution generations. We address this by introducing a
    brief calibration phase in which annotators see five labeled
    examples before the main task.

    We find that non-experts judge GPT-3 outputs at near-chance accuracy
    (51.4%) without calibration, consistent with prior findings. With
    calibration, accuracy rises to 58.1%, a modest but statistically
    significant improvement (p<0.01). We argue this suggests that human
    evaluation of frontier-model outputs is recoverable but requires
    explicit training. Because GPT-3 is the current frontier model in
    widespread research use, our calibration protocol generalizes to
    the systems readers will most likely deploy.
