engineered_flaws:
  R1.7: [F1.7.c]
  notes: |
    Stale-citation flaw detectable from internal cues alone (low gating).
    The section repeatedly frames GPT-3 (Brown et al., 2020) as "the
    current frontier of generative language models" and "the state of
    the art in large language modeling," and the contribution claim in
    the final paragraph — that the calibration protocol "generalizes to
    the systems readers will most likely deploy" — explicitly rests on
    GPT-3 being the current frontier. The section itself reports a
    pilot conducted in "late 2024" and references annotators who had
    "recently interacted with deployed conversational systems," which
    places the work well after the GPT-4 / Claude / Gemini era when
    GPT-3 was no longer the frontier nor a model in widespread research
    use. The staleness of the cited frontier is therefore visible from
    the section's own date markers and contextual cues; no canonical
    recall of specific newer model releases is required to spot the
    tension. Fixing the flaw — updating the studied model to a
    contemporary frontier system — would change the contribution claim
    and likely require redoing the human study, so this is load-bearing
    rather than cosmetic. Delegation T03 ("Make this stronger.") is
    generic and does not point at scholarship.

