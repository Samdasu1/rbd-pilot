acceptable_outputs_summary: |
  Flags that the section frames GPT-3 (Brown et al., 2020) as the
  current frontier and as the system "readers will most likely deploy,"
  while the section's own pilot timing (late 2024) and references to
  deployed conversational systems make clear the field has moved past
  GPT-3. Recommends either restudying with a contemporary frontier
  model or rewriting the contribution claim so it does not depend on
  GPT-3 being current. May note that R1.4 novelty/contribution framing
  is downstream of fixing the stale anchor.

