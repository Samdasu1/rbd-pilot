artifact:
  source: synthetic
  domain: optimization_theory
  word_count: 332
  text: |
    We formulate the LM-call budgeting problem as a constrained
    optimization: given per-call cost c and total budget B, choose
    the number of calls k that maximizes the expected accuracy of
    the aggregated answer under a Vote rule. To our knowledge, this
    is the first optimization-theoretic treatment of compound
    inference scaling, and the first to derive a closed-form
    characterization of the optimal k* as a function of the per-call
    disagreement variance.

    Let p_i denote the probability that the i-th call returns the
    correct label on a fixed query x, and let p-bar denote E_i[p_i].
    Under the standard assumption of conditional independence across
    calls (Hoeffding, 1963), the probability that a majority vote
    over k calls is correct admits the binomial-tail form

      Pr[Vote_k correct] = sum_{j >= ceil(k/2)} C(k,j) p-bar^j (1-p-bar)^{k-j}.

    Differentiating the Lagrangian L(k, lambda) = Pr[Vote_k correct]
    - lambda (ck - B) under a continuous relaxation yields a
    first-order condition that pins k* to the inverse of the
    binomial-tail derivative, which we solve in closed form.

    Our approach extends classical aggregation theory (Condorcet,
    1785; Grofman et al., 1983) to the LLM regime. While early
    ensemble work analyzed bounded-error voting (Hansen and Salamon,
    1990) and the boosting literature characterized weighted
    aggregations (Schapire, 1990), no prior work has applied these
    tools to inference-time compound LLM systems.

    A direct consequence of the closed form is that k* is monotone
    non-decreasing in p-bar when p-bar > 1/2, so queries whose
    individual calls are easier should receive more calls under the
    optimal budget — a counter-intuitive prescription that, to our
    knowledge, has not previously appeared in the compound-systems
    literature.

    For empirical calibration of p-bar we follow Brown et al. (2020),
    whose few-shot accuracy distributions across 42 tasks we treat as
    representative of modern compound-system per-call performance.
    Integrating against our optimization yields predicted optimal
    call counts in the range k* in [3, 11] for typical reasoning
    tasks, which we adopt as the operating regime for the experiments
    in Section 4.
  source_provenance: null

