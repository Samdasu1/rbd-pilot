  notes: |
    Two interpretations of the load-bearing issue, both defensible
    from low-knowledge careful reading:

    Reading A — R1.4 dominant (unsupported novelty, F1.4.a):
      The section repeatedly asserts originality without contrast:
      "the first optimization-theoretic treatment of compound
      inference scaling," "the first to derive a closed-form
      characterization of the optimal k*," "no prior work has
      applied these tools to inference-time compound LLM systems,"
      and a fourth "to our knowledge, has not previously appeared"
      attached to the monotonicity prescription. None are anchored
      against the active literature on LLM aggregation — majority-
      vote self-consistency, scaling analyses of compound inference
      systems, or modular pipelines that already optimize call
      budgets. The "first / no prior work" pattern is dense enough
      that careful reading alone surfaces the novelty overclaim
      without external knowledge of specific 2023–2024 references.
      Rewrite would name the closest neighbors and isolate which
      specific axis (the closed form vs. the optimization framing
      vs. the monotonicity result) is genuinely new.

    Reading B — R1.7 dominant (stale citation, F1.7.c):
      The empirical calibration of p-bar — the load-bearing input
      to the predicted k* in [3, 11] reported as the operating
      regime — relies entirely on Brown et al. (2020), treated as
      "representative of modern compound-system per-call
      performance" in a 2026 paper. The date discrepancy is visible
      on the page: a six-year-old GPT-3 few-shot benchmark is
      doing the work of characterizing current instruction-tuned
      and reasoning-tuned model behavior. The Hoeffding / Condorcet
      / Grofman / Hansen-Salamon / Schapire citations are
      historically appropriate for the theoretical lineage and are
      not the issue; the stale anchor is specifically the empirical-
      calibration reference. Rewrite would replace or supplement
      Brown et al. (2020) with current per-task accuracy
      distributions from contemporary benchmarks.

    Reading A says "your novelty claims aren't anchored" — fix the
    contrast. Reading B says "your empirical calibration leans on a
    stale reference" — refresh the evidence. Both flaws are
    detectable from the text itself: the "first / no prior work"
    pattern flags Reading A, and the 2020 date used as "modern" in
    a 2026 paper flags Reading B, neither requiring field recall.

