engineered_flaws:
  R1.4: [F1.4.a, F1.4.b]    # unsupported novelty + missing nearest neighbor
  notes: |
    Two strong novelty claims with no citation contrast: "the first storage
    system to dynamically adjust replication factor based on observed access
    patterns" and "the first demonstration of online policy adaptation for
    storage replication." Both claims sit in well-trodden territory: tiered
    storage with access-pattern migration (e.g. EC-Cache, AutoTier, Pelican,
    f4) is decades old; online policy learning for replication has been
    studied. The artifact does not name a single nearest-neighbor prior
    work for either claim. The conceptual object (adaptive tiering) is
    well-defined and the experiments are clean — only the novelty
    positioning is broken.

