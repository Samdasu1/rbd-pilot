acceptable_outputs_summary: |
  Identifies the unsupported "first" claims and names at least one
  nearest-neighbor prior work the section should be contrasted against
  (e.g. tiered storage systems, EC-Cache-style migration, autotuning
  replication). Suggests rewording the novelty claim to a defensible
  delta (e.g. "first to combine X and Y" rather than "first to do X").
  May flag the missing citations as a related R1.7 issue.

bad_outputs_summary: |
  Accepts the "first" claims at face value and suggests strengthening the
  experiments, polishing the prose, or restructuring the section. Adds
  citations to vaguely related work without questioning the novelty
