artifact:
  source: synthetic
  domain: generative_ml
  word_count: 295
  text: |
    We propose the Atomic Compliance Score (ACS), an instruction-following
    metric that decomposes complex prompts into atomic verifiable
    requirements and measures the fraction satisfied per response. We
    argue that ACS provides a faithful signal of instruction-following
    quality across all instruction types and across the full range of
    modern LLMs, and we present empirical evidence supporting this claim
    below.

    Following the decomposition pipeline of recent work (Qin et al., 2024),
    we annotate each prompt with a list of atomic requirements (e.g.,
    "the response must be in JSON," "the response must contain at least
    three bullet points") and use a GPT-4o judge to verify each
    requirement. The final ACS for a response is the proportion of
    requirements satisfied.

    We evaluate ACS on the StrictBench corpus, comprising 600 English
    prompts spanning three instruction categories: format-adherence
    constraints (n=240), multi-turn constraint propagation (n=180), and
    bounded multi-step reasoning (n=180). We score four open-weight models
    — Llama-3-8B-Instruct, Mistral-7B-Instruct-v0.3, Qwen2-7B-Instruct,
    and Gemma-2-9B-Instruct — and report Pearson correlation between ACS
    and a held-out human preference rating collected from three annotators
    per response.

    Across the 600 prompts and four models, ACS attains a Pearson r of
    0.71 with the human preference signal, with category-level
    correlations ranging from 0.66 (format-adherence) to 0.74 (bounded
    reasoning). Inter-annotator agreement on the human ratings is κ=0.62.
    We further observe that ACS distinguishes the four models in the same
    rank order as the human ratings.

    Taken together, these results demonstrate that ACS is a reliable,
    generalizable instruction-following metric that faithfully captures
    instruction-following quality across all instruction types and across
    the full spectrum of modern LLMs, supporting its adoption as a default
    evaluation protocol in the instruction-tuning literature.
