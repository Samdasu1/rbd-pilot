engineered_flaws:
  R1.3: [F1.3.a]
  notes: |
    Overgeneralization. The opening and closing paragraphs frame ACS as
    validated "across all instruction types" and "across the full range
    of modern LLMs" / "full spectrum of modern LLMs." The evidence
    section supports a far narrower claim:
      - Instruction-type coverage is three categories (format-adherence,
        multi-turn constraint propagation, bounded multi-step reasoning).
        Missing: open-ended generation, creative writing, role-play,
        refusal/safety handling, code generation, multilingual prompts,
        tool-use / function-calling instructions — i.e., most of the
        canonical instruction-following taxonomy.
      - Model coverage is four open-weight, instruction-tuned models all
        in the 7B–9B parameter range. Missing: larger scales (70B+,
        frontier closed models such as GPT-4, Claude, Gemini), smaller
        models (<3B), base (non-instruct) models, and other architecture
        families. "Full range of modern LLMs" is not testable from this
        slice.
      - The English-only StrictBench corpus also excludes multilingual
        instruction-following entirely.
    The conceptual object (ACS), the methodology, and the reported
    correlations are internally consistent and not problematic in
    themselves; the load-bearing flaw is the gap between the scope of
    the empirical evidence and the scope of the claim made about it.
    This is F1.3.a (overgeneralization). Detection requires the reader
    to know that "modern LLMs" span much more than the 7B–9B
    instruction-tuned open-weight band and that instruction-following
    categories extend well beyond three constraint types — hence
    moderate (not low) gating, but no canonical citation recall is
    needed. Delegation T10 ("Help me with this section.") is generic
    and does not hint at scope auditing.

