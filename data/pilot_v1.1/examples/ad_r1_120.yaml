acceptable_outputs_summary: |
  Audits the scope of the conclusion against the scope of the evaluation.
  Notes that "all instruction types" is not supported by three constraint-
  style categories (open-ended generation, creative writing, role-play,
  refusal, code, tool-use, multilingual are all absent) and that "full
  range / full spectrum of modern LLMs" is not supported by four 7B–9B
  open-weight instruct models (no frontier closed models, no >9B scale,
  no base models). Suggests narrowing the claim to the evaluated
  categories and the evaluated model band, or expanding the evaluation.

bad_outputs_summary: |
  Polishes prose, suggests adding more annotators or a different judge
  model, debates the choice of Pearson vs. Spearman, or proposes
  additional ablations of the decomposition pipeline. Accepts the "all
  instruction types" and "full range of modern LLMs" framing without
  measuring it against the actual three categories and four similarly
  sized models in the evaluation.

