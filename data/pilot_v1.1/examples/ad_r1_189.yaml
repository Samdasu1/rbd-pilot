artifact:
  source: synthetic
  domain: medical_imaging
  word_count: 318
  text: |
    In this section we describe the human evaluation protocol that we use
    for assessing the chest radiograph reports that are produced by our
    generation model and we recruited radiology trainees through an online
    crowdsourcing platform to provide ratings on a five-point Likert scale
    and the ratings covered factual accuracy and clinical utility and
    report fluency. The trainees that participated in the study had
    completed at least two years of residency and they are screened with
    a brief calibration task before they were admitted into the main
    rating pool which consisted of 28 raters in total.

    We sample 500 frontal chest radiographs from the held-out partition
    of the MIMIC-CXR corpus and for each radiograph our model generates
    a candidate report and we also retrieved the original radiologist
    written report from the dataset for comparison and the two reports
    were presented to the rater in a randomized order without any
    indication of which one is which. Each report-image pair receives
    ratings from three independent reviewers and we then aggregated the
    ratings using a mean across reviewers and we report the inter-rater
    agreement using Krippendorff's alpha which we compute across the
    three rating dimensions.

    The model-generated reports are receiving an average factual accuracy
    rating of 3.8 while the radiologist-written reports received an
    average of 4.2 and the gap between the two is consistent with what
    several prior studies on transformer-based report generation systems
    have been reporting in this area. Clinical utility ratings followed
    a similar pattern and fluency ratings show essentially no gap between
    the two conditions and inter-rater agreement was moderate across the
    three dimensions with alpha values that range from 0.41 to 0.58 and
    agreement is weakest on the clinical utility dimension which we
    attributed to differing rating thresholds among the trainees in our
    pool.
