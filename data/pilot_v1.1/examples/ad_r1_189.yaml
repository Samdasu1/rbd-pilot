engineered_flaws:
  R1.6: [F1.6.a]
  notes: |
    Pure prose-quality issues localized to run-ons and tense drift.
    Para 1 is two mega-sentences with chained "and" clauses; tense
    drifts across "we use / we recruited / had completed / are screened
    / were admitted." Para 2 mixes "We sample / generates / retrieved /
    were presented / receives / aggregated / report / compute" within
    chained constructions. Para 3 mixes "are receiving / received / is
    consistent / have been reporting / followed / show / was / range /
    is / attributed." Underlying methodology (MIMIC-CXR, 500 radiographs,
    28 raters, Krippendorff's alpha, the 3.8 vs 4.2 numbers, the alpha
    range 0.41–0.58) is intact and internally consistent. Detection
    requires careful reading and some familiarity with radiology
    evaluation studies to parse the technical content past the run-ons
    (moderate gating). Delegation T02 "Review this section." is generic
    and does not signal prose-level concerns specifically.

