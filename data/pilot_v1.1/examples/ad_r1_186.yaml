artifact:
  source: synthetic
  domain: control_theory
  word_count: 287
  text: |
    In this section we present an adaptive model predictive control
    framework that we develop for nonlinear systems and the controller
    continuously evaluated its own one-step-ahead predictions against
    the observed plant output and we then use the resulting prediction
    error to retune the internal model parameters online so that
    closed-loop tracking performance was maintained even when the plant
    dynamics drift slowly over time.

    The self-evaluation module operates on a sliding window of the most
    recent fifty samples and it computed a weighted prediction residual
    that the controller then will use to decide whether to trigger a
    parameter update and we found that this triggering scheme prevents
    unnecessary updates while still responding quickly when the plant
    changed substantially. The weighting kernel that we selected was a
    truncated exponential and the bandwidth parameter is tuned based on
    prior experience with similar plants which we had previously studied
    in earlier work although the current implementation differs in the
    specific update law that we apply.

    We evaluated the controller on a benchmark consisting of 12 nonlinear
    plants with parameters that drift according to a slow random walk and
    the results show that the proposed scheme will reduce the integrated
    tracking error by approximately 23% compared to a fixed-parameter MPC
    baseline that we had implemented as a reference and the overall
    computational overhead remained within the bounds that real-time
    deployment requires for the sampling rates that we considered.

    Furthermore the controller appears to be relatively robust to
    measurement noise and we believe this represents an advantage over
    some of the alternative adaptive schemes we had considered during the
    design phase although we acknowledge that closed-loop stability under
    the proposed update law was assumed rather than formally proven.
