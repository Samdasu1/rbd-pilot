acceptable_outputs_summary: |
  Names both: (1) the "first ML method" claim is contradicted by the
  section's own citation of DrugDock-v1 (an ML method on the same
  task); (2) all named baselines are author-self, so the contribution's
  novelty positioning lacks third-party contrast. Suggests rewording
  the novelty claim to a defensible delta and adding non-self baselines
  to the comparison.

bad_outputs_summary: |
  Polishes prose, accepts the "first" claim, suggests more target
  classes. Adds peripheral chemistry citations without addressing the
  self-citation pattern. Praises the unified architecture.

