engineered_flaws:
  R1.4: [F1.4.c]
  R1.7: [F1.7.b]
  notes: |
    Two compound issues, both visible without external knowledge:

    R1.4 — rhetorical novelty. Para 1 claims DrugDock is "the first
    machine learning method for predicting drug-target binding
    affinity." This is contradicted by the section's own paragraphs:
    para 2 cites DrugDock-v1 (the authors' own prior ML method for the
    same task), and para 3 cites "a chemistry-only baseline that we
    constructed for this paper." So the "first ML method" claim is
    incompatible with the section's acknowledgment of DrugDock-v1 as
    prior ML work on the same problem.

    R1.7 — missing prior work. The section cites only the authors' own
    DrugDock-v1 and an unnamed "chemistry-only baseline." It does not
    name any non-self ML methods for drug-target binding (the field
    has many such methods, including widely-cited GNN-based approaches).
    Detection: a reader notices "all baselines are author-self" without
    needing to know specific names like DeepDTA — the absence of
    third-party comparisons is internally visible (low gating).

    Combined: fixing R1.4 alone (rewording "first" claim) requires
    addressing R1.7 (adding third-party baselines) and vice versa.

