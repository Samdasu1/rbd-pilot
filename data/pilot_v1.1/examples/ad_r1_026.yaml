artifact:
  source: synthetic
  domain: drug_discovery_ml
  word_count: 202
  text: |
    We introduce DrugDock, the first machine learning method for
    predicting drug-target binding affinity that achieves clinically
    relevant accuracy across diverse target classes. Our approach is
    built on a graph neural network backbone that encodes both small
    molecules and protein binding pockets in a unified representation
    space.

    The training data is drawn from our previously published dataset
    (Anonymous Authors et al., 2021), which we expanded with an
    additional 50,000 binding measurements collected through our group's
    recent crystallography campaigns. The model architecture extends
    our earlier DrugDock-v1 system (Anonymous Authors et al., 2022)
    with a cross-attention layer that integrates structural and chemical
    features.

    Compared to DrugDock-v1, our new architecture achieves a 12% reduction
    in mean absolute error on the held-out test set. Compared to a
    chemistry-only baseline that we constructed for this paper, we
    achieve a 28% reduction in error.

    We evaluate DrugDock on three diverse target classes: kinases,
    GPCRs, and proteases. Performance is consistent across classes,
    with mean absolute error of 0.84 kcal/mol on kinases, 0.91 kcal/mol
    on GPCRs, and 0.79 kcal/mol on proteases.

    We position DrugDock as a meaningful step toward deployable ML
    methods in early-stage drug discovery. The unified architecture and
    the consistent cross-target performance suggest broad applicability
    in the pharmaceutical industry.
