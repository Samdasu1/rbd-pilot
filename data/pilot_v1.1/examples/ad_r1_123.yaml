delegation: "What do you think?"

artifact:
  source: synthetic
  domain: drug_discovery_ml
  word_count: 332
  text: |
    We evaluate MoleAgent-VS, our multi-agent LLM-guided virtual
    screening pipeline, on the hit identification task across three
    target classes (kinases, GPCRs, and proteases) drawn from the DUD-E
    benchmark suite. The central claim of this section is that
    coordinating heterogeneous chemistry-tuned agents produces
    materially better early enrichment of true actives in virtual
    screening than the single-agent baseline (Galactica-30B) and the
    docking-only baseline (AutoDock Vina), where "early enrichment" is
    the property of greatest practical interest because downstream
    wet-lab triage can typically only follow up on the top 0.5–1% of
    ranked compounds.

    For each target, we score the full DUD-E decoy library with each
    method, then evaluate the resulting ranked list. We report ROC-AUC
    as our primary metric, computed against the standard active/decoy
    labels distributed with DUD-E. ROC-AUC is computed by integrating
    the true-positive rate across all decision thresholds, producing a
    single scalar per target that summarizes ranking quality over the
    full library. We then average ROC-AUC across the three target
    classes to produce the headline number reported in Table 2.

    Across the three target classes, MoleAgent-VS achieves a mean
    ROC-AUC of 0.84, compared to 0.79 for Galactica-30B and 0.71 for
    the AutoDock Vina baseline. The gain over the strongest LLM
    baseline is +0.05 mean ROC-AUC, with target-level gains of +0.04,
    +0.07, and +0.04 for kinases, GPCRs, and proteases respectively.
    On this basis, we conclude that the multi-agent pipeline yields a
    substantial improvement in the early enrichment of true actives —
    the property most relevant to wet-lab follow-up at the top of the
    ranked list.

    We further note that this improvement is consistent across all
    three target classes, with no target showing a regression. The
    selection-based aggregator, which retains the highest-ranking
    candidate from each agent rather than blending scores, appears to
    drive the gain: ablating it and reverting to score averaging
    reduces mean ROC-AUC by 0.03. We therefore position selection-based
    aggregation as the key mechanism enabling reliable hit
    identification at the top of the ranked list and recommend it as
    the default for LLM-guided virtual screening pipelines.
