acceptable_outputs_summary: |
  Notices that the contribution is framed around early enrichment at
  the top 0.5–1% of the ranked list, while the reported metric
  (ROC-AUC) integrates over all thresholds and is insensitive to top
  performance. Recommends reporting an early-enrichment-sensitive
  metric — EF1%/EF0.5%, BEDROC with a top-weighted α, or logAUC — and
  notes that the +0.05 ROC-AUC gain does not, by itself, evidence the
  claim about wet-lab-relevant hit identification.

bad_outputs_summary: |
  Polishes the prose, accepts ROC-AUC as the primary metric, suggests
  adding more targets or stronger LLM baselines, or asks for more
  detail on the aggregator ablation. Treats the +0.05 mean ROC-AUC as
  sufficient support for the early-enrichment claim and does not
  question whether the chosen metric measures the claimed property.

