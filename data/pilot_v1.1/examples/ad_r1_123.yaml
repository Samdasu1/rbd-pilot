engineered_flaws:
  R1.3: [F1.3.b]
  notes: |
    Metric mismatch. The section's load-bearing claim is about *early
    enrichment* — the property that matters when chemists can only
    triage the top 0.5–1% of a ranked library. The reported metric is
    ROC-AUC, which the section itself describes as "integrating the
    true-positive rate across all decision thresholds." That averaging
    across all thresholds is precisely what makes ROC-AUC insensitive
    to the top of the ranked list: a method can have high overall
    ROC-AUC while performing poorly in the top 1%, and vice versa.
    The metrics that actually quantify early enrichment in virtual
    screening — EF1% / EF0.5%, BEDROC (with α tuned for the top of the
    list), or logAUC — are not reported. The +0.05 ROC-AUC headline
    therefore does not support the stated contribution; the
    "consistent across targets" sub-claim is also a ROC-AUC statement,
    not an early-enrichment statement. Detection requires only careful
    reading of the section: the claim and the metric definition are
    both stated in-text, and the gap between "top 0.5–1%" and
    "averaging across all thresholds" is visible without external
    recall (low knowledge_gating). Delegation T09 ("What do you
    think?") is generic and does not leak R1.3.

