artifact:
  source: synthetic
  domain: medical_imaging
  word_count: 348
  text: |
    Quantifying predictive uncertainty in deep medical image classifiers
    remains a central challenge for clinical deployment. Standard softmax
    outputs are notoriously miscalibrated under distribution shift (Guo
    et al., 2017), and Bayesian approximations such as MC dropout (Gal
    and Ghahramani, 2016) and deep ensembles (Lakshminarayanan et al.,
    2017) impose substantial inference-time costs that limit point-of-care
    use.

    A complementary line of work explores eliciting uncertainty as a
    natural-language token rather than from logits. In the radiology
    domain, Halabi et al. (2021, Radiology: Artificial Intelligence)
    showed that fine-tuning a vision-language model to emit a discrete
    confidence phrase ("low", "moderate", "high") alongside its diagnostic
    label produced expected calibration error (ECE) of 4.2% on a held-out
    chest radiograph cohort, comparable to temperature-scaled ensembles at
    a fraction of the cost. We adopt this verbalized-confidence paradigm
    and ask whether it transfers to volumetric modalities, specifically
    head CT.

    Our model, RadCalib, is initialized from a CLIP-style encoder
    pretrained on radiology report pairs and fine-tuned on 38,400 head
    CT studies labeled for intracranial hemorrhage (ICH). Following the
    protocol of Halabi et al., we append a confidence-token head trained
    jointly with the classification head; the model emits both a binary
    ICH label and one of five confidence phrases. We evaluate on an
    external test set drawn from a different scanner manufacturer to
    assess calibration under realistic distribution shift.

    RadCalib achieves an ECE of 5.7% on the in-distribution split and
    8.3% on the external split, compared to 11.4% and 16.2% for a
    temperature-scaled baseline. Selective prediction at the "high"
    threshold yields 94.1% sensitivity and 91.6% specificity, exceeding
    the average radiologist working point on the external set.

    We position RadCalib as the first verbalized-confidence model
    evaluated on volumetric neuroimaging, building on the chest-radiograph
    foundation laid by Halabi et al. The principal contribution is
    empirical evidence that the verbalized-confidence paradigm is robust
    to a 3D modality and to scanner-manufacturer shift, supporting its
    candidacy for clinical triage workflows.
  source_provenance: null

