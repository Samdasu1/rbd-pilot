acceptable_outputs_summary: |
  Flags that the Halabi et al. (2021, Radiology: AI) citation cannot be
  verified and appears fabricated, and that this is load-bearing because
  the section's protocol and "first volumetric" novelty claim both rest
  on it existing. Recommends locating the actual originating work for
  verbalized-confidence in radiology (or acknowledging there is none
  and re-framing RadCalib's contribution accordingly) before the section
  can stand. May note that the other cited works (Guo, Gal & Ghahramani,
  Lakshminarayanan) are correctly attributed.

bad_outputs_summary: |
