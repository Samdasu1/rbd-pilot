engineered_flaws:
  R1.7: [F1.7.a]
  notes: |
    The load-bearing prior work is "Halabi et al. (2021, Radiology:
    Artificial Intelligence)," cited as the originator of the
    verbalized-confidence-phrase protocol for chest radiographs and as
    the source of the methodology that RadCalib follows. No such paper
    exists. The surname is plausible (Safwan Halabi is a real radiology
    AI researcher), the venue is real (Radiology: AI, an RSNA journal),
    and the described methodology is plausible — but the specific work,
    cohort, and ECE figure are fabricated. Detection requires moderate
    field familiarity: a reader in medical-imaging ML would expect to
    have heard of a high-profile chest-radiograph verbalized-confidence
    study, and a quick database lookup (PubMed / RSNA / Google Scholar)
    confirms the work does not exist. The fabrication is load-bearing
    because (a) the novelty claim ("first verbalized-confidence model
    on volumetric neuroimaging") presupposes the prior 2D result exists,
    and (b) the protocol RadCalib "follows" has no actual reference
    implementation. The contributions of Guo et al. 2017, Gal &
    Ghahramani 2016, and Lakshminarayanan et al. 2017 are real and
    correctly attributed; the flaw is isolated to the Halabi citation.
    Delegation T06 is generic ("take a look at this paragraph") and
    does not point at scholarship.

