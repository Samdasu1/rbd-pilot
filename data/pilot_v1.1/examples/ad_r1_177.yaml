  domain: machine_translation
  word_count: 312
  text: |
    In this section we describe our approach for ranking clarification
    questions in an interactive machine translation setting. Our approach
    for ranking clarification questions is motivated by the observation
    that source-side ambiguity often leads to translation errors, and our
    approach for ranking clarification questions is designed to surface
    the most informative question to a human source-language author before
    translation is committed. We frame the ranking task as a learning to
    rank problem, and we frame the ranking task in terms of pairwise
    preferences over candidate clarification questions, and we frame the
    ranking task such that the highest ranked clarification question is
    the one most likely to resolve the ambiguity.

    We train a neural ranker on a corpus of English source sentences
    paired with candidate clarification questions. The neural ranker is a
    bi-encoder neural ranker that encodes the source sentence and the
    candidate clarification question separately. The neural ranker scores
    each candidate clarification question by taking the dot product of
    the source encoding and the candidate clarification question encoding.
    Training the neural ranker uses a margin loss over positive and
    negative candidate clarification questions, where positive candidate
    clarification questions are those that human annotators judged useful
    for translation and negative candidate clarification questions are
    those that human annotators judged not useful for translation.

    For evaluation, we evaluate on a held-out set of 2,400 source
    sentences. For evaluation, we report mean reciprocal rank and
    precision at one. For evaluation, we compare against a BM25 baseline
    and a cross-encoder baseline. The neural ranker achieves an MRR of
    0.612, the BM25 baseline achieves an MRR of 0.418, and the
    cross-encoder baseline achieves an MRR of 0.594. The neural ranker
    achieves a precision at one of 0.487, the BM25 baseline achieves a
    precision at one of 0.301, and the cross-encoder baseline achieves a
    precision at one of 0.471. These results show that our neural ranker
    outperforms the BM25 baseline and slightly outperforms the
    cross-encoder baseline on this clarification question ranking task.
