acceptable_outputs_summary: |
  Flags the stacked superlative claims ("first interface...", "first HCI
  study...", "first empirical demonstration...") as unsupported and
  notes that inline disambiguation panels and proactive clarification
  in search interfaces have substantial prior history in faceted /
  exploratory search HCI work. Suggests rewriting the contribution
  framing to a defensible delta (e.g. a specific design or measurement
  novelty against named prior systems) rather than three sweeping
  "first" claims with no contrast.

bad_outputs_summary: |
  Polishes the writing, suggests reporting more statistics, or asks for
  the question-generation model to be described in more detail. Accepts
  the "first" claims at face value and praises ClarifyLens as a novel
  design pattern, perhaps recommending a larger participant pool or an
  additional Likert item — without questioning the novelty positioning
  or asking for nearest-neighbor disambiguation-UI work.

