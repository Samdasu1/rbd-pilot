engineered_flaws:
  R1.4: [F1.4.a]
  notes: |
    Three "first" claims stacked in a single section, all in well-trodden
    HCI territory: (a) "first interface to embed clarifying questions
    directly into the search results page" — inline disambiguation
    widgets / faceted-search "did you mean" panels / Bing-style entity
    disambiguation cards have all done this for years; (b) "first HCI
    study to measure user satisfaction with proactive disambiguation in
    open-domain search" — proactive disambiguation has a long HCI
    evaluation history in faceted search and exploratory search
    interfaces; (c) "first empirical demonstration that inline clarifying
    questions improve open-domain search outcomes." No nearest-neighbor
    prior work is named anywhere in the section. Detection is low-gating
    because the artifact itself stacks three sweeping "first" claims
    without contrast — a careful reader notices the unhedged superlatives
    and the absence of any positioning against existing
    disambiguation-UI literature, without needing to recall specific
    canonical papers. The delegation "Check this." is maximally generic
    and does not point at R1.4.

