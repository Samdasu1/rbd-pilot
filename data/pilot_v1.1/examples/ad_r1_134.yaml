artifact:
  source: synthetic
  domain: hci
  word_count: 332
  text: |
    In this section we present ClarifyLens, a mixed-initiative conversational
    search interface that proactively surfaces clarifying questions to users
    when their initial query is judged ambiguous. To our knowledge,
    ClarifyLens is the first interface to embed clarifying questions
    directly into the search results page rather than as a separate
    conversational turn, and the first HCI study to measure user
    satisfaction with proactive disambiguation in open-domain search.

    The interface displays up to three candidate clarifying questions in a
    persistent panel above the result list. Users can answer a question by
    tapping a chip, dismiss the panel, or ignore it and proceed with the
    returned results. We logged interaction events from 48 participants
    completing six information-seeking tasks of varying ambiguity
    (calibrated using the TREC-style facet diversity score). Participants
    were recruited through a university participant pool and compensated
    at the standard hourly rate.

    Quantitatively, participants who engaged with the clarifying-question
    panel reached a satisfactory result in 22% fewer query reformulations
    than the control group, and self-reported task confidence (7-point
    Likert) was 0.6 points higher on average. Qualitatively, participants
    described the panel as "helpful when I didn't know what I was looking
    for" and "less annoying than I expected from a chatbot."

    These results constitute the first empirical demonstration that
    inline clarifying questions improve open-domain search outcomes, and
    we believe ClarifyLens establishes a new design pattern for
    conversational information retrieval. Because the underlying
    question-generation model is treated as a black box in our study, the
    contribution is squarely an interface contribution rather than a
    modeling one. We expect this design pattern to generalize to voice
    assistants, enterprise search, and customer-support chat. The
    simplicity of the panel (a few chips above the result list) means
    practitioners can adopt the pattern without retraining their
    retrieval stack, and we believe this is a foundational step toward
    truly mixed-initiative search interfaces.
