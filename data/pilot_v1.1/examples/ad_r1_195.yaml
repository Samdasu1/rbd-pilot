engineered_flaws:
  R1.7: [F1.7.b]
  notes: |
    Internal-citation contradiction visible from the section itself; no
    external knowledge of the quadrature literature is required.
    Paragraph 1 claims QuadAbstain is "the first adaptive quadrature
    scheme that pairs a posteriori error estimation with a principled
    abstention mechanism." Paragraph 2 then cites Bornemann (2003) as
    having "proposed a reliability score for adaptive quadrature on
    functions with endpoint singularities and used it to flag panels
    as untrustworthy" — which is, by the section's own description, a
    prior abstention-by-reliability mechanism for adaptive quadrature.
    The "first" novelty claim is contradicted by the section's own
    related-work paragraph. The contribution as actually executed (a
    bootstrap confidence band on a specific residual indicator with a
    panel-fraction threshold) is a defensible delta, but the priority
    framing in paragraph 1 is broken. The downstream R1.4 novelty
    positioning is contingent on repairing this scholarship gap.
    Delegation T06 ("Take a look at this paragraph") is fully generic
    and does not direct attention to citations or priority claims.

