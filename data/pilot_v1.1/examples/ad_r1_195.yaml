  text: |
    Adaptive numerical quadrature has long sought to balance computational
    cost with rigorous error control. We introduce QuadAbstain, the first
    adaptive quadrature scheme that pairs a posteriori error estimation
    with a principled abstention mechanism: when the local error
    indicator becomes unreliable on near-singular integrands, the method
    declines to return a value rather than emit an unjustified estimate.
    We build on the residual-based error indicator of Kowalski and Tran
    (2019), extended with a bootstrap confidence band over the indicator
    itself.

    Existing methods typically combine Gauss-Kronrod pairs (Patterson,
    1968) with global doubling strategies, halting once a user tolerance
    is met. These pipelines have no notion of "I do not know" — they
    always return a value, even when the embedded error estimate has
    saturated. Heuristic safeguards (e.g., aborting on detected
    degeneracy) are sometimes layered on top, an idea that can be traced
    back to Bornemann (2003), who proposed a reliability score for
    adaptive quadrature on functions with endpoint singularities and
    used it to flag panels as untrustworthy.

    QuadAbstain extends Kowalski and Tran's estimator with a bootstrap
    confidence band. When the band crosses zero on a panel, the panel
    is flagged unreliable; once unreliable panels exceed a fraction τ
    of the total interval mass, the integrator returns ABSTAIN instead
    of a numeric value.

    We evaluate on the CHEBINT test suite of 35 difficult integrals and
    on a battery of endpoint-singular problems. On the regular subset,
    QuadAbstain matches QUADPACK accuracy to within 1 ulp at comparable
    cost. On the singular subset, where QUADPACK silently returns
    degraded estimates, QuadAbstain abstains on 14 of 19 problems and
    returns accurate values on the remaining 5. We position QuadAbstain
    as a meaningful step toward trustworthy automatic integration in
    scientific computing pipelines.
