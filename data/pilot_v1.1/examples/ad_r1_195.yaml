acceptable_outputs_summary: |
  Identifies that the "first adaptive quadrature scheme … with a
  principled abstention mechanism" claim is contradicted by the
  section's own citation to Bornemann (2003), whose reliability score
  is described as flagging panels as untrustworthy — i.e. an earlier
  abstention mechanism for adaptive quadrature. Suggests rewording the
  contribution to a defensible delta (e.g., "first to combine a
  bootstrap confidence band on a residual indicator with a
  panel-fraction abstention threshold") rather than asserting priority,
  and notes that the novelty framing depends on resolving this
  scholarship issue.

