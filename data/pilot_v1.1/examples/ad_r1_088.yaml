artifact:
  source: synthetic
  domain: generative_ml
  word_count: 320
  text: |
    In this section we present EcoRoute, a training-free framework for
    routing user queries across a heterogeneous pool of large language
    models. Unlike prior approaches such as FrugalGPT and RouteLLM that
    learn a query classifier from a labeled corpus of (prompt, best-model)
    pairs, EcoRoute requires no routing-specific supervision: routing
    decisions are made entirely from features that can be extracted from
    the prompt itself, making the system immediately deployable in any new
    domain without a data-collection phase.

    The router operates in three stages. First, an embedding model maps
    the incoming prompt to a fixed-dimensional vector. Second, a
    lightweight scoring head produces a per-model utility score that
    estimates the expected quality of each candidate LLM on this prompt.
    Third, the model with the highest utility-minus-cost score is selected
    and the prompt is forwarded to it.

    We train the scoring head using a pairwise ranking objective over the
    RouterBench training split, in which each prompt is annotated with the
    responses of all candidate LLMs and their corresponding quality
    judgments from GPT-4-as-judge. Concretely, we sample 50,000 (prompt,
    model_a, model_b) triples and minimize a logistic loss that penalizes
    incorrect orderings. Training converges in roughly four GPU-hours on a
    single A100.

    At inference time, the scoring head is fixed and produces utility
    estimates with negligible latency overhead (~3ms per prompt on a CPU
    host). Because no candidate LLM is queried until after routing
    completes, the routing tax remains constant regardless of the number
    of models in the pool — a property we refer to as model-pool
    agnosticism.

    We compare EcoRoute against three baselines: a uniform random router,
    a cost-only router, and the cascade-style router from FrugalGPT. On
    the RouterBench evaluation split, EcoRoute achieves 92% of GPT-4's
    average quality at 18% of its cost, outperforming the cascade by 7
    quality points at matched cost. We attribute these gains to the
    absence of any labeling burden: practitioners can deploy EcoRoute on
    private workloads without first collecting routing-supervision data.
