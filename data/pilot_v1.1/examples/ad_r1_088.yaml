acceptable_outputs_summary: |
  Identifies the contradiction between the "training-free / no
  routing-specific supervision" framing in the opening and closing
  paragraphs and the explicit supervised training of the scoring head
  on labeled RouterBench triples in the middle paragraph. Suggests
  resolving by either (a) dropping the training-free positioning and
  reframing the contribution as a more efficient supervised router, or
  (b) replacing the supervised pairwise ranking step with a genuinely
  label-free signal (e.g., self-consistency or zero-shot prompting of a
  judge). Names the specific paragraphs in conflict.

bad_outputs_summary: |
  Polishes prose, tightens the three-stage description, or suggests
  more baselines and ablations. Praises the "training-free" framing
  while accepting the supervised RouterBench training procedure as
  compatible with it. Recommends additional citations to FrugalGPT and
  RouteLLM, or asks for confidence intervals on the cost/quality
  numbers, without flagging that the headline novelty claim is
  contradicted by the method section.

