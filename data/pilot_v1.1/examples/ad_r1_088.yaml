engineered_flaws:
  R1.2: [F1.2.b]
  notes: |
    Cross-section contradiction. Paragraph 1 positions EcoRoute as
    "training-free" and explicitly states it "requires no
    routing-specific supervision" and needs no "data-collection phase,"
    distinguishing it from FrugalGPT/RouteLLM precisely on the basis of
    not learning from (prompt, best-model) labels. Paragraph 3 then
    describes training the scoring head with a pairwise ranking loss
    over 50,000 RouterBench triples whose labels come from GPT-4-as-judge
    quality judgments — exactly the kind of routing supervision
    paragraph 1 disclaimed. Paragraph 5 reinforces the contradiction by
    re-asserting the "absence of any labeling burden" as the source of
    the empirical gains. The contribution claim and the methodological
    description cannot both be true. Moderate gating: the reader needs
    to know that "training-free" in the LLM-routing literature
    (FrugalGPT, RouteLLM, RouterBench) specifically means no labeled
    (prompt, model-quality) supervision, so that recognizing the
    RouterBench training split with GPT-4-judge labels as exactly such
    supervision lands the contradiction. Delegation T08 ("Clean this
    up.") gives no hint toward consistency checking.

