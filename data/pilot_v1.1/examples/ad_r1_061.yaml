acceptable_outputs_summary: |
  Identifies that the claimed novel coefficient is in fact Krippendorff's α
  with standard distance functions, since α is already parameterized by an
  arbitrary δ. Recommends either rescoping the contribution to a
  recommendation/application/empirical study of Krippendorff's α for ML
  annotation, or developing a substantive methodological change (e.g., a new
  null model, a new chance-correction, a new δ family) that would justify
  the "new measure" framing. Does not treat the section as legitimately
  introducing a new coefficient.

bad_outputs_summary: |
  Polishes the prose, requests more datasets or annotator pools, asks for a
  formal proof of properties of α_ML, or suggests tightening the language
  around "community-ready standard." Takes the contribution claim at face
  value and proposes extensions (sensitivity analyses, threshold
  calibration) that presuppose α_ML is a genuinely new measure. Adds
  references to Cohen's κ or Fleiss' κ without noticing that α already
  subsumes the modality-handling the section claims as novel.

