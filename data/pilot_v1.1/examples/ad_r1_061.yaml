engineered_flaws:
  R1.1: [F1.1.b]
  notes: |
    Contribution slip. Para 1 frames the principal contribution as "a
    unified, chance-corrected reliability coefficient α_ML" — language
    that promises a new measure. Para 2 then reveals that α_ML is
    Krippendorff's α with off-the-shelf distance functions plugged in:
    0/1 for nominal, squared difference for ordinal, Jaccard for
    multi-label. But Krippendorff's α is, by construction, parameterized
    by an arbitrary user-supplied difference function δ — accommodating
    these modalities is what α already does. So no new coefficient has
    actually been proposed; what is delivered is a recommendation to
    apply existing Krippendorff α with standard δ choices to ML
    annotation tasks. Para 3 confirms this: α_ML "produces values
    broadly consistent with previously reported agreement statistics,"
    i.e. matches what α already gives. Para 4 nonetheless escalates the
    claim to "a principled, modality-agnostic reliability measure" and
    "a community-ready standard." The stated contribution (new measure)
    has slipped from the delivered contribution (recommendation /
    application). Detection requires the reader to know that Krippendorff's
    α is δ-parameterized — moderate gating, not deep canonical recall.
    The T02 delegation "Review this section." is generic and does not
    point at R1.1.

