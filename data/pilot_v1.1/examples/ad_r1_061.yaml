artifact:
  source: synthetic
  domain: machine_learning
  word_count: 288
  text: |
    We address a pressing problem in the machine learning community: the lack
    of a standard reliability measure for coded annotation data. Despite
    increased reliance on human-labeled corpora for training and evaluating
    ML systems, the field has yet to converge on a consistent way to report
    inter-annotator agreement. Our principal contribution is a unified,
    chance-corrected reliability coefficient α_ML that accommodates the
    multi-label, hierarchical, and continuous-rating settings now common in
    modern ML annotation pipelines.

    In Section 3, we develop α_ML by adopting Krippendorff's α as our base
    coefficient and pairing it with a label-distance function δ(c_i, c_j)
    tailored to each annotation modality. For nominal categories, δ reduces
    to the standard 0/1 indicator. For ordinal severity ratings (e.g.,
    toxicity scores 0-4), δ is the squared difference. For multi-label
    cases, we use the Jaccard distance between label sets. We then plug δ
    into the standard Krippendorff formulation to obtain observed
    disagreement D_o and expected disagreement D_e by chance, and define
    α_ML = 1 - D_o / D_e.

    We illustrate α_ML on three publicly available annotation corpora: the
    Jigsaw toxicity dataset (multi-label), the SNLI relabeling subset
    (ordinal), and the GoEmotions hierarchical labels. In each case, α_ML
    produces values broadly consistent with previously reported agreement
    statistics, and we recommend its use across ML annotation contexts.

    Our work thus delivers a principled, modality-agnostic reliability
    measure that resolves the long-standing inconsistency in how ML
    annotation reliability is reported. By providing a single coefficient
    applicable across the diverse label structures encountered in modern ML
    datasets, α_ML offers a community-ready standard for benchmark
    reporting. Future work will examine sensitivity to annotator pool size
    and the calibration of α_ML thresholds for downstream training-data
    quality decisions.
