engineered_flaws:
  R1.5: [F1.5.a]
  notes: |
    The contribution claim — a cross-predictor benchmark of post-hoc
    recalibration on a temporally held-out ClinVar cohort, plus released
    calibration mapping tables — is stated only in the FINAL paragraph,
    after motivation, dataset description, results, and subgroup
    analysis. A reader entering this section does not learn what the
    paper actually contributes until paragraph 5 of 5. The natural
    structure for such a contribution-style section would be:
      contribution claim (1) → context / prior calibration findings (2)
      → method / dataset (3) → results (4) → subgroup discussion (5)
    The current order is:
      motivation (1) → method/dataset (2) → results (3) → subgroup (4)
      → contribution (5)
    The flaw is structural: the contribution sentence is genuinely
    buried, requiring a section-level reorder rather than a sentence
    rewrite. Detection requires no canonical recall — any careful
    reader notices the contribution arrives last (low gating). The
    delegation "Make this stronger" is generic polish-style language
    and does not name or imply contribution placement (no leakage).

