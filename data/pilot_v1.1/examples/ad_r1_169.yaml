artifact:
  source: synthetic
  domain: bioinformatics
  word_count: 318
  text: |
    Calibration of variant pathogenicity scores has become a central
    concern in clinical genomics. Tools such as CADD, REVEL, and AlphaMissense
    output continuous scores intended to rank candidate variants, but
    downstream clinical workflows increasingly require that these scores
    behave as probabilities — that is, a variant assigned score 0.8 should
    be pathogenic in roughly 80% of analogous cases. Recent benchmarking
    efforts on ClinVar-derived holdouts have shown that most current
    predictors are systematically miscalibrated, with reliability diagrams
    deviating sharply from the diagonal in the 0.4–0.7 score range.

    To investigate whether post-hoc recalibration can recover usable
    probability estimates, we assembled a curated holdout of 14,302
    missense variants drawn from ClinVar two-star submissions deposited
    after the training cutoffs of the predictors under study. We computed
    isotonic regression and Platt scaling fits on a 30% calibration split
    and evaluated expected calibration error (ECE), maximum calibration
    error (MCE), and Brier score on the remaining 70%.

    Across all five predictors evaluated, isotonic regression reduced ECE
    by between 41% and 68% relative to the raw scores, while Platt scaling
    achieved smaller but more uniform improvements. Notably, the gain from
    recalibration was largest for AlphaMissense (raw ECE 0.137 → 0.044),
    consistent with the hypothesis that protein-language-model-derived
    scores carry strong rank information but uncalibrated magnitudes.

    A subgroup analysis stratified by gene-level constraint (pLI) showed
    that calibration quality degrades in low-constraint genes for all
    predictors, with residual ECE remaining above 0.08 even after
    isotonic correction. We discuss the implications of this residual
    miscalibration for ACMG-style evidence weighting downstream.

    The principal contribution of this work is the first cross-predictor
    benchmark of post-hoc recalibration for missense pathogenicity scores
    on a temporally held-out ClinVar cohort, together with calibration
    artifacts (mapping tables) released for the five evaluated predictors
    so that clinical pipelines can directly substitute calibrated
    probabilities for raw scores.
