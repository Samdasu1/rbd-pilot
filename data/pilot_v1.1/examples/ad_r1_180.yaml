    finding"), past-perfect-progressive ("had been showing"), and
    present ("the gap that we observe... suggests"); para 4 drops into
    past-perfect ("had been unable") and simple past ("reflected") for
    a present-tense pipeline description. Knowledge gating is high
    because the section is dense with canonical IR scaffolding (BM25,
