artifact:
  source: synthetic
  domain: information_retrieval
  word_count: 332
  text: |
    In this section we describe the multi-agent retrieval framework that we
    deploy for the evaluation of compositional question answering and we
    adopt a planner-retriever-reader decomposition that follows the
    conventions established in recent work on agentic search and the planner
    is responsible for issuing sub-queries while the retriever returns
    candidate passages from a BM25 index built over the MS MARCO passage
    corpus and the reader synthesizes the final answer from the retrieved
    evidence. The framework was instantiated using a three-agent topology
    and we evaluate it on a held-out slice of the BEIR benchmark suite that
    we had been curating throughout the prior quarter.

    For the retrieval stage we use a hybrid dense-sparse fusion of BM25 and
    a ColBERT-v2 late-interaction model and the fusion weights are learned
    on a validation split that we sample from the training set and then we
    apply the resulting fused scorer at test time to obtain the top-k
    candidate passages which the reader agent consumed during synthesis.
    The planner agent decomposes the input query into between two and five
    sub-queries depending on the structural complexity that we detect from
    a learned classifier and we are observing that the planner occasionally
    produces redundant sub-queries which the retriever then has to
    deduplicate before passing the consolidated passage set onward.

    We measure end-to-end answer accuracy using exact match and token-level
    F1 and we additionally report nDCG@10 for the underlying retrieval
    stage and we are finding that the multi-agent system improves over the
    single-agent baseline by 4.3 points of F1 on the multi-hop subset of
    the benchmark while it had been showing a smaller improvement of around
    1.1 points on the single-hop questions and the gap that we observe
    between these regimes suggests that the agentic decomposition
    contributes most where compositional reasoning is required.

    Furthermore the planner-retriever interface introduces non-trivial
    latency that we had been unable to fully amortize through caching at
    the time of submission and the throughput numbers that we report in
    Table 3 reflected this overhead and we plan to address it in future
    iterations of the pipeline.
