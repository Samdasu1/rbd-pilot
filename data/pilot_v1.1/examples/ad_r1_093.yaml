acceptable_outputs_summary: |
  Surfaces the unstated assumption that the attention-entropy-to-
  correctness mapping is itself shift-invariant, and notes this is
  exactly the property that fails for post-hoc calibrators trained on
  in-distribution data per the canonical calibration-under-shift
  literature. Recommends either (a) softening the contribution to
  in-distribution calibration, or (b) providing direct empirical or
  theoretical evidence that the entropy-correctness map transfers
  across the evaluated shifts.

bad_outputs_summary: |
  Polishes prose, suggests additional corruption benchmarks or larger
  ViT backbones, or recommends adding citations to temperature scaling
  without challenging the transfer claim. Accepts the
  "representations-not-inputs" argument at face value, treats the
  ImageNet-C/Sketch numbers as sufficient evidence for the
  arbitrary-distribution claim, or focuses on the CLIP extension
  rather than the load-bearing premise.

