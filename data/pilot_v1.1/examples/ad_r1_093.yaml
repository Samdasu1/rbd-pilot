artifact:
  source: synthetic
  domain: computer_vision
  word_count: 278
  text: |
    We propose ConfViT, a post-hoc calibration framework for vision
    transformers that produces well-calibrated confidence scores under
    arbitrary deployment distributions. Unlike prior post-hoc calibrators
    that operate purely on output logits, ConfViT learns a confidence
    transformation from the model's intermediate attention representations.

    The core insight is that the [CLS] token's attention entropy across
    transformer blocks correlates strongly with prediction correctness.
    We define a calibration map T_phi that takes the per-block entropy
    vector as input and outputs a scalar temperature for the final logits.
    T_phi is parameterized as a small MLP and trained by minimizing
    negative log-likelihood on a labeled subset of ImageNet-val. At
    inference, T_phi is applied to scale the softmax distribution.

    We evaluate ConfViT on (i) the standard ImageNet-val set, (ii) the
    ImageNet-C corruption benchmark at severity levels 1-5, and (iii)
    ImageNet-Sketch as an out-of-distribution stress test. Across all
    settings, ConfViT reduces expected calibration error (ECE) relative
    to vanilla temperature scaling by 35-45%, with no further tuning on
    the corruption or sketch distributions.

    A central advantage of ConfViT is its independence from the deployment
    distribution. Because T_phi is a function of the model's internal
    representations rather than of input statistics, the calibration map
    transfers to arbitrary downstream test distributions without
    recalibration. This makes ConfViT particularly suitable for
    safety-critical deployment where the test distribution is unknown at
    calibration time.

    In Section 5 we extend ConfViT to CLIP-style dual-encoder
    architectures and show that the same framework produces calibrated
    zero-shot classification confidences across 12 downstream
    image-classification benchmarks, supporting our claim that
    representation-based calibration is broadly transferable.
