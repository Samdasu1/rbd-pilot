engineered_flaws:
  R1.2: [F1.2.a]
  notes: |
    Hidden premise (F1.2.a). The contribution claim is
    "deployment-distribution-independent calibration": T_phi is asserted
    to transfer to arbitrary downstream distributions without
    recalibration. The argument given is that T_phi consumes the model's
    internal attention entropies rather than input statistics. The
    load-bearing but unstated premise is that the mapping from
    attention-entropy to correctness is itself invariant under covariate
    shift. Canonical calibration literature (Guo et al. 2017 on
    temperature scaling; Ovadia et al. 2019 "Can You Trust Your Model's
    Uncertainty?"; Minderer et al. 2021 on calibration of modern
    image classifiers) establishes that post-hoc calibration mappings
    learned on in-distribution data systematically degrade under shift,
    precisely because the relationship between any model-internal signal
    and correctness is itself shift-dependent. T_phi being a function of
    representations rather than inputs does not exempt it from this
    failure mode — representations under shift are exactly where the
    miscalibration originates. Without surfacing and defending this
    premise (e.g., via empirical demonstration that
    entropy-to-correctness is shift-invariant for ViTs, or a theoretical
    argument), the contribution claim does not follow from the method.
    Detection requires recall of the canonical calibration-under-shift
    literature; surface prose reads cleanly. Delegation T10 ("Help me
    with this section.") is fully generic.

