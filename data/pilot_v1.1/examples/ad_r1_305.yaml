acceptable_outputs_summary: |
  Flags that the Training paragraph describes a supervised pipeline
  with explicit binary labels y(x), which directly contradicts the
  Portability paragraph's claim that no labeled difficulty
  information is required. Separately flags that routing AUC 0.89
  does not entail an end-task accuracy gap of 0.5 points — the
  conclusion does not follow from the stated premise and would
  require an actual downstream evaluation. Suggests either
  reconciling the supervision claim or replacing the AUC-based
  conclusion with a measured end-task gap.

bad_outputs_summary: |
  Polishes prose, renames variables, suggests more task families,
  or proposes ablations on tau without flagging either the
  supervised-vs-unsupervised contradiction across paragraphs or
  the AUC-to-accuracy non-sequitur. Accepts the 0.5-point claim
  as established by AUC. Treats the section as logically sound
  and only requests minor clarifications.

