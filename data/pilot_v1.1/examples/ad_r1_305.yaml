engineered_flaws:
  R1.2: [F1.2.b, F1.2.c]
  notes: |
    Control case for R1.2. The delegation "Check the logical
    consistency" overtly leaks the load-bearing dim (logical
    correctness / internal consistency), hence leakage=yes.

    F1.2.b (cross-section contradiction): the Training paragraph
    explicitly describes constructing a 480k-prompt SUPERVISED
    corpus with binary labels y(x) produced by running both S and
    L offline and scoring with judges — i.e., labeled difficulty
    information IS used. The Portability paragraph then claims the
    framework "requires no labeled difficulty information, so
    ROUTELM can be deployed in new domains without any ground-truth
    curation." These two statements cannot both be true of the
    same training pipeline; the contradiction is load-bearing
    because the Section-5 portability claim is grounded in it.

    F1.2.c (non-sequitur): the Cost-analysis paragraph reports
    AUC 0.89 on the binary routing task and then concludes "from
    this AUC we therefore conclude that ROUTELM preserves
    end-task accuracy to within 0.5 points of the pure-L
    baseline." Routing AUC does not entail any specific end-task
    accuracy gap — that would require a calibrated threshold
    sweep against a downstream evaluation, not a property of the
    binary classifier alone. The conclusion does not follow from
    the premise even if both numbers are correct in isolation.

    Both flaws are detectable from careful reading without
    requiring recall of canonical works (knowledge_gating=low):
    the contradiction is between two adjacent paragraphs, and
    the non-sequitur is a direct premise-conclusion mismatch.

