artifact:
  source: synthetic
  domain: systems
  word_count: 322
  text: |
    We describe ROUTELM, a query router that dispatches natural-language
    prompts between a small LM (S) and a large LM (L) so as to minimize
    inference cost while preserving end-task accuracy. The router is a
    meta-model phi that, given a prompt x, predicts whether S(x) will be
    an acceptable substitute for L(x).

    Training. We construct a supervised corpus of 480k prompts spanning
    eight task families. For each prompt, we run both S and L offline,
    score their outputs with task-specific judges, and emit a binary
    label y(x) in {0, 1} marking whether S(x) is acceptable. phi is a
    4-layer transformer trained with binary cross-entropy on this
    corpus. Class balancing is applied because S is judged acceptable
    on 71 percent of prompts on average.

    Routing. At serving time, phi emits a score p(x) in [0, 1].
    Prompts with p(x) > tau are dispatched to S; the rest are
    dispatched to L. The threshold tau is selected on a held-out split
    to enforce a target accuracy floor.

    Portability. A central advantage of our framework is that it
    requires no labeled difficulty information, so ROUTELM can be
    deployed in new domains without any ground-truth curation. We
    exploit this in Section 5, where we port ROUTELM to a
    customer-support corpus for which only raw prompts are available.

    Cost analysis. On the eight-task suite, ROUTELM dispatches 64
    percent of queries to S and 36 percent to L. Because S costs
    1/20 as much as L per token, total inference cost falls by 60
    percent relative to a pure-L baseline. The router phi achieves
    AUC 0.89 on the binary routing task. From this AUC we therefore
    conclude that ROUTELM preserves end-task accuracy to within
    0.5 points of the pure-L baseline.
