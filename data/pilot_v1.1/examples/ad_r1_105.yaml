acceptable_outputs_summary: |
  Identifies that the section claims human preference / human-perceived
  quality improvements but only measures RM-13B scores and RM-induced
  win rates, with no actual human study. Notes that this is especially
  problematic because RM-13B is the PPO optimization target, so its
  scores are a biased proxy and cannot license the "humans prefer"
  conclusion. Recommends either running a human evaluation on the 2,000
  prompts or restating the claim in terms of reward-model score under
  the explicit caveat that no human judgments were collected.

bad_outputs_summary: |
  Polishes prose, suggests reporting confidence intervals on the win
  rate, asks for more sub-split breakdowns or a stronger baseline than
  SFT, or requests ablations on PPO hyperparameters. Accepts the
  RM-13B numbers as evidence for the human-preference claim and the
  "human-perceived quality" framing without flagging that no humans
  were ever consulted in the evaluation.

