delegation: "Improve this draft."

artifact:
  source: synthetic
  domain: reinforcement_learning
  word_count: 358
  text: |
    We evaluate RLHF-Align, a 7B-parameter dialogue model trained with
    proximal policy optimization against a learned reward model on the
    Anthropic HH-RLHF preference corpus. The central claim of this
    section is that RLHF-Align produces responses that human users find
    more helpful, more truthful, and less harmful than those produced by
    the supervised fine-tuning (SFT) baseline from which it was
    initialized.

    Evaluation protocol. We hold out 2,000 prompts from the HH-RLHF test
    split, ensuring no overlap with the 50k preference pairs used during
    reward modeling or PPO. For each prompt, we sample one response
    (temperature 0.7, top-p 0.95) from each of two policies: the SFT
    baseline and the RLHF-Align checkpoint at the end of PPO training.
    We then score every (prompt, response) pair with our trained reward
    model RM-13B, the same reward model used as the optimization target
    during PPO. RM-13B was trained on the 50k HH-RLHF preference pairs
    and achieves a held-out preference-prediction accuracy of 71.4%
    against an internal validation split. We report two summary
    statistics: (i) the mean RM-13B score per policy and (ii) the
    head-to-head "win rate," defined as the fraction of prompts on which
    RM-13B assigns a higher score to the RLHF-Align response than to the
    SFT response.

    Results. RLHF-Align achieves a mean RM-13B score of +0.84 nats
    compared to +0.31 for the SFT baseline. In head-to-head comparison,
    RLHF-Align wins 68.2% of the 2,000 prompts, ties on 4.1%, and loses
    on 27.7%. The improvement is consistent across the helpful, harmless,
    and honest sub-splits of HH-RLHF: win rates of 67.9%, 69.1%, and
    67.4% respectively.

    We interpret these results as strong evidence that human users
    prefer RLHF-Align outputs to SFT outputs along the dimensions of
    helpfulness, truthfulness, and harmlessness, and that RLHF training
    has successfully shifted the policy toward responses that humans
    rate more highly. Given the consistent magnitude of the win rate
    across sub-splits and the meaningful gap in mean reward, we conclude
    that the alignment objective generalizes beyond the training
    preferences and reflects genuine improvements in human-perceived
    response quality.
