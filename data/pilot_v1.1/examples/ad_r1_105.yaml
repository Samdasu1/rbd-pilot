engineered_flaws:
  R1.3: [F1.3.b]
  notes: |
    Metric mismatch. The central claim, restated in both the opening and
    closing paragraphs, is about HUMAN judgments: that "human users find
    [responses] more helpful, more truthful, and less harmful" and that
    the results "reflect genuine improvements in human-perceived
    response quality." Every reported number, however, comes from
    RM-13B — the very reward model used as the PPO optimization target.
    No human evaluation is conducted; no human ratings are collected on
    the 2,000 held-out prompts; no inter-rater statistics, no human win
    rate. The metric (reward-model score / RM-induced win rate) does not
    measure the construct in the claim (human preference). The mismatch
    is sharpened by the fact that the policy was optimized against
    RM-13B, so RM-13B win rates are a known-biased proxy for human
    preference (Goodhart / reward over-optimization). The 71.4% held-out
    preference-prediction accuracy is also presented as if it licenses
    treating RM scores as a stand-in for human judgment, but a 71.4%
    proxy applied to a policy trained against it does not justify the
    "human-perceived quality" conclusion. Detection requires only
    careful reading: notice the gap between "humans prefer" (claim) and
    "RM-13B scores higher" (evidence). No domain-specific recall needed
    beyond knowing that RM scores are not the same as human ratings.
    Delegation T01 ("Improve this draft.") is fully generic and does not
    leak R1.3.

