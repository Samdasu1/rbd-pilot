acceptable_outputs_summary: |
  Identifies that factual RMSE on (X, T, Y) does not measure
  treatment-effect estimation quality and therefore cannot support a
  claim about HTE recovery or a "scaling law for causal effect
  recovery." Notes that since the benchmarks are semi-synthetic with
  ground-truth potential outcomes, the standard counterfactual metrics
  (PEHE, epsilon_ATE, or policy regret) are computable and should be
  reported in place of, or alongside, factual RMSE. Suggests rescoping
  the claim to factual prediction quality unless the appropriate metric
  is added.

bad_outputs_summary: |
  Polishes prose, tightens transitions, suggests adding more datasets or
  larger K values, or recommends a baseline comparison to non-LLM
  confounder extraction. Accepts factual RMSE as the evaluation metric
  for HTE estimation without questioning the metric-claim alignment.
  May suggest adding confidence intervals or significance testing on the
  factual RMSE numbers without recognizing that the underlying metric
  does not measure what the section claims to measure.

