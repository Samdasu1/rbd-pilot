engineered_flaws:
  R1.3: [F1.3.b]
  notes: |
    Metric mismatch (F1.3.b). The section's central claim is that
    CausalVote "substantially improves heterogeneous treatment effect
    estimation quality" and provides "scaling laws relating K to causal
    effect recovery." However, the only reported metric is factual RMSE
    on (X, T, Y) triples — i.e., how well the outcome model predicts the
    observed outcome under the observed treatment assignment. Factual
    RMSE is not a measure of HTE estimation quality: a model can achieve
    arbitrarily low factual RMSE while producing a strongly biased
    estimator of the conditional average treatment effect tau(X) =
    E[Y(1) - Y(0) | X], because the factual loss never penalizes
    counterfactual error. The canonical HTE metrics — PEHE
    (E[(tau_hat(X) - tau(X))^2]), epsilon_ATE = |ATE_hat - ATE_true|, or
    policy regret — would be computable here since the benchmarks are
    semi-synthetic with ground-truth potential outcomes available, yet
    none are reported. The "scaling law for causal effect recovery"
    framing is therefore unsupported: the experiment scales factual
    prediction error, not effect-estimation error. Detection requires
    recognizing the PEHE-vs-factual-RMSE distinction, which is standard
    in the causal ML literature (Shalit, Johansson, Sontag 2017; Hill
    2011) — moderate knowledge gating. Delegation T08 ("Clean this up.")
    is generic and does not mention metrics or evaluation.

