artifact:
  source: synthetic
  domain: causal_inference
  word_count: 322
  text: |
    We introduce CausalVote, a compound inference framework for estimating
    heterogeneous treatment effects (HTE) from observational text corpora.
    The setup is motivated by recent applications in which large language
    models (LLMs) are queried multiple times to extract confounder
    annotations from unstructured clinical notes, and the resulting
    per-document annotations are aggregated to produce a downstream
    treatment effect estimate. We study how the number of LLM calls K
    affects the quality of the recovered effect estimates, and propose an
    aggregation scheme that majority-votes per-confounder annotations
    before fitting an outcome regression via doubly robust estimation.

    We evaluate CausalVote on three semi-synthetic benchmarks derived from
    the MIMIC-III discharge note corpus, the Yelp business reviews corpus,
    and the IMDB review corpus, each augmented with an injected synthetic
    treatment and outcome process so that ground-truth potential outcomes
    are available. For each benchmark we vary K in {1, 5, 10, 20, 40} and
    report root-mean-square error of factual outcome prediction (factual
    RMSE), evaluated on a held-out test fold of (X, T, Y) triples.

    CausalVote with K=20 achieves a factual RMSE of 0.142 on MIMIC-III,
    compared to the K=1 baseline of 0.181, a 21.5% relative improvement.
    On Yelp the improvements are 0.214 to 0.169 (K=1 vs K=20), and on
    IMDB 0.252 to 0.198. An ablation in which the aggregation step is
    replaced with random selection from the K samples confirms that the
    gains are attributable to the voting mechanism rather than to repeated
    sampling alone.

    Together, these results demonstrate that aggregating multiple LLM
    calls substantially improves heterogeneous treatment effect estimation
    quality, and provide preliminary scaling laws relating K to causal
    effect recovery. We position CausalVote as a step toward principled,
    sample-efficient deployment of LLM-based confounder extraction in
    observational causal studies, particularly in clinical and policy
    domains where unmeasured confounding is a persistent concern.
