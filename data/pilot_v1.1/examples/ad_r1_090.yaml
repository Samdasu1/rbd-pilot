artifact:
  source: synthetic
  domain: machine_translation
  word_count: 248
  text: |
    In this section we present JudgeMT, a framework for automatic
    evaluation of neural machine translation systems using a large
    language model as judge. JudgeMT addresses the central concern
    in LLM-as-judge research — self-preference bias, whereby a judge
    model systematically favors outputs from its own family — by
    enforcing strict separation between the model used for translation
    and the model used for evaluation.

    Our setup is as follows. We collect outputs from five strong MT
    systems (M2M-100, NLLB-200, Google Translate, GPT-4, Claude) on
    the WMT22 zh-en and de-en test sets. We then evaluate each output
    using a Llama-3-70B judge under a structured prompting protocol
    that asks for a 1-5 adequacy rating with a chain-of-thought
    justification. To validate the judge, we compare its rankings
    against the human direct-assessment scores released with WMT22.

    JudgeMT achieves Spearman rank correlation of 0.78 with human DA
    on zh-en and 0.81 on de-en, exceeding COMET-22 (0.74, 0.76) and
    BLEURT-20 (0.71, 0.73). Critically, the per-system scores show no
    systematic preference for any single MT family — GPT-4 and Claude
    outputs are scored within 0.3 points of each other on the 1-5
    scale, and neither dominates. We interpret this as evidence that
    using a judge from a different model family (Llama-3) successfully
    eliminates self-preference bias.

    These results have a clear implication: practitioners can use
    Llama-3-70B as a drop-in human-evaluation substitute for MT system
    comparisons, eliminating the per-language-pair cost of human DA
    collection (roughly $3K per language pair at WMT scale). The
    framework generalizes to any MT comparison setting where a
    non-evaluated judge family is available.
