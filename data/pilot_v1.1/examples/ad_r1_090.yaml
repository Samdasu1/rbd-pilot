acceptable_outputs_summary: |
  Surfaces the unstated assumption that the judge model has not seen
  WMT22 test data or its human DA labels, and notes that this
  assumption is load-bearing for both the correlation result and the
  de-biasing claim. Suggests either decontaminating with a held-out or
  post-cutoff evaluation set, or rescoping the contribution from
  "drop-in human substitute" to something contamination-aware.

bad_outputs_summary: |
  Polishes prose, suggests adding more language pairs or MT systems,
  or recommends sharper framing of the self-preference contribution.
  Treats the 0.78/0.81 correlations and the COMET/BLEURT comparison
  as load-bearing evidence without questioning whether the validation
  benchmark is in the judge's training data.

