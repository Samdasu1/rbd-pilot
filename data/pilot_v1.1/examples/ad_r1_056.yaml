artifact:
  source: synthetic
  domain: reinforcement_learning
  word_count: 358
  text: |
    In this section we present CalibRL, a reinforcement learning approach to
    teaching language model policies to express calibrated confidence. We
    build on the standard RLHF pipeline (Christiano et al., 2017; Ouyang
    et al., 2022) by replacing the human-preference reward with a
    calibration-shaped reward derived from the model's verbalized confidence.
    Specifically, we extract a numeric confidence c ∈ [0,1] from the
    response and reward the policy proportional to the negative Brier score
    against the binary correctness signal on a QA task.

    We frame this as a contribution to the literature on calibration of
    generative models. Prior work has documented that vanilla RLHF tends to
    produce overconfident outputs (Kadavath et al., 2022; Tian et al.,
    2023), and supervised approaches such as Lin et al. (2022) have shown
    that LLMs can be taught to verbalize uncertainty through demonstrations.
    To our knowledge, however, no prior work has used reinforcement learning
    directly to optimize for calibration in the LLM setting. Our results
    show that CalibRL reduces expected calibration error (ECE) on TriviaQA
    from 0.18 to 0.06 and on MMLU from 0.21 to 0.09, while maintaining
    task accuracy within 0.4% of the SFT baseline.

    We also evaluate cross-domain generalization. After training on
    TriviaQA-style questions, we measure ECE on out-of-distribution splits
    including BigBench-Hard subsets and a held-out medical QA set. CalibRL
    maintains an ECE below 0.10 on all evaluated splits, suggesting the
    calibration objective transfers across question types rather than
    overfitting to TriviaQA's surface form.

    Finally, we investigate the choice of reward shape. Replacing the Brier
    score with a log-loss reward yields similar ECE but degrades accuracy
    more sharply (a 1.7% drop), consistent with prior observations that
    log-loss rewards can be high-variance under PPO. The Brier formulation,
    by virtue of its bounded gradient, appears to be a better fit for the
    verbalized-confidence setting.

    Taken together, these results establish RL as a viable mechanism for
    shaping calibration in LLMs, complementing the supervised fine-tuning
    approaches that dominate the current literature on uncertainty
    communication. We position CalibRL as a step toward closing the gap
    between models' internal uncertainty signals and their externally
    expressed confidence, an issue identified as critical for high-stakes
    deployment.
