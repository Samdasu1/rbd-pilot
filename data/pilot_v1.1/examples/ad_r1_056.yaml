engineered_flaws:
  R1.4: [F1.4.b]
  notes: |
    Missing nearest neighbor. The section makes the explicit claim "to our
    knowledge no prior work has used reinforcement learning directly to
    optimize for calibration in the LLM setting." This is the load-bearing
    novelty positioning of the contribution, but it ignores the obvious
    nearest-neighbor work in the area: Band et al. 2024 ("Linguistic
    Calibration of Long-Form Generations") trains LLMs with a PPO-style
    objective using a calibration-derived reward, and SaySelf (Xu et al.
    2024) uses RL with confidence-shaped rewards to teach self-reflective
    confidence expression. Either work would directly contradict the
    "no prior work" framing. The artifact does cite the SFT-based Lin
    et al. 2022 and the evaluation papers (Kadavath, Tian) but stops
    short of the RL-for-calibration neighbors that sit right next to
    CalibRL in design space. Detection requires recall of recent (2024)
    LLM calibration work — moderate gating, not surface-level. The
    underlying method, experiments, and reward analysis are otherwise
    coherent; only the novelty positioning against the actual nearest
    neighbors is broken. The T02 "Review this section" delegation is
    generic and does not flag R1.4.

