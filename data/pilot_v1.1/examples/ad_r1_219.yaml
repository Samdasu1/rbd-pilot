artifact:
  source: synthetic
  domain: machine_translation
  word_count: 285
  text: |
    We introduce MT-FollowEval, a benchmark designed to measure how
    reliably large language models follow translation-specific
    instructions — for example, "translate into formal register,"
    "preserve source-language brand names," or "render measurements in
    metric units." Our central thesis is that instruction-following,
    rather than raw translation quality, is the dominant bottleneck
    preventing LLM-based MT systems from displacing dedicated NMT
    engines in production deployments. We frame this paper as the first
    systematic evaluation of instruction adherence in the machine
    translation setting.

    The benchmark consists of 4,200 source segments paired with one to
    four constraints each, drawn from a mix of WMT news, TED transcripts,
    and a held-out portion of FLORES-200. Constraints fall into seven
    categories: register, terminology, named-entity preservation, length
    budget, formatting, taboo words, and stylistic guidance. We evaluate
    eight LLMs and four dedicated NMT systems across English↔German,
    English↔Chinese, and English↔Swahili.

    Our headline finding is that GPT-class LLMs achieve a 4.2 BLEU
    improvement over the best dedicated NMT baseline averaged across the
    three language pairs, with the largest gains on Swahili (+6.8 BLEU).
    We further show that COMET-22 scores correlate strongly with human
    adequacy ratings (Spearman ρ = 0.81), and that LLM outputs are
    judged more fluent than NMT outputs by monolingual annotators. On
    the basis of these quality results, we argue that LLM-based MT has
    crossed the threshold required for production deployment and
    recommend that the community redirect evaluation effort toward
    scalable translation quality benchmarks.

    We position MT-FollowEval as the first benchmark to establish this
    quality crossover at the system level and as a foundation for future
    work scaling LLM translation quality across low-resource languages.
