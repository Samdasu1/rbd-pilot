engineered_flaws:
  R1.1: [F1.1.a]    # thesis drift: opens on instruction-following, lands on quality crossover
  R1.4: [F1.4.c]    # rhetorical delta: two incompatible "first" claims, neither substantiated
  notes: |
    Both flaws are visible from careful reading of the section alone,
    without canonical recall of the MT literature.

    R1.1 — thesis drift. Paragraph 1 stakes a clear thesis: that
    instruction-following, *not* translation quality, is the dominant
    bottleneck for LLM-MT, and that the paper's contribution is "the
    first systematic evaluation of instruction adherence." Paragraph 2
    sets up a constraints-based benchmark consistent with that thesis.
    But paragraph 3 reports only BLEU and COMET-22 quality findings —
    no instruction-adherence numbers appear anywhere — and concludes
    that "LLM-based MT has crossed the threshold required for
    production deployment," recommending the community refocus on
    "translation quality benchmarks." Paragraph 4 then re-positions
    the contribution as a quality-crossover benchmark. The thesis at
    the close ("quality has crossed over, refocus on quality") is the
    opposite of the thesis at the open ("quality is not the
    bottleneck, refocus on instruction-following"). The section's
    contribution claim is therefore unstable: a reader cannot tell
    which thesis the benchmark is meant to support.

    R1.4 — rhetorical delta. The section makes two distinct "first"
    claims that are rhetorical and internally incompatible: (a) "the
    first systematic evaluation of instruction adherence in the
    machine translation setting" (paragraph 1), and (b) "the first
    benchmark to establish this quality crossover at the system level"
    (paragraph 4). These are different contributions, and the section
    does not state a precise delta against prior work for either.
    Neither claim is supported by a comparison to a named prior
    evaluation; the reported deltas (4.2 BLEU, +6.8 BLEU on Swahili,
    ρ = 0.81 on COMET-22) speak only to system quality rankings, not
    to the novelty of the benchmark itself.

    The two flaws compound: fixing R1.1 (committing to one thesis)
    forces R1.4 to be rewritten (only one "first" claim survives, and
    it must be backed by an actual delta against a named prior
    evaluation).

