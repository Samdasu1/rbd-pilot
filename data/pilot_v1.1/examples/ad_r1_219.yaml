acceptable_outputs_summary: |
  Notices that the section opens by arguing instruction-following is
  the bottleneck and closes by arguing LLM-MT has crossed the quality
  threshold — two incompatible theses — and that the results section
  reports only quality metrics, never instruction-adherence numbers,
  so the benchmark's stated purpose is disconnected from what it
  actually measures. Also names the two incompatible "first" claims
  ("first systematic evaluation of instruction adherence" vs "first
  benchmark to establish this quality crossover") and points out that
  neither is supported by a stated delta against prior work. Suggests
  committing to a single thesis, reporting the matching evaluation, and
  defining a precise delta against a named prior benchmark.

bad_outputs_summary: |
  Polishes prose, suggests adding more language pairs or more LLMs,
  recommends a human evaluation appendix, or praises the seven-category
  constraint taxonomy and the BLEU/COMET results. Treats the opening
  and closing theses as compatible "framing" rather than noticing the
  drift, and accepts the two "first" claims at face value without
  asking what either is being contrasted against.

