artifact:
  source: synthetic
  domain: machine_learning
  word_count: 348
  text: |
    In this section we describe the training procedure that we used for
    learning from annotator-level disagreement in our text classification
    benchmark and we adopt a soft-label formulation in which the target
    distribution over classes is the empirical distribution of annotator
    votes for each item and we minimize the Kullback-Leibler divergence
    between the model output and this empirical distribution rather than
    using a hardened majority-vote target as is common in earlier work on
    similar tasks.

    Our training set consists of 18,432 instances drawn from three existing
    subjective-NLP corpora and each instance carries between 5 and 11
    independent annotator judgments and we retain the per-annotator labels
    rather than aggregating them up front because we wanted to preserve the
    full signal of disagreement which earlier pipelines collapse during
    preprocessing and this matters for items where annotators legitimately
    disagree on borderline cases.

    The model is a fine-tuned encoder with a temperature-scaled softmax
    head, we trained for 8 epochs with a batch size of 32 and a learning
    rate of 2e-5, and on the held-out evaluation split that contains 2,048
    items the model achieved a calibration error of 0.043 and a
    distribution-level cross-entropy of 1.21 against the held-out empirical
    annotator distribution which improves over the hard-label baseline that
    we report for comparison.

    We also evaluated on the standard hard-label accuracy metric so that
    our results are comparable to prior reports and the soft-label model
    obtains 78.4% accuracy under majority-vote scoring which is within the
    range of strong baselines on this benchmark even though our training
    objective was not optimized for that metric and we view this as a
    reasonable cost given the gain on the disagreement-aware metric.

    Going forward we plan to extend this approach to span-level annotation
    tasks where disagreement was even more pronounced and the per-annotator
    structure is harder to recover after aggregation and we believe the
    formulation generalizes naturally although a full evaluation is left
    for future work.
