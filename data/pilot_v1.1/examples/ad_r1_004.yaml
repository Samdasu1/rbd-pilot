engineered_flaws:
  R1.1: [F1.1.c]    # misframed object: positions against a strawman
  R1.4: [F1.4.b, F1.4.c]    # missing nearest neighbor + rhetorical delta
  notes: |
    The "current consensus" framing is a strawman. Established results
    (Jin et al. 2017, Ge et al. 2015, Lee et al. 2016) show polynomial-time
    saddle escape for perturbed SGD with mild noise — not "impractically
    large noise scales." The artifact's contribution is positioned against
    this misrepresentation of the field, so:
    (a) the conceptual object the paper claims to attack is a phantom (R1.1
        — the actual delta vs PGD-style analyses is unclear);
    (b) the "first first-order method to achieve this rate" claim is
        contestable (R1.4 — Jin et al.'s perturbed GD achieves comparable
        rates).
    Both flaws compound: the novelty claim is broken because the framing
    of what the field believes is broken. Fixing R1.4 alone (citing PGD)
    requires rewriting R1.1 (what is the actual delta?).

