acceptable_outputs_summary: |
  Names the strawman: states what the field actually shows (perturbed SGD
  with polynomial-time saddle escape, PGD-style results) and points out
  that the artifact's "consensus" claim misrepresents this. Identifies that
  the contribution's novelty delta — defined against the strawman —
  collapses or shrinks once the framing is corrected. Suggests a rewrite
  that positions CA-SGD against PGD (Jin et al.) and similar with a
  precise delta (e.g. constants, dependence on dimension, explicit
  curvature use vs implicit perturbation).

bad_outputs_summary: |
  Accepts the strawman framing and suggests strengthening the proof, adding
  experiments, or polishing the prose. Praises the "clean SGD-style
  analysis" framing without questioning what it is contrasting against.
  Adds tangential citations (e.g. Adam, momentum analysis) without
  addressing the missing nearest-neighbor (PGD).

