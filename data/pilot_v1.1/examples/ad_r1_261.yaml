engineered_flaws:
  R1.5: [F1.5.a]    # buried contribution: novel uncertainty decomposition wedged mid-paragraph between training hyperparameters and dataset description
  R1.7: [F1.7.b]    # missing key prior work: no citations for VQA dataset, visual-ambiguity, or VQA-abstention literature despite the section explicitly invoking all three
  notes: |
    Two interacting flaws:

    R1.5 — buried contribution. The section's load-bearing technical
    claim is the decomposition of VQA answerability uncertainty into
    a visual-ambiguity term (attention-entropy over object regions)
    and a linguistic-ambiguity term (per-token entropy of the rephrased
    question), combined via a learned gating layer. This insight
    appears as a single em-dashed clause in the middle of paragraph 2,
    sandwiched between "AdamW with linear warmup over 2000 steps" and
    "We evaluate on the VQA v2 validation split". The framing sentence
    even hedges it ("appears in our ablations to drive most of the
    gain") rather than stating it as the section's contribution. The
    paragraphs that follow drop to mixed-precision training settings,
    image augmentation pipeline, and a results paragraph that lists
    AUROC numbers without restating significance — so the section
    closes on a metric rather than on its conceptual contribution.
    The natural structure would lead with the decomposition, develop
    the two entropy signals as the section's pivot, and consolidate
    backbone choice / training schedule / augmentation as supporting
    material. Subtlety: each individual sentence reads as fine
    methods prose; the defect is that the contribution clause is
    placed where a reader skimming for the section's claim will
    miss it entirely.

    R1.7 — missing canonical prior work. The section explicitly invokes
    the VQA task, the VQA v2 validation split, the phenomenon of visual
    questions admitting multiple valid answers, and the abstention /
    answerability-prediction problem — but cites no prior work for any
    of them. The canonical anchors are obvious and uncited:
    Antol et al. (2015, ICCV, "VQA: Visual Question Answering")
    introduces the task and dataset that the section uses verbatim;
    Goyal et al. (2017, CVPR, "Making the V in VQA Matter") introduces
    the VQA v2 split the section evaluates on; Bhattacharya, Li & Gurari
    (2019, ICCV, "Why Does a Visual Question Have Different Answers?")
    is directly about visual ambiguity in VQA and characterizes the
    phenomenon the section claims novelty for; and Gurari et al. (2018,
    CVPR, "VizWiz Grand Challenge") established the answerability /
    abstention setting in VQA. Low gating: the gap is detectable from
    careful reading alone, because the section names "VQA v2",
    describes "multiple valid answers", and frames itself around an
    "abstention probability" — yet contains zero citations and even
    asserts "to our knowledge, no prior work has attempted to
    disentangle these two sources", a claim that is on its face
    suspect given the section's own description of visual ambiguity
    as a known failure mode of "contemporary VQA systems".

    Combined: fixing R1.5 alone (re-leading with the decomposition and
    closing on its significance) yields a cleanly structured section
    that still claims novelty on top of an unacknowledged corpus of
    directly relevant prior work — including a paper (Bhattacharya et
    al. 2019) that already characterizes visual-question ambiguity.
    Fixing R1.7 alone (citing Antol, Goyal, Bhattacharya, Gurari)
    leaves the contribution buried mid-paragraph and the section still
    closing on AUROC numbers. Both must be addressed for the
    contribution claim to land.

