artifact:
  source: synthetic
  domain: computer_vision
  word_count: 432
  text: |
    In the visual question answering (VQA) setting, a model receives an
    image and a natural-language question and is expected to produce a
    textual answer. A persistent failure mode of contemporary VQA
    systems is the production of high-confidence answers when the input
    does not in fact admit a single correct response. We argue that two
    distinct sources of irreducible uncertainty conflate in this failure
    mode — visual ambiguity, where the image itself supports multiple
    valid answers ("which dog is the smaller one?" with three roughly
    equal-sized dogs in frame), and linguistic ambiguity, where the
    question's surface form does not pick out a unique referent ("what
    color is it?" with no antecedent). To our knowledge, no prior work
    has attempted to disentangle these two sources within a single
    model.

    Our system, ViDA-Q, takes as input an image-question pair and
    produces three outputs: a primary answer, an abstention probability,
    and (when the abstention probability exceeds a learned threshold)
    a clarifying question. The visual encoder is a ResNet-101 backbone
    with a Faster R-CNN region proposal head producing 36 object
    regions; question tokens are encoded using a 12-layer BERT-base
    model fine-tuned during training. A cross-attention module pools
    768-dimensional region features against the question's [CLS]
    embedding. We train end-to-end with a multi-task loss that combines
    categorical cross-entropy on the answer head, binary cross-entropy
    on the abstention head, and a token-level loss on the clarifier
    head. Training uses batch size 256 and AdamW with linear warmup
    over 2000 steps. The contribution that distinguishes our approach
    from a confidence-thresholded VQA classifier — computing
    attention-entropy over object regions as a visual-ambiguity score
    and per-token entropy of the rephrased question as a
    linguistic-ambiguity score, then combining them via a learned
    gating layer — appears in our ablations to drive most of the gain
    in answerability prediction. We evaluate on the VQA v2 validation
    split, restricting to 5000 questions for which we collected three
    additional annotations to measure inter-annotator agreement.

    Implementation details: mixed-precision training on 4 V100 GPUs,
    gradient accumulation across 8 micro-batches, weight decay 0.01.
    Image augmentation follows the standard pipeline of random crop,
    horizontal flip, and color jitter. The clarifier head is initialized
    from BERT decoder weights and shares its embedding table with the
    question encoder.

    We compare against three baselines: a confidence-thresholded VQA
    classifier, a Monte Carlo dropout uncertainty estimator, and an
    ensemble of five independently trained models. ViDA-Q achieves
    AUROC 0.78 for answerability prediction versus 0.71 for the best
    baseline; in the abstention regime, its clarifying questions are
    rated useful by human evaluators 64% of the time.
