acceptable_outputs_summary: |
  Identifies that the framing in paragraph 1 (and reiterated in
  paragraph 4) — "no parametric assumptions on the latent-preference
  distribution" and "no linear functional form on bias covariates" —
  is contradicted by the model specification in paragraph 3, which
  uses a Beta prior on z (parametric) and a logistic-linear link
  theta^T x (linear in covariates). Suggests resolving by either
  weakening the contribution claim to "weakly informative parametric
  priors with a logistic-linear bias model" or by replacing the prior
  and link with genuinely non-parametric components (e.g., a
  Dirichlet-process or GP-link formulation).

bad_outputs_summary: |
  Polishes prose, asks for additional benchmarks beyond AlpacaEval-2,
  requests more baselines or human-agreement numbers, or suggests
  citing more debiasing papers — without noticing that the
  "non-parametric / non-linear" contribution claim is incompatible
  with the Beta prior and logistic-linear link actually used. Praises
  the framing in paragraph 1 or paragraph 4 as the section's strength.

