engineered_flaws:
  R1.2: [F1.2.b]
  notes: |
    Cross-section contradiction across paragraphs 1, 3, and 4. Paragraph 1
    positions BiasFlow's contribution as making "no parametric assumptions
    about the distribution of latent preferences" and not imposing "a
    linear functional form on the relationship between bias covariates
    and the observed preference," explicitly contrasting with
    regression-based debiasers that "assume a linear bias model and a
    Gaussian preference distribution." Paragraph 3 then specifies a
    Beta(alpha_0, beta_0) prior on each latent preference z (a parametric
    distributional assumption) and a logistic-linear link theta^T x for
    the bias parameters (a linear functional form on the covariates).
    Paragraph 4 compounds the contradiction by attributing the empirical
    gain to "the flexibility of the non-parametric prior over latent
    preferences" — but the prior described in paragraph 3 is a textbook
    parametric Beta. The contribution claim and the model specification
    cannot both be true. Detection is low-gating: a careful reader who
    knows that Beta(alpha,beta) is parametric and that theta^T x is
    linear can spot the conflict from the section alone, without
    canonical-paper recall. T05 ("Check this.") is generic and does not
    cue R1.2.

