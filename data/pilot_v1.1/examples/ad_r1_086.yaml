artifact:
  source: synthetic
  domain: probabilistic_programming
  word_count: 281
  text: |
    We present BiasFlow, a probabilistic programming framework for inferring
    debiased pairwise preferences from LLM-based auto-annotators such as
    those used in AlpacaEval and MT-Bench. BiasFlow treats the observed
    annotator preference as a noisy, biased signal of an underlying latent
    "true" preference and uses variational inference implemented in NumPyro
    to recover the latent quantity. A central design principle of BiasFlow
    is that it makes no parametric assumptions about the distribution of
    latent preferences across model pairs, and it does not impose a linear
    functional form on the relationship between bias covariates (output
    length, formatting, refusal rate) and the observed preference. This
    distinguishes BiasFlow from prior regression-based debiasers, which
    assume a linear bias model and a Gaussian preference distribution.

    The generative model specifies a joint distribution p(y, z, theta),
    where y is the observed annotator preference indicator, z is the latent
    debiased preference, and theta are the bias parameters. We condition on
    observed annotator outputs across thousands of (model, prompt) pairs
    drawn from the AlpacaEval-2 release.

    For inference, we exploit the conditional conjugacy of the
    Beta-Bernoulli likelihood by placing a Beta(alpha_0, beta_0) prior on
    each latent preference z and updating it via the closed-form posterior.
    The bias parameters theta enter through a logistic-linear link,
    theta^T x, with a Gaussian prior N(0, sigma^2 I), and are updated via
    stochastic variational inference with a mean-field guide.

    On the AlpacaEval-2 length-controlled benchmark, BiasFlow reduces
    length-bias-induced rank inversion by 38% relative to the regression
    baseline of Dubois et al., while maintaining comparable agreement with
    human preferences (Spearman rho=0.91). We attribute this gain to the
    flexibility of the non-parametric prior over latent preferences, which
    avoids the misspecification incurred by linear bias models.
