artifact:
  source: synthetic
  domain: databases
  word_count: 305
  text: |
    Cardinality estimation underpins every cost-based query optimizer:
    errors in cardinality propagate multiplicatively through join
    planning and routinely cause orders-of-magnitude slowdowns in
    production workloads. Despite decades of work on histograms,
    sketches, and sampling, traditional estimators continue to
    underperform on correlated and high-dimensional predicates,
    motivating a recent wave of learned cardinality estimators.

    Three lines of work have shaped this area. Naru (Yang et al., 2019)
    introduced autoregressive density models for single-table
    cardinality, achieving median q-errors below 2 on the JOB-light
    benchmark. DeepDB (Hilprecht et al., 2020) instead used relational
    sum-product networks to support multi-attribute and multi-table
    queries while remaining trainable on raw tables without query
    workloads. NeuroCard (Yang et al., 2020) extended Naru to the
    multi-table setting via join sampling, closing much of the gap
    between autoregressive single-table accuracy and join-aware
    estimation.

    Two open problems remain. First, learned estimators are typically
    point predictors and do not expose calibrated uncertainty, leaving
    the optimizer unable to distinguish a confident estimate from a
    guess. Second, training-data drift — common in production catalogs
    — degrades these estimators silently.

    We introduce CalibCard, a learned cardinality estimator that
    produces calibrated predictive intervals alongside point estimates,
    allowing the optimizer to fall back to conservative plans when
    uncertainty is high. CalibCard combines a NeuroCard-style
    autoregressive backbone with a conformal prediction wrapper trained
    on a held-out workload. We evaluate on JOB-light and a
    TPC-DS-derived multi-table benchmark, comparing against Naru,
    DeepDB, and NeuroCard. CalibCard matches NeuroCard on median
    q-error (1.7 vs 1.8) while reducing 99th-percentile q-error from
    89 to 14 on JOB-light, and its predictive intervals achieve 91%
    empirical coverage at the nominal 90% level.

    These results position CalibCard as the first learned cardinality
    estimator with calibrated uncertainty, and we argue that
    uncertainty-aware estimation is a prerequisite for safely deploying
    learned components inside production query optimizers.
