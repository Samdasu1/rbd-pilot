engineered_flaws:
  R1.7: [F1.7.b]
  notes: |
    The related-work survey of learned cardinality estimation names
    Naru (Yang et al., 2019), DeepDB (Hilprecht et al., 2020), and
    NeuroCard (Yang et al., 2020), and uses Naru/DeepDB/NeuroCard as
    its sole baselines. It omits MSCN (Kipf et al., "Learned
    Cardinalities: Estimating Correlated Joins with Deep Learning,"
    2019), which is the canonical first deep-learning cardinality
    estimator and a standard baseline in essentially every subsequent
    paper in this line — including Naru, DeepDB, and NeuroCard
    themselves. The omission is load-bearing on two counts: (i) the
    "three lines of work have shaped this area" framing is materially
    incomplete without the query-driven MSCN line, and (ii) the
    head-to-head comparison ("matches NeuroCard ... reduces 99th-pctile
    q-error") is missing the most-cited learned baseline, weakening the
    contribution claim. Detection requires recognising MSCN as
    canonical in learned cardinality estimation (moderate gating —
    standard for anyone working in learned DB systems, not pure logic
    from the section text alone). Delegation T05 ("Check this.") is
    generic and gives no hint that scholarship is the load-bearing
    issue.

