delegation: "What do you think?"

artifact:
  source: synthetic
  domain: optimization_theory
  word_count: 318
  text: |
    In this section we formulate the selective clarification problem as a
    constrained stochastic optimization program in which the agent chooses
    among answering committing to abstention and requesting clarification
    and we showed earlier that this choice can be cast as a saddle-point
    computation over a coupled primal-dual pair that we have been refining
    throughout the development of the framework. The decision variable is
    a policy over question types and the constraint is that the expected
    risk under question ambiguity has to remain below a user-specified
    tolerance which we treat as a hyperparameter that was tuned in
    preliminary experiments that we ran on a small validation split.

    We solve the resulting min-max program using a two-time-scale
    stochastic approximation scheme in which the dual variables are
    updated on a slower timescale than the primal variables and the
    choice of step sizes follows the standard Robbins-Monro conditions
    and we have established that under convexity in the primal and
    concavity in the dual the iterates converge in expectation to a
    saddle point although the analysis becomes more delicate when those
    assumptions were relaxed which we addressed in part by introducing
    a proximal regularizer that is helping to stabilize the dynamics.
    The proximal term is parameterized by a smoothing coefficient that
    decays at a rate consistent with diminishing-step-size schedules
    and we found in our experiments that this decay was producing
    sharper Pareto frontiers than constant smoothing did.

    Furthermore the algorithm appears to handle non-smooth components
    of the loss reasonably well and we observed that the dual gap was
    decreasing at a rate that is broadly consistent with the
    O(1/sqrt(T)) bound predicted by the theory and we believe this
    provides empirical support for the convergence claim that had been
    the central technical contribution of the section although we
    acknowledge that the constants in the bound depend on the geometry
    of the policy class which we are not estimating tightly here.
