acceptable_outputs_summary: |
  Identifies that every reported comparison is to the authors' own
  prior model and flags this as insufficient positioning against the
  variant-pathogenicity field. Names concrete missing baselines the
  section should be benchmarked against (e.g. CADD, REVEL,
  AlphaMissense, PolyPhen-2, ESM1b, EVE) and suggests rewording the
  contribution to a defensible delta against those methods rather
  than self-comparison.

bad_outputs_summary: |
  Polishes the prose, suggests adding more benchmarks or larger
  ensembles, or asks for a reliability diagram in the main text.
  Praises the calibration improvement and the ACMG-pipeline framing
  without questioning that the only baseline is CalibVar-v1. May add
  vague citations to calibration literature without flagging the
  absent variant-prediction baselines.

