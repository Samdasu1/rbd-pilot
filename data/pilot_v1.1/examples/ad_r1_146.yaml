engineered_flaws:
  R1.4: [F1.4.c]
  notes: |
    Rhetorical novelty delta. The section claims CalibVar is "a
    substantial step forward for uncertainty-aware variant
    interpretation" and that the authors are "unaware of any prior
    method that achieves comparable calibration." Yet every reported
    comparison is CalibVar vs CalibVar-v1 — the same group's own prior
    architecture. The standard missense-pathogenicity field is absent:
    no comparison to CADD, REVEL, AlphaMissense, PolyPhen-2, SIFT,
    PrimateAI, ESM1b, or EVE, all of which are routinely benchmarked
    on ClinVar splits and several of which already report calibrated
    probability outputs. The within-paper deltas (AUROC +0.013–0.015,
    ECE 0.064→0.019) are real relative to v1 but unclaimed against
    the actual field. Detection requires moderate domain knowledge:
    a reader needs to recognize that variant-pathogenicity prediction
    has well-known baselines beyond the authors' own work, but does
    not require recalling specific paper details. The delegation
    "Review this section." is fully generic and does not signal R1.4.

