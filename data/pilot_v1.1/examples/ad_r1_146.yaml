artifact:
  source: synthetic
  domain: bioinformatics
  word_count: 282
  text: |
    We present CalibVar, a calibrated deep learning model for missense
    variant pathogenicity prediction that explicitly models predictive
    uncertainty. Unlike prior approaches that emit point pathogenicity
    scores without confidence signals, CalibVar uses a temperature-scaled
    deep ensemble to produce probability estimates that downstream
    clinical-genetics pipelines can use to triage uncertain calls for
    expert curator review.

    We evaluate CalibVar against CalibVar-v1 — our previous architecture
    (Anonymous Authors et al., 2023) — on three variant interpretation
    benchmarks: the ClinVar-2024 held-out split, a gnomAD rare-variant
    test set, and BRCA-Exchange. On ClinVar-2024, CalibVar achieves an
    AUROC of 0.943 compared to 0.928 for CalibVar-v1. On the gnomAD
    set we observe 0.901 vs 0.887, and on BRCA-Exchange 0.872 vs 0.859.
    Expected calibration error (ECE) drops from 0.064 to 0.019 averaged
    across the three benchmarks.

    The improvement is particularly pronounced in the high-confidence
    regime: among predictions with model confidence above 0.9, CalibVar
    is correct 92.4% of the time, compared to 84.1% for CalibVar-v1.
    Reliability diagrams (Section 4) further confirm that the
    temperature-scaled ensemble closes the gap between predicted and
    empirical accuracy across the full probability range.

    These results establish CalibVar as a substantial step forward for
    uncertainty-aware variant interpretation. We are unaware of any
    prior method that achieves comparable calibration on the
    ClinVar-2024 split at the same parameter budget. The model is
    straightforward to integrate into existing ACMG-based curation
    pipelines, requires no architectural changes to upstream feature
    extractors, and adds fewer than 200 lines of code to a standard
    PyTorch training loop. We expect CalibVar to be broadly useful as
    clinical genetics laboratories transition toward computationally
    assisted variant triage at population scale.
