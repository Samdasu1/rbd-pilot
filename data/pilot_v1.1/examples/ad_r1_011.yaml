delegation: "What do you think?"

artifact:
  source: synthetic
  domain: bioinformatics
  word_count: 212
  text: |
    In this section we describe the genomic variant annotation pipeline that
    we developed during this study. The pipeline takes as input variant call
    format files which are produced by upstream variant callers and which
    contain genomic positions alleles and quality scores and the pipeline
    then enriches these positions with functional annotations. We applied
    the pipeline to a cohort of 1,234 patient samples that we had received
    from our collaborators at the medical center and through this process
    we generated annotated variant calls for downstream analysis.

    The annotation step was implemented using a standard ensemble approach
    that combined predictions from multiple existing annotation tools and
    the implementation choices that we made during development were guided
    by our practical experience with variant calling and annotation in
    similar studies that we had been involved with previously. We
    benchmarked the pipeline on a held-out set of 100 samples and found
    that the variant annotation accuracy that we achieved was comparable
    to or somewhat better than what previous studies have reported.

    Furthermore the pipeline appears to be relatively robust under different
    sequencing depths and we believe that this represents an advantage over
    some of the alternatives that we considered during the design phase of
    this study although we acknowledge that more comprehensive evaluation
    would strengthen this claim.
  source_provenance: null

