artifact:
  source: synthetic
  domain: bioinformatics
  word_count: 318
  text: |
    We present VariScore-2, a deep-learning model for predicting the
    pathogenicity of missense variants in clinically relevant genes.
    VariScore-2 advances the state of the art for variant effect prediction
    by incorporating a transformer-based encoder over multiple sequence
    alignments (MSAs), a feature absent from earlier scoring schemes. Our
    experiments demonstrate that VariScore-2 outperforms competing
    approaches on three independent benchmark sets.

    We evaluated VariScore-2 on the ClinVar-2023 hold-out partition, the
    BRCA1 saturation-mutagenesis assay of Findlay et al., and an in-house
    panel of 4,812 curated variants drawn from our clinical reporting
    pipeline. On ClinVar-2023, VariScore-2 reaches an AUROC of 0.912,
    compared with 0.887 for VariScore-1 (our prior model, Smith et al.,
    2021) and 0.864 for a BLOSUM62-substitution baseline. On the BRCA1
    assay, Spearman ρ improves from 0.61 (VariScore-1) to 0.68. On the
    in-house panel, balanced accuracy rises from 0.79 (VariScore-1) to
    0.83. Across all three benchmarks, VariScore-2 dominates the
    competition by a wide margin.

    The MSA-conditioned transformer is described in Section 3. The encoder
    consumes a column-wise representation of the alignment and emits a
    256-dimensional residue embedding, which is concatenated with the
    structural-feature vector before being passed to the pathogenicity
    head. Section 4's ablation shows that removing the MSA encoder drops
    AUROC by 0.027 on ClinVar-2023, confirming the contribution of the
    transformer module.

    We position VariScore-2 as the natural successor to VariScore-1,
    retaining the structural-feature pipeline of the earlier model and
    replacing only the sequence-encoding stage. Because the architectural
    footprint is small — fewer than 12M parameters — VariScore-2 can be
    retrained on local cohorts without specialized hardware, which we
    believe makes it well suited to clinical-laboratory adoption. Taken
    together, our results establish VariScore-2 as a strong general-purpose
    pathogenicity scorer and a meaningful advance over prior work in the
    variant-effect-prediction landscape.
