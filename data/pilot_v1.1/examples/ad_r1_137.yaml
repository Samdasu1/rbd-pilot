acceptable_outputs_summary: |
  Identifies that "competing approaches" and "state of the art" are not
  supported by the evaluation, since the only baselines are the authors'
  own prior model and a trivial substitution-matrix scorer. Names the
  canonical missing baselines for missense pathogenicity prediction
  (e.g. REVEL, CADD, EVE, ESM-1v, AlphaMissense, PrimateAI). Suggests
  rewording the contribution to a defensible delta — e.g. an MSA-encoder
  ablation over VariScore-1 — rather than a field-wide claim.

bad_outputs_summary: |
  Polishes the prose, tightens the contribution sentence, or suggests
  adding more datasets or a confidence-calibration analysis. Praises the
  MSA-transformer as a meaningful advance and accepts the "outperforms
  competing approaches" framing at face value. May add peripheral
  citations or restructure the results paragraph without questioning
  whether the baselines actually represent the competing field.

