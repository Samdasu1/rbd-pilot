engineered_flaws:
  R1.4: [F1.4.c]
  notes: |
    Rhetorical novelty. The section claims VariScore-2 "advances the state
    of the art," "outperforms competing approaches on three independent
    benchmark sets," and "dominates the competition." But every reported
    comparison is against either (a) the authors' own prior model
    VariScore-1, or (b) a trivial BLOSUM62-substitution baseline. The
    canonical variant-effect-prediction baselines — REVEL, CADD,
    PolyPhen-2, SIFT, PrimateAI, EVE, ESM-1v, AlphaMissense — are
    entirely absent from the comparison table and from the surrounding
    prose. The delta over VariScore-1 may well be real, but the
    "competing approaches" framing is not earned: there are no competing
    approaches in the evaluation. Detection requires knowing that the
    pathogenicity-prediction field has well-established baselines —
    moderate gating, since a bioinformatics-trained reader will recognize
    the absence, while a non-domain reader could be persuaded by the
    "three benchmarks" framing. The delegation "Take a look at this
    paragraph" is maximally generic and does not signal R1.4.

