acceptable_outputs_summary: |
  Names both: (1) the section opens as a per-query cost-based
  routing paper but closes by repositioning the system as an
  index-tuning advisor and crediting the advisor (not the router)
  with the headline latency gains — these are different
  contributions and the framing/credit needs to be unified; (2) the
  stateless-router claim that grounds the closed-form derivation
  is incompatible with the sliding-window histogram over 10,000
  prior queries described in the evaluation. Suggests either
  committing to the router as the contribution and removing the
  advisor (or moving it to future work), and either dropping the
  statelessness claim or replacing the sliding-window histograms
  with truly per-query features.

bad_outputs_summary: |
  Polishes prose, tightens the abstract sentence, suggests adding
  more baselines, asks for ablations of the threshold τ, or adds
  citations to learned cost models and vector indexes. Treats the
  router and the advisor as a single coherent contribution without
  flagging the shift, and accepts the "stateless" framing alongside
  the sliding-window histograms as if they were compatible
  implementation details rather than contradictory design claims.

