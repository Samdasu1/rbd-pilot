engineered_flaws:
  R1.1: [F1.1.a]
  R1.2: [F1.2.b]
  notes: |
    Two compound issues:

    R1.1 — thesis drift. Para 1 names the contribution as a
    "cost-based router" with a closed-form per-query decision rule
    over latency vs accuracy on two backends; the formalization is
    explicitly per-query routing. Para 4 delivers a different
    object: an "advisor mode" that recommends which embedding
    partitions to promote to the in-memory tier (an index-tuning /
    physical-design recommendation), and the section closes by
    repositioning LIRA as "a practical index-tuning tool." The
    closing further attributes the headline latency gains to the
    advisor's promotion recommendations ("is the principal driver
    of the latency improvements reported above"), not to the router
    that the section opened by claiming. Stated contribution
    (cost-based router) and delivered/credited contribution
    (index-promotion advisor) are different theses.

    R1.2 — cross-section contradiction. Para 2 explicitly states
    the router is "stateless across queries," with "no workload
    memory or aggregate statistics carried across requests," and
    grounds the §3 closed-form derivation in this statelessness.
    Para 3 then describes maintaining a sliding window over the
    most recent 10,000 queries with join-selectivity histograms
    that feed the latency head and are refreshed every 500 queries
    to track workload drift. A sliding-window histogram over
    10,000 prior queries is, by definition, workload memory and
    aggregate statistics carried across requests — directly
    contradicting the stateless claim that the derivation depends on.

    Detection: low gating — both issues are visible from the
    section's own text. The thesis drift is detectable by reading
    the opening contribution claim against the closing positioning
    and credit attribution. The contradiction is detectable by
    juxtaposing "stateless, no aggregate statistics" (para 2) with
    "sliding window of 10,000 queries with refreshed histograms"
    (para 3); no external knowledge of database internals beyond
    standard terminology is required.

