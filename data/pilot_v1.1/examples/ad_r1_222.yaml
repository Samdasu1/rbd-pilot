artifact:
  source: synthetic
  domain: databases
  word_count: 346
  text: |
    We present LIRA (Learned Index Routing Advisor), a query routing
    layer for hybrid analytical systems that serve workloads spanning
    a small in-memory column store and a large disk-resident vector
    index over LLM-derived embeddings. The central contribution is a
    cost-based router that, for each incoming query, predicts the
    expected latency of executing the query against the in-memory
    store versus the vector index and dispatches to the cheaper
    backend, subject to a user-specified accuracy floor. We formalize
    routing as a per-query optimization problem and derive a
    closed-form decision rule from a calibrated cost model trained
    on system telemetry.

    Cost prediction uses two regression heads: a latency head trained
    on physical-plan features (estimated rows, selectivity of the
    most selective predicate, presence of a join) and an accuracy
    head trained on a held-out validation workload of 4,200 labeled
    query–answer pairs. At dispatch time, the router scores both
    backends and selects the lower-cost option whose predicted
    accuracy clears the configured threshold τ. Crucially, the
    router is stateless across queries: each routing decision depends
    only on the current query's features, with no workload memory or
    aggregate statistics carried across requests. This stateless
    design is what permits the closed-form derivation in §3.

    Empirically, on a workload of 18,000 queries replayed against a
    240GB embedding corpus, LIRA reduces median end-to-end latency
    by 38% relative to always-route-to-vector and by 11% relative to
    a static rule-of-thumb baseline. The largest gains accrue on
    point-lookup queries with highly selective predicates, where the
    in-memory store is decisively cheaper. We use a sliding window
    over the most recent 10,000 queries to maintain join-selectivity
    histograms that feed the latency head, refreshing the histograms
    every 500 queries to track workload drift.

    Beyond routing, LIRA exposes an advisor mode that consumes the
    same telemetry to recommend which embedding partitions should be
    promoted to the in-memory tier. In our experiments, following
    the advisor's top-3 recommendations over a 72-hour trace reduces
    working-set memory pressure by 22% and is the principal driver
    of the latency improvements reported above. We position LIRA as
    a practical index-tuning tool for operators of hybrid LLM-backed
    analytical systems.
