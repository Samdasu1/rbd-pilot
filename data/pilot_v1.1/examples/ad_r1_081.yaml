artifact:
  source: synthetic
  domain: numerical_analysis
  word_count: 287
  text: |
    We propose AnnoNewton, a Newton-Raphson iteration for computing the
    maximum-likelihood consensus label from a population of disagreeing
    annotators on subjective classification tasks. Standard practice in
    label aggregation defaults to majority voting or the arithmetic mean,
    both of which ignore per-annotator reliability and converge slowly
    when annotator variance is heterogeneous across items. AnnoNewton
    instead solves the score equation iteratively, yielding the rapid
    convergence behavior characteristic of second-order methods.

    Algorithm. Let y_ij denote the (real-valued) label assigned by
    annotator j to item i, and let w_j > 0 denote a per-annotator
    reliability weight. We initialize the consensus estimate μ_i^(0) as
    the unweighted mean of {y_ij}_j. At iteration k, we update

        μ_i^(k+1) = (Σ_j w_j^(k) y_ij) / (Σ_j w_j^(k)),
        w_j^(k+1) = 1 / s_j^(k),

    where s_j^(k) is the empirical variance of (y_ij - μ_i^(k)) computed
    across items i. We iterate until ‖μ^(k+1) - μ^(k)‖_2 < 10^-5. The
    update has closed form per step and requires only a single pass over
    the (item, annotator) table.

    Convergence. We observe empirically that the iteration converges in
    4-7 steps on a re-annotated subset of CIFAR-10H. Compared to plain
    majority voting, AnnoNewton reduces the discrepancy with held-out
    expert labels by 12% averaged across five subjective categories.

    Discussion. A practical advantage of Newton-style schemes such as
    AnnoNewton over first-order alternatives (e.g. gradient descent on
    the negative log-likelihood) is that no gradient computation is
    needed: the reweighting step gives the next iterate directly from
    sample statistics. We therefore recommend AnnoNewton as a drop-in
    replacement for majority voting whenever per-annotator variance
    estimates can be maintained online.
