engineered_flaws:
  R1.1: [F1.1.c]
  notes: |
    Conceptual object slip. Para 1 names the contribution a
    "Newton-Raphson iteration" with "rapid convergence behavior
    characteristic of second-order methods." Para 2 then specifies the
    actual update: a weighted mean of labels with weights set to inverse
    sample variance, repeated to convergence. This is an iteratively
    reweighted least-squares / EM-style fixed-point iteration — there is
    no Jacobian, no Hessian, no Taylor expansion of a score function, no
    derivative information of any kind. Para 4 doubles down with the
    self-contradictory claim that "no gradient computation is needed" is
    "a practical advantage of Newton-style schemes" — actual
    Newton-Raphson requires both gradient and Hessian, so the boast is
    incoherent with the named object. Detection requires only careful
    reading of the update rule against the textbook definition of
    Newton's method (low gating). T05 "Check this" is generic and does
    not signal R1.1.

