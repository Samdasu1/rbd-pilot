acceptable_outputs_summary: |
  Identifies that the named method is not Newton-Raphson — the update
  uses no derivative information and is a fixed-point / IRLS / EM-style
  iteration — and proposes either renaming the contribution (e.g. as an
  iteratively reweighted estimator or variance-weighted fixed-point
  scheme) or actually deriving a true Newton step from the score
  equation. Flags the para-4 "no gradient needed" claim as incoherent
  with the named method.

bad_outputs_summary: |
  Polishes prose, requests more datasets beyond CIFAR-10H, or asks for
  formal convergence rate bounds while accepting the "Newton-Raphson"
  framing. Suggests comparing to additional first-order baselines, or
  recommends tightening the stopping tolerance, without noticing that
  the update rule contains no derivatives and therefore is not Newton's
  method at all.

