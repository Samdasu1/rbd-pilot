engineered_flaws:
  R1.7: [F1.7.c]
  notes: |
    Stale-citation flaw visible from internal reading (low gating). The
    section adopts Carrasco-Davis et al. (2019) as its "primary baseline"
    and uses its reported numbers as the reference for the headline 1.4x
    gain. The section itself acknowledges the existence of Carrasco-Davis
    et al. (2021), and even notes that the follow-up generalizes the
    approach to ZTF-like cadences — which is exactly the regime
    ALERT-Bench operates in (2.4M ZTF alerts). Retaining the 2019 numbers
    "because the taxonomy aligns" is a load-bearing scholarship problem:
    the more applicable, methodologically updated version exists, is from
    the same authors, is acknowledged in the text, and would be the
    appropriate baseline given ALERT-Bench's data domain. The 1.4x
    contribution claim rests on a baseline the section itself has flagged
    as superseded for this regime. Detection requires no astronomy
    knowledge beyond reading both citations in context — the contradiction
    is internal to the artifact. Delegation T05 ("Check this.") is generic
    and gives no surface signal toward the citation dim.

