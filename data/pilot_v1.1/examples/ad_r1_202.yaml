artifact:
  source: synthetic
  domain: astronomy
  word_count: 312
  text: |
    The advent of high-cadence optical surveys — the Zwicky Transient
    Facility (ZTF), ATLAS, and the imminent Vera C. Rubin Observatory —
    has produced alert streams of 10^5 to 10^7 events per night. No single
    classifier excels across the full taxonomy of transients (supernovae,
    tidal disruption events, kilonovae, microlensing, stellar variability),
    which motivates ensemble routing systems that dispatch each alert to a
    specialized downstream classifier.

    We introduce ALERT-Bench, a benchmark suite for evaluating multi-
    classifier routing strategies on real-time alert streams. ALERT-Bench
    draws on 2.4M ZTF alerts and a held-out subsample from the Rubin
    commissioning data release, producing per-class precision and recall
    and a routing-cost metric that penalizes calls to expensive light-curve
    classifiers when a cheap real-bogus filter would suffice.

    Prior work on transient classification benchmarks is dominated by
    Carrasco-Davis et al. (2019), which we adopt as our primary baseline.
    Carrasco-Davis et al. (2019) introduced a deep recurrent classifier
    evaluated on the HiTS survey and reported per-class F1 scores on five
    transient classes; we use those reported numbers as the reference point
    against which routing-system gains are measured. Their follow-up
    extension (Carrasco-Davis et al. 2021) generalized the approach to
    ZTF-like cadences and added two further transient classes, but we
    retain the 2019 numbers because the five-class taxonomy aligns more
    naturally with ALERT-Bench's evaluation grid.

    Our contributions are threefold. First, ALERT-Bench is the first
    benchmark to jointly evaluate classification accuracy and routing cost
    on astronomical alert streams. Second, we show that a learned router
    achieves a 1.4x improvement in cost-adjusted F1 over the
    Carrasco-Davis et al. (2019) monolithic classifier on the held-out
    Rubin sample. Third, we release leaderboard infrastructure tied to the
    broker community.

    We position ALERT-Bench as a foundation for routing-and-classification
    studies that will be necessary once Rubin LSST reaches survey cadence.
