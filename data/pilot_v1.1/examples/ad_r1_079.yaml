engineered_flaws:
  R1.1: [F1.1.b]
  notes: |
    Contribution slip. Para 1 enumerates three contributions: (1) a
    "learned router," (2) a "novel uncertainty calibration procedure
    based on pathology co-occurrence priors," and (3) an "end-to-end
    deployment system." Para 2 then reveals that the "router" is a
    fixed threshold τ on max-class softmax probability, tuned by a
    validation sweep — not a learned router. Contribution (2), the
    novel calibration procedure, is never described in the methods or
    evaluated in the experiments; it reappears in para 4 only as future
    work ("preliminary experiments suggest modest gains"). Contribution
    (3), the deployment system, is reduced to a single latency number
    (4.2 → 1.6s) with no system description. Para 4 silently restates
    the contribution as "a confidence-thresholded routing policy," a
    much narrower and well-known recipe. The actual contribution that
    the evidence supports is "a tuned softmax threshold on top of an
    off-the-shelf chest X-ray classifier," but that gap is never
    acknowledged. Detection requires only careful reading of the
    section against itself — no canonical-paper recall is needed
    (low gating). The delegation "Review this section" is generic and
    does not telegraph R1.1.

