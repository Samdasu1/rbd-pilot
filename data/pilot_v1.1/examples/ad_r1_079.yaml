acceptable_outputs_summary: |
  Identifies that the three contributions promised in the opening
  paragraph shrink dramatically by the methods and results: the "learned
  router" is a fixed softmax threshold, the "novel uncertainty
  calibration" is never implemented or evaluated, and the "deployment
  system" reduces to a latency measurement. Proposes either narrowing
  the stated contribution to match what is actually delivered (a tuned
  confidence threshold) or expanding the methods/experiments to
  substantiate the originally claimed contributions. Does not focus on
  prose polish, adding citations, or expanding the pathology list.

bad_outputs_summary: |
  Polishes prose, suggests reporting more pathologies or additional
  baselines, or recommends adding standard deviations and significance
  tests. Treats the three-contribution framing at face value and
  proposes extensions to the "learned router" or the "calibration
  procedure" without noticing that neither is actually present in the
  methods. Strengthens the cost analysis or recommends ablations on τ
  without flagging that τ-tuning is the entire contribution.

