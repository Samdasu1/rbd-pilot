artifact:
  source: synthetic
  domain: medical_imaging
  word_count: 248
  text: |
    We introduce MedRoute, a quality-aware routing framework for chest
    X-ray interpretation that dynamically allocates studies between an
    on-device EfficientNet classifier and a cloud-deployed radiology
    vision-language model. Our framework provides three contributions:
    (1) a learned router that predicts when on-device inference suffices,
    (2) a novel uncertainty calibration procedure based on pathology
    co-occurrence priors, and (3) an end-to-end deployment system
    validated under realistic clinic bandwidth constraints.

    Concretely, given a chest radiograph x, the on-device model produces
    a 14-dimensional pathology probability vector p = f_small(x). We then
    compute the maximum class probability max(p) and compare it against
    a fixed threshold τ. If max(p) > τ, the study is finalized on-device;
    otherwise it is escalated to the cloud model. We selected τ = 0.78
    by sweeping the validation ROC and choosing the value that minimized
    escalation rate at fixed sensitivity.

    On the CheXpert validation split, MedRoute escalates 31% of studies
    to the cloud while matching the cloud-only AUROC of 0.889 to within
    0.004. Per-study inference cost (averaged over CPU + cloud GPU time)
    drops from 4.2 to 1.6 seconds. We report results on five pathologies:
    cardiomegaly, pleural effusion, atelectasis, consolidation, and
    edema.

    These results demonstrate that a confidence-thresholded routing
    policy, applied on top of standard chest X-ray classifiers, can
    recover most of the benefit of always-cloud inference at substantially
    reduced cost. Future work will investigate whether the pathology
    co-occurrence priors mentioned in Section 1 can further reduce
    escalation rates; preliminary experiments suggest modest gains.
