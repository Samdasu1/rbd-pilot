acceptable_outputs_summary: |
  Identifies that the section claims to study reproducibility but
  actually varies prompts and input noise, which is a sensitivity /
  robustness analysis — and proposes either (a) reframing the
  contribution as a sensitivity study with appropriate positioning, or
  (b) redesigning the protocol to hold inputs fixed and repeat runs to
  measure determinism. Does not focus on prose polish or on adding more
  datasets.

bad_outputs_summary: |
  Polishes the prose, suggests evaluating on additional ASR front ends
  (Conformer, wav2vec2) or more LibriSpeech splits, or recommends
  reporting confidence intervals on the reported WER numbers. Takes the
  "reproducibility" framing at face value and proposes extending the
  prompt-template grid or noise-level grid, without flagging that the
  protocol does not in fact measure reproducibility.

