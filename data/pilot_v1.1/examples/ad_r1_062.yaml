artifact:
  source: synthetic
  domain: speech_recognition
  word_count: 287
  text: |
    We introduce SpeechRepro, a reproducibility analysis of LLM-based
    post-correction for automatic speech recognition (ASR) transcripts. As
    large language models are increasingly used to clean up noisy ASR
    outputs in clinical and legal transcription pipelines, understanding
    the reproducibility of their corrections is critical: a downstream
    user submitting the same recording on different days should obtain
    comparable transcripts.

    Our study focuses on the LibriSpeech test-clean set, first transcribed
    by a Whisper-medium ASR front end. We then pass each raw transcript to
    an LLM correction stage and measure word error rate (WER) against the
    gold reference. To probe reproducibility, we vary the correction
    prompt across four templates ranging from terse ("Fix this transcript:")
    to verbose chain-of-thought instructions, and we additionally inject
    three levels of background noise into the source audio (clean,
    +10 dB SNR, +0 dB SNR) before feeding it to Whisper.

    Across the resulting 12 conditions, we observe substantial variation
    in post-correction WER. Verbose prompts paired with clean audio
    achieve a WER of 3.1%, while terse prompts on noisy audio reach 8.7%.
    A breakdown of the error distribution shows that named-entity
    substitutions account for the majority of inconsistencies, with the
    LLM frequently rewriting proper nouns toward higher-frequency tokens
    such as common English first names.

    We argue these findings establish bounds on the reproducibility of
    LLM-driven ASR pipelines and motivate constrained decoding when
    transcription stability is required for regulated domains. Section 5
    connects the reproducibility bounds to the broader debate over LLM
    determinism and offers a recommended deployment protocol, including a
    pre-deployment reproducibility audit checklist practitioners can run
    before integrating LLM correction into a production transcription
    stack for clinical or legal use.
