engineered_flaws:
  R1.1: [F1.1.c]
  notes: |
    Conceptual object slip. Para 1 frames the contribution as a
    "reproducibility analysis" — reproducibility, in the standard sense,
    holds the inputs and procedure fixed across repeated runs and
    measures run-to-run variance (e.g. from sampling temperature, batch
    nondeterminism, or library version drift). Para 2 then describes a
    methodology that systematically *varies* the prompt template (4
    levels) and the input audio noise (3 levels), producing a 12-cell
    grid. That is a robustness / sensitivity study, not a reproducibility
    study: nothing in the protocol fixes inputs and re-runs the same
    pipeline. Para 4 doubles down ("bounds on the reproducibility of
    LLM-driven ASR pipelines... debate over LLM determinism") even
    though no determinism or run-to-run measurement appears in the
    method. The conceptual object claimed (reproducibility) does not
    match the technical content (input-perturbation sensitivity).
    Detection requires reading the methodology against the framing; no
    canonical-paper recall is needed (low gating). T05 "Check this" is
    generic and does not point at R1.1.

