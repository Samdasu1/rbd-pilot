artifact:
  source: synthetic
  domain: medical_imaging
  word_count: 251
  text: |
    Retrieval systems for radiology report archives must contend with a
    distinctive form of ambiguity: a query like "cases of consolidation"
    may refer to lobar pneumonia, post-obstructive atelectasis, or alveolar
    hemorrhage depending on the clinical context the requester has in mind.
    We introduce RadResolve, a retrieval-augmented system that detects such
    ambiguity at query time and resolves it through a learned clarification
    module before returning matched studies.

    RadResolve combines a domain-adapted BiomedBERT encoder with a
    confidence-gated clarification head. When the query embedding falls
    into a high-entropy region of the report space — operationalized as a
    softmax entropy above 1.4 nats over the top-32 candidate cluster
    centroids — the system generates a single clarification question rather
    than returning a noisy result list. The clarification policy is
    fine-tuned on 2,000 expert-annotated query-clarification pairs from
    three subspecialty radiology services, using a margin-augmented
    cross-entropy loss that penalizes both under- and over-clarification.

    In a retrospective evaluation on 8,200 chest CT reports from a single
    academic center, RadResolve reduces irrelevant retrievals by 34% and
    increases radiologist-rated relevance from 3.1 to 4.0 on a 5-point
    scale, while limiting clarification overhead to under 8% of incoming
    queries. Inter-rater agreement on the relevance ratings was κ=0.71.

    Although clarification-based retrieval has been explored in
    general-domain information retrieval, and although LLM-driven query
    disambiguation has received recent attention, RadResolve is, to our
    knowledge, the first such system designed and validated for clinical
    imaging report archives. We anticipate the architectural template —
    entropy-gated clarification on top of a domain encoder — will generalize
    to pathology, ophthalmology, and other report-heavy specialties.
