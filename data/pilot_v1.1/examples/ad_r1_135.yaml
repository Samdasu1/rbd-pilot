engineered_flaws:
  R1.4: [F1.4.b]
  notes: |
    Missing nearest neighbor. The closing paragraph explicitly acknowledges
    two adjacent literatures — "clarification-based retrieval in
    general-domain information retrieval" and "LLM-driven query
    disambiguation" — and then cites zero papers from either, while
    asserting RadResolve is "the first such system designed and validated
    for clinical imaging report archives." The novelty claim is positioned
    entirely against unnamed prior art: the section never points the reader
    at the closest mixed-initiative / clarification-IR system to contrast
    against (e.g. an Aliannejadi-style asking-clarifying-questions setup,
    or a clinical query expansion / disambiguation system from biomedical
    NLP). Detection is low-gating: a careful reader sees the section's own
    text gesture at two prior literatures and immediately notice that
    nothing from either is named, so the "first" claim is left dangling on
    a contrast it never makes. Conceptual object, method description, and
    experiments are otherwise clean — only the nearest-neighbor positioning
    is broken. The delegation T03 ("Make this stronger") is generic and
    does not leak R1.4.

