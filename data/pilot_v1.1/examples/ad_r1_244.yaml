engineered_flaws:
  R1.1: [F1.1.a]
  R1.5: [F1.5.a]
  notes: |
    Two compound issues; detecting them requires moderate familiarity
    with how methods-vs-empirical contributions are typically framed
    in medical-imaging papers, but no recall of canonical works.

    R1.1 thesis drift (F1.1.a): The opening commits the section to a
    methodological aim -- "develop a training procedure that is
    robust to label noise induced by reader disagreement." The
    closing paragraph reframes the contribution as architectural and
    empirical: "the multi-task formulation introduced here yields
    state-of-the-art AUC ... and substantially improved calibration."
    These are related but distinct theses: a robust-training-procedure
    paper section would foreground the loss-design choice and its
    statistical justification; a SOTA-architecture section would
    foreground the joint head and its inductive bias. The middle
    paragraph supports both readings without committing, and the
    section therefore drifts between "we introduce RDL" and "our
    architecture wins on AUC" without nominating one as load-bearing.

    R1.5 buried contribution (F1.5.a): The genuine technical novelty
    is the reader-distribution loss (RDL): a regularizer anchored on
    the empirical reader distribution rather than a uniform prior or
    a teacher's soft labels, with a learned per-instance weight.
    However, RDL is introduced mid-paragraph in para 2 as a
    parenthetical naming move ("we refer to this term as the RDL"),
    its differentiation from label smoothing and prior
    disagreement-aware methods is given in a single sentence, and
    neither the opening sentence nor the closing summary names RDL
    as the contribution -- the closer instead credits "the multi-task
    formulation," which is the generic scaffolding, not the novel
    component.

    Compound: committing the thesis (R1.1) to the methodological frame
    forces RDL to be foregrounded as the section's contribution
    (R1.5); conversely, foregrounding RDL (R1.5) requires the closing
    summary to be rewritten so the thesis is methodological rather
    than architectural-empirical (R1.1).

