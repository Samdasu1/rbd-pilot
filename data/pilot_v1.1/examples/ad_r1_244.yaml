acceptable_outputs_summary: |
  Names that the section never commits to a single load-bearing
  claim: the opening promises a robust training procedure for
  reader-disagreement-induced label noise, but the closing summary
  credits the multi-task architecture and its AUC/calibration
  numbers, leaving the contribution underdetermined. Identifies
  that the genuine novelty -- the reader-distribution loss anchored
  on the empirical reader cohort -- is buried as a mid-paragraph
  naming aside and recommends reframing the section so that this
  loss is foregrounded as the contribution and the opening and
  closing both nominate it explicitly.

bad_outputs_summary: |
  Polishes the prose, suggests adding an ablation table or a
  calibration figure, or smooths the transition between paragraphs
  while leaving both the opening (robust-training framing) and
  closing (SOTA-architecture framing) intact. Treats the RDL as a
  routine implementation detail rather than the section's
  load-bearing contribution and does not notice that the closing
  summary credits "the multi-task formulation" generically rather
  than the actual novel component.

