  domain: medical_imaging
  word_count: 348
  text: |
    Section 3. Reader Disagreement and BI-RADS Classification

    We turn now to the problem of training BI-RADS-category
    classifiers from mammograms when reader disagreement is
    non-negligible. In the DDSM-Plus cohort used throughout this
    paper, the Fleiss kappa for BI-RADS 3 vs 4a discrimination
    across our three reading radiologists is 0.42; majority-vote
    labels mask substantial uncertainty in roughly 18% of cases.
    Existing pipelines treat the majority label as ground truth and
    report performance against it, but the resulting classifiers
    inherit a bias toward the most confident reader and degrade
    systematically on the disagreement subset. Our concern in this
    section is therefore to develop a training procedure that is
    robust to label noise induced by reader disagreement.

    We adopt a multi-task ResNet-50 backbone that jointly predicts
    the BI-RADS category and an auxiliary disagreement probability.
    The disagreement head is supervised by a soft cross-entropy term
    over the empirical reader distribution and contributes a
    regularizer to the main classification loss via a learned
    per-instance weight; we refer to this term as the
    reader-distribution loss (RDL). The RDL differs from symmetric
    label smoothing by anchoring on the actual reader-cohort
    distribution rather than a uniform prior, and from prior
    disagreement-aware approaches which typically discard or
    down-weight high-disagreement cases rather than modeling them.
    Training uses Adam with cosine decay; standard augmentations
    apply. On the held-out CSAW-CC split, models trained with our
    procedure achieve an AUC of 0.872 on the BI-RADS 3-vs-4a
    sub-task, compared to 0.851 for majority-vote cross-entropy and
    0.858 for symmetric label smoothing. Expected calibration error
    on the disagreement subset improves from 0.071 to 0.039.

    In summary, the multi-task formulation introduced here yields
    state-of-the-art AUC on the BI-RADS 3-vs-4a sub-task and
    substantially improved calibration on the CSAW-CC benchmark.
    We carry this architecture forward into the cross-cohort
    generalization study of Section 4.
