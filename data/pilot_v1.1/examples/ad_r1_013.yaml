engineered_flaws:
  R1.4: [F1.4.c]
  notes: |
    Rhetorical novelty. The section claims "improves on prior work" but
    the only baseline cited is the authors' own previous work
    (GraphFlow-v1). All three benchmark comparisons are
    GraphFlow vs GraphFlow-v1 — same author group's own architecture.
    The standard GNN landscape (GAT, GIN, R-GCN, HGT, GraphSAGE) is
    absent. The "novelty delta" of 30-40% parameter reduction is real
    relative to GraphFlow-v1, but unclaimed-against the broader field.
    Detection: any reader notices "all three baselines are
    GraphFlow-v1" without needing canonical-paper recall — low gating.
    The delegation T03 "Make this stronger" is generic and does not
    signal R1.4 specifically.

