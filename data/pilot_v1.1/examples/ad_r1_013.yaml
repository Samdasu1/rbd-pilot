acceptable_outputs_summary: |
  Identifies that the only baseline is the authors' own prior work and
  flags this as insufficient novelty positioning. Names the missing
  comparisons (GAT / GIN / R-GCN / HGT / GraphSAGE or similar) the
  section should add. Suggests rewording the contribution to a defensible
  delta against the actual field, not just self-comparison.

bad_outputs_summary: |
