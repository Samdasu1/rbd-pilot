  word_count: 232
  text: |
    The root cause of both failure modes is the mismatch between
    reinforcement learning's expected-value optimization and
    commitment's per-step obligation which manifests itself in
    different ways across the two algorithms in our study and which
    we believe explains the observed performance gaps that we have
    documented in the preceding section of this paper across the
    multiple market conditions.

    The constrained MDP Lagrangian framework drives mean violation
    toward zero through gradient-based multiplier updates which is
    a well-established technique in the constrained optimization
    literature but provides no worst-case guarantee for any
    individual re-planning window in our deployment setting which
    means that the agent may satisfy commitment in expectation
    while violating it in any specific operational window.

    The proximal policy optimization algorithm uses a soft penalty
    formulation which is dominated by arbitrage gradients which
    suggests that the soft penalty approach is structurally limited
    regardless of further hyperparameter refinement that might be
    attempted in a follow-up study. Retraining under the rolling
    protocol yields zero commitment which is a striking result that
    we believe confirms the structural limitation hypothesis that
    we have been advancing throughout this paper.

    Post-hoc carry-over blending applied to the RL agents restores
    commitment to 100 percent which is encouraging at first glance
    but eliminates arbitrage revenue which we believe is a less
    desirable outcome than the integrated coupling approach that we
    propose in the combined strategy that we have been evaluating
    throughout this study.
  source_provenance: paper_4_isgt_discussion_hybrid_modified

