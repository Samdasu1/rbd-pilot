artifact:
  source: synthetic
  domain: nlp
  word_count: 312
  text: |
    We present DialogueDev, a multi-agent communication protocol for
    collaborative software development with large language models.
    DialogueDev structures interactions among role-conditioned agents — a
    Product Manager, an Architect, a Programmer, and a Reviewer — into
    typed message channels with explicit handoff conditions. Each channel
    enforces a schema over message contents (e.g., specification, code
    patch, review comment), and a coordinator agent arbitrates which
    channel is active at each turn. By making inter-agent communication
    explicit and structured, we aim to reduce the role confusion and topic
    drift commonly observed in unstructured multi-agent LLM systems.

    The protocol is implemented over a fixed set of GPT-4 instances with
    frozen weights. Agents communicate via JSON-typed messages, and the
    coordinator routes messages by inspecting message-type tags rather
    than free-form intent. We evaluate DialogueDev on HumanEval-X and on a
    held-out subset of 80 GitHub issues drawn from medium-popularity
    Python repositories.

    Our central contribution, however, is a new chain-of-thought
    decomposition strategy, which we call Reflective Subgoal Prompting
    (RSP). RSP instructs a single LLM to generate, critique, and revise an
    explicit list of subgoals before emitting code. We find that RSP,
    applied to a single GPT-4 instance with no multi-agent infrastructure,
    achieves a pass@1 of 78.4% on HumanEval-X, compared to 71.2% for a
    vanilla zero-shot baseline. On the GitHub issue subset, RSP resolves
    34 of 80 issues end-to-end, while the zero-shot baseline resolves 21.
    Crucially, RSP's gains are largely orthogonal to those obtained from
    agent decomposition: a stripped-down single-agent prompt with RSP
    recovers most of the multi-agent system's performance.

    We argue that reflective subgoal prompting represents a more
    parsimonious account of where the gains in recent multi-agent
    code-generation systems originate. Section 5 shows that the dominant
    variance across configurations is explained by the prompting
    strategy, not by the communication topology among agents. We
    therefore frame our contribution as a prompting-level intervention
    rather than an architectural one.
