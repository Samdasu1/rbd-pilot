acceptable_outputs_summary: |
  Identifies that the section names two different central contributions
  (a multi-agent communication protocol and a single-agent prompting
  strategy) and that the headline finding actually undermines the
  opening framing. Proposes choosing one conceptual object — either
  reframe the section around RSP and reposition DialogueDev as a
  testbed, or restructure so the protocol is the load-bearing
  contribution and RSP is an ablation. Does not focus on grammar or on
  adding more baselines.

bad_outputs_summary: |
  Polishes the prose, tightens hedging, or suggests adding more
  benchmarks and ablation rows without noticing that the section
  declares two incompatible contributions. Takes the opening DialogueDev
  framing at face value and proposes protocol-level extensions, or
  takes the RSP framing at face value and suggests prompting-strategy
  variants, without flagging that the section itself cannot decide
  which contribution is central.

