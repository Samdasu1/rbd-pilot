artifact:
  source: synthetic
  domain: theory_ann
  word_count: 348
  text: |
    Multi-agent dialogue systems built on large language models have
    attracted growing interest as a route to autonomous task completion.
    Park et al. demonstrated that role-conditioned agents can sustain
    extended task-oriented conversations, and Zhang and Bose analyzed
    the equilibria of two-agent inception-prompted exchanges under
    fixed temperature decoding. Subsequent work has extended these
    analyses to mixed-role populations and to settings with a
    moderating critic agent.

    A central object of study in this literature is the
    instruction-following channel: the mapping from one agent's
    utterance to the next agent's induced task posterior. Existing
    results characterize this channel under the assumption that both
    agents share a common prompt prefix and that decoding noise is
    bounded. Under these assumptions, prior work shows that the joint
    trajectory of N rounds converges in total variation to a stationary
    role-consistent distribution at rate O(1/sqrt(N)).

    We study a relaxation in which the two agents are instantiated from
    different base models and therefore do not share a common prefix.
    Concretely, the user-agent is drawn from model M_U and the
    assistant-agent from model M_A, with KL divergence delta between
    their next-token distributions on the shared role prompt. We
    instrument the dialogue with a per-round drift estimator d_t and
    track its evolution across 10,000 simulated task episodes drawn
    from the AgentBench-Lite suite.

    Our empirical drift curves show that d_t grows sublinearly when
    delta < 0.15 and superlinearly otherwise, with a sharp transition
    near delta = 0.18. The transition is robust across three task
    families and persists when the moderator agent of Chen and Iyer
    is inserted.

    To explain this transition, we adapt the contraction-mapping
    argument of Zhang and Bose, replacing their single-prefix
    assumption with a two-prefix coupling. The adapted bound predicts
    a critical delta* whose closed form matches the observed
    transition within 8%.

    Taken together, these results establish the first convergence
    guarantee for heterogeneous-model multi-agent dialogue and
    identify a sharp phase transition in cross-model drift, giving
    practitioners a principled criterion for when role-played
    cooperation between distinct base models will remain stable.
