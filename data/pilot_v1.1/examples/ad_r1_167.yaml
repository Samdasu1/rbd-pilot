engineered_flaws:
  R1.5: [F1.5.c]
  notes: |
    Out-of-order narrative. The section flow is:
      (1) method (ContamRLHF reweighting procedure)
      (2) experimental results (HH-RLHF + Prolific, win-rate, ablation)
      (3) motivation (crowdworkers use LLMs; self-preference collapse)
          — explicitly labelled "the central motivation of our work"
          but appears in paragraph 3 of 5
      (4) formal definition of contamination rate ρ and Theorem 1 — the
          object that ρ refers to is not introduced until after the
          experiments that implicitly depend on it
      (5) related work (Christiano, Stiennon, Ouyang) — appears last
    A reader entering the section must backtrack twice: once to find
    out *why* contamination matters (only para 3 explains the
    self-preference collapse), and once to find the formal definition
    of ρ (para 4) which is implicit throughout para 1–2. The natural
    ordering for this contribution is:
      motivation (3) → related work (5) → method + formalization (1+4)
      → results (2)
    Detection: any careful linear reader notices that the "central
    motivation" sentence appears in paragraph 3, that ρ is formalized
    after it has been implicitly used, and that related work is
    appended at the end. No canonical-paper recall is required (low
    gating). Delegation T01 "Improve this draft." is fully generic and
    gives no signal toward R1.5.

