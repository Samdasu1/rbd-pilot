artifact:
  source: synthetic
  domain: reinforcement_learning
  word_count: 312
  text: |
    We propose ContamRLHF, a reward-model training procedure that
    downweights crowd-sourced preferences likely to have been produced
    with LLM assistance rather than by the human annotator. Training
    proceeds in two stages: a contamination classifier C is fit on
    annotator metadata (response time, lexical entropy, n-gram overlap
    with frontier-model outputs), and the standard Bradley–Terry
    preference loss is reweighted by (1 − C(annotator, response)) for
    each preference triple.

    On Anthropic's HH-RLHF and a held-out preference set we collected
    via Prolific (n = 2,400 triples, 84 annotators), ContamRLHF improves
    downstream RLHF win-rate by 7.4 points over the standard pipeline
    and reduces reward hacking on AlpacaEval-2 by 18%. Ablating the
    reweighting term recovers the baseline performance, indicating the
    gain is attributable to contamination correction rather than to the
    auxiliary classifier features.

    Recent audits report that 33–46% of text-production crowdworkers on
    platforms like MTurk and Prolific routinely use ChatGPT-class
    assistants to draft their submissions, and that a non-trivial
    fraction of "human" preference labels collected after late 2022 are
    at least partly LLM-generated. When the same model family that is
    being aligned also produced the preference labels, the reward model
    collapses toward a degenerate self-preference signal — exactly the
    failure mode our procedure is designed to prevent. This is the
    central motivation of our work.

    Formally, denote the contamination rate ρ ∈ [0,1] as the expected
    fraction of preference triples for which the chosen label was
    emitted by an LLM. Theorem 1 (Appendix B) shows that for ρ > 0.3
    the standard reward-model loss is bounded away from the true
    human-preference rate by at least Ω(ρ²); ContamRLHF restores the
    unbiased estimator under a mild calibration assumption on C.

    Prior RLHF pipelines (Christiano et al.; Stiennon et al.; Ouyang
    et al.) assume clean human labels, and contamination-aware learning
    has been studied for supervised image classification but, to our
    knowledge, not for preference learning over LLM outputs.
