  word_count: 318
  text: |
    In this section we present the evaluation methodology that we used to
    evaluate code generation outputs from candidate language models. Our
    evaluation methodology uses an open-source evaluator language model
    to evaluate code samples produced by candidate language models across
    several programming languages. The evaluator language model that we
    used is a fine-tuned variant of a publicly available base evaluator
    language model, and the evaluator language model was trained on
    synthetic feedback data covering Python, JavaScript, and Rust.

    The evaluation procedure proceeds as follows. First, we sample
    candidate code from each candidate model for each candidate prompt
    in our candidate prompt set. Second, we feed each candidate code
    sample to the evaluator model along with the original candidate
    prompt and a rubric. Third, the evaluator model produces a score on
    a five-point scale for each candidate code sample. We collect scores
    from the evaluator model for all candidate code samples and we
    aggregate the scores from the evaluator model across candidate
    prompts to obtain final scores for each candidate model.

    We benchmarked the evaluator model against human ratings on a
    benchmark set of 600 code samples. The benchmark set covers Python
    (200 samples in the benchmark set), JavaScript (200 samples in the
    benchmark set), and Rust (200 samples in the benchmark set). On the
    benchmark set, the evaluator model achieved a Spearman correlation
    of 0.71 with human ratings on Python samples in the benchmark set,
    0.68 with human ratings on JavaScript samples in the benchmark set,
    and 0.64 with human ratings on Rust samples in the benchmark set.

    The evaluator model also produces natural language critiques
    alongside its scores. The natural language critiques produced by
    the evaluator model are intended to help developers understand why
    the evaluator model scored each code sample the way the evaluator
    model did. We provide examples of natural language critiques
    produced by the evaluator model in Appendix B.
