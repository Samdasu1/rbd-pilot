artifact:
  source: synthetic
  domain: causal_inference
  word_count: 348
  text: |
    We investigate the causal effect of large language model (LLM)
    assistance on the quality of crowd-sourced text annotations.
    Crowdsourcing platforms increasingly mediate the production of
    training and evaluation data for NLP systems, and the recent
    finding that a substantial share of crowd workers now silently
    rely on LLMs raises a sharp question for empirical NLP: does
    LLM-assisted annotation systematically degrade or improve
    downstream model performance? Our central contribution is an
    instrumental-variable (IV) identification strategy that recovers
    the local average treatment effect (LATE) of LLM use on annotation
    quality, holding worker characteristics fixed.

    Our data come from a six-week annotation campaign on a popular
    microtask platform, in which 1,840 workers completed 38,400
    paragraph-summarization HITs. The platform conducted a randomized
    experiment during this window in which half of the worker pool
    received a banner advertising an integrated LLM tool, while the
    other half saw no such banner. We use banner exposure as an
    instrument for downstream LLM use.

    Identification rests on two assumptions. First, banner exposure
    was randomly assigned at the worker level, so workers in the two
    arms are statistically equivalent on both observed and unobserved
    characteristics; this is guaranteed by the platform's randomization
    protocol. Second, banner exposure affects annotation quality only
    through its effect on LLM adoption (the exclusion restriction).

    Empirically, we find that workers who used LLMs produced summaries
    that were 14% more semantically faithful to the source paragraph
    (as measured by entailment scores against held-out references)
    than workers who did not. Because workers self-select into LLM
    use based on English proficiency and prior familiarity with chat
    interfaces, we adjust for these covariates using propensity-score
    weighting on the LLM-use indicator, yielding an adjusted gap of 9%.

    These findings contribute a practical detector for LLM-generated
    crowd output: a logistic classifier trained on lexical and
    stylistic features distinguishes LLM-assisted from unassisted
    summaries with 0.87 AUC on a held-out worker pool. Requesters
    can deploy the detector to flag suspected LLM use and re-route
    affected HITs. We conclude that the rise of LLM-assisted
    crowdsourcing is best understood not as a threat to data quality
    but as a measurable signal that downstream pipelines can recover,
    calibrate against, and exploit.
