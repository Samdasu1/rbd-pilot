engineered_flaws:
  R1.1: [F1.1.a]
  R1.2: [F1.2.b]
  notes: |
    Two compound issues:

    R1.1 — thesis drift. Para 1 frames the contribution as causal
    identification: an IV strategy that recovers the LATE of LLM use
    on annotation quality. The closing paragraphs deliver a different
    object entirely: a logistic detector that classifies summaries as
    LLM-assisted or not, with deployment guidance for requesters. The
    section opens as a causal-effect paper and closes as a detection
    paper; the stated contribution and the delivered contribution are
    different theses.

    R1.2 — cross-section contradiction. Para 2-3 set up an IV design
    using banner exposure as the instrument for LLM use, and claim
    identification follows from random assignment of the banner plus
    the exclusion restriction. Para 4 reports the actual estimate by
    comparing LLM users vs non-users directly and adjusting via
    propensity-score weighting on the LLM-use indicator with covariates
    like English proficiency. That is a selection-on-observables design,
    not an IV reduced-form / 2SLS estimate. The methods section's
    identification strategy contradicts what the empirics actually
    estimate: if random banner assignment identifies the LATE, no
    propensity adjustment on self-selection is needed (and PSW on the
    treated indicator does not recover the IV estimand).

    Detection: low gating — a reader who knows what IV identification
    requires (compliance/first-stage, reduced form on the instrument,
    not PSW on the endogenous treatment) sees the mismatch from the
    text alone, and the open-vs-close thesis shift is visible without
    external recall.

