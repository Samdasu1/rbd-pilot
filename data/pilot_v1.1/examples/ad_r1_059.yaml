acceptable_outputs_summary: |
  Names both: (1) the section opens as a causal-LATE paper and closes
  as a detector paper — these are different contributions and one of
  them needs to go or the framing needs to be unified; (2) the stated
  identification (IV via banner exposure) does not match the actual
  estimate (PSW on the LLM-use indicator), and these two designs
  recover different estimands under different assumptions. Suggests
  either committing to the IV design and reporting reduced-form /
  2SLS estimates on banner exposure, or dropping the causal claim
  and presenting the work as a descriptive + detector study.

bad_outputs_summary: |
  Polishes prose, suggests adding more covariates to the PSW, requests
  a sensitivity analysis, or adds citations on crowd-work quality.
  Treats "causal effect" and "detector" as compatible parts of one
  contribution without flagging the shift, and accepts IV framing
  alongside PSW estimation as if they were complementary rather than
  contradictory identification strategies.

