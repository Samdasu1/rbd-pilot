artifact:
  source: synthetic
  domain: robotics
  word_count: 318
  text: |
    We introduce RoboJudge, a reference-free evaluator for
    instruction-conditioned manipulation policies. Existing benchmarks rely
    on per-task success predicates: hand-coded checks such as
    is_inside(cup, drawer) or pose(block) ≈ goal_pose, which require expert
    engineering for every new instruction template. RoboJudge replaces
    these predicates with a single LLM call that scores whether the
    executed rollout satisfied the natural-language instruction, eliminating
    per-task annotation effort and enabling open-ended evaluation on
    instructions outside the original training distribution.

    The pipeline is a thin wrapper around GPT-4o. Given an instruction I
    and a rollout trajectory τ, we construct a prompt containing I and a
    description of the post-execution scene, and ask GPT-4o to return a
    score in [0, 1] together with a one-sentence rationale. We additionally
    request a binary success label, which we treat as the primary metric,
    and use the rationale for downstream error analysis. No fine-tuning is
    performed: RoboJudge can be deployed zero-shot on any new task family.

    We evaluate RoboJudge on 1,820 rollouts from RT-1, RT-2, and OpenVLA
    spanning 14 instruction families on a Franka Panda tabletop setup.
    Human raters scored each rollout for success; we compute Spearman ρ
    between RoboJudge and the median human rater. RoboJudge achieves
    ρ = 0.78 averaged across families, compared to ρ = 0.69 for hand-coded
    predicates and ρ = 0.55 for CLIPScore-based evaluators. On instruction
    families with compositional structure ("place the red block on top of
    the blue block, then push both into the drawer"), the gap widens to
    0.81 vs 0.62.

    These results establish that LLM-based judging is competitive with —
    and in compositional regimes, superior to — hand-crafted predicates,
    while requiring zero per-task engineering. We therefore advocate
    replacing predicate-based success metrics with RoboJudge as the default
    evaluation protocol for instruction-following manipulation benchmarks.
