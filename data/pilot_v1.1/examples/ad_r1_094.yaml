acceptable_outputs_summary: |
  Flags that the source of the post-execution scene description is never
  specified, and that the headline "zero per-task engineering" claim
  depends entirely on this unstated input. Notes that each plausible
  resolution (privileged simulator state, learned captioner, human
  annotation) either reintroduces the engineering cost being criticized
  or relocates the evaluator into an uncharacterized perception module
  that should itself be the subject of evaluation.

bad_outputs_summary: |
  Polishes the writing, suggests adding more rollouts or task families,
  recommends comparing against additional LLM judges (Claude, Gemini), or
  asks for inter-rater agreement statistics on the human raters. Accepts
  the "description of the post-execution scene" as a given input and
  critiques downstream methodology (prompt format, score calibration)
  without questioning where that description originates.

