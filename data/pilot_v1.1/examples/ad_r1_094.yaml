engineered_flaws:
  R1.2: [F1.2.a]
  notes: |
    Hidden premise. The pipeline paragraph states the prompt contains
    the instruction "and a description of the post-execution scene" —
    but the section never says where this description comes from. The
    entire "zero per-task engineering" contribution rests on this
    unstated source. The load-bearing premise can only resolve in three
    ways, all of which break the claim: (a) the description is produced
    by privileged simulator state (object poses, contact relations,
    inside-of relations) — in which case it is strictly more informative
    than the hand-coded predicates being criticized, and the predicates
    have merely been hidden inside the simulator's state-extraction
    code; (b) the description comes from a learned VLM scene captioner —
    in which case the captioner is the actual evaluator and is never
    characterized, validated, or compared; (c) it is human-annotated —
    in which case the "no per-task annotation" claim is straightforwardly
    false. The Spearman ρ numbers and the headline claim are both
    contingent on resolving (a)/(b)/(c), and the section silently
    assumes the description is "available." Moderate gating: a
    robotics reader recognizes that going from a Franka rollout to a
    structured scene description is precisely the perception/grounding
    problem where success predicates already live, so the unstated
    premise is doing all the load-bearing work. A reader unfamiliar
    with manipulation evaluation may accept "description of the
    post-execution scene" as innocuous boilerplate.

