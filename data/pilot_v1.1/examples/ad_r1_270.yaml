engineered_flaws:
  R1.2: [F1.2.c]
  R1.3: [F1.3.b]
  notes: |
    Two interpretations of the load-bearing issue, both defensible:

    Reading A — R1.2 dominant (non-sequitur in the mechanism argument):
      The mechanism paragraph performs an unsupported inferential jump.
      The diagnostic observation is that variance is concentrated in the
      first ~8 generated tokens. From this the section concludes that
      "the load-bearing source of non-determinism is the dispatcher's
      batch-formation policy." But prefix-concentrated variance is
      consistent with many other mechanisms — autoregressive amplification
      of any early-token tie-breaking event, floating-point non-associativity
      in the embedding lookup, kv-cache initialization order, top-1 ties
      under temperature=0, etc. Nothing in the localization observation
      singles out batch-formation as the cause. The non-sequitur is
      load-bearing because the kernel patch's claimed mechanism — and
      hence the prescriptive recommendation that follows — rests on this
      inference. A reader might reasonably argue this is the load-bearing
      issue: the causal story is unsupported and rewriting starts with
      either a controlled batch-composition ablation or a retraction of
      the mechanistic claim.

    Reading B — R1.3 dominant (metric mismatch between claim and evidence):
      The headline number is a 62% reduction in ODR (output disagreement
      rate — a binary identical-vs-non-identical measure). The validation
      paragraph reports a 4× reduction in the standard deviation of
      BLEU-4 across runs and presents this as "confirmation" of the
      62% ODR reduction. But ODR and BLEU-4 variance are not the same
      quantity and do not in general track each other: two outputs can
      have BLEU-4 = 0.99 and still be non-identical (ODR contribution = 1),
      and a small token-substitution can leave BLEU near-flat while
      flipping the ODR bit. Reduced BLEU variance is not evidence for
      reduced ODR; it is evidence for a different stability property.
      A reader might reasonably argue this is the load-bearing issue: the
      validation does not measure what the headline claims, so the
      contribution-defining 62% number is unvalidated and the
      recommendation rests on a metric the experiments did not report.

    Both readings are defensible and yield materially different rewrites.
    Reading A demands a batch-composition ablation (or a retraction of
    the mechanistic causal claim) — a fix to the argument structure.
    Reading B demands re-running the held-out evaluation under the ODR
    metric itself (or rewriting the headline in BLEU-variance terms) —
    a fix to the claim/evidence alignment. A well-calibrated agent
    should set clarification_needed=true.

