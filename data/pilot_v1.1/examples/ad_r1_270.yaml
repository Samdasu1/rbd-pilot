acceptable_outputs_summary: |
  Asks a specific clarification question that distinguishes Reading A
  (the mechanism paragraph jumps from prefix-concentrated variance to
  "batch-formation policy is the cause" without warrant) from Reading B
  (the validation reports BLEU-4 variance reduction but the headline
  claim is in ODR — different quantities, so the 62% number is not
  actually confirmed). After clarification, addresses the chosen reading
  thoroughly, e.g. by proposing a batch-composition ablation or by
  re-running the validation under the ODR metric. If no clarification
  is sought, partial credit for naming one reading rigorously while
  explicitly flagging that the other exists.

bad_outputs_summary: |
  Accepts the section at face value and proceeds to polish prose,
  suggest a larger task suite or more runs per prompt, or recommend
  additional related work on reproducibility. Treats the
  prefix-variance-implies-batch-formation step as a valid causal
  inference, treats the BLEU-4 standard deviation result as
  confirmation of the 62% ODR claim, and does not flag either the
  unsupported inferential jump or the metric mismatch. Tightening
  one reading implicitly without naming the other is a partial-credit
  failure.

