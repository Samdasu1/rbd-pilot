artifact:
  source: synthetic
  domain: nlp
  word_count: 358
  text: |
    We investigate run-to-run output divergence in a 13B instruction-tuned
    LLM served via a popular open-source inference framework, with all
    stochastic settings configured to their deterministic values
    (temperature=0, top_p=1, num_beams=1, seed fixed across runs). Across
    12 generation tasks drawn from a public structured-output benchmark
    suite, we run each prompt 25 times under identical configuration on a
    single A100 node and measure the rate at which two independent runs
    of the same prompt produce non-identical outputs. We refer to this
    rate as the output disagreement rate (ODR) and use it as our
    principal stability metric.

    Our headline finding is that pinning the CUDA matmul reduction order
    via a custom kernel patch reduces ODR by approximately 62% across
    the benchmark, bringing the median task from 31% disagreement down
    to a level we describe as "near-deterministic" for downstream
    applications. The reduction is consistent across all twelve tasks
    and across both the zero-shot and three-shot conditions. Below we
    unpack the mechanism and its implications.

    Our diagnostic analysis localizes the variance to the first 8
    generated tokens: across runs, the prefix tokens diverge with much
    higher frequency than tokens generated later in the sequence.
    Because variance is concentrated in the prefix, we conclude that the
    load-bearing source of non-determinism is the dispatcher's
    batch-formation policy, which interleaves prompts of different
    lengths and thereby determines the precise reduction order applied
    to the first matmul in the attention block. The kernel patch
    addresses this directly by enforcing a deterministic reduction order
    regardless of batch composition.

    To validate the kernel patch's impact, we report exact-match
    agreement on a held-out test set of 800 structured-output prompts.
    With the patch enabled, the average BLEU-4 score across runs has
    standard deviation 0.4, compared to 1.6 without the patch — a 4×
    reduction in BLEU variance. We take this as confirmation of the 62%
    ODR reduction reported above, and we therefore recommend the kernel
    patch as a drop-in fix for practitioners who require reproducible
    LLM outputs in evaluation pipelines.
  source_provenance: null

