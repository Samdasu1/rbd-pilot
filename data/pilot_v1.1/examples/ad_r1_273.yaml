engineered_flaws:
  R1.2: [F1.2.a]
  R1.3: [F1.3.a]
  notes: |
    Two interpretations of the load-bearing issue, both defensible:

    Reading A — R1.2 dominant (hidden premise in the gain-attribution
    and convergence arguments):
      The headline claim — that the +1.8 COMET-22 gain reflects the
      multi-agent loop "recovering genuine translation errors" — rests
      on a hidden premise that is never stated and never checked: that
      Critic and Editor agents have at least partially independent
      error profiles relative to the Translator. But all three agents
      are roles played by the same 70B base model with shared
      parameters, so any error the Translator makes that the base
      model considers fluent is by construction also invisible to the
      Critic. Worse, the "fixed-point" convergence story makes the same
      assumption explicit and then waves it away: the Editor's output
      is accepted because Critic and Editor "share the same underlying
      parameters" — i.e., convergence is just the model agreeing with
      itself, not a quality signal. A second, related hidden premise:
      the single-pass baseline is single-sample, while TRIAGE-MT spends
      ~5× compute through repeated sampling; the gain is not isolated
      from a best-of-N sampling effect at matched compute. A reader
      might reasonably argue this is the load-bearing issue: the entire
      attribution of gains to "agentic self-revision" rests on premises
      that, once stated, undermine the contribution.

    Reading B — R1.3 dominant (overgeneralization beyond the evidence):
      The closing sentence claims TRIAGE-MT is a "general-purpose
      framework for improving translation quality across language pairs"
      and a "drop-in post-editing module for any LLM-based translation
      system." The evidence is three high-resource pairs (en→fr, en→de,
      en→zh), all out of English, all into well-represented target
      languages, evaluated with a single base model on a single test
      suite. Nothing in the experiments licenses claims about
      low-resource pairs, non-English source languages, typologically
      distant pairs, or transfer to other base models. The
      contribution-defining generality claims outrun the evidence
      substantially. A reader might reasonably argue this is the
      load-bearing issue: tightening the scope of the conclusion (and
      adding cross-pair / cross-model evidence to support what remains)
      is what the section actually needs.

    Both readings yield materially different rewrites. Reading A demands
    a same-compute best-of-N baseline, an external (different-model)
    Critic, and a retraction or qualification of the "genuine errors"
    framing — a fix to the causal/attribution argument. Reading B
    demands restricting the conclusion to the evaluated regime and
    adding low-resource and non-English-source experiments — a
    scope/evidence fix. A well-calibrated agent should set
    clarification_needed=true.

