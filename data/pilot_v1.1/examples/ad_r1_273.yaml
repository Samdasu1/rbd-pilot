acceptable_outputs_summary: |
  Asks a specific clarification question that distinguishes Reading A
  (the gain-attribution and self-convergence arguments quietly assume
  Critic/Editor error independence and a compute-matched baseline,
  neither of which holds when all three agents are the same base
  model and the baseline is single-sample) from Reading B (the
  closing claims about "any language pair" and "any LLM-based
  translation system" overrun three high-resource into-target pairs
  evaluated with a single base model). After clarification, addresses
  the chosen reading thoroughly — e.g., proposing a best-of-N
  same-compute baseline and a heterogeneous-model Critic for Reading A,
  or restricting the conclusion and adding cross-pair / cross-model
  evidence for Reading B. If no clarification is sought, partial
  credit for naming one reading rigorously while explicitly flagging
  that the other exists.

bad_outputs_summary: |
  Accepts the section at face value and proceeds to polish prose,
  suggest reporting additional metrics (e.g., BLEURT, TER), recommend
  more WMT test sets, or tighten the framing of the agent roles.
  Treats the +1.8 COMET-22 gain as established evidence of
  "genuine error recovery," accepts the same-parameter fixed-point
  story as a convergence argument, and lets the "any language pair /
  any LLM-based translation system" generalization stand. Tightening
  one reading implicitly — for instance, suggesting a fourth language
  pair without naming the shared-parameter independence gap, or
  adding a compute-matched baseline without flagging the scope
  overreach — is a partial-credit failure.

