artifact:
  source: synthetic
  domain: machine_translation
  word_count: 342
  text: |
    We present TRIAGE-MT, a three-agent translation pipeline built atop
    a single 70B instruction-tuned LLM. A Translator agent produces an
    initial draft, a Critic agent identifies errors at the
    span level, and an Editor agent rewrites the segment conditioned on
    the Critic's feedback. The pipeline iterates until the Critic
    returns "no further issues" or until a budget of five rounds is
    reached. We report results on WMT22 test sets for en→fr, en→de,
    and en→zh, comparing against single-pass baseline outputs from the
    same base model.

    Across the three language pairs, TRIAGE-MT achieves an average
    COMET-22 improvement of +1.8 over the single-pass baseline, with
    gains of +1.6 (en→fr), +1.9 (en→de), and +1.9 (en→zh). On the chrF
    metric, the corresponding improvements are +0.7, +1.1, and +0.9.
    We observe that 78% of segments converge — i.e., the Critic returns
    "no further issues" — within three rounds, and the average number
    of edit rounds per segment is 2.4. We take the consistent
    improvement across all three pairs and both metrics as evidence
    that the multi-agent loop is recovering genuine translation errors
    rather than producing surface paraphrases.

    To characterize convergence behavior, we treat the iteration as a
    fixed-point process: a segment is converged when the Editor's
    output lies in the Critic's "acceptable" set on the following round.
    Because Critic and Editor are conditioned on the same context window
    and share the same underlying parameters, we expect the Editor's
    output to be accepted after at most a few rounds, and this is what
    we observe empirically.

    We therefore conclude that TRIAGE-MT provides a general-purpose
    framework for improving translation quality across language pairs
    through agentic self-revision, and we recommend it as a drop-in
    post-editing module for any LLM-based translation system that
    requires higher fidelity at inference time.
