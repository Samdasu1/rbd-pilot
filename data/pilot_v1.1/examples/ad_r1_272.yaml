engineered_flaws:
  R1.4: [F1.4.b]
  R1.7: [F1.7.b]
  notes: |
    Two interpretations of the load-bearing issue, both defensible
    and both detectable from careful reading alone:

    Reading A — R1.4 dominant (missing nearest neighbor):
      The "first benchmark to decompose regional climate emulator
      skill into separable physical-process requirements" claim sits
      in a crowded design space that the section never names. The
      surrounding literature on regional and global ML emulator
      evaluation includes obvious nearest neighbors (community
      benchmarks for ML weather/climate emulators, CMIP-style
      diagnostic intercomparison protocols, and process-based
      evaluation suites long used in NWP — which the section itself
      gestures at one paragraph later). The bare phrase "Prior
      approaches to regional emulator evaluation have relied on
      aggregate scoring", with no system named, is the
      missing-nearest-neighbor signature: the contribution is
      positioned against an unnamed straw man rather than against
      the closest existing benchmarks. Rewrite would re-anchor the
      "first" claim against the named comparators and isolate the
      axis on which DPSR is genuinely new (per-process rubric
      structure? checker automation? annotation protocol?).

    Reading B — R1.7 dominant (missing key prior work):
      The "three methodological pillars" paragraph hangs the
      framework's credibility on three load-bearing references that
      are never cited: "process-based evaluation principles long
      established in numerical weather prediction", "standard
      atmospheric diagnostic operators", and a "CMIP6-derived test
      set". Each of these has canonical anchors that any reader
      would expect (the seminal Taylor-diagram and process-based
      diagnostic literature, the WGNE/CMIP intercomparison protocol
      papers, and the CMIP6 design paper for the test set). Their
      absence is visible from the bare assertions alone — the reader
      does not need to recall the specific citations to notice that
      methodological grounding is being asserted without anchors.
      Rewrite would insert the canonical references for each of the
      three pillars and the test-set source.

    Reading A says "you haven't said who you're closest to" — fix the
    novelty contrast. Reading B says "you haven't anchored the
    methodological scaffolding you depend on" — fix the scholarship
    gap. Detection is low-gated for both: the unnamed comparator set
    is visible from the bare "first" claim and the unnamed "prior
    approaches", and the missing citations are visible from the bare
    assertions in the methodological-pillars paragraph.

