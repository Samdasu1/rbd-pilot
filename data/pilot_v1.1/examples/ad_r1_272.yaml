artifact:
  source: synthetic
  domain: climate
  word_count: 360
  text: |
    We introduce CLIMATE-RUBRIC, a decomposed evaluation framework for
    regional climate emulators that scores model outputs against a
    structured rubric of per-process physical requirements rather than
    a single aggregate skill score. To our knowledge, CLIMATE-RUBRIC
    is the first benchmark to decompose regional climate emulator
    skill into separable physical-process requirements that can be
    checked independently and aggregated into a single Decomposed
    Process Skill Ratio (DPSR).

    The framework operates in three stages. First, a panel of climate
    scientists annotates each evaluation case — typically a regional
    2 m temperature or precipitation hindcast — with an explicit list
    of process-level requirements: for example, "captures the diurnal
    temperature range within 1.5 K", "preserves the orographic
    precipitation gradient sign across the leeward boundary", and
    "maintains ENSO teleconnection phase within plus or minus one
    month". Second, the candidate emulator produces outputs against
    each case. Third, a deterministic checker suite scores each
    requirement as satisfied or violated, and DPSR is computed as the
    fraction of satisfied requirements per case, averaged across the
    test set.

    We argue that DPSR is the binding evaluation construct for
    regional emulators because aggregate root-mean-square error masks
    systematic process-level failures: a model can achieve competitive
    RMSE while violating physical constraints that downstream impact
    assessments depend on. Prior approaches to regional emulator
    evaluation have relied on aggregate scoring, which our framework
    supersedes by exposing the per-process structure that aggregate
    scores collapse.

    The framework rests on three methodological pillars. The rubric
    construction protocol adapts process-based evaluation principles
    long established in numerical weather prediction. The checker
    suite is built from standard atmospheric diagnostic operators
    applied to gridded output. The aggregation step uses bootstrap
    resampling to produce per-process and overall confidence intervals.

    We evaluate four state-of-the-art neural emulators on a
    CMIP6-derived test set spanning three reference regions and find
    that DPSR rankings diverge substantially from RMSE rankings: the
    lowest-RMSE emulator ranks third on DPSR, primarily because it
    fails the orographic-gradient and diurnal-amplitude requirements.
    We position CLIMATE-RUBRIC as the foundation on which future
    regional climate emulator development can be benchmarked, and we
    release the rubric, checker suite, and reference annotations as a
    community resource.
  source_provenance: null

