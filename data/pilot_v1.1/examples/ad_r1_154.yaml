engineered_flaws:
  R1.5: [F1.5.a]
  notes: |
    The two-part contribution claim — (i) a publicly released
    chemist-paired preference benchmark for molecule generation, and
    (ii) an LLM-judge protocol that closes roughly half the
    filter-vs-expert gap — appears only in the FINAL paragraph (six of
    six). A reader entering the section is taken through related work
    (1), dataset construction (2), pipeline description (3), headline
    accuracy results (4), and bias diagnostics (5) before learning what
    is actually being offered as a contribution. The natural ordering
    for a contribution-style section in this area would be:
      contribution (1) → context / RW (2) → benchmark construction (3)
      → judge protocol (4) → results (5) → bias analysis (6).
    The current ordering is RW → benchmark → method → results → bias →
    contribution. Subtlety: the section reads coherently end-to-end and
    each paragraph is locally well-formed; the dataset, pipeline, and
    numbers are internally consistent. The flaw is structural — a
    section-level reorder is required, not a sentence-level edit.
    Detection requires only careful reading of paragraph order, hence
    low knowledge gating. Delegation "Check this." (T05) is maximally
    generic and gives no signal toward R1.5.

