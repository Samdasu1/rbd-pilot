  domain: drug_discovery_ml
  word_count: 384
  text: |
    Recent work on automated evaluation of generative models for de novo
    molecule design has emphasized the gap between standard cheminformatics
    metrics — validity, uniqueness, and novelty — and downstream
    medicinal-chemistry judgments of synthesizability and lead-likeness.
    Brown et al.'s GuacaMol and the MOSES benchmark introduced multi-property
    optimization tasks but rely on physicochemical filters that are known to
    correlate weakly with expert assessments. Subsequent work by Gao and
    Coley showed that retrosynthetic feasibility further dissociates from
    filter-based scores, and several recent reports propose to bridge the
    gap with learned scoring models trained on chemist-annotated triplets.

    Building on this line of work, we constructed a paired evaluation set of
    4,820 generated molecules drawn from three families of generators
    (REINVENT, GraphAF, and a transformer-decoder baseline), each annotated
    by two of seven medicinal chemists for synthetic accessibility,
    lead-likeness, and overall preference between matched pairs.
    Inter-annotator agreement, measured as Krippendorff's alpha on the
    pairwise-preference task, was 0.61.

    Our scoring pipeline prompts a large pretrained chemistry-language model
    to act as a judge, supplying the SMILES of two candidate molecules and a
    target property profile and asking it to return a preferred molecule
    together with a one-paragraph rationale. We employ a position-swap
    protocol to control for ordering bias and an aggregation step over three
    judge calls per pair.

    On the held-out test split (964 pairs), the LLM-judge achieves 78.4%
    agreement with the majority chemist preference, compared with 61.2% for
    the QED+SAscore composite and 67.5% for a RandomForest model trained on
    Morgan fingerprints with the same chemist labels. Stratified by
    generator family, agreement remains within 3.5 points across the three
    sources, suggesting the judge is not biased toward any particular
    generator's stylistic conventions.

    A bias analysis indicates that swapping candidate order changes the
    verdict on 7.1% of pairs, well below the 19% reported for
    general-purpose judges in prior open-domain studies. We also observe a
    mild verbosity preference: molecules with longer SMILES strings are
    favored about 4 points above chance even when chemist labels disagree.

    In summary, this work contributes the first publicly released
    chemist-paired preference benchmark for de novo molecule generation
    together with an LLM-judge protocol that closes roughly half of the gap
    between filter-based scoring and expert preference, providing a
    deployable surrogate for the panel reviews that currently gate
    medicinal-chemistry program decisions.
