acceptable_outputs_summary: |
  Identifies that the two-part contribution (the chemist-paired
  preference benchmark and the LLM-judge protocol) is buried in the
  final paragraph and proposes a section-level reorder so the
  contribution is stated up front. Provides a concrete reordered
  structure such as contribution → related work → benchmark → protocol
  → results → bias analysis, and explains that the current order forces
  the reader through five paragraphs before learning what the paper
  delivers.

bad_outputs_summary: |
  Polishes the prose, questions the 0.61 inter-annotator agreement,
  asks for more chemist annotators, or suggests additional baselines
  beyond QED+SAscore and the Morgan-fingerprint RandomForest. Treats
  the closing summary paragraph as adequate framing and recommends
  only local edits, or pivots to debating whether SMILES length
  preference invalidates the headline 78.4% number, without addressing
  the structural placement of the contribution.

