artifact:
  source: synthetic
  domain: robotics
  word_count: 397
  text: |
    We present RoboChat, a communicative-agent framework for
    heterogeneous multi-robot teams that performs long-horizon
    manipulation tasks through natural-language coordination among
    role-playing agents. Our central contribution is a general-purpose
    protocol in which each robot embodies a specialized "role" prompt —
    a planner, a perceiver, a manipulator, a safety monitor — and the
    team negotiates a joint task decomposition through structured
    dialogue turns. We argue that this dialogue-based decomposition
    generalizes across embodiments and task families without any
    task-specific training, and is the principal scientific advance
    of this work.

    The framework instantiates each role as a prompted LLM agent
    sharing a natural-language blackboard that all agents read and
    write. A central orchestrator agent maintains the blackboard,
    arbitrates conflicting proposals between role agents, and issues
    the final action token to the corresponding robot driver at each
    control step. The orchestrator's arbitration policy is fixed by an
    inception prompt and is not learned from interaction data.

    To evaluate the framework, we deploy it on a dual-arm Franka
    platform performing tabletop pick-and-place. Role agents
    communicate over a fully decentralized peer-to-peer channel with
    no central coordinator: every agent broadcasts its proposal to
    every other agent, and the team reaches consensus when proposals
    stabilize across two consecutive rounds. We log consensus latency,
    message volume, and final task success for each episode.

    Across 240 trials spanning 12 object configurations, RoboChat
    reaches a 78% completion rate, with mean consensus latency of 1.4
    seconds and an average of 11 dialogue turns per task. We compare
    against a single-LLM monolithic-planner baseline and find that
    RoboChat matches the baseline's success rate while producing more
    inspectable plan traces.

    Beyond these aggregate metrics, our principal empirical contribution
    is a benchmark of 240 annotated dialogue traces, paired with
    executed trajectories and human-readable plan justifications. Each
    trace is labeled with the role agent that initiated each plan
    step, the proposing utterance, and the resulting blackboard state.
    We release this collection as RoboChatBench-1, intended to serve
    as a standard testbed for evaluating communicative-agent
    coordination on tabletop manipulation. We argue that the value of
    the present work is best understood as the dataset and evaluation
    harness it makes available to the community.
