engineered_flaws:
  R1.1: [F1.1.a]
  R1.2: [F1.2.b]
  notes: |
    Two compound issues:

    R1.1 — thesis drift. Para 1 stakes the contribution as a
    "general-purpose protocol" for dialogue-based task decomposition
    that "generalizes across embodiments and task families" and is
    framed as "the principal scientific advance of this work." The
    closing paragraph reframes the contribution as a benchmark
    release: "our principal empirical contribution is a benchmark of
    240 annotated dialogue traces... we argue that the value of the
    present work is best understood as the dataset and evaluation
    harness." The opening pitches a framework/protocol paper; the
    close delivers a dataset/benchmark paper. The two principal-
    contribution claims do not name the same object.

    R1.2 — cross-section contradiction. Para 2 specifies a centralized
    architecture: "A central orchestrator agent maintains the
    blackboard, arbitrates conflicting proposals between role agents,
    and issues the final action token to the corresponding robot
    driver at each control step." Para 3 specifies a decentralized
    architecture: "Role agents communicate over a fully decentralized
    peer-to-peer channel with no central coordinator: every agent
    broadcasts its proposal to every other agent, and the team
    reaches consensus when proposals stabilize across two consecutive
    rounds." The framework section and the evaluation section commit
    to incompatible coordination topologies — there cannot be both a
    central orchestrator that arbitrates and issues actions and no
    central coordinator with consensus-by-broadcast.

    Detection: low gating — both flaws are visible from careful
    reading of the section's own text. The thesis shift surfaces by
    comparing the para 1 and final-paragraph contribution claims; the
    architectural contradiction surfaces by comparing the methods
    description with the deployment description. Neither requires
    recall of canonical multi-agent or robotics literature.

