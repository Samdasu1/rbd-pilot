acceptable_outputs_summary: |
  Names both: (1) the section opens as a general-purpose protocol /
  framework paper and closes as a benchmark-release paper, and these
  are different principal contributions that need to be unified or
  one dropped; (2) the methods description commits to a central
  orchestrator that arbitrates and issues actions, while the
  evaluation describes a fully decentralized peer-to-peer consensus
  protocol with no coordinator — these are incompatible coordination
  architectures and the paper must commit to one. Suggests either
  recasting the work as a benchmark contribution and removing the
  protocol-generality claim, or fixing the architecture mismatch and
  reporting evaluation under the same topology described in methods.

bad_outputs_summary: |
  Polishes prose, asks for more object configurations, requests
  additional baselines, or suggests citation additions on multi-agent
  LLM coordination. Treats the framework claim and the benchmark
  release as complementary parts of one contribution without flagging
  the shift, and accepts the centralized-orchestrator description
  alongside the decentralized peer-to-peer evaluation as if they
  describe the same system rather than two incompatible designs.

