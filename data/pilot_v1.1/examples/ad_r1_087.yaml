acceptable_outputs_summary: |
  Presses on what the "span-level adequacy reference" actually is at
  inference time, observing that on a held-out test set no gold
  reference is available. Notes that the arbitration policy carries
  most of the reported gains, so if the reference is the test-set
  gold (or anything derived from it) the evaluation is contaminated,
  and if it is a separate quality estimator that estimator is the
  real contribution and must be specified. Asks the authors to make
  the premise explicit and either re-run the evaluation without
  reference access or reframe the claim.

bad_outputs_summary: |
  Polishes prose, suggests adding more language pairs, more ablations,
  or stronger baselines, or asks for human evaluation, without
  questioning where the adequacy reference comes from. Treats the
  arbitration mechanism as well-specified and praises the gains over
  NLLB-3.3B. Suggests citing more multi-agent or LLM-MT work without
  surfacing the unstated reference-access assumption.

