artifact:
  source: synthetic
  domain: machine_translation
  word_count: 388
  text: |
    We present TransCollab, a multi-agent collaborative framework for
    machine translation in which role-specialized LLM agents — a
    terminology agent, a fluency agent, and a discourse-coherence agent —
    iteratively refine a candidate translation through structured debate.
    Unlike monolithic encoder-decoder systems, TransCollab decomposes the
    translation task across specialists and aggregates their proposals
    through a learned arbitration policy that operates at the span level.

    The pipeline runs in three rounds. In round one, each agent
    independently produces a candidate translation conditioned on its
    role prompt and the source sentence. In round two, agents critique
    each other's candidates along their respective dimensions, producing
    structured feedback. In round three, an arbiter agent consumes the
    critiques and selects, for each sentence span, the highest-scoring
    proposal under a span-level quality score q(s). The final hypothesis
    is assembled by concatenating the winning spans.

    The arbitration policy is the central mechanism. For each candidate
    span, the arbiter computes q(s) as a weighted combination of three
    signals: terminological consistency, fluency, and adequacy. The
    adequacy signal is computed by comparing each candidate span against
    a span-level adequacy reference, allowing the arbiter to identify
    and discard candidates that drift in meaning. Spans that fail to
    clear the adequacy threshold are returned to the originating agent
    for a single revision pass; spans that clear it are committed to
    the output buffer.

    We evaluate TransCollab on WMT22 en→de, en→zh, and en→ru. Against
    a strong NLLB-3.3B baseline, TransCollab improves BLEU by 2.1, 1.8,
    and 2.4 points respectively, and improves COMET by 1.4, 1.1, and
    1.7. Ablating the arbitration policy reduces gains by roughly 70%,
    confirming that arbitration — not the multi-agent decomposition
    alone — drives most of the improvement. Ablating the
    discourse-coherence agent reduces gains by ≈25%; removing the
    terminology agent reduces gains by ≈40%. The terminology and
    arbitration components are therefore the load-bearing elements of
    the framework.

    Our results indicate that role specialization combined with
    span-level arbitration substantially closes the gap between
    LLM-based translation and dedicated NMT systems. Because the
    framework is model-agnostic, TransCollab can be instantiated with
    any sufficiently capable instruction-tuned backbone, and the
    arbitration policy generalizes across language pairs without
    retraining or pair-specific tuning.
