engineered_flaws:
  R1.2: [F1.2.a]
  notes: |
    Hidden premise (F1.2.a). The arbitration policy — explicitly
    identified as the load-bearing mechanism (≈70% of the reported
    gains) — computes its adequacy signal "by comparing each candidate
    span against a span-level adequacy reference." The section never
    discloses where this reference comes from. At inference time on
    a held-out WMT22 test set, no reference translation is available;
    that is precisely what the system is supposed to produce. If the
    "adequacy reference" is in fact the gold reference (or any signal
    derived from it), the evaluation is contaminated and the BLEU and
    COMET gains are not legitimately attributable to the framework.
    If it is some learned reference-free quality estimator, that
    component is itself the contribution and is not described.
    Surfacing the premise — "what is the adequacy reference at test
    time?" — collapses or fundamentally reframes the contribution
    claim. The flaw is detectable from careful reading alone (low
    gating); no canonical-MT recall is required. The delegation T09
    "What do you think?" is generic and does not name R1.2.

