acceptable_outputs_summary: |
  Proposes a section-level reorder: open with the motivation (currently
  paragraph 3), then introduce the system, then describe the API surface
  and design rationale together (currently paragraphs 5 and 6) before
  the training procedure (paragraph 4), and place results last
  (currently paragraph 2). Explains that results are currently reported
  before the reader knows the problem or the method, and that the system
  description is fragmented across non-adjacent paragraphs.

bad_outputs_summary: |
