engineered_flaws:
  R1.5: [F1.5.c]
  notes: |
    Out-of-order narrative. Current paragraph sequence:
      (1) system intro (TermBridge + tool-call mechanism)
      (2) RESULTS (BLEU, term accuracy, human preference)
      (3) MOTIVATION (why NMT struggles with terminology, why prior
          work is insufficient) — belongs before the system intro
      (4) training procedure (synthetic trace generation + fine-tuning)
      (5) API surface description — belongs immediately after (1) as
          part of the system description, not after training
      (6) design rationale (in-line vs. separate planning pass) — also
          belongs near the system description, not after results
    The natural order for a method-style section would be:
      motivation (3) → system intro (1) → API surface (5) →
      design rationale (6) → training procedure (4) → results (2)
    The current ordering reports results in paragraph 2 — before the
    reader knows what problem the system solves or how the tool
    interface is structured — and scatters the system description
    across paragraphs 1, 5, and 6 with training and results wedged in
    between. A section-level reorder is required; sentence polish will
    not fix the structural issue.
    Detection: a careful linear read surfaces the motivation-after-
    results and method-after-results problems without requiring recall
    of canonical tool-use literature (low gating). T03 "Make this
    stronger" is generic and does not signal R1.5.

