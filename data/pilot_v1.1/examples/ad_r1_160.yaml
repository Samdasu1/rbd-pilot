artifact:
  source: synthetic
  domain: machine_translation
  word_count: 322
  text: |
    We propose TermBridge, a neural machine translation system that
    learns to invoke external terminology and bilingual-dictionary APIs
    during decoding. The model is trained to insert special API-call
    tokens that pause generation, query a tool, and splice the returned
    string back into the target sequence before continuing.

    On WMT22 en-de biomedical and en-zh legal test sets, TermBridge
    improves BLEU by +2.1 and +1.7 respectively over a strong mBART
    baseline, and improves terminology-accuracy (exact-match on a
    held-out term list) from 61% to 88%. Human raters preferred
    TermBridge outputs in 64% of pairwise comparisons.

    Standard NMT systems struggle with low-frequency domain terminology:
    rare biomedical compounds, legal boilerplate, and named entities are
    routinely mistranslated even by large multilingual models. Prior work
    has addressed this with constrained decoding or post-editing, but
    these approaches require the term list to be specified at inference
    time and do not let the model decide when a lookup is warranted.

    Our training procedure first generates synthetic API-call traces by
    sampling candidate spans from a parallel corpus, querying the
    dictionary API for each, and keeping traces where the returned gloss
    improves the loss on the gold target. The annotated corpus is then
    used to fine-tune the base translation model with a standard
    next-token objective. We use a frozen mBART-50 as the base.

    The API surface exposed to the model consists of two endpoints: a
    bilingual dictionary lookup keyed on a source-language span, and a
    domain-terminology lookup keyed on a (span, domain) pair. Both
    return at most three candidate target strings.

    A central design choice is that API calls are emitted in-line during
    decoding rather than as a separate planning pass. This lets the
    model condition each call on partially generated target context,
    which we find essential for resolving morphological agreement in
    German and measure-word selection in Chinese.
