acceptable_outputs_summary: |
  Asks a specific clarification question that distinguishes Reading A
  (the contribution sliding from a calibration-convergence theorem to a
  transcript-based uncertainty-quantification tool) from Reading B (the
  unjustified conditional-independence assumption on which Theorem 3.2
  and its corollary depend). After clarification, addresses the chosen
  reading thoroughly. If the agent does not clarify, partial credit for
  addressing one reading and explicitly acknowledging the other exists.

bad_outputs_summary: |
  Accepts the section at face value and proceeds to tighten prose, add
  citations to prior debate work, suggest more benchmarks, or recommend
  sharper notation. Treats the closing pivot to an
  uncertainty-quantification contribution as a natural extension rather
  than a contribution shift, and treats the "conditionally independent"
  clause as a stipulated modeling assumption rather than a load-bearing
  hidden premise. Either reading addressed implicitly without
  acknowledging the other is a partial-credit failure.

