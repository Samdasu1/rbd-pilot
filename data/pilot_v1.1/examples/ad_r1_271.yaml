artifact:
  source: synthetic
  domain: theory_ann
  word_count: 355
  text: |
    Multiagent debate has emerged as a practical mechanism for improving
    the factuality of large language model outputs, but its theoretical
    foundations remain underdeveloped. We provide the first formal
    analysis showing that K-round debate strictly reduces expected
    calibration error relative to single-agent prompting under a fixed
    compute budget. Our central contribution is a convergence theorem
    (Theorem 3.2) establishing that under bounded disagreement, the
    debate posterior contracts to the Bayes-optimal estimator at rate
    O(1/sqrt(K)).

    We model an N-agent debate as a sequence of belief updates over a
    shared answer space Y. Each agent i maintains a posterior q_i(y|x)
    at round k and updates by conditioning on the other agents'
    broadcast claims. Let p*(y|x) denote the Bayes-optimal posterior
    given the union of agents' private evidence. Because agent errors
    are conditionally independent given the query x, the aggregated
    belief over rounds concentrates around p*: applying Hoeffding's
    inequality then yields the calibration-error bound in Theorem 3.2.

    A direct corollary of Theorem 3.2 is that the expected Brier score
    of the debate ensemble is bounded above by the single-agent Brier
    score for any K >= 1. We confirm this empirically on TriviaQA and
    MMLU subsets, where 3-round debate among Llama-3 8B agents reduces
    Brier score by 14-22% relative to a single-agent baseline at matched
    compute. The empirical curves track the theoretical 1/sqrt(K) rate
    to within 6% on TriviaQA across K in {1,...,8}.

    Beyond calibration, our analysis exposes a richer structure: the
    per-round disagreement statistic D_k = (1/N) sum_i KL(q_i^(k) ||
    qbar^(k)) admits a closed-form interpretation as the system's
    residual epistemic uncertainty. We argue that the most enduring
    contribution of this work is therefore a principled
    epistemic-uncertainty estimator for LLM ensembles — one that requires
    no fine-tuning, no held-out calibration set, and no access to model
    logits. Practitioners can read D_k off the debate transcript
    directly, and we show that D_k correlates with downstream answer
    correctness at rho=0.61 across our benchmarks. This positions
    multiagent debate not primarily as a factuality-improvement
    technique but as a foundation for transcript-based uncertainty
    quantification, with applications spanning selective prediction,
    active learning, and human-in-the-loop deployment.
  source_provenance: null

