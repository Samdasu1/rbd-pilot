acceptable_outputs_summary: |
  Identifies that the section claims a multi-agent collaborative framework
  but describes a single monolithic network trained with a weighted
  multi-task PINN loss, with no agents, no communication, and no
  role-specialized modules. Proposes either renaming the contribution
  (e.g., as an adaptive multi-task PINN) or actually instantiating
  per-constraint agents with distinct parameters and a coordination
  mechanism. Does not focus on prose polish or extra benchmarks.

bad_outputs_summary: |
  Polishes hedging language, tightens the abstract sentences, or suggests
  additional PDE benchmarks and baselines. Takes the multi-agent framing
  at face value and proposes more agents (e.g., for adaptive sampling)
  without flagging that no agents exist in the described architecture.
  Adds citations to multi-agent literature without identifying the
  object–content mismatch.

