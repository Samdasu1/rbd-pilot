engineered_flaws:
  R1.1: [F1.1.c]
  notes: |
    Conceptual object slip. Para 1 names the contribution "PhysiCollab, a
    multi-agent collaborative framework" with "specialized agents" handling
    different physical constraints. Para 2 then describes the actual
    algorithm: a single feedforward network u_θ trained by minimizing a
    weighted sum L = λ_pde·L_pde + λ_bc·L_bc + λ_data·L_data with Adam.
    There are no agents, no inter-agent communication, no role
    specialization, no collaborative protocol — only a standard
    multi-task PINN loss. The conceptual object claimed (multi-agent
    system) does not match the technical content (monolithic network with
    weighted loss). Para 4 doubles down on the framing ("each physical
    constraint as a distinct agent") even though nothing in the
    architecture realizes that abstraction. Detection requires only
    careful reading of the algorithm — no recall of canonical multi-agent
    or PINN literature is needed (low gating). The delegation T01
    "Improve this draft." is generic and does not signal R1.1.

