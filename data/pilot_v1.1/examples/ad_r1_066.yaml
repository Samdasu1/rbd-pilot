artifact:
  source: synthetic
  domain: physics_informed_ml
  word_count: 372
  text: |
    We introduce PhysiCollab, a multi-agent collaborative framework for solving
    parameterized partial differential equations (PDEs) with physics-informed
    neural networks (PINNs). Existing PINN approaches struggle with stiff
    multi-physics problems because a single network must simultaneously satisfy
    boundary conditions, PDE residuals, and observational data — gradients from
    these objectives often conflict during training. PhysiCollab addresses this
    by assigning specialized agents to different physical constraints, allowing
    collaborative resolution of competing objectives.

    The architecture consists of a single feedforward neural network u_θ(x, t)
    parameterized by θ, which maps spatial-temporal coordinates to the solution
    field. Training proceeds by minimizing a composite loss:

        L(θ) = λ_pde · L_pde(θ) + λ_bc · L_bc(θ) + λ_data · L_data(θ),

    where L_pde is the mean squared PDE residual evaluated at collocation
    points, L_bc is the boundary-condition mismatch, and L_data is the
    supervised loss on observed measurements. The weights λ are tuned via a
    learning-rate-annealing scheme adapted from Wang et al. (2021). At each
    training iteration, gradients from each loss term are computed, summed,
    and applied to update θ via Adam.

    We evaluated PhysiCollab on the 2D Burgers' equation and the Allen–Cahn
    equation. On Burgers (ν = 0.01), our method achieves an L2 relative error
    of 1.4e-3, compared to 3.2e-3 for the standard PINN baseline. On
    Allen–Cahn, we observe a 2.1× reduction in the boundary-condition
    residual at convergence. Ablating the PDE-residual term yields a 4×
    degradation, confirming that all three constraints are essential to the
    final accuracy.

    A key advantage of PhysiCollab is that it exploits the collaborative
    structure of the problem decomposition: by treating each physical
    constraint as a distinct agent contributing to the joint objective, we
    avoid the gradient pathologies that plague monolithic PINNs. We argue
    that this multi-agent perspective generalizes naturally to other
    coupled-physics settings, including fluid–structure interaction and
    reactive flow, where multiple governing equations must be jointly
    satisfied. In Section 5, we discuss extensions where additional agents
    handle uncertainty quantification and domain decomposition over
    overlapping subregions of the spatial domain.
