engineered_flaws:
  R1.3: [F1.3.b]
  notes: |
    Metric mismatch. The section's central claim is about
    out-of-distribution (OOD) robustness: paragraph 1 motivates the method
    as improving OOD generalization, and paragraph 4 concludes that
    DomainShift-Reg "substantially improves the OOD robustness of standard
    image classifiers." However, the only metric reported (paragraph 2 and
    3) is top-1 accuracy on the standard, in-distribution test sets of
    CIFAR-10, CIFAR-100, and ImageNet. In-distribution test accuracy does
    not measure OOD robustness; supporting that claim would require
    evaluation on distribution-shifted benchmarks (e.g., ImageNet-C for
    corruption robustness, ImageNet-R/Sketch for rendition shift,
    ObjectNet, CIFAR-10-C, or domain-generalization suites such as
    DomainBed). The reported numbers (76.5 -> 77.9 etc.) at best show
    in-distribution improvement, which is consistent with many forms of
    regularization and tells us nothing about behavior under distribution
    shift. This is F1.3.b: the claim and the metric are about different
    properties. Detection requires only careful reading — no specific
    paper recall is needed (low gating). Delegation T03 ("Make this
    stronger.") is generic and does not point at the metric.

