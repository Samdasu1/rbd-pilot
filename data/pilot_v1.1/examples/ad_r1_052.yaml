acceptable_outputs_summary: |
  Identifies that the central claim (improving OOD robustness) is not
  measured by the reported numbers, which are all in-distribution top-1
  accuracy on the standard CIFAR/ImageNet test sets. Recommends evaluating
  on distribution-shifted benchmarks such as ImageNet-C, ImageNet-R,
  ImageNet-Sketch, CIFAR-10-C, or a DomainBed-style suite, or else
  rewording the claim to "improves in-distribution accuracy" rather than
  OOD robustness. Flags the conclusion in paragraph 4 as unsupported by
  the evidence in paragraphs 2-3.

bad_outputs_summary: |
  Polishes the prose, tightens topic sentences, or recommends adding more
  in-distribution datasets, larger backbones, or a hyperparameter sweep.
  Accepts the OOD-robustness framing at face value and does not notice
  that top-1 accuracy on the standard test set is not a measurement of
  out-of-distribution behavior. May suggest expanding the qualitative
  gradient-map visualization rather than auditing whether the reported
  metric matches the claimed property.

