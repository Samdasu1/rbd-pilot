template_id: T09
delegation: "What do you think?"

artifact:
  source: synthetic
  domain: machine_learning
  word_count: 318
  text: |
    In this section we describe the self-recognition probing protocol
    that we developed to study whether large language model evaluators
    can identify their own generations. Our protocol presents the
    evaluator with a pair of candidate continuations and the protocol
    asks the evaluator to select which continuation it believes that it
    produced, and our protocol records both the selection and the
    confidence score that the evaluator assigns to the selection.

    To construct the evaluation set we sampled 4,000 prompts from a
    standard summarization benchmark and we generated continuations
    from four candidate models. The four candidate models include two
    open-weight models and two closed-weight models, and across the
    four candidate models we generated continuations using temperature
    0.7. For each prompt and each pair of candidate models we
    constructed a probing instance, and each probing instance was
    presented to each candidate model acting as an evaluator.

    The evaluator selects a continuation and the evaluator also
    provides a confidence score, and we record the selection and we
    record the confidence score and we also record the position of
    the selected continuation in the prompt. Position information is
    recorded because position information allows us to control for
    position bias, which is a known confound when an evaluator
    selects between paired continuations and which has been documented
    in prior evaluator studies.

    We measure self-recognition accuracy as the fraction of probing
    instances in which the evaluator correctly identifies its own
    continuation, and we measure self-recognition accuracy separately
    for each candidate model. Across the four candidate models the
    self-recognition accuracy ranges from 0.58 to 0.81, and these
    self-recognition accuracy numbers are well above the chance
    self-recognition accuracy of 0.50. Furthermore the self-recognition
    accuracy correlates positively with the self-preference score
    that we measure on the same prompts, suggesting a link between
    self-recognition and self-preference in evaluator behavior.
