artifact:
  source: synthetic
  domain: anomaly_detection
  word_count: 351
  text: |
    Industrial system telemetry produces millions of log lines per
    day, the vast majority of which are routine operational events.
    Identifying the rare windows that indicate genuine faults —
    without burying operators in false alarms — is the central
    challenge of log-based anomaly detection. We introduce SCRAD
    (Self-Critiquing Reasoning Anomaly Detector), a framework in
    which a single large language model classifies fixed-width log
    windows as anomalous or benign, generates a free-text
    justification for each classification, and then critiques its own
    justification before issuing a final decision or abstaining. To
    our knowledge, this is the first application of self-critique
    abstention to log-based anomaly detection, and it represents a
    clear departure from prior work, which has focused exclusively on
    supervised classifiers trained on labeled trace corpora.

    The SCRAD pipeline operates in a strictly zero-shot regime: the
    model receives only a system-prompt description of the target
    deployment and the candidate window, with no labeled
    normal/anomalous examples at any stage. This design choice is
    motivated by the observation that ground-truth anomaly labels are
    scarce and noisy in production environments. The critic stage
    rereads the generator's justification and flags hallucinated
    event types, unsupported temporal claims, and inconsistencies
    with the window's actual content; the model abstains when the
    critic disagrees with the generator on the final label.

    We evaluate against two baselines: a frequency-based PCA detector
    and a log template classifier. SCRAD reduces the false-alarm rate
    at fixed recall by 38% on the BGL dataset. A central design
    element is the few-shot retrieval module: at inference time the
    system retrieves the five nearest historical windows from a
    curated incident database and includes their labels as in-context
    examples for the generator, which we find is responsible for
    roughly two-thirds of the headline false-alarm reduction.

    The abstention rate stabilizes near 11% across all three
    benchmarks, which we interpret as the model's calibrated estimate
    of windows where the available evidence is genuinely insufficient
    for a confident decision. We discuss prompt-template ablations
    and critic-temperature sweeps in §5.
