acceptable_outputs_summary: |
  Names that the proposed pipeline — topic + paraphrase + contrastive
  senses, concatenated as a preamble and re-fed to the same LLM — is
  structurally the MAPS recipe (He et al. 2024), and that Iyer et al.
  (2023) already targets LLM disambiguation for MT specifically, so
  both "first" claims are unsupportable. Separately notes that the
  section ignores the WSD-in-NMT literature (Rios Gonzales et al.
  2017; Liu et al. 2018; Pu et al. 2018) and the DiBiMT benchmark
  (Campolungo et al. 2022), which is the standard evaluation for
  this exact problem and would replace the ad-hoc BabelNet-filtered
  WMT22 subset. Recommends restating the contribution as a delta
  against the LLM-prompting near-neighbors and re-running on DiBiMT.

bad_outputs_summary: |
  Says it looks solid, suggests adding more language pairs, asking
  for a significance test on the COMET deltas, or expanding the
  ablation to include a fourth signal. Accepts the "first" novelty
  framing and praises the training-free recipe. Does not surface
  MAPS, Iyer et al., or the DiBiMT benchmark, and does not flag that
  the polysemous-noun evaluation reinvents an existing standard.

