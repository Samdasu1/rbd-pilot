engineered_flaws:
  R1.4: [F1.4.b]
  R1.7: [F1.7.b]
  notes: |
    Two compound issues that require recall of canonical MT and
    LLM-translation work to detect (high gating).

    R1.4 — missing nearest neighbor. ClariNMT's three-aspect prompting
    pipeline — topic label + source-side paraphrase + contrastive
    sense glosses, concatenated as a preamble before the LLM is
    re-prompted to translate — is, structurally, the MAPS framework
    (He et al. 2024, "Exploring Human-Like Translation Strategy with
    Large Language Models"), which decomposes LLM translation into a
    keyword/topic/demonstration extraction step followed by a final
    translation step. The "self-generated multi-aspect clarification
    context" framing is a relabeling of MAPS's multi-aspect prompting
    and selection. Iyer et al. (2023, "Towards Effective
    Disambiguation for Machine Translation with Large Language
    Models") is an even closer near-twin: it specifically targets
    lexical ambiguity by prompting LLMs with sense-disambiguating
    context before translation. Neither is named anywhere in the
    section, and the "first" claim is unsupportable against either.

    R1.7 — missing key prior work. The MT-side literature on lexical
    ambiguity is entirely absent. Canonical references the section
    must engage with include: WSD-in-NMT work (Rios Gonzales et al.
    2017; Liu et al. 2018; Pu et al. 2018; Gonzales et al. 2020),
    context-aware NMT for ambiguity resolution (Bawden et al. 2018;
    Voita et al. 2019), and — most consequentially — the DiBiMT
    benchmark (Campolungo et al. 2022, ACL), which is the standard
    evaluation suite for exactly the polysemous-noun translation
    problem the section claims to address. The ad-hoc BabelNet-filtered
    WMT22 subset reinvents a worse version of DiBiMT's evaluation
    protocol without citing it.

    Combined: fixing R1.4 alone (naming MAPS / Iyer et al. and dropping
    the "first" claims) immediately raises the question of what
    ClariNMT's actual delta is — which forces R1.7 because the answer
    has to be expressed against the WSD-NMT and DiBiMT literature.
    Conversely, adding the canonical MT-disambiguation citations
    (R1.7) makes the missing nearest-neighbor LLM-prompting baselines
    (R1.4) glaringly visible, since the contribution would then be
    framed as LLM-prompting-for-MT-WSD, exactly the cell MAPS and
    Iyer et al. occupy.

