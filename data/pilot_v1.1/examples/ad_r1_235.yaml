artifact:
  source: synthetic
  domain: machine_translation
  word_count: 384
  text: |
    We introduce ClariNMT, a translation framework that addresses
    lexical ambiguity in source queries by augmenting LLM-based
    translation with self-generated disambiguation context.
    Real-world translation queries — particularly in conversational
    and search settings — frequently contain polysemous tokens whose
    target rendering depends on user intent. Standard zero-shot LLM
    translation provides no mechanism for surfacing this intent,
    leading to systematically degraded output on ambiguous inputs.

    ClariNMT operates in two stages. Given a source segment x, the
    LLM is first prompted to produce three auxiliary signals: (i) a
    topic label characterizing the broader domain of x, (ii) a
    paraphrase of x in the source language, and (iii) for each
    candidate ambiguous noun, a pair of contrastive sense-glosses.
    These signals are concatenated with x as a clarification preamble,
    and the same LLM is then prompted to produce the final translation
    conditioned on the expanded context. The procedure introduces no
    parameter updates and runs entirely at inference time.

    We evaluate ClariNMT on a polysemy-stratified subset of WMT22
    zh-en and en-de, constructed by filtering source segments that
    contain at least one noun with three or more sense entries in
    BabelNet. As baselines we compare against zero-shot GPT-3.5 with
    a standard translation prompt and the supervised NLLB-200-3.3B
    model. ClariNMT improves COMET-22 by 1.8 points on zh-en and 1.4
    points on en-de over the GPT-3.5 baseline, and matches NLLB-200
    within 0.3 COMET on the same subset despite using no MT-specific
    supervision. Human evaluation on 200 segments shows a preference
    rate of 62% for ClariNMT over the zero-shot baseline.

    To our knowledge, ClariNMT is the first translation framework to
    use self-generated multi-aspect clarification context for
    resolving lexical ambiguity in LLM translation, and the first to
    demonstrate that prompting an LLM to externalize candidate senses
    before decoding yields measurable gains on polysemous input. The
    ablation in Table 2 shows that the paraphrase signal contributes
    the largest individual gain, followed by the contrastive
    sense-glosses, with the topic label providing a smaller residual
    improvement. We position ClariNMT as a lightweight, training-free
    recipe for deploying LLM translation in ambiguity-sensitive
    settings such as conversational assistants and multilingual
    search.
  source_provenance: null

