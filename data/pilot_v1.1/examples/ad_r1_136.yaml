acceptable_outputs_summary: |
  Identifies that the proposed CONSENSUS-V2G method is essentially
  sample-average-approximation / scenario-based stochastic programming with
  a plurality aggregation tweak, and names at least one canonical nearest
  neighbor the section must contrast against (SAA, progressive hedging, or
  the established V2G stochastic-bidding line such as Vagropoulos &
  Bakirtzis or Bessa). Suggests reframing the contribution as a defensible
  delta — e.g., the plurality aggregation rule itself — rather than as a
  first-of-kind sampling-and-aggregation method.

bad_outputs_summary: |
  Treats the K-sample-and-aggregate framing as genuinely new, polishes
  prose, suggests more datasets or larger K sweeps, or asks for a battery
  degradation ablation. Praises the parallelizability and the Pareto
  dominance result without questioning whether the method is already a
  named technique in the V2G stochastic-programming literature.

