artifact:
  source: synthetic
  domain: power_systems_v2g
  word_count: 326
  text: |
    We address day-ahead bidding for aggregated V2G fleets (5,000-50,000 EVs)
    under uncertain locational marginal prices and uncertain plug-in
    availability. Deterministic MILP dispatch produces brittle commitments
    that violate state-of-charge envelopes when realized prices diverge from
    the point forecast, and adding box-uncertainty robust constraints
    sacrifices roughly 8-12% of revenue on backtests we ran against ERCOT
    2023 settlement data.

    We propose CONSENSUS-V2G, the first aggregator-scale dispatch method to
    draw K independent samples from the joint price-availability
    distribution, solve a per-sample dispatch MILP in parallel, and combine
    the K candidate schedules via a power-weighted plurality rule into a
    single committed bid curve. The intuition is that intervals where the
    candidate schedules disagree carry low decision-confidence and can be
    safely averaged toward the fleet midpoint, while intervals where
    candidates agree reinforce a high-confidence commitment. The aggregation
    step is closed-form and its cost is dominated by the per-sample solve,
    which parallelizes trivially on commodity hardware.

    Evaluated on a 12,000-vehicle synthetic aggregator calibrated to ERCOT
    2023, CONSENSUS-V2G with K=64 improves expected revenue by 6.4% over
    deterministic MILP and reduces CVaR-95 of imbalance penalties by 11.2%
    over a Bertsimas-Sim robust baseline. As K grows from 8 to 256 the
    bid Pareto-dominates the single-scenario solution along the
    (expected_revenue, CVaR_loss) frontier, and the marginal benefit
    saturates near K=128. Battery degradation cost, modeled with a
    rainflow-counting throughput penalty, increases by less than 0.4%
    relative to the deterministic baseline.

    We position CONSENSUS-V2G as a new operating point in the V2G dispatch
    design space: it captures scenario diversity without the heavy
    machinery of full joint scenario-tree solution, and it produces a
    single, market-submittable bid rather than a recourse policy that must
    be re-solved intraday. We expect plurality-style aggregation to become
    standard for aggregator-scale V2G as fleet sizes outgrow the
    computational budget of monolithic stochastic programs.
  source_provenance: null

