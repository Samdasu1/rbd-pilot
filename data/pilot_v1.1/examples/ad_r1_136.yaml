engineered_flaws:
  R1.4: [F1.4.b]
  notes: |
    Missing nearest neighbor. The "first aggregator-scale dispatch method to
    draw K independent samples from the joint distribution, solve per-sample
    in parallel, and combine into a single committed bid" is a textbook
    description of sample-average-approximation (SAA) for two-stage
    stochastic programs (Shapiro 2003; Kleywegt, Shapiro, Homem-de-Mello
    2002), and progressive-hedging-style scenario decomposition (Rockafellar
    & Wets 1991) — both of which have been directly applied to V2G
    aggregator bidding (e.g., Vagropoulos & Bakirtzis 2013 on stochastic V2G
    bidding into day-ahead markets; Bessa & Matos on probabilistic EV
    aggregator offers; Sarker, Ortega-Vazquez, Kirschen on stochastic V2G
    reserve provision). The "power-weighted plurality" aggregation is a
    minor heuristic substitution for the standard non-anticipativity-relaxed
    solution averaging used in progressive hedging. The conceptual object is
    well-defined and the experiments are clean — only the novelty
    positioning is broken, and detecting it requires domain recall of the
    V2G stochastic-programming literature (high gating). The delegation
    "Take a look at this paragraph" (T06) is maximally generic and does not
    signal R1.4.

