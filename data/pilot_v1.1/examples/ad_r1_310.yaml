engineered_flaws:
  R1.4: [F1.4.b, F1.4.c]
  notes: |
    Control case for R1.4: the delegation "Position this against prior
    work" overtly cues the related-work / positioning dim, and the
    artifact's flaws live in that same dim.

    F1.4.b (missing nearest neighbor): the section defines its own
    contribution as a "runtime for serving long-horizon LM agents" and
    then surveys only adjacent categories — generic LM inference
    servers, generic workflow engines, generic RPC meshes. It never
    compares against any other system built specifically for LM-agent
    serving, despite that being the exact category the contribution
    claims to occupy. The closing "no prior system has been built
    around this scheduling unit" is therefore unsupported by the
    survey actually conducted. The omission is detectable from the
    text alone — the contribution paragraph and the related-work
    paragraphs are about different categories — without needing to
    recall any specific named system.

    F1.4.c (rhetorical delta): differentiation is asserted with
    rhetorical phrases ("fundamentally different", "departs sharply
    from this paradigm", "we therefore differ from this line as
    well") that do not name a concrete mechanism, metric, or
    interface by which AgentFlow differs. The "differs because
    workloads exhibit a request structure batch engines were not
    designed to handle" sentence is circular: it asserts the delta
    instead of locating it.

