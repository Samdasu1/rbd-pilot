delegation_id: ad_r1_310
template_id: T05
delegation: "Position this against prior work."

artifact:
  source: synthetic
  domain: systems
  word_count: 318
  text: |
    AgentFlow is a runtime for serving long-horizon language-model agents
    that interleave model invocations with external tool calls,
    environment observations, and intermediate scratchpad state. We
    position our contribution against three lines of prior work.

    LM serving systems. A first body of work targets high-throughput
    inference for stateless LLM requests. Continuous-batching schedulers
    and paged KV-cache managers have driven order-of-magnitude throughput
    gains for chat-style workloads in which each request is a single
    forward pass over a prompt and a short generation. AgentFlow is
    fundamentally different from these systems, because agent workloads
    exhibit a request structure that batch-inference engines were not
    designed to handle.

    Workflow orchestration. A second body of work concerns general-
    purpose workflow engines: DAG schedulers, durable-execution
    frameworks, and serverless step functions. These systems provide
    retries, persistence, and operator composition, but they assume that
    step durations are dominated by I/O rather than by GPU compute, and
    that step graphs are statically declared rather than emitted by a
    model at runtime. Our scheduler departs sharply from this paradigm.

    RPC and microservice runtimes. Finally, gRPC-style frameworks and
    service meshes manage chains of synchronous service calls. While
    agent execution superficially resembles a chain of RPCs
    (model -> tool -> model -> tool), the call graph is determined by
    model output rather than declared in an IDL, and the latency tail is
    dominated by token generation rather than by network. We therefore
    differ from this line as well.

    Taken together, AgentFlow occupies a previously unaddressed point in
    the design space: a runtime whose unit of scheduling is the
    (reasoning-step, tool-call) pair, and whose state model treats agent
    trajectories as first-class objects with explicit lifecycle,
    checkpointing, and admission control. To our knowledge, no prior
    system has been built around this scheduling unit.
  source_provenance: null

