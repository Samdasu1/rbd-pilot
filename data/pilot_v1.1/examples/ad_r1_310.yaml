acceptable_outputs_summary: |
  Flags that the section reviews adjacent categories (generic LM
  serving, generic workflow engines, RPC) but omits the obvious
  category the contribution itself defines — other runtimes built
  specifically for LM-agent serving — and that the closing
  "previously unaddressed point" claim cannot stand on the survey as
  written. Also flags the rhetorical, mechanism-free differentiation
  ("fundamentally different", "departs sharply") and asks for a
  concrete axis of contrast (scheduling unit, state model, interface)
  for each adjacent line.

bad_outputs_summary: |
