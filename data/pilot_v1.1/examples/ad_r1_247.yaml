engineered_flaws:
  R1.5: [F1.5.a]
  R1.6: [F1.6.c]
  notes: |
    Two interacting flaws.

    R1.5 — buried contribution. The section's load-bearing claim is the
    proposal of SelectiveQuad and, more specifically, its conceptual
    move: separating truncation uncertainty from conditioning uncertainty
    via an interval-arithmetic forward-error bound, and abstaining when
    conditioning dominates. This claim does not appear until paragraph 4
    of 5. The first three paragraphs are background on adaptive
    quadrature, background on the Gauss-Kronrod estimator, and motivating
    examples — none of which announce that a new method is being
    proposed. Worse, paragraph 3 forward-references "Section 4" for
    convergence results before the contribution itself has been stated,
    so a reader skimming the section opening cannot tell what is being
    contributed versus surveyed. The natural ordering for a numerical
    analysis methods section is: contribution claim → key conceptual
    move (selective abstention via interval arithmetic) → motivating
    failure mode of the standard estimator → experimental setup, with
    background folded into a brief preliminaries paragraph.

    R1.6 — mechanical repetition. Paragraph 1 opens three consecutive
    sentences with "Adaptive quadrature methods". Paragraph 2 opens four
    consecutive sentences with "The standard error estimator".
    Paragraph 5 opens three consecutive sentences with "We report".
    The repetitions are not stylistic anaphora supporting an argument;
    they are mechanical sentence-starters that suggest the prose was
    drafted as bullet points and only superficially joined.

    Detection: both issues are visible from careful reading. The buried
    contribution is detectable structurally (paragraph 4-of-5 placement,
    forward reference before the claim). The repetition is detectable
    on the sentence surface. No canonical-citation knowledge is required.

    T09 "What do you think?" is maximally generic and does not hint at
    structure or prose.

