artifact:
  source: synthetic
  domain: numerical_analysis
  word_count: 332
  text: |
    Adaptive quadrature methods estimate the integral of a function over
    a bounded domain by recursively subdividing the interval and applying
    a base rule on each subinterval. Adaptive quadrature methods rely on
    local error estimators to decide whether to accept a subinterval's
    contribution or to subdivide further. Adaptive quadrature methods,
    including the well-known QUADPACK routines, have been studied
    extensively since the 1970s and remain the workhorse of scientific
    computing libraries.

    The standard error estimator compares two quadrature rules of
    differing degree, such as a 7-point Gauss rule against a 15-point
    Kronrod extension. The standard error estimator returns the absolute
    difference between the two rules as a proxy for truncation error.
    The standard error estimator implicitly assumes that the integrand
    is well-conditioned with respect to floating-point evaluation. The
    standard error estimator can be misleading when this assumption
    fails — for instance, near integrable singularities, or when the
    integrand involves catastrophic cancellation.

    We consider integrands of the form f(x) = g(x) - h(x) where g and h
    take similar magnitudes on portions of the domain, leading to
    substantial cancellation in finite-precision arithmetic. On such
    integrands, the Gauss-Kronrod estimator can return a small difference
    even when both rules suffer from similar floating-point error, giving
    the false impression that the subinterval has converged. We tabulate
    three representative integrands of this kind in Section 4 and report
    convergence behavior at several tolerance levels.

    We propose SelectiveQuad, an adaptive quadrature scheme that
    distinguishes truncation uncertainty from conditioning uncertainty by
    combining the standard Gauss-Kronrod difference with a forward-error
    bound derived from interval arithmetic on each subinterval, and that
    abstains — returning a NaN-tagged result for the subinterval — when
    the conditioning component dominates the truncation component beyond
    a user-set ratio.

    We report on three test integrands at tolerances 1e-6, 1e-9, and
    1e-12. We report runtime overhead relative to QUADPACK's dqag. We
    report the fraction of subintervals at which SelectiveQuad abstains
    rather than returning a numerical value. The implementation is
    available as a small C library with Python bindings.
