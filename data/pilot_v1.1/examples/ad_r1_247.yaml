acceptable_outputs_summary: |
  Names both load-bearing issues. For the structural issue, observes
  that the actual proposal is buried in paragraph 4 behind two
  paragraphs of background and a motivating-examples paragraph, and
  proposes a reorder in which the SelectiveQuad proposal and its
  separation of truncation versus conditioning uncertainty is announced
  near the section opening, with background reduced to a brief
  preliminaries pass and the failure-mode discussion repositioned as
  motivation for the abstention rule. For the prose issue, flags the
  three runs of sentence-initial repetition ("Adaptive quadrature
  methods", "The standard error estimator", "We report") and rewrites
  at least one paragraph to break the mechanical pattern.

bad_outputs_summary: |
  Polishes individual sentences or tightens definitions without moving
  the contribution claim earlier in the section. Suggests adding more
  test integrands, a complexity analysis, or a comparison to Romberg
  integration. Treats the parallel sentence openings as deliberate
  emphasis and leaves them in place. Addresses only one of the two
  issues — e.g., reorders paragraphs but keeps the repetitive openings,
  or rewrites the openings while leaving the contribution buried in
  paragraph 4.

