delegation: "What do you think?"

artifact:
  source: synthetic
  domain: battery_bms
  word_count: 308
  text: |
    We propose CycleSenseNet, a chemistry-agnostic, model-free deep
    learning framework for online state-of-health (SoH) estimation in
    lithium-ion battery management systems. Unlike conventional
    approaches that require either a fitted equivalent-circuit model or
    a physics-based electrochemical model, CycleSenseNet operates
    directly on raw current, voltage, and temperature telemetry
    sampled by the BMS during normal operation, eliminating the need
    for chemistry-specific calibration or pack-level parameter
    identification.

    The architecture consists of a temporal convolutional encoder
    followed by a self-attention decoder that maps a 30-minute window
    of (I, V, T) samples to an estimated capacity-fade value. We train
    on a mixed-cell corpus drawn from the NASA, CALCE, and Oxford
    datasets, spanning NMC, LCO, and LFP chemistries, and demonstrate
    transfer to held-out cell types without retraining the encoder.

    To extract physically meaningful features prior to attention, the
    encoder computes incremental capacity (dQ/dV) curves over the
    constant-current charging segment of each cycle. The locations and
    magnitudes of the two principal IC peaks — corresponding to the
    staging transitions in the graphite anode at roughly 3.42 V and
    3.58 V — are passed as auxiliary tokens to the attention layer.
    We find that the height of the peak near 3.42 V provides the
    strongest single-feature correlation with capacity fade across all
    three datasets.

    We compare against the extended Kalman-filter baseline of Plett
    (2004), the Gaussian-process regression approach of Richardson et
    al. (2017), and a bidirectional LSTM. CycleSenseNet outperforms
    all three on RMSE of estimated SoH (1.8% vs 3.4%, 2.9%, and 2.5%
    respectively), with the largest gains observed on the LFP subset.

    A key advantage of CycleSenseNet is its applicability across
    chemistries without parameter retuning, which we attribute to the
    attention layer's ability to weight chemistry-relevant features
    adaptively. This generality makes the framework suitable for
    fleet-scale deployment where pack-level cell chemistry varies.
