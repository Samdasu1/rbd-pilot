engineered_flaws:
  R1.2: [F1.2.b]
  notes: |
    Cross-section contradiction. Paragraphs 1 and 5 frame the
    contribution as chemistry-agnostic, requiring no chemistry-specific
    calibration and transferable across NMC/LCO/LFP without retraining.
    Paragraph 3, however, anchors the input features to the two IC
    (dQ/dV) peaks at roughly 3.42 V and 3.58 V, which correspond to
    graphite-anode staging transitions visible in NMC- and LCO-style
    OCV profiles but are essentially absent or strongly suppressed in
    LFP cells, whose discharge curve is famously flat (dV/dQ ≈ 0 over
    most of the SoC range, hence dQ/dV is dominated by noise rather
    than discrete peaks). Paragraph 4 then deepens the contradiction
    by reporting the *largest* gains on the LFP subset — precisely the
    chemistry where the chosen feature primitive is least informative.
    The contribution claim ("chemistry-agnostic, transfers without
    retraining") and the technical machinery ("anode-staging IC peaks
    at NMC/LCO-typical voltages") cannot both stand. Detection requires
    moderate domain knowledge: the reader must recall that LFP has a
    flat OCV and lacks the graphite-staging IC signature at 3.42 V /
    3.58 V seen in layered-oxide chemistries. A purely careful prose
    reading without that recall might miss the inconsistency.
    Delegation T09 ("What do you think?") is fully generic and does
    not point at any dim.

