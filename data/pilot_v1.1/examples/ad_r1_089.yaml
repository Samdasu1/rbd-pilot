acceptable_outputs_summary: |
  Flags the inconsistency between the chemistry-agnostic contribution
  framing and the reliance on graphite-staging IC peaks at voltages
  characteristic of layered-oxide chemistries, noting that LFP's flat
  OCV makes those features weak or absent and therefore the reported
  largest-gain-on-LFP result is implausible under the stated method.
  Suggests resolving by either narrowing the claim to NMC/LCO-class
  chemistries, replacing the IC-peak feature with a chemistry-neutral
  primitive, or explaining how the model recovers signal on LFP
  without those peaks.

bad_outputs_summary: |
  Polishes prose, suggests adding ablations, more baselines, or
  uncertainty quantification, or asks for additional cycling
  datasets, while treating the chemistry-agnostic claim and the
  IC-peak feature design as compatible. Praises the cross-chemistry
  transfer result without questioning how peak-based features could
  drive the largest gains on LFP cells.

