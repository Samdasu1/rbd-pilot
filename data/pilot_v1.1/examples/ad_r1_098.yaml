engineered_flaws:
  R1.2: [F1.2.b]    # cross-section contradiction
  notes: |
    Paragraph 1 (and reaffirmed in paragraph 4) claims MA-IMEX is
    "unconditionally A-stable across the full range of stiffness
    ratios." Paragraph 3 then derives a stability condition of the
    form h|λ| ≤ 2 on the linear test problem, and explicitly notes a
    "step-size restriction proportional to the inverse spectral
    radius of the stiff operator" beyond that regime. By definition,
    A-stability requires |R(z)| ≤ 1 for all z with Re(z) ≤ 0,
    independent of h; a bound of the form h|λ| ≤ 2 is exactly the
    conditional-stability profile of an explicit scheme and
    contradicts the unconditional-A-stability claim. The contribution
    framing in paragraphs 1 and 4 and the analysis in paragraph 3
    cannot both be correct. Moderate gating: the reader needs to
    recall the definition of A-stability (Dahlquist) and recognize
    that any finite step-size bound on the linear test problem
    invalidates the claim. Other elements (problem framing, proof of
    local order, evaluation setup) are internally consistent.

