artifact:
  source: synthetic
  domain: numerical_analysis
  word_count: 358
  text: |
    We present MA-IMEX, a communicative multi-agent framework for
    implicit-explicit time integration of stiff initial-value problems
    arising from semi-discretized partial differential equations. In
    MA-IMEX, three cooperative agents — a stiff-component handler, a
    non-stiff-component handler, and a coordinator — exchange residual
    estimates at each step to determine the partition between implicit
    and explicit treatment. Unlike fixed-splitting IMEX schemes, MA-IMEX
    adapts the partition online and is unconditionally A-stable across
    the full range of stiffness ratios encountered in convection-
    diffusion-reaction systems.

    The scheme proceeds in three phases per step. The stiff-component
    agent performs an SDIRK update on the partition it currently owns,
    producing a provisional state. The non-stiff agent advances its
    partition with a third-order explicit Runge-Kutta step on the same
    provisional state. The coordinator then reconciles the two updates
    by applying a corrector that minimizes the residual of the full
    discretized operator. We prove that this three-agent protocol
    achieves order O(h^3) per step under the standard regularity
    assumptions on f.

    The stability analysis proceeds by examining the amplification
    factor of the coordinator's corrector applied to Dahlquist's linear
    test problem y' = λy. For Re(λ) ≤ 0, the amplification factor
    satisfies |R(z)| ≤ 1 provided h|λ| ≤ 2, which establishes stability
    across the relevant stiffness range. Beyond this regime, the
    explicit agent's update dominates and the scheme reverts to
    standard ERK behavior with a step-size restriction proportional
    to the inverse spectral radius of the stiff operator.

    Our evaluation considers three benchmark problems: the Brusselator,
    a 2D advection-diffusion system with stiff reaction, and the
    Allen-Cahn equation with sharp interfaces. On each problem,
    MA-IMEX achieves 4-7x speedup over fixed-splitting ARK4 at matched
    accuracy, while preserving the unconditional-stability guarantee
    that motivates using IMEX methods on truly stiff systems. The
    communicative-agent design generalizes naturally to higher-
    dimensional partitions and to operator-split formulations of
    multi-physics problems, and we view it as a step toward
    cooperative numerical methods in which subroutines exchange
    state rather than execute a fixed pipeline.
