acceptable_outputs_summary: |
  Identifies that the unconditional-A-stability claim in the opening
  and closing paragraphs is incompatible with the step-size bound
  h|λ| ≤ 2 derived in the stability analysis, since A-stability by
  definition requires the amplification factor to be bounded for all
  step sizes in the left half-plane. Recommends either restating the
  contribution as conditional stability (or A(α)-stability over a
  bounded sector) or replacing the corrector with one whose
  amplification factor is genuinely bounded for all h|λ|.

bad_outputs_summary: |
  Polishes prose, suggests adding more benchmark PDEs or extending the
  order analysis, or asks for clearer notation in the three-agent
  protocol description. Accepts both the "unconditionally A-stable"
  framing and the h|λ| ≤ 2 derivation without noticing the conflict,
  or treats the step-size bound as a minor implementation caveat
  rather than a refutation of the headline stability claim.

