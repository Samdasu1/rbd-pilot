acceptable_outputs_summary: |
  Notices that the post-fine-tuning self-preference rate (49.3%) is
  lower than the pre-fine-tuning rate (62.1%) and in fact dips below
  chance, so the within-model intervention shows recognition gains
  coincide with a DECREASE in self-preference — the opposite of what
  the prose claims. Flags that the +0.41 regression slope contradicts
  the intervention direction, and that the contribution claim (and the
  proposed mitigation of suppressing recognition) inverts when read
  against the actual numbers.

bad_outputs_summary: |
  Tightens prose, smooths transitions, suggests reporting confidence
  intervals or adding more model families, or quibbles with the choice
  of fine-tuning recipe. Accepts the "positive, monotone relationship"
  framing and the β = 0.41 slope at face value without checking that
  62.1 → 49.3 is a decrease, and leaves the inverted causal conclusion
  and mitigation recommendation untouched.

