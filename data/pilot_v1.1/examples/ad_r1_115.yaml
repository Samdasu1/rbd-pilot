engineered_flaws:
  R1.3: [F1.3.c]
  notes: |
    Inverted reading. The intervention numbers in paragraph 2 show that
    self-recognition accuracy rose from 54.2% → 81.4% (a 27-point
    increase) while self-preference rate FELL from 62.1% → 49.3% (a
    12.8-point decrease, crossing below the 50% chance line). The text
    in paragraphs 3–4 reads this evidence in the opposite direction:
    it claims the data shows "improved self-recognition yields stronger
    self-preference," that recognition gains were "accompanied by a
    substantial shift" consistent with a positive mediation hypothesis,
    and reports a regression slope of β = +0.41 across the additional
    model families — a sign that contradicts the within-model
    intervention result. The conclusion ("positive, monotone
    relationship") is the opposite of what the within-model numbers
    show; the natural reading is that recognition-targeted fine-tuning
    REDUCES self-preference, which would imply a different (possibly
    debiasing) mechanism and would invert the section's contribution
    claim, including the proposed mitigation strategy (suppressing
    recognition would, on the actual evidence, INCREASE preference).
    Detection requires noticing 49.3 < 62.1 and that this contradicts
    the prose direction; moderate ML/stats reading needed but no
    canonical recall.

