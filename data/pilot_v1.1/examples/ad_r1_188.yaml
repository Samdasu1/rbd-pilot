artifact:
  source: synthetic
  domain: bioinformatics
  word_count: 358
  text: |
    In this section we describe our protocol for evaluating LLM-generated
    gene function summaries through expert biocurator review. Because
    automated metrics such as BLEU and ROUGE are known to correlate poorly
    with biological accuracy, we adopted a manual evaluation protocol in
    which expert biocurators rate each generated summary along three axes:
    factual correctness, completeness, and ontology consistency.

    We recruited 12 expert biocurators from three institutional curation
    teams to rate the generated summaries. Each biocurator was asked to
    rate the generated summaries along the three axes of factual
    correctness, completeness, and ontology consistency. The 12 expert
    biocurators rated a total of 480 generated summaries, with each
    summary receiving ratings from three independent biocurators along
    the three axes of factual correctness, completeness, and ontology
    consistency.

    To compute inter-annotator agreement we used Krippendorff's alpha
    computed over the ordinal Likert ratings. Krippendorff's alpha was
    computed over the ordinal Likert ratings to quantify inter-annotator
    agreement across our biocurator pool, and we report Krippendorff's
    alpha for each of the three rating axes. The resulting alpha values,
    which were obtained from Krippendorff's alpha applied to the ordinal
    Likert ratings, were 0.62 for factual correctness, 0.58 for
    completeness, and 0.71 for ontology consistency.

    Each summary was generated by prompting the model with the gene
    symbol and the associated UniProt accession; the model was prompted
    with the gene symbol and the associated UniProt accession to produce
    a 50-100 word summary of the gene's function. We chose the 50-100
    word range because pilot studies indicated that summaries shorter
    than 50 words tend to omit relevant pathway context, while summaries
    longer than 100 words tend to introduce hallucinated content, and
    thus the 50-100 word range was adopted as a compromise between these
    two failure modes.

    The biocurator ratings were collected through a secure web interface,
    and the secure web interface presented each summary alongside the
    corresponding GeneCards entry. Biocurators were instructed to consult
    the GeneCards entry while rating, and the GeneCards entry was
    therefore presented alongside each summary in the secure web
    interface to support the rating task.
