artifact:
  source: synthetic
  domain: distributed_systems
  word_count: 285
  text: |
    Comparative evaluation of Byzantine fault-tolerant (BFT) consensus
    protocols remains methodologically fragmented. Each new design is
    reported on its own preferred microbenchmarks, run on disjoint
    testbeds, with no shared notion of what "performance under partial
    synchrony" actually means. We propose ConSenseBench, a unified
    evaluation harness for BFT consensus protocols that standardizes
    workload, deployment topology, and the measurement of liveness.

    Our object of interest is *liveness under partial synchrony*: the
    requirement that, despite arbitrarily delayed but eventually-
    delivered messages, every correct client request is eventually
    committed by a correct replica. We operationalize liveness as
    *committed-transaction throughput*: the rate, in transactions per
    second, at which the protocol commits client transactions during a
    measurement window. Concretely, for each protocol we issue an offered
    load of 50,000 8KB transactions per second over a 60-second window,
    induce two 5-second network partitions affecting one-third of
    replicas, and report the average commit rate.

    We benchmark five protocols — PBFT, HotStuff, Tendermint, Narwhal-
    Bullshark, and a recent design, Aether — across replica counts from
    4 to 64. Table 1 summarizes the results. HotStuff achieves the
    highest sustained throughput at 32 replicas (38,200 tx/s), followed
    by Aether (35,100 tx/s), with PBFT trailing at 12,400 tx/s. We
    interpret HotStuff's lead as evidence of superior liveness under our
    partial-synchrony model.

    A central methodological contribution of ConSenseBench is the
    introduction of throughput as a unified, cross-protocol liveness
    metric — to our knowledge, the first such standardization for BFT
    consensus. Our framing builds directly on the harness design of
    Patel and Ousterhout (2021), who established that committed-
    throughput is a sufficient proxy for liveness in partially-
    synchronous protocols, and whose measurement-window conventions we
    adopt verbatim. ConSenseBench extends their pipeline to BFT settings
    and provides the foundation for the rest of the paper.
  source_provenance: null

