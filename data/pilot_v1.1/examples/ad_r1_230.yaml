engineered_flaws:
  R1.3: [F1.3.b]
  R1.7: [F1.7.a]
  notes: |
    Two load-bearing flaws, both detectable from careful internal
    reading without recall of specific canonical papers.

    R1.3 — metric mismatch. The section explicitly defines its object
    of measurement, liveness under partial synchrony, as the property
    that "every correct client request is eventually committed by a
    correct replica" — an eventuality/progress property. It then
    operationalizes that property as committed-transaction throughput
    over a fixed 60-second window. Throughput measures the rate of
    commits during the window; it does not measure whether every
    correct request is eventually committed. Two protocols can have
    identical throughput while differing on liveness — e.g., one may
    silently drop a fraction of requests during the partition window
    yet recover its long-run rate, while another commits every request
    eventually but at a lower rate. The interpretive sentence
    ("HotStuff's lead as evidence of superior liveness") is therefore
    not supported by the metric. Fixing this requires a metric tied to
    the eventuality property — e.g., per-request commit-eventually
    rate, request-level tail latency under partition, or a
    liveness-violation count — which would change what the section
    reports and rank protocols differently.

    R1.7 — fabricated citation. The section claims, in the same
    paragraph, that throughput-as-liveness-metric is its central
    methodological contribution and "to our knowledge, the first such
    standardization for BFT consensus," and then immediately attributes
    the same idea to Patel and Ousterhout (2021), who allegedly
    "established that committed-throughput is a sufficient proxy for
    liveness in partially-synchronous protocols." The two claims cannot
    both be true: if the cited work already established the proxy, the
    contribution is not first; if the contribution is first, the
    cited claim is fabricated. The internal contradiction is visible
    from the paragraph itself.

    Low gating: a reader does not need to know whether "Patel and
    Ousterhout 2021" exists, nor recall the canonical safety/liveness
    distinction in BFT, to see (a) that a window-averaged rate does
    not measure an eventually-quantified property the section itself
    defined, and (b) that "first standardization" and "builds directly
    on prior standardization" contradict each other within four lines.

