acceptable_outputs_summary: |
  Flags both load-bearing issues. For the metric, points out that the
  section defines liveness as an eventuality property ("every correct
  request is eventually committed") but measures a window-averaged
  commit rate, which can rank protocols identically while their
  eventuality behavior differs — so the "superior liveness" claim is
  not supported, and recommends an outcome-level metric tied to the
  eventuality property (per-request commit-eventually rate, partition-
  window tail latency, liveness-violation counts). For the citation,
  notes the internal contradiction between "first such standardization"
  and "builds directly on Patel and Ousterhout (2021), who established"
  the same proxy, and asks the authors to either retract the priority
  claim or remove/replace the citation.

bad_outputs_summary: |
  Polishes the prose, suggests adding more replica counts, longer
  measurement windows, error bars on throughput, or a fancier figure.
  Accepts throughput as a liveness metric without questioning the
  construct match against the section's own definition. Leaves the
  contradiction between "first standardization" and the Patel and
  Ousterhout attribution untouched, or addresses only one of the two
  issues (e.g., fixes wording around the contribution claim while
  keeping throughput-as-liveness intact).

