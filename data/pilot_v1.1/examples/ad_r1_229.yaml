engineered_flaws:
  R1.2: [F1.2.b]
  R1.3: [F1.3.c]
  notes: |
    Two compounding issues that are both detectable from arithmetic
    on the numbers given in the section itself.

    R1.3 — inverted reading. The aggregate paragraph reports baseline
    confidence 0.74 vs. success 0.61 (gap 0.13) and SelfCheck
    confidence 0.86 vs. success 0.65 (gap 0.21). The
    confidence–accuracy gap *widened* by 0.08 — the agent became
    *more* overconfident, not less. The section nonetheless reads
    these numbers as "improved calibration … both quantities have
    risen together." The direction of the calibration change is
    inverted relative to what the numbers show: confidence climbed
    0.12 while accuracy climbed only 0.04, which is the canonical
    signature of *worsening* miscalibration, regardless of which
    specific calibration metric (ECE, gap, Brier) one prefers.

    R1.2 — cross-section contradiction. The opening sentence asserts
    SelfCheck "uniformly reduces overconfidence" across all five
    categories. The per-category paragraph then explicitly lists
    three of the five categories (code-execution 0.14→0.24, file-read
    0.11→0.19, database-query 0.18→0.26) in which the gap *grew*,
    most by very large amounts. The Discussion then reasserts that
    SelfCheck "uniformly mitigates the overconfidence pathology
    across our tool suite" and "localizes this effect to all five
    tools." The "uniform / all five" framing in paragraphs 1 and 4
    cannot be reconciled with the per-category numbers in paragraph
    3; the section contradicts itself.

    Detection: pure reading plus subtraction. No knowledge of the
    LLM-agent or calibration literature is required — the inverted
    reading is visible in 0.86 − 0.65 > 0.74 − 0.61, and the
    contradiction is visible in three explicit category rows. Low
    gating. Delegation T10 ("Help me with this section.") is fully
    generic and does not name reasoning, evidence, or consistency.

