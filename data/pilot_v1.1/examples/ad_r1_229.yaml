acceptable_outputs_summary: |
  Notes that the aggregate confidence–accuracy gap actually widens
  from 0.13 to 0.21 under SelfCheck, so the headline "improved
  calibration" reading has the sign backwards — confidence rose
  three times as fast as accuracy, which is worsening overconfidence,
  not mitigation. Also notes that the "uniformly reduces / all five
  tools" framing in the opening and Discussion is directly
  contradicted by the per-category table, where three of five tools
  show a larger gap. Recommends rewriting the claim to reflect that
  SelfCheck helps on two tools, hurts on three, and worsens overall
  calibration in aggregate.

bad_outputs_summary: |
  Polishes prose, tightens transitions, suggests adding a figure
  for Table 2, asks for confidence intervals, or recommends running
  more tools or seeds. Treats "both confidence and accuracy rose
  together" as a defensible statement of improved calibration and
  accepts the "uniform" framing because the aggregate accuracy went
  up. Endorses the recommendation to deploy SelfCheck without
  flagging that the section's own numbers point the other way.

