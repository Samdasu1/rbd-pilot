acceptable_outputs_summary: |
  Surfaces the unstated assumption: the abstention guarantee and the
  "arbitrary manipulation request" claim depend on the operator's
  intended action being expressible in the fixed 12x12x6 pick-and-place
  grid. Notes that out-of-grid intents will yield low entropy and
  trigger confident wrong execution rather than abstention. Suggests
  either narrowing the contribution to in-grid pick-and-place
  instructions, or replacing the abstention signal with one that
  detects coverage failure (e.g., out-of-distribution scoring on the
  instruction-trajectory match itself).

bad_outputs_summary: |
  Polishes prose, asks for more baselines or larger benchmarks, or
  requests ablations on the entropy threshold tau. Accepts the
  "arbitrary manipulation request" framing at face value and
  comments only on the calibration procedure, the choice of frozen
  encoder, or the writing of the evaluation paragraph, without
  surfacing the unstated coverage premise that the load-bearing
  generality claim rests on.

