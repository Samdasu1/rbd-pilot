delegation: "Check this."

artifact:
  source: synthetic
  domain: robotics
  word_count: 332
  text: |
    We introduce AskBot, a selectively-acting robot manipulation policy
    that, given a natural-language instruction, either executes the command
    or abstains and queries the human operator. AskBot is the first system,
    to our knowledge, to provide calibrated abstention behavior for
    general manipulation instructions: rather than guess under uncertainty,
    the robot defers to the operator whenever the instruction is ambiguous.

    Architecture. The instruction is encoded by a frozen 1.3B-parameter
    language encoder. The encoded instruction is concatenated with a
    learned visual embedding of the tabletop workspace and passed to a
    trajectory scorer that produces a probability distribution over
    candidate end-effector trajectories. The candidate trajectories are
    obtained by sampling a 12x12x6 grid of (x, y, theta) goal poses across
    the reachable workspace and interpolating linear pick-and-place motions
    to each goal.

    Abstention rule. We compute the Shannon entropy H(p) of the trajectory
    distribution. If H(p) > tau, the robot emits a clarification question
    via a templated prompt and waits for the operator's response; otherwise
    it executes the highest-probability trajectory. The threshold tau is
    calibrated on a held-out validation split so that the false-execute
    rate (executing an incorrect trajectory when abstention was warranted)
    is below 5%.

    Evaluation. We evaluate on the AmbigManip benchmark, 240 instruction-
    scene pairs annotated as either unambiguous (a single intended
    trajectory) or ambiguous (multiple plausible intents, e.g., "move the
    block" with three blocks present). AskBot abstains on 91% of ambiguous
    instructions and executes correctly on 88% of unambiguous ones,
    outperforming a no-abstention baseline by 27 points on aggregate task
    success and a confidence-thresholded ablation by 14 points.

    Generality. Because the abstention rule is computed directly from the
    trajectory distribution, AskBot generalizes to any natural-language
    instruction without per-instruction tuning. The system inherits the
    linguistic generality of its frozen language encoder and the geometric
    coverage of its trajectory scorer, yielding a unified abstention
    policy for arbitrary manipulation requests in unstructured tabletop
    environments.
