engineered_flaws:
  R1.2: [F1.2.a]
  notes: |
    Hidden premise. The contribution claim is that AskBot abstains
    "whenever the instruction is ambiguous" and generalizes to "any
    natural-language instruction" / "arbitrary manipulation requests."
    The method, however, computes its abstention signal as the entropy
    of a distribution over a *fixed* candidate set: a 12x12x6 grid of
    (x, y, theta) goal poses interpolated as pick-and-place motions.
    The abstention guarantee silently assumes that the operator's
    intended action is representable in this grid. Instructions whose
    correct action lies outside the candidate set (e.g., "press the
    side button," "rotate the screwdriver," "stack three blocks") will
    typically produce a *low*-entropy distribution — all candidates are
    similarly bad, so one happens to score highest — and the robot
    will confidently execute a wrong trajectory rather than abstain.
    The "calibrated abstention" and "arbitrary manipulation request"
    claims rely on an unstated coverage premise (intended action lies
    in the pick-and-place grid) that, if surfaced, would substantially
    narrow the contribution. No specialized citations are needed to
    notice this; the gap is visible from reading the architecture and
    the generality claim together (low knowledge gating). Delegation
    T05 ("Check this.") is generic and does not name the dim.

