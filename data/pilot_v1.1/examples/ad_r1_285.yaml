engineered_flaws:
  R1.3: [F1.3.c]
  R1.7: [F1.7.a]
  notes: |
    The artifact admits two materially different load-bearing readings:

    Reading A — R1.3 dominant (inverted reading of the headline metric):
      The Results paragraph reports a mean PDE residual of 4.7 × 10⁻²
      for ResAdapt versus 8.1 × 10⁻³ for the uniform-sampling baseline.
      For a residual loss, lower is better — that is the entire point
      of minimizing |R(x, t; θ)|. The numbers therefore show that
      ResAdapt's PDE residual is roughly 5.8× *worse* than the
      uniform baseline's. Yet the section interprets these numbers as
      "direct evidence that ResAdapt better satisfies the underlying
      Burgers' PDE" and claims they match the theoretical O(N^{-2})
      improvement. The directionality of the metric is inverted: the
      reported numbers, read straight, falsify rather than support the
      contribution claim. Rewrite under this reading would either (a)
      retract the "better satisfies the PDE" claim and re-anchor the
      contribution against a different metric (e.g., shock-front
      sharpness, downstream prediction error at fixed test points),
      or (b) re-examine which run produced which residual value
      before any improvement claim can stand.

    Reading B — R1.7 dominant (fabricated citation as theoretical
    anchor):
      The contribution's theoretical justification rests on
      "Hassanpour & Mehta (1987), whose Theorem 4.1 establishes an
      O(N^{-2}) residual-decay rate for residual-weighted collocation
      under a deep ReLU ansatz on bounded Lipschitz domains." The
      Discussion then claims the empirical gap "aligns with the
      predicted O(N^{-2}) rate of Hassanpour & Mehta (1987)." The
      citation appears fabricated: a 1987 result proving residual-
      decay rates specifically for *deep ReLU* network ansatzes on
      PDE collocation problems is anachronistic on its face — deep
      ReLU networks were not the operative model class in 1987, and
      the entire PINN line of work that frames residual-weighted
      collocation in these terms is a 2017-onwards development. The
      attribution is therefore a load-bearing fabrication: the
      O(N^{-2}) vs O(N^{-1/2}) rate gap that the section uses to
      justify the method comes from a paper that almost certainly
      does not exist as described. Rewrite under this reading would
      remove the fabricated theoretical guarantee, re-anchor the
      motivation against actual residual-adaptive PINN literature
      (e.g., importance-sampling and RAR-style schemes from 2020+),
      and reframe the contribution as a practical-method paper
      without the formal convergence-rate claim.

    Reading A is detectable by careful reading of the metric/claim
    pair (4.7 × 10⁻² is larger than 8.1 × 10⁻²; the headline claim
    points the wrong way). Reading B is detectable from internal
    temporal inconsistency alone (a 1987 paper cannot establish a
    convergence theorem for "deep ReLU" PINN-style training) without
    needing recall of any specific PINN reference — hence low
    knowledge gating. Both flaws are real and load-bearing; rewriting
    under one reading does not fix the other; a well-calibrated agent
    should set clarification_needed=true.

