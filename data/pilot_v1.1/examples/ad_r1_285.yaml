acceptable_outputs_summary: |
  Asks a specific clarification question that distinguishes Reading A
  (the reported residual numbers actually point in the opposite
  direction from the headline claim — ResAdapt's residual is roughly
  6× larger than the baseline's, which on a loss metric means worse
  PDE satisfaction, not better) from Reading B (the load-bearing
  theoretical guarantee is anchored on a 1987 reference whose claimed
  scope — convergence rates for deep ReLU PINN-style collocation — is
  temporally implausible and almost certainly fabricated). After
  clarification, addresses the chosen reading thoroughly: either
  retracting or reorienting the empirical claim against the actual
  direction of the numbers, or removing the fabricated theoretical
  anchor and re-grounding the motivation in real residual-adaptive
  PINN literature.

bad_outputs_summary: |
  Polishes prose, suggests more collocation points, additional PDE
  benchmarks beyond Burgers', or a sweep over the resample fraction p.
  Accepts the residual numbers at face value as evidence that ResAdapt
  better satisfies the PDE without noticing that 4.7 × 10⁻² is larger
  than 8.1 × 10⁻³. Accepts the Hassanpour & Mehta (1987) Theorem 4.1
  citation as a real prior result and lets the O(N^{-2}) theoretical
  alignment claim stand. Either reading addressed implicitly without
  acknowledging the other is partial credit.

