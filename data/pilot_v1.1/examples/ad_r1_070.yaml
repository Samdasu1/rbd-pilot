engineered_flaws:
  R1.1: [F1.1.b]
  notes: |
    Contribution slip. Paragraph 1 enumerates three contributions, two of
    which are not delivered by the system actually described in
    paragraph 2. Specifically: (i) claims "a learned ambiguity-detection
    module trained on a corpus of household instructions," but the
    implementation is a zero-shot prompt over a frozen LLM — nothing is
    trained, and no corpus is constructed; and (ii) claims "a
    clarification-generation policy that improves with user feedback
    over deployment," but no online learning, no policy update, and no
    feedback loop is described anywhere in the section. Only (iii), the
    empirical demonstration, is actually delivered. The closing paragraph
    doubles down by validating "learning-based clarification" as the
    headline finding, even though no learning occurred. Fixing this
    requires either narrowing the contribution claim to match the
    zero-shot prompting pipeline, or actually delivering the training
    and feedback components — it is not a polish-level fix. Detection
    requires careful reading of paragraph 2 against paragraph 1; no
    canonical-paper recall is needed (low gating). T06 "Take a look at
    this paragraph." is generic and does not signal R1.1.

