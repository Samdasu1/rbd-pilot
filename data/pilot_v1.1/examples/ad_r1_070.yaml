artifact:
  source: synthetic
  domain: robotics
  word_count: 271
  text: |
    We introduce ClarifyBot, a learning-based framework for resolving
    ambiguous natural-language commands in service robotics. When a user
    issues an instruction such as "bring me something to drink from the
    fridge," ClarifyBot determines whether sufficient information exists
    to act and, if not, generates a clarification question targeted at
    the maximally informative referent. The contributions of this section
    are threefold: (i) a learned ambiguity-detection module trained on a
    corpus of household instructions, (ii) a clarification-generation
    policy that improves with user feedback over deployment, and (iii) an
    empirical demonstration that the framework reduces task-failure rate
    compared to direct-execution baselines.

    The system is implemented as a prompt-engineering pipeline over a
    frozen instruction-tuned LLM. A first prompt asks the LLM to
    enumerate possible referents for ambiguous noun phrases in the input
    command (e.g., "drink" → {"orange juice", "water", "soda"}). If more
    than one referent receives non-trivial probability mass under a
    self-scoring step, a second prompt asks the LLM to formulate a
    clarification question targeting the most discriminating attribute.
    The resolved command is then passed to a downstream PDDL planner.

    We evaluate ClarifyBot on a 6-DoF mobile manipulator in a single
    instrumented kitchen environment, using 40 hand-authored ambiguous
    commands drawn from prior work in instruction following. The
    framework correctly identifies ambiguity in 35/40 cases and produces
    a clarification that the user judges informative in 31/40. Compared
    with a no-clarification baseline that always commits to the
    highest-probability referent, ClarifyBot reduces task failure from
    47% to 18%.

    Taken together, these results validate our claim that learning-based
    clarification offers substantial improvements over direct execution,
    and they position ClarifyBot as a step toward robot assistants that
    gracefully handle the ambiguity inherent in human language.
