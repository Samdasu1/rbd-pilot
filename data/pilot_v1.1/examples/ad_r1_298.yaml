delegation: "Check the logical consistency."

artifact:
  source: synthetic
  domain: anomaly_detection
  word_count: 322
  text: |
    We present ROUTERSCAN, an anomaly detector for multi-LLM routing
    systems. ROUTERSCAN flags routing decisions in which the selected
    model produced an anomalous output — refusals, degenerate
    generations, or off-task responses — so that operators of routing
    pipelines (e.g., systems that dispatch each query among GPT-4,
    Claude, Llama-3-70B, and Mistral-7B) can audit serving quality
    without manually inspecting raw logs.

    Data collection. We instrumented a production-style router serving
    four LLMs and collected 12,400 query–response pairs over three
    weeks. Two annotators independently labeled each response as
    anomalous or normal using a written rubric, with disagreements
    resolved by a third adjudicator. 18.2 percent of responses were
    labeled anomalous. We treat these labels y(x) as ground truth for
    both training and evaluation, splitting queries (not responses)
    70/15/15 across train, validation, and test partitions.

    Detector. ROUTERSCAN is a logistic-regression head on top of a
    frozen MPNet encoder of the query-response concatenation,
    augmented with six routing-log features (selected model, output
    token count, end-to-end latency, retry count, top-logprob, finish
    reason). The detector is trained with class-balanced binary
    cross-entropy.

    Deployment scope. A central practical advantage of ROUTERSCAN is
    that it is fully unsupervised: it requires no annotated examples
    of anomalous routing decisions and no ground-truth labels of any
    kind, and it can be deployed on any router's logs without further
    labeling effort. Operators can therefore enable ROUTERSCAN on
    their existing routing infrastructure and immediately receive
    anomaly scores for every served query.

    Results. On the held-out test split, ROUTERSCAN achieves AUC 0.91
    and F1 0.74 at the validation-tuned operating point. Routing-log
    features contribute roughly 0.05 AUC over a text-only ablation.
    From this AUC, we therefore conclude that the rate of anomalous
    routing decisions in production multi-LLM systems is approximately
    18 percent, consistent with prior router-quality audits and
    establishing ROUTERSCAN as a calibrated prevalence estimator for
    routing anomalies.
  source_provenance: null

