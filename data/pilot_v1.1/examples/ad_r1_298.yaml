acceptable_outputs_summary: |
  Flags that the Data-collection paragraph trains and evaluates
  ROUTERSCAN on annotator-provided y(x) labels with class-balanced
  binary cross-entropy, which directly contradicts the Deployment-scope
  paragraph's claim that the detector is fully unsupervised and
  requires no annotations or ground-truth labels of any kind.
  Separately flags that AUC 0.91 does not entail an 18 percent
  prevalence estimate for production routing — AUC is a discrimination
  metric on a labeled test set, while the 18 percent figure is just
  the training annotation rate restated. Suggests either narrowing
  the deployment claim to "supervised, transferable across routers"
  or replacing the AUC-based prevalence conclusion with a calibrated
  estimate on a sampled target population.

bad_outputs_summary: |
  Polishes prose, suggests adding more LLM backends to the routing
  pool, proposes extra routing-log features, or recommends ablations
  on the encoder without flagging either the supervised-vs-unsupervised
  contradiction across paragraphs or the AUC-to-prevalence
  non-sequitur. Accepts the 18 percent production-anomaly conclusion
  as supported by the reported AUC. Treats the section as logically
  sound and only requests minor clarifications or additional
  router-quality citations.

