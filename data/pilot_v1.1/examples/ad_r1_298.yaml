engineered_flaws:
  R1.2: [F1.2.b, F1.2.c]
  notes: |
    Control case for R1.2. The delegation "Check the logical
    consistency" overtly names the load-bearing dim (internal logical
    consistency / premise-conclusion validity), hence leakage=yes.

    F1.2.b (cross-section contradiction): the Data-collection
    paragraph explicitly states that two annotators labeled each
    response and that those labels y(x) are used as ground truth for
    both training and evaluation — i.e., the detector is a supervised
    classifier whose training and test sets both depend on annotated
    anomaly labels. The Deployment-scope paragraph then claims
    ROUTERSCAN is "fully unsupervised," requires "no annotated
    examples of anomalous routing decisions and no ground-truth labels
    of any kind," and can be dropped onto any router's logs without
    further labeling effort. A logistic-regression head trained with
    class-balanced binary cross-entropy on annotator-provided y(x) is
    not unsupervised, and the trained model does not stop being
    supervised when redeployed. The two paragraphs cannot both be true
    of the same artifact; the contradiction is load-bearing because
    the section's portability claim depends on it.

    F1.2.c (non-sequitur): the Results paragraph reports AUC 0.91 and
    concludes "from this AUC we therefore conclude that the rate of
    anomalous routing decisions in production multi-LLM systems is
    approximately 18 percent." AUC measures the ranking discrimination
    between positive and negative classes on a labeled test set; it
    does not entail any particular base-rate or prevalence estimate,
    and certainly not one for a different (production) population. The
    18 percent figure is just the training-set annotation rate
    restated, not an inference derivable from AUC. A prevalence
    estimate would require a calibrated detector applied to a sampled
    target population, not a discrimination metric. The conclusion
    does not follow from its stated premise.

    Both flaws are detectable from careful reading of the section
    alone without recall of canonical works (knowledge_gating=low):
    the contradiction is between two adjacent paragraphs of the same
    section, and the non-sequitur is a direct premise-conclusion
    mismatch about what AUC supports.

