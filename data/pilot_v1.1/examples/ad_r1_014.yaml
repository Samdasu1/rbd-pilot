artifact:
  source: synthetic
  domain: distributed_systems
  word_count: 214
  text: |
    Distributed key-value stores must handle concurrent writes from many
    clients. Our system, ConsistencyChain, addresses this challenge using
    a novel approach. The challenge is severe in geo-distributed settings
    where network partitions are frequent.

    ConsistencyChain implements a vector-clock-based protocol where each
    write is tagged with an originating node ID and a per-node sequence
    number. Concurrent writes are merged using a deterministic conflict
    resolution function described in Section 3. The protocol guarantees
    eventual consistency in the absence of partitions and bounded
    staleness during partitions.

    Recent work in distributed systems has emphasized the importance of
    latency under realistic network conditions. Geo-distributed deployments
    routinely experience inter-region round-trip times of 100-300ms, which
    makes synchronous replication impractical for low-latency reads. This
    motivates the asynchronous protocol we describe.

    In our experiments on a 6-region testbed spanning North America,
    Europe, and Asia, ConsistencyChain achieves p99 read latency of
    8.4ms (within-region) and 142ms (cross-region) under sustained
    50k-write/sec load. The system also survives 3-region partitions
    without availability loss.

    The bounded-staleness guarantee is formalized as follows: writes are
    visible within max(2T, 50ms) where T is the inter-region RTT.
    Section 4 proves this bound.

    Section 5 further reports an availability case study in which a
    3-region partition lasted 47 minutes during a simulated outage,
    with no client-visible inconsistencies observed after partition
    healing across the full 50k-write/sec workload.
