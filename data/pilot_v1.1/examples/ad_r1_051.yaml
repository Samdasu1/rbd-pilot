artifact:
  source: synthetic
  domain: computer_vision
  word_count: 318
  text: |
    We introduce CrossViewSeg, the first method designed to maintain
    semantic-segmentation accuracy under arbitrary camera viewpoint shifts
    in driving scenes. Production fleets often span vehicle models with
    cameras mounted at different heights and pitch angles, and existing
    segmentation networks degrade sharply when deployed on a vehicle whose
    viewpoint differs from the training camera. Our work targets this
    deployment-time generalization gap directly.

    The architecture is a standard encoder-decoder. We use a ResNet-50
    backbone followed by an atrous spatial pyramid module and a lightweight
    decoder that upsamples to full resolution. During training, we
    additionally apply random homography perturbations to each input image
    — sampling rotations of up to ±8° in pitch and ±5° in roll, and
    translations of up to 6% of the frame height — which we found
    stabilizes optimization and improves boundary sharpness on small
    objects.

    We evaluate CrossViewSeg on Cityscapes and BDD100K, the two standard
    urban-scene segmentation benchmarks. On Cityscapes-val, our method
    reaches 78.4 mIoU, a 1.6 point improvement over DeepLabv3+ trained
    with the same backbone and schedule. On BDD100K-val we observe a 1.2
    point improvement. The gains are concentrated in classes with thin or
    elongated geometry (poles, traffic signs, riders), which we attribute
    to the boundary-sharpening effect of the homography augmentation. A
    small ablation that replaces the homography pass with standard
    scale-and-crop augmentation gives back 0.9 mIoU, suggesting the
    homography augmentation is doing most of the work.

    Our results show that homography-based augmentation is a simple but
    effective addition to the standard segmentation training recipe,
    yielding consistent gains on Cityscapes and BDD100K without
    architectural modifications. We expect this recipe to be a useful
    default in future segmentation pipelines, and we release training
    code and configuration files to facilitate reproduction.
