acceptable_outputs_summary: |
  Identifies that the opening positions the work as the first method for
  cross-viewpoint robustness, but the evaluation only measures standard
  in-distribution benchmark gains and the conclusion silently downgrades
  the claim to an augmentation recipe. Proposes either (a) adding a real
  cross-camera / cross-viewpoint evaluation that supports the original
  claim, or (b) rewriting the framing and conclusion to honestly position
  the work as an augmentation recipe with benchmark gains. Does not
  focus on prose polish.

bad_outputs_summary: |
  Polishes the prose, tightens transitions, or suggests reporting more
  ablations and adding citations to other segmentation networks. Treats
  the viewpoint-shift framing as legitimate and recommends strengthening
  the introduction, or accepts the augmentation framing in the
  conclusion and recommends benchmark extensions, without noticing that
  the two claims are different and the evidence supports neither
  cleanly.

