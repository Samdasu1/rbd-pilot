engineered_flaws:
  R1.1: [F1.1.b]
  notes: |
    Contribution slip. Para 1 frames the contribution as "the first method
    to maintain segmentation accuracy under arbitrary camera viewpoint
    shifts," targeting the deployment-time generalization gap across
    fleets with differently mounted cameras. But the evaluation in para 3
    is on Cityscapes and BDD100K — standard in-distribution benchmarks
    where train and test come from the same camera rig. No cross-camera
    or cross-viewpoint evaluation is reported. Para 4 then quietly
    restates the contribution as "homography-based augmentation is a
    simple but effective addition to the standard segmentation training
    recipe, yielding consistent gains on Cityscapes and BDD100K" — a
    different and weaker claim about benchmark gains, not viewpoint
    robustness. The contribution claim slips between framing and delivery,
    and a reader cannot tell whether the paper's contribution is a
    viewpoint-robust method or a general-purpose augmentation recipe.
    Detection requires careful reading of the framing/evaluation/
    conclusion alignment; no canonical-paper recall needed (low gating).
    Delegation T01 "Improve this draft" is generic and does not signal
    R1.1.

