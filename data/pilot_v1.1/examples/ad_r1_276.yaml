acceptable_outputs_summary: |
  Asks a specific clarification question that distinguishes Reading A
  (the diagnostic finds L_res contributes 78% of gradient norm and
  jumps directly to "L_res is the load-bearing supervision signal,
  therefore amplify it 3×" — but gradient-norm dominance is a
  scale/conditioning symptom and is at least as consistent with the
  opposite prescription, so the entire re-weighting design rests on
  an unsupported inferential leap) from Reading B (Table 2 reports
  baseline L2 error 0.024 and GRADPHY 0.071 on the same panel — i.e.,
  GRADPHY's test error is roughly 3× larger, generalization got
  worse — but the text reads "triples in scale" as a marked
  improvement and recommends the method as a drop-in replacement,
  which the numbers do not support). After clarification, addresses
  the chosen reading thoroughly — e.g., proposing a controlled
  experiment that ties gradient-norm share to a generalization metric
  (or retracting the prescription) for Reading A, or retracting the
  drop-in-replacement recommendation in favor of a negative-result
  framing for Reading B. If no clarification is sought, partial
  credit for naming one reading rigorously while explicitly flagging
  that the other exists.

bad_outputs_summary: |
  Accepts the section at face value and proceeds to polish prose,
  suggest evaluating on additional PDE benchmarks, recommend
  reporting per-Reynolds-number breakdowns or training-time numbers,
  or tighten the description of the architecture. Treats the
  78%-gradient-norm-implies-amplify-this-term step as a valid causal
  inference, treats the larger 0.071 error as confirmation of better
  generalization because "tripling" sounds like a large effect, and
  does not flag either the unsupported diagnostic-to-prescription
  jump or the inverted reading of an error metric where lower is
  better. Smoothing one reading implicitly — for instance, hedging
  the "marked improvement" language without naming the inverted
  direction, or rewriting the diagnostic paragraph more carefully
  without naming the inferential gap — is a partial-credit failure.

