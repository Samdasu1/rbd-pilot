  domain: power_systems_v2g
  word_count: 215
  text: |
    The conservative LP scheduler is the simplest optimization-based
    strategy we consider; it solves a linear program at each re-planning
    step to minimize energy cost over the remaining horizon. At each
    step, the LP allocates charging power and discharging power
    separately, with the aggregate signal defined as their difference.
    The LP enforces aggregate energy balance, per-step discharge caps,
    and total discharge budget constraints calibrated with conservative
    utilization factors.

    The combined strategy is the first model-based scheduling method
    that integrates inter-window coupling directly into the LP objective
    while preserving full arbitrage flexibility. It augments the
    conservative LP with three components: a neural transition model
    that enables gradient-based schedule refinement, a reachability-aware
    dispatcher that enforces vehicle-level QoS, and a coupling mechanism
    that preserves commitment continuity across re-planning boundaries.

    Combined therefore serves as the strongest available model-based
    reference against which RL approaches are evaluated. Under rolling
    re-planning, each replanning step produces a schedule that the next
    LP must satisfy within a tight commitment band; any LP-feasible
    schedule automatically satisfies the commitment constraint.

    The pipeline runs in three stages: the LP planner emits an initial
    trajectory under fleet-level and inter-window constraints; the
    gradient-based optimizer refines it through transition-model
    rollouts; the dispatcher then maps the refined aggregate into
    per-vehicle commands. We position this as a deployment-ready
    scheduling architecture for commitment-binding markets.
  source_provenance: paper_4_isgt_approaches_lp_combined_combined

