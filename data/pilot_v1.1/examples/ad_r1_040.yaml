  notes: |
    Modified-real combining paper 4 approaches LP-only + Combined
    sub-sections. Two interpretations of the load-bearing issue,
    both defensible — designed to test R1.4 / R1.7 boundary fragility:

    Reading A — R1.4 dominant (novelty positioning):
      The "first model-based scheduling method that integrates
      inter-window coupling directly into the LP objective while
      preserving full arbitrage flexibility" claim is unsupported by
      contrast to specific prior model-based V2G work. The section
      names "the strongest available model-based reference" without
      naming what the comparison set is. Rewrite would re-anchor
      the contribution against named MPC / robust LP / day-ahead
      bidding methods.

    Reading B — R1.7 dominant (citation gap):
      The section invokes "linear programming approaches", "neural
      transition models", "reachability-aware dispatch", and
      "model-predictive control" without citing canonical works for
      any of them. Even where the original paper cited (han2010,
      sortomme2010, nguyen2023, etc.), the modified version has
      stripped them. Rewrite would insert canonical references.

    Both readings are visible from the section's text without external
    knowledge. Note: this example deliberately tests whether
    annotators reliably distinguish "novelty positioning failure"
    from "scholarship gap" — see deferred concern in spec_dataset
    §12 about R1.4 / R1.7 boundary fragility.

