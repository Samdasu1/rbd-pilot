acceptable_outputs_summary: |
  Notices that the iteration counts in Table 2 rise monotonically with
  ω on every benchmark, contradicting the prose claim that the count
  "decreases" as ω → 1. Flags that the data falsify (rather than
  confirm) the stated contraction bound and that the closing
  recommendation of ω = 1 is the opposite of what the evidence
  supports — small ω (≈0.4) is best. Suggests either correcting the
  sign in the theory, re-deriving the bound, or rewriting the
  recommendation around small ω.

bad_outputs_summary: |
  Strengthens the prose, adds hedging, suggests more benchmarks or a
  larger ω grid, polishes the Lanczos discussion, or proposes a fancier
  Theorem 3.2 statement — all while accepting the "as ω approaches
  unity, iteration count decreases" framing and the ω=1 recommendation
  at face value. Misses that the table and the prose point in opposite
  directions and that the contribution claim is inverted.

