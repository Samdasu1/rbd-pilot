engineered_flaws:
  R1.3: [F1.3.c]
  notes: |
    Inverted reading. The reported iteration counts in paragraph 3
    INCREASE monotonically with ω on every benchmark:
      bcsstk18:  47 → 62 → 89 → 134     (ω = 0.4 → 1.0)
      s3rmt3m3:  31 → 44 → 71 → 108
      msc23052:  58 → 79 → 116 → 173
      nasa4704:  39 → 56 → 84 → 127
      ex19:      22 → 35 → 58 → 91
    Higher ω takes MORE iterations, not fewer. The prose, however,
    asserts the opposite: that "as ω approaches unity, the iteration
    count consistently decreases" with a "60%–75% relative reduction,"
    and treats this as confirmation of the predicted bound
    ρ(ω) = 1 − cω + O(ω²). The numbers actually FALSIFY that bound (or
    its sign) — they are consistent with ρ(ω) increasing in ω, which
    would invert the recommended setting. The closing recommendation
    "set ω as close to 1 as possible / default ω=1" is therefore
    backwards: the reported data favor small ω (≈0.4), not ω=1. This
    is F1.3.c (inverted reading) on R1.3 — the prose reads the table
    in reverse and inverts the contribution claim. Detection is pure
    careful reading: compare 47<62<89<134 against the words "decreases"
    and "reduction." No canonical-knowledge recall needed (low gating).
    Delegation T03 ("Make this stronger") is fully generic and gives no
    hint that the load-bearing issue is claim/evidence direction
    (no leakage).

