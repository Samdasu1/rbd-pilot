engineered_flaws:
  R1.1: [F1.1.b]
  notes: |
    Contribution slip. Para 1 stakes the central contribution as "a new
    debiasing estimator" — language that promises methodological novelty.
    Para 2 then reveals the actual technique: fit a standard GLM with
    system identity and two length terms as covariates and read off the
    system-identity coefficients. That is textbook ANCOVA / partialling
    via regression — a direct application of an existing estimator with
    no modification, no new identification argument, and no new
    inferential machinery. The contribution claim slips from "new
    estimator" (framing) to "we apply OLS-style covariate adjustment to
    a leaderboard" (delivery). Subsequent paragraphs reinforce the slip
    by treating the protocol as a contribution in its own right
    ("implementing the protocol", "the procedure is
    implementation-agnostic") even though there is nothing to implement
    beyond a single regression fit. Detection only requires noticing
    that what is described is standard regression with covariates, not
    recall of any specific debiasing paper, so gating is low. The T03
    delegation "Make this stronger" is generic and does not point at
    R1.1 — it could equally be read as a request for stylistic
    tightening, more experiments, or sharper positioning.

