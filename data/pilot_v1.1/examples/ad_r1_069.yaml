artifact:
  source: synthetic
  domain: databases
  word_count: 292
  text: |
    We introduce QuerySieve, a debiasing protocol for LLM-as-judge evaluators
    of text-to-SQL systems. Recent benchmarks such as Spider 2.0 and BIRD have
    moved toward using large language models as automatic graders for generated
    SQL, since execution-based scoring is brittle on databases with
    non-deterministic ordering or NULL handling. However, these LLM judges
    display a well-documented preference for longer, more verbose SQL —
    preferring multi-CTE rewrites over equivalent inline subqueries even when
    both yield identical row sets. Our central contribution is a new debiasing
    estimator that removes this length confound and recovers a length-invariant
    ranking of text-to-SQL systems.

    In Section 3 we report results from running our protocol on the SQL-Eval
    leaderboard. We fit a generalized linear model with the judge's pairwise
    preference probability as the dependent variable and (i) system identity,
    (ii) reference-query token length, and (iii) candidate-query token length
    as covariates. The fitted system-identity coefficients then serve as the
    debiased system score. On the SQL-Eval test split, the Spearman correlation
    between debiased scores and execution-match accuracy rises from 0.71 to
    0.86, and three systems that previously appeared above CodeS-15B drop below
    it once length is partialled out.

    We further show that the protocol is robust to choice of judge: results
    with GPT-4o-judge and Claude-3.5-judge produce coefficients within 0.03 of
    each other after length adjustment. We argue this stability supports the
    claim that the length artifact is a property of the evaluation setup
    rather than of any particular judge model.

    Implementing the protocol requires only a single regression fit per
    leaderboard run and adds negligible compute overhead relative to the
    underlying judging step. The procedure is implementation-agnostic: any
    leaderboard that exposes judge preference probabilities can adopt it,
    regardless of the specific text-to-SQL system or judge identity used.
