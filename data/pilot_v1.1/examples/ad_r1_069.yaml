acceptable_outputs_summary: |
  Notices that the stated contribution ("a new debiasing estimator") is not
  matched by the body, which simply fits a standard GLM with length
  covariates — a known technique applied without modification. Recommends
  either downgrading the contribution claim to an empirical study /
  application of covariate adjustment to LLM-judge SQL leaderboards, or
  actually introducing methodological novelty (e.g., a new identification
  argument, a non-trivial estimator, or guarantees) to support the original
  framing.

bad_outputs_summary: |
  Polishes prose, sharpens the abstract sentence, suggests adding more
  judges or benchmarks, or recommends a stronger correlation table —
  treating the "new estimator" claim as legitimate. Proposes additional
  ablations of the regression specification or a fancier name for the
  protocol without flagging that the underlying technique is standard
  covariate adjustment and does not support a methodological-novelty
  claim.

