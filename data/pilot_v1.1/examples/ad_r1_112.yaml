acceptable_outputs_summary: |
  Notices that the methodology computes token-level exact-match against
  the reference SQL, but every numerical claim is labeled "execution
  accuracy." Flags that exact-match and execution accuracy are different
  metrics in NL2SQL — semantically equivalent queries with different
  surface forms get penalized, and the reported gains therefore do not
  support the execution-accuracy claim. Recommends either rerunning the
  evaluation by executing generated SQL against the database and
  comparing result sets, or relabeling the numbers as exact-match /
  string-similarity and softening the contribution claim accordingly.

bad_outputs_summary: |
  Polishes the prose, suggests adding more benchmarks, more baselines, or
  a complexity-stratified table. Accepts the "execution accuracy" framing
  at face value and discusses the decomposition mechanism, hallucinated
  column references, or downstream repair hooks without noticing that
  the metric actually computed in the methodology paragraph is not the
  metric named in the claims.

