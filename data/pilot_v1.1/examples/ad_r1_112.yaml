engineered_flaws:
  R1.3: [F1.3.b]
  notes: |
    Metric mismatch (F1.3.b). The section frames every numerical result
    as "execution accuracy" — both in the central claim ("improves
    end-to-end execution accuracy") and in each per-benchmark gain
    statement (+7.2, +2.6, +3.3 "execution accuracy"). The methodology
    paragraph, however, describes the actual metric computed: token-level
    exact-match between the canonicalized generated SQL and the gold
    reference. Exact-match on SQL strings is a different metric than
    execution accuracy: exact-match penalizes semantically equivalent
    queries that differ in surface form (e.g., reordered JOIN clauses,
    alternative aggregations, equivalent subquery vs JOIN rewrites) and
    rewards string-identical queries even if neither executes
    successfully on the database. The numerical gains therefore do not
    establish the claimed execution-accuracy improvement; they establish
    a string-similarity improvement, which is at best a weak and biased
    proxy. Detection: pure careful reading — the section itself names
    one metric in the claims and a different metric in the methodology
    paragraph; no canonical NL2SQL knowledge required to notice the
    mismatch (low gating). Delegation T05 ("Check this.") is generic and
    does not hint at metric/claim alignment.

