artifact:
  source: synthetic
  domain: databases
  word_count: 318
  text: |
    We evaluate SchemaProbe, our decomposed-instruction NL2SQL system, on
    three standard text-to-SQL benchmarks: Spider, WikiSQL, and BIRD. Our
    central claim is that decomposing complex natural-language requests
    into atomic schema-grounded sub-instructions improves end-to-end
    execution accuracy over monolithic generation baselines.

    For each benchmark we follow the evaluation protocol established in
    prior work. Specifically, we generate one SQL candidate per
    development-set utterance and compare it to the gold reference query
    using token-level exact-match after canonical formatting: table-alias
    normalization, whitespace collapsing, and lowercase keyword folding.
    We report, per benchmark, the percentage of generated queries whose
    canonicalized form matches the reference exactly.

    Under this protocol, SchemaProbe achieves 78.4% on Spider-dev versus
    the T5-3B baseline at 71.2%, a 7.2-point improvement in execution
    accuracy. On WikiSQL, SchemaProbe reaches 86.1% versus 83.5% (+2.6
    execution accuracy). On BIRD-dev, SchemaProbe achieves 54.0% versus
    the prior reported best of 50.7%, a 3.3-point gain in execution
    accuracy. Across all three benchmarks, decomposed-instruction
    generation yields consistent execution-accuracy improvements over
    monolithic baselines, validating the central hypothesis that
    schema-grounded decomposition produces queries whose execution
    behavior more closely matches user intent.

    We attribute these execution-accuracy gains to the decomposition
    module's ability to bind sub-instruction tokens to specific schema
    columns before SQL synthesis, which reduces hallucinated column
    references in the generated query and yields semantically correct SQL
    on the underlying database.

    In Section 6 we further analyze execution-accuracy gains stratified by
    query complexity (single-table, multi-join, nested aggregation),
    confirming that decomposition is most beneficial on multi-join queries
    where schema grounding is hardest. We position SchemaProbe as a step
    toward NL2SQL systems whose generated queries reliably produce correct
    results when executed against real databases, with the decomposed
    sub-instruction interface offering a controllable hook for downstream
    repair and user clarification.
