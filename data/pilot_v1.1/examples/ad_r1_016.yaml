engineered_flaws:
  R1.3: [F1.3.b]
  R1.7: [F1.7.a]
  notes: |
    Two compound issues:

    R1.7 — fabricated/wrong citation. The cited "Wang et al. 2021" is
    invoked as showing "proper weighting of the residual loss yields
    stable training, removing the need for special optimization
    tricks." In actual PINN literature, the canonical Wang et al. 2021
    paper ("Understanding and mitigating gradient pathologies in
    physics-informed neural networks") documents PINN training
    INSTABILITY and proposes a fix — the opposite framing of how it
    is cited here. The citation is real but the claim attributed to it
    is not.

    R1.3 — claim-evidence mismatch. The section claims AdaptivePINN
    converges in 60% of iterations and reaches lower residual loss
    "across all three" PDEs. But the section reports no per-PDE
    breakdown, no comparison to other adaptive-weighting methods (only
    "uniform-weight baselines"), and no analysis of whether the
    residual-loss reduction is meaningful given the boundary-condition
    loss. The "supporting Wang et al.'s stability findings" claim
    asserts an evidential link not actually demonstrated.

    Moderate gating: the citation issue requires PINN literacy to
    catch (knowing what Wang et al. 2021 actually says). The
    claim-evidence gap (R1.3) can be caught by careful internal
    reading without external knowledge.

