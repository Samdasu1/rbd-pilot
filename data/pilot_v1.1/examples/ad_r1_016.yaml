acceptable_outputs_summary: |
  Flags both: (1) the Wang et al. 2021 citation is misrepresented —
  the actual paper documents instability, not stability — and the
  contribution's framing collapses if the foundational claim is wrong;
  (2) the empirical claims lack per-PDE breakdown and adaptive-method
  baselines, so "across all three" and "supporting Wang et al." are
  not supported by the in-section evidence. Suggests rewording both
  the citation framing and the empirical claims.

bad_outputs_summary: |
  Polishes the prose, suggests adding more PDEs or longer training,
  or asks for theoretical analysis of the moving-average estimator.
  Accepts the Wang et al. citation framing without verification.
  Praises the framework while ignoring the claim-evidence gap.

