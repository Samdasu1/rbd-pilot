artifact:
  source: synthetic
  domain: speech_recognition
  word_count: 295
  text: |
    We evaluate SpeechClar on three benchmarks (LibriSpeech-Clean,
    VoiceSearchAmbig, and SLURP) and observe that it reduces word
    error rate by 2.4 absolute points on the ambiguous-query slice of
    VoiceSearchAmbig, while preserving 96.1% of the user-confirmed
    intents identified by reference annotators. We argue this gain
    validates the joint recognition-and-clarification objective at the
    heart of our decoder.

    SpeechClar augments a streaming RNN-T acoustic decoder with a
    secondary confidence head that emits per-token uncertainty scores,
    the scores were aggregated at utterance boundaries and the
    resulting signal was used as the gating input to a downstream
    clarification policy that decides whether to commit to the 1-best
    hypothesis or to elicit a follow-up turn from the user, decisions
    the system made on the fly without pausing the audio buffer. The
    confidence head shares parameters with the rescorer described in
    §2.4.

    A central difficulty in voice interfaces is that homophonous and
    near-homophonous queries — for instance "save" vs "safe", or
    "flower" vs "flour" in cooking-domain dialogues — produce
    acoustically near-identical hypothesis lattices, and recognizers
    must either commit to a single transcript or surface the ambiguity
    to a downstream component. This issue has been identified as a
    recurring source of intent-classification errors in production
    voice assistants for over a decade.

    SpeechClar was trained on 1,200 hours of paired audio-clarification
    data drawn from VoiceSearchAmbig, augmented with 340 hours of
    synthetic disfluent speech generated by a TTS pipeline conditioned
    on ambiguous query templates. At inference time the gating policy
    ran on a single CPU thread and adds 11 ms of latency per utterance,
    the policy was thresholded at the operating point selected on the
    dev set.

    The overall contribution of this paper is, to the best of our
    knowledge, the first streaming ASR decoder that jointly learns
    acoustic recognition and clarification gating within a single
    end-to-end objective.
