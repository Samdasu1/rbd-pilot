engineered_flaws:
  R1.5: [F1.5.c]
  R1.6: [F1.6.a]
  notes: |
    Two interpretations of the load-bearing issue, both defensible:

    Reading A — R1.5 dominant (out-of-order narrative):
      The section opens with the headline 2.4-WER / 96.1%-intent
      evaluation result before either SpeechClar's purpose, the
      problem it addresses, or the contribution claim has been
      established. Method details (the RNN-T decoder, the confidence
      head, the gating policy) arrive in para 2, still ahead of any
      motivation. Motivation finally appears in para 3, after the
      method is already specified, and para 2 forward-references "the
      rescorer described in §2.4" — a component never introduced in
      the section itself. Para 4 returns to training data and latency
      after the motivation interlude, and the contribution claim
      ("first streaming ASR decoder that jointly learns acoustic
      recognition and clarification gating") is buried in the final
      sentence. A reader cannot tell whether the load-bearing claim is
      the WER reduction, the joint objective, the confidence-gated
      decoder, or the rescorer co-design — the ordering scrambles the
      contribution. A correct rewrite reorders to: problem →
      contribution → architecture → training → headline result, and
      either pulls the §2.4 rescorer forward or excises the dangling
      reference.

    Reading B — R1.6 dominant (run-ons and tense drift):
      Para 2 is a single 70-word run-on combining the confidence-head
      description, score aggregation, gating signal routing, the
      clarification policy's decision logic, and an aside about
      streaming behavior, all stitched together with comma splices
      ("uncertainty scores, the scores were aggregated"). Within that
      same sentence the tense drifts: "decides" (present) appears
      alongside "were aggregated", "was used", and "made" (all past),
      so a reader cannot tell whether the policy is described as a
      shipping component or as a past experimental run. Para 4
      contains a parallel splice and tense slip ("the gating policy
      ran on a single CPU thread and adds 11 ms ..., the policy was
      thresholded"), mixing past ("ran", "was thresholded") with
      present ("adds") in adjacent clauses. Until the prose is
      repaired, a reader cannot reliably determine whether the gating
      machinery is part of the deployed system or a one-off ablation,
      which directly affects how the contribution is interpreted.

    Both flaws gate confident assessment of the contribution. A
    well-calibrated agent should set clarification_needed=true and
    ask which dimension to prioritize, since the rewrites are
    structurally different (reorder vs. sentence-level repair).

