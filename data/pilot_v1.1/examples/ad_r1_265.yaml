acceptable_outputs_summary: |
  Asks a specific clarification question distinguishing Reading A
  (reorder the section so the problem and contribution precede the
  headline numbers, introduce the rescorer before referencing §2.4,
  and pull motivation ahead of method) from Reading B (split the
  long run-on in para 2, fix the comma splices, and resolve the
  past/present tense drift so the gating policy reads consistently
  as either a shipping component or a past experiment). After
  clarification, addresses the chosen reading thoroughly.

bad_outputs_summary: |
  Accepts the artifact at face value and tweaks word choice, upgrades
  the result framing, or suggests additional benchmarks or ablations
  without recognizing that paragraph order and sentence-level
  coherence are what gate a reader's ability to identify the
  contribution. Treats the buried contribution sentence and the
  past-tense gating description as stylistic preferences. Either
  reading addressed implicitly without acknowledging the other is a
  partial-credit failure.

