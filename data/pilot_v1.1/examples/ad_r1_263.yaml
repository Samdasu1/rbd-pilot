engineered_flaws:
  R1.5: [F1.5.b]    # misplaced section: methods/training-protocol paragraph interrupts the analysis→validation arc
  R1.7: [F1.7.b]    # missing canonical PINN failure-mode and gradient-pathology references
  notes: |
    Two interacting flaws:

    R1.5 — structural ordering. The fourth paragraph ("Following PDE
    convention, we report L2 errors..." plus the Adam/MLP/tanh setup)
    is a methods/training-protocol description. It is wedged between
    the dominant-mode analysis (paragraph 3) and the predictive-utility
    validation (paragraph 5), where it interrupts the section's
    analytical arc. The natural placement is alongside the annotation
    protocol in paragraph 2, or in a dedicated experimental-setup
    subsection earlier. As written, it deflates the spectral-vs-boundary
    insight just as that insight is supposed to motivate the validation
    experiment. Subtlety: each paragraph reads sensibly on its own;
    the issue surfaces only at the section level.

    R1.7 — missing canonical prior work. The section's entire premise
    is "characterizing failure modes in PINNs," yet it omits
    Krishnapriyan et al. 2021 ("Characterizing possible failure modes
    in physics-informed neural networks," NeurIPS), which is the
    canonical reference on this exact question and explicitly
    introduces failure-mode analysis for PINNs including the
    propagation/causality issue this paper relabels as "causality
    violation." It also omits Raissi et al. 2019 (the founding PINN
    paper) and Wang et al.'s gradient-pathology / NTK-spectrum line
    of work, which is directly relevant to the spectral-bias-collapse
    family the section names. The section gestures at "the broader
    trend of empirical characterization" without anchoring to any
    of these. Moderate gating: a reader with PINN literacy spots the
    omissions immediately; the dataset-style framing alone does not
    excuse them because the taxonomy categories overlap heavily with
    Krishnapriyan et al.'s.

    Combined: fixing R1.5 alone (re-locating the methods paragraph)
    yields a clean section that still claims novelty against an
    unstated prior taxonomy. Fixing R1.7 alone (adding the canonical
    citations) leaves the analytical arc still broken by the
    misplaced setup paragraph and may even sharpen the structural
    issue by adding more text near the validation pivot. Both must
    be addressed.

