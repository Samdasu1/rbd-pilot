artifact:
  source: synthetic
  domain: physics_informed_ml
  word_count: 388
  text: |
    Physics-informed neural networks (PINNs) often fail to converge on
    PDE problems that classical solvers handle routinely, yet the field
    lacks a principled taxonomy of these failures. In this work, we
    collect 1,200 PINN training runs across 8 benchmark PDEs and
    annotate each trace with the dominant failure signature observed
    during optimization. We introduce PINN-FAIL, a labeled dataset that
    categorizes failures into four families: residual-boundary
    imbalance, spectral bias collapse, causality violation in
    time-dependent PDEs, and ill-conditioned Jacobians near sharp
    gradients.

    Section 3 details our annotation protocol. Each run was independently
    labeled by two PDE practitioners using a shared rubric, with
    disagreements resolved by a third reviewer. The Cohen's kappa
    between primary annotators was 0.74, indicating substantial
    agreement.

    Our analysis reveals that residual-boundary imbalance accounts for
    41% of observed failures, making it the dominant mode. We find that
    spectral bias collapse — where the network fits low-frequency
    components but stalls on high-frequency ones — is often misdiagnosed
    as boundary imbalance because the two present similar early-loss
    curves. We argue this confusion has slowed methodological progress:
    many proposed "fixes" target boundary weighting when the actual
    pathology is spectral.

    Following PDE convention, we report L2 errors against analytical
    solutions where available and against high-order finite-difference
    solvers otherwise. The analytical solutions for the heat and Burgers
    equations are well-known and do not require re-derivation here. We
    use Adam with a learning rate of 1e-3, MLPs of depth 5 and width
    128, and tanh activations, matching common practice.

    To validate the taxonomy's predictive utility, we train a lightweight
    classifier on early-iteration loss trajectories and show it predicts
    the eventual failure mode with 78% accuracy by iteration 5,000 —
    well before the run completes. This enables practitioners to abort
    doomed runs early or switch to mode-specific remediation.

    Our taxonomy builds on the broader trend of empirical
    characterization in scientific machine learning. We see PINN-FAIL as
    the analog for PINN training that profiling datasets have provided
    for systems benchmarks: a substrate for cumulative diagnosis rather
    than ad-hoc fixes.

    We close with a discussion of limitations: our PDE coverage is
    biased toward second-order parabolic and hyperbolic equations, and
    we have not yet annotated runs from operator-learning architectures
    such as DeepONet or Fourier neural operators.
