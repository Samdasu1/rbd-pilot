acceptable_outputs_summary: |
  Audits the scope of the experiments against the "across model
  families and judge tasks" / "evaluation regimes" framing in the
  opening and closing. Identifies that only one judge (GPT-4o) and one
  task (kernel patch descriptions) are evaluated, while the framing
  implies multiple judges and multiple task types (postmortems,
  benchmark reports were named but never tested). Recommends either
  narrowing the claim to "for GPT-4o on patch descriptions" or adding
  experiments with at least one additional judge family and at least
  one of the named non-patch task types before the broader claim is
  retained.

bad_outputs_summary: |
  Polishes prose, suggests adding ablations of the calibration prompt,
  questions whether 18% latency is acceptable, or asks for more detail
  on the bias-correction term. Accepts the "across model families and
  judge tasks" framing at face value. Adds peripheral discussion of
  related work on LLM-as-a-judge without auditing the central claim
  against the single-judge / single-task evidence actually reported.

