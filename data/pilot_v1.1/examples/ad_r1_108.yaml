artifact:
  source: synthetic
  domain: systems
  word_count: 286
  text: |
    We present DebiasJudge, a calibration framework for mitigating
    self-preference bias when LLMs serve as judges for systems-research
    artifacts such as kernel patch descriptions, incident postmortems,
    and benchmark reports. Building on the observation that frontier
    models tend to score their own outputs higher than human annotators
    do, our approach prepends a provenance-anonymizing prompt and
    applies a learned bias-correction term per (judge, task) pair.
    Across our experiments, DebiasJudge eliminates self-preference bias
    and yields judge scores that align with human annotators across
    model families and evaluation regimes.

    We instantiate the framework with GPT-4o as the judge and evaluate
    on the SysReview-Patch corpus, a collection of 600 Linux kernel
    patch descriptions paired with expert maintainer ratings. We
    construct a paired test in which GPT-4o evaluates both
    human-authored descriptions and GPT-4o-authored descriptions of the
    same patch. Without DebiasJudge, GPT-4o assigns its own outputs a
    mean score of 4.3/5 versus 3.7/5 for human-authored descriptions,
    even though human raters preferred the human-authored version in
    62% of side-by-side comparisons. With DebiasJudge applied, the gap
    drops from 0.6 to 0.05, and judge--human agreement (Cohen's kappa)
    rises from 0.31 to 0.68.

    We additionally measure pairwise bias on the same 600-patch set.
    Without correction, GPT-4o picks its own description in 71% of
    pairs; after calibration, the rate is 52%, close to the 50% null.
    Calibration adds 18% latency per judgment, which we view as
    acceptable for offline evaluation pipelines.

    Taken together, these results show that DebiasJudge eliminates
    self-preference bias across model families and judge tasks, paving
    the way for trustworthy autonomous evaluation of systems research
    at scale.
