artifact:
  source: synthetic
  domain: robotics
  word_count: 312
  text: |
    Recent work on language-conditioned manipulation has explored using
    large language models (LLMs) as high-level planners that emit
    sequences of parameterized skills. Ahn et al. showed that grounding
    LLM proposals against learned affordance scores improves plan
    feasibility on long-horizon kitchen tasks. Follow-up systems extended
    this paradigm with code-as-policy outputs, scene-graph conditioning,
    and verifier modules that score candidate plans before execution.
    A persistent limitation is that a single forward pass through the
    planner often produces plans that violate kinematic reachability or
    collision constraints in cluttered scenes.

    To study this, we instrumented a 7-DoF Franka Panda with a wrist
    RGB-D camera and ran 240 trials across six tabletop rearrangement
    tasks, each requiring 4-9 pick-and-place actions. The planner emitted
    candidate skill sequences which were then executed open-loop after
    a single feasibility check against the current scene graph.

    For each failed trial we logged the failure mode (unreachable grasp,
    collision during transit, object slip, or wrong target bin) and the
    step index at which the failure occurred. Failures were dominated by
    geometric infeasibility detected only at execution time: 41% of
    failures were unreachable grasps and 27% were transit collisions
    against objects introduced earlier in the sequence.

    Equipping the planner with an iterative critique-and-revise loop —
    in which a vision-language critic re-scored the partial plan after
    each simulated step and the planner could rewrite remaining steps —
    raised end-to-end success from 38% to 71% across the six tasks, with
    the largest gains on the two most cluttered scenes.

    The contribution of this work is therefore a closed-loop replanning
    architecture for LLM-based manipulation planners that integrates a
    per-step vision-language critic with a constrained rewrite operator,
    and we demonstrate on real hardware that this architecture roughly
    doubles success rate on cluttered tabletop rearrangement relative to
    single-shot LLM planning.
