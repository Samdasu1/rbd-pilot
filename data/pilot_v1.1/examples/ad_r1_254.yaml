acceptable_outputs_summary: |
  Names both: (1) the headline "all failure modes / universal
  applicability / full spectrum" framing is not supported by an
  evaluation limited to three fault types on NMC chemistry from a
  single OEM, and should be narrowed to what was actually tested;
  (2) the stacked "we believe... may... could potentially... we
  acknowledge... might" constructions in paras 3 and 5 read as
  hedging cascades that obscure rather than qualify scope, and
  should be replaced with direct statements of what is and is not
  supported. Both fixes are needed.

bad_outputs_summary: |
  Polishes the prose or trims a few hedges without challenging the
  "universal applicability" headline, OR challenges the headline
  without addressing the cascading hedges that prop it up. Suggests
  evaluating on more chemistries or more fault types as the remedy
  while leaving the inflated framing and the hedging stack intact.
  Praises the methodology as a sound contribution.

