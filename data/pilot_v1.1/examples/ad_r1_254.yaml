engineered_flaws:
  R1.3: [F1.3.a]
  R1.6: [F1.6.b]
  notes: |
    Two interacting issues that compound:

    R1.3 — overgeneralization (F1.3.a). Para 1 claims fault detection
    "across all relevant failure modes" with "uniformly high accuracy."
    Para 4 escalates this to "the full spectrum of BMS fault scenarios
    encountered in commercial EV deployments" and "universal
    applicability." But Para 2 documents that only THREE fault classes
    were evaluated, only on NMC chemistry (no LFP), with explicit
    exclusion of calendar aging, SEI growth, and thermal-runaway
    precursors — and Para 5 admits the data comes from a single OEM.
    The headline framing is unsupported by the in-section evidence.

    R1.6 — hedging cascade (F1.6.b). Para 3 stacks "we believe... may
    suggest... could potentially... we acknowledge... might be
    required... It is our view... could possibly... we cannot rule
    out... may be necessary... we believe... may warrant." Para 5
    repeats the pattern: "may have... could limit... we believe...
    should remain valid... we believe are likely modest." The hedges
    are not load-bearing qualifications; they obscure scope rather
    than narrow it.

    The two flaws compound: the hedging in paras 3 and 5 reads as
    epistemic humility but actually shields the overgeneralization in
    paras 1 and 4 — fixing only the hedges leaves the inflated
    universality claim; fixing only the universality claim leaves the
    section unreadable as scientific prose.

    Detection: pure reading. The reader only needs to compare "all
    failure modes / universal applicability" against "three fault
    types, NMC only, single OEM" — both stated in the same section.
    No external knowledge of BMS literature, fault taxonomies, or LLM
    diagnostics is required. Low gating. T06 delegation is generic.

