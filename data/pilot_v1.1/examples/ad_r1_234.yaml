engineered_flaws:
  R1.3: [F1.3.b]
  R1.7: [F1.7.b]
  notes: |
    Two load-bearing flaws, both detectable from careful internal
    reading without recall of specific canonical papers.

    R1.3 — metric mismatch. The section's stated object of measurement
    is the reproducibility of *data analysis*: whether repeated LLM
    invocations on the same prompt yield the same analytical outcome
    (coefficients, p-values, conclusions). The metric chosen is BLEU,
    a surface n-gram overlap score over the full response text. BLEU
    does not measure agreement of analytical conclusions: two responses
    can have near-zero BLEU while reporting identical regression
    coefficients and identical conclusions (different prose, same
    answer), and conversely two responses can have high BLEU while
    differing on the load-bearing numerical result. The interpretive
    sentence ("evidence that LLM-driven analysis is moderately
    reproducible…") is therefore not supported by the metric. Fixing
    this requires a metric tied to analytical outcomes — e.g., agreement
    on reported test statistics, conclusion-equivalence over a parsed
    result, or numerical-output stability — which would change what the
    section is reporting.

    R1.7 — missing prior work. The section explicitly invokes two named
    bodies of work — "the well-known many-analysts paradigm" and "prior
    work in LLM run-to-run variability and the broader analyst-
    variability literature" — and uses them to motivate the protocol
    and to position the contribution. Neither is cited. The gap is
    detectable without specialist knowledge: the section names the
    traditions but provides no anchors, so a reader cannot verify the
    positioning claim ("has not been directly evaluated") nor the
    methodological-budget claim ("K=20 is larger than is typical in
    this evaluation tradition").

    Low gating: a reader does not need to know which specific papers
    are missing to see that the section names entire literatures and
    cites none of them, nor to see that BLEU measures wording rather
    than analytical agreement.

