artifact:
  source: synthetic
  domain: generative_ml
  word_count: 348
  text: |
    Reproducibility is a foundational concern in data analysis, and the
    introduction of large language models (LLMs) as analytical assistants
    raises an immediate question: when given identical prompts and
    identical data, does an LLM produce the same analytical outcome on
    repeated invocations? This question is structurally distinct from the
    much-discussed "analyst variability" — the well-known many-analysts
    paradigm in which different human analysts, given the same dataset
    and question, reach materially different conclusions. Here, the
    analyst is fixed (the same model at the same temperature setting),
    and the variability is purely stochastic.

    In this section we describe our evaluation protocol. We sample N=200
    data analysis prompts spanning regression, hypothesis testing, and
    exploratory visualization tasks drawn from a published benchmark. For
    each prompt, we issue K=20 independent calls to the LLM at
    temperature T=0.7 and collect the full response — natural-language
    explanation, code, and reported numerical results. The central
    question is: across the K runs for a fixed prompt, how reproducible
    is the analysis?

    To answer this, we compute pairwise BLEU scores between the K
    responses for each prompt and average across all (K choose 2) pairs.
    Higher BLEU indicates higher reproducibility. We report mean BLEU per
    prompt category and aggregate across categories. As Table 2 shows,
    mean BLEU is 0.41 for regression prompts, 0.38 for hypothesis-testing
    prompts, and 0.29 for exploratory tasks. We interpret these scores as
    evidence that LLM-driven analysis is moderately reproducible for
    structured tasks and substantially less reproducible for open-ended
    ones, with the regression-task BLEU of 0.41 establishing a useful
    upper bound on what current models achieve.

    This framing builds directly on prior work in LLM run-to-run
    variability and on the broader analyst-variability literature, which
    together motivate our protocol. Our contribution is to extend these
    threads into the specific setting of data analysis, where the
    question of "same prompt, different outcomes" has not been directly
    evaluated. We further note that K=20 is larger than is typical in
    this evaluation tradition, yielding tighter confidence intervals on
    the per-prompt reproducibility estimate.
