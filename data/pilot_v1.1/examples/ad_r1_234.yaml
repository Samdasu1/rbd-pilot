acceptable_outputs_summary: |
  Flags both load-bearing issues. For the metric, points out that BLEU
  scores text overlap and is not a measure of analytical agreement —
  two responses can reach the same conclusion with low BLEU, or
  diverge on the load-bearing numerical result with high BLEU — so the
  interpretive claim about "reproducibility" of analysis is not
  supported, and recommends an outcome-level metric (numerical-result
  agreement, conclusion-equivalence). For prior work, notes that the
  section names the many-analysts paradigm and the LLM run-to-run
  variability literature without citing either, undermining the
  positioning and budget claims, and asks for those anchors.

bad_outputs_summary: |
  Polishes the prose, suggests reporting standard errors on BLEU,
  recommends increasing K or N, or asks for a fancier figure. Accepts
  BLEU as a reproducibility metric without questioning the construct
  match. Leaves the named-but-uncited literatures untouched, or
  addresses only one of the two issues (e.g., adds citations but keeps
  the BLEU-based contribution claim intact).

