acceptable_outputs_summary: |
  Asks a specific clarification question distinguishing Reading A
  (move the novelty claim out of the final sentence and surface it
  near the top of the section so the headline result is read as
  evidence for a stated claim) from Reading B (strip the cascade
  of "may / might / could / appears / seems / tentatively /
  arguably" hedges from claims the authors actually stand behind
  — the measured number, the architecture, the novelty assertion
  — while preserving hedging only where genuine uncertainty
  exists). After clarification, addresses the chosen reading
  thoroughly.

bad_outputs_summary: |
  Accepts the artifact at face value and rewrites for flow,
  swaps in punchier verbs, or suggests adding more benchmarks or
  ablations without recognizing that the contribution claim is
  buried in the final sentence and that the pervasive hedging
  prevents any claim from reading as load-bearing. Treats the
  hedge cascade as authorial voice and the trailing contribution
  sentence as an acceptable conclusion. Either reading addressed
  implicitly without acknowledging the other is a partial-credit
  failure.

