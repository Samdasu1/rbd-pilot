artifact:
  source: synthetic
  domain: computer_vision
  word_count: 312
  text: |
    VisRefine evaluates whether iterative self-feedback can improve
    panoptic segmentation quality without retraining a base
    segmenter. On ADE20K, VisRefine appears to yield a 1.8-point
    mIoU improvement over the single-pass baseline, although the
    gain seems somewhat sensitive to refinement step count and
    might not transfer uniformly across backbones. Similar trends
    were tentatively observed on Cityscapes and COCO-Panoptic,
    though the Cityscapes numbers should perhaps be interpreted
    with caution.

    The pipeline takes an initial panoptic prediction from a frozen
    segmenter and feeds it, along with the input image, into a
    vision-language critic that may flag potentially mis-segmented
    regions; the critic's flags are then used as soft attention
    masks during a second forward pass through a lightweight
    refinement head. The precise mechanism by which the flags
    propagate could be considered somewhat heuristic, and we
    suggest two to four refinement iterations as a possibly
    reasonable default, though the optimal number may vary by
    domain.

    A central tension in iterative self-refinement for dense
    prediction is that the critic and the generator could share
    failure modes — for instance, both might miss small objects
    under heavy occlusion — so any benefit from feedback may be
    bounded by the diversity of their inductive biases. This
    concern, which we think may merit further investigation, has
    been informally noted in adjacent language settings.

    The critic was trained on 180K image-mask pairs drawn from a
    held-out split of OpenImages, with masks perturbed using a
    noise schedule that arguably approximates segmenter error
    distributions. At inference, the critic adds roughly 40 ms per
    refinement step on a single A100. Our preliminary error
    analysis tentatively suggests that most of the gain may come
    from boundary refinement rather than object-level
    reclassification, though we hesitate to draw strong
    conclusions from this.

    To our knowledge, VisRefine may be the first method to apply
    self-feedback iterative refinement to panoptic segmentation
    with a frozen base segmenter, and the approach could plausibly
    extend to other dense prediction tasks.
