acceptable_outputs_summary: |
  Identifies that the experimental-results paragraph (the one reporting
  per-PDE L2 errors, Fourier-feature comparisons, and training-time
  ratios) does not belong in a benchmark-construction section and
  proposes moving it into the Experiments / Results section. Notes
  that the surrounding paragraphs are about design (manifest schema,
  runner interface, scoring metric) and that the misplaced block
  conflates "what the benchmark is" with "what we observed on it."
  Provides a concrete relocation rather than line-level edits.

bad_outputs_summary: |
  Polishes the prose, sharpens the transition sentences, or suggests
  reporting more PDE families or more baseline architectures. Treats
  the embedded results paragraph as a normal part of methods and only
  recommends tightening its numbers, adding error bars, or rewording
  the scoring-metric paragraph. Does not flag that an entire paragraph
  belongs in a different section.

