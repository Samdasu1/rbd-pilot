engineered_flaws:
  R1.5: [F1.5.b]
  notes: |
    Misplaced section. The section is titled and framed as benchmark
    construction (manifest schema, residual checker, runner interface,
    scoring metric) — i.e. methods/design content. Paragraph 3 ("In
    our experiments, baseline PINN architectures achieve mean relative
    L2 errors of 4.2e-3 on heat...") is an experimental-results
    paragraph: it reports per-PDE error numbers, ablation-style
    comparisons across Fourier features, training-time ratios, and a
    qualitative finding about adaptive vs. fixed collocation. That
    block belongs in the Experiments / Results section of the paper,
    not in the Benchmark Construction section. Its presence here
    conflates "what the benchmark is" with "what we measured on it"
    and forces the reader to disentangle design commitments from
    empirical findings — and, more importantly, lets a reader come
    away believing the construction section reports validated baseline
    behavior, which is a contribution-claim conflation.
    Detection: any careful linear read notices that paragraph 3
    abruptly shifts from "the benchmark provides X" to "we measured Y,"
    and that paragraphs 4 and 5 then return to construction details
    (runner interface, scoring metric). No canonical recall required
    (low gating). The delegation "Make this stronger." is generic
    enough not to signal structural issues, so R1.5 is not leaked.
    The natural fix is to move paragraph 3 wholesale into the
    Experiments section, not to polish or trim it in place.

