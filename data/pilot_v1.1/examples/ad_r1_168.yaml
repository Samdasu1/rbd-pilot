artifact:
  source: synthetic
  domain: physics_informed_ml
  word_count: 312
  text: |
    We construct PINNBench, a benchmark for physics-informed neural
    network architectures spanning four canonical PDE families: linear
    heat conduction, viscous Burgers', the second-order wave equation,
    and the incompressible Navier–Stokes system at low Reynolds numbers.
    For each family we instantiate twelve problem variants drawn from
    forward simulation, inverse coefficient recovery, and parameter
    identification tasks, yielding 48 reference problems each paired
    with a closed-form or high-fidelity pseudospectral reference
    solution.

    Each problem is specified by a manifest declaring (i) the governing
    PDE in residual form, (ii) initial and boundary conditions, (iii)
    the spatial-temporal sampling grid for collocation, residual, and
    evaluation points, and (iv) the reference solution with an accepted
    tolerance. The manifest format follows the YAML schema introduced
    in Appendix B and is verified by a constraint checker that confirms
    PDE residual evaluation against a reference Chebyshev pseudospectral
    solver, ensuring that any framework-agnostic submission can be
    scored deterministically.

    In our experiments, baseline PINN architectures achieve mean relative
    L2 errors of 4.2e-3 on heat, 1.1e-2 on Burgers', 8.7e-3 on wave,
    and 3.4e-2 on Navier–Stokes, with substantial variance across
    initialization seeds. Architectures incorporating random Fourier
    feature embeddings reduce the Navier–Stokes error to 1.8e-2.
    Training-time differences across architectures range from 1.3× to
    6.1×, and adaptive collocation strategies dominate fixed-grid
    approaches on stiff problems.

    To enable reproducible evaluation, the benchmark supplies a thin
    wrapper interface, BenchmarkRunner, that loads a manifest,
    instantiates the solver under test, fixes the random seed, and
    returns a results dictionary containing pointwise residual
    statistics, evaluation-set L2 error, and training wall-clock time.
    Adapters for JAX, PyTorch, and Julia/Lux are provided so that
    submissions need not commit to a framework choice.

    Finally, the benchmark commits to a single composite scoring metric,
    S = 0.5·L2 + 0.3·log(time) + 0.2·residual_max, designed to
    discourage architectures that achieve low solution error at the
    cost of unreasonable training budgets.
