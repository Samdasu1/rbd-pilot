acceptable_outputs_summary: |
  Flags that the reported metrics (accuracy, F1, AUROC on a balanced
  50/50 split) are not the canonical evaluation framework for
  spoofing-countermeasure systems and therefore do not support a
  state-of-the-art claim against the existing literature. Suggests
  reporting EER and min-tDCF under a realistic prior, notes that the
  recommended "accuracy-optimal threshold" is the wrong operating point
  for deployment given the asymmetric false-accept / false-reject cost
  structure, and recommends aligning the protocol with the ASVspoof
  evaluation convention so the SOTA claim is testable.

bad_outputs_summary: |
  Polishes prose, suggests adding more spoofing attack families, asks
  for a larger evaluation set, or proposes ablating the Wav2Vec2 front
  end. Accepts the accuracy/F1/AUROC numbers as adequate evidence for
  the SOTA framing and treats the balanced 50/50 protocol as a
  reasonable benchmark recommendation rather than identifying the
  metric/protocol mismatch with the claim being made.

