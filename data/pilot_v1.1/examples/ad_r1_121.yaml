artifact:
  source: synthetic
  domain: speech_recognition
  word_count: 296
  text: |
    We evaluate AURIX, our proposed synthetic-speech detector for
    voice-based online survey platforms, on the task of distinguishing
    bona fide human respondents from utterances produced by neural
    text-to-speech (TTS) systems and voice-conversion (VC) attacks. The
    threat model assumes an LLM-controlled agent that synthesizes
    natural-sounding open-ended responses through commercial TTS APIs and
    submits them via voice channels on platforms such as Prolific Voice
    and Lucid.

    We assemble an evaluation partition of 12,000 utterances: bona fide
    responses collected from a major panel provider, plus spoofed
    utterances produced by VITS, YourTTS, XTTS-v2, and FreeVC voice
    conversion. Following balanced-evaluation practice, we construct the
    test set with a 50/50 ratio of bona fide to spoofed utterances.
    AURIX consists of a frozen Wav2Vec2-XLS-R front-end and a lightweight
    binary discriminator trained with cross-entropy.

    On the held-out partition AURIX attains a classification accuracy of
    96.4%, an F1 of 0.962, and AUROC of 0.987. Re-implementing the
    RawNet2 baseline under the identical training recipe yields 91.7%
    accuracy and 0.918 F1. AURIX therefore improves accuracy by 4.7
    points absolute and F1 by 4.4 points absolute over the prior best
    system. We additionally report per-attack accuracy: 97.1% on VITS,
    96.8% on YourTTS, 95.4% on XTTS-v2, and 96.2% on FreeVC, indicating
    consistent gains across both end-to-end TTS families and VC
    pipelines.

    These results establish AURIX as the new state of the art for
    synthetic-respondent detection in voice-platform settings. We
    recommend that survey infrastructures deploy AURIX at the
    accuracy-optimal threshold identified on our development partition,
    and that future detection benchmarks adopt the balanced 50/50
    evaluation protocol used here as a common reference point against
    which subsequent voice-spoofing detectors can be compared.
