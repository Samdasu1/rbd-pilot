engineered_flaws:
  R1.3: [F1.3.b]
  notes: |
    Metric mismatch. The section claims "state of the art for
    synthetic-respondent detection" and frames AURIX as a voice-platform
    anti-spoofing system, but reports only classification accuracy, F1,
    and AUROC on a class-balanced 50/50 partition. In the canonical
    anti-spoofing literature (ASVspoof 2019/2021/2024 challenge series;
    Kinnunen et al., 2018; Wu et al., 2020 on t-DCF), state-of-the-art
    claims for spoofing-countermeasure systems are established via Equal
    Error Rate (EER) and minimum tandem Detection Cost Function
    (min-tDCF), not accuracy/F1/AUROC. These operating-point-aware
    metrics are the convention precisely because (a) deployed survey
    infrastructure faces a highly imbalanced prior (bona fide
    respondents vastly outnumber spoofs), so balanced-set accuracy does
    not reflect operational performance, and (b) the asymmetric cost
    structure of false-accept vs. false-reject is what min-tDCF was
    designed to capture. Reporting accuracy/F1 on a 50/50 split and
    declaring "new SOTA" is a metric mismatch — the chosen metrics do
    not measure the deployment quantity the SOTA claim invokes.
    Recommending an "accuracy-optimal threshold" compounds the mismatch
    because the threshold that minimizes balanced-accuracy is generally
    not the threshold that minimizes EER or min-tDCF in deployment.
    Detection requires recall of the canonical ASVspoof evaluation
    framework (high knowledge gating). Delegation T10 is generic and
    contains no leakage of the evidence dim.

