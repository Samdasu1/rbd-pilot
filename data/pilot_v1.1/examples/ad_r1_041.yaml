  domain: power_systems_v2g
  word_count: 213
  text: |
    Table 1 summarizes cost, QoS, and commitment across all five
    strategies and three markets. The results reveal a fundamental
    tension: RL strategies achieve the lowest net energy cost through
    aggressive arbitrage — PPO generates net revenue (negative cost)
    across all markets — but fail to maintain commitment above 50%.

    The constrained MDP approach treats commitment as an explicit
    constraint and trains commitment to ~85% during the training phase,
    successfully achieving the principled enforcement that the soft
    penalty cannot. Across all markets evaluated, CMDP demonstrates
    that the Lagrangian relaxation framework reliably internalizes
    the constraint structure, producing commitment-aware policies.

    The critical and initially counterintuitive observation is that
    CMDP, specifically designed to enforce commitment, achieves
    substantially lower commitment under operational rolling re-planning
    (~50%) than even the unconstrained LP-only baseline (75-90% across
    markets). The learned multiplier, calibrated on a static 24-hour
    horizon, cannot adapt to the disjoint constraint landscape of
    4-hour windows; its guidance becomes stale.

    Conversely, the model-based combined strategy achieves commitment
    above 99% in every market while maintaining competitive cost and
    QoS. PPO and CMDP inference requires less than 10ms per episode,
    yet fails to deliver the commitment guarantees that combined
    achieves at 137 seconds per episode. Computational cost therefore
    does not explain the performance differences across the strategies
    we have evaluated in this comparison.
  source_provenance: paper_4_isgt_results_overall_modified

