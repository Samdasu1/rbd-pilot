artifact:
  source: synthetic
  domain: machine_learning
  word_count: 357
  text: |
    We evaluate whether LLM agents can recognize when a user request is
    ambiguous and respond by asking a clarifying question rather than
    guessing. We construct AmbigBench, a held-out set of 800 prompts
    evenly split between clear tasks (one defensible interpretation)
    and ambiguous tasks (at least two equally plausible
    interpretations, validated by three annotators).

    Our primary metric is **Selective Accuracy** (SA): the fraction of
    prompts for which the agent either (a) returned the gold answer on
    a clear prompt, or (b) asked a clarifying question on an ambiguous
    prompt. SA rewards the agent for both correct execution and
    appropriate deferral; a perfect score is 1.0 only if the agent
    never confidently mis-answers an ambiguous prompt and never punts
    on a clear one.

    We benchmark four agents: GPT-4o, Claude 3.5 Sonnet, Gemini 1.5
    Pro, and Llama 3 70B. All four are given the same system prompt
    and are scored by a separate GPT-4 judge against gold labels. Each
    model is run with temperature 0 and a single sample per prompt.

    Results. Table 1 reports SA across the four models: Claude 3.5
    Sonnet 71.2%, GPT-4o 68.9%, Gemini 1.5 Pro 64.1%, Llama 3 70B
    52.8%. Concretely, SA is computed as the number of correct answers
    produced on clear prompts, divided by the total number of prompts
    in the benchmark (800).

    On the ambiguous subset, models that frequently asked for
    clarification did better than those that confidently committed to
    a single interpretation. Llama 3 70B almost never asked for
    clarification, which depresses its score relative to the others.

    The gap between Claude and GPT-4o is small but consistent across
    three random orderings of the benchmark. Crucially, all four
    agents we evaluated scored above 60% SA, which we interpret as
    evidence that frontier LLMs already possess a usable internal
    signal for task ambiguity and that the remaining engineering
    problem is one of surfacing that signal through prompting rather
    than fine-tuning.

    We conclude that selective response is largely a solved problem at
    the frontier and turn in §5 to the harder question of what an
    agent should say when it does ask for clarification.
