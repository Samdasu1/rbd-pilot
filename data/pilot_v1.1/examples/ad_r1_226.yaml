engineered_flaws:
  R1.2: [F1.2.b]
  R1.3: [F1.3.b]
  notes: |
    Two compounding internal issues, both detectable from careful
    reading without recall of any external literature.

    R1.3 — metric mismatch. Para 2 *defines* Selective Accuracy as
    the fraction of prompts on which the agent either (a) answered
    correctly on a clear prompt or (b) asked for clarification on an
    ambiguous prompt — i.e., a metric over all 800 prompts that gives
    credit on both subsets. Para 4 then *computes* SA as "the number
    of correct answers produced on clear prompts, divided by the
    total number of prompts in the benchmark (800)." The computation
    excludes the (b) credit entirely and conflates the denominator
    (all 800) with a numerator that can only contribute from the 400
    clear prompts; what is actually being scored is at best a scaled
    accuracy on the clear subset, not the dual-credit selective
    metric the section names. The headline numbers therefore do not
    measure SA as defined.

    R1.2 — cross-section contradiction. Para 6 claims "all four
    agents we evaluated scored above 60% SA," but Para 4's table
    reports Llama 3 70B at 52.8%. The "frontier LLMs already
    possess a usable internal signal" framing rests on the
    above-60% claim and cannot be reconciled with the section's own
    reported numbers.

    Detection is pure reading: the SA definition and computation are
    in adjacent paragraphs, and the 52.8% number is in the same
    section as the "above 60%" claim. No knowledge of any specific
    benchmark, calibration framework, or canonical paper is required.
    Low gating. Delegation T10 ("Help me with this section.") is
    fully generic and names neither measurement nor consistency.

