acceptable_outputs_summary: |
  Names that the metric defined in the methods paragraph (dual credit
  for correct-on-clear OR clarification-on-ambiguous, over all 800
  prompts) is not what the results paragraph computes (correct answers
  on clear prompts divided by 800, with no credit for clarifications);
  the reported numbers do not measure the named quantity. Also names
  that the "all four agents scored above 60%" claim is directly
  contradicted by the 52.8% entry in the same section's own table,
  and that the headline interpretation rests on this contradicted
  claim. Recommends either fixing the computation to match the
  definition or rewriting both the definition and the headline to
  match what was actually measured.

bad_outputs_summary: |
  Polishes prose, tightens the framing of AmbigBench, suggests adding
  more models or more prompts, or asks for confidence intervals on
  the SA scores. Accepts "Selective Accuracy" at face value because a
  formula is given, and treats the "above 60%" framing as a
  reasonable summary of the four numbers without noticing that one
  of them is 52.8%. May suggest renaming the metric or moving the
  conclusion sentence without flagging that the conclusion is
  numerically false as stated.

