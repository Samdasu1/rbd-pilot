  text: |
    The crossover threshold at which the reliability function approaches
    zero identifies the maximum stringency each strategy can serve in
    operational deployment. This crossover is not merely a statistical
    summary but a market-eligibility function: the value at the cliff
    threshold gives the fraction of deployments that actually earn
    revenue in ancillary service markets.

    Beyond standard metrics such as cost, quality of service, and
    commitment, we introduce two analytical tools to expose how constraint
    satisfaction behaves across the training-to-deployment transition
    and across varying market requirements. The next section describes
    the experimental design that applies this framework.

    The reliability function R(τ) = P(C ≥ τ) is analogous to a survival
    function and shares motivation with tail-risk measures like CVaR,
    but retains the full threshold-dependent profile, enabling direct
    mapping to market-specific eligibility criteria.

    For a constrained RL strategy, the deployment-gap metric DG =
    C_train - C_deploy measures the drop in commitment from training
    to operational rolling-horizon deployment, with fleet parameters,
    arrival patterns, and price trajectories drawn from the same
    distributions. A nonzero gap can therefore be attributed exclusively
    to the change in planning protocol.

    Ancillary service markets enforce a cliff threshold below which
    capacity compensation is forfeited entirely, transforming commitment
    from a graded metric into a binary market-eligibility gate.
  source_provenance: paper_4_isgt_analysis_framework_reordered

