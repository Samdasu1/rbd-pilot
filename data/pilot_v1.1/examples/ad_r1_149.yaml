artifact:
  source: synthetic
  domain: numerical_analysis
  word_count: 374
  text: |
    We introduce PolySolve, a panel-based verification protocol for
    solutions to stiff initial-value problems. The approach is to run a
    diverse ensemble of numerical solvers on the same IVP and use
    cross-solver disagreement as a runtime estimate of numerical
    uncertainty, in the spirit of recent ensemble-based verification
    work in scientific computing.

    The panel comprises five solvers spanning four method families: a
    4th-order explicit Runge-Kutta scheme (RK4), a 5th-order backward
    differentiation formula (BDF5), a Rosenbrock-Wanner method
    (ROS3PL), an exponential integrator (EXP4), and an implicit-explicit
    additive Runge-Kutta scheme (ARK4). Each solver runs with adaptive
    step-size control targeting a local error tolerance of 1e-8 in the
    infinity norm. Solver outputs are aggregated using a weighted
    median, with weights inversely proportional to each solver's
    estimated local truncation error.

    In our experiments on the Robertson stiff system, PolySolve flagged
    12.4% of integration intervals as uncertain over 1e4 simulated
    seconds. Flagged intervals concentrated near the slow-fast
    transition around t = 1e2 s, where individual solvers produced
    solutions disagreeing by up to three orders of magnitude in the
    smallest-magnitude species. On the HIRES problem, the flagged-
    interval rate dropped to 4.1%, and on the Van der Pol oscillator
    with mu = 1e6 it was 7.8%. These rates correlate with conditioning
    estimates from the Jacobian spectral radius, suggesting the panel's
    disagreement statistic captures genuine numerical sensitivity
    rather than method-family idiosyncrasy.

    Given panel outputs y_i(t) for solvers i = 1..5, our verification
    statistic is V(t) = max_{i,j} || y_i(t) - y_j(t) ||_2 /
    max_i ||y_i(t)||_2, a normalized relative disagreement measure.
    When V(t) exceeds a user-specified tolerance tau, the integration
    is flagged as numerically ill-conditioned at that time-point. We
    default to tau = 1e-4, calibrated to give roughly 5% flagging on
    well-conditioned reference problems.

    The cost of PolySolve scales linearly with panel size; on the test
    problems it ran in 4.2x the wallclock time of the fastest single
    solver (BDF5). We discuss optimization strategies, including
    selective solver activation based on a cheap pre-screening step,
    in Section 5.
