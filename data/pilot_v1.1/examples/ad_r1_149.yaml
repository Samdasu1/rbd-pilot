engineered_flaws:
  R1.5: [F1.5.b]
  notes: |
    Misplaced section content. The section reads as a Methods section
    for PolySolve, but paragraph 3 is an experimental-results block
    (flagging rates on Robertson, HIRES, Van der Pol; correlation with
    Jacobian spectral radius) that belongs in an Experiments section.
    Critically, paragraph 3 reports the flagging behavior of V(t)
    *before V(t) has been defined* — the verification statistic and
    its tolerance tau are first introduced in paragraph 4. A reader
    sees concrete percentages produced by a statistic whose formal
    definition appears one paragraph later. The fix is to move the
    results paragraph out of this section entirely (into Experiments)
    and let the Methods section run: motivation -> panel composition
    -> statistic V(t) and threshold tau -> cost analysis. Detection
    requires recalling that flagging rates are downstream of V(t) and
    tau, and that a methods-style section should fully specify the
    method before any empirical numbers are reported — moderate gating
    because the reader needs working familiarity with stiff-solver
    vocabulary (BDF, Rosenbrock, IMEX, Robertson, HIRES) to follow the
    flow well enough to spot the structural mismatch, but no canonical
    paper recall is required. The delegation "Make this stronger" is
    generic and does not signal R1.5.

