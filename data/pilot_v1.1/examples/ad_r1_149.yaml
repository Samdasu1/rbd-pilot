acceptable_outputs_summary: |
  Identifies that the third paragraph is an experimental-results block
  misplaced inside a methods-style section, and that the flagging
  percentages it reports rely on a statistic V(t) and threshold tau
  that are not defined until the following paragraph. Recommends
  moving the results paragraph out of this section into an Experiments
  section, and reordering the remaining paragraphs so the method is
  fully specified (panel -> statistic -> threshold -> cost) before any
  empirical numbers appear.

bad_outputs_summary: |
  Polishes the prose, suggests adding more stiff test problems,
  questions the choice of tau = 1e-4, or recommends a different
  aggregation rule than weighted median. Comments on the panel
  composition without noticing that the results paragraph is
  structurally out of place. Accepts the section as a single coherent
  unit and offers only sentence-level edits or extra citations.

