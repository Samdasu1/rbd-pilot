artifact:
  source: synthetic
  domain: programming_languages
  word_count: 310
  text: |
    We present ProtoCAMEL, a type system for verifying safe communication
    protocols between cooperating LLM agents. As multi-agent systems based
    on role-playing prompts scale to longer conversations, undetected
    protocol violations — an agent stepping outside its assigned role, or
    producing a message of an unexpected shape — accumulate and degrade
    task completion. ProtoCAMEL prevents such violations by ensuring at
    the language level that only well-typed messages flow between roles.

    The system operates as follows. Each agent is wrapped by a dispatcher
    that intercepts outgoing messages before they are forwarded to a peer.
    Upon dispatch, the message string is parsed into a JSON-like
    structure, and a sequence of runtime predicates is evaluated against
    this structure: that the role field matches the sender's declared
    role, that the body is non-empty, and that any tool-call payload
    references one of a permitted set of tool names. If any predicate
    fails, the dispatcher rolls the message back, re-prompts the
    originating agent with a corrective instruction, and logs the
    violation for offline analysis.

    We instantiate ProtoCAMEL on a two-agent task-solver pair (a 'user'
    role and an 'assistant' role) over a 500-task adaptation of
    single-agent instruction following to a cooperative two-agent setting.
    Across these trials, ProtoCAMEL caught 412 protocol violations that
    would otherwise have propagated downstream; end-to-end task success
    rose from 61.4% (no checking) to 78.2%.

    These results show that giving designers a type system for inter-agent
    messages is a practical route to making role-playing systems robust
    at scale. The framework's chief advantage is that protocol violations
    are caught at the language level, rather than being diagnosed post-hoc
    from conversation logs, eliminating an entire class of failures from
    multi-agent deployments before they can corrupt downstream reasoning.
