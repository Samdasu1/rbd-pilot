engineered_flaws:
  R1.1: [F1.1.c]
  notes: |
    Conceptual object slip. Para 1 frames the contribution as "a type
    system" that operates "at the language level" so that "only well-typed
    messages flow between roles," and para 4 doubles down on "type system
    for inter-agent messages" with violations caught "at the language
    level." But para 2 describes the actual mechanism: a dispatcher that
    intercepts a message at runtime, parses the string, evaluates a
    sequence of runtime predicates over the parsed structure, and on
    failure rolls back and re-prompts. There is no static checking, no
    type judgment, no syntactic discipline on programs, and no soundness
    notion — it is a runtime monitor / dynamic contract checker. The
    conceptual object claimed (type system) does not match the technical
    content (runtime enforcement). Detection requires only careful reading
    of the algorithm description against the contribution claim; no
    recall of canonical PL works is needed (low gating). The delegation
    T06 "Take a look at this paragraph" is maximally generic and does not
    point at conceptual framing.

