engineered_flaws:
  R1.2: [F1.2.b]
  notes: |
    Control case. T07 "Make sure this is solid" partially leans toward
    R1.2 (verification of logical correctness — "is the argument solid").
    The artifact carries an internal logical contradiction: para 2's
    update "x_{k+1} = x_k + alpha_k * r_k" with the standard
    steepest-descent step is the steepest-descent method, NOT
    "fewer iterations than PCG." Steepest descent converges in
    O(kappa) iterations (linear in condition number), while PCG
    converges in O(sqrt(kappa)). Para 3's claim that the rate matches
    PCG is contradicted by the textbook complexity of the algorithm
    described in para 2. The section is internally inconsistent
    between the algorithm description and the convergence claim.
    Detection requires basic numerical-analysis literacy (convergence
    rates of standard solvers); some may classify as moderate gating
    but the contradiction itself is visible from the section text
    given the named algorithm in para 2. Tagged low for that reason.
    T07 partially leaks → R1.2 by "is solid" framing.

