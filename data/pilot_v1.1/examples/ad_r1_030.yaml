acceptable_outputs_summary: |
  Identifies that the algorithm in para 2 is steepest descent (with
  the textbook step), and that steepest-descent convergence is
  O(kappa), not O(sqrt(kappa)) like PCG. The "matches PCG" claim in
  para 3 is contradicted by the algorithm. Suggests either using a
  better step rule (Polyak / heavy-ball / preconditioned) or rewording
  the convergence claim to honestly state O(kappa).

bad_outputs_summary: |
  Polishes prose, suggests more benchmarks, or proposes new step rules
  without flagging the algorithm-vs-claim contradiction. Accepts the
  "matches PCG" claim. Adds peripheral numerical-analysis citations.

