artifact:
  source: synthetic
  domain: numerical_analysis
  word_count: 221
  text: |
    We propose a new iterative solver for sparse linear systems that
    converges in fewer iterations than standard preconditioned conjugate
    gradient (PCG) on a range of benchmark problems. Our key insight is
    a curvature-adaptive step-size schedule that adjusts the step length
    based on local Hessian information.

    The solver operates on linear systems Ax = b where A is symmetric
    positive definite. At each iteration, we compute the residual
    r_k = b - A*x_k and update the iterate as x_{k+1} = x_k + alpha_k * r_k,
    where alpha_k is the curvature-adaptive step. The step is computed
    as alpha_k = (r_k^T r_k) / (r_k^T A r_k), which is the standard
    steepest-descent step.

    We prove that the iterates converge to the true solution in at most
    O(kappa * log(1/epsilon)) iterations, where kappa is the condition
    number of A. This matches the convergence rate of PCG.

    In our experimental evaluation, we apply the solver to three
    benchmark problems: a 1000x1000 finite-element stiffness matrix, a
    5000x5000 graph Laplacian, and a 200x200 dense correlation matrix.
    On each, our solver converges in fewer iterations than PCG with a
    Jacobi preconditioner.

    Convergence is monotonic: the residual norm decreases at every
    iteration. We verify this empirically across all three benchmarks.

    We position our solver as a practical alternative to PCG for sparse
    SPD systems where iteration count is the limiting cost.
