artifact:
  source: synthetic
  domain: graph_neural_networks
  word_count: 297
  text: |
    We present SelectGNN, a graph neural network for selective node
    classification under structural ambiguity. SelectGNN augments standard
    message-passing architectures with a learned abstention head that
    allows the model to decline to predict on nodes whose local
    neighborhood is insufficient to disambiguate the label. A central
    design goal of SelectGNN is to be fully inductive: the model
    generalizes to nodes and entire graphs unseen at training time, with
    no fine-tuning or re-optimization required when new nodes are
    introduced into the graph.

    The abstention head is implemented as a two-layer MLP applied to each
    node's representation after L rounds of message passing. It outputs a
    scalar confidence score; nodes whose score falls below a threshold
    tau are abstained. We tune tau on a held-out portion of the training
    graph by minimizing a coverage-risk objective that trades off accuracy
    on accepted nodes against the abstention rate.

    To capture node-specific information that is not recoverable from
    neighborhood structure alone — for example, the long-run citation
    behavior of an individual author in a citation network — SelectGNN
    learns a dedicated embedding vector e_v for each node v in the input
    graph, jointly with the GNN parameters. The final node representation
    is the concatenation of the message-passing output h_v^L and the
    learned embedding e_v, which is then passed to both the classification
    head and the abstention head.

    We evaluate SelectGNN on the OGB-Arxiv and OGB-Products benchmarks
    under the standard inductive evaluation protocol, where test nodes
    are unseen at training time. SelectGNN improves selective accuracy
    over GraphSAGE-Abstain by 6.3% at 80% coverage on OGB-Arxiv. We
    attribute this gain to the abstention head's ability to flag
    structurally ambiguous nodes and to the inductive design that allows
    the same trained model to be applied to any new graph without
    modification.
