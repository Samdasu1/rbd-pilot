engineered_flaws:
  R1.2: [F1.2.b]    # cross-section contradiction
  notes: |
    Cross-section contradiction. Paragraph 1 stakes the contribution on
    SelectGNN being "fully inductive," generalizing "to nodes and entire
    graphs unseen at training time, with no fine-tuning or re-optimization
    required when new nodes are introduced." Paragraph 3 then describes
    the architecture as learning "a dedicated embedding vector e_v for
    each node v in the input graph, jointly with the GNN parameters,"
    which is concatenated into the final representation used by both
    heads. Per-node learned embeddings are by construction transductive:
    no e_v exists for nodes unseen at training time, so the model cannot
    be applied to a new node without re-optimization. Paragraph 4 doubles
    the contradiction by claiming evaluation under "the standard inductive
    evaluation protocol, where test nodes are unseen at training time,"
    which the architecture as described cannot satisfy. The contribution
    claim and the technical design are inconsistent. Detection requires
    only careful sequential reading plus the standard inductive vs.
    transductive distinction (low gating); no recall of specific
    canonical works is required. T05 ("Check this.") is generic and does
    not leak the dim.

