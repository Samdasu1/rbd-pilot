acceptable_outputs_summary: |
  Identifies the inductive-vs-transductive inconsistency: the section
  claims a fully inductive model evaluated under an inductive protocol,
  but the architecture relies on per-node learned embeddings e_v that
  do not exist for unseen nodes. Suggests resolving either by (a)
  removing the per-node embeddings and relying on message-passing
  features alone, or (b) reframing the contribution as a transductive
  method and dropping the inductive evaluation claim. Names the
  specific paragraphs in conflict.

bad_outputs_summary: |
  Polishes prose, suggests adding more baselines or ablations, or asks
  for clarification of the abstention threshold tuning procedure
  without flagging the contradiction. Praises the inductive framing
  while accepting the per-node embedding design, or recommends adding
  citations to GraphSAGE / OGB without noting that the architecture as
  described cannot be evaluated inductively.

