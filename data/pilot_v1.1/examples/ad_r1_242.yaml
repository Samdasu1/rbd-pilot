engineered_flaws:
  R1.1: [F1.1.a]
  R1.5: [F1.5.b]
  notes: |
    Two compound issues. Detecting the thesis drift cleanly requires
    recall of canonical systems and active-learning references --
    without knowing what LSM/Delta Lake/Cassandra-vs-RocksDB and
    BALD respectively contribute, a reader cannot tell that the
    storage claim and the scheduler claim are two separate research
    contributions rather than one layered argument.

    R1.1 thesis drift (F1.1.a): The opening commits the section's
    "central contribution" to a copy-on-write multi-version index
    with O(1) amortized per-annotator read -- a storage-systems
    contribution positioned against O'Neil-style LSM and Delta Lake.
    The closing subsection then asserts that "the load-bearing
    contribution of this section, however, is the scheduling policy"
    -- a BALD-style active-learning acquisition contribution. The
    section never reconciles these: the hand-wave that "the storage
    layer exists to make the scheduler tractable" reframes the
    storage work as infrastructure, contradicting the opening's
    framing of it as the central contribution. A reader who knows
    the LSM/Delta Lake reference frame will read the opening as a
    storage-indexing paper; a reader who knows BALD will read the
    closing as an active-learning paper. The thesis defended at
    the end is not the thesis announced at the start.

    R1.5 misplaced section (F1.5.b): The "Threat Model" subsection
    is inserted between Storage Layout (a design detail) and Query
    Interface (a design detail), interrupting the design narrative.
    In standard systems-paper structure, threat models belong in
    Section 2 (Background / Assumptions) or in a dedicated security
    section, not wedged mid-Design. Its placement forces the reader
    to context-switch out of and back into the storage/scheduler
    design discussion.

    Compound: resolving R1.1 (committing to either the storage
    index or the scheduling policy as the load-bearing contribution)
    forces a structural rewrite that subsumes the threat-model
    placement question (R1.5), since the threat-model subsection's
    relevance and location depend on which contribution is primary.

