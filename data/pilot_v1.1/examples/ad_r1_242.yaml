acceptable_outputs_summary: |
  Identifies that the section announces a storage-indexing
  contribution (copy-on-write multi-version index over per-annotator
  histories) but ends by defending a different contribution (a
  BALD-style scheduling policy for annotation dispatch), and asks
  the authors to commit to one as load-bearing and demote the other
  to supporting infrastructure or move it to a separate section.
  Also flags that the Threat Model subsection is wedged mid-Design
  between Storage Layout and Query Interface and should move to the
  background/assumptions section or a dedicated security section so
  the design narrative is uninterrupted.

bad_outputs_summary: |
  Polishes the prose, suggests a system diagram, or accepts the
  "storage layer exists to make the scheduler tractable" sentence
  as adequate reconciliation of the two contribution claims.
  Treats the Threat Model subsection's placement as a stylistic
  matter rather than a structural defect, and does not notice that
  the storage and scheduler claims are positioned against distinct
  prior-work frames (LSM/Delta Lake vs BALD) and therefore read as
  two separate contributions.

