artifact:
  source: synthetic
  domain: systems
  word_count: 348
  text: |
    Section 3. Design of LACUNA

    LACUNA is a storage and serving layer for ML annotation datasets
    that preserves the full per-annotator label distribution rather
    than collapsing it to majority-vote consensus. The central
    contribution of this section is a copy-on-write multi-version
    index that exposes per-annotator label histories with O(1)
    amortized random-read cost. We build on LSM-tree compaction
    primitives in the spirit of O'Neil et al. but treat annotator
    provenance as a first-class indexed dimension; unlike Delta
    Lake, which versions table state at row granularity, LACUNA
    versions per-cell label trajectories.

    Storage Layout. We adopt a column-major sstable format derived
    from Parquet, with one annotator-id column per labeling pass.
    To bound write amplification, compaction follows the size-tiered
    policy of Cassandra rather than RocksDB's leveled scheme, on
    the grounds that annotation datasets are append-mostly: once a
    labeling round closes, its sstables are immutable. The resulting
    read amplification -- scaling with the number of tiers -- is
    tolerable because typical annotation queries touch O(log N)
    tiers in expectation.

    Threat Model. We assume a non-adversarial setting: annotators
    may disagree but do not collude to corrupt the label distribution.
    Adversarial annotation poisoning is out of scope and is handled
    by orthogonal upstream defenses in the spirit of Steinhardt et
    al. Sybil-resistant annotator-identity binding is likewise
    deferred to the auth layer.

    Query Interface and Scheduler. The user-facing API exposes
    per-item label distributions as first-class values. The
    load-bearing contribution of this section, however, is the
    scheduling policy by which fresh annotation tasks are dispatched:
    rather than uniformly sampling unlabeled items, LACUNA's
    scheduler prioritizes items whose current per-annotator
    distribution maximizes expected information gain over the
    posterior on true label distributions, in the spirit of
    BALD-style acquisition [Houlsby et al.]. We show in Section 5
    that this policy reduces annotator-hours to convergence by 38%
    on three benchmark corpora. The storage layer described above
    exists to make this scheduler tractable: without per-annotator
    history indexing, recomputing acquisition scores over candidates
    would dominate scheduling cost.
