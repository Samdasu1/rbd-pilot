acceptable_outputs_summary: |
  Flags the multiple "first" claims as unsupported and names at least one
  nearest-neighbor prior system the section must contrast against — most
  obviously FrugalGPT, LLM-Blender, or the broader cascade / model-selection
  literature. Suggests rewording the contribution to a defensible delta
  (e.g., "first to support online router updates over an open endpoint
  pool") rather than the sweeping framing currently used.

bad_outputs_summary: |
  Treats the novelty claims as given and suggests sharpening the prose,
  adding more benchmarks, tightening the cost-accuracy numbers, or
  expanding the architectural description. Praises the Pareto-routing
  framing as a fresh contribution and may add peripheral citations
  without confronting that the central "first" claims are already
  occupied by published systems.

