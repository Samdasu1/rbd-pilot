engineered_flaws:
  R1.4: [F1.4.a]
  notes: |
    Three explicit "first" claims — "the first framework to dynamically
    route queries among heterogeneous LLMs based on per-query cost-quality
    trade-offs," "the first demonstration that a learned per-query router
    can match GPT-4-tier quality at a fraction of the cost across a broad
    task mix," and "the first to formulate LLM serving as a Pareto-optimal
    scheduling problem over an open pool" — sit squarely in territory that
    FrugalGPT (Chen et al., 2023), LLM-Blender (Jiang et al., 2023), Tabular
    LLM cascades, and the broader model-cascade / model-selection literature
    have already staked out. FrugalGPT in particular reports nearly the same
    headline framing (GPT-4-quality at a fraction of cost via cascaded
    routing) on overlapping benchmarks. The artifact never names a single
    nearest-neighbor system. Detection requires recall of FrugalGPT or
    LLM-Blender by name — moderate gating, not low (no internal
    inconsistency tips the reader off) and not high (these are widely-cited
    2023 papers, not obscure references). The methodology, experiments,
    and writing are otherwise clean; only the novelty positioning is broken.

