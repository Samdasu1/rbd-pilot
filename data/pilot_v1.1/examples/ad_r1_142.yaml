artifact:
  source: synthetic
  domain: nlp
  word_count: 295
  text: |
    We present RouteOptima, the first framework to dynamically route natural
    language queries among heterogeneous large language models based on
    per-query cost-quality trade-offs. While LLM serving has historically
    relied on committing to a single backbone model per deployment,
    RouteOptima introduces a learned router that selects among a pool of
    candidate LLMs — ranging from 7B open-weight models to GPT-4-tier
    proprietary endpoints — on a per-query basis, optimizing a Pareto
    frontier of expected response quality and dollar-cost.

    The router is a three-layer MLP trained on 50k historical queries labeled
    with per-model quality scores derived from a stronger judge model. At
    inference, each incoming query is embedded with a frozen sentence
    encoder, scored by the router, and dispatched to the model with the
    highest expected quality-per-dollar. We support online router updates
    via a sliding-window replay buffer that re-fits the head every 10k
    queries.

    Across four downstream tasks (MMLU, HumanEval, GSM8K, and TriviaQA),
    RouteOptima achieves 92% of GPT-4's average accuracy at 18% of its
    inference cost. To our knowledge, this is the first demonstration that
    a learned per-query router can match GPT-4-tier quality at a fraction
    of the cost across a broad task mix. We are also the first to formulate
    LLM serving as a Pareto-optimal scheduling problem over an open pool
    of heterogeneous endpoints.

    The result establishes routing-over-pool as a deployment-ready paradigm
    for cost-sensitive LLM serving. We argue this fundamentally reframes
    how production LLM systems should be architected: rather than committing
    to a single model, operators should treat the model pool as a first-class
    scheduling primitive. We expect RouteOptima to serve as the reference
    architecture for the next generation of cost-aware LLM serving.
