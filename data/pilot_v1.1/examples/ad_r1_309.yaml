acceptable_outputs_summary: |
  Flags that η_0.15 and σ_NMAD measure point-prediction accuracy and
  scatter, not interval calibration, so the headline "30% calibration
  improvement" is unsupported. Notes that the PIT W² statistic is
  lower-is-better and that W² = 0.084 (FlowPhot) is in fact worse than
  W² = 0.031 (baseline), inverting the conclusion drawn in the text.
  Recommends either reporting empirical coverage of the 1σ intervals
  or rewriting the claim to match what the metrics actually measure.

bad_outputs_summary: |
  Treats the section as well-supported because the numbers are tabulated
  and the trend in σ_NMAD and η_0.15 is consistent. Suggests adding more
  magnitude bins, more spectroscopic galaxies, or polishing the prose
  around Table 2. Accepts the PIT W² reading at face value or rewords
  the surrounding sentence without checking the direction of the
  statistic.

