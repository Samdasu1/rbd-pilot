delegation: "Verify the evidence supports the claims."

artifact:
  source: synthetic
  domain: astronomy
  word_count: 295
  text: |
    Photometric redshift estimation underpins large galaxy surveys, and
    downstream cosmological analyses require not only point predictions
    but well-calibrated uncertainty estimates. We extend the BNN-Photoz
    framework with a normalizing-flow posterior head and evaluate
    calibration on the COSMOS2020 spectroscopic-overlap subset
    (N = 11,402 galaxies with i < 24.5).

    Our central claim is that the proposed FlowPhot model yields
    better-calibrated 1σ redshift intervals than the BNN-Photoz
    baseline across the full magnitude range. To support this we
    report two quantities in Table 2: (i) the catastrophic-outlier
    fraction η_0.15 = fraction of galaxies with |Δz/(1+z)| > 0.15,
    and (ii) the normalized median absolute deviation σ_NMAD of the
    residuals Δz = z_phot − z_spec.

    For FlowPhot we obtain η_0.15 = 3.1% versus 4.7% for the baseline,
    and σ_NMAD = 0.021 versus 0.027. We therefore conclude that
    FlowPhot produces tighter and more reliable confidence intervals,
    with calibration improving by approximately 30% relative to the
    baseline.

    We further examine the probability integral transform (PIT) in
    Figure 4. The PIT deviation from uniformity, measured by the
    Cramér–von Mises statistic, is W² = 0.084 for FlowPhot and
    W² = 0.031 for the baseline. The favorable W² value for FlowPhot,
    together with the flatter shape of its PIT histogram, confirms
    that the FlowPhot posteriors are closer to the ideal uniform
    distribution and supports the calibration claim made above.

    Stratifying by magnitude bin in Table 3, FlowPhot retains
    σ_NMAD = 0.029 against the baseline's 0.034 in the faint regime
    (i > 23), again indicating improved calibration in the regime
    that dominates the cosmological volume. Taken together, the
    lower outlier fraction, the lower σ_NMAD, and the PIT analysis
    establish that FlowPhot delivers well-calibrated photometric
    redshift posteriors suitable for ingestion into Stage-IV survey
    pipelines.
  source_provenance: null

