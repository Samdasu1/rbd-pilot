engineered_flaws:
  R1.3: [F1.3.b, F1.3.c]
  notes: |
    Control case for R1.3. The delegation ("Verify the evidence supports
    the claims") names "evidence" and "claims" outright — full leakage
    by spec §2.5. Both engineered flaws live in R1.3 and are recoverable
    from careful reading without astronomy domain expertise beyond the
    definitions given in the artifact itself.

    F1.3.b (metric mismatch): the load-bearing claim is about
    *calibration of 1σ redshift intervals* (an interval-coverage /
    posterior-shape property), but the headline supporting numbers are
    η_0.15 (outlier fraction) and σ_NMAD (scatter of point residuals).
    Both are point-estimate accuracy/precision metrics — they say
    nothing about whether the reported 1σ intervals achieve their
    nominal coverage. The "calibration improving by ~30%" figure is
    derived from σ_NMAD, which is a precision metric, not a
    calibration metric. The faint-regime stratification repeats the
    same conflation.

    F1.3.c (inverted reading): the only genuine calibration metric in
    the section, the Cramér–von Mises W² against uniformity of the
    PIT, has W² = 0.084 for FlowPhot vs W² = 0.031 for the baseline.
    Lower W² means closer to uniform, i.e., better-calibrated. The
    baseline is therefore better-calibrated by this metric, but the
    text reads the FlowPhot value as "favorable" and as confirming
    the claim. The direction is inverted.

    As a control example, this verifies that projection agents place
    R1.3 high under a delegation that explicitly cues evidence-claim
    verification. Cross-family d_C is expected to be near zero.

