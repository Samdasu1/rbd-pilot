engineered_flaws:
  R1.4: [F1.4.c]
  R1.7: [F1.7.a]
  notes: |
    Two compound issues, both detectable from internal reading without
    needing canonical-literature recall (low gating):

    R1.4 — rhetorical delta. Para 4 frames the contribution with
    escalating rhetoric: "decisively resolves the long-standing
    question," "transformative advance," "substantial leap forward,"
    "definitive new standard." But the section's own description of
    the methodological contribution (paras 2–3) is: take Sheridan's
    time-split protocol, take an existing scaffold-based hold-out
    "following long-established practice," and apply both to DTI on a
    ChEMBL-derived dataset. The rhetorical framing ("transformative,"
    "definitive," "leap forward") is doing the work that measurement
    and methodological novelty should do — the actual delta is a
    careful but conventional recombination of existing splitting
    protocols, plus a benchmarking measurement. Detection: a reader
    notices that the rhetoric in para 4 is incommensurate with the
    contribution as the section itself describes it.

    R1.7 — fabricated citation. Para 3 attributes the time-split
    evaluation protocol to "Sheridan and colleagues (Sheridan et al.,
    2024)" as the work that "first introduced" it for retrospective
    QSAR validation. The very next sentence in the same paragraph
    states that "Time-based splitting has been the standard
    cheminformatics practice for over a decade." These are
    incompatible: a protocol cannot be first introduced in 2024 and
    simultaneously have been standard practice for over a decade.
    The section-internal contradiction signals that either the
    citation date/attribution is wrong or the "over a decade" framing
    is wrong; in either case the citation as written is unsupported.
    Detection requires no knowledge of Sheridan's actual publications
    — the inconsistency is fully visible on the page.

    Combined: the rhetorical-delta framing in R1.4 leans on
    Sheridan-et-al.-2024 in para 3 as the prior-work anchor that the
    contribution "extends." If that citation is corrected (R1.7), the
    extension story collapses to "we apply two long-standing splitting
    protocols to a new dataset," which forces the rhetoric in para 4
    to be re-scoped (R1.4). Conversely, fixing the rhetoric without
    auditing the citation leaves a load-bearing attribution unverified.

