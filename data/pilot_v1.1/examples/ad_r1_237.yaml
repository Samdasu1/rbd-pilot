artifact:
  source: synthetic
  domain: drug_discovery_ml
  word_count: 289
  text: |
    We present a critical evaluation of the standard benchmarks used to
    compare drug-target interaction (DTI) prediction methods, and
    propose RigorDTI, a more discriminative benchmark suite. Recent
    years have seen an explosion of deep learning methods for DTI
    prediction, each claiming state-of-the-art on the same handful of
    datasets. Yet we find that the field's best-known benchmarks have
    become saturated: on DAVIS and KIBA, the top fifteen published
    methods cluster within a single percentage point of mean squared
    error, making meaningful method comparison nearly impossible.

    Our contribution is twofold. First, we curate RigorDTI, a benchmark
    of 124,000 binding measurements drawn from ChEMBL with carefully
    constructed time-based and scaffold-based train/test splits designed
    to expose generalization failures invisible under random splits.
    Second, we establish reference results on RigorDTI for nine
    widely-cited DTI methods, retrained from authors' released code
    where available.

    The construction of RigorDTI builds on the time-split evaluation
    protocol first introduced for retrospective QSAR validation by
    Sheridan and colleagues (Sheridan et al., 2024). Time-based
    splitting has been the standard cheminformatics practice for over a
    decade, and we extend it to the DTI setting alongside a
    scaffold-based hold-out following long-established practice.

    Across all nine methods, we observe a striking pattern: under
    random splits, methods cluster within 0.02 RMSE of one another
    (range 0.71–0.73). Under our time-based split, the same methods
    spread to a range of 0.84–1.31 RMSE — a 6× increase in dispersion.
    This decisively resolves the long-standing question of whether DTI
    methods meaningfully differ in generalization capacity, and
    represents a transformative advance for the field's evaluation
    practices. The proposed RigorDTI benchmark constitutes a
    substantial leap forward and establishes a definitive new standard
    for rigorous DTI evaluation.

    We argue that RigorDTI should replace DAVIS and KIBA as the default
    community benchmark.
