acceptable_outputs_summary: |
  Names both: (1) the contribution-framing language in the closing
  paragraph ("transformative advance," "definitive new standard,"
  "decisively resolves") is incommensurate with the section's own
  description of the methodological move, which is recombining a
  time-split protocol and a scaffold-based hold-out — both described
  as long-established — and applying them to DTI; (2) the
  Sheridan-et-al.-2024 attribution in para 3 is internally
  contradicted by the same paragraph's claim that time-based splitting
  has been standard practice for over a decade, so the citation as
  written cannot be correct. Recommends rescoping the contribution
  claim and verifying the Sheridan attribution and date.

bad_outputs_summary: |
  Tightens the prose in para 1, suggests adding a results table or
  more target classes, and praises the "transformative advance"
  framing. Accepts the Sheridan et al. (2024) citation at face value
  and does not flag the same-paragraph contradiction. May suggest
  adding a few more DTI baselines but does not interrogate the
  contribution's actual delta against the recombined protocols.

