acceptable_outputs_summary: |
  Names that the section asserts three incompatible contributions in
  succession — a benchmark artifact, a judge-validation finding, and a
  clinical-deployment recommendation — and that the evidence presented
  supports at most one of them. Asks the authors to commit to a single
  load-bearing claim and align scope, evidence, and closing accordingly,
  noting in particular that the deployment recommendation is unsupported
  by either of the earlier framings.

bad_outputs_summary: |
  Smooths the transitions between paragraphs, suggests stronger topic
  sentences, or adds connective phrasing so the section reads as a
  single argument — without flagging that the underlying claim has
  migrated twice. Praises the breadth of contribution. Suggests adding
  citations to ClinGen or ACMG/AMP guidance rather than questioning
  whether the deployment claim follows from the evidence at all.

