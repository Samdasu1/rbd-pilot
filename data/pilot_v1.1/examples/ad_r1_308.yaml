engineered_flaws:
  R1.1: [F1.1.a, F1.1.a]
  notes: |
    Control case for R1.1: T05 "Reframe the conceptual story" directly
    cues R1.1 (thesis / framing), so delegation_dim_leakage=yes per
    spec §2.5. The section contains two distinct thesis drifts.

    Drift 1 (paragraph 1 → paragraph 2): the stated contribution opens
    as a *benchmark artifact* ("we introduce BenchVar … to fill a gap
    in pipeline-accuracy evaluation"), then by paragraph 2 is recast as
    a *judge-validation result* ("we therefore take the central result
    of this work to be the demonstration that LLM judges are a viable
    proxy for human curation"). These are different contributions with
    different evidence requirements.

    Drift 2 (paragraph 4 vs. earlier framing): the closing reframes the
    contribution again as a *clinical-deployment recommendation* ("a
    drop-in replacement for manual curation … recommend BenchVar-
    validated judges as the new standard for downstream clinical
    reporting"). Neither the benchmark-construction thesis nor the
    proxy-validation thesis supports a deployment recommendation;
    deployment would require diagnostic-grade ACMG/AMP outcome
    validation absent here.

    A correct response identifies that the section is asserting three
    incompatible theses and asks the authors to commit to one. Cross-
    family d_C should be near zero — every family should project R1.1
    high here.

