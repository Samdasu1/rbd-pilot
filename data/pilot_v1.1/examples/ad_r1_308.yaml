delegation: "Reframe the conceptual story."

artifact:
  source: synthetic
  domain: bioinformatics
  word_count: 281
  text: |
    In this section we introduce BenchVar, a benchmark for evaluating
    large language model judges over the outputs of variant annotation
    pipelines. BenchVar comprises 4,212 variant calls drawn from three
    public cohorts, each paired with annotations from five widely used
    pipelines (VEP, ANNOVAR, SnpEff, Funcotator, and Nirvana). Each
    variant-annotation tuple is scored along four axes: consequence
    accuracy, transcript selection, allele frequency lookup, and clinical
    significance assignment. We constructed BenchVar to fill a clear gap:
    existing comparisons of annotation pipelines rely on inter-pipeline
    agreement rather than ground truth, leaving open which pipeline is
    most accurate on a given variant class.

    Having assembled BenchVar, our contribution is to establish that
    GPT-4-class judges agree with expert curators at a Cohen's kappa of
    0.71 across the four axes. We compare three judge models (GPT-4o,
    Claude 3.5 Sonnet, Gemini 1.5 Pro) and find inter-judge agreement of
    kappa = 0.68. These levels approach the inter-curator agreement
    reported by ClinGen working groups (kappa ≈ 0.75), and we therefore
    take the central result of this work to be the demonstration that
    LLM judges are a viable proxy for human curation in benchmark
    grading.

    Applying BenchVar to the five pipelines, VEP and Nirvana lead on
    consequence accuracy while ANNOVAR is strongest on allele frequency
    lookup; Funcotator and SnpEff trail by 4–7 percentage points.

    Taken together, these results position our LLM-judge framework as
    a drop-in replacement for manual curation in clinical variant
    interpretation, offering a path to fully automated ACMG/AMP
    classification at scale. We accordingly recommend BenchVar-validated
    judges as the new standard for downstream clinical reporting in
    diagnostic laboratories.
