artifact:
  source: synthetic
  domain: machine_translation
  word_count: 209
  text: |
    We present TransNova, a neural machine translation system that
    achieves state-of-the-art BLEU scores on the WMT-2018 English-German
    translation task. Our system reaches 28.7 BLEU compared to the
    previous best of 27.1 reported by the Vaswani et al. baseline
    transformer.

    The architecture builds on the standard transformer encoder-decoder
    with two modifications. First, we use a larger context window of
    1024 tokens compared to the 512 tokens used in the baseline. Second,
    we apply pre-norm residual connections rather than the original
    post-norm formulation, which improves training stability at scale.

    We trained on the WMT-2018 training set and evaluated on the
    WMT-2018 test set. Hyperparameter search was conducted using the
    validation split. We report sacreBLEU scores for direct
    comparability with prior work.

    In our final evaluation TransNova outperforms the Vaswani transformer
    by 1.6 BLEU and exceeds the score reported by the Google production
    system at the time of publication. We position this work as a
    meaningful contribution to neural machine translation research and
    as evidence that simple architectural refinements continue to yield
    gains. Detailed hyperparameter and training-cost numbers are reported
    in Appendix C, including the full training time of approximately 84
    GPU-hours on 8 V100 GPUs and the dataset preprocessing pipeline used
    for tokenization and BPE encoding of the WMT-2018 training corpus.
