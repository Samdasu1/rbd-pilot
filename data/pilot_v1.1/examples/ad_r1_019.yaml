engineered_flaws:
  R1.3: [F1.3.a]
  R1.4: [F1.4.b]
  notes: |
    Two interpretations of the load-bearing issue, both defensible:

    Reading A — R1.4 dominant (novelty positioning):
      The only baseline is the original 2017 Vaswani transformer at
      27.1 BLEU. Modern NMT (mBART, NLLB, large multilingual decoders)
      has long since exceeded the Vaswani baseline. The contribution
      sits in a 2017-vintage comparison while claiming to be a
      "meaningful contribution to neural machine translation research"
      in the present. Rewrite would re-anchor against current strong
      baselines — the comparison set, not the empirical numbers,
      is the load-bearing issue.

    Reading B — R1.3 dominant (claim-evidence mismatch):
      The headline "state-of-the-art BLEU scores on WMT-2018 English-German"
      is internally unsupported. WMT-2018 has been benchmarked widely
      since 2018 and the SOTA BLEU on this specific task has long been
      well above 28.7. The section reports 28.7 against a 27.1 baseline
      and claims "state-of-the-art" — the empirical evidence shown does
      not support that claim because the baseline used is not the
      contemporary SOTA. Rewrite would tighten the empirical claim to
      what the evidence supports.

    Reading A says "the framing is wrong" — fix the comparison set.
    Reading B says "the claim is wrong" — fix the empirical wording.
    Both produce different papers. Detection: low gating; both
    readings are visible from careful reading of the section's claim
    and the cited baseline year.

